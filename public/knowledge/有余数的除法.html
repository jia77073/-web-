<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>🐟 有余数的除法 · 笔算对齐小英雄</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM & Babel -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    /* 竖式样式 - 严格数位对齐，修正落位逻辑 */
    .ld-container {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(4px);
      padding: 20px 12px 20px 16px;
      border-radius: 32px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05), 0 2px 6px rgba(0, 0, 0, 0.02);
      border: 1px solid rgba(166, 194, 220, 0.5);
      display: inline-block;
      font-family: 'Courier New', 'Consolas', 'Monaco', 'SF Mono', monospace;
      font-weight: 700;
      color: #1e3a5f;
    }
    .ld-row {
      display: flex;
      align-items: flex-end;
      min-height: 2.8rem;
    }
    .ld-divisor-placeholder {
      width: 52px;
      flex-shrink: 0;
    }
    .ld-divisor-cell {
      width: 52px;
      flex-shrink: 0;
      font-size: 2.5rem;
      text-align: right;
      padding-right: 12px;
      color: #2c6e9e;
      line-height: 1.3;
      font-weight: 700;
    }
    .ld-digits-row {
      display: flex;
    }
    .digit {
      width: 2.8rem;
      text-align: center;
      font-size: 2.4rem;
      line-height: 1.3;
      font-weight: 700;
      color: #1e3a5f;
    }
    .ld-quotient-row .digit {
      color: #2c6e2f;
    }
    .ld-bracket-col {
      display: flex;
      flex-direction: column;
      border-left: 3px solid #5f8a9e;
    }
    .ld-top-line {
      width: 100%;
      height: 3px;
      background: #5f8a9e;
      margin-bottom: 4px;
    }
    .dividend-row .digit {
      font-weight: 800;
    }
    .ld-line-row {
      min-height: auto;
    }
    .ld-step-line {
      height: 2px;
      background: #7f9eb5;
      margin: 2px 0 4px 0;
      border-radius: 2px;
    }
    /* 响应式调整 */
    @media (max-width: 700px) {
      .digit { width: 2.2rem; font-size: 1.9rem; }
      .ld-divisor-cell { width: 42px; font-size: 2rem; }
      .ld-divisor-placeholder { width: 42px; }
    }
    @media (max-width: 480px) {
      .digit { width: 1.9rem; font-size: 1.6rem; }
      .ld-divisor-cell { width: 36px; font-size: 1.8rem; padding-right: 6px; }
      .ld-divisor-placeholder { width: 36px; }
    }
    .remainder-digit {
      color: #c2410c !important;
    }
    .drag-card {
      cursor: grab;
      transition: all 0.15s ease;
    }
    .drag-card:active {
      cursor: grabbing;
    }
    .drop-zone-highlight {
      background-color: rgba(186, 230, 255, 0.6) !important;
      border: 3px solid #3b82f6 !important;
      transform: scale(1.02);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#b8e1fc] to-[#d9f0ff] min-h-screen flex items-center justify-center p-4 md:p-6">
<div id="root" class="w-full max-w-6xl mx-auto"></div>

<script type="text/babel">
  // ---------- 除法笔算步骤生成器 (支持有余数，记录每一步的列索引) ----------
  function computeDivisionSteps(dividend, divisor) {
    if (divisor === 0) return null;
    const dividendStr = dividend.toString();
    const digits = dividendStr.split('').map(d => parseInt(d));
    let remainder = 0;
    let quotientDigits = [];
    const steps = []; // 存储 { partialDividend, product, quotient, remainderAfter, positionIndex }
    let currentPartial = 0;
    let hasStarted = false;
    
    for (let i = 0; i < digits.length; i++) {
      currentPartial = currentPartial * 10 + digits[i];
      if (currentPartial >= divisor || hasStarted || (i === digits.length - 1 && quotientDigits.length === 0)) {
        const q = Math.floor(currentPartial / divisor);
        const product = q * divisor;
        const newRemainder = currentPartial - product;
        quotientDigits.push(q);
        steps.push({
          partialDividend: currentPartial,
          product: product,
          quotient: q,
          remainderAfter: newRemainder,
          positionIndex: i,     // 这一步乘积的末位对齐被除数的第i位 (0是最左位)
        });
        currentPartial = newRemainder;
        hasStarted = true;
      } else {
        // 不够除且尚未开始商，继续累加下一位（例如123÷5，首位1<5，不产生商，继续循环）
      }
    }
    const quotientValue = parseInt(quotientDigits.join('')) || 0;
    const finalRemainder = steps.length ? steps[steps.length-1].remainderAfter : dividend;
    return {
      quotient: quotientValue,
      remainder: finalRemainder,
      steps: steps,
      quotientDigits: quotientDigits,
      dividend: dividend,
      divisor: divisor,
    };
  }

  // 随机生成有余数的题目 (除数2~9，被除数10~999，确保余数不为0概率高)
  function generateRandomProblem() {
    const divisor = Math.floor(Math.random() * 8) + 2; // 2~9
    let dividend = Math.floor(Math.random() * 890) + 110; // 110~999
    if (Math.random() > 0.5) dividend = Math.floor(Math.random() * 90) + 10; // 两位数概率
    if (dividend % divisor === 0 && Math.random() > 0.3) {
      dividend += Math.floor(Math.random() * (divisor - 1)) + 1;
    }
    if (dividend < divisor && dividend < 20) dividend = divisor + Math.floor(Math.random() * 50);
    return { dividend, divisor };
  }

  // ---------- 竖式组件 (动态列数，严格个位对个位、十位对十位、百位对百位) ----------
  const DivisionVertical = ({ dividend, divisor, steps, quotient, remainder }) => {
    const dividendStr = dividend.toString();
    const numCols = dividendStr.length;   // 被除数位数
    const dividendDigits = dividendStr.split('');
    
    // 商右对齐：商的个位必须对齐被除数的个位（最后一列）
    const quotientStr = quotient.toString();
    const quotientLen = quotientStr.length;
    const quotientStartCol = numCols - quotientLen;
    const quotientCells = Array(numCols).fill('');
    for (let i = 0; i < quotientLen; i++) {
      quotientCells[quotientStartCol + i] = quotientStr[i];
    }
    
    // 构建步骤行 (修正余数落位的数位对齐)
    const stepRows = [];
    steps.forEach((step, idx) => {
      // 1. 乘积行：乘积的末位对齐 step.positionIndex
      const product = step.product;
      const productStr = product.toString();
      const productLen = productStr.length;
      const productEndCol = step.positionIndex;      // 乘积末位所在的列索引
      const productStartCol = productEndCol - productLen + 1;
      let productCols = Array(numCols).fill('');
      for (let i = 0; i < productLen; i++) {
        const colIdx = productStartCol + i;
        if (colIdx >= 0 && colIdx < numCols) productCols[colIdx] = productStr[i];
      }
      stepRows.push({ type: 'product', cols: productCols });
      
      // 2. 横线行
      stepRows.push({ type: 'line' });
      
      // 3. 余数落位行：根据位值精确对齐（核心修正）
      const remainderAfter = step.remainderAfter;
      const isLastStep = (idx === steps.length - 1);
      
      let partialCols = Array(numCols).fill('');
      
      if (isLastStep) {
        // 最终余数：只显示余数本身，个位对齐被除数个位（最后一列）
        const finalRemainderStr = remainderAfter.toString();
        const finalLen = finalRemainderStr.length;
        const finalStartCol = numCols - finalLen;
        for (let i = 0; i < finalLen; i++) {
          const colIdx = finalStartCol + i;
          if (colIdx >= 0 && colIdx < numCols) partialCols[colIdx] = finalRemainderStr[i];
        }
      } else {
        // 中间步骤：需要落下下一位数字，形成新的部分被除数
        const nextDigitIdx = step.positionIndex + 1;
        if (nextDigitIdx < dividendStr.length) {
          const nextDigit = dividendStr[nextDigitIdx];
          const newPartial = parseInt(remainderAfter.toString() + nextDigit);
          const newPartialStr = newPartial.toString();
          const newPartialLen = newPartialStr.length;
          
          // 关键修正：新部分被除数的个位必须对齐 nextDigitIdx (落下的那一位)
          // 十位对齐 nextDigitIdx - 1，百位对齐 nextDigitIdx - 2，以此类推
          // 从个位开始向左填充数字
          for (let i = 0; i < newPartialLen; i++) {
            const digitChar = newPartialStr[newPartialLen - 1 - i]; // 从个位往前取
            const colIdx = nextDigitIdx - i;   // 个位在 nextDigitIdx，十位在 nextDigitIdx-1 ...
            if (colIdx >= 0 && colIdx < numCols) {
              partialCols[colIdx] = digitChar;
            }
          }
        } else {
          // 理论上不会发生，但防御：直接右对齐
          const displayStr = remainderAfter.toString();
          const displayLen = displayStr.length;
          const startCol = numCols - displayLen;
          for (let i = 0; i < displayLen; i++) {
            const colIdx = startCol + i;
            if (colIdx >= 0 && colIdx < numCols) partialCols[colIdx] = displayStr[i];
          }
        }
      }
      
      stepRows.push({ 
        type: 'partial', 
        cols: partialCols, 
        isLast: isLastStep 
      });
    });
    
    // 动态横线宽度样式 (根据列数自适应)
    const getStepLineWidth = () => {
      let baseWidth = 2.8; // rem
      if (window.innerWidth <= 700) baseWidth = 2.2;
      if (window.innerWidth <= 480) baseWidth = 1.9;
      return `calc(${baseWidth}rem * ${numCols})`;
    };
    const lineWidthStyle = { width: getStepLineWidth() };
    
    return (
      <div className="ld-container">
        {/* 商行 */}
        <div className="ld-row ld-quotient-row">
          <div className="ld-divisor-placeholder"></div>
          <div className="ld-digits-row">
            {quotientCells.map((d, idx) => (
              <div key={`q-${idx}`} className="digit">{d}</div>
            ))}
          </div>
        </div>
        
        {/* 除数 + 被除数行 */}
        <div className="ld-row ld-main-row">
          <div className="ld-divisor-cell">{divisor}</div>
          <div className="ld-bracket-col">
            <div className="ld-top-line" style={lineWidthStyle}></div>
            <div className="ld-digits-row dividend-row">
              {dividendDigits.map((d, idx) => (
                <div key={`d-${idx}`} className="digit">{d}</div>
              ))}
            </div>
          </div>
        </div>
        
        {/* 动态步骤: 乘积、横线、余数落位（修正对齐） */}
        {stepRows.map((row, ridx) => {
          if (row.type === 'product') {
            return (
              <div key={`prod-${ridx}`} className="ld-row ld-step-row">
                <div className="ld-divisor-placeholder"></div>
                <div className="ld-digits-row">
                  {row.cols.map((val, cidx) => (
                    <div key={`pc-${ridx}-${cidx}`} className="digit">{val}</div>
                  ))}
                </div>
              </div>
            );
          }
          if (row.type === 'line') {
            return (
              <div key={`line-${ridx}`} className="ld-row ld-line-row">
                <div className="ld-divisor-placeholder"></div>
                <div className="ld-digits-row">
                  <div className="ld-step-line" style={lineWidthStyle}></div>
                </div>
              </div>
            );
          }
          if (row.type === 'partial') {
            return (
              <div key={`part-${ridx}`} className="ld-row ld-step-row">
                <div className="ld-divisor-placeholder"></div>
                <div className="ld-digits-row">
                  {row.cols.map((val, cidx) => (
                    <div key={`pr-${ridx}-${cidx}`} className={`digit ${row.isLast ? 'remainder-digit' : ''}`}>{val}</div>
                  ))}
                </div>
              </div>
            );
          }
          return null;
        })}
      </div>
    );
  };

  // ---------- 拖拽配对游戏 (商和余数配对) ----------
  const DragMatchingGame = ({ quotient, remainder, divisor, dividend, onResetTrigger }) => {
    const [matchedQuotient, setMatchedQuotient] = React.useState(null);
    const [matchedRemainder, setMatchedRemainder] = React.useState(null);
    const [feedback, setFeedback] = React.useState('');
    const [dropZoneActive, setDropZoneActive] = React.useState(null);
    
    React.useEffect(() => {
      setMatchedQuotient(null);
      setMatchedRemainder(null);
      setFeedback('');
      setDropZoneActive(null);
    }, [dividend, divisor, onResetTrigger]);
    
    const checkAndSetFeedback = (qVal, rVal) => {
      if (qVal === quotient && rVal === remainder) {
        setFeedback('🎉 完美！商和余数都配对正确！你真棒！ 🎉');
      } else if (qVal === quotient && rVal !== remainder) {
        setFeedback('✅ 商正确！再试试把余数拖到右边的糖果篮～');
      } else if (qVal !== quotient && rVal === remainder) {
        setFeedback('✅ 余数正确！再把商拖到左边的宝箱里～');
      } else if (qVal !== null || rVal !== null) {
        setFeedback('⭐ 再观察一下竖式，把正确的数字拖进对应的篮筐吧！');
      } else {
        setFeedback('✨ 拖动下面的卡片，放到正确的位置 ✨');
      }
    };
    
    const handleDragStart = (e, type, value) => {
      e.dataTransfer.setData('text/plain', JSON.stringify({ type, value }));
      e.dataTransfer.effectAllowed = 'copy';
    };
    
    const handleDragOver = (e, zone) => {
      e.preventDefault();
      setDropZoneActive(zone);
      e.dataTransfer.dropEffect = 'copy';
    };
    
    const handleDragLeave = () => {
      setDropZoneActive(null);
    };
    
    const handleDrop = (e, targetZone) => {
      e.preventDefault();
      setDropZoneActive(null);
      try {
        const raw = e.dataTransfer.getData('text/plain');
        if (!raw) return;
        const { type, value } = JSON.parse(raw);
        
        if (targetZone === 'quotient' && type === 'quotient') {
          if (matchedQuotient !== null) {
            setFeedback('商区域已经有数字啦！可以换一题重新挑战～');
            return;
          }
          if (value === quotient) {
            setMatchedQuotient(value);
            setFeedback('✅ 商配对正确！好厉害！现在配对余数吧～');
          } else {
            setFeedback(`❌ 不对哦，商应该是 ${quotient}，再看看竖式中的商。`);
          }
        } 
        else if (targetZone === 'remainder' && type === 'remainder') {
          if (matchedRemainder !== null) {
            setFeedback('余数区域已经有数字啦！试试换一题吧～');
            return;
          }
          if (value === remainder) {
            setMatchedRemainder(value);
            setFeedback('✅ 余数配对正确！太棒啦！');
          } else {
            setFeedback(`❌ 余数应该是 ${remainder}，检查一下竖式最下面的余数。`);
          }
        } else {
          setFeedback('🧸 拖拽位置不对～商要拖到左边宝箱，余数拖到右边糖果篮～');
        }
        
        setTimeout(() => {
          const newQ = (targetZone === 'quotient' && type === 'quotient' && value === quotient) ? quotient : matchedQuotient;
          const newR = (targetZone === 'remainder' && type === 'remainder' && value === remainder) ? remainder : matchedRemainder;
          if ((newQ === quotient && newR === remainder) || 
              (matchedQuotient === quotient && matchedRemainder === remainder)) {
            setFeedback('🏆 恭喜！除法小英雄！全部配对成功！ 🏆');
          } else {
            checkAndSetFeedback(newQ, newR);
          }
        }, 30);
      } catch(err) { console.log(err); }
    };
    
    React.useEffect(() => {
      if (matchedQuotient === quotient && matchedRemainder === remainder) {
        setFeedback('🏆 太厉害了！商和余数都正确，你已经是笔算高手啦！ 🏆');
      } else if (matchedQuotient === quotient && matchedRemainder !== remainder) {
        setFeedback('✅ 商正确 ✔️ 再把余数卡片拖到右边篮子吧');
      } else if (matchedQuotient !== quotient && matchedRemainder === remainder) {
        setFeedback('✅ 余数正确 ✔️ 再把商卡片拖到左边宝箱');
      }
    }, [matchedQuotient, matchedRemainder, quotient, remainder]);
    
    const dragItems = [
      { type: 'quotient', label: `商 ${quotient}`, value: quotient, bg: 'bg-emerald-100', emoji: '🔢' },
      { type: 'remainder', label: `余数 ${remainder}`, value: remainder, bg: 'bg-amber-100', emoji: '🍬' }
    ];
    
    return (
      <div className="flex flex-col gap-5">
        <div className="flex flex-wrap justify-around gap-4 items-stretch">
          <div 
            onDragOver={(e) => handleDragOver(e, 'quotient')}
            onDragLeave={handleDragLeave}
            onDrop={(e) => handleDrop(e, 'quotient')}
            className={`flex-1 min-w-[130px] bg-white/60 backdrop-blur-sm rounded-2xl p-4 text-center border-4 transition-all ${dropZoneActive === 'quotient' ? 'drop-zone-highlight' : 'border-sky-200'} shadow-md`}
          >
            <div className="text-sm font-bold text-sky-700 mb-2 flex justify-center gap-1"><span>📦</span> 商 的宝箱</div>
            <div className="text-4xl font-black text-emerald-700 bg-white/70 rounded-xl py-3 shadow-inner">
              {matchedQuotient !== null ? matchedQuotient : '?'}
            </div>
            <div className="text-xs text-stone-500 mt-2">拖拽「商」卡片到这里</div>
          </div>
          <div 
            onDragOver={(e) => handleDragOver(e, 'remainder')}
            onDragLeave={handleDragLeave}
            onDrop={(e) => handleDrop(e, 'remainder')}
            className={`flex-1 min-w-[130px] bg-white/60 backdrop-blur-sm rounded-2xl p-4 text-center border-4 transition-all ${dropZoneActive === 'remainder' ? 'drop-zone-highlight' : 'border-orange-200'} shadow-md`}
          >
            <div className="text-sm font-bold text-orange-700 mb-2 flex justify-center gap-1"><span>🧺</span> 余数 糖果篮</div>
            <div className="text-4xl font-black text-amber-700 bg-white/70 rounded-xl py-3 shadow-inner">
              {matchedRemainder !== null ? matchedRemainder : '?'}
            </div>
            <div className="text-xs text-stone-500 mt-2">拖拽「余数」卡片到这里</div>
          </div>
        </div>
        
        <div className="bg-white/40 backdrop-blur-sm rounded-2xl p-4 mt-1 border border-white/40">
          <div className="text-center text-sky-800 font-semibold text-sm mb-2">✨ 按住卡片拖拽到上方对应区域 ✨</div>
          <div className="flex justify-center gap-6 flex-wrap">
            {dragItems.map((item, idx) => (
              <div
                key={idx}
                draggable={true}
                onDragStart={(e) => handleDragStart(e, item.type, item.value)}
                className={`${item.bg} w-28 h-28 rounded-2xl shadow-lg flex flex-col items-center justify-center drag-card hover:scale-105 border-2 border-white/70`}
              >
                <div className="text-3xl font-black">{item.value}</div>
                <div className="text-sm font-bold mt-1">{item.label}</div>
                <div className="text-xs text-stone-500 mt-1">{item.emoji} 拖拽我</div>
              </div>
            ))}
          </div>
        </div>
        
        {feedback && (
          <div className="bg-white/80 backdrop-blur p-3 rounded-xl text-center font-bold text-indigo-700 border border-sky-200 shadow">
            {feedback}
          </div>
        )}
        <div className="text-xs text-center text-sky-700 bg-white/50 p-2 rounded-full">
          💡 小提示：先看左边竖式，再把正确的商和余数拖进对应的篮筐！
        </div>
      </div>
    );
  };

  // ---------- 主组件 ----------
  const MathDivisionCourse = () => {
    const [problem, setProblem] = React.useState({ dividend: 534, divisor: 4 }); // 典型首位够除的题目，测试对齐修正
    const [stepsData, setStepsData] = React.useState(null);
    const [displayMode, setDisplayMode] = React.useState('vertical');
    const [gameResetKey, setGameResetKey] = React.useState(0);
    
    React.useEffect(() => {
      const { dividend, divisor } = problem;
      const result = computeDivisionSteps(dividend, divisor);
      if (result) setStepsData(result);
    }, [problem]);
    
    const handleNewProblem = () => {
      const newProb = generateRandomProblem();
      setProblem(newProb);
      setGameResetKey(prev => prev + 1);
    };
    
    const toggleDisplayMode = () => {
      setDisplayMode(prev => prev === 'vertical' ? 'horizontal' : 'vertical');
    };
    
    const { dividend, divisor } = problem;
    const quotient = stepsData?.quotient ?? 0;
    const remainder = stepsData?.remainder ?? 0;
    const steps = stepsData?.steps ?? [];
    const horizontalFormula = `${dividend} ÷ ${divisor} = ${quotient} ······ ${remainder}`;
    
    return (
      <div className="glass-card rounded-[2rem] shadow-2xl overflow-hidden">
        <div className="bg-gradient-to-r from-[#6ab0de] to-[#9ac6e8] px-5 py-4 flex flex-wrap justify-between items-center gap-3">
          <div className="flex items-center gap-2">
            <span className="text-3xl">🐟</span>
            <h1 className="text-xl md:text-2xl font-bold text-white drop-shadow">有余数的除法 · 笔算小英雄</h1>
          </div>
          <div className="flex gap-3">
            <button onClick={handleNewProblem} className="bg-white/90 text-sky-700 px-4 py-2 rounded-full font-bold shadow-md flex items-center gap-2 text-sm hover:scale-105 transition active:scale-95">
              <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fillRule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 11-11.601-2.566 1 1 0 01.61-1.276z" clipRule="evenodd" />
              </svg>
              换一题
            </button>
            <button onClick={toggleDisplayMode} className="bg-white/90 text-amber-700 px-4 py-2 rounded-full font-bold shadow-md flex items-center gap-2 text-sm hover:scale-105 transition">
              <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
              </svg>
              {displayMode === 'vertical' ? '📐 切换横式' : '📏 切换竖式'}
            </button>
          </div>
        </div>
        
        <div className="flex flex-col lg:flex-row gap-6 p-5 md:p-7 bg-white/20 backdrop-blur-sm">
          {/* 左侧知识点与竖式/横式展示区 */}
          <div className="flex-1 bg-white/60 backdrop-blur-sm rounded-3xl p-5 shadow-md border border-white/50">
            <div className="flex items-center gap-2 mb-3 border-b border-sky-200 pb-2">
              <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-sky-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
              </svg>
              <h2 className="text-xl font-bold text-sky-800">📖 有余数除法小讲堂</h2>
            </div>
            <div className="space-y-3 text-stone-700 text-sm md:text-base">
              <div className="bg-white/70 p-3 rounded-xl">
                <span className="font-bold">✨ 有余数除法的笔算规则：</span><br/>
                ① 从被除数的高位除起，先用除数试除前一位（不够除看前两位）。<br/>
                ② 除到哪一位，商就写在那一位的上面。<br/>
                ③ 每步余数必须比除数小，再落下下一位继续除。<br/>
                ④ 最后剩下的数叫“余数”，要写在竖式最下面，和被除数个位对齐。
              </div>
              <div className="bg-white/70 p-3 rounded-xl">
                <span className="font-bold">✏️ 口诀：</span> 商乘减比落，余数要比除数小。
              </div>
              <div className="flex justify-center my-3">
                {displayMode === 'vertical' && stepsData && (
                  <DivisionVertical 
                    dividend={dividend} 
                    divisor={divisor} 
                    steps={steps} 
                    quotient={quotient} 
                    remainder={remainder} 
                  />
                )}
                {displayMode === 'horizontal' && (
                  <div className="bg-white/80 rounded-2xl p-5 text-center shadow-inner w-full">
                    <div className="text-2xl md:text-3xl font-mono font-bold text-stone-700 break-all">{horizontalFormula}</div>
                    <div className="text-sky-600 mt-2 text-sm">验算：{quotient} × {divisor} + {remainder} = {quotient * divisor + remainder} ✔️</div>
                  </div>
                )}
              </div>
              <div className="bg-sky-100/70 p-3 rounded-xl text-xs md:text-sm text-center">
                💡 当前题目：<strong>{dividend} ÷ {divisor}</strong> &nbsp;&nbsp; 商：{quotient} &nbsp; 余数：{remainder}
              </div>
            </div>
          </div>
          
          {/* 右侧互动游戏区 */}
          <div className="flex-1 bg-white/60 backdrop-blur-sm rounded-3xl p-5 shadow-md border border-white/50">
            <div className="flex items-center gap-2 mb-3 border-b border-pink-200 pb-2">
              <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.5" />
              </svg>
              <h2 className="text-xl font-bold text-sky-800">🎮 拖拽配对 · 挑战有余数除法</h2>
            </div>
            <DragMatchingGame 
              quotient={quotient}
              remainder={remainder}
              divisor={divisor}
              dividend={dividend}
              onResetTrigger={gameResetKey}
            />
            <div className="mt-4 text-center text-xs text-sky-600 flex justify-center gap-3 flex-wrap bg-white/40 p-2 rounded-full">
              <span>💙 左边宝箱 → 放“商”</span>
              <span>🧡 右边篮子 → 放“余数”</span>
              <span>🐟 拖拽卡片试一试！</span>
            </div>
          </div>
        </div>
        <div className="text-center text-sky-700 text-xs py-3 border-t border-white/40 bg-white/30">
          🌟 笔算竖式个位对齐个位，十位对齐十位，余数要写清楚！继续加油 🌟
        </div>
      </div>
    );
  };
  
  ReactDOM.createRoot(document.getElementById('root')).render(<MathDivisionCourse />);
</script>
</body>
</html>
