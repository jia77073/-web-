<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>最优化小当家 | 统筹策略·决策小天才</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM & Babel -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        .dragging-card {
            opacity: 0.6;
            cursor: grabbing;
            transform: scale(0.95);
        }
        .drop-zone-active {
            transition: 0.08s linear;
            box-shadow: 0 0 0 4px #c084fc, 0 0 0 8px rgba(192,132,252,0.3);
            background-color: #f3e8ff !important;
        }
        .win-glow {
            animation: winPulse 0.5s ease-in-out 2;
        }
        @keyframes winPulse {
            0% { box-shadow: 0 0 0 0 #c084fc; background-color: #faf5ff; }
            50% { box-shadow: 0 0 0 12px rgba(192,132,252,0.5); background-color: #fae8ff; }
            100% { box-shadow: 0 0 0 0 #c084fc; background-color: #faf5ff; }
        }
        [draggable="true"] {
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }
        .custom-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #9333ea;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-50 via-fuchsia-50 to-purple-100 min-h-screen p-4 md:p-6 font-sans">

<div id="root"></div>

<script type="text/babel">
    // 最优化问题专项训练 —— 统筹策略、最优方案（拖拽卡片匹配正确数值）
    const { useState, useCallback, useEffect, useRef } = React;

    // ---------- 随机题目生成器 (三类经典问题：烙饼、沏茶、排队等候) ----------
    // 每个问题返回: { text, correctAnswer, optionsArray, hint }
    const generateOptimizationProblem = () => {
        const type = Math.floor(Math.random() * 3); // 0:烙饼, 1:沏茶, 2:排队等候(看病/购物)
        
        // 烙饼问题: 每次最多烙2张，每面需要a分钟，求烙n张饼的最短总时间
        if (type === 0) {
            // 随机饼的数量: 2~5张，每面时间 2或3分钟 (使数字简单)
            const cakes = Math.floor(Math.random() * 4) + 2; // 2,3,4,5
            const sideTime = Math.random() > 0.5 ? 2 : 3;
            let correct = 0;
            if (cakes === 1) correct = sideTime * 2;
            else correct = Math.ceil(cakes / 2) * 2 * sideTime; // 经典公式: 总时间 = 饼数 * 2面时间 / 每锅数量(2) 向上取整
            // 更精确: 烙饼最优时间 = 饼数 * 每面时间 * (2/锅容量) 向上取整
            // 改用经典: 当饼数大于1时，总时间 = cakes * sideTime * 2 / 2? 实际上公式: 至少需要烙次数 = cakes, 每个周期2张饼一面? 简易正确公式: 对于2张锅，烙n张饼最短时间 = n * 每面时间 (当n>=2且双面) 不对，实际正确: 当n=3,每面2分=> 6分钟不是6，三张饼最优时间=3*2=6; 但常规公式: 时间 = 饼数 * 每面时间 * 2 / 2? 最好直接使用标准: 时间 = ceil(cakes * 2 / 2) * sideTime? 等于 cakes * sideTime? 对，如果每次可以放两张同时烙双面，n张饼2n面，每次锅最多烙2面，需要的次数 = ceil(2n/2)=n, 所以时间=n * 每面时间。但经典就是时间=饼数×每面时间(当两锅并行时)。但为了准确: 使用正确推导: 3张2分钟一面=> 3*2=6分钟。因此公式: cakes * sideTime 即可。但实际4张呢:4*2=8分钟,可以两批:正正反反合理,是的。
            // 验证: 5张*2=10分钟，可通过交替实现。
            correct = cakes * sideTime;
            const questionText = `🥞 烙饼问题：一个平底锅每次最多可以同时烙2张饼，每张饼需要烙两面，每面需要 ${sideTime} 分钟。请问烙 ${cakes} 张饼最少需要多少分钟？`;
            // 生成干扰项: 偏大偏小，常见误区
            let disturbs = [correct + sideTime, correct - sideTime, correct + (sideTime*2), correct - 1, Math.floor(correct * 0.8), Math.floor(correct * 1.3)];
            disturbs = disturbs.filter(v => v > 0 && v !== correct);
            disturbs = [...new Set(disturbs)].slice(0, 3);
            if (disturbs.length < 3) disturbs.push(correct + 2, correct + 4);
            const options = [correct, ...disturbs.slice(0, 3)];
            // 打乱顺序
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }
            return { text: questionText, correctAnswer: correct, options, hint: "💡 同时烙两面最省时，总时间 = 饼数 × 每面时间" };
        }
        // 沏茶问题：优化工序并行
        else if (type === 1) {
            // 随机时间段: 洗水壶1min, 烧水8min, 洗茶具2min, 找茶叶1min, 泡茶1min (类似)
            const washKettle = 1;
            const boilWater = Math.floor(Math.random() * 5) + 6; // 6~10分钟烧水
            const washCups = Math.floor(Math.random() * 3) + 1; // 1~3分钟
            const findTea = Math.floor(Math.random() * 2) + 1; // 1~2分钟
            const brew = 1;
            // 最优策略: 洗水壶(必须) -> 烧水(同时洗杯子+找茶叶) -> 最后泡茶 = 洗水壶 + max(烧水, 洗杯子+找茶叶) + 泡茶
            const parallelTime = Math.max(boilWater, washCups + findTea);
            const optimalTotal = washKettle + parallelTime + brew;
            const questionText = `🍵 沏茶优化：小明要做以下事情: 洗水壶 ${washKettle} 分钟，烧水 ${boilWater} 分钟，洗茶具 ${washCups} 分钟，找茶叶 ${findTea} 分钟，泡茶 ${brew} 分钟。烧水的同时可以做其他事，请问最短需要多少分钟才能喝上茶？`;
            const correct = optimalTotal;
            // 干扰: 常规累加和、错误并行
            let disturbs = [washKettle+boilWater+washCups+findTea+brew, washKettle+boilWater+brew+Math.min(washCups,findTea), correct+2, correct-1, washKettle+boilWater+brew];
            disturbs = disturbs.filter(v => v > 0 && v !== correct);
            disturbs = [...new Set(disturbs)].slice(0, 3);
            if (disturbs.length < 3) disturbs.push(correct + 3, correct + 5);
            const options = [correct, ...disturbs.slice(0, 3)];
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }
            return { text: questionText, correctAnswer: correct, options, hint: "💡 在烧水的同时洗茶具和找茶叶，可以同时进行，总时间 = 洗水壶 + 烧水(最长并行) + 泡茶" };
        }
        // 排队等候问题: 多个病人/顾客，使总等候时间最少 (从小到大排序)
        else {
            const services = [];
            const numPeople = Math.floor(Math.random() * 3) + 3; // 3~5人
            for (let i = 0; i < numPeople; i++) {
                services.push(Math.floor(Math.random() * 5) + 2); // 每人所需时间 2~6分钟
            }
            // 最优策略: 按时间从小到大排序，总等候时间最短 = Σ(每个人时间 * 后面等待人数+自身)
            const sorted = [...services].sort((a,b)=>a-b);
            let totalWait = 0;
            let waitSum = 0;
            for (let i = 0; i < sorted.length; i++) {
                waitSum += sorted[i];
                totalWait += waitSum;
            }
            // 总等候时间 = 第一个人时间 + (第一个人+第二个人) + ... + 总和
            // 或者另一个常见模型: 总等待时间(包括每个人自己的服务时间累计)
            const correct = totalWait;
            const serviceList = services.join('、');
            const questionText = `🏥 排队优化：某挂号处有 ${numPeople} 位病人，他们看病需要的时间分别是 ${serviceList} 分钟。如果只有一个医生，怎样安排顺序能使他们总的等候时间（所有人的等待时间总和）最短？最短的总等候时间是多少分钟？`;
            // 干扰: 随机排序和或最大值等
            const sumAll = services.reduce((a,b)=>a+b,0);
            const maxWait = sumAll * numPeople;
            const avg = Math.floor(sumAll / numPeople);
            let disturbs = [sumAll + (numPeople-1)*Math.min(...services), maxWait - 5, correct + (numPeople), correct-2, sumAll * 2];
            disturbs = disturbs.filter(v => v > 0 && v !== correct);
            disturbs = [...new Set(disturbs)].slice(0, 3);
            const options = [correct, ...disturbs.slice(0, 3)];
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }
            return { text: questionText, correctAnswer: correct, options, hint: "💡 想让总等候时间最少，应该按照治疗时间从短到长安排顺序（最短作业优先SJF）。" };
        }
    };

    // 主组件
    const OptimizationGame = () => {
        const [problem, setProblem] = useState(() => generateOptimizationProblem());
        const [options, setOptions] = useState([]);
        const [correctAnswer, setCorrectAnswer] = useState(0);
        const [isWin, setIsWin] = useState(false);
        const [message, setMessage] = useState("✨ 把正确答案数字拖拽到魔法宝箱 ✨");
        const [winAnim, setWinAnim] = useState(false);
        const dragValueRef = useRef(null);
        
        // 刷新题目内容（换一题）
        const refreshProblem = useCallback(() => {
            const newProb = generateOptimizationProblem();
            setProblem(newProb);
            setCorrectAnswer(newProb.correctAnswer);
            setOptions(newProb.options);
            setIsWin(false);
            setWinAnim(false);
            setMessage("🔄 新题目来啦！拖拽正确的答案数字到宝箱区！");
        }, []);
        
        // 初始化选项
        useEffect(() => {
            setCorrectAnswer(problem.correctAnswer);
            setOptions(problem.options);
        }, [problem]);
        
        // 拖拽数字卡片
        const onCardDragStart = (e, num) => {
            if (isWin) {
                e.preventDefault();
                setMessage("🏆 已经胜利啦！点「换一题」继续挑战更多优化问题！");
                return false;
            }
            dragValueRef.current = num;
            e.dataTransfer.setData("text/plain", num);
            e.dataTransfer.effectAllowed = "copy";
            if (e.target.classList) e.target.classList.add("dragging-card");
        };
        
        const onDragEnd = (e) => {
            if (e.target.classList) e.target.classList.remove("dragging-card");
            const dropZone = document.getElementById("answerDropZone");
            if (dropZone) dropZone.classList.remove("drop-zone-active");
            dragValueRef.current = null;
        };
        
        // 宝箱放置区拖拽效果
        const onDragOverTarget = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "copy";
            const zone = document.getElementById("answerDropZone");
            if (zone && !isWin) zone.classList.add("drop-zone-active");
        };
        const onDragLeaveTarget = () => {
            const zone = document.getElementById("answerDropZone");
            if (zone) zone.classList.remove("drop-zone-active");
        };
        
        // 放置并验证
        const onDropToTarget = (e) => {
            e.preventDefault();
            const zone = document.getElementById("answerDropZone");
            if (zone) zone.classList.remove("drop-zone-active");
            if (isWin) {
                setMessage("你已经获胜，换一题继续闯关吧！");
                return;
            }
            const rawData = e.dataTransfer.getData("text/plain");
            if (!rawData) return;
            const droppedNum = Number(rawData);
            if (isNaN(droppedNum)) return;
            
            if (droppedNum === correctAnswer) {
                setIsWin(true);
                setWinAnim(true);
                setMessage("🎉🎉 完全正确！你真是统筹优化小天才！太棒啦 🎉🎉");
                setTimeout(() => setWinAnim(false), 600);
            } else {
                setMessage(`❌ ${droppedNum} 不对哦，再分析一下题目，想一想省时省钱的优化策略！小提示：${problem.hint}`);
                const msgDiv = document.querySelector(".feedback-msg");
                if (msgDiv) msgDiv.classList.add("animate-pulse");
                setTimeout(() => {
                    if (msgDiv) msgDiv.classList.remove("animate-pulse");
                }, 500);
            }
        };
        
        return (
            <div className="max-w-7xl mx-auto">
                {/* 主标题（大字3号 实际用5xl/4xl调小一点仍保持醒目但相对于特大一号调整）已符合要求 */}
                <div className="text-center mb-6">
                    <h1 className="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-900 to-fuchsia-700 drop-shadow-md">
                        🧠 最优化小当家 · 统筹策略大挑战 🧠
                    </h1>
                    <p className="text-purple-800 text-lg font-semibold mt-1">时间优化 | 费用最少 | 排队最短 | 决策专家</p>
                </div>
                
                {/* 左右布局 */}
                <div className="flex flex-col lg:flex-row gap-7">
                    {/* 左侧知识点区 */}
                    <div className="lg:w-2/5 bg-white/80 backdrop-blur-sm rounded-3xl shadow-xl p-5 border border-purple-200 custom-scroll overflow-y-auto">
                        <div className="flex items-center gap-2 border-b-2 border-purple-400 pb-2 mb-4">
                            <span className="text-3xl">📘</span>
                            <span className="text-3xl font-bold text-purple-900">核心知识点</span>
                        </div>
                        <div className="space-y-5 text-gray-800 text-base md:text-lg">
                            <div className="bg-purple-50 p-4 rounded-xl">
                                <p className="font-extrabold text-purple-800 text-xl">⚡ 最优化问题 · 统筹规划</p>
                                <p>在我们的生活中，经常需要找出<strong className="text-fuchsia-700">用时最少、花费最省、路线最短</strong>的最佳方案，这就是最优化！</p>
                            </div>
                            <div className="bg-indigo-50 p-4 rounded-xl">
                                <p className="font-bold text-purple-800">✨ 三大经典模型 ✨</p>
                                <ul className="list-disc list-inside space-y-2 mt-1">
                                    <li><strong>🧇 烙饼问题</strong>：充分利用每次的容量，让锅不闲着 → 总时间 = 饼数 × 每面时间（双面同时烙）</li>
                                    <li><strong>🍵 沏茶问题</strong>：找出可以同时做的事情，烧水的同时洗杯子拿茶叶 → 总时间 = 必须顺序时间 + 最长并行区 + 最后收尾</li>
                                    <li><strong>👥 排队等候</strong>：按照用时<span className="font-bold">从小到大</span>安排顺序，所有人的等待时间总和最少！</li>
                                </ul>
                            </div>
                            <div className="bg-fuchsia-50 p-4 rounded-xl">
                                <p className="font-bold">🧠 优化思维三步法：</p>
                                <p>1️⃣ 分析哪些事情可以<strong>同时进行</strong>（并行）<br/>
                                   2️⃣ 比较不同方案的消耗，选择最少的<br/>
                                   3️⃣ 使用“最小化总等待时间”策略时，优先处理短任务。
                                </p>
                            </div>
                            <div className="bg-amber-50 p-3 rounded-lg text-sm">
                                💡 右侧游戏: 拖拽正确的数字答案到魔法宝箱。每个题目都是真实的优化应用题，挑战你的决策力！
                            </div>
                        </div>
                    </div>
                    
                    {/* 右侧游戏互动区 */}
                    <div className="lg:w-3/5 bg-white/95 rounded-3xl shadow-2xl p-5 border-2 border-purple-300 flex flex-col">
                        {/* 问题展示区 */}
                        <div className="bg-gradient-to-r from-purple-200 via-fuchsia-100 to-purple-200 rounded-2xl p-5 mb-5 shadow-md">
                            <div className="flex flex-wrap justify-between items-start gap-2">
                                <div className="flex-1">
                                    <span className="inline-block bg-purple-700 text-white text-sm px-4 py-1 rounded-full">📌 优化挑战</span>
                                    <p className="text-lg md:text-xl font-bold text-purple-900 mt-3 leading-relaxed">
                                        {problem.text}
                                    </p>
                                    <div className="mt-2 text-sm bg-white/60 inline-block px-3 py-1 rounded-full text-purple-700">
                                        💡 {problem.hint}
                                    </div>
                                </div>
                                <button 
                                    onClick={refreshProblem}
                                    className="bg-fuchsia-600 hover:bg-fuchsia-700 text-white font-bold py-2 px-6 rounded-full transition shadow-md flex items-center gap-1 text-base md:text-lg"
                                >
                                    🔄 换一题
                                </button>
                            </div>
                        </div>
                        
                        {/* 拖拽数字卡片区 + 答案宝箱左右结构 */}
                        <div className="flex flex-col md:flex-row gap-6 items-stretch mb-5">
                            {/* 左边选项卡片 */}
                            <div className="flex-1 bg-purple-50/80 rounded-2xl p-4 border border-purple-200">
                                <p className="text-center font-bold text-purple-800 mb-3 text-lg">🎲 拖拽数字卡片（正确答案之一）</p>
                                <div className="flex flex-wrap justify-center gap-3">
                                    {options.map((opt, idx) => (
                                        <div
                                            key={idx}
                                            draggable={!isWin}
                                            onDragStart={(e) => onCardDragStart(e, opt)}
                                            onDragEnd={onDragEnd}
                                            className="w-16 h-16 md:w-20 md:h-20 bg-gradient-to-br from-amber-300 to-orange-400 rounded-2xl shadow-lg flex flex-col items-center justify-center cursor-grab active:cursor-grabbing transition hover:scale-105 border-2 border-purple-500"
                                        >
                                            <span className="text-3xl md:text-4xl font-black text-white drop-shadow-md">{opt}</span>
                                            <span className="text-[10px] font-bold text-purple-900">拖拽</span>
                                        </div>
                                    ))}
                                </div>
                                <p className="text-xs text-center text-gray-600 mt-3">👉 把正确的数字拖拽到右边宝箱区</p>
                            </div>
                            
                            {/* 答案宝箱放置区 */}
                            <div 
                                id="answerDropZone"
                                onDragOver={onDragOverTarget}
                                onDragLeave={onDragLeaveTarget}
                                onDrop={onDropToTarget}
                                className={`flex-1 bg-gradient-to-br from-amber-50 to-yellow-50 rounded-2xl border-4 border-dashed p-5 flex flex-col items-center justify-center transition-all min-h-[200px] ${isWin ? 'border-green-500 bg-green-50' : 'border-purple-400'}`}
                            >
                                {isWin ? (
                                    <div className="text-center">
                                        <div className="text-7xl mb-2">🏆🎉</div>
                                        <p className="text-2xl font-black text-green-700">优化大胜利！</p>
                                        <p className="text-purple-700 mt-2">你掌握了最优化核心思想</p>
                                    </div>
                                ) : (
                                    <>
                                        <span className="text-5xl mb-2">📦</span>
                                        <span className="text-xl font-bold text-purple-800 text-center">答案魔法宝箱</span>
                                        <p className="text-center text-gray-600 mt-2 text-sm">将正确数字卡片拖拽至此 → <br/>验证你的最优方案！</p>
                                        <div className="mt-3 w-32 h-16 bg-white rounded-xl flex items-center justify-center shadow-inner border border-purple-300">
                                            <span className="text-2xl font-mono font-bold text-gray-400">???</span>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                        
                        {/* 反馈消息区 */}
                        <div className={`feedback-msg mt-3 text-center py-3 px-4 rounded-full font-medium text-base md:text-lg ${isWin ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-800'} shadow-inner transition`}>
                            {isWin ? "🎉 恭喜最优解！你是优化大师！按『换一题』继续挑战 🎉" : message}
                        </div>
                        
                        {/* 额外小贴士和按钮 */}
                        <div className="flex justify-center mt-4 gap-3">
                            <button 
                                onClick={() => {
                                    if (!isWin) setMessage(`💪 独立思考：${problem.hint} 再试试拖拽正确的数字！`);
                                    else setMessage("胜利啦，换一题继续优化之旅吧");
                                }}
                                className="text-purple-600 bg-purple-100 px-3 py-1 rounded-full text-sm"
                            >
                                ✨ 小提示
                            </button>
                            <button 
                                onClick={refreshProblem}
                                className="text-fuchsia-600 bg-fuchsia-100 px-3 py-1 rounded-full text-sm"
                            >
