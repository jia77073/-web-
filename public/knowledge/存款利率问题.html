<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>存款利率·思维特训营 | 利息+本息和+拖拽配对</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM & Babel CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        /* 拖拽样式占位 */
        .sortable-drag {
            opacity: 0.4;
            background-color: #f3e8ff;
            transform: scale(0.96);
        }
        .sortable-ghost {
            opacity: 0.3;
            background-color: #d8b4fe;
        }
        .question-card {
            transition: all 0.2s;
        }
        .matched-card {
            background-color: #bbf7d0 !important;
            border-left: 6px solid #22c55e !important;
            text-decoration: line-through;
            opacity: 0.7;
        }
        .answer-card {
            cursor: grab;
            transition: all 0.15s;
            user-select: none;
        }
        .answer-card:active {
            cursor: grabbing;
        }
        button:active {
            transform: scale(0.96);
        }
        @media (max-width: 768px) {
            .main-title {
                font-size: 2rem !important;
            }
            .question-card, .answer-card {
                font-size: 0.85rem;
                padding: 0.5rem;
            }
        }
        /* 绿色背景 + 紫色主题 */
        body {
            background: linear-gradient(145deg, #c8e6b5 0%, #a9d48e 100%);
            font-family: 'Segoe UI', 'Comic Neue', system-ui, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body class="p-4 md:p-6 min-h-screen flex items-center justify-center">
    <div id="root" class="w-full max-w-7xl mx-auto"></div>

    <script type="text/babel">
        // ----------------------------- 存款利率拓展题库 (本金、利息、利率、本息和、逆向问题) -----------------------------
        const DEPOSIT_PROBLEMS = [
            { id: 1, text: "💰 李奶奶将5000元存入银行，年利率2.75%，存期3年，到期可得利息多少元？", answer: "412.5元", hint: "利息 = 本金×年利率×时间 = 5000×2.75%×3 = 412.5元。" },
            { id: 2, text: "🏦 张叔叔存入20000元，年利率3.25%，存期2年，到期后本息和一共多少元？", answer: "21300元", hint: "利息=20000×3.25%×2=1300元，本息和=20000+1300=21300元。" },
            { id: 3, text: "📊 妈妈把一笔钱存入银行，年利率2.1%，存期3年，到期获得利息630元，本金是多少元？", answer: "10000元", hint: "本金 = 利息÷(年利率×时间)=630÷(2.1%×3)=630÷0.063=10000元。" },
            { id: 4, text: "📈 某理财产品年化利率3.80%，存期5年，到期后共得本息和11900元，本金是多少？", answer: "10000元", hint: "设本金x，x + x×3.8%×5=11900 → x(1+0.19)=11900 → x=10000元。" },
            { id: 5, text: "🧾 爸爸存款10000元，定期2年，年利率2.25%，到期需缴纳20%利息税，税后利息是多少？", answer: "360元", hint: "税前利息=10000×2.25%×2=450元，税后=450×(1-20%)=360元。" },
            { id: 6, text: "🏆 小红存了6000元，年利率2.5%，存期3年，到期后本金和税后利息一共多少元？(利息税20%)", answer: "6360元", hint: "税前利息=6000×2.5%×3=450元，税后利息=360元，本息和=6000+360=6360元。" },
            { id: 7, text: "📅 小明的压岁钱5000元，存一年期利率1.75%，到期后本息再存一年（利率不变），两年后总共有多少钱？（不考虑利息税）", answer: "5176.53元", hint: "第一年后本息=5000×(1+1.75%)=5087.5元；第二年后=5087.5×(1+1.75%)=5176.53元。" },
            { id: 8, text: "🔢 已知年利率为2.25%，存期3年，得到利息540元，则本金是多少？", answer: "8000元", hint: "本金=540÷(2.25%×3)=540÷0.0675=8000元。" }
        ];
        
        // ----------------------------- 左侧知识讲解区 (存款利率概念+公式) ------------------------------------
        const KnowledgeBase = () => {
            return (
                <div className="glass-card rounded-3xl shadow-2xl p-5 md:p-7 border-2 border-purple-400 h-full flex flex-col">
                    <div className="border-b-4 border-purple-500 pb-3 mb-4 flex items-center gap-2">
                        <span className="text-5xl">🏦</span>
                        <h1 className="text-4xl md:text-5xl font-extrabold text-gray-800 main-title">存款利率·思维特训营</h1>
                    </div>
                    
                    <div className="bg-gradient-to-br from-purple-50 to-indigo-50 rounded-2xl p-5 mb-5 shadow-md border border-purple-200">
                        <h2 className="text-2xl font-bold text-purple-800 flex items-center gap-2">🧠 核心公式·储蓄理财模型</h2>
                        <div className="mt-3 space-y-3 text-gray-700 text-base md:text-lg leading-relaxed">
                            <p>✨ <strong className="text-purple-800">利息 = 本金 × 利率 × 存期</strong>（年利率对应年数，月利率对应月数）</p>
                            <p>✨ <strong className="text-purple-800">本息和 = 本金 + 利息</strong> = 本金 × (1 + 利率 × 存期)</p>
                            <div className="bg-amber-50 p-3 rounded-xl border-l-8 border-amber-400 my-2">
                                <p className="font-bold">📐 拓展变式核心：</p>
                                <p>🔹 <strong>利息税问题</strong>：税后利息 = 利息 × (1 - 税率)；税后本息和 = 本金 + 税后利息</p>
                                <p>🔹 <strong>求本金</strong>：本金 = 利息 ÷ (利率×存期)  /   本金 = 本息和 ÷ (1+利率×存期)</p>
                                <p>🔹 <strong>求利率或存期</strong>：利用方程反推</p>
                                <p>🔹 <strong>复利初步</strong>：第二年本金 = 第一年本息和，逐年计算</p>
                            </div>
                            <p>⚡ <strong className="text-purple-800">解题三步法</strong>：① 明确已知量（本金/利率/时间/利息/本息和）；② 选择公式列式；③ 代入计算，注意单位统一（年利率对应年）。</p>
                            <p>🎯 <strong>拔高题型</strong>：分段存款、不同方案对比、已知税后利息反推、复利存两年等。</p>
                        </div>
                    </div>

                    <div className="bg-cyan-50 rounded-2xl p-4 border border-cyan-200 mb-3">
                        <h3 className="text-xl font-bold text-purple-800 flex items-center gap-1">📖 利息速记小锦囊</h3>
                        <div className="mt-2 space-y-2 text-gray-700 text-sm md:text-base">
                            <p>💡 计算利息时，<strong>利率和存期要对应</strong>（年利率→年，月利率→月）。</p>
                            <p>💰 <strong>税后利息 = 利息 × (1 - 利息税率)</strong>，目前教育储蓄等可能免税。</p>
                            <p>🔄 <strong>连续存款复利本质</strong>：上一年本息成为下一年本金。</p>
                        </div>
                    </div>
                    <div className="mt-2 text-center text-sm text-gray-500 bg-white/70 rounded-xl p-2">
                        💡 右侧小游戏 → 将答案卡片拖拽到对应的题目上配对，学习存款利息计算！
                    </div>
                </div>
            );
        };
        
        // ----------------------------- 右侧拖拽配对游戏 (存款利率场景配对) ------------------------------------
        const InterestGame = () => {
            // 当前题目列表（随机抽取5道）
            const [currentQuestions, setCurrentQuestions] = React.useState([]);
            // 答案卡片列表（正确+干扰）
            const [answerCards, setAnswerCards] = React.useState([]);
            // 已配对成功的题目id集合
            const [matchedIds, setMatchedIds] = React.useState(new Set());
            // 反馈消息
            const [feedbackMsg, setFeedbackMsg] = React.useState('');
            // 是否全部完成
            const [allCompleted, setAllCompleted] = React.useState(false);
            
            // 随机抽取题目（5道不重复）
            const loadRandomQuestions = () => {
                const shuffled = [...DEPOSIT_PROBLEMS];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                const selected = shuffled.slice(0, 5);
                setCurrentQuestions(selected);
                
                // 生成正确答案卡片（基于selected）
                const correctAnswers = selected.map(q => ({ id: q.id, label: q.answer, type: 'correct' }));
                // 收集干扰项：从整个题库的答案中过滤掉正确的答案，再取3~4个
                const allPossibleAnswers = [...new Set(DEPOSIT_PROBLEMS.map(p => p.answer))];
                const correctLabels = new Set(correctAnswers.map(c => c.label));
                const distractorCandidates = allPossibleAnswers.filter(ans => !correctLabels.has(ans));
                // 随机取3个干扰项
                const shuffledDist = [...distractorCandidates];
                for (let i = shuffledDist.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledDist[i], shuffledDist[j]] = [shuffledDist[j], shuffledDist[i]];
                }
                const selectedDistractors = shuffledDist.slice(0, 3).map(label => ({ id: null, label, type: 'distractor' }));
                let combined = [...correctAnswers, ...selectedDistractors];
                // 打乱答案顺序
                for (let i = combined.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [combined[i], combined[j]] = [combined[j], combined[i]];
                }
                setAnswerCards(combined);
                setMatchedIds(new Set());
                setFeedbackMsg('');
                setAllCompleted(false);
            };
            
            // 初始化 / 换一题
            const refreshGame = () => {
                loadRandomQuestions();
            };
            
            React.useEffect(() => {
                loadRandomQuestions();
            }, []);
            
            // 检查是否全部配对
            React.useEffect(() => {
                if (currentQuestions.length > 0 && matchedIds.size === currentQuestions.length) {
                    setAllCompleted(true);
                    setFeedbackMsg("🎉 恭喜！所有利率问题都配对成功！你已成为理财小能手！ 🎉");
                } else if (currentQuestions.length > 0 && matchedIds.size !== currentQuestions.length && allCompleted) {
                    setAllCompleted(false);
                }
            }, [matchedIds, currentQuestions]);
            
            // 拖拽处理 (原生HTML5拖拽，简单可靠)
            const handleDragStart = (e, answerLabel, answerType, correctQid) => {
                if (allCompleted) {
                    e.preventDefault();
                    return;
                }
                e.dataTransfer.setData("text/plain", JSON.stringify({ answerLabel, answerType, correctQid }));
                e.dataTransfer.effectAllowed = "copy";
            };
            
            const handleDragOver = (e) => {
                e.preventDefault();
            };
            
            const handleDrop = (e, questionId, correctAnswer) => {
                e.preventDefault();
                if (allCompleted) return;
                if (matchedIds.has(questionId)) {
                    setFeedbackMsg("这道题已经配对成功啦，试试其他题目！");
                    return;
                }
                const raw = e.dataTransfer.getData("text/plain");
                if (!raw) return;
                const { answerLabel, answerType } = JSON.parse(raw);
                // 配对验证
                if (answerLabel === correctAnswer) {
                    // 配对成功
                    setMatchedIds(prev => new Set(prev).add(questionId));
                    // 从答案池移除该正确答案卡片
                    setAnswerCards(prev => prev.filter(card => !(card.type === 'correct' && card.label === answerLabel)));
                    setFeedbackMsg(`✅ 正确！ 答案：${correctAnswer}，继续挑战！`);
                } else {
                    const questionObj = currentQuestions.find(q => q.id === questionId);
                    setFeedbackMsg(`❌ 配对错误！正确答案是 ${correctAnswer}。提示：${questionObj?.hint || '再算一遍利息公式吧～'}`);
                }
            };
            
            // 重置当前配对（不清除题目，只重置配对状态，恢复答案卡片）
            const resetMatch = () => {
                // 基于现有题目重新生成答案卡片（保留原本正确答案+新干扰）
                const correctAnswers = currentQuestions.map(q => ({ id: q.id, label: q.answer, type: 'correct' }));
                const allPossibleAnswers = [...new Set(DEPOSIT_PROBLEMS.map(p => p.answer))];
                const correctLabels = new Set(correctAnswers.map(c => c.label));
                const distractorCandidates = allPossibleAnswers.filter(ans => !correctLabels.has(ans));
                const shuffledDist = [...distractorCandidates];
                for (let i = shuffledDist.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledDist[i], shuffledDist[j]] = [shuffledDist[j], shuffledDist[i]];
                }
                const selectedDistractors = shuffledDist.slice(0, 3).map(label => ({ id: null, label, type: 'distractor' }));
                let combined = [...correctAnswers, ...selectedDistractors];
                for (let i = combined.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [combined[i], combined[j]] = [combined[j], combined[i]];
                }
                setAnswerCards(combined);
                setMatchedIds(new Set());
                setFeedbackMsg("配对已重置，可以重新拖拽挑战啦！");
                setAllCompleted(false);
            };
            
            return (
                <div className="glass-card rounded-3xl shadow-2xl p-5 md:p-6 border-2 border-purple-400 h-full flex flex-col">
                    <div className="flex flex-wrap justify-between items-center border-b border-purple-200 pb-3 mb-3">
                        <div className="flex items-center gap-2">
                            <span className="text-4xl">🏦</span>
                            <h2 className="text-2xl md:text-3xl font-bold text-purple-800">利率配对·小银行家</h2>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={resetMatch} className="bg-amber-500 hover:bg-amber-600 text-white font-bold py-2 px-4 rounded-2xl shadow-md transition text-sm">🔄 重置配对</button>
                            <button onClick={refreshGame} className="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-5 rounded-2xl shadow-md transition text-sm md:text-base">🔄 换一题</button>
                        </div>
                    </div>
                    <p className="text-gray-600 text-sm mb-3 bg-purple-50 p-2 rounded-xl">
                        🎮 <strong>玩法：</strong> 将右侧「答案卡片」<strong>拖拽</strong> 到左侧对应的问题卡片上，配对正确两者都会消除！全部配对成功即获胜。
                    </p>
                    <div className="flex flex-col lg:flex-row gap-5 flex-1">
                        {/* 左侧 问题区 (接收拖拽) */}
                        <div className="flex-1 bg-purple-50 rounded-2xl p-3 min-h-[400px]">
                            <h3 className="font-bold text-purple-700 text-center mb-2 text-lg">📋 存款利率问题（拖放答案处）</h3>
                            <div className="space-y-3 overflow-y-auto max-h-[500px] pr-1">
                                {currentQuestions.map(q => {
                                    const isMatched = matchedIds.has(q.id);
                                    return (
                                        <div
                                            key={q.id}
                                            onDragOver={handleDragOver}
                                            onDrop={(e) => handleDrop(e, q.id, q.answer)}
                                            className={`question-card p-3 rounded-xl border-2 transition-all ${isMatched ? 'matched-card bg-green-100 border-green-400' : 'bg-white border-purple-300 hover:shadow-md'}`}
                                        >
                                            <div className="font-medium text-gray-800">{q.text}</div>
                                            {!isMatched && <div className="text-xs text-purple-500 mt-1">⬅️ 将正确答案拖拽至此区域</div>}
                                            {isMatched && <div className="text-green-600 text-sm font-bold mt-1">✓ 已配对 {q.answer}</div>}
                                        </div>
                                    );
                                })}
                                {currentQuestions.length === 0 && <div className="text-center text-gray-400 py-8">加载题目中...</div>}
                            </div>
                        </div>
                        
                        {/* 右侧 答案卡片区 可拖拽 */}
                        <div className="flex-1 bg-amber-50 rounded-2xl p-3">
                            <h3 className="font-bold text-purple-700 text-center mb-2 text-lg">🎁 答案卡片（可拖拽）</h3>
                            <div className="flex flex-wrap gap-3 justify-center min-h-[200px]">
                                {answerCards.map((card, idx) => (
                                    <div
                                        key={idx}
                                        draggable={!allCompleted}
                                        onDragStart={(e) => handleDragStart(e, card.label, card.type, card.id)}
                                        className="answer-card bg-gradient-to-br from-amber-200 to-yellow-300 rounded-xl shadow-md px-4 py-3 text-center font-bold text-lg cursor-grab select-none hover:scale-105 transition flex items-center justify-center"
                                    >
                                        {card.label}
                                    </div>
                                ))}
                                {answerCards.length === 0 && !allCompleted && <div className="text-green-600 font-bold">✨ 所有答案配对完成！太厉害了 ✨</div>}
                                {allCompleted && <div className="text-green-700 font-bold text-center">🏆 恭喜通关！点击「换一题」继续挑战</div>}
                            </div>
                            <p className="text-xs text-center text-gray-500 mt-3">💡 提示：只有正确答案能配对成功，干扰项可拖拽但会提示错误~</p>
                        </div>
                    </div>
                    
                    {/* 反馈区域 */}
                    {feedbackMsg && (
                        <div className={`mt-4 text-center text-base font-medium rounded-xl p-3 ${allCompleted ? 'bg-green-100 text-green-700 border border-green-300' : 'bg-purple-100 text-purple-700 border border-purple-200'}`}>
                            {feedbackMsg}
                        </div>
                    )}
                    
                    {/* 进度条 */}
                    <div className="mt-3">
                        <div className="flex justify-between text-sm text-purple-700 mb-1">
                            <span>配对进度</span>
                            <span>{matchedIds.size} / {currentQuestions.length}</span>
                        </div>
                        <div className="w-full bg-purple-200 rounded-full h-2.5 overflow-hidden">
                            <div className="bg-purple-600 h-2.5 rounded-full transition-all duration-300" style={{ width: `${(matchedIds.size / currentQuestions.length) * 100}%` }}></div>
                        </div>
                    </div>
                    
                    <div className="mt-3 text-center text-xs text-purple-500 bg-purple-50/80 rounded-xl p-2">
                        🌟 利息公式：利息 = 本金 × 利率 × 时间。本息和 = 本金 + 利息。遇到利息税记得扣除！
                    </div>
                </div>
            );
        };
        
        // ============================ 主页面 (左右布局) ============================
        const MainApp = () => {
            return (
                <div className="flex flex-col lg:flex-row gap-6 w-full">
                    <div className="flex-1"><KnowledgeBase /></div>
                    <div className="flex-1"><InterestGame /></div>
                </div>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainApp />);
    </script>
</body>
</html>
