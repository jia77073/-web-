<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萌享数学：20以内进位加法（本地稳定版）</title>
    <!-- 引入基础库：React 和 Babel (用于在浏览器运行代码) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 极速 Tailwind CSS 注入 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #fef9e7 0%, #ebf5fb 100%);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --primary-color: #5dade2;
            --accent-color: #f1948a;
            --text-color: #2c3e50;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-color);
            margin: 0; padding: 0; min-height: 100vh;
        }
        .frosted-glass {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .digit-input {
            width: 3.5rem; height: 4rem;
            background: white; border: 2px solid #ddd;
            border-radius: 0.5rem; text-align: center;
            font-size: 2rem; font-family: monospace;
            outline: none; transition: all 0.2s;
        }
        .digit-input:focus { border-color: var(--primary-color); box-shadow: 0 0 10px rgba(93,173,226,0.3); }
        .success-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 简单图标组件 (替代 Lucide 库) ---
        const Icon = ({ name }) => {
            const paths = {
                cart: "M9 22a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm11 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM20 6H6L5.2 3H2v2h2l3.6 13h11.2L22 6z",
                book: "M4 19.5A2.5 2.5 0 0 1 6.5 17H20V3H6.5A2.5 2.5 0 0 0 4 5.5v14z",
                refresh: "M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8m0-5v5h-5"
            };
            return (
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{ __html: `<path d="${paths[name] || ''}" />` }} />
            );
        };

        // --- 教学组件 ---
        function MathLesson() {
            const [tab, setTab] = useState('method');
            return (
                <div className="frosted-glass p-6 h-full space-y-4">
                    <div className="flex justify-between items-center mb-4">
                        <div className="flex items-center gap-2 text-[#5dade2] font-bold">
                            <Icon name="book" /> 知识小课堂
                        </div>
                        <div className="flex bg-white/40 p-1 rounded-lg">
                            <button onClick={()=>setTab('method')} className={`px-3 py-1 text-xs rounded ${tab==='method'?'bg-[#5dade2] text-white':'text-gray-500'}`}>凑十法</button>
                            <button onClick={()=>setTab('column')} className={`px-3 py-1 text-xs rounded ${tab==='column'?'bg-[#f1948a] text-white':'text-gray-500'}`}>竖式</button>
                        </div>
                    </div>

                    <div className="bg-white/50 p-4 rounded-xl text-sm leading-relaxed">
                        {tab === 'method' ? (
                            <div className="space-y-4">
                                <p className="font-bold text-orange-600">🍎 凑十法口诀：</p>
                                <p className="bg-white p-2 border-l-4 border-orange-400">9见1凑10，8见2凑10，7见3凑10</p>
                                <div className="text-center font-mono text-2xl py-4 flex flex-col items-center">
                                    <div className="flex gap-2">9 + <span className="text-rose-400">5</span> = 14</div>
                                    <div className="text-sm text-gray-400 mt-2">把 5 拆成 <span className="text-rose-400">1</span> 和 4</div>
                                    <div className="text-sm text-sky-400">9 + <span className="text-rose-400">1</span> 就是 10 啦！</div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <p className="font-bold text-rose-400">📏 竖式规则：</p>
                                <p className="bg-white p-2 border-l-4 border-rose-400">个位对个位，满十向进一</p>
                                <div className="flex justify-center py-4">
                                   <div className="font-mono text-3xl text-right">
                                      <div className="text-rose-400 text-sm">1</div>
                                      <div>9</div>
                                      <div className="border-b-2 border-gray-700 pb-1">+ 5</div>
                                      <div>14</div>
                                   </div>
                                </div>
                                <p className="text-[10px] text-gray-400 italic">一定要对齐，算出的1写在十位上。</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // --- 游戏组件 ---
        function ShoppingGame() {
            const [q, setQ] = useState({ a: 9, b: 5, ans: 14 });
            const [view, setView] = useState('v');
            const [ansState, setAnsState] = useState(null); // 'ok', 'err', null
            const [tens, setTens] = useState('');
            const [units, setUnits] = useState('');

            const nextQ = () => {
                const a = Math.floor(Math.random() * 4) + 6;
                const b = Math.floor(Math.random() * 5) + (11 - a);
                setQ({ a, b, ans: a + b });
                setTens(''); setUnits(''); setAnsState(null);
            };

            const check = (t, u) => {
                const final = parseInt(t + u);
                if (final === q.ans) {
                    setAnsState('ok');
                    setTimeout(nextQ, 2000);
                } else {
                    setAnsState('err');
                    setTimeout(()=>setAnsState(null), 1000);
                }
            };

            return (
                <div className="frosted-glass p-6 h-full flex flex-col">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-xl font-bold text-[#5dade2] flex items-center gap-2"><Icon name="cart" /> 萌宝超市</h2>
                        <button onClick={()=>setView(view==='v'?'h':'v')} className="text-xs bg-white px-2 py-1 rounded border border-gray-200">切换：{view==='v'?'竖式模式':'横式模式'}</button>
                    </div>

                    <div className="flex-1 flex flex-col items-center justify-center gap-10">
                        {view === 'h' ? (
                            <div className="flex items-center gap-4 text-4xl font-mono font-bold">
                                <span>{q.a}</span> + <span>{q.b}</span> = 
                                <input 
                                    type="number" 
                                    className="w-20 border-b-4 border-sky-400 text-center outline-none" 
                                    onChange={(e)=>e.target.value.length >= 2 && check('', e.target.value)}
                                />
                            </div>
                        ) : (
                            <div className="bg-white p-8 rounded-2xl shadow-sm border-2 border-rose-200 font-mono text-5xl">
                                <div className="flex flex-col items-end gap-1">
                                    <div className="h-4 invisible"></div>
                                    <div>{q.a}</div>
                                    <div className="border-b-4 border-gray-800 pb-2">+ {q.b}</div>
                                    <div className="flex gap-2 mt-4">
                                        <input 
                                            id="t-box"
                                            className="digit-input bg-rose-50 border-rose-100 text-rose-400" 
                                            placeholder="十"
                                            value={tens}
                                            onChange={(e) => {
                                                const v = e.target.value.slice(-1);
                                                setTens(v);
                                                if(v) document.getElementById('u-box').focus();
                                            }}
                                        />
                                        <input 
                                            id="u-box"
                                            className="digit-input bg-sky-50 border-sky-100 text-sky-400" 
                                            placeholder="个"
                                            value={units}
                                            onChange={(e) => {
                                                const v = e.target.value.slice(-1);
                                                setUnits(v);
                                                if(v && tens) check(tens, v);
                                            }}
                                        />
                                    </div>
                                    <div className="flex w-full justify-around text-[10px] text-gray-300 mt-2 font-sans tracking-widest">
                                        <span>十位</span><span>个位</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {ansState === 'ok' && (
                            <div className="text-green-500 font-bold success-pop flex flex-col items-center">
                                <div className="text-6xl text-center">⭐ 太棒了！</div>
                            </div>
                        )}
                        {ansState === 'err' && <div className="text-rose-400 animate-bounce">再试一次哦 💡</div>}
                    </div>

                    <div className="flex justify-center mt-6">
                        <button onClick={nextQ} className="flex items-center gap-2 text-[#5dade2] text-sm font-bold opacity-70 hover:opacity-100 transition-opacity">
                            <Icon name="refresh" /> 换一题
                        </button>
                    </div>
                </div>
            );
        }

        function App() {
            return (
                <div className="max-w-6xl mx-auto p-4 md:p-10 space-y-8">
                    <header className="border-b border-gray-200 pb-4">
                        <h1 className="text-3xl font-black text-[#5dade2]">萌享数学乐园</h1>
                        <p className="text-gray-400 text-sm mt-1">20以内进位加法 · 对齐练习</p>
                    </header>
                    <main className="grid grid-cols-1 lg:grid-cols-3 gap-8 min-h-[500px]">
                        <div className="lg:col-span-1"><MathLesson /></div>
                        <div className="lg:col-span-2"><ShoppingGame /></div>
                    </main>
                    <footer className="text-center text-gray-300 text-[10px] py-10">© 2026 萌享数学 · 开启智慧大门</footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
