<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>图形的运动 · 平移旋转对称大冒险</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM & Babel CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
        }
        /* 拖拽卡片优化 */
        .drag-card {
            transition: all 0.2s ease;
            cursor: grab;
            user-select: none;
            touch-action: manipulation;
        }
        .drag-card:active {
            cursor: grabbing;
            opacity: 0.7;
        }
        .drop-zone {
            transition: all 0.2s ease;
        }
        .drop-zone.drag-over {
            background-color: #f1e2ff;
            border-color: #9333ea;
            transform: scale(1.02);
            box-shadow: 0 6px 14px rgba(147, 51, 234, 0.25);
        }
        /* 大字体 (6号 ≈ 18px以上) */
        .big-text {
            font-size: 1.25rem;
            line-height: 1.45;
        }
        @media (min-width: 768px) {
            .big-text {
                font-size: 1.5rem;
            }
        }
        .knowledge-text {
            font-size: 1rem;
            line-height: 1.5;
        }
        @media (min-width: 768px) {
            .knowledge-text {
                font-size: 1.2rem;
            }
        }
        [draggable="true"] {
            -webkit-user-drag: element;
        }
        /* 简单动画 */
        .badge-pulse {
            animation: softPulse 1.5s infinite;
        }
        @keyframes softPulse {
            0% { opacity: 0.8; transform: scale(1);}
            50% { opacity: 1; transform: scale(1.02);}
            100% { opacity: 0.8; transform: scale(1);}
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#CBAACB] to-[#D9C2E6] min-h-screen p-4 md:p-6 font-sans">

<div id="root" class="max-w-7xl mx-auto"></div>

<script type="text/babel">
    // 图形的运动：平移、旋转、对称的应用 互动课程
    const MotionGame = () => {
        // ---------- 知识点内容 (左侧) ----------
        const knowledgePoints = {
            title: "🎯 图形的运动",
            motions: [
                { name: "平移", icon: "➡️", definition: "物体沿着直线运动，方向不变，大小形状不变。", keyPoints: "要素：方向、距离（格数）。 例如：电梯上下、推拉窗。", example: "向右平移5格 → 图形每个点都向右移动5格。" },
                { name: "旋转", icon: "🔄", definition: "物体绕一个固定点（中心）转动，方向改变。", keyPoints: "要素：旋转中心、方向（顺时针/逆时针）、角度。", example: "时针顺时针旋转90°、风扇叶片。" },
                { name: "轴对称", icon: "🦋", definition: "图形沿着一条直线对折，两边完全重合。", keyPoints: "对称轴两侧对应点到轴距离相等。", example: "蝴蝶、窗花、正方形有4条对称轴。" }
            ],
            combo: "✨ 巧妙结合平移、旋转和对称，可以设计出美丽的图案（如花边、地砖、徽标）。",
            designTip: "🎨 设计小技巧：先用一个基本图形，通过平移得到一排，再旋转得到环绕，或者用对称镜像创造平衡感。"
        };
        
        // ---------- 游戏数据：卡片池 (包含平移、旋转、轴对称实例) ----------
        const initialCards = [
            { id: "card1", text: "🚪 推拉门（直线移动）", type: "平移", description: "物体沿直线滑动" },
            { id: "card2", text: "📦 电梯上升5米", type: "平移", description: "竖直向上平移" },
            { id: "card3", text: "➡️ 向右平移4格", type: "平移", description: "方格纸上向右移动4格" },
            { id: "card4", text: "🌀 风扇叶片转动", type: "旋转", description: "绕中心旋转" },
            { id: "card5", text: "⏰ 分针顺时针旋转15分钟 (90°)", type: "旋转", description: "顺时针旋转90度" },
            { id: "card6", text: "🎠 旋转木马", type: "旋转", description: "绕中心旋转" },
            { id: "card7", text: "🦋 蝴蝶左右对称", type: "轴对称", description: "沿身体中线对称" },
            { id: "card8", text: "🍂 枫叶对称", type: "轴对称", description: "沿叶脉对称" },
            { id: "card9", text: "🏛️ 故宫建筑对称", type: "轴对称", description: "左右对称结构" }
        ];
        
        // 三个运动分类区域
        const motionZones = [
            { id: "translate", name: "平移", icon: "➡️", color: "from-sky-100 to-blue-100", border: "border-sky-300", type: "平移", hint: "直线移动，方向不变" },
            { id: "rotate", name: "旋转", icon: "🔄", color: "from-amber-100 to-orange-100", border: "border-amber-300", type: "旋转", hint: "绕中心点转动" },
            { id: "symmetry", name: "轴对称", icon: "🦋", color: "from-pink-100 to-rose-100", border: "border-pink-300", type: "轴对称", hint: "对折完全重合" }
        ];
        
        // 游戏状态
        const [availableCards, setAvailableCards] = React.useState(initialCards);
        const [matchedCards, setMatchedCards] = React.useState({
            translate: [],
            rotate: [],
            symmetry: []
        });
        const [message, setMessage] = React.useState({ text: "🐣 把卡片拖拽到正确的运动区域（平移/旋转/轴对称）！长按卡片并拖动～", type: "info" });
        const [gameWin, setGameWin] = React.useState(false);
        
        const draggingCardRef = React.useRef(null);
        
        // 检查胜利 (所有卡片配对完毕)
        React.useEffect(() => {
            if (availableCards.length === 0 && !gameWin) {
                setGameWin(true);
                setMessage({ text: "🎉 太棒了！你完美区分了平移、旋转和轴对称！现在你可以用它们设计漂亮图案啦！ 🎉", type: "success" });
            } else if (availableCards.length > 0 && gameWin) {
                setGameWin(false);
            }
        }, [availableCards, gameWin]);
        
        // 显示临时消息
        const showMessage = (msg, msgType = "error", duration = 2000) => {
            setMessage({ text: msg, type: msgType });
            setTimeout(() => {
                setMessage(prev => prev.text === msg ? { text: "✨ 继续拖拽配对，把所有运动卡片送到正确的家！", type: "info" } : prev);
            }, duration);
        };
        
        // 拖拽开始
        const handleDragStart = (e, card) => {
            // 检查卡片是否还在可用池中
            if (!availableCards.some(c => c.id === card.id)) {
                e.preventDefault();
                showMessage("⛔ 这张卡片已经配对过了！点击「重置游戏」可以重新挑战", "error");
                return false;
            }
            draggingCardRef.current = card;
            e.dataTransfer.setData("text/plain", card.id);
            e.dataTransfer.effectAllowed = "copy";
            if (e.target) e.target.style.opacity = "0.6";
            return true;
        };
        
        const handleDragEnd = (e) => {
            if (e.target) e.target.style.opacity = "";
            draggingCardRef.current = null;
        };
        
        const handleDragOver = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "copy";
        };
        
        // 高亮效果
        const handleDragEnter = (e, zoneId) => {
            e.preventDefault();
            const zoneElem = document.getElementById(`dropzone-${zoneId}`);
            if (zoneElem) zoneElem.classList.add("drag-over");
        };
        
        const handleDragLeave = (e, zoneId) => {
            const zoneElem = document.getElementById(`dropzone-${zoneId}`);
            if (zoneElem) zoneElem.classList.remove("drag-over");
        };
        
        // 放置逻辑: 将卡片匹配到对应的运动区域
        const handleDrop = (e, targetZone) => {
            e.preventDefault();
            const zoneElem = document.getElementById(`dropzone-${targetZone.id}`);
            if (zoneElem) zoneElem.classList.remove("drag-over");
            
            let draggedCard = draggingCardRef.current;
            if (!draggedCard) {
                const cardId = e.dataTransfer.getData("text/plain");
                draggedCard = initialCards.find(c => c.id === cardId);
            }
            if (!draggedCard) return;
            
            // 再次确认卡片未被配对
            if (!availableCards.some(c => c.id === draggedCard.id)) {
                showMessage(`❌ “${draggedCard.text}” 已经配对过了！`, "error");
                return;
            }
            
            // 验证类型是否匹配
            const isCorrect = (draggedCard.type === targetZone.type);
            if (isCorrect) {
                // 配对正确: 从可用列表移除，并添加到对应区域的匹配数组
                setAvailableCards(prev => prev.filter(card => card.id !== draggedCard.id));
                setMatchedCards(prev => ({
                    ...prev,
                    [targetZone.id]: [...prev[targetZone.id], draggedCard]
                }));
                showMessage(`✅ 正确！${draggedCard.text} 属于 ${targetZone.name} 运动。`, "success", 1500);
            } else {
                // 配对错误: 提示正确类别
                const correctType = draggedCard.type;
                showMessage(`❌ 配对错误！“${draggedCard.text}” 是 ${correctType} 现象，不属于 ${targetZone.name}。再试试看～`, "error", 1800);
            }
            draggingCardRef.current = null;
        };
        
        // 重置游戏
        const resetGame = () => {
            setAvailableCards(initialCards);
            setMatchedCards({ translate: [], rotate: [], symmetry: [] });
            setGameWin(false);
            setMessage({ text: "🔄 游戏已重置！所有卡片重新出现，再挑战一次吧！", type: "info" });
            draggingCardRef.current = null;
            document.querySelectorAll('.drop-zone').forEach(el => el.classList.remove('drag-over'));
        };
        
        // 计算总配对进度
        const totalCards = initialCards.length;
        const matchedCount = Object.values(matchedCards).reduce((acc, arr) => acc + arr.length, 0);
        
        // 设计图案展示 (运用平移旋转对称)
        const DesignShowcase = () => (
            <div className="mt-4 bg-white/60 rounded-2xl p-3 shadow-inner">
                <p className="font-bold text-purple-700 text-center flex items-center justify-center gap-2">🎨 图形运动设计秀 🎨</p>
                <div className="flex justify-around items-center flex-wrap gap-2 mt-2">
                    <div className="text-center">
                        <div className="text-3xl">⬛</div>
                        <p className="text-xs">基本图形</p>
                    </div>
                    <div className="text-2xl">→ 平移 →</div>
                    <div className="flex gap-1">
                        <div className="text-3xl">⬛</div>
                        <div className="text-3xl">⬛</div>
                        <div className="text-3xl">⬛</div>
                    </div>
                    <div className="text-2xl">↻ 旋转</div>
                    <div className="grid grid-cols-2 gap-1">
                        <div className="text-3xl">⬛</div>
                        <div className="text-3xl">⬛</div>
                        <div className="text-3xl">⬛</div>
                        <div className="text-3xl">⬛</div>
                    </div>
                </div>
                <p className="text-xs text-center text-gray-600 mt-2">✨ 一个简单正方形，通过平移得到花边，再旋转得到风车图案，对称创造出和谐美 ✨</p>
            </div>
        );
        
        return (
            <div className="w-full">
                <div className="flex flex-col lg:flex-row gap-6 lg:gap-8">
                    {/* ================= 左侧：知识点星球 ================= */}
                    <div className="lg:w-5/12 bg-white/85 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 border border-white/40 transition-all">
                        <div className="flex items-center gap-2 border-b-4 border-purple-300 pb-3 mb-4">
                            <span className="text-4xl">🎢</span>
                            <h2 className="text-3xl md:text-4xl font-extrabold text-purple-800">运动小讲堂</h2>
                            <span className="text-sm bg-purple-200 px-3 py-1 rounded-full ml-2">平移·旋转·对称</span>
                        </div>
                        <div className="knowledge-text text-gray-800 space-y-5">
                            <p className="text-xl font-bold text-indigo-700">{knowledgePoints.title}</p>
                            {knowledgePoints.motions.map((m, idx) => (
                                <div key={idx} className="bg-gradient-to-r from-white/80 to-purple-50 p-3 rounded-xl shadow-sm">
                                    <div className="flex items-center gap-2">
                                        <span className="text-3xl">{m.icon}</span>
                                        <h3 className="text-xl font-bold text-purple-700">{m.name}</h3>
                                    </div>
                                    <p className="mt-1">{m.definition}</p>
                                    <p className="text-sm bg-amber-50 p-1 rounded mt-1">📌 {m.keyPoints}</p>
                                    <p className="text-sm text-green-700 mt-1">✨ 例子：{m.example}</p>
                                </div>
                            ))}
                            <div className="bg-cyan-50 p-3 rounded-xl text-cyan-800 text-sm">
                                <p className="font-bold">💡 {knowledgePoints.combo}</p>
                                <p className="mt-1">{knowledgePoints.designTip}</p>
                            </div>
                            {DesignShowcase()}
                        </div>
                        <div className="mt-4 text-center text-purple-600 bg-purple-100/60 rounded-xl p-2 text-sm md:text-base">
                            🌟 判断运动类型，拖拽配对，你也可以设计出美丽的对称图案！
                        </div>
                    </div>
                    
                    {/* ================= 右侧：拖拽配对游戏（运动分类） ================= */}
                    <div className="lg:w-7/12 bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 flex flex-col border border-purple-200">
                        <div className="flex flex-wrap justify-between items-center gap-3 border-b-2 border-purple-300 pb-3 mb-4">
                            <div className="flex items-center gap-2">
                                <span className="text-3xl">🎮</span>
                                <h2 className="text-3xl md:text-4xl font-extrabold text-purple-800">运动分类工坊</h2>
                                <span className="text-sm bg-yellow-200 px-2 py-1 rounded-full">拖拽配对</span>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="bg-purple-100 rounded-full px-4 py-1 text-purple-700 font-bold text-lg">
                                    配对进度 {matchedCount}/{totalCards}
                                </div>
                                <button 
                                    onClick={resetGame}
                                    className="bg-amber-400 hover:bg-amber-500 text-amber-900 font-bold py-2 px-4 rounded-full shadow-md transition transform hover:scale-105 text-base md:text-lg flex items-center gap-1"
                                >
                                    🔄 重置游戏
                                </button>
                            </div>
                        </div>
                        
                        {/* 全局消息 */}
                        <div className={`mb-4 p-3 rounded-xl text-center font-medium transition-all big-text ${message.type === 'error' ? 'bg-red-100 text-red-700 border border-red-300' : message.type === 'success' ? 'bg-green-100 text-green-700 border border-green-300' : 'bg-indigo-50 text-indigo-600 border border-indigo-200'}`}>
                            {message.text}
                        </div>
                        
                        {/* 三个运动分类区域（放置区） */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">
                            {motionZones.map(zone => {
                                const zoneMatched = matchedCards[zone.id];
                                return (
                                    <div 
                                        key={zone.id}
                                        className={`bg-gradient-to-b ${zone.color} rounded-2xl shadow-lg overflow-hidden border-2 ${zone.border} transition-all`}
                                    >
                                        <div className="bg-white/50 p-3 text-center">
                                            <div className="text-4xl">{zone.icon}</div>
                                            <h3 className="text-2xl font-black text-gray-800">{zone.name}</h3>
                                            <p className="text-xs text-gray-600">{zone.hint}</p>
                                        </div>
                                        <div 
                                            id={`dropzone-${zone.id}`}
                                            onDragOver={handleDragOver}
                                            onDragEnter={(e) => handleDragEnter(e, zone.id)}
                                            onDragLeave={(e) => handleDragLeave(e, zone.id)}
                                            onDrop={(e) => handleDrop(e, zone)}
                                            className={`drop-zone m-3 p-2 min-h-[140px] rounded-xl border-2 border-dashed transition-all flex flex-col items-center ${
                                                zoneMatched.length > 0 ? 'bg-green-100 border-green-400' : 'bg-white/70 border-purple-300'
                                            }`}
                                        >
                                            {zoneMatched.length === 0 ? (
                                                <div className="flex flex-col items-center justify-center h-full text-center py-2">
                                                    <span className="text-3xl mb-1">⬇️</span>
                                                    <p className="text-purple-500 font-medium text-sm">拖放卡片到这里</p>
                                                    <p className="text-xs text-gray-400 mt-1">{zone.name} 运动实例</p>
                                                </div>
                                            ) : (
                                                <div className="w-full">
                                                    <p className="text-sm font-bold text-green-700 mb-1 text-center">✅ 已配对 ({zoneMatched.length})</p>
                                                    <div className="flex flex-wrap gap-1 justify-center max-h-28 overflow-y-auto">
                                                        {zoneMatched.map(card => (
                                                            <div key={card.id} className="bg-green-200 text-green-800 text-xs rounded-full px-2 py-1 flex items-center gap-1">
                                                                <span>{card.text.length > 14 ? card.text.slice(0,12)+'…' : card.text}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                        <div className="p-1 text-center text-[10px] text-gray-400">
                                            将正确的运动卡片拖至此区域
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        
                        {/* 可拖拽卡片池 */}
                        <div className="mt-2">
                            <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
                                <h3 className="text-2xl font-bold text-purple-700 flex items-center gap-2">
                                    🃏 运动卡片池
                                    <span className="text-sm bg-yellow-200 px-2 py-1 rounded-full">长按/鼠标拖拽</span>
                                </h3>
                                <span className="text-xs md:text-sm text-purple-500">💡 把卡片拖到上方对应的运动区域</span>
                            </div>
                            
                            {availableCards.length === 0 ? (
                                <div className="bg-gradient-to-r from-green-100 to-emerald-100 p-6 rounded-2xl text-center text-green-700 text-xl font-bold">
                                    🎉 完美！所有运动卡片都正确分类！ 你已经是图形运动大师啦 🎉
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                    {availableCards.map(card => (
                                        <div
                                            key={card.id}
                                            draggable={true}
                                            onDragStart={(e) => handleDragStart(e, card)}
                                            onDragEnd={handleDragEnd}
                                            className="drag-card bg-gradient-to-br from-amber-200 to-yellow-300 rounded-2xl p-3 shadow-md flex items-center gap-2 cursor-grab active:cursor-grabbing hover:shadow-xl transition-all transform hover:scale-[1.02]"
                                        >
                                            <div className="text-3xl">{card.text.charAt(0)}</div>
                                            <div className="flex-1">
                                                <p className="font-bold text-gray-800 text-base md:text-lg leading-tight">{card.text}</p>
                                                <p className="text-xs text-amber-800 mt-0.5">{card.description}</p>
                                                <p className="text-[10px] text-purple-600 mt-1">👉 拖拽配对</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            {/* 玩法说明 + 设计拓展 */}
                            <div className="mt-5 bg-purple-100/70 p-3 rounded-xl text-purple-700 text-sm">
                                <p className="font-bold">📌 拖拉拽玩法：</p>
                                <ul className="list-disc list-inside space-y-1">
                                    <li>① 手指/鼠标长按卡片（运动实例）</li>
                                    <li>② 拖拽到上方对应的运动区域（平移/旋转/轴对称）</li>
                                    <li>③ 配对正确，卡片会移动到区域中，并显示成功提示</li>
                                    <li>④ 全部卡片配对成功，获得胜利 🏆</li>
                                </ul>
                                <div className="mt-2 bg-white/60 rounded-lg p-2 text-xs">
                                    💡 <strong>生活中的运动</strong>：推拉窗（平移）、钟表指针（旋转）、蝴蝶（对称）。试试描述“电梯上升”是平移，“车轮转动”是旋转，“脸谱”是轴对称。你能说出更多吗？
                                </div>
                            </div>
                            
                            {/* 额外知识点卡片：平移方向格数、旋转角度描述 */}
                            <div className="mt-3 flex flex-wrap gap-2 justify-center text-xs text-purple-800 bg-white/40 rounded-xl p-2">
                                <span className="font-bold">🎯 描述小模板：</span>
                                <span>平移 ➜ “向（方向）平移（几）格”</span>
                                <span>旋转 ➜ “（顺时针/逆时针）旋转（角度）°”</span>
                                <span>对称 ➜ “沿（某直线）对称”</span>
                            </div>
                            
                            {gameWin && (
                                <div className="mt-4 bg-gradient-to-r from-green-200 to-teal-200 text-green-800 p-4 rounded-2xl text-center text-xl font-bold animate-pulse flex items-center justify-center gap-3 shadow-lg">
                                    🏆 恭喜你完成所有配对！🏆 <span className="text-3xl">🎨✨</span>
                                </div>
                            )}
                        </div>
                        <div className="mt-3 text-center text-xs text-purple-500">
                            💡 移动端小技巧：长按卡片并轻轻拖拽到目标区上方，松手即可。多思考运动特点，分类更轻松！
                        </div>
                    </div>
                </div>
                {/* 底部装饰 */}
                <div className="text-center mt-8 text-purple-800 text-sm bg-white/30 rounded-full py-2 px-4 w-fit mx-auto backdrop-blur-sm">
                    🌈 平移、旋转、对称，图形运动真奇妙！拖拽配对，设计图案，空间思维大提升！ 🌟
                </div>
            </div>
        );
    };
    
    // 渲染到根节点
    ReactDOM.createRoot(document.getElementById("root")).render(
        <React.StrictMode>
            <MotionGame />
        </React.StrictMode>
    );
</script>
</body>
</html>
