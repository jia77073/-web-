<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>数学小工匠｜多位数乘一位数（不进位笔算）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖拽时意外选中文字 */
        }

        body {
            background: linear-gradient(135deg, #F4EDF7 0%, #E9D8F0 100%);
            font-family: 'Segoe UI', 'Comic Neue', 'Chalkboard SE', 'PingFang SC', 'Roboto', system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 主容器 */
        .course-container {
            max-width: 1300px;
            width: 100%;
            background-color: rgba(255, 250, 255, 0.85);
            border-radius: 64px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(203, 170, 203, 0.4);
            overflow: hidden;
            backdrop-filter: blur(2px);
        }

        .split-layout {
            display: flex;
            flex-wrap: wrap;
        }

        /* 左侧知识点区域 */
        .knowledge-area {
            flex: 1.2;
            min-width: 260px;
            background: #FFF9FE;
            padding: 28px 22px;
            border-right: 3px dashed #D9C2E6;
        }

        /* 右侧游戏区域 */
        .game-area {
            flex: 1.8;
            min-width: 320px;
            background: #FFFFFFEE;
            padding: 28px 22px;
        }

        /* 知识点标题 */
        .knowledge-title {
            font-size: 1.9rem;
            font-weight: bold;
            color: #7B4A7B;
            border-left: 8px solid #CBAACB;
            padding-left: 20px;
            margin-bottom: 24px;
        }

        .step-box {
            background: #F9F2FC;
            border-radius: 32px;
            padding: 18px 20px;
            margin-bottom: 25px;
            box-shadow: 0 6px 12px #E5D0EB40;
        }

        .step-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #AA7EAA;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .step-desc {
            font-size: 1rem;
            line-height: 1.5;
            color: #4A2E4A;
            margin-bottom: 12px;
        }

        /* ---------- 精确对齐的竖式网格 (核心修复) ---------- */
        .math-grid {
            display: inline-grid;
            grid-template-columns: 60px 60px 60px;  /* 固定三列，百、十、个位 */
            gap: 6px;
            justify-items: center;
            align-items: end;
            font-family: 'Courier New', 'SF Mono', 'Fira Code', monospace;
            font-weight: bold;
            font-size: 1.8rem;
            background: #FFF0FA;
            padding: 16px 20px;
            border-radius: 32px;
            box-shadow: inset 0 1px 3px #CBAACB30, 0 8px 18px #CBAACB30;
            width: auto;
        }

        .math-grid .digit-cell {
            width: 100%;
            text-align: center;
            color: #3E2A3E;
        }

        .math-grid .sign-cell {
            font-size: 1.6rem;
            font-weight: bold;
            color: #7B4A7B;
        }

        .grid-line {
            grid-column: 1 / -1;
            height: 3px;
            background: #CBAACB;
            border-radius: 4px;
            margin: 6px 0 4px 0;
            width: 100%;
        }

        /* 右侧游戏区同样精确对齐网格 */
        .game-math-grid {
            display: grid;
            grid-template-columns: 70px 70px 70px;
            gap: 8px;
            justify-items: center;
            align-items: end;
            font-family: 'Courier New', 'SF Mono', monospace;
            font-weight: bold;
            font-size: 2rem;
            background: #FEF7FC;
            padding: 20px 16px;
            border-radius: 48px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px #D9C2E680;
        }

        .game-digit {
            text-align: center;
            width: 100%;
            color: #3E2A3E;
        }

        .game-sign {
            font-size: 1.8rem;
            color: #AA7EAA;
        }

        .game-line {
            grid-column: 1 / -1;
            height: 4px;
            background: #CBAACB;
            border-radius: 4px;
            margin: 8px 0;
        }

        /* 积的区域 (拖拽放置区) 同样使用三列网格对齐 */
        .product-grid {
            display: grid;
            grid-template-columns: 70px 70px 70px;
            gap: 8px;
            justify-items: center;
            margin-top: 12px;
        }

        .dropzone {
            width: 100%;
            height: 85px;
            background: #FFF0F7;
            border: 3px dashed #CBAACB;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: bold;
            font-family: monospace;
            color: #7B4A7B;
            transition: all 0.1s;
            cursor: pointer;
        }

        .dropzone.filled {
            background: #E2D0EC;
            border: 3px solid #AA7EAA;
            color: #3E2A3E;
            box-shadow: inset 0 0 0 2px white;
        }

        /* 卡片区 */
        .cards-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #7B4A7B;
            margin: 20px 0 12px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .drag-cards {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            background: #FDF5FF;
            padding: 20px 12px;
            border-radius: 56px;
            margin-bottom: 20px;
            min-height: 130px;
        }

        .card {
            width: 80px;
            height: 80px;
            background: #FFFAFF;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.4rem;
            font-weight: bold;
            font-family: monospace;
            color: #5C3A5C;
            box-shadow: 0 12px 18px -8px #CBAACB80;
            cursor: grab;
            transition: 0.05s linear;
            border: 2px solid #D9C2E6;
        }

        .card:active {
            cursor: grabbing;
        }

        .card.dragging-clone {
            opacity: 0.85;
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            transform: scale(1.05);
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
        }

        .feedback {
            background: #F3EAF8;
            border-radius: 40px;
            padding: 12px 18px;
            text-align: center;
            font-weight: bold;
            color: #7B4A7B;
            margin: 15px 0;
            font-size: 1rem;
        }

        .btn-new {
            background: #CBAACB;
            border: none;
            padding: 14px 24px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 48px;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 6px 0 #8E6B8E;
            font-family: inherit;
        }

        .btn-new:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #8E6B8E;
        }

        .correct-feedback {
            background: #CBE6CB;
            color: #2E5E2E;
        }
        .error-feedback {
            background: #FFD9D9;
            color: #B33;
        }

        /* 移动端适配 缩小列宽 */
        @media (max-width: 720px) {
            .math-grid, .game-math-grid, .product-grid {
                grid-template-columns: 45px 45px 45px;
                gap: 4px;
                font-size: 1.5rem;
            }
            .game-math-grid {
                font-size: 1.6rem;
            }
            .dropzone {
                height: 65px;
                font-size: 1.8rem;
            }
            .card {
                width: 65px;
                height: 65px;
                font-size: 1.8rem;
            }
            .math-grid .digit-cell {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .math-grid, .game-math-grid, .product-grid {
                grid-template-columns: 38px 38px 38px;
            }
            .dropzone {
                height: 55px;
                font-size: 1.5rem;
            }
            .card {
                width: 55px;
                height: 55px;
                font-size: 1.6rem;
            }
        }

        .highlight {
            animation: pulse 0.4s ease;
        }
        @keyframes pulse {
            0% { transform: scale(1); background: #F3D9FF; }
            100% { transform: scale(1); background: #FFF0F7; }
        }
    </style>
</head>
<body>

<div class="course-container">
    <div class="split-layout">
        <!-- 左侧 知识点讲解 竖式范例完全对齐 -->
        <div class="knowledge-area">
            <div class="knowledge-title">📖 笔算小讲堂</div>
            <div class="step-box">
                <div class="step-title">✨ 不进位乘法 · 规则</div>
                <div class="step-desc">
                    🌟 <strong>多位数乘一位数（不进位）</strong>：<br>
                    ① 相同数位对齐，从<span style="background:#EEDDF5; padding:2px 8px; border-radius:20px;">个位</span>乘起；<br>
                    ② 用一位数依次去乘多位数的<span style="background:#EEDDF5; padding:2px 8px; border-radius:20px;">每一位</span>；<br>
                    ③ 乘得的积就写在<span style="background:#EEDDF5; padding:2px 8px; border-radius:20px;">对应的数位</span>下面。<br>
                    🧸 <strong>秘诀：</strong> 每一位的积 &lt; 10，没有进位烦恼！
                </div>
            </div>
            <div class="step-box">
                <div class="step-title">🧩 对齐范例 · 234 × 2</div>
                <div style="display: flex; justify-content: center; margin: 16px 0 8px 0;">
                    <!-- 精确对齐的竖式网格: 个位对个位，十位十位，百位百位 -->
                    <div class="math-grid">
                        <!-- 第一行: 被乘数 2 3 4 -->
                        <div class="digit-cell">2</div>
                        <div class="digit-cell">3</div>
                        <div class="digit-cell">4</div>
                        <!-- 第二行: 乘号 + 空白 + 乘数2 (乘数2对准个位列) -->
                        <div class="sign-cell">×</div>
                        <div class="digit-cell"></div>
                        <div class="digit-cell">2</div>
                        <!-- 横线 -->
                        <div class="grid-line"></div>
                        <!-- 第三行: 积 4 6 8 每个数字对齐数位 -->
                        <div class="digit-cell">4</div>
                        <div class="digit-cell">6</div>
                        <div class="digit-cell">8</div>
                    </div>
                </div>
                <div class="step-desc" style="margin-top: 12px; text-align: center;">
                    ✅ 2×4=8(个位)，2×3=6(十位)，2×2=4(百位)<br>
                    💡 笔算时个位对个位，十位对十位，整齐漂亮！
                </div>
            </div>
        </div>

        <!-- 右侧 互动游戏区（同样采用网格精确对齐） -->
        <div class="game-area">
            <div style="text-align: center; margin-bottom: 8px;">
                <span style="background: #D9C2E6; padding: 6px 18px; border-radius: 60px; font-weight: bold;">🎮 拖拽数字 · 填满宝箱 🎮</span>
            </div>
            <!-- 动态竖式游戏面板会在此动态生成 -->
            <div id="gameFormulaPanel" class="game-math-grid-container"></div>

            <div class="cards-title">
                🌟 拖动数字卡片到下面的空缺格子 🌟
            </div>
            <div id="dragCardsContainer" class="drag-cards"></div>

            <div id="feedbackMessage" class="feedback">✨ 把正确的数字拖拽到方框里 ✨</div>
            <button id="newGameBtn" class="btn-new">✨ 新的一题 ✨</button>
        </div>
    </div>
</div>

<script>
    // ------------------- 生成不进位乘法题目（三位数×一位数，每一位乘积<=9）-------------------
    function generateValidMultiplication() {
        const maxAttempts = 50;
        for (let attempt = 0; attempt < maxAttempts; attempt++) {
            const multiplier = Math.floor(Math.random() * 8) + 2; // 2~9
            const h = Math.floor(Math.random() * 9) + 1; // 百位 1-9
            const t = Math.floor(Math.random() * 10);
            const u = Math.floor(Math.random() * 10);
            if (h * multiplier <= 9 && t * multiplier <= 9 && u * multiplier <= 9) {
                const product = (h * 100 + t * 10 + u) * multiplier;
                const productH = Math.floor(product / 100) % 10;
                const productT = Math.floor(product / 10) % 10;
                const productU = product % 10;
                return {
                    multiplicand: { h, t, u },
                    multiplier: multiplier,
                    product: { h: productH, t: productT, u: productU }
                };
            }
        }
        // 安全后备题目: 123 × 2 = 246
        return {
            multiplicand: { h: 1, t: 2, u: 3 },
            multiplier: 2,
            product: { h: 2, t: 4, u: 6 }
        };
    }

    // 生成随机卡片（包含3个正确数字 + 3~5个干扰）
    function generateCardSet(correctH, correctT, correctU) {
        let cards = [
            { value: correctH, id: `c_h_${Date.now()}_${Math.random()}` },
            { value: correctT, id: `c_t_${Date.now()}_${Math.random()}` },
            { value: correctU, id: `c_u_${Date.now()}_${Math.random()}` }
        ];
        let extraCount = Math.floor(Math.random() * 3) + 3; // 3,4,5
        for (let i = 0; i < extraCount; i++) {
            let randVal = Math.floor(Math.random() * 10);
            cards.push({ value: randVal, id: `d_${i}_${Date.now()}_${Math.random()}` });
        }
        // Fisher-Yates 洗牌
        for (let i = cards.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        return cards;
    }

    // 游戏全局状态
    let gameState = {
        multiplicand: { h: 0, t: 0, u: 0 },
        multiplier: 0,
        product: { h: 0, t: 0, u: 0 },
        zoneFilled: [false, false, false], // 百十个位填充状态
        expectedDigits: [0, 0, 0],           // 百,十,个位的正确值
        cards: [],                           // {value, dom, id}
        dragEnabled: true
    };

    let activeDragCardDom = null;
    let cloneDragElement = null;
    let currentDragValue = null;
    let currentCardId = null;

    // 渲染右侧竖式 (精确对齐网格) 及 dropzones
    function renderGameFormula() {
        const container = document.getElementById('gameFormulaPanel');
        const m = gameState.multiplicand;
        const mult = gameState.multiplier;
        // 使用三列网格布局，确保乘数2严格对齐个位列
        container.innerHTML = `
            <div class="game-math-grid" id="dynamicMathGrid">
                <!-- 第一行: 被乘数 百 十 个 -->
                <div class="game-digit">${m.h}</div>
                <div class="game-digit">${m.t}</div>
                <div class="game-digit">${m.u}</div>
                <!-- 第二行: 乘号 + 空白占位 + 乘数(对齐个位) -->
                <div class="game-sign">×</div>
                <div class="game-digit"></div>
                <div class="game-digit">${mult}</div>
                <!-- 横线 -->
                <div class="game-line"></div>
            </div>
            <div class="product-grid" id="productDropzonesGrid">
                <div class="dropzone" data-position="hundreds" data-expected="${gameState.product.h}">?</div>
                <div class="dropzone" data-position="tens" data-expected="${gameState.product.t}">?</div>
                <div class="dropzone" data-position="units" data-expected="${gameState.product.u}">?</div>
            </div>
        `;

        // 重新绑定 dropzones 状态
        const zones = document.querySelectorAll('.dropzone');
        gameState.zoneFilled = [false, false, false];
        gameState.expectedDigits = [
            gameState.product.h,
            gameState.product.t,
            gameState.product.u
        ];
        zones.forEach((zone, idx) => {
            zone.classList.remove('filled');
            zone.innerHTML = '?';
            zone.style.pointerEvents = 'auto';
            // 如果已填充标记重置
        });
    }

    // 渲染可拖拽卡片
    function renderCards() {
        const cardsContainer = document.getElementById('dragCardsContainer');
        cardsContainer.innerHTML = '';
        gameState.cards.forEach(card => {
            const cardDiv = document.createElement('div');
            cardDiv.className = 'card';
            cardDiv.textContent = card.value;
            cardDiv.setAttribute('data-value', card.value);
            cardDiv.setAttribute('data-id', card.id);
            cardsContainer.appendChild(cardDiv);
            card.dom = cardDiv;
            bindDragEvents(cardDiv, card.value, card.id);
        });
    }

    // 拖拽核心 (支持鼠标和触摸)
    function bindDragEvents(cardElement, value, cardId) {
        const startDrag = (e) => {
            if (!gameState.dragEnabled) return;
            e.preventDefault();
            activeDragCardDom = cardElement;
            currentDragValue = value;
            currentCardId = cardId;
            const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
            
            cloneDragElement = cardElement.cloneNode(true);
            cloneDragElement.classList.add('dragging-clone');
            cloneDragElement.style.position = 'fixed';
            cloneDragElement.style.left = `${clientX - cardElement.offsetWidth / 2}px`;
            cloneDragElement.style.top = `${clientY - cardElement.offsetHeight / 2}px`;
            cloneDragElement.style.width = `${cardElement.offsetWidth}px`;
            cloneDragElement.style.height = `${cardElement.offsetHeight}px`;
            cloneDragElement.style.margin = '0';
            cloneDragElement.style.opacity = '0.85';
            document.body.appendChild(cloneDragElement);
            cardElement.style.opacity = '0.4';

            const onMove = (moveEvent) => {
                if (!cloneDragElement) return;
                moveEvent.preventDefault();
                const moveX = moveEvent.clientX ?? (moveEvent.touches ? moveEvent.touches[0].clientX : 0);
                const moveY = moveEvent.clientY ?? (moveEvent.touches ? moveEvent.touches[0].clientY : 0);
                cloneDragElement.style.left = `${moveX - cloneDragElement.offsetWidth / 2}px`;
                cloneDragElement.style.top = `${moveY - cloneDragElement.offsetHeight / 2}px`;
            };

            const onEnd = (endEvent) => {
                if (!cloneDragElement) {
                    cleanup();
                    return;
                }
                endEvent.preventDefault();
                const endX = endEvent.clientX ?? (endEvent.changedTouches ? endEvent.changedTouches[0].clientX : 0);
                const endY = endEvent.clientY ?? (endEvent.changedTouches ? endEvent.changedTouches[0].clientY : 0);
                const elemUnderCursor = document.elementsFromPoint(endX, endY);
                let targetZone = null;
                for (let el of elemUnderCursor) {
                    if (el.classList && el.classList.contains('dropzone')) {
                        targetZone = el;
                        break;
                    }
                }
                if (targetZone && !targetZone.classList.contains('filled')) {
                    const expected = parseInt(targetZone.getAttribute('data-expected'));
                    const draggedNum = currentDragValue;
                    const position = targetZone.getAttribute('data-position');
                    let idx = -1;
                    if (position === 'hundreds') idx = 0;
                    else if (position === 'tens') idx = 1;
                    else if (position === 'units') idx = 2;
                    
                    if (draggedNum === expected && idx !== -1) {
                        // 正确填充
                        targetZone.classList.add('filled');
                        targetZone.innerHTML = draggedNum;
                        targetZone.style.pointerEvents = 'none';
                        gameState.zoneFilled[idx] = true;
                        // 移除卡片
                        if (activeDragCardDom && activeDragCardDom.parentNode) {
                            activeDragCardDom.remove();
                        }
                        // 从 cards 数组中删除
                        const cardIndex = gameState.cards.findIndex(c => c.id === currentCardId);
                        if (cardIndex !== -1) gameState.cards.splice(cardIndex, 1);
                        updateFeedback(`🎉 正确！${draggedNum} 填入了 ${position}位 🎉`, true);
                        
                        const allFilled = gameState.zoneFilled.every(v => v === true);
                        if (allFilled) {
                            updateFeedback('🏆 完美！竖式完成啦！点“新的一题”继续挑战 🏆', true);
                            gameState.dragEnabled = false;
                        } else {
                            gameState.dragEnabled = true;
                        }
                    } else {
                        updateFeedback(`❌ 不对哦，${position}位应该是 ${expected}，再试试看～`, false);
                    }
                } else if (targetZone && targetZone.classList.contains('filled')) {
                    updateFeedback('⛔ 这个格子已经填满了！不能重复拖拽', false);
                } else {
                    updateFeedback('💡 要把数字拖拽到虚线格子里面哟', false);
                }
                cleanup();
            };

            const cleanup = () => {
                if (cloneDragElement) cloneDragElement.remove();
                if (activeDragCardDom) activeDragCardDom.style.opacity = '1';
                cloneDragElement = null;
                activeDragCardDom = null;
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onEnd);
                document.removeEventListener('touchmove', onMove);
                document.removeEventListener('touchend', onEnd);
                document.removeEventListener('touchcancel', cleanup);
            };
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);
            document.addEventListener('touchmove', onMove, { passive: false });
            document.addEventListener('touchend', onEnd);
            document.addEventListener('touchcancel', cleanup);
        };
        cardElement.addEventListener('mousedown', startDrag);
        cardElement.addEventListener('touchstart', startDrag, { passive: false });
    }

    function updateFeedback(msg, isSuccess) {
        const fb = document.getElementById('feedbackMessage');
        fb.textContent = msg;
        fb.classList.remove('correct-feedback', 'error-feedback');
        if (isSuccess) {
            fb.classList.add('correct-feedback');
        } else if (msg.includes('不对') || msg.includes('填满') || msg.includes('虚线')) {
            fb.classList.add('error-feedback');
        }
        setTimeout(() => {
            if (!isSuccess && !msg.includes('宝箱')) fb.classList.remove('error-feedback');
        }, 1300);
    }

    // 全新题目
    function newGame() {
        gameState.dragEnabled = true;
        const newData = generateValidMultiplication();
        gameState.multiplicand = newData.multiplicand;
        gameState.multiplier = newData.multiplier;
        gameState.product = newData.product;
        // 生成新卡片
        const newCards = generateCardSet(gameState.product.h, gameState.product.t, gameState.product.u);
        gameState.cards = newCards;
        // 重置填充状态
        gameState.zoneFilled = [false, false, false];
        // 渲染竖式和dropzones
        renderGameFormula();
        renderCards();
        updateFeedback('🎈 新题目来啦！把正确的数字拖到方框里～', false);
    }

    // 初始化页面
    function init() {
        const initData = generateValidMultiplication();
        gameState.multiplicand = initData.multiplicand;
        gameState.multiplier = initData.multiplier;
        gameState.product = initData.product;
        gameState.zoneFilled = [false, false, false];
        const initCards = generateCardSet(gameState.product.h, gameState.product.t, gameState.product.u);
        gameState.cards = initCards;
        renderGameFormula();
        renderCards();
        document.getElementById('newGameBtn').addEventListener('click', () => {
            newGame();
        });
    }

    init();
</script>
</body>
</html>
