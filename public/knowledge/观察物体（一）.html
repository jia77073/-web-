<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>观察物体 · 小小观察家挑战赛</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM & Babel CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        /* 拖拽优化 + 移动端友好 */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        .drag-card {
            transition: all 0.2s ease;
            cursor: grab;
            user-select: none;
            touch-action: manipulation;
        }
        .drag-card:active {
            cursor: grabbing;
            opacity: 0.7;
        }
        .drop-zone {
            transition: all 0.2s ease;
        }
        .drop-zone.drag-over {
            background-color: #f1e2ff;
            border-color: #9333ea;
            transform: scale(1.02);
            box-shadow: 0 6px 14px rgba(147, 51, 234, 0.25);
        }
        /* 大字体 (6号 ≈ 18px以上) */
        .big-text {
            font-size: 1.25rem;
            line-height: 1.45;
        }
        @media (min-width: 768px) {
            .big-text {
                font-size: 1.5rem;
            }
        }
        .knowledge-text {
            font-size: 1rem;
            line-height: 1.5;
        }
        @media (min-width: 768px) {
            .knowledge-text {
                font-size: 1.2rem;
            }
        }
        [draggable="true"] {
            -webkit-user-drag: element;
        }
        .shape-card {
            background: linear-gradient(145deg, #fff7e0, #ffefc0);
        }
        .object-btn-active {
            background: #8b5cf6 !important;
            color: white !important;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#CBAACB] to-[#D9C2E6] min-h-screen p-4 md:p-6 font-sans">

<div id="root" class="max-w-7xl mx-auto"></div>

<script type="text/babel">
    // 观察物体（一）互动课程：涵盖前面、后面、左面、右面、上面，区分正方体/长方体/圆柱/球的典型视图
    const ObserveObjectGame = () => {
        // ---------- 知识点内容 (左侧) ----------
        const knowledgePoints = {
            title: "👀 观察物体（一）",
            core: "从不同方向观察同一个物体，看到的形状可能是不同的。",
            directions: [
                "✅ 前面：正对着我们的面。",
                "✅ 后面：背对着我们的面，和前面形状相似（有时左右相反）。",
                "✅ 左面：从左往右看，看到的形状。",
                "✅ 右面：从右往左看，看到的形状。",
                "✅ 上面：从上往下看，看到物体的顶部。"
            ],
            shapes3d: [
                "🧊 正方体：每个面都是正方形 → 从前面、后面、左面、右面、上面看都是正方形。",
                "📦 长方体：相对的面形状相同，通常前面/后面是长方形，左面/右面是长方形，上面/下面是长方形。",
                "🥫 圆柱：从前面、后面、左面、右面看都是长方形，从上面看是圆形。",
                "⚽ 球：从任何方向看都是圆形。"
            ],
            tip: "💡 小技巧：想象自己站在那个方向，画出看到的形状。也可以用小积木搭一搭！"
        };
        
        // 定义四种立体图形及其从五个方向（前、后、左、右、上）看到的形状类型
        // 形状类型: 'square' 正方形, 'rectangle' 长方形, 'circle' 圆形
        const objectsData = {
            cube: { name: "正方体", emoji: "🧊", icon: "⬛", color: "bg-sky-100", shapeMap: { front: 'square', back: 'square', left: 'square', right: 'square', top: 'square' } },
            cuboid: { name: "长方体", emoji: "📦", icon: "🧱", color: "bg-amber-100", shapeMap: { front: 'rectangle', back: 'rectangle', left: 'rectangle', right: 'rectangle', top: 'rectangle' } },
            cylinder: { name: "圆柱", emoji: "🥫", icon: "🧴", color: "bg-green-100", shapeMap: { front: 'rectangle', back: 'rectangle', left: 'rectangle', right: 'rectangle', top: 'circle' } },
            sphere: { name: "球", emoji: "⚽", icon: "🔴", color: "bg-purple-100", shapeMap: { front: 'circle', back: 'circle', left: 'circle', right: 'circle', top: 'circle' } }
        };
        
        // 定义五个观察方向（包含后面）
        const directions = [
            { id: "front", label: "前面", icon: "🔍", hint: "从正前方看" },
            { id: "back", label: "后面", icon: "🔎", hint: "从后方看" },
            { id: "left", label: "左面", icon: "⬅️", hint: "从左面看" },
            { id: "right", label: "右面", icon: "➡️", hint: "从右面看" },
            { id: "top", label: "上面", icon: "⬇️", hint: "从上方看" }
        ];
        
        // 可拖拽的形状卡片池（三种基本形状，可重复使用）
        const shapeCards = [
            { id: "square", name: "正方形", emoji: "⬛", shapeType: "square", desc: "四条边相等，四个直角" },
            { id: "rectangle", name: "长方形", emoji: "🧱", shapeType: "rectangle", desc: "对边相等，四个直角" },
            { id: "circle", name: "圆形", emoji: "⚪", shapeType: "circle", desc: "圆圆的无棱角" }
        ];
        
        // 游戏状态
        const [currentObject, setCurrentObject] = React.useState("cube");  // 当前选择的立体图形
        const [matches, setMatches] = React.useState({});  // 存储每个方向匹配的形状类型 { front: 'square', back: null ... }
        const [message, setMessage] = React.useState({ text: "🐣 选择一个立体图形，然后把形状卡片拖拽到正确的观察方向区域吧！", type: "info" });
        const [gameWin, setGameWin] = React.useState(false);
        
        const draggingShapeRef = React.useRef(null);
        
        // 初始化/切换物体时重置配对状态
        React.useEffect(() => {
            // 重置所有方向的匹配
            const initialMatches = {};
            directions.forEach(dir => { initialMatches[dir.id] = null; });
            setMatches(initialMatches);
            setGameWin(false);
            setMessage({ text: `✨ 现在观察：${objectsData[currentObject].name}，把形状拖到正确的位置吧！`, type: "info" });
        }, [currentObject]);
        
        // 检查是否全部方向都匹配正确
        React.useEffect(() => {
            const allMatched = directions.every(dir => matches[dir.id] !== null);
            if (allMatched && !gameWin && Object.keys(matches).length === directions.length) {
                setGameWin(true);
                setMessage({ text: `🎉 太棒啦！你完美掌握了${objectsData[currentObject].name}从不同方向看到的形状！ 🎉`, type: "success" });
            } else if (!allMatched && gameWin) {
                setGameWin(false);
            }
        }, [matches, gameWin, currentObject]);
        
        // 显示临时消息
        const showMessage = (msg, msgType = "error", duration = 2000) => {
            setMessage({ text: msg, type: msgType });
            setTimeout(() => {
                setMessage(prev => prev.text === msg ? { text: `👉 继续挑战 ${objectsData[currentObject].name}，把形状拖到对应的方向区～`, type: "info" } : prev);
            }, duration);
        };
        
        // 拖拽开始
        const handleDragStart = (e, shapeCard) => {
            draggingShapeRef.current = shapeCard;
            e.dataTransfer.setData("text/plain", shapeCard.id);
            e.dataTransfer.effectAllowed = "copy";
            if (e.target) e.target.style.opacity = "0.6";
            return true;
        };
        
        const handleDragEnd = (e) => {
            if (e.target) e.target.style.opacity = "";
            draggingShapeRef.current = null;
        };
        
        const handleDragOver = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "copy";
        };
        
        // 高亮效果
        const handleDragEnter = (e, dirId) => {
            e.preventDefault();
            const zoneElem = document.getElementById(`dropzone-${dirId}`);
            if (zoneElem) zoneElem.classList.add("drag-over");
        };
        
        const handleDragLeave = (e, dirId) => {
            const zoneElem = document.getElementById(`dropzone-${dirId}`);
            if (zoneElem) zoneElem.classList.remove("drag-over");
        };
        
        // 核心放置逻辑
        const handleDrop = (e, directionId) => {
            e.preventDefault();
            const zoneElem = document.getElementById(`dropzone-${directionId}`);
            if (zoneElem) zoneElem.classList.remove("drag-over");
            
            let draggedShape = draggingShapeRef.current;
            if (!draggedShape) {
                const shapeId = e.dataTransfer.getData("text/plain");
                draggedShape = shapeCards.find(card => card.id === shapeId);
            }
            if (!draggedShape) return;
            
            // 检查该方向是否已经配对过了
            if (matches[directionId] !== null) {
                showMessage(`❌ ${directions.find(d => d.id === directionId).label} 已经配对过了！不能重复放置。重置当前物体可重新挑战。`, "error");
                return;
            }
            
            // 获取当前物体对该方向要求的正确形状类型
            const requiredShapeType = objectsData[currentObject].shapeMap[directionId];
            const isCorrect = (draggedShape.shapeType === requiredShapeType);
            
            if (isCorrect) {
                // 配对正确
                setMatches(prev => ({
                    ...prev,
                    [directionId]: draggedShape.shapeType
                }));
                const dirLabel = directions.find(d => d.id === directionId).label;
                // 显示口头描述语句强化
                const shapeName = draggedShape.name;
                showMessage(`✅ 正确！从${dirLabel}看${objectsData[currentObject].name}，看到的形状是${shapeName}。“从${dirLabel}看，看到的是${shapeName}。”`, "success", 1800);
            } else {
                // 配对错误
                const requiredShapeName = (requiredShapeType === 'square' ? '正方形' : (requiredShapeType === 'rectangle' ? '长方形' : '圆形'));
                showMessage(`❌ 配对错误！从${directions.find(d => d.id === directionId).label}看${objectsData[currentObject].name}，看到的不是${draggedShape.name}，应该是${requiredShapeName}，再试试看～`, "error", 2000);
            }
            draggingShapeRef.current = null;
        };
        
        // 重置当前物体的配对（不清除物体选择）
        const resetCurrentMatches = () => {
            const resetMatches = {};
            directions.forEach(dir => { resetMatches[dir.id] = null; });
            setMatches(resetMatches);
            setGameWin(false);
            setMessage({ text: `🔄 已重置 ${objectsData[currentObject].name} 的配对，重新拖拽挑战吧！`, type: "info" });
        };
        
        // 计算配对进度
        const matchedCount = Object.values(matches).filter(v => v !== null).length;
        const totalDirs = directions.length;
        
        // 获取当前物体的信息
        const currentObjInfo = objectsData[currentObject];
        
        return (
            <div className="w-full">
                <div className="flex flex-col lg:flex-row gap-6 lg:gap-8">
                    {/* ================= 左侧：观察物体知识星球 ================= */}
                    <div className="lg:w-5/12 bg-white/85 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 border border-white/40 transition-all">
                        <div className="flex items-center gap-2 border-b-4 border-purple-300 pb-3 mb-4">
                            <span className="text-4xl">👁️</span>
                            <h2 className="text-3xl md:text-4xl font-extrabold text-purple-800">观察小讲堂</h2>
                            <span className="text-sm bg-purple-200 px-3 py-1 rounded-full ml-2">多角度·大发现</span>
                        </div>
                        <div className="knowledge-text text-gray-800 space-y-4">
                            <p className="text-xl font-bold text-indigo-700">{knowledgePoints.title}</p>
                            <p className="bg-white/60 p-3 rounded-xl">✨ {knowledgePoints.core}</p>
                            <div>
                                <p className="font-semibold text-purple-700">🔹 观察方向：</p>
                                <ul className="list-disc list-inside ml-2 space-y-1">
                                    {knowledgePoints.directions.map((item, idx) => <li key={idx}>{item}</li>)}
                                </ul>
                            </div>
                            <div className="bg-amber-50 p-3 rounded-xl">
                                <p className="font-bold text-amber-700">📐 常见立体图形视图：</p>
                                <ul className="list-disc list-inside space-y-1 text-sm md:text-base">
                                    {knowledgePoints.shapes3d.map((item, idx) => <li key={idx}>{item}</li>)}
                                </ul>
                            </div>
                            <div className="bg-cyan-50 p-3 rounded-xl text-cyan-700 text-sm">
                                {knowledgePoints.tip}
                            </div>
                            <div className="bg-green-50 p-2 rounded-lg text-green-700 text-sm italic">
                                🗣️ 口头表达：从（某面）看，看到的是（什么形状）。例如：“从前面看正方体，看到的是正方形。”
                            </div>
                        </div>
                        <div className="mt-4 text-center text-purple-600 bg-purple-100/60 rounded-xl p-2 text-sm md:text-base">
                            🌟 不同方向，形状不同；动手拖拽配对，空间思维大提升！
                        </div>
                    </div>
                    
                    {/* ================= 右侧：互动拖拽配对游戏（方向vs形状） ================= */}
                    <div className="lg:w-7/12 bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 flex flex-col border border-purple-200">
                        <div className="flex flex-wrap justify-between items-center gap-3 border-b-2 border-purple-300 pb-3 mb-4">
                            <div className="flex items-center gap-2">
                                <span className="text-3xl">🎮</span>
                                <h2 className="text-3xl md:text-4xl font-extrabold text-purple-800">视图配对工坊</h2>
                                <span className="text-sm bg-yellow-200 px-2 py-1 rounded-full">拖拽配对</span>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="bg-purple-100 rounded-full px-4 py-1 text-purple-700 font-bold text-lg">
                                    配对进度 {matchedCount}/{totalDirs}
                                </div>
                                <button 
                                    onClick={resetCurrentMatches}
                                    className="bg-amber-400 hover:bg-amber-500 text-amber-900 font-bold py-2 px-4 rounded-full shadow-md transition transform hover:scale-105 text-base md:text-lg flex items-center gap-1"
                                >
                                    🔄 重置配对
                                </button>
                            </div>
                        </div>
                        
                        {/* 全局消息提示 */}
                        <div className={`mb-4 p-3 rounded-xl text-center font-medium transition-all big-text ${message.type === 'error' ? 'bg-red-100 text-red-700 border border-red-300' : message.type === 'success' ? 'bg-green-100 text-green-700 border border-green-300' : 'bg-indigo-50 text-indigo-600 border border-indigo-200'}`}>
                            {message.text}
                        </div>
                        
                        {/* 物体选择按钮区 */}
                        <div className="flex flex-wrap justify-center gap-3 mb-5">
                            {Object.keys(objectsData).map(key => (
                                <button
                                    key={key}
                                    onClick={() => setCurrentObject(key)}
                                    className={`px-4 py-2 rounded-full font-bold shadow-md transition transform hover:scale-105 flex items-center gap-2 text-lg ${currentObject === key ? 'object-btn-active bg-purple-600 text-white' : 'bg-white/70 text-purple-700 border border-purple-300'}`}
                                >
                                    <span className="text-2xl">{objectsData[key].emoji}</span>
                                    {objectsData[key].name}
                                </button>
                            ))}
                        </div>
                        
                        {/* 当前物体示意图和提示 */}
                        <div className={`${currentObjInfo.color} rounded-2xl p-3 mb-5 flex items-center justify-between flex-wrap gap-3 shadow-inner`}>
                            <div className="flex items-center gap-3">
                                <span className="text-6xl">{currentObjInfo.emoji}</span>
                                <div>
                                    <p className="font-black text-xl text-gray-700">{currentObjInfo.name}</p>
                                    <p className="text-sm text-gray-600">挑战：将正确的形状拖到每个观察方向</p>
                                </div>
                            </div>
                            <div className="text-sm bg-white/60 rounded-full px-3 py-1">
                                💡 一共{totalDirs}个方向，全部配对成功即获胜
                            </div>
                        </div>
                        
                        {/* 五个观察方向放置区（网格适应移动端） */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4 mb-6">
                            {directions.map(dir => {
                                const matchedShapeType = matches[dir.id];
                                const matchedShapeObj = shapeCards.find(c => c.shapeType === matchedShapeType);
                                return (
                                    <div 
                                        key={dir.id}
                                        className="bg-gradient-to-b from-purple-50 to-white rounded-2xl shadow-md overflow-hidden border-2 border-purple-200 transition-all hover:shadow-lg"
                                    >
                                        <div className="bg-purple-200/70 p-2 text-center">
                                            <div className="text-2xl">{dir.icon}</div>
                                            <h3 className="text-lg font-black text-purple-800">{dir.label}</h3>
                                            <p className="text-xs text-purple-600">{dir.hint}</p>
                                        </div>
                                        <div 
                                            id={`dropzone-${dir.id}`}
                                            onDragOver={handleDragOver}
                                            onDragEnter={(e) => handleDragEnter(e, dir.id)}
                                            onDragLeave={(e) => handleDragLeave(e, dir.id)}
                                            onDrop={(e) => handleDrop(e, dir.id)}
                                            className={`drop-zone m-2 p-3 min-h-[100px] rounded-xl border-2 border-dashed transition-all flex flex-col items-center justify-center text-center ${
                                                matchedShapeType ? 'bg-green-100 border-green-400 shadow-inner' : 'bg-white/70 border-purple-300'
                                            }`}
                                        >
                                            {matchedShapeType ? (
                                                <div className="flex flex-col items-center gap-1">
                                                    <span className="text-5xl">
                                                        {matchedShapeType === 'square' && '⬛'}
                                                        {matchedShapeType === 'rectangle' && '🧱'}
                                                        {matchedShapeType === 'circle' && '⚪'}
                                                    </span>
                                                    <p className="font-bold text-green-700 text-lg">{matchedShapeObj?.name}</p>
                                                    <p className="text-xs text-gray-500">已配对 ✓</p>
                                                </div>
                                            ) : (
                                                <div className="text-center">
                                                    <span className="text-3xl block mb-1">⬇️✨</span>
                                                    <p className="text-purple-500 font-medium text-sm">拖放形状卡片</p>
                                                    <p className="text-xs text-gray-400 mt-1">匹配{dir.label}视图</p>
                                                </div>
                                            )}
                                        </div>
                                        <div className="p-1 text-center text-xs text-gray-400">
                                            正确配对点亮✔️
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        
                        {/* 可拖拽形状卡片池（三种基本形状，可重复使用） */}
                        <div className="mt-2">
                            <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
                                <h3 className="text-2xl font-bold text-purple-700 flex items-center gap-2">
                                    🃏 形状卡片池
                                    <span className="text-sm bg-yellow-200 px-2 py-1 rounded-full">长按/鼠标拖拽</span>
                                </h3>
                                <span className="text-xs md:text-sm text-purple-500">💡 把形状拖到上方对应的观察方向区域</span>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                {shapeCards.map(card => (
                                    <div
                                        key={card.id}
                                        draggable={true}
                                        onDragStart={(e) => handleDragStart(e, card)}
                                        onDragEnd={handleDragEnd}
                                        className="drag-card shape-card rounded-2xl p-4 shadow-md flex items-center gap-4 cursor-grab active:cursor-grabbing hover:shadow-xl transition-all transform hover:scale-[1.02]"
                                    >
                                        <div className="text-5xl">
                                            {card.id === 'square' && '⬛'}
                                            {card.id === 'rectangle' && '🧱'}
                                            {card.id === 'circle' && '⚪'}
                                        </div>
                                        <div className="flex-1">
                                            <p className="font-bold text-gray-800 text-xl">{card.name}</p>
                                            <p className="text-xs text-amber-800">{card.desc}</p>
                                            <p className="text-[10px] text-purple-600 mt-1">👉 拖拽配对</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            
                            {/* 玩法说明 + 互动提示 */}
                            <div className="mt-5 bg-purple-100/70 p-3 rounded-xl text-purple-700 text-sm flex flex-wrap gap-2 justify-center items-center">
                                <span>📌 <strong>拖拉拽玩法：</strong></span>
                                <span>① 选择一个立体图形（正方体/长方体/圆柱/球）</span>
                                <span>② 长按形状卡片（正方形/长方形/圆形）</span>
                                <span>③ 拖拽到上方对应的观察方向区域（前面/后面/左面/右面/上面）</span>
                                <span>④ 匹配正确就会点亮！集齐5个方向就胜利 ✨</span>
                            </div>
                            
                            {gameWin && (
                                <div className="mt-4 bg-gradient-to-r from-green-200 to-teal-200 text-green-800 p-4 rounded-2xl text-center text-xl font-bold animate-pulse flex items-center justify-center gap-3 shadow-lg">
                                    🏆 恭喜你完成 {currentObjInfo.name} 的全部视图配对！🏆 <span className="text-3xl">🎓👀</span>
                                </div>
                            )}
                        </div>
                        <div className="mt-3 text-center text-xs text-purple-500">
                            💡 移动端小技巧：长按卡片并轻轻拖拽到目标区上方，松手即可。试试切换不同立体图形，每个都挑战一次！
                        </div>
                    </div>
                </div>
                {/* 底部装饰 */}
                <div className="text-center mt-8 text-purple-800 text-sm bg-white/30 rounded-full py-2 px-4 w-fit mx-auto backdrop-blur-sm">
                    🌈 从前面、后面、左面、右面、上面看，形状可能大不同！动手拖拽，空间观念 up up！ 🌟
                </div>
            </div>
        );
    };
    
    // 渲染到根节点
    ReactDOM.createRoot(document.getElementById("root")).render(
        <React.StrictMode>
            <ObserveObjectGame />
        </React.StrictMode>
    );
</script>
</body>
