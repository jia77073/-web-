<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>牛吃草·思维特训营 | 动态总量模型 + 拖拽配对挑战</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM & Babel CDN (稳定版本) -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <!-- SortableJS 拖拽库 (稳定) -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        /* 拖拽反馈样式 */
        .sortable-drag {
            opacity: 0.4;
            background-color: #f3e8ff;
            transform: scale(0.96);
        }
        .sortable-ghost {
            opacity: 0.3;
            background-color: #d8b4fe;
        }
        .answer-zone {
            transition: background 0.1s ease;
        }
        .number-card {
            cursor: grab;
            transition: all 0.15s;
            user-select: none;
        }
        .number-card:active {
            cursor: grabbing;
        }
        button:active {
            transform: scale(0.96);
        }
        @media (max-width: 768px) {
            .main-title {
                font-size: 2rem !important;
            }
            .number-card {
                font-size: 1rem;
                padding: 0.4rem 0.7rem;
            }
        }
        /* 绿色清新背景 + 紫色主题 */
        body {
            background: linear-gradient(145deg, #c8e6b5 0%, #a9d48e 100%);
            font-family: 'Segoe UI', 'Comic Neue', system-ui, sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
        }
    </style>
</head>
<body class="p-4 md:p-6 min-h-screen flex items-center justify-center">
    <div id="root" class="w-full max-w-7xl mx-auto"></div>

    <script type="text/babel">
        // ----------------------------- 牛吃草问题库（经典+变式，答案均为整数或易读小数）--------------------------------
        const PROBLEMS = [
            { id: 1, text: "🌱 牧场青草匀速生长。27头牛6天吃完，23头牛9天吃完。那么21头牛几天吃完？", answer: 12, unit: "天", hint: "每天长草15份，原草72份。21头牛每天净消耗6份 → 72÷6=12天。" },
            { id: 2, text: "💧 水池匀速进水。5台抽水机20小时抽干，8台抽水机10小时抽干。6台抽水机几小时抽干？", answer: 15, unit: "小时", hint: "每小时进水2份，原水60份。6台净排4份/时 → 60÷4=15小时。" },
            { id: 3, text: "❄️ 寒冬牧场草量每天匀速减少。20头牛5天吃完，16头牛6天吃完。11头牛能吃几天？", answer: 8, unit: "天", hint: "每天减少4份，原草120份。11头牛每天消耗11+4=15份 → 120÷15=8天。" },
            { id: 4, text: "🛒 超市收银台排队人数匀速增加。开4个窗口20分钟队伍消失，开7个窗口10分钟消失。开5个窗口需要几分钟？", answer: 15, unit: "分钟", hint: "每分钟新增1人，原有60人。5个窗口每分钟净处理4人 → 60÷4=15分钟。" },
            { id: 5, text: "🐄 牧场匀速生长：20头牛6天吃完，15头牛9天吃完。那么10头牛吃几天？", answer: 18, unit: "天", hint: "每天长草5份，原草90份。10头牛每天净吃5份 → 90÷5=18天。" }
        ];

        // ----------------------------- 左侧：知识点讲解区 -----------------------------
        const KnowledgeBase = () => {
            return (
                <div className="glass-card rounded-3xl shadow-2xl p-5 md:p-7 border-2 border-purple-400 h-full flex flex-col">
                    <div className="border-b-4 border-purple-500 pb-3 mb-4 flex items-center gap-2">
                        <span className="text-5xl">🐂</span>
                        <h1 className="text-4xl md:text-5xl font-extrabold text-gray-800 main-title">牛吃草·思维特训营</h1>
                    </div>
                    
                    <div className="bg-gradient-to-br from-purple-50 to-indigo-50 rounded-2xl p-5 mb-5 shadow-md border border-purple-200">
                        <h2 className="text-2xl font-bold text-purple-800 flex items-center gap-2">🧠 核心秘籍 · 动态总量模型</h2>
                        <div className="mt-3 space-y-3 text-gray-700 text-base md:text-lg leading-relaxed">
                            <p>✨ <strong className="text-purple-800">牛吃草问题</strong> 也叫“牛顿问题”，核心是“<strong>匀速增长（或减少） + 原有存量</strong>”。</p>
                            <div className="bg-amber-50 p-3 rounded-xl border-l-8 border-amber-400 my-2">
                                <p className="font-bold">📐 万能三步法（设每头牛每天吃1份草）：</p>
                                <p>① 求<span className="font-bold text-green-700">每天生长量</span> = (牛数₁×天数₁ - 牛数₂×天数₂) ÷ (天数₁ - 天数₂)</p>
                                <p>② 求<span className="font-bold text-green-700">原有草量</span> = 牛数₁×天数₁ - 每天生长量×天数₁</p>
                                <p>③ 求<span className="font-bold text-green-700">问题所求天数/头数</span> = 原有草量 ÷ (牛数 - 每天生长量)  或者 牛数 = 原有草量÷天数 + 每天生长量</p>
                            </div>
                            <p>⚡ <strong className="text-purple-800">变式拓展：</strong> 抽水机排水(进水)、超市排队、资源开采、仓库搬运、扶梯运行……均可用此法！</p>
                            <p>🎯 熟练掌握“差值法”和“固定变量”，轻松解决动态总量应用题~</p>
                        </div>
                    </div>

                    <div className="bg-cyan-50 rounded-2xl p-4 border border-cyan-200 mb-3">
                        <h3 className="text-xl font-bold text-purple-800 flex items-center gap-1">📖 速记小锦囊</h3>
                        <div className="mt-2 grid grid-cols-1 gap-2 text-gray-700">
                            <p>🐮 <strong>牛数 × 天数 = 原有草 + 每天长草 × 天数</strong> → 构建方程。</p>
                            <p>🔁 <strong>差值求生长</strong>：(大差草量 - 小差草量) ÷ (天数差) = 每天长草量。</p>
                            <p>🧩 遇到“负增长” (草减少) 则公式为：原有草 = 牛数×天数 + 每天减少量×天数。</p>
                        </div>
                    </div>
                    <div className="mt-2 text-center text-sm text-gray-500 bg-white/70 rounded-xl p-2">
                        💡 右侧小游戏 → 拖拽配对，把正确答案放到牧场答案区！感受动态总量变化规律。
                    </div>
                </div>
            );
        };

        // ----------------------------- 右侧：拖拽配对游戏（使用 SortableJS，无报错）-----------------------------
        const InteractiveGame = () => {
            // 当前题目状态
            const [currentProblem, setCurrentProblem] = React.useState(PROBLEMS[0]);
            const [feedbackMsg, setFeedbackMsg] = React.useState('');
            const [isCorrect, setIsCorrect] = React.useState(false);
            // 用于强制刷新UI的key
            const [refreshKey, setRefreshKey] = React.useState(0);
            
            // DOM 引用
            const answerZoneRef = React.useRef(null);   // 答案投放区
            const cardPoolRef = React.useRef(null);     // 数字卡片池
            
            // 存储 Sortable 实例以便销毁
            const sortableAnswer = React.useRef(null);
            const sortablePool = React.useRef(null);
            
            // 生成干扰数字卡片 (包含正确答案 + 合理干扰数)
            const generateNumberCards = (correctAns, minVal = 1, maxVal = 40) => {
                const candidates = new Set();
                candidates.add(correctAns);
                // 添加 ±1, ±2, ±3, ±4, ±5 干扰数
                for (let offset = -5; offset <= 5; offset++) {
                    if (offset === 0) continue;
                    let cand = correctAns + offset;
                    if (cand >= minVal && cand <= maxVal && cand !== correctAns) candidates.add(cand);
                }
                // 补充少量特殊数字
                const extra = [Math.max(1, correctAns - 3), correctAns + 3, Math.floor(correctAns * 0.8), Math.floor(correctAns * 1.2)];
                extra.forEach(v => {
                    if (v >= minVal && v <= maxVal && !candidates.has(v) && v !== correctAns) candidates.add(v);
                });
                let numbers = Array.from(candidates);
                // 确保至少包含正确答案
                if (!numbers.includes(correctAns)) numbers.push(correctAns);
                // 限制最多8张卡片
                numbers = numbers.slice(0, 8);
                // 随机打乱
                for (let i = numbers.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [numbers[i], numbers[j]] = [numbers[j], numbers[i]];
                }
                return numbers;
            };
            
            // 重建UI：清空容器并重新生成卡片，重置反馈
            const rebuildUI = () => {
                if (!cardPoolRef.current || !answerZoneRef.current) return;
                // 清空两个容器
                cardPoolRef.current.innerHTML = '';
                answerZoneRef.current.innerHTML = '';
                
                // 在答案区加入占位提示文本（非卡片，防拖拽干扰）
                const placeholder = document.createElement('div');
                placeholder.className = 'text-purple-400 italic text-center w-full py-4 pointer-events-none';
                placeholder.innerText = '✨ 把正确答案的数字卡片拖拽到此区域 ✨';
                placeholder.setAttribute('data-placeholder', 'true');
                answerZoneRef.current.appendChild(placeholder);
                
                // 生成数字卡片
                const numbers = generateNumberCards(currentProblem.answer, 1, 45);
                numbers.forEach(num => {
                    const card = document.createElement('div');
                    card.className = 'number-card bg-gradient-to-br from-amber-200 to-yellow-300 rounded-xl shadow-md px-4 py-2 text-center font-bold text-xl cursor-grab select-none flex items-center justify-center gap-1 hover:scale-105 transition';
                    card.setAttribute('data-value', num);
                    card.innerHTML = `<span class="text-2xl">🔢</span> ${num}`;
                    card.style.touchAction = 'none';
                    cardPoolRef.current.appendChild(card);
                });
                
                setFeedbackMsg('');
                setIsCorrect(false);
            };
            
            // 初始化/重置 Sortable 拖拽 (跨容器，且答案区只允许至多一张数字卡片)
            const initSortable = () => {
                // 销毁旧实例
                if (sortablePool.current) sortablePool.current.destroy();
                if (sortableAnswer.current) sortableAnswer.current.destroy();
                
                if (!cardPoolRef.current || !answerZoneRef.current) return;
                
                // 卡片池 Sortable (可将卡片拖出，也可接收从答案区拖回的卡片)
                sortablePool.current = new Sortable(cardPoolRef.current, {
                    group: {
                        name: 'cowGroup',
                        pull: true,
                        revertClone: false,
                        put: true
                    },
                    animation: 200,
                    sort: true,
                    ghostClass: 'sortable-ghost',
                    dragClass: 'sortable-drag',
                    onEnd: () => {
                        // 拖拽结束后统一验证配对情况
                        validateAndFeedback();
                    }
                });
                
                // 答案区 Sortable：允许放入，但限制最多只能有一个数字卡片（原生卡片，不含 placeholder）
                sortableAnswer.current = new Sortable(answerZoneRef.current, {
                    group: {
                        name: 'cowGroup',
                        pull: true,
                        put: function(to, from, drag) {
                            // 检查当前答案区已有数字卡片数
                            if (!answerZoneRef.current) return false;
                            const existingCards = answerZoneRef.current.querySelectorAll('.number-card');
                            // 最多只能存在一张数字卡片
                            return existingCards.length === 0;
                        }
                    },
                    animation: 200,
                    sort: false,
                    ghostClass: 'sortable-ghost',
                    onEnd: () => {
                        // 拖拽结束后清理占位符 (如果有卡片进入，占位符应删除)
                        removePlaceholderIfNeeded();
                        validateAndFeedback();
                    }
                });
            };
            
            // 移除答案区占位符（当存在数字卡片时）
            const removePlaceholderIfNeeded = () => {
                if (!answerZoneRef.current) return;
                const placeholders = answerZoneRef.current.querySelectorAll('[data-placeholder="true"]');
                const hasCards = answerZoneRef.current.querySelectorAll('.number-card').length > 0;
                if (hasCards) {
                    placeholders.forEach(p => p.remove());
                } else if (placeholders.length === 0) {
                    // 如果没有卡片也没有占位符，重新添加占位符
                    const newPlace = document.createElement('div');
                    newPlace.className = 'text-purple-400 italic text-center w-full py-4 pointer-events-none';
                    newPlace.innerText = '✨ 把正确答案的数字卡片拖拽到此区域 ✨';
                    newPlace.setAttribute('data-placeholder', 'true');
                    answerZoneRef.current.appendChild(newPlace);
                }
            };
            
            // 验证当前答案区是否配对正确
            const validateAndFeedback = () => {
                if (!answerZoneRef.current) return;
                const cards = answerZoneRef.current.querySelectorAll('.number-card');
                if (cards.length === 0) {
                    setFeedbackMsg('🤔 还没有答案呢，快把正确的数字拖拽到答案区吧！');
                    setIsCorrect(false);
                    return;
                }
                // 取第一个卡片上的数值
                const card = cards[0];
                const value = parseInt(card.getAttribute('data-value'), 10);
                if (isNaN(value)) {
                    setFeedbackMsg('❓ 数值有问题，请重新拖拽');
                    setIsCorrect(false);
                    return;
                }
                if (value === currentProblem.answer) {
                    setFeedbackMsg(`🎉 完全正确！ ${currentProblem.answer} ${currentProblem.unit} ！太厉害了，牛吃草模型掌握得真棒！ 🎉`);
                    setIsCorrect(true);
                } else {
                    setFeedbackMsg(`😲 答案不正确哦，正确答案是 ${currentProblem.answer} ${currentProblem.unit}。再试一次，用假设法回顾一下：${currentProblem.hint}`);
                    setIsCorrect(false);
                }
            };
            
            // 重置配对 (将答案区卡片移回卡片池)
            const resetPairing = () => {
                if (!answerZoneRef.current || !cardPoolRef.current) return;
                const cardsInAnswer = answerZoneRef.current.querySelectorAll('.number-card');
                cardsInAnswer.forEach(card => {
                    cardPoolRef.current.appendChild(card);
                });
                // 清理占位符并重新添加
                const placeholders = answerZoneRef.current.querySelectorAll('[data-placeholder="true"]');
                placeholders.forEach(p => p.remove());
                const newPlace = document.createElement('div');
                newPlace.className = 'text-purple-400 italic text-center w-full py-4 pointer-events-none';
                newPlace.innerText = '✨ 把正确答案的数字卡片拖拽到此区域 ✨';
                newPlace.setAttribute('data-placeholder', 'true');
                answerZoneRef.current.appendChild(newPlace);
                setFeedbackMsg('已重置配对，可以重新拖拽挑战啦！');
                setIsCorrect(false);
            };
            
            // 换一题
            const changeProblem = () => {
                let newIdx = Math.floor(Math.random() * PROBLEMS.length);
                while (PROBLEMS[newIdx].id === currentProblem.id && PROBLEMS.length > 1) {
                    newIdx = Math.floor(Math.random() * PROBLEMS.length);
                }
                setCurrentProblem(PROBLEMS[newIdx]);
                setFeedbackMsg('');
                setIsCorrect(false);
                setRefreshKey(prev => prev + 1);
            };
            
            // 当题目或刷新key变化时，重建UI和Sortable
            React.useEffect(() => {
                rebuildUI();
                // 延迟一点确保DOM更新后再初始化Sortable
                const timer = setTimeout(() => {
                    initSortable();
                }, 30);
                return () => {
                    clearTimeout(timer);
                    // 组件卸载时销毁Sortable实例
                    if (sortablePool.current) sortablePool.current.destroy();
                    if (sortableAnswer.current) sortableAnswer.current.destroy();
                };
            }, [currentProblem, refreshKey]);
            
            return (
                <div className="glass-card rounded-3xl shadow-2xl p-5 md:p-6 border-2 border-purple-400 h-full flex flex-col">
                    {/* 头部 + 换题按钮 */}
                    <div className="flex flex-wrap justify-between items-center border-b border-purple-200 pb-3 mb-3">
                        <div className="flex items-center gap-2">
                            <span className="text-4xl">🐮</span>
                            <h2 className="text-2xl md:text-3xl font-bold text-purple-800">草量实验室·拖拽配对</h2>
                        </div>
                        <button onClick={changeProblem} className="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-5 rounded-2xl shadow-md transition text-sm md:text-base flex items-center gap-1">
                            🔄 换一题
                        </button>
                    </div>
                    
                    {/* 当前题目展示 */}
                    <div className="bg-gradient-to-r from-emerald-100 to-green-100 rounded-2xl p-4 mb-5 border-l-[12px] border-l-purple-500 shadow-md">
                        <p className="text-gray-800 text-xl md:text-2xl font-bold leading-tight">{currentProblem.text}</p>
                        <div className="text-sm text-purple-700 bg-white/70 rounded-lg p-2 mt-3 italic">
                            💡 解题锦囊: {currentProblem.hint}
                        </div>
                    </div>
                    
                    {/* 答案投放区 */}
                    <div className="mb-5">
                        <h3 className="font-bold text-purple-800 text-xl mb-2 flex items-center gap-2">📦 答案投放区</h3>
                        <div 
                            ref={answerZoneRef} 
                            className="answer-zone bg-purple-50 rounded-2xl p-5 border-2 border-dashed border-purple-400 min-h-[110px] flex flex-wrap items-center justify-center transition-all"
                        >
                            {/* 动态放置卡片 */}
                        </div>
                        <p className="text-xs text-center text-gray-500 mt-1">👉 将下方数字卡片拖拽到上面的答案区，配对正确自动判断！</p>
                    </div>
                    
                    {/* 数字卡片池 */}
                    <div className="bg-amber-50 rounded-2xl p-4 border-2 border-amber-200">
                        <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
                            <h3 className="font-bold text-purple-800 text-lg flex items-center gap-1">🎲 数字卡片区（可拖拽）</h3>
                            <button onClick={resetPairing} className="bg-amber-500 hover:bg-amber-600 text-white px-3 py-1.5 rounded-full text-sm shadow transition">🔄 重置配对</button>
                        </div>
                        <div ref={cardPoolRef} className="flex flex-wrap gap-3 justify-start p-2 min-h-[120px] bg-white/60 rounded-xl">
                            {/* 动态数字卡片 */}
                        </div>
                    </div>
                    
                    {/* 反馈消息区域 */}
                    {feedbackMsg && (
                        <div className={`mt-4 text-center text-base font-medium rounded-xl p-3 ${isCorrect ? 'bg-green-100 text-green-700 border border-green-300' : 'bg-purple-100 text-purple-700 border border-purple-200'}`}>
                            {feedbackMsg}
                        </div>
                    )}
                    
                    {/* 趣味鼓励条 */}
                    <div className="mt-3 text-center text-purple-600 text-sm bg-purple-50 p-2 rounded-xl">
                        🌟 假设每头牛每天吃1份草，抓住“原有量+变化量”等量关系，拖拽配对帮你加深印象！
                    </div>
                </div>
            );
        };
        
        // ============================ 主页面布局 ============================
        const MainApp = () => {
            return (
                <div className="flex flex-col lg:flex-row gap-6 w-full">
                    <div className="flex-1"><KnowledgeBase /></div>
                    <div className="flex-1"><InteractiveGame /></div>
                </div>
            );
        };
        
        // 渲染到根节点
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<MainApp />);
    </script>
</body>
</html>
