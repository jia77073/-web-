<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>数学小达人：人民币的换算 | 拖拖乐兑换机</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 配置主题：淡紫色 + 大5号字体 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontSize: {
                        '5xl': '3rem',
                        '6xl': '3.75rem',
                    },
                    colors: {
                        'lavender-primary': '#CBAACB',
                        'lavender-light': '#D9C2E6',
                    }
                }
            }
        }
    </script>
    <style>
        /* 拖拽优化 & 移动端适配 */
        [draggable="true"] {
            cursor: grab;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        [draggable="true"]:active {
            cursor: grabbing;
        }
        .drop-zone-active {
            background-color: #fef9c3 !important;
            border-color: #eab308 !important;
            transform: scale(1.02);
            transition: all 0.2s ease;
        }
        /* 卡片配对成功动画 */
        @keyframes matchPop {
            0% { transform: scale(1); background-color: #dcfce7; }
            80% { transform: scale(1.05); background-color: #bbf7d0; }
            100% { transform: scale(1); background-color: #f0fdf4; }
        }
        .match-animation {
            animation: matchPop 0.4s ease-out;
        }
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #CBAACB;
            border-radius: 10px;
        }
        /* 禁止移动端长按菜单 */
        .no-tap-highlight {
            -webkit-touch-callout: none;
        }
        /* 放置区样式 */
        .answer-dropzone {
            min-height: 110px;
            transition: all 0.2s;
        }
    </style>
    <!-- React & ReactDOM & Babel -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gradient-to-br from-lavender-primary to-lavender-light min-h-screen p-4 md:p-5 font-sans no-tap-highlight">
    <div id="root" class="max-w-7xl mx-auto"></div>

    <script type="text/babel">
        // React 主逻辑: 人民币换算 —— 拖拽配对游戏 (元角分互换)
        const { useState, useEffect, useCallback, useRef } = React;

        // ---------- 工具函数：生成随机换算题目 ----------
        // 题目类型: 
        // 1: 元 → 角   (例: 3元 = ? 角)
        // 2: 角 → 分   (例: 5角 = ? 分)
        // 3: 元 → 分   (例: 2元 = ? 分)
        // 4: 角 → 元   (例: 30角 = ? 元)
        // 5: 分 → 角   (例: 40分 = ? 角)
        // 6: 元角混合 -> 角 (例: 1元5角 = ? 角) 增加难度，适合进阶，但保持简单
        // 为了适合低年级，我们主要使用1-5类型，数值控制在1-10之间，答案整数
        
        const generateQuestion = () => {
            const types = [1, 2, 3, 4, 5];
            const type = types[Math.floor(Math.random() * types.length)];
            let value = 0;
            let answer = 0;
            let questionText = "";
            
            switch(type) {
                case 1: // 元 → 角
                    value = Math.floor(Math.random() * 10) + 1; // 1~10元
                    answer = value * 10;
                    questionText = `${value} 元 = ? 角`;
                    break;
                case 2: // 角 → 分
                    value = Math.floor(Math.random() * 10) + 1; // 1~10角
                    answer = value * 10;
                    questionText = `${value} 角 = ? 分`;
                    break;
                case 3: // 元 → 分
                    value = Math.floor(Math.random() * 5) + 1; // 1~5元 (避免过大)
                    answer = value * 100;
                    questionText = `${value} 元 = ? 分`;
                    break;
                case 4: // 角 → 元
                    value = (Math.floor(Math.random() * 5) + 1) * 10; // 10,20,30,40,50角
                    answer = value / 10;
                    questionText = `${value} 角 = ? 元`;
                    break;
                case 5: // 分 → 角
                    value = (Math.floor(Math.random() * 5) + 1) * 10; // 10,20,30,40,50分
                    answer = value / 10;
                    questionText = `${value} 分 = ? 角`;
                    break;
                default: break;
            }
            // 生成干扰项 (正确答案附近 ±5, ±10，确保为正数且不重复)
            let distractors = new Set();
            distractors.add(answer);
            while(distractors.size < 4) {
                let offset = Math.floor(Math.random() * 15) - 7; // -7..7
                let candidate = answer + offset;
                if (candidate < 0) candidate = answer + Math.abs(offset);
                if (candidate > answer + 20 && answer < 50) candidate = answer - 5;
                if (candidate <= 0) candidate = answer + 2;
                if (candidate === answer) continue;
                // 确保答案数值合理（比如角最大不超过100，分不超过200）
                if (candidate > 200) candidate = answer - 2;
                if (candidate < 0) candidate = 1;
                distractors.add(candidate);
            }
            let options = Array.from(distractors);
            // 打乱顺序
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }
            // 为每个选项生成显示文本（加上单位）
            let unit = "";
            if (type === 1) unit = "角";
            else if (type === 2) unit = "分";
            else if (type === 3) unit = "分";
            else if (type === 4) unit = "元";
            else unit = "角";
            
            const optionsWithDisplay = options.map(opt => ({
                value: opt,
                display: `${opt} ${unit}`
            }));
            
            return {
                id: `q_${Date.now()}_${Math.random()}`,
                text: questionText,
                answerValue: answer,
                answerUnit: unit,
                options: optionsWithDisplay,
                answered: false,   // 当前题目是否已经答对（已答对后不可重复答）
            };
        };
        
        // ---------- 主游戏组件: 拖拽配对人民币换算 ----------
        const ConversionGame = () => {
            const [currentQuestion, setCurrentQuestion] = useState(null);
            const [score, setScore] = useState(0);          // 答对题目数量
            const [message, setMessage] = useState("🐣 拖拽正确的答案卡片到兑换机里，完成人民币换算！");
            const [highlightDrop, setHighlightDrop] = useState(false);
            const [effectTrigger, setEffectTrigger] = useState(0);
            
            // 初始化/换题 (不重置分数)
            const loadNewQuestion = () => {
                const newQ = generateQuestion();
                setCurrentQuestion(newQ);
                setMessage("✨ 新题目！把正确卡片拖到兑换区 ✨");
                setEffectTrigger(prev => prev+1);
            };
            
            // 换一题按钮（手动刷新题目，不扣分，也不影响得分）
            const handleChangeQuestion = () => {
                if (currentQuestion && !currentQuestion.answered) {
                    // 未答对时换题，不扣分
                    loadNewQuestion();
                } else if (currentQuestion && currentQuestion.answered) {
                    // 已经答对的题目换题，正常刷新
                    loadNewQuestion();
                } else {
                    loadNewQuestion();
                }
                setHighlightDrop(false);
            };
            
            // 重置整个游戏 (可选，但不需要，这里只初始化)
            useEffect(() => {
                loadNewQuestion();
            }, []);
            
            // 处理拖拽放置 (兑换区接收)
            const handleDropOnZone = (e) => {
                e.preventDefault();
                setHighlightDrop(false);
                if (!currentQuestion) return;
                if (currentQuestion.answered) {
                    setMessage("🎉 这道题你已经答对了！点击「换一题」继续挑战吧～");
                    return;
                }
                let dragData;
                try {
                    const raw = e.dataTransfer.getData("text/plain");
                    if (!raw) return;
                    dragData = JSON.parse(raw);
                } catch(err) {
                    setMessage("请从右侧答案卡片上拖拽～");
                    return;
                }
                const { optionValue } = dragData;
                if (optionValue === undefined) return;
                
                // 验证答案
                if (optionValue === currentQuestion.answerValue) {
                    // 答对
                    setScore(prev => prev + 1);
                    setCurrentQuestion(prev => ({ ...prev, answered: true }));
                    setMessage(`🎉 完全正确！ ${currentQuestion.text} = ${currentQuestion.answerValue} ${currentQuestion.answerUnit} ！ +1分 🎉`);
                    setEffectTrigger(prev => prev+1);
                    // 动画: 放置区高亮弹跳
                    const zoneElem = document.getElementById('drop-zone');
                    if (zoneElem) {
                        zoneElem.classList.add('match-animation');
                        setTimeout(() => zoneElem.classList.remove('match-animation'), 400);
                    }
                    // 1秒后自动加载下一题 (让孩子有成就感)
                    setTimeout(() => {
                        loadNewQuestion();
                    }, 1200);
                } else {
                    // 答错
                    setMessage(`❌ 不对哦！ ${currentQuestion.text} 的答案不是 ${dragData.displayValue}，再试试看～ 记住换算口诀！`);
                    // 错误闪烁红色提示
                    const zoneElem = document.getElementById('drop-zone');
                    if (zoneElem) {
                        zoneElem.style.backgroundColor = "#fee2e2";
                        setTimeout(() => zoneElem.style.backgroundColor = "", 300);
                    }
                }
            };
            
            const onDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = "copy";
            };
            const onDragEnterZone = () => setHighlightDrop(true);
            const onDragLeaveZone = () => setHighlightDrop(false);
            
            // 卡片拖拽开始
            const onCardDragStart = (e, option) => {
                if (currentQuestion && currentQuestion.answered) {
                    e.preventDefault();
                    setMessage("本题已完成，请点击「换一题」继续挑战！");
                    return false;
                }
                e.dataTransfer.setData("text/plain", JSON.stringify({ 
                    optionValue: option.value,
                    displayValue: option.display 
                }));
                e.dataTransfer.effectAllowed = "copy";
                if (e.target) e.target.style.opacity = "0.6";
            };
            const onCardDragEnd = (e) => {
                if (e.target) e.target.style.opacity = "";
            };
            
            // 如果当前题目未加载，显示加载
            if (!currentQuestion) return <div className="text-white text-2xl">加载中...</div>;
            
            return (
                <div className="flex flex-col lg:flex-row gap-6 lg:gap-8">
                    {/* ========= 左侧知识点区 ========= */}
                    <div className="lg:w-2/5 bg-white/80 backdrop-blur-sm rounded-3xl shadow-xl p-5 md:p-6 border border-white/50">
                        <div className="border-b-4 border-lavender-primary pb-2 mb-4">
                            <h2 className="text-4xl md:text-5xl font-extrabold text-purple-800 flex items-center gap-2">
                                💱 人民币换算小课堂
                                <span className="text-xl bg-amber-200 px-3 py-1 rounded-full">元角分</span>
                            </h2>
                        </div>
                        <div className="space-y-4 text-lg md:text-xl text-gray-800 leading-relaxed">
                            <p className="flex gap-2">
                                <span className="text-3xl">💰</span>
                                <span><strong className="text-purple-700">人民币单位：</strong> 元、角、分。</span>
                            </p>
                            <div className="bg-gradient-to-r from-indigo-50 to-pink-50 p-4 rounded-2xl shadow-inner space-y-3">
                                <p className="font-bold text-2xl text-center text-purple-800">📖 换算口诀</p>
                                <div className="grid grid-cols-1 gap-2 text-center">
                                    <div className="bg-white/70 rounded-xl p-2 text-xl">⭐ 1元 = 10角</div>
                                    <div className="bg-white/70 rounded-xl p-2 text-xl">⭐ 1角 = 10分</div>
                                    <div className="bg-white/70 rounded-xl p-2 text-xl">⭐ 1元 = 100分</div>
                                </div>
                                <div className="bg-amber-50 rounded-xl p-2 text-center">
                                    <p>✨ 大单位 → 小单位：<strong>×10或×100</strong></p>
                                    <p>✨ 小单位 → 大单位：<strong>÷10或÷100</strong></p>
                                </div>
                            </div>
                            <div className="bg-purple-50 p-3 rounded-xl">
                                <p className="font-semibold">🧠 换算小技巧：</p>
                                <ul className="list-disc list-inside text-base space-y-1">
                                    <li>元换成角：加1个0</li>
                                    <li>角换成元：去掉1个0</li>
                                    <li>元换成分：加2个0</li>
                                </ul>
                            </div>
                            <div className="mt-2 text-sm text-center text-purple-600 bg-white/60 rounded-xl p-2">
                                💡 <span className="font-medium">游戏玩法：</span> 右侧每个“答案卡片”可以拖拽，把它放到左边的<strong>兑换机区域</strong>，匹配正确就能得分并自动换题！点击【换一题】可手动刷新题目。
                            </div>
                        </div>
                    </div>
                    
                    {/* ========= 右侧游戏互动区 (拖拽配对换算) ========= */}
                    <div className="lg:w-3/5 bg-white/80 backdrop-blur-md rounded-3xl shadow-xl p-5 md:p-6 flex flex-col gap-5">
                        <div className="flex justify-between items-center flex-wrap gap-3">
                            <h3 className="text-3xl md:text-4xl font-bold text-purple-800 flex items-center gap-2">
                                🧩 拖拖乐·兑换机
                                <span className="text-sm bg-yellow-200 px-2 py-0.5 rounded-full">拖拽答案</span>
                            </h3>
                            <div className="flex items-center gap-3">
                                <div className="bg-amber-100 rounded-full px-4 py-1 text-xl font-bold text-amber-800">
                                    🏆 得分: {score}
                                </div>
                                <button 
                                    onClick={handleChangeQuestion}
                                    className="bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white font-bold py-2 px-5 rounded-full shadow-lg transition transform hover:scale-105 text-lg"
                                >
                                    🔄 换一题
                                </button>
                            </div>
                        </div>
                        
                        {/* 动态消息区域 */}
                        <div className="bg-purple-100/80 rounded-xl p-3 text-center text-purple-800 font-medium text-base shadow-sm">
                            💬 {message}
                        </div>
                        
                        {/* 题目展示区 + 放置区（兑换机） */}
                        <div className="bg-white/60 rounded-2xl p-4 shadow-inner">
                            <div className="text-center mb-3">
                                <span className="text-2xl md:text-3xl font-bold text-purple-700 bg-purple-100 px-4 py-2 rounded-full inline-block">
                                    📝 当前挑战
                                </span>
                            </div>
                            <div className="text-center text-4xl md:text-5xl font-black text-purple-800 my-4">
                                {currentQuestion.text}
                            </div>
                            <div 
                                id="drop-zone"
                                onDragOver={onDragOver}
                                onDrop={handleDropOnZone}
                                onDragEnter={onDragEnterZone}
                                onDragLeave={onDragLeaveZone}
                                className={`answer-dropzone mt-2 p-5 rounded-2xl border-4 border-dashed transition-all duration-200 flex flex-col items-center justify-center ${
                                    highlightDrop ? 'drop-zone-active bg-yellow-100' : 'border-purple-300 bg-white/40'
                                } ${currentQuestion.answered ? 'bg-green-100/70 border-green-400' : ''}`}
                            >
                                {currentQuestion.answered ? (
                                    <div className="text-center">
                                        <span className="text-3xl">✅ 已答对！</span>
                                        <p className="text-xl text-green-700 mt-1">正确答案: {currentQuestion.answerValue} {currentQuestion.answerUnit}</p>
                                        <p className="text-sm text-gray-600">即将进入下一题...</p>
                                    </div>
                                ) : (
                                    <div className="text-center">
                                        <span className="text-2xl font-semibold text-purple-600">⬅️ 兑换区</span>
                                        <p className="text-md text-gray-500 mt-2">把正确的答案卡片拖拽到这里！</p>
                                        <div className="mt-2 text-sm bg-purple-50 inline-block px-3 py-1 rounded-full">✨ 拖拽卡片松手即可 ✨</div>
                                    </div>
                                )}
                            </div>
                        </div>
                        
                        {/* 可拖拽答案卡片区 */}
                        <div>
                            <h4 className="font-bold text-2xl text-purple-700 mb-2 flex items-center gap-2">🎴 答案卡片 (拖拽到兑换区)</h4>
                            <div className="flex flex-wrap gap-3 justify-center items-center min-h-[140px] bg-white/40 rounded-2xl p-4 custom-scroll overflow-x-auto">
                                {currentQuestion.options.map((opt, idx) => (
                                    <div 
                                        key={`${currentQuestion.id}_opt_${idx}`}
                                        draggable="true"
                                        onDragStart={(e) => onCardDragStart(e, opt)}
                                        onDragEnd={onCardDragEnd}
                                        className="bg-gradient-to-br from-amber-200 to-orange-300 w-32 h-28 rounded-2xl flex flex-col items-center justify-center shadow-lg cursor-grab active:cursor-grabbing transition hover:scale-105 select-none"
                                    >
                                        <span className="text-4xl mb-1">🃏</span>
                                        <span className="text-2xl font-black text-purple-900">{opt.display}</span>
                                        <span className="text-[10px] text-gray-700 mt-1">拖拽配对</span>
                                    </div>
                                ))}
                            </div>
                            <p className="text-xs text-center text-purple-600 mt-2">👉 按住或长按卡片，拖到上方「兑换区」松手，系统会自动判断对错！</p>
                        </div>
                        
                        {/* 额外小贴士 */}
                        <div className="flex flex-wrap justify-between items-center text-xs text-purple-600 bg-white/50 rounded-xl p-2 mt-1">
                            <span>✋ 拖拽技巧：从卡片拖到黄色虚线框内，答对自动加分并换题。</span>
                            <button onClick={() => setMessage("📢 记住：1元=10角，1角=10分。元化角加个0，角化分加个0，反过来去掉0。")} className="underline text-purple-700">❓ 再试一次提示</button>
                        </div>
                        
                        {/* 得分榜与鼓励 */}
                        <div className="flex justify-center gap-4 text-sm font-medium text-purple-800">
                            <div className="bg-white/50 rounded-full px-3 py-1">✅ 已答对 {score} 题</div>
                            <div className="bg-white/50 rounded-full px-3 py-1">🎯 继续挑战，成为换算高手！</div>
                        </div>
                    </div>
                </div>
            );
        };
        
        // ---------- 根组件 ----------
        const App = () => {
            return (
                <div className="min-h-screen py-2">
                    <div className="text-center mb-5 mt-1">
                        <h1 className="text-5xl md:text-7xl font-black text-white drop-shadow-xl tracking-wider" style={{textShadow: "3px 3px 0 #7e22ce"}}>
                            💰 人民币换算大挑战 · 小小兑换员 🧸
                        </h1>
                        <p className="text-white/90 text-xl md:text-2xl mt-2 font-medium">拖拽卡片到兑换机，轻松学会元角分换算！</p>
                    </div>
                    <ConversionGame />
                    <footer className="text-center text-white/80 text-sm mt-8 pb-3">
                        🌟 把答案卡片拖拽到兑换区，配对正确获得分数，自动换题～ 点击【换一题】可手动刷新题目 🌟
                    </footer>
                </div>
            );
        };
        
        // 渲染
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
