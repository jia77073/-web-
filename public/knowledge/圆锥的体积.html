<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>数学冒险岛 · 圆锥的体积大挑战</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM & Babel CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        /* 自定义拖拽与移动端优化 */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        .drag-card {
            transition: all 0.2s ease;
            cursor: grab;
            user-select: none;
            touch-action: manipulation;
        }
        .drag-card:active {
            cursor: grabbing;
            opacity: 0.7;
        }
        .drop-zone {
            transition: all 0.2s ease;
        }
        .drop-zone.drag-over {
            background-color: #f0e4ff;
            border-color: #9333ea;
            transform: scale(1.02);
            box-shadow: 0 6px 14px rgba(147, 51, 234, 0.25);
        }
        /* 大字体 (6号 ≈ 18px以上) */
        .big-text {
            font-size: 1.25rem;
            line-height: 1.45;
        }
        @media (min-width: 768px) {
            .big-text {
                font-size: 1.5rem;
            }
        }
        .knowledge-text {
            font-size: 1rem;
            line-height: 1.5;
        }
        @media (min-width: 768px) {
            .knowledge-text {
                font-size: 1.2rem;
            }
        }
        [draggable="true"] {
            -webkit-user-drag: element;
        }
        .volume-badge {
            background: linear-gradient(135deg, #fde68a, #fcd34d);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#CBAACB] to-[#D9C2E6] min-h-screen p-4 md:p-6 font-sans">

<div id="root" class="max-w-7xl mx-auto"></div>

<script type="text/babel">
    // 圆锥的体积互动课程 (知识点 + 拖拽配对游戏)
    const ConeVolumeGame = () => {
        // ---------- 圆锥体积知识点 (左侧) ----------
        const coneVolumeKnowledge = {
            title: "📐 圆锥的体积",
            definition: "圆锥所占空间的大小叫做圆锥的体积。",
            formula: "体积公式：V = 1/3 × 底面积 × 高 = 1/3 × π × r² × h",
            relationship: "✨ 重要关系：等底等高的圆锥体积是圆柱体积的 1/3，圆柱体积是圆锥的 3 倍。",
            derivation: "🔍 推导：通过实验（倒水、倒沙）发现，圆锥体积等于与它等底等高圆柱体积的三分之一。",
            example: "🎯 例题：圆锥底面半径 r=3 cm，高 h=6 cm，体积 = 1/3 × 3.14 × 3² × 6 = 1/3 × 3.14 × 9 × 6 = 56.52 cm³",
            lifeExamples: "🍦 冰淇淋甜筒、🎉 生日帽、沙堆"
        };
        
        // ---------- 游戏配置：拖拽配对（三个核心配对区）----------
        // 三个配对区域，每个区域有一个问题描述，需要匹配正确答案
        const targetZones = [
            { 
                id: "coeff", 
                question: "圆锥的体积 = ___ × 底面积 × 高", 
                description: "缺失的系数是什么？",
                icon: "🔢",
                correctAnswerId: "card_coeff" 
            },
            { 
                id: "relation", 
                question: "与圆锥等底等高的圆柱体积是圆锥体积的 ___ 倍", 
                description: "圆柱和圆锥的体积倍数关系",
                icon: "⚖️",
                correctAnswerId: "card_relation" 
            },
            { 
                id: "formula", 
                question: "圆锥体积的字母公式是 V = ___", 
                description: "用 r 和 h 表示",
                icon: "📝",
                correctAnswerId: "card_formula" 
            }
        ];
        
        // 可拖拽卡片池（正确卡片 + 1个干扰卡片）
        const initialCards = [
            { id: "card_coeff", text: "1/3", description: "三分之一的系数", emoji: "🧮", correctFor: "coeff", isCorrect: true },
            { id: "card_relation", text: "3 倍", description: "圆柱体积是圆锥体积的3倍", emoji: "✨", correctFor: "relation", isCorrect: true },
            { id: "card_formula", text: "1/3 × π × r² × h", description: "圆锥体积完整公式", emoji: "📐", correctFor: "formula", isCorrect: true },
            { id: "card_distractor", text: "π × r² × h", description: "这是圆柱的体积公式，不是圆锥的哦", emoji: "⚠️", correctFor: null, isCorrect: false }
        ];
        
        // 游戏状态
        const [availableCards, setAvailableCards] = React.useState(initialCards);
        const [matchedZones, setMatchedZones] = React.useState({
            coeff: null,
            relation: null,
            formula: null
        });
        const [message, setMessage] = React.useState({ text: "🐣 把正确的答案卡片拖拽到对应的宝箱里！长按卡片并拖动～", type: "info" });
        const [gameWin, setGameWin] = React.useState(false);
        
        const draggingCardIdRef = React.useRef(null);
        
        // 检查胜利（三个区域全部配对）
        React.useEffect(() => {
            const allMatched = targetZones.every(zone => matchedZones[zone.id] !== null);
            if (allMatched && !gameWin) {
                setGameWin(true);
                setMessage({ text: "🎉 太棒啦！你完全掌握了圆锥的体积公式！成为几何小英雄！ 🎉", type: "success" });
            } else if (!allMatched && gameWin) {
                setGameWin(false);
            }
        }, [matchedZones, gameWin]);
        
        // 显示临时消息（自动恢复）
        const showMessage = (msg, msgType = "error", duration = 2000) => {
            setMessage({ text: msg, type: msgType });
            setTimeout(() => {
                setMessage(prev => prev.text === msg ? { text: "✨ 继续挑战！把正确卡片拖到对应的问题区域吧～", type: "info" } : prev);
            }, duration);
        };
        
        // 拖拽开始
        const handleDragStart = (e, cardId) => {
            const card = availableCards.find(c => c.id === cardId);
            if (!card) {
                e.preventDefault();
                showMessage("⛔ 这张卡片已经配对过啦！试试重置游戏吧", "error");
                return false;
            }
            draggingCardIdRef.current = cardId;
            e.dataTransfer.setData("text/plain", cardId);
            e.dataTransfer.effectAllowed = "copy";
            if (e.target) e.target.style.opacity = "0.6";
            return true;
        };
        
        const handleDragEnd = (e) => {
            if (e.target) e.target.style.opacity = "";
            draggingCardIdRef.current = null;
        };
        
        const handleDragOver = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "copy";
        };
        
        // 高亮效果
        const handleDragEnter = (e, zoneId) => {
            e.preventDefault();
            const zoneElem = document.getElementById(`dropzone-${zoneId}`);
            if (zoneElem) zoneElem.classList.add("drag-over");
        };
        
        const handleDragLeave = (e, zoneId) => {
            const zoneElem = document.getElementById(`dropzone-${zoneId}`);
            if (zoneElem) zoneElem.classList.remove("drag-over");
        };
        
        // 核心放置逻辑：验证卡片是否匹配该区域
        const handleDrop = (e, targetZone) => {
            e.preventDefault();
            const zoneElem = document.getElementById(`dropzone-${targetZone.id}`);
            if (zoneElem) zoneElem.classList.remove("drag-over");
            
            let draggedId = draggingCardIdRef.current;
            if (!draggedId) draggedId = e.dataTransfer.getData("text/plain");
            if (!draggedId) return;
            
            const draggedCard = availableCards.find(card => card.id === draggedId);
            if (!draggedCard) {
                showMessage("这张卡片已经配对过了，重置后可重新挑战", "error");
                return;
            }
            
            // 检查该区域是否已配对
            if (matchedZones[targetZone.id] !== null) {
                showMessage(`❌ 这个宝箱已经配对成功了！不能重复放置。重置后可再次挑战~`, "error");
                return;
            }
            
            // 验证是否匹配
            const isMatching = (draggedCard.correctFor === targetZone.id);
            if (isMatching) {
                // 配对正确：从 availableCards 移除，更新 matchedZones
                setAvailableCards(prev => prev.filter(card => card.id !== draggedId));
                setMatchedZones(prev => ({
                    ...prev,
                    [targetZone.id]: draggedCard
                }));
                showMessage(`✅ 正确！“${draggedCard.text}” 正是这个问题的答案！超棒！`, "success", 1500);
            } else {
                // 配对错误
                if (draggedCard.correctFor === null) {
                    showMessage(`❌ 哎呀！“${draggedCard.text}” 不是圆锥体积的正确知识哦！再试试正确的卡片吧～`, "error", 1800);
                } else {
                    showMessage(`❌ 配对错误！“${draggedCard.text}” 不匹配这个问题，再仔细观察一下！`, "error", 1800);
                }
            }
            draggingCardIdRef.current = null;
        };
        
        // 重置游戏
        const resetGame = () => {
            setAvailableCards(initialCards);
            setMatchedZones({ coeff: null, relation: null, formula: null });
            setGameWin(false);
            setMessage({ text: "🔄 游戏已重置！所有卡片重新出现，再挑战一次吧！", type: "info" });
            draggingCardIdRef.current = null;
            document.querySelectorAll('.drop-zone').forEach(el => el.classList.remove('drag-over'));
        };
        
        const matchedCount = Object.values(matchedZones).filter(v => v !== null).length;
        const totalNeeded = targetZones.length;
        
        return (
            <div className="w-full">
                <div className="flex flex-col lg:flex-row gap-6 lg:gap-8">
                    {/* ================= 左侧：圆锥体积知识星球 ================= */}
                    <div className="lg:w-5/12 bg-white/85 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 border border-white/40 transition-all">
                        <div className="flex items-center gap-2 border-b-4 border-purple-300 pb-3 mb-4">
                            <span className="text-4xl">📖</span>
                            <h2 className="text-3xl md:text-4xl font-extrabold text-purple-800">体积小讲堂</h2>
                            <span className="text-sm bg-purple-200 px-3 py-1 rounded-full ml-2">圆锥 · 体积</span>
                        </div>
                        
                        {/* 圆锥体积核心内容 */}
                        <div className="bg-gradient-to-r from-amber-50 to-orange-50 p-4 rounded-2xl shadow-md mb-5">
                            <div className="flex justify-center items-center gap-4 mb-3">
                                <div className="text-center">
                                    <div className="text-6xl volume-badge rounded-full w-20 h-20 flex items-center justify-center shadow-md">🎩</div>
                                    <div className="text-sm text-gray-500 mt-1">圆锥</div>
                                </div>
                                <div className="border-l-2 border-purple-300 h-12"></div>
                                <div>
                                    <p className="text-base font-bold text-purple-700">r = 半径 &nbsp; | &nbsp; h = 高</p>
                                </div>
                            </div>
                            <div className="knowledge-text text-gray-800 space-y-3">
                                <p className="font-bold text-xl text-amber-700">{coneVolumeKnowledge.title}</p>
                                <p className="bg-white/60 p-2 rounded-lg">✨ {coneVolumeKnowledge.definition}</p>
                                <div className="bg-indigo-50 p-3 rounded-xl text-indigo-800 font-mono text-center text-lg">
                                    📐 {coneVolumeKnowledge.formula}
                                </div>
                                <div className="bg-green-50 p-3 rounded-xl text-green-700 text-sm md:text-base">
                                    💡 {coneVolumeKnowledge.relationship}
                                </div>
                                <div className="bg-cyan-50 p-3 rounded-xl text-cyan-700 text-sm md:text-base">
                                    🔍 {coneVolumeKnowledge.derivation}
                                </div>
                                <div className="bg-yellow-50 p-3 rounded-xl text-yellow-800 text-sm">
                                    📌 {coneVolumeKnowledge.example}
                                </div>
                                <div className="bg-purple-50 p-2 rounded-lg text-purple-600 text-sm italic">
                                    🎨 生活中的圆锥：{coneVolumeKnowledge.lifeExamples}
                                </div>
                            </div>
                        </div>
                        <div className="mt-2 text-center text-purple-600 bg-purple-100/60 rounded-xl p-2 text-sm md:text-base">
                            🌟 记住 V = 1/3 × πr²h，玩配对游戏，轻松掌握圆锥体积！
                        </div>
                    </div>
                    
                    {/* ================= 右侧：互动配对游戏（拖拽配对） ================= */}
                    <div className="lg:w-7/12 bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 flex flex-col border border-purple-200">
                        <div className="flex flex-wrap justify-between items-center gap-3 border-b-2 border-purple-300 pb-3 mb-4">
                            <div className="flex items-center gap-2">
                                <span className="text-3xl">🎮</span>
                                <h2 className="text-3xl md:text-4xl font-extrabold text-purple-800">公式配对工坊</h2>
                                <span className="text-sm bg-yellow-200 px-2 py-1 rounded-full">拖拽配对</span>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="bg-purple-100 rounded-full px-4 py-1 text-purple-700 font-bold text-lg">
                                    配对进度 {matchedCount}/{totalNeeded}
                                </div>
                                <button 
                                    onClick={resetGame}
                                    className="bg-amber-400 hover:bg-amber-500 text-amber-900 font-bold py-2 px-4 rounded-full shadow-md transition transform hover:scale-105 text-base md:text-lg flex items-center gap-1"
                                >
                                    🔄 重置游戏
                                </button>
                            </div>
                        </div>
                        
                        {/* 全局消息提示 */}
                        <div className={`mb-4 p-3 rounded-xl text-center font-medium transition-all big-text ${message.type === 'error' ? 'bg-red-100 text-red-700 border border-red-300' : message.type === 'success' ? 'bg-green-100 text-green-700 border border-green-300' : 'bg-indigo-50 text-indigo-600 border border-indigo-200'}`}>
                            {message.text}
                        </div>
                        
                        {/* 三个配对区域 (问题宝箱) */}
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">
                            {targetZones.map(zone => {
                                const matchedCard = matchedZones[zone.id];
                                return (
                                    <div 
                                        key={zone.id}
                                        className="bg-gradient-to-b from-purple-50 to-white rounded-2xl shadow-lg overflow-hidden border-2 border-purple-200 transition-all hover:shadow-xl"
                                    >
                                        <div className="bg-purple-200/70 p-3 text-center">
                                            <div className="text-3xl">{zone.icon}</div>
                                            <h3 className="text-lg font-black text-purple-800">问题宝箱</h3>
                                            <p className="text-xs text-purple-600">{zone.description}</p>
                                        </div>
                                        <div className="p-3 bg-white/50">
                                            <p className="font-bold text-indigo-700 text-sm md:text-base mb-2">{zone.question}</p>
                                        </div>
                                        <div 
                                            id={`dropzone-${zone.id}`}
                                            onDragOver={handleDragOver}
                                            onDragEnter={(e) => handleDragEnter(e, zone.id)}
                                            onDragLeave={(e) => handleDragLeave(e, zone.id)}
                                            onDrop={(e) => handleDrop(e, zone)}
                                            className={`drop-zone m-3 p-3 min-h-[100px] rounded-xl border-2 border-dashed transition-all flex flex-col items-center justify-center text-center ${
                                                matchedCard ? 'bg-green-100 border-green-400 shadow-inner' : 'bg-white/70 border-purple-300'
                                            }`}
                                        >
                                            {matchedCard ? (
                                                <div className="flex flex-col items-center gap-1">
                                                    <span className="text-4xl">🏆</span>
                                                    <p className="font-bold text-green-700 text-lg">已配对</p>
                                                    <p className="text-base bg-green-50 px-3 py-1 rounded-full font-mono font-bold text-green-800">
                                                        {matchedCard.text}
                                                    </p>
                                                    <p className="text-xs text-gray-500 mt-1">{matchedCard.description}</p>
                                                </div>
                                            ) : (
                                                <div className="text-center">
                                                    <span className="text-4xl block mb-2">⬇️✨</span>
                                                    <p className="text-purple-500 font-medium text-base">拖放答案卡片到这里</p>
                                                    <p className="text-xs text-gray-400 mt-1">匹配正确填空</p>
                                                </div>
                                            )}
                                        </div>
                                        <div className="p-1 text-center text-xs text-gray-400">
                                            正确配对点亮✔️
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        
                        {/* 可拖拽卡片池 */}
                        <div className="mt-2">
                            <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
                                <h3 className="text-2xl font-bold text-purple-700 flex items-center gap-2">
                                    🃏 答案卡片池
                                    <span className="text-sm bg-yellow-200 px-2 py-1 rounded-full">长按/鼠标拖拽</span>
                                </h3>
                                <span className="text-xs md:text-sm text-purple-500">💡 把卡片拖到上方对应的宝箱里</span>
                            </div>
                            
                            {availableCards.length === 0 ? (
                                <div className="bg-gradient-to-r from-green-100 to-emerald-100 p-6 rounded-2xl text-center text-green-700 text-xl font-bold">
                                    🎉 完美！所有答案都配对成功！ 你已经是圆锥体积高手啦 🎉
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4">
                                    {availableCards.map(card => (
                                        <div
                                            key={card.id}
                                            draggable={true}
                                            onDragStart={(e) => handleDragStart(e, card.id)}
                                            onDragEnd={handleDragEnd}
                                            className="drag-card bg-gradient-to-br from-amber-200 to-orange-200 rounded-2xl p-3 shadow-md flex items-center gap-3 cursor-grab active:cursor-grabbing hover:shadow-xl transition-all transform hover:scale-[1.02]"
                                        >
                                            <div className="text-4xl">{card.emoji}</div>
                                            <div className="flex-1">
                                                <p className="font-bold text-gray-800 text-lg md:text-xl">{card.text}</p>
                                                <p className="text-xs text-amber-800 mt-1">{card.description}</p>
                                                <p className="text-[10px] text-purple-600 mt-0.5">👉 拖拽配对</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            {/* 玩法说明 + 拖拽互动提示 */}
                            <div className="mt-5 bg-purple-100/70 p-3 rounded-xl text-purple-700 text-sm flex flex-wrap gap-2 justify-center items-center">
                                <span>📌 <strong>拖拉拽玩法：</strong></span>
                                <span>① 手指/鼠标长按答案卡片</span>
                                <span>② 拖拽到上方对应的问题宝箱（缺失系数/倍数关系/字母公式）</span>
                                <span>③ 配对正确卡片会飞入宝箱并显示配对成功！</span>
                                <span>🎯 集齐三个正确答案赢得胜利 ✨</span>
                            </div>
                            
                            {gameWin && (
                                <div className="mt-4 bg-gradient-to-r from-green-200 to-teal-200 text-green-800 p-4 rounded-2xl text-center text-xl font-bold animate-pulse flex items-center justify-center gap-3 shadow-lg">
                                    🏆 恭喜你完成全部配对！🏆 <span className="text-3xl">🎓🏅</span>
                                </div>
                            )}
                        </div>
                        <div className="mt-3 text-center text-xs text-purple-500">
                            💡 移动端小技巧：长按卡片并轻轻拖拽到目标区上方，松手即可。如果拖拽不顺畅，可以稍微慢一点移动~
                        </div>
                    </div>
                </div>
                {/* 底部装饰 */}
                <div className="text-center mt-8 text-purple-800 text-sm bg-white/30 rounded-full py-2 px-4 w-fit mx-auto backdrop-blur-sm">
                    🌈 牢记圆锥体积 V = 1/3 × πr²h，玩转拖拽配对，数学 so easy！ 🌟
                </div>
            </div>
        );
    };
    
    // 渲染到根节点
    ReactDOM.createRoot(document.getElementById("root")).render(
        <React.StrictMode>
            <ConeVolumeGame />
        </React.StrictMode>
    );
</script>
</body>
</html>
