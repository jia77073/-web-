<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>位置与方向 · 东南西北大冒险</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM & Babel CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        /* 拖拽优化 + 移动端友好 */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        .drag-card {
            transition: all 0.2s ease;
            cursor: grab;
            user-select: none;
            touch-action: manipulation;
        }
        .drag-card:active {
            cursor: grabbing;
            opacity: 0.7;
        }
        .drop-zone {
            transition: all 0.2s ease;
        }
        .drop-zone.drag-over {
            background-color: #f1e2ff;
            border-color: #9333ea;
            transform: scale(1.02);
            box-shadow: 0 6px 14px rgba(147, 51, 234, 0.25);
        }
        /* 大字体 (6号 ≈ 18px以上) */
        .big-text {
            font-size: 1.25rem;
            line-height: 1.45;
        }
        @media (min-width: 768px) {
            .big-text {
                font-size: 1.5rem;
            }
        }
        .knowledge-text {
            font-size: 1rem;
            line-height: 1.5;
        }
        @media (min-width: 768px) {
            .knowledge-text {
                font-size: 1.2rem;
            }
        }
        [draggable="true"] {
            -webkit-user-drag: element;
        }
        .compass {
            background: radial-gradient(circle at 30% 30%, rgba(255,255,200,0.3), rgba(255,215,150,0.2));
            backdrop-filter: blur(2px);
        }
        .direction-btn {
            transition: all 0.1s ease;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#CBAACB] to-[#D9C2E6] min-h-screen p-4 md:p-6 font-sans">

<div id="root" class="max-w-7xl mx-auto"></div>

<script type="text/babel">
    // 认识东南西北互动课程 (知识点 + 拖拽配对游戏)
    const DirectionGame = () => {
        // ---------- 知识点内容 (左侧) ----------
        const knowledgePoints = {
            title: "🧭 认识东南西北",
            intro: "东、南、西、北是四个基本方向，可以帮助我们确定位置和路线。",
            rules: [
                "🔹 东：早晨太阳升起的方向。",
                "🔹 南：中午太阳在南方，影子指向北。",
                "🔹 西：傍晚太阳落下的方向。",
                "🔹 北：北极星所在的方向，与南相对。",
                "🔹 相对关系：东对西，南对北。"
            ],
            relative: "✨ 如果知道一个方向，就可以推出其他三个方向：面朝北，背后是南，左西右东。",
            mapTip: "🗺️ 平面图上通常规定：上北、下南、左西、右东。",
            walkingTip: "🚶 描述路线：向（东/南/西/北）走，再向…… 就能到达目的地。"
        };
        
        // ---------- 游戏配置：方向配对挑战 ----------
        // 场景：小明站在中心，周围有四个地标：学校、公园、医院、超市
        // 正确的方向：学校在北，公园在东，医院在南，超市在西
        const landmarks = [
            { id: "school", name: "学校", icon: "🏫", correctDirection: "北", description: "学校在小明的北面" },
            { id: "park", name: "公园", icon: "🌳", correctDirection: "东", description: "公园在小明的东面" },
            { id: "hospital", name: "医院", icon: "🏥", correctDirection: "南", description: "医院在小明的南面" },
            { id: "supermarket", name: "超市", icon: "🛒", correctDirection: "西", description: "超市在小明的西面" }
        ];
        
        // 可拖拽的方向卡片（每个卡片代表一个方向）
        const directionCards = [
            { id: "card_north", text: "北", emoji: "⬆️", direction: "北", description: "北方向" },
            { id: "card_south", text: "南", emoji: "⬇️", direction: "南", description: "南方向" },
            { id: "card_west", text: "西", emoji: "⬅️", direction: "西", description: "西方向" },
            { id: "card_east", text: "东", emoji: "➡️", direction: "东", description: "东方向" }
        ];
        
        // 游戏状态
        const [availableCards, setAvailableCards] = React.useState(directionCards);
        const [matchedLandmarks, setMatchedLandmarks] = React.useState({}); // key: landmarkId, value: direction
        const [message, setMessage] = React.useState({ text: "🐣 把方向卡片拖拽到对应的地标位置！长按卡片并拖动～", type: "info" });
        const [gameWin, setGameWin] = React.useState(false);
        
        const draggingCardRef = React.useRef(null);
        
        // 检查胜利
        React.useEffect(() => {
            const allMatched = landmarks.every(landmark => matchedLandmarks[landmark.id] !== undefined);
            if (allMatched && !gameWin) {
                setGameWin(true);
                setMessage({ text: "🎉 太棒啦！你完全掌握了东南西北！现在可以辨认方向啦！ 🎉", type: "success" });
            } else if (!allMatched && gameWin) {
                setGameWin(false);
            }
        }, [matchedLandmarks, gameWin]);
        
        const showMessage = (msg, msgType = "error", duration = 2000) => {
            setMessage({ text: msg, type: msgType });
            setTimeout(() => {
                setMessage(prev => prev.text === msg ? { text: "✨ 继续拖拽配对，把方向卡片放到正确的地标旁！", type: "info" } : prev);
            }, duration);
        };
        
        // 拖拽开始
        const handleDragStart = (e, card) => {
            if (!availableCards.some(c => c.id === card.id)) {
                e.preventDefault();
                showMessage("⛔ 这张方向卡片已经配对过了！点击「重置游戏」可以重新挑战", "error");
                return false;
            }
            draggingCardRef.current = card;
            e.dataTransfer.setData("text/plain", card.id);
            e.dataTransfer.effectAllowed = "copy";
            if (e.target) e.target.style.opacity = "0.6";
            return true;
        };
        
        const handleDragEnd = (e) => {
            if (e.target) e.target.style.opacity = "";
            draggingCardRef.current = null;
        };
        
        const handleDragOver = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "copy";
        };
        
        // 高亮效果
        const handleDragEnter = (e, landmarkId) => {
            e.preventDefault();
            const zoneElem = document.getElementById(`dropzone-${landmarkId}`);
            if (zoneElem) zoneElem.classList.add("drag-over");
        };
        
        const handleDragLeave = (e, landmarkId) => {
            const zoneElem = document.getElementById(`dropzone-${landmarkId}`);
            if (zoneElem) zoneElem.classList.remove("drag-over");
        };
        
        // 放置逻辑：将方向卡片配对到地标
        const handleDrop = (e, targetLandmark) => {
            e.preventDefault();
            const zoneElem = document.getElementById(`dropzone-${targetLandmark.id}`);
            if (zoneElem) zoneElem.classList.remove("drag-over");
            
            let draggedCard = draggingCardRef.current;
            if (!draggedCard) {
                const cardId = e.dataTransfer.getData("text/plain");
                draggedCard = directionCards.find(c => c.id === cardId);
            }
            if (!draggedCard) return;
            
            if (!availableCards.some(c => c.id === draggedCard.id)) {
                showMessage(`❌ 方向“${draggedCard.text}”已经配对过了！`, "error");
                return;
            }
            
            if (matchedLandmarks[targetLandmark.id] !== undefined) {
                showMessage(`❌ ${targetLandmark.name} 已经配对过了！不能重复放置。`, "error");
                return;
            }
            
            const isCorrect = (draggedCard.direction === targetLandmark.correctDirection);
            if (isCorrect) {
                setAvailableCards(prev => prev.filter(card => card.id !== draggedCard.id));
                setMatchedLandmarks(prev => ({
                    ...prev,
                    [targetLandmark.id]: draggedCard.direction
                }));
                showMessage(`✅ 正确！${targetLandmark.name} 在 ${targetLandmark.correctDirection} 面，配对成功！`, "success", 1500);
            } else {
                showMessage(`❌ 配对错误！${targetLandmark.name} 不在 ${draggedCard.text} 面，应该在 ${targetLandmark.correctDirection} 面。再试试看～`, "error", 1800);
            }
            draggingCardRef.current = null;
        };
        
        // 重置游戏
        const resetGame = () => {
            setAvailableCards(directionCards);
            setMatchedLandmarks({});
            setGameWin(false);
            setMessage({ text: "🔄 游戏已重置！所有方向卡片重新出现，再挑战一次吧！", type: "info" });
            draggingCardRef.current = null;
            document.querySelectorAll('.drop-zone').forEach(el => el.classList.remove('drag-over'));
        };
        
        const matchedCount = Object.keys(matchedLandmarks).length;
        const totalLandmarks = landmarks.length;
        
        // 渲染方向指示罗盘（辅助）
        const CompassRose = () => (
            <div className="compass bg-white/50 rounded-2xl p-3 mt-2 text-center">
                <div className="grid grid-cols-3 gap-1 max-w-[200px] mx-auto">
                    <div></div>
                    <div className="text-xl font-bold text-red-600">北(N)</div>
                    <div></div>
                    <div className="text-xl font-bold text-blue-600">西(W)</div>
                    <div className="text-2xl">🧭</div>
                    <div className="text-xl font-bold text-blue-600">东(E)</div>
                    <div></div>
                    <div className="text-xl font-bold text-green-600">南(S)</div>
                    <div></div>
                </div>
                <p className="text-xs text-gray-600 mt-1">上北下南，左西右东</p>
            </div>
        );
        
        return (
            <div className="w-full">
                <div className="flex flex-col lg:flex-row gap-6 lg:gap-8">
                    {/* ================= 左侧：知识点区域 ================= */}
                    <div className="lg:w-5/12 bg-white/85 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 border border-white/40 transition-all">
                        <div className="flex items-center gap-2 border-b-4 border-purple-300 pb-3 mb-4">
                            <span className="text-4xl">🧭</span>
                            <h2 className="text-3xl md:text-4xl font-extrabold text-purple-800">方向小讲堂</h2>
                            <span className="text-sm bg-purple-200 px-3 py-1 rounded-full ml-2">东南西北</span>
                        </div>
                        <div className="knowledge-text text-gray-800 space-y-4">
                            <p className="text-xl font-bold text-indigo-700">{knowledgePoints.title}</p>
                            <p className="bg-white/60 p-3 rounded-xl">✨ {knowledgePoints.intro}</p>
                            <ul className="list-disc list-inside space-y-1 bg-purple-50 p-3 rounded-xl">
                                {knowledgePoints.rules.map((item, idx) => <li key={idx}>{item}</li>)}
                            </ul>
                            <div className="bg-amber-50 p-3 rounded-xl text-amber-800 text-sm">
                                {knowledgePoints.relative}
                            </div>
                            <div className="bg-cyan-50 p-2 rounded-lg text-cyan-700 text-sm italic">
                                {knowledgePoints.mapTip}
                            </div>
                            <div className="bg-green-50 p-2 rounded-lg text-green-700 text-sm">
                                {knowledgePoints.walkingTip}
                            </div>
                            {CompassRose()}
                            <div className="bg-purple-100 p-3 rounded-xl text-purple-700 text-xs">
                                💡 小技巧：早晨起床，面向太阳，前面是东，后面是西，左面是北，右面是南。
                            </div>
                        </div>
                        <div className="mt-4 text-center text-purple-600 bg-purple-100/60 rounded-xl p-2 text-sm md:text-base">
                            🌟 记住方向口诀，拖拽配对，成为方向小达人！
                        </div>
                    </div>
                    
                    {/* ================= 右侧：互动游戏区 ================= */}
                    <div className="lg:w-7/12 bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 flex flex-col border border-purple-200">
                        <div className="flex flex-wrap justify-between items-center gap-3 border-b-2 border-purple-300 pb-3 mb-4">
                            <div className="flex items-center gap-2">
                                <span className="text-3xl">🎮</span>
                                <h2 className="text-3xl md:text-4xl font-extrabold text-purple-800">方向配对工坊</h2>
                                <span className="text-sm bg-yellow-200 px-2 py-1 rounded-full">拖拽配对</span>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="bg-purple-100 rounded-full px-4 py-1 text-purple-700 font-bold text-lg">
                                    配对进度 {matchedCount}/{totalLandmarks}
                                </div>
                                <button 
                                    onClick={resetGame}
                                    className="bg-amber-400 hover:bg-amber-500 text-amber-900 font-bold py-2 px-4 rounded-full shadow-md transition transform hover:scale-105 text-base md:text-lg flex items-center gap-1"
                                >
                                    🔄 重置游戏
                                </button>
                            </div>
                        </div>
                        
                        {/* 消息提示 */}
                        <div className={`mb-4 p-3 rounded-xl text-center font-medium transition-all big-text ${message.type === 'error' ? 'bg-red-100 text-red-700 border border-red-300' : message.type === 'success' ? 'bg-green-100 text-green-700 border border-green-300' : 'bg-indigo-50 text-indigo-600 border border-indigo-200'}`}>
                            {message.text}
                        </div>
                        
                        {/* 场景：小明站在中心，四个地标环绕 */}
                        <div className="relative bg-gradient-to-b from-sky-100 to-amber-50 rounded-3xl p-4 mb-6 shadow-inner">
                            <p className="text-center font-bold text-purple-800 mb-2">📍 小明在中心，周围有四个地标</p>
                            <div className="relative min-h-[320px] flex flex-col items-center justify-center">
                                {/* 北 - 学校 */}
                                <div className="absolute top-2 left-1/2 transform -translate-x-1/2 w-28 text-center">
                                    <div className="bg-white/80 rounded-xl p-2 shadow-md flex flex-col items-center">
                                        <span className="text-3xl">🏫</span>
                                        <p className="font-bold text-sm">学校</p>
                                        <div 
                                            id={`dropzone-school`}
                                            onDragOver={handleDragOver}
                                            onDragEnter={(e) => handleDragEnter(e, "school")}
                                            onDragLeave={(e) => handleDragLeave(e, "school")}
                                            onDrop={(e) => handleDrop(e, landmarks[0])}
                                            className={`drop-zone mt-1 w-full p-1 rounded-lg border-2 border-dashed transition-all text-center ${
                                                matchedLandmarks.school ? 'bg-green-100 border-green-400' : 'bg-white/60 border-purple-300'
                                            }`}
                                        >
                                            {matchedLandmarks.school ? (
                                                <span className="text-green-700 text-sm font-bold">✅ 北</span>
                                            ) : (
                                                <span className="text-purple-500 text-xs">⬇️ 拖拽方向</span>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                {/* 南 - 医院 */}
                                <div className="absolute bottom-2 left-1/2 transform -translate-x-1/2 w-28 text-center">
                                    <div className="bg-white/80 rounded-xl p-2 shadow-md flex flex-col items-center">
                                        <span className="text-3xl">🏥</span>
                                        <p className="font-bold text-sm">医院</p>
                                        <div 
                                            id={`dropzone-hospital`}
                                            onDragOver={handleDragOver}
                                            onDragEnter={(e) => handleDragEnter(e, "hospital")}
                                            onDragLeave={(e) => handleDragLeave(e, "hospital")}
                                            onDrop={(e) => handleDrop(e, landmarks[2])}
                                            className={`drop-zone mt-1 w-full p-1 rounded-lg border-2 border-dashed transition-all text-center ${
                                                matchedLandmarks.hospital ? 'bg-green-100 border-green-400' : 'bg-white/60 border-purple-300'
                                            }`}
                                        >
                                            {matchedLandmarks.hospital ? (
                                                <span className="text-green-700 text-sm font-bold">✅ 南</span>
                                            ) : (
                                                <span className="text-purple-500 text-xs">⬇️ 拖拽方向</span>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                {/* 西 - 超市 */}
                                <div className="absolute left-2 top-1/2 transform -translate-y-1/2 w-28 text-center">
                                    <div className="bg-white/80 rounded-xl p-2 shadow-md flex flex-col items-center">
                                        <span className="text-3xl">🛒</span>
                                        <p className="font-bold text-sm">超市</p>
                                        <div 
                                            id={`dropzone-supermarket`}
                                            onDragOver={handleDragOver}
                                            onDragEnter={(e) => handleDragEnter(e, "supermarket")}
                                            onDragLeave={(e) => handleDragLeave(e, "supermarket")}
                                            onDrop={(e) => handleDrop(e, landmarks[3])}
                                            className={`drop-zone mt-1 w-full p-1 rounded-lg border-2 border-dashed transition-all text-center ${
                                                matchedLandmarks.supermarket ? 'bg-green-100 border-green-400' : 'bg-white/60 border-purple-300'
                                            }`}
                                        >
                                            {matchedLandmarks.supermarket ? (
                                                <span className="text-green-700 text-sm font-bold">✅ 西</span>
                                            ) : (
                                                <span className="text-purple-500 text-xs">⬇️ 拖拽方向</span>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                {/* 东 - 公园 */}
                                <div className="absolute right-2 top-1/2 transform -translate-y-1/2 w-28 text-center">
                                    <div className="bg-white/80 rounded-xl p-2 shadow-md flex flex-col items-center">
                                        <span className="text-3xl">🌳</span>
                                        <p className="font-bold text-sm">公园</p>
                                        <div 
                                            id={`dropzone-park`}
                                            onDragOver={handleDragOver}
                                            onDragEnter={(e) => handleDragEnter(e, "park")}
                                            onDragLeave={(e) => handleDragLeave(e, "park")}
                                            onDrop={(e) => handleDrop(e, landmarks[1])}
                                            className={`drop-zone mt-1 w-full p-1 rounded-lg border-2 border-dashed transition-all text-center ${
                                                matchedLandmarks.park ? 'bg-green-100 border-green-400' : 'bg-white/60 border-purple-300'
                                            }`}
                                        >
                                            {matchedLandmarks.park ? (
                                                <span className="text-green-700 text-sm font-bold">✅ 东</span>
                                            ) : (
                                                <span className="text-purple-500 text-xs">⬇️ 拖拽方向</span>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                {/* 中心人物 */}
                                <div className="bg-amber-100 rounded-full w-24 h-24 flex items-center justify-center shadow-lg z-10">
                                    <span className="text-5xl">🧒</span>
                                    <div className="absolute -bottom-6 text-xs font-bold bg-white/80 px-2 rounded-full">小明</div>
                                </div>
                                {/* 方向指示线（视觉辅助） */}
                                <div className="absolute top-1/2 left-1/2 w-full h-0.5 bg-gray-300/50 transform -translate-x-1/2 -translate-y-1/2"></div>
                                <div className="absolute top-1/2 left-1/2 w-0.5 h-full bg-gray-300/50 transform -translate-x-1/2 -translate-y-1/2"></div>
                            </div>
                            <p className="text-center text-xs text-gray-500 mt-16 pt-2">将正确的方向卡片拖拽到每个地标下方的虚线框内</p>
                        </div>
                        
                        {/* 可拖拽卡片池（方向卡片） */}
                        <div className="mt-2">
                            <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
                                <h3 className="text-2xl font-bold text-purple-700 flex items-center gap-2">
                                    🃏 方向卡片池
                                    <span className="text-sm bg-yellow-200 px-2 py-1 rounded-full">长按/鼠标拖拽</span>
                                </h3>
                                <span className="text-xs md:text-sm text-purple-500">💡 把卡片拖到地标下方的放置区</span>
                            </div>
                            
                            {availableCards.length === 0 ? (
                                <div className="bg-gradient-to-r from-green-100 to-emerald-100 p-6 rounded-2xl text-center text-green-700 text-xl font-bold">
                                    🎉 完美！所有方向都配对成功！ 你已经是方向小专家啦 🎉
                                </div>
                            ) : (
                                <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
                                    {availableCards.map(card => (
                                        <div
                                            key={card.id}
                                            draggable={true}
                                            onDragStart={(e) => handleDragStart(e, card)}
                                            onDragEnd={handleDragEnd}
                                            className="drag-card bg-gradient-to-br from-amber-200 to-yellow-300 rounded-2xl p-3 shadow-md flex flex-col items-center cursor-grab active:cursor-grabbing hover:shadow-xl transition-all transform hover:scale-[1.02]"
                                        >
                                            <span className="text-4xl">{card.emoji}</span>
                                            <p className="font-bold text-gray-800 text-xl">{card.text}</p>
                                            <p className="text-xs text-amber-800 mt-1">{card.description}</p>
                                            <p className="text-[10px] text-purple-600 mt-1">👉 拖拽配对</p>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            {/* 玩法说明 + 路线描述小练习 */}
                            <div className="mt-5 bg-purple-100/70 p-3 rounded-xl text-purple-700 text-sm">
                                <p className="font-bold">📌 拖拉拽玩法：</p>
                                <ul className="list-disc list-inside space-y-1">
                                    <li>① 手指/鼠标长按方向卡片（东、南、西、北）</li>
                                    <li>② 拖拽到场景中对应地标下方的放置区（虚线框）</li>
                                    <li>③ 配对正确，卡片消失，放置区显示“✅ 方向”</li>
                                    <li>④ 全部4个地标配对成功，获得胜利 🏆</li>
                                </ul>
                                <div className="mt-2 bg-white/60 rounded-lg p-2 text-xs">
                                    💡 <strong>路线描述挑战</strong>：如果小明想去公园，应该向哪个方向走？去学校呢？去超市呢？—— 东面去公园，北面去学校，西面去超市，南面去医院！
                                </div>
                            </div>
                            
                            {gameWin && (
                                <div className="mt-4 bg-gradient-to-r from-green-200 to-teal-200 text-green-800 p-4 rounded-2xl text-center text-xl font-bold animate-pulse flex items-center justify-center gap-3 shadow-lg">
                                    🏆 恭喜你完成所有配对！🏆 <span className="text-3xl">🎓🧭</span>
                                </div>
                            )}
                        </div>
                        <div className="mt-3 text-center text-xs text-purple-500">
                            💡 移动端小技巧：长按卡片并轻轻拖拽到目标区上方，松手即可。记住“上北下南左西右东”！
                        </div>
                    </div>
                </div>
                {/* 底部装饰 */}
                <div className="text-center mt-8 text-purple-800 text-sm bg-white/30 rounded-full py-2 px-4 w-fit mx-auto backdrop-blur-sm">
                    🌈 早晨太阳在东，傍晚在西，中午在南，北极星在北！拖拽配对，方向我能行！ 🌟
                </div>
            </div>
        );
    };
    
    // 渲染到根节点
    ReactDOM.createRoot(document.getElementById("root")).render(
        <React.StrictMode>
            <DirectionGame />
        </React.StrictMode>
    );
</script>
</body>
</html>
