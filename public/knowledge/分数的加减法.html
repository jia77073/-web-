<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>🧮 分数的加减法 · 暖阳工坊</title>
  <!-- Tailwind + React CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .drag-card {
      transition: all 0.1s ease;
      cursor: grab;
    }
    .drag-card:active {
      cursor: grabbing;
    }
    .drag-card.disabled-card {
      cursor: default;
      opacity: 0.6;
      filter: grayscale(0.1);
    }
    .drop-slot {
      transition: all 0.2s ease;
      background-color: rgba(255, 235, 205, 0.6);
      border: 2px dashed #f9a95c;
    }
    .drop-slot.drag-over {
      background-color: #ffe2c4;
      border-color: #f97316;
      transform: scale(1.02);
    }
    .drop-slot.filled-slot {
      background-color: #ffd9b5;
      border: 2px solid #ea580c;
      cursor: default;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .celebration {
      animation: bounce 0.5s ease-in-out;
    }
    .warm-bg {
      background-image: radial-gradient(circle at 20% 35%, rgba(249, 115, 22, 0.06) 2.5%, transparent 2.8%);
      background-size: 38px 38px;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#FFF2E6] to-[#FFE0C4] min-h-screen flex items-center justify-center p-4 font-sans warm-bg">

<div id="root" class="w-full max-w-6xl mx-auto"></div>

<script type="text/babel">
  // ---------- 辅助函数：最大公因数 & 约分 ----------
  const computeGCD = (a, b) => {
    a = Math.abs(a);
    b = Math.abs(b);
    while (b !== 0) {
      let temp = b;
      b = a % b;
      a = temp;
    }
    return a;
  };

  const reduceFraction = (numerator, denominator) => {
    if (denominator === 0) return "0/1";
    if (numerator === 0) return "0";
    const gcd = computeGCD(numerator, denominator);
    const num = numerator / gcd;
    const den = denominator / gcd;
    if (den === 1) return `${num}`;
    return `${num}/${den}`;
  };

  // 分数加法 (返回最简字符串)
  const addFractions = (frac1, frac2) => {
    const [n1, d1] = frac1.split('/').map(Number);
    const [n2, d2] = frac2.split('/').map(Number);
    const lcm = (d1 * d2) / computeGCD(d1, d2);
    const newNum = n1 * (lcm / d1) + n2 * (lcm / d2);
    return reduceFraction(newNum, lcm);
  };

  const subtractFractions = (frac1, frac2) => {
    const [n1, d1] = frac1.split('/').map(Number);
    const [n2, d2] = frac2.split('/').map(Number);
    const lcm = (d1 * d2) / computeGCD(d1, d2);
    const newNum = n1 * (lcm / d1) - n2 * (lcm / d2);
    if (newNum < 0) return null; // 避免负数，题目生成时保证非负
    return reduceFraction(newNum, lcm);
  };

  // 生成随机分数 (分母2~12，分子1~20，但确保分数不太大)
  const generateRandomFraction = () => {
    const denominator = Math.floor(Math.random() * 11) + 2; // 2~12
    let numerator = Math.floor(Math.random() * (denominator * 2)) + 1;
    // 控制分子最大20
    if (numerator > 20) numerator = denominator + Math.floor(Math.random() * 8);
    return `${numerator}/${denominator}`;
  };

  // 生成加减法挑战集 (count个)
  const generateChallengeSet = (count = 4) => {
    let challenges = [];
    let usedPairs = new Set();
    for (let i = 0; i < count; i++) {
      let maxAttempts = 40;
      let valid = false;
      let fracA, fracB, operation, result;
      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        fracA = generateRandomFraction();
        fracB = generateRandomFraction();
        operation = Math.random() > 0.5 ? '+' : '-';
        if (operation === '+') {
          result = addFractions(fracA, fracB);
          // 结果不能太复杂 (分子分母不超过60)
          if (result.includes('/')) {
            const [rNum, rDen] = result.split('/').map(Number);
            if (rDen > 60 || rNum > 60) continue;
          } else if (parseInt(result) > 30) continue;
          valid = true;
        } else {
          result = subtractFractions(fracA, fracB);
          if (result === null) continue; // 负结果跳过
          if (result.includes('/')) {
            const [rNum, rDen] = result.split('/').map(Number);
            if (rDen > 60 || rNum > 60) continue;
          } else if (parseInt(result) > 30) continue;
          valid = true;
        }
        const pairKey = `${fracA}_${operation}_${fracB}`;
        if (!usedPairs.has(pairKey) && valid) {
          usedPairs.add(pairKey);
          break;
        } else {
          valid = false;
        }
      }
      if (!valid) {
        // 保底题目
        fracA = "1/2";
        fracB = "1/3";
        operation = "+";
        result = "5/6";
      }
      challenges.push({
        id: `ch-${Date.now()}-${i}-${Math.random()}`,
        fracA: fracA,
        fracB: fracB,
        operation: operation,
        result: result,
        matched: false,
        matchedValue: null
      });
    }
    return challenges;
  };

  // 生成卡片池：正确结果 + 干扰项
  const generateAnswerCards = (challenges) => {
    let correctSet = new Set();
    challenges.forEach(ch => {
      correctSet.add(ch.result);
    });
    let correctArray = Array.from(correctSet);
    
    // 干扰池：随机分数或常见错误答案
    let distractorPool = [];
    let usedDistractors = new Set();
    // 生成一些随机分数（可能不是正确结果）
    for (let i = 0; i < correctArray.length + 2; i++) {
      let candidate;
      let attempts = 0;
      do {
        const fakeFrac = generateRandomFraction();
        const [n, d] = fakeFrac.split('/').map(Number);
        // 简单约分后作为候选
        const reduced = reduceFraction(n, d);
        candidate = reduced;
        attempts++;
        if (attempts > 25) break;
      } while (correctSet.has(candidate) || usedDistractors.has(candidate));
      if (!correctSet.has(candidate) && !usedDistractors.has(candidate)) {
        usedDistractors.add(candidate);
        distractorPool.push(candidate);
      }
      if (distractorPool.length >= correctArray.length + 1) break;
    }
    // 额外添加常见干扰
    const extra = ["1/2", "1/3", "2/3", "1/4", "3/4", "1", "1/6", "5/6", "2/5", "3/5"];
    for (let ex of extra) {
      if (!correctSet.has(ex) && !usedDistractors.has(ex) && distractorPool.length < correctArray.length + 2) {
        distractorPool.push(ex);
        usedDistractors.add(ex);
      }
    }
    
    let allCardValues = [...correctArray, ...distractorPool];
    // 洗牌
    for (let i = allCardValues.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [allCardValues[i], allCardValues[j]] = [allCardValues[j], allCardValues[i]];
    }
    return allCardValues.map((val, idx) => ({
      id: `card-${Date.now()}-${idx}-${Math.random()}`,
      value: val,
      used: false
    }));
  };

  // 比较两个分数是否相等 (支持整数形式)
  const areFractionsEqual = (frac1, frac2) => {
    if (frac1 === frac2) return true;
    // 处理整数情况
    const toFraction = (val) => {
      if (val.includes('/')) {
        const [n, d] = val.split('/').map(Number);
        return { n, d };
      } else {
        const num = parseInt(val);
        return { n: num, d: 1 };
      }
    };
    const f1 = toFraction(frac1);
    const f2 = toFraction(frac2);
    return f1.n * f2.d === f2.n * f1.d;
  };

  // ---------- 左侧知识点卡片：分数加减法法则 ----------
  const KnowledgeCard = () => {
    return (
      <div className="bg-[#FFF8F0]/90 backdrop-blur-sm rounded-3xl p-5 shadow-xl border border-[#FBCDA3] h-full text-[#9B4B00]">
        <div className="flex items-center gap-2 border-b-2 border-[#F9A95C] pb-3 mb-4">
          <span className="text-4xl">🧮</span>
          <h2 className="text-2xl font-extrabold tracking-wide">分数的加减法<br/><span className="text-sm font-normal text-[#C4691E]">暖阳法则 · 精准计算</span></h2>
        </div>
        <div className="space-y-4">
          <div className="bg-[#FFFAF0] rounded-2xl p-4 border border-[#FFDEB3]">
            <p className="font-bold text-[#B45309] flex items-center gap-2">✨ 同分母分数加减</p>
            <p className="text-sm mt-1">分母不变，分子相加减。结果要约成最简分数。</p>
            <div className="mt-2 text-xs bg-white/70 p-2 rounded-lg inline-block shadow-sm">📖 例：1/5 + 2/5 = 3/5，4/7 - 1/7 = 3/7</div>
          </div>
          <div className="bg-[#FFFAF0] rounded-2xl p-4 border border-[#FFDEB3]">
            <p className="font-bold text-[#B45309]">⚡ 异分母分数加减</p>
            <p className="text-sm mt-1">先通分（找分母的最小公倍数），再按同分母法则计算，最后约分。</p>
            <div className="mt-2 text-xs bg-white/70 p-2 rounded-lg">💡 例：1/2 + 1/3 = 3/6 + 2/6 = 5/6</div>
          </div>
          <div className="bg-[#FFF0E0] rounded-2xl p-3 text-center text-sm border border-[#F9C27D]">
            🎯 挑战规则：计算每个算式的结果（最简分数），将右侧结果卡片拖拽到对应的槽位中。
          </div>
        </div>
      </div>
    );
  };

  // ---------- 主游戏组件：分数加减法匹配 ----------
  const FractionArithmeticGame = ({ resetKey, onNewGame }) => {
    const [challenges, setChallenges] = React.useState(() => generateChallengeSet(4));
    const [answerCards, setAnswerCards] = React.useState(() => []);
    const [errorMsg, setErrorMsg] = React.useState('');
    const [isVictory, setIsVictory] = React.useState(false);
    
    const initCards = (currentChallenges) => generateAnswerCards(currentChallenges);
    
    React.useEffect(() => {
      setAnswerCards(initCards(challenges));
    }, [challenges]);
    
    const checkVictory = (currentChallenges) => {
      const allFilled = currentChallenges.every(ch => ch.matched === true);
      if (allFilled && !isVictory) setIsVictory(true);
      else if (!allFilled && isVictory) setIsVictory(false);
    };
    
    const updateChallengesAndCheck = (newChallenges) => {
      setChallenges(newChallenges);
      checkVictory(newChallenges);
    };
    
    const resetGame = () => {
      const newChallenges = generateChallengeSet(4);
      setChallenges(newChallenges);
      setAnswerCards(initCards(newChallenges));
      setIsVictory(false);
      setErrorMsg('');
    };
    
    React.useEffect(() => {
      resetGame();
    }, [resetKey]);
    
    // 拖拽卡片
    const onDragStart = (e, card) => {
      if (card.used) {
        e.preventDefault();
        return false;
      }
      e.dataTransfer.setData('text/plain', JSON.stringify({ cardId: card.id, cardValue: card.value }));
      e.dataTransfer.effectAllowed = 'copy';
      e.target.style.opacity = '0.6';
    };
    const onDragEnd = (e) => {
      if (e.target) e.target.style.opacity = '';
    };
    
    const onDragOverSlot = (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
      e.currentTarget.classList.add('drag-over');
    };
    const onDragLeaveSlot = (e) => {
      e.currentTarget.classList.remove('drag-over');
    };
    
    // 放置到算式槽位
    const onDropToSlot = (e, challengeId) => {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const rawData = e.dataTransfer.getData('text/plain');
      if (!rawData) return;
      let draggedCardId, draggedValue;
      try {
        const parsed = JSON.parse(rawData);
        draggedCardId = parsed.cardId;
        draggedValue = parsed.cardValue;
      } catch (err) {
        return;
      }
      
      const targetCard = answerCards.find(c => c.id === draggedCardId);
      if (!targetCard || targetCard.used) {
        setErrorMsg('🧮 这张卡片已经使用过了！不能重复投放。');
        setTimeout(() => setErrorMsg(''), 1300);
        return;
      }
      
      const challengeIndex = challenges.findIndex(ch => ch.id === challengeId);
      if (challengeIndex === -1) return;
      const targetChallenge = challenges[challengeIndex];
      if (targetChallenge.matched) {
        setErrorMsg('🌞 这个算式槽位已经匹配完成啦！');
        setTimeout(() => setErrorMsg(''), 1300);
        return;
      }
      
      // 验证结果是否相等
      const isMatch = areFractionsEqual(draggedValue, targetChallenge.result);
      if (!isMatch) {
        const expected = targetChallenge.result;
        setErrorMsg(`❌ 计算结果不正确！ ${targetChallenge.fracA} ${targetChallenge.operation} ${targetChallenge.fracB} 的结果应该是 ${expected}，而不是 ${draggedValue}。再试试看～`);
        setTimeout(() => setErrorMsg(''), 1900);
        return;
      }
      
      // 正确匹配
      setAnswerCards(prevCards =>
        prevCards.map(card =>
          card.id === draggedCardId ? { ...card, used: true } : card
        )
      );
      const newChallenges = [...challenges];
      newChallenges[challengeIndex].matched = true;
      newChallenges[challengeIndex].matchedValue = draggedValue;
      updateChallengesAndCheck(newChallenges);
      setErrorMsg('');
    };
    
    // 重置当前进度（清空槽位，重置卡片使用）
    const resetProgress = () => {
      const resetChallenges = challenges.map(ch => ({
        ...ch,
        matched: false,
        matchedValue: null
      }));
      const resetCards = answerCards.map(card => ({ ...card, used: false }));
      // 洗牌
      for (let i = resetCards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [resetCards[i], resetCards[j]] = [resetCards[j], resetCards[i]];
      }
      setChallenges(resetChallenges);
      setAnswerCards(resetCards);
      setIsVictory(false);
      setErrorMsg('');
    };
    
    const newGameFull = () => {
      resetGame();
      if (onNewGame) onNewGame();
    };
    
    const totalCount = challenges.length;
    const filledCount = challenges.filter(ch => ch.matched).length;
    const progressPercent = totalCount === 0 ? 0 : (filledCount / totalCount) * 100;
    
    const VictoryMessage = () => (
      <div className="text-center bg-gradient-to-r from-orange-300 to-amber-400 rounded-2xl p-3 mt-2 animate-bounce shadow-xl border border-[#FFE0B5]">
        <div className="text-2xl font-bold text-white">🎉 计算大师！全部正确 🎉</div>
        <div className="text-sm text-orange-100 font-semibold">所有分数加减法都已正确匹配！点击「全新挑战」继续练习～</div>
      </div>
    );
    
    return (
      <div className="flex flex-col gap-5">
        {/* 进度条 */}
        <div className="flex justify-between items-center bg-[#FFF8F0]/80 backdrop-blur-sm rounded-2xl px-5 py-2 shadow-md border border-[#FCD5A5]">
          <div className="flex items-center gap-2">
            <span className="text-2xl">🧮</span>
            <span className="font-bold text-[#9B4B00]">计算进度</span>
            <span className="text-lg font-black text-orange-800">{filledCount} / {totalCount}</span>
          </div>
          <div className="w-36 bg-[#FFE0C4] rounded-full h-2.5">
            <div className="bg-[#F97316] h-2.5 rounded-full transition-all duration-300" style={{ width: `${progressPercent}%` }}></div>
          </div>
          <div className="text-xs bg-[#FFE8D6] px-2 py-1 rounded-full text-orange-800 border border-[#F9B87A]">🔢 拖拽结果 放入槽位</div>
        </div>
        
        {/* 挑战区域：每个算式 + 结果槽位 */}
        <div className="bg-[#FFFDF8]/70 rounded-2xl p-4 backdrop-blur-sm border border-[#FCD5A5]">
          <div className="text-center text-sm font-semibold text-[#9B4B00] mb-3">📌 计算每个算式的结果，将右侧结果卡片拖拽到对应槽位</div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
            {challenges.map((challenge) => (
              <div key={challenge.id} className="bg-[#FFF9F2] rounded-xl p-4 border border-[#FAD7A8] shadow-sm">
                <div className="text-center mb-3">
                  <div className="text-2xl font-black text-orange-800 bg-white/60 inline-block px-4 py-1 rounded-full shadow-sm">
                    {challenge.fracA} {challenge.operation} {challenge.fracB}
                  </div>
                  <div className="text-xs text-orange-600 mt-1">= ?</div>
                </div>
                <div className="mt-2">
                  <div
                    className={`drop-slot rounded-xl p-3 text-center transition-all ${challenge.matched ? 'filled-slot' : ''}`}
                    onDragOver={onDragOverSlot}
                    onDragLeave={onDragLeaveSlot}
                    onDrop={(e) => onDropToSlot(e, challenge.id)}
                  >
                    <div className="text-xs font-semibold text-orange-700">✨ 计算结果槽 ✨</div>
                    {challenge.matched ? (
                      <div className="text-xl font-bold text-orange-800 mt-1">{challenge.matchedValue}</div>
                    ) : (
                      <div className="text-sm text-orange-500 mt-1 border-t border-dashed border-orange-300 pt-1">⬅️ 拖拽结果卡片至此</div>
                    )}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
        
        {/* 卡片池区域 */}
        <div className="bg-[#FFF8F0]/80 rounded-2xl p-4 border border-[#FCD5A5]">
          <div className="text-center text-sm font-semibold text-[#9B4B00] mb-2">🎴 结果卡片库（拖拽到上方算式槽位）</div>
          <div className="flex flex-wrap justify-center gap-3">
            {answerCards.map(card => (
              <div
                key={card.id}
                draggable={!card.used}
                onDragStart={(e) => onDragStart(e, card)}
                onDragEnd={onDragEnd}
                className={`drag-card w-24 h-24 rounded-xl shadow-md flex items-center justify-center text-lg font-bold transition-all ${
                  card.used 
                    ? 'bg-gray-300/60 cursor-default border-2 border-gray-400 text-gray-500' 
                    : 'bg-gradient-to-br from-orange-100 to-amber-100 cursor-grab active:cursor-grabbing hover:scale-105 border-2 border-orange-500 text-orange-900'
                }`}
              >
                {card.used ? '✓ 已用' : card.value}
              </div>
            ))}
            {answerCards.length === 0 && <div className="text-orange-500">加载卡片中...</div>}
          </div>
          <div className="text-[11px] text-center text-orange-700 mt-2">💡 每个卡片只能用一次，正确计算并拖拽匹配每个算式的结果</div>
        </div>
        
        {/* 错误提示 */}
        {errorMsg && (
          <div className="text-center bg-[#FDE68A]/90 text-orange-800 font-bold p-2.5 rounded-xl border-l-8 border-[#F59E0B] backdrop-blur-sm animate-pulse shadow">
            {errorMsg}
          </div>
        )}
        
        {/* 胜利凯旋 */}
        {isVictory && <VictoryMessage />}
        
        {/* 操作按钮 */}
        <div className="flex gap-3 mt-1">
          <button 
            onClick={resetProgress}
            className="flex-1 bg-[#FBC27D] hover:bg-[#F9A95C] text-orange-900 font-bold py-2.5 rounded-full transition shadow-md text-base active:scale-[0.98]"
          >
            🔄 重置当前进度（清空槽位）
          </button>
          <button 
            onClick={newGameFull}
            className="flex-1 bg-[#F97316] hover:bg-[#EA580C] text-white font-bold py-2.5 rounded-full transition shadow-md text-base active:scale-[0.98]"
          >
            🧺 全新挑战（换一批算式）
          </button>
        </div>
        <div className="text-xs text-center text-orange-900 bg-[#FFF0E0]/80 rounded-full py-1.5 px-3 backdrop-blur-sm">
          💡 计算技巧：同分母直接加减分子；异分母先通分再计算。结果记得约成最简分数！
        </div>
      </div>
    );
  };
  
  // ---------- 主应用 ----------
  const App = () => {
    const [gameResetKey, setGameResetKey] = React.useState(0);
    const handleNewGame = () => {
      setGameResetKey(prev => prev + 1);
    };
    return (
      <div className="flex flex-col lg:flex-row gap-6">
        <div className="lg:w-5/12">
          <KnowledgeCard />
        </div>
        <div className="lg:w-7/12 flex flex-col gap-5">
          <div className="bg-[#FFFCF5]/80 backdrop-blur-md rounded-3xl p-5 shadow-2xl border border-[#FCD5A5]">
            <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
              <h3 className="text-xl font-bold text-[#9B4B00] flex items-center gap-2">
                <span className="text-3xl">🧮</span>
                分数加减法 · 暖阳工坊
              </h3>
              <span className="text-sm bg-[#FFE8D6] px-3 py-1 rounded-full text-orange-800 border border-orange-300">🎯 拖拽计算结果</span>
            </div>
            <FractionArithmeticGame resetKey={gameResetKey} onNewGame={handleNewGame} />
          </div>
        </div>
      </div>
    );
  };
  
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
