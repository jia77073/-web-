<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>📐 用字母表示数·第2课时 | 运算律与简写 | 天蓝代数工坊</title>
  <!-- Tailwind + React CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .drag-card {
      transition: all 0.1s ease;
      cursor: grab;
    }
    .drag-card:active {
      cursor: grabbing;
    }
    .drag-card.disabled-card {
      cursor: default;
      opacity: 0.6;
      filter: grayscale(0.1);
    }
    .drop-slot {
      transition: all 0.2s ease;
      background-color: rgba(135, 206, 250, 0.2);
      border: 2px dashed #4791c8;
    }
    .drop-slot.drag-over {
      background-color: #8bc5f0;
      border-color: #e0f2ff;
      transform: scale(1.02);
    }
    .drop-slot.filled-slot {
      background-color: #5da5da;
      border: 2px solid #d4efff;
      cursor: default;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .celebration {
      animation: bounce 0.5s ease-in-out;
    }
    .sky-bg {
      background-image: radial-gradient(circle at 25% 40%, rgba(100, 180, 240, 0.12) 2%, transparent 2.5%);
      background-size: 48px 48px;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#B8DFFF] to-[#90C8F0] min-h-screen flex items-center justify-center p-4 font-sans sky-bg">

<div id="root" class="w-full max-w-6xl mx-auto"></div>

<script type="text/babel">
  // ---------- 辅助函数：标准化表达式（去除空格，统一平方记号）----------
  const normalizeExpr = (expr) => {
    let normalized = expr.replace(/\s+/g, '');
    // 将上标² 转为 ^2 便于比较，同时保留显示
    normalized = normalized.replace(/²/g, '^2');
    // 统一乘号：× 转为 *
    normalized = normalized.replace(/×/g, '*');
    // 统一括号样式（全角半角不影响）
    return normalized;
  };

  // 比较两个表达式是否等价（规范化后相等）
  const areExpressionsEqual = (expr1, expr2) => {
    return normalizeExpr(expr1) === normalizeExpr(expr2);
  };

  // ---------- 题库：用字母表示运算律、公式、简写规则 ----------
  const MASTER_TOPICS = [
    {
      id: "comm_add",
      description: "加法交换律：两个数相加，交换加数的位置，和不变。",
      correctExpr: "a + b = b + a",
      hint: "a + b = b + a"
    },
    {
      id: "comm_mul",
      description: "乘法交换律：两个数相乘，交换因数的位置，积不变。",
      correctExpr: "ab = ba",
      hint: "ab = ba  (字母相乘省略乘号)"
    },
    {
      id: "assoc_mul",
      description: "乘法结合律：三个数相乘，先乘前两个或先乘后两个，积不变。",
      correctExpr: "(ab)c = a(bc)",
      hint: "(ab)c = a(bc)"
    },
    {
      id: "distributive",
      description: "乘法分配律：一个数与两个数的和相乘，等于这个数分别与这两个数相乘再相加。",
      correctExpr: "a(b + c) = ab + ac",
      hint: "a(b + c) = ab + ac"
    },
    {
      id: "square_area",
      description: "正方形面积公式（边长 a）",
      correctExpr: "a²",
      hint: "a² (a的平方)"
    },
    {
      id: "rect_perimeter",
      description: "长方形周长公式（长 a，宽 b）",
      correctExpr: "2(a + b)",
      hint: "2(a + b)"
    },
    {
      id: "simplify_3a",
      description: "乘法简写：3 × a 的规范写法",
      correctExpr: "3a",
      hint: "数字写在字母前面，乘号省略"
    },
    {
      id: "simplify_a_square",
      description: "a × a 的规范简写（平方）",
      correctExpr: "a²",
      hint: "a² 表示 a 的平方"
    },
    {
      id: "simplify_1x",
      description: "1 × x 的规范简写（系数为1时省略）",
      correctExpr: "x",
      hint: "1 可以省略不写"
    },
    {
      id: "simplify_b5",
      description: "b × 5 的规范简写（数字在前）",
      correctExpr: "5b",
      hint: "数字写在字母前面"
    },
    {
      id: "comm_add_alt",
      description: "加法交换律的另一种写法（用字母表示）",
      correctExpr: "a + b = b + a",
      hint: "a + b = b + a"
    },
    {
      id: "assoc_add",
      description: "加法结合律：(a + b) + c = a + (b + c)",
      correctExpr: "(a + b) + c = a + (b + c)",
      hint: "加法结合律"
    }
  ];

  // 根据题目生成干扰项（常见错误写法）
  const generateDistractorsForTopic = (correctExpr, topicId) => {
    const distractors = new Set();
    const expr = correctExpr;
    
    // 基于正确表达式生成典型错误
    if (expr === "a + b = b + a") {
      distractors.add("a + b = a + b");
      distractors.add("a + b = b - a");
      distractors.add("ab = ba");
    } else if (expr === "ab = ba") {
      distractors.add("a × b = b × a");
      distractors.add("ab = a b");
      distractors.add("ab = ba (未简写)");
    } else if (expr === "(ab)c = a(bc)") {
      distractors.add("(a×b)×c = a×(b×c)");
      distractors.add("ab × c = a × bc");
      distractors.add("(ab)c = abc");
    } else if (expr === "a(b + c) = ab + ac") {
      distractors.add("a(b+c) = a×b + a×c");
      distractors.add("a(b + c) = ab + c");
      distractors.add("a(b+c)=ac+ab");
    } else if (expr === "a²") {
      distractors.add("a×a");
      distractors.add("a^2");
      distractors.add("2a");
      distractors.add("aa");
    } else if (expr === "2(a + b)") {
      distractors.add("2a + b");
      distractors.add("2a + 2b");
      distractors.add("(a+b)×2");
      distractors.add("a + b × 2");
    } else if (expr === "3a") {
      distractors.add("a3");
      distractors.add("3×a");
      distractors.add("3·a");
      distractors.add("3 a");
    } else if (expr === "x") {
      distractors.add("1x");
      distractors.add("1·x");
      distractors.add("x1");
    } else if (expr === "5b") {
      distractors.add("b5");
      distractors.add("5×b");
      distractors.add("5b ");
    } else if (expr === "(a + b) + c = a + (b + c)") {
      distractors.add("(a+b)+c = a+b+c");
      distractors.add("a+(b+c) = a+b+c");
      distractors.add("(a + b) + c = a + (b + c) (漏括号)");
    }
    
    // 通用干扰：表达式带多余空格或错误符号
    if (!distractors.has(expr + "?")) distractors.add(expr + "?");
    if (expr !== "a²") distractors.add("a²");
    if (expr !== "ab = ba") distractors.add("ab = ba");
    
    // 去重并过滤掉与正确表达式等价的
    const result = Array.from(distractors).filter(d => !areExpressionsEqual(d, correctExpr));
    // 最多返回3个
    return result.slice(0, 3);
  };

  // 随机从题库中抽取指定数量的不重复题目
  const selectRandomTopics = (count = 4) => {
    const shuffled = [...MASTER_TOPICS];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled.slice(0, count).map(topic => ({
      id: topic.id + "-" + Date.now() + "-" + Math.random(),
      description: topic.description,
      correctExpr: topic.correctExpr,
      hint: topic.hint,
      matched: false,
      matchedValue: null
    }));
  };

  // 生成答案卡片池（包含所有正确表达式 + 干扰项）
  const generateAnswerCards = (challenges) => {
    let correctSet = new Map(); // value -> challengeId 暂存
    challenges.forEach(ch => {
      correctSet.set(ch.correctExpr, ch.id);
    });
    let correctExprs = Array.from(correctSet.keys());
    
    let allCardValues = [];
    let usedDistractors = new Set();
    
    // 添加正确表达式
    correctExprs.forEach(expr => {
      allCardValues.push({ value: expr, type: "correct", forChallenge: correctSet.get(expr) });
    });
    
    // 为每个正确表达式生成干扰项
    challenges.forEach(ch => {
      const dists = generateDistractorsForTopic(ch.correctExpr, ch.id);
      dists.forEach(d => {
        if (!usedDistractors.has(d) && !allCardValues.some(cv => areExpressionsEqual(cv.value, d))) {
          allCardValues.push({ value: d, type: "distractor", forChallenge: null });
          usedDistractors.add(d);
        }
      });
    });
    
    // 补充通用干扰项（确保卡片池数量充足）
    const commonDistractors = [
      "a × a", "2a", "a + a", "a b", "a·b", "a(b+c)", "ab+ac", "a^2", "b5", "1x", "3×a", "(a+b)×2"
    ];
    for (let cd of commonDistractors) {
      if (!usedDistractors.has(cd) && !allCardValues.some(cv => areExpressionsEqual(cv.value, cd))) {
        allCardValues.push({ value: cd, type: "distractor", forChallenge: null });
        usedDistractors.add(cd);
        if (allCardValues.length >= correctExprs.length * 2 + 3) break;
      }
    }
    
    // 洗牌
    for (let i = allCardValues.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [allCardValues[i], allCardValues[j]] = [allCardValues[j], allCardValues[i]];
    }
    
    return allCardValues.map((item, idx) => ({
      id: `card-${Date.now()}-${idx}-${Math.random()}`,
      value: item.value,
      used: false,
      forChallengeId: item.forChallenge
    }));
  };

  // ---------- 左侧知识点卡片：运算律与简写规则 ----------
  const KnowledgeCard = () => {
    return (
      <div className="bg-[#E8F4FF]/95 backdrop-blur-sm rounded-3xl p-5 shadow-xl border border-[#69B0E0] h-full text-[#1C4468]">
        <div className="flex items-center gap-2 border-b-2 border-[#5FA3D6] pb-3 mb-4">
          <span className="text-4xl">📐</span>
          <h2 className="text-2xl font-extrabold tracking-wide">用字母表示数 · 第2课时<br/><span className="text-sm font-normal text-[#2C6B9E]">运算律 · 公式 · 简写规范</span></h2>
        </div>
        <div className="space-y-4">
          <div className="bg-[#D9EEFC] rounded-2xl p-4 border border-[#85BBE8]">
            <p className="font-bold text-[#1A5682] flex items-center gap-2">✨ 字母表示运算律</p>
            <p className="text-sm mt-1">用字母可以简明表达运算律：<br/>加法交换律：a+b = b+a <br/>乘法结合律：(ab)c = a(bc)<br/>乘法分配律：a(b+c)=ab+ac</p>
          </div>
          <div className="bg-[#D9EEFC] rounded-2xl p-4 border border-[#85BBE8]">
            <p className="font-bold text-[#1A5682]">⚡ 简写规则（重要）</p>
            <ul className="text-sm mt-1 list-disc list-inside space-y-1">
              <li>数字与字母相乘，乘号省略，数字在前：<span className="font-mono bg-white/50 px-1 rounded">3×a → 3a</span></li>
              <li>字母与字母相乘，乘号省略：<span className="font-mono bg-white/50 px-1 rounded">a×b → ab</span></li>
              <li>1与字母相乘，1省略：<span className="font-mono bg-white/50 px-1 rounded">1×x → x</span></li>
              <li>相同字母相乘，写成平方：<span className="font-mono bg-white/50 px-1 rounded">a×a → a²</span></li>
              <li>带括号的式子保留括号，数字写在括号前：<span className="font-mono bg-white/50 px-1 rounded">2×(a+b) → 2(a+b)</span></li>
            </ul>
          </div>
          <div className="bg-[#CAE6FC] rounded-2xl p-3 text-center text-sm border border-[#98C8F0]">
            🧩 挑战规则：每个描述对应一个规范的字母表达式（简写、平方、运算律形式），将右侧正确的表达式卡片拖拽到对应的蓝色槽位中。<br/>
            📌 注意区分平方“a²”与“2a”，以及乘号省略规则。
          </div>
        </div>
      </div>
    );
  };

  // ---------- 主游戏组件：用字母表示数·简写与运算律匹配 ----------
  const AlgebraGame = ({ resetKey, onNewGame }) => {
    const [challenges, setChallenges] = React.useState(() => selectRandomTopics(4));
    const [answerCards, setAnswerCards] = React.useState(() => []);
    const [errorMsg, setErrorMsg] = React.useState('');
    const [isVictory, setIsVictory] = React.useState(false);
    
    const initCards = (currentChallenges) => generateAnswerCards(currentChallenges);
    
    React.useEffect(() => {
      setAnswerCards(initCards(challenges));
    }, [challenges]);
    
    const checkVictory = (currentChallenges) => {
      const allFilled = currentChallenges.every(ch => ch.matched === true);
      if (allFilled && !isVictory) setIsVictory(true);
      else if (!allFilled && isVictory) setIsVictory(false);
    };
    
    const updateChallengesAndCheck = (newChallenges) => {
      setChallenges(newChallenges);
      checkVictory(newChallenges);
    };
    
    const resetGame = () => {
      const newChallenges = selectRandomTopics(4);
      setChallenges(newChallenges);
      setAnswerCards(initCards(newChallenges));
      setIsVictory(false);
      setErrorMsg('');
    };
    
    React.useEffect(() => {
      resetGame();
    }, [resetKey]);
    
    // 拖拽逻辑
    const onDragStart = (e, card) => {
      if (card.used) {
        e.preventDefault();
        return false;
      }
      e.dataTransfer.setData('text/plain', JSON.stringify({ cardId: card.id, cardValue: card.value }));
      e.dataTransfer.effectAllowed = 'copy';
      if (e.target) e.target.style.opacity = '0.6';
    };
    const onDragEnd = (e) => {
      if (e.target) e.target.style.opacity = '';
    };
    
    const onDragOverSlot = (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
      e.currentTarget.classList.add('drag-over');
    };
    const onDragLeaveSlot = (e) => {
      e.currentTarget.classList.remove('drag-over');
    };
    
    // 放置到槽位
    const onDropToSlot = (e, challengeId) => {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const rawData = e.dataTransfer.getData('text/plain');
      if (!rawData) return;
      let draggedCardId, draggedValue;
      try {
        const parsed = JSON.parse(rawData);
        draggedCardId = parsed.cardId;
        draggedValue = parsed.cardValue;
      } catch (err) {
        return;
      }
      
      const targetCard = answerCards.find(c => c.id === draggedCardId);
      if (!targetCard || targetCard.used) {
        setErrorMsg('📘 这张卡片已经使用过了！每个表达式卡片只能匹配一次。');
        setTimeout(() => setErrorMsg(''), 1300);
        return;
      }
      
      const challengeIndex = challenges.findIndex(ch => ch.id === challengeId);
      if (challengeIndex === -1) return;
      const targetChallenge = challenges[challengeIndex];
      if (targetChallenge.matched) {
        setErrorMsg('☁️ 这个槽位已经匹配完成了！');
        setTimeout(() => setErrorMsg(''), 1300);
        return;
      }
      
      // 判断表达式是否匹配（规范化比较）
      const isMatch = areExpressionsEqual(draggedValue, targetChallenge.correctExpr);
      if (!isMatch) {
        const expected = targetChallenge.correctExpr;
        setErrorMsg(`❌ 表达式不正确！ “${targetChallenge.description}” 的正确规范写法是 “${expected}”，而不是 “${draggedValue}”。请再学习一下简写规则～`);
        setTimeout(() => setErrorMsg(''), 2200);
        return;
      }
      
      // 匹配成功
      setAnswerCards(prevCards =>
        prevCards.map(card =>
          card.id === draggedCardId ? { ...card, used: true } : card
        )
      );
      const newChallenges = [...challenges];
      newChallenges[challengeIndex].matched = true;
      newChallenges[challengeIndex].matchedValue = draggedValue;
      updateChallengesAndCheck(newChallenges);
      setErrorMsg('');
    };
    
    // 重置当前进度（清空匹配，卡片复位并洗牌）
    const resetProgress = () => {
      const resetChallenges = challenges.map(ch => ({
        ...ch,
        matched: false,
        matchedValue: null
      }));
      let resetCards = answerCards.map(card => ({ ...card, used: false }));
      // 洗牌
      for (let i = resetCards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [resetCards[i], resetCards[j]] = [resetCards[j], resetCards[i]];
      }
      setChallenges(resetChallenges);
      setAnswerCards(resetCards);
      setIsVictory(false);
      setErrorMsg('');
    };
    
    const newGameFull = () => {
      resetGame();
      if (onNewGame) onNewGame();
    };
    
    const totalCount = challenges.length;
    const filledCount = challenges.filter(ch => ch.matched).length;
    const progressPercent = totalCount === 0 ? 0 : (filledCount / totalCount) * 100;
    
    const VictoryMessage = () => (
      <div className="text-center bg-gradient-to-r from-[#5DADE2] to-[#3498DB] rounded-2xl p-3 mt-2 animate-bounce shadow-xl border border-[#D6F0FF]">
        <div className="text-2xl font-bold text-white">🎉 代数达人！全部正确 🎉</div>
        <div className="text-sm text-[#E6F7FF] font-semibold">你已掌握用字母表示运算律、公式及简写规则！点击「全新挑战」继续巩固～</div>
      </div>
    );
    
    return (
      <div className="flex flex-col gap-5">
        {/* 进度条 */}
        <div className="flex justify-between items-center bg-[#E2F2FE]/80 backdrop-blur-sm rounded-2xl px-5 py-2 shadow-md border border-[#69B0E0]">
          <div className="flex items-center gap-2">
            <span className="text-2xl">✍️</span>
            <span className="font-bold text-[#1C628B]">匹配进度</span>
            <span className="text-lg font-black text-[#2D7EB3]">{filledCount} / {totalCount}</span>
          </div>
          <div className="w-36 bg-[#BFDFF5] rounded-full h-2.5">
            <div className="bg-[#3B9BDF] h-2.5 rounded-full transition-all duration-300" style={{ width: `${progressPercent}%` }}></div>
          </div>
          <div className="text-xs bg-[#CBE6FA] px-2 py-1 rounded-full text-[#1C668E] border border-[#69B0E0]">📎 拖拽表达式卡片 放入槽位</div>
        </div>
        
        {/* 挑战区域：每个题目展示描述，下方为结果槽 */}
        <div className="bg-[#F0F9FF]/80 rounded-2xl p-4 backdrop-blur-sm border border-[#69B0E0]">
          <div className="text-center text-sm font-semibold text-[#1E6A98] mb-3">✏️ 根据描述，将右侧正确的字母表达式（规范简写/平方/运算律）拖拽到对应槽位</div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
            {challenges.map((challenge) => (
              <div key={challenge.id} className="bg-white/90 rounded-xl p-4 border border-[#B8DCF5] shadow-sm hover:shadow transition">
                <div className="text-center mb-2">
                  <div className="text-md font-semibold text-[#1A6391] bg-[#E8F2FA] inline-block px-3 py-1 rounded-full">
                    📖 描述
                  </div>
                  <div className="text-base font-medium text-gray-700 mt-2 leading-tight">
                    {challenge.description}
                  </div>
                  {challenge.hint && !challenge.matched && (
                    <div className="text-xs text-[#5F9AC0] mt-1 italic">💡 提示：{challenge.hint}</div>
                  )}
                </div>
                <div className="mt-3">
                  <div
                    className={`drop-slot rounded-xl p-3 text-center transition-all ${challenge.matched ? 'filled-slot' : ''}`}
                    onDragOver={onDragOverSlot}
                    onDragLeave={onDragLeaveSlot}
                    onDrop={(e) => onDropToSlot(e, challenge.id)}
                  >
                    <div className="text-xs font-semibold text-[#1F6A9B]">📥 表达式槽位（规范写法）</div>
                    {challenge.matched ? (
                      <div className="text-xl font-mono font-bold text-white mt-1">{challenge.matchedValue}</div>
                    ) : (
                      <div className="text-sm text-[#4C95C9] mt-1 border-t border-dashed border-[#8FC2EC] pt-1">⬅️ 拖拽正确表达式至此</div>
                    )}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
        
        {/* 卡片池区域 */}
        <div className="bg-[#F0F9FF]/80 rounded-2xl p-4 border border-[#69B0E0]">
          <div className="text-center text-sm font-semibold text-[#1E6A98] mb-2">🎴 表达式卡片库（拖拽到上方槽位）</div>
          <div className="flex flex-wrap justify-center gap-3">
            {answerCards.map(card => (
              <div
                key={card.id}
                draggable={!card.used}
                onDragStart={(e) => onDragStart(e, card)}
                onDragEnd={onDragEnd}
                className={`drag-card w-28 h-24 rounded-xl shadow-md flex items-center justify-center text-md font-mono font-bold transition-all ${
                  card.used 
                    ? 'bg-gray-400/60 cursor-default border-2 border-gray-300 text-gray-200' 
                    : 'bg-gradient-to-br from-[#87C6F0] to-[#5CA8DA] cursor-grab active:cursor-grabbing hover:scale-105 border-2 border-[#DEF2FF] text-white'
                }`}
              >
                {card.used ? '✓ 已用' : card.value}
              </div>
            ))}
            {answerCards.length === 0 && <div className="text-[#3B8BCB]">加载卡片中...</div>}
          </div>
          <div className="text-[11px] text-center text-[#2F7AA8] mt-2">💡 每个卡片只能用一次，注意观察简写规则（数字在前、乘号省略、平方用上标、括号规范）。</div>
        </div>
        
        {/* 错误提示 */}
        {errorMsg && (
          <div className="text-center bg-[#FEEBC8]/90 text-[#A45A1A] font-bold p-2.5 rounded-xl border-l-8 border-[#F6AD55] backdrop-blur-sm animate-pulse shadow">
            {errorMsg}
          </div>
        )}
        
        {/* 胜利凯旋 */}
        {isVictory && <VictoryMessage />}
        
        {/* 操作按钮 */}
        <div className="flex gap-3 mt-1">
          <button 
            onClick={resetProgress}
            className="flex-1 bg-[#6DA9DD] hover:bg-[#5896C8] text-white font-bold py-2.5 rounded-full transition shadow-md text-base active:scale-[0.98]"
          >
            🔄 重置当前进度（清空槽位）
          </button>
          <button 
            onClick={newGameFull}
            className="flex-1 bg-[#4285B4] hover:bg-[#3473A0] text-white font-bold py-2.5 rounded-full transition shadow-md text-base active:scale-[0.98]"
          >
            🧺 全新挑战（换一批题目）
          </button>
        </div>
        <div className="text-xs text-center text-[#266F9E] bg-[#DBEEFC]/70 rounded-full py-1.5 px-3 backdrop-blur-sm">
          💡 规范小贴士：数字与字母相乘，数字在前；字母与字母相乘，省略乘号；相同字母相乘写成平方；1乘以字母省略1。
        </div>
      </div>
    );
  };
  
  // ---------- 主应用入口 ----------
  const App = () => {
    const [gameResetKey, setGameResetKey] = React.useState(0);
    const handleNewGame = () => {
      setGameResetKey(prev => prev + 1);
    };
    return (
      <div className="flex flex-col lg:flex-row gap-6">
        <div className="lg:w-5/12">
          <KnowledgeCard />
        </div>
        <div className="lg:w-7/12 flex flex-col gap-5">
          <div className="bg-[#F4FAFF]/90 backdrop-blur-md rounded-3xl p-5 shadow-2xl border border-[#69B0E0]">
            <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
              <h3 className="text-xl font-bold text-[#1C5C86] flex items-center gap-2">
                <span className="text-3xl">🔤</span>
                用字母表示数 · 运算律与简写工坊
              </h3>
              <span className="text-sm bg-[#CBE6FA] px-3 py-1 rounded-full text-[#1C5C86] border border-[#69B0E0]">🎯 拖拽表达式 匹配描述</span>
            </div>
            <AlgebraGame resetKey={gameResetKey} onNewGame={handleNewGame} />
          </div>
        </div>
      </div>
    );
  };
  
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
