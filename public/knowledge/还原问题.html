<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>还原问题·思维拓展 | 倒推法·逆推训练 | 拖拽排序 + 应用题闯关</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM & Babel CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <!-- SortableJS 拖拽排序库 (移动端完美支持) -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #5E6B3E 0%, #7B8F4A 100%);
            font-family: 'Segoe UI', 'Comic Neue', 'Poppins', system-ui, -apple-system, '圆体', '微软雅黑', sans-serif;
        }
        .step-card {
            background: #FFF7E8;
            border-radius: 1.5rem;
            box-shadow: 0 6px 0 #4a5e2c;
            transition: 0.1s linear;
            cursor: grab;
            user-select: none;
        }
        .step-card:active {
            cursor: grabbing;
        }
        .sortable-drag {
            opacity: 0.4;
            background: #e6f0c3;
            box-shadow: 0 0 10px rgba(90,110,50,0.3);
        }
        .answer-input:focus {
            transform: scale(1.02);
            box-shadow: 0 0 0 3px rgba(90,110,50,0.4);
        }
        button:active {
            transform: scale(0.96);
        }
        @media (max-width: 768px) {
            .title-main {
                font-size: 1.8rem !important;
            }
            .step-card {
                padding: 0.7rem 1rem;
                font-size: 0.85rem;
            }
        }
        .sortable-steps {
            list-style: none;
            padding: 0;
            margin: 0;
        }
    </style>
</head>
<body class="p-4 md:p-6 min-h-screen flex items-center justify-center">
    <div id="root" class="w-full max-w-6xl mx-auto"></div>

    <script type="text/babel">
        // --------------------------------------------------------------
        // 左侧题库: 还原问题 (倒推法, 逆运算)
        const reverseQuestions = [
            {
                text: "🍬 一个数加上5，再乘以3，结果是24，这个数是多少？",
                answer: 3,
                solution: "🎯 倒推法：最后结果24，除以3得8，再减去5得3。综合：24÷3-5=8-5=3。"
            },
            {
                text: "📦 一筐苹果，第一次卖出总数的一半多2个，第二次卖出剩下的一半少1个，还剩5个，原来有多少个苹果？",
                answer: 20,
                solution: "🎯 倒推：最后剩5个，第二次卖出剩下的一半少1，说明第二次之前有 (5-1)×2=8个；第一次卖出总数的一半多2，则原来有 (8+2)×2=20个。"
            },
            {
                text: "🧸 小明的压岁钱，先花掉一半多5元，又花掉剩下的一半少3元，最后还剩18元，原来有多少元？",
                answer: 70,
                solution: "🎯 倒推：最后剩18，第二次花掉剩下的一半少3，则第二次之前有 (18-3)×2=30元；第一次花掉一半多5，则原来有 (30+5)×2=70元。"
            },
            {
                text: "🚗 一辆汽车从A地开往B地，第一小时行了全程的1/3多5千米，第二小时行了剩下的一半少3千米，此时离B地还有20千米，AB两地相距多少千米？",
                answer: 78,
                solution: "🎯 倒推：剩20千米，第二小时行剩下的一半少3，则第二小时前有 (20-3)×2=34千米；第一小时行全程1/3多5，则全程为 (34+5)÷(1-1/3)=39÷2/3=58.5？不对，重新算：设全程x，第一小时后剩 x-(x/3+5)=2x/3-5，第二小时后剩 (2x/3-5)/2+3=20 → 解方程得x=78。正确。"
            },
            {
                text: "📖 一个数减去8，再除以5，加上3，再乘以4，结果是32，求这个数。",
                answer: 33,
                solution: "🎯 倒推：32÷4=8，8-3=5，5×5=25，25+8=33。"
            },
            {
                text: "🎈 三个袋子里共有球36个，从甲袋拿出4个放入乙袋，从乙袋拿出6个放入丙袋，这时三个袋球数相等，原来甲袋有多少个？",
                answer: 16,
                solution: "🎯 最后每袋12个。甲：给乙4个后剩12，所以原来甲=12+4=16；乙：得到甲4个，又给丙6个，最后12，原来乙=12-4+6=14；丙：得到乙6个，最后12，原来丙=12-6=6。"
            },
            {
                text: "🧴 一瓶酒精，第一次倒出总数的1/3，第二次倒出剩下的一半少10毫升，这时瓶里还剩50毫升，原来有多少毫升？",
                answer: 120,
                solution: "🎯 倒推：最后50，第二次倒出剩下的一半少10，则第二次前有 (50-10)×2=80毫升；第一次倒出1/3，剩下80对应总数的2/3，原来=80÷2/3=120毫升。"
            }
        ];

        // 左侧还原问题应用题组件
        const ReverseApp = () => {
            const [currentQ, setCurrentQ] = React.useState(null);
            const [userAnswer, setUserAnswer] = React.useState('');
            const [feedback, setFeedback] = React.useState('');
            const [showSolution, setShowSolution] = React.useState('');
            const [isCorrect, setIsCorrect] = React.useState(false);

            const loadRandomQuestion = React.useCallback(() => {
                const randomIndex = Math.floor(Math.random() * reverseQuestions.length);
                const newQ = { ...reverseQuestions[randomIndex] };
                setCurrentQ(newQ);
                setUserAnswer('');
                setFeedback('');
                setShowSolution('');
                setIsCorrect(false);
            }, []);

            React.useEffect(() => {
                if (reverseQuestions.length) loadRandomQuestion();
            }, [loadRandomQuestion]);

            const handleSubmit = () => {
                if (!currentQ) return;
                const answerNum = parseFloat(userAnswer.trim());
                if (isNaN(answerNum)) {
                    setFeedback("❓ 请输入数字答案哟～");
                    setShowSolution('');
                    setIsCorrect(false);
                    return;
                }
                const isAnsCorrect = Math.abs(answerNum - currentQ.answer) < 0.01;
                if (isAnsCorrect) {
                    setFeedback("🎉 完全正确！倒推法掌握得非常棒！ 🔄 逆向思维小天才！");
                    setIsCorrect(true);
                    setShowSolution(currentQ.solution);
                } else {
                    setFeedback(`😲 答案不对哦！正确答案是 ${currentQ.answer}。看看倒推法步骤吧～`);
                    setIsCorrect(false);
                    setShowSolution(currentQ.solution);
                }
            };

            const handleNext = () => loadRandomQuestion();

            if (!currentQ) return <div className="text-center text-white text-2xl p-10">✨ 加载还原题库中...</div>;

            return (
                <div className="bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 border border-green-800 h-full flex flex-col">
                    <div className="border-b-4 border-green-700 pb-3 mb-4 flex items-center gap-2">
                        <span className="text-4xl">🔄</span>
                        <h1 className="text-3xl md:text-4xl font-extrabold text-gray-800 title-main tracking-tight">还原问题·倒推思维营</h1>
                    </div>
                    {/* 知识点卡片 */}
                    <div className="bg-gradient-to-r from-green-50 to-lime-50 rounded-2xl p-4 mb-5 shadow-inner border border-green-200">
                        <h2 className="text-xl font-bold text-green-800 flex items-center gap-2">📖 核心秘籍 <span className="text-sm bg-green-200 px-2 py-0.5 rounded-full">倒推法·逆运算</span></h2>
                        <ul className="mt-2 space-y-1 text-gray-700 text-base md:text-lg list-disc pl-5">
                            <li>🔄 <span className="font-semibold">倒推法（逆推法）</span>：从最后结果出发，逐步逆序运算，直到求出最初数量。</li>
                            <li>✏️ <span className="font-semibold">逆运算规则</span>：加法变减法，减法变加法；乘法变除法，除法变乘法。</li>
                            <li>📐 <span className="font-semibold">解题步骤</span>：① 整理变化过程；② 从结果反向推导；③ 注意运算顺序和括号。</li>
                            <li>🧩 <span className="font-semibold">典型场景</span>：物品增减、赠送、运输、分数变化等多次操作。</li>
                        </ul>
                    </div>

                    {/* 题目卡片 */}
                    <div className="bg-amber-50 rounded-2xl p-5 border-l-[12px] border-l-green-600 shadow-md mb-5">
                        <div className="flex justify-between items-start flex-wrap gap-2">
                            <span className="bg-green-200 text-green-800 px-3 py-1 rounded-full text-sm font-bold">🔥 倒推挑战</span>
                            <button onClick={handleNext} className="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-1.5 px-5 rounded-full shadow-md transition flex items-center gap-1 text-sm md:text-base">
                                🔄 换一题
                            </button>
                        </div>
                        <div className="mt-4 text-gray-800 text-xl md:text-2xl font-medium leading-relaxed">
                            {currentQ.text}
                        </div>
                        <div className="mt-5 flex flex-col sm:flex-row gap-3 items-center">
                            <input 
                                type="number" 
                                step="any"
                                value={userAnswer}
                                onChange={(e) => setUserAnswer(e.target.value)}
                                placeholder="输入答案 (数字)"
                                className="answer-input w-full sm:w-48 px-5 py-3 border-2 border-green-400 rounded-2xl text-center text-lg bg-white focus:outline-none focus:border-green-600"
                            />
                            <button onClick={handleSubmit} className="bg-green-700 hover:bg-green-800 text-white font-bold py-3 px-8 rounded-2xl shadow-md transition text-lg w-full sm:w-auto">
                                ✅ 提交闯关
                            </button>
                        </div>
                    </div>

                    {/* 反馈区 */}
                    {feedback && (
                        <div className={`rounded-2xl p-4 mb-4 ${isCorrect ? 'bg-green-100 border-l-8 border-green-500' : 'bg-rose-50 border-l-8 border-rose-400'}`}>
                            <p className="text-lg font-semibold flex items-center gap-2">{isCorrect ? '🏆 反馈' : '📚 学习提示'}</p>
                            <p className="text-gray-800 text-base md:text-lg mt-1">{feedback}</p>
                        </div>
                    )}
                    {showSolution && (
                        <div className="bg-sky-50 rounded-2xl p-4 border border-sky-200">
                            <p className="font-bold text-sky-800 text-lg flex items-center gap-2">✍️ 倒推法详解</p>
                            <p className="text-gray-700 mt-1 text-base md:text-lg leading-relaxed whitespace-pre-line">{showSolution}</p>
                            <div className="mt-2 text-green-700 text-sm italic">💡 提示：从后往前推，每一步做逆运算。</div>
                        </div>
                    )}
                    <div className="mt-3 text-center text-gray-500 text-sm">
                        🔄 逆推法：结果 → 逆运算 → 最初量
                    </div>
                </div>
            );
        };

        // --------------------------------------------------------------
        // 右侧小游戏：还原问题解题步骤拖拽排序 (倒推步骤)
        const stepsChallenges = [
            {
                title: "🔄 挑战1：单步逆推",
                description: "一个数加上7，再乘以4，结果是40，求这个数。",
                correctSteps: [
                    "① 从结果40开始逆推。",
                    "② 乘以4的逆运算是除以4：40 ÷ 4 = 10。",
                    "③ 加上7的逆运算是减去7：10 - 7 = 3。",
                    "④ 答：这个数是3。"
                ]
            },
            {
                title: "🔄 挑战2：两步逆推（一半多/少）",
                description: "一篮鸡蛋，第一次卖掉一半多2个，第二次卖掉剩下的一半少1个，还剩5个，原来有多少个？",
                correctSteps: [
                    "① 从最后5个开始逆推。",
                    "② 第二次卖掉剩下的一半少1，则第二次前有 (5-1)×2 = 8个。",
                    "③ 第一次卖掉总数的一半多2，则原来有 (8+2)×2 = 20个。",
                    "④ 答：原来有20个鸡蛋。"
                ]
            },
            {
                title: "🔄 挑战3：加减乘除混合",
                description: "一个数减去5，再除以3，加上4，再乘以2，结果是30，求原数。",
                correctSteps: [
                    "① 从30逆推：乘以2的逆运算是除以2 → 30÷2=15。",
                    "② 加上4的逆运算是减去4 → 15-4=11。",
                    "③ 除以3的逆运算是乘以3 → 11×3=33。",
                    "④ 减去5的逆运算是加上5 → 33+5=38。",
                    "⑤ 答：原数是38。"
                ]
            },
            {
                title: "🔄 挑战4：三人分配还原",
                description: "甲乙丙三人共有36元，甲给乙4元，乙给丙6元，这时三人钱相等，原来甲有多少元？",
                correctSteps: [
                    "① 最后每人12元（36÷3=12）。",
                    "② 甲：给了乙4元后剩12元，原来甲=12+4=16元。",
                    "③ 乙：得到甲的4元，又给丙6元，最后12元，原来乙=12-4+6=14元。",
                    "④ 丙：得到乙6元，最后12元，原来丙=12-6=6元。",
                    "⑤ 答：原来甲有16元。"
                ]
            }
        ];

        // 右侧拖拽排序组件
        const StepsSortGame = () => {
            const [challenge, setChallenge] = React.useState(null);
            const [shuffledSteps, setShuffledSteps] = React.useState([]);
            const [gameFeedback, setGameFeedback] = React.useState('');
            const [checkStyle, setCheckStyle] = React.useState('info');
            const containerRef = React.useRef(null);
            const sortableRef = React.useRef(null);

            const loadRandomChallenge = React.useCallback(() => {
                const randomIndex = Math.floor(Math.random() * stepsChallenges.length);
                const newChallenge = { ...stepsChallenges[randomIndex] };
                const stepsCopy = [...newChallenge.correctSteps];
                // Fisher-Yates 打乱顺序
                for (let i = stepsCopy.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [stepsCopy[i], stepsCopy[j]] = [stepsCopy[j], stepsCopy[i]];
                }
                setChallenge(newChallenge);
                setShuffledSteps(stepsCopy);
                setGameFeedback('✨ 拖拽卡片，按正确的还原问题（倒推）步骤顺序排列！(从上到下)');
                setCheckStyle('info');
            }, []);

            React.useEffect(() => {
                loadRandomChallenge();
            }, [loadRandomChallenge]);

            // 每当 shuffledSteps 变化，重新初始化 Sortable 实例
            React.useEffect(() => {
                if (!containerRef.current || !challenge) return;
                const listContainer = containerRef.current.querySelector('#sortable-steps-list');
                if (!listContainer) return;
                if (sortableRef.current) sortableRef.current.destroy();
                sortableRef.current = new Sortable(listContainer, {
                    animation: 250,
                    ghostClass: 'sortable-drag',
                    handle: '.step-card',
                    touchStartThreshold: 2,
                    onEnd: () => {}
                });
                return () => {
                    if (sortableRef.current) {
                        sortableRef.current.destroy();
                        sortableRef.current = null;
                    }
                };
            }, [shuffledSteps, challenge]);

            const handleCheckOrder = () => {
                if (!challenge) return;
                const listItems = containerRef.current?.querySelectorAll('#sortable-steps-list li');
                if (!listItems || listItems.length === 0) return;
                const currentOrder = Array.from(listItems).map(li => li.innerText.trim());
                const isMatch = currentOrder.length === challenge.correctSteps.length &&
                    currentOrder.every((step, idx) => step === challenge.correctSteps[idx]);
                if (isMatch) {
                    setGameFeedback('🎉 完美排序！还原问题倒推步骤完全正确！成为逆推高手！🏅');
                    setCheckStyle('success');
                    if (containerRef.current) {
                        containerRef.current.style.transform = 'scale(1.01)';
                        setTimeout(() => { if(containerRef.current) containerRef.current.style.transform = ''; }, 200);
                    }
                } else {
                    setGameFeedback('🤔 顺序不对哦！再想想还原问题解题流程：从后往前逆推，一步一步逆运算。重新拖拽排序吧！💪');
                    setCheckStyle('error');
                }
            };

            const handleRefreshGame = () => {
                loadRandomChallenge();
            };

            if (!challenge) return <div className="bg-white/90 rounded-3xl p-5 text-center">加载趣味排序游戏...</div>;

            return (
                <div className="bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 border border-green-800 h-full flex flex-col">
                    <div className="border-b-2 border-dashed border-green-600 pb-2 mb-3 flex items-center gap-2">
                        <span className="text-3xl">🎮</span>
                        <h2 className="text-2xl md:text-3xl font-bold text-green-800">拖拽排序·倒推特工队</h2>
                    </div>
                    <div className="bg-green-50 rounded-xl p-3 mb-4">
                        <p className="font-bold text-green-800 text-lg">📌 当前排序挑战</p>
                        <p className="text-gray-800 text-base md:text-lg mt-1">{challenge.description}</p>
                    </div>
                    <div className="text-sm text-gray-600 mb-2 flex items-center gap-1">👇 <strong>拖拽下方卡片</strong>，按正确的解题步骤顺序排列（从上到下逻辑递进）</div>
                    <div ref={containerRef} className="bg-[#FFF4E6] rounded-2xl p-4 min-h-[320px] shadow-inner">
                        <ul id="sortable-steps-list" className="sortable-steps space-y-3">
                            {shuffledSteps.map((step, idx) => (
                                <li key={idx} className="step-card p-4 text-gray-800 text-base md:text-lg font-medium shadow-md rounded-xl border-l-8 border-green-500 bg-white cursor-grab transition-all hover:shadow-lg">
                                    {step}
                                </li>
                            ))}
                        </ul>
                    </div>
                    <div className="flex flex-wrap justify-center gap-4 mt-6">
                        <button onClick={handleCheckOrder} className="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-full shadow transition text-base md:text-lg">
                            ✅ 检查排序
                        </button>
                        <button onClick={handleRefreshGame} className="bg-lime-600 hover:bg-lime-700 text-white font-bold py-2 px-6 rounded-full shadow transition text-base md:text-lg">
                            🔄 新步骤挑战
                        </button>
                    </div>
                    <div className={`mt-4 text-center text-base font-medium rounded-xl p-2 transition-all ${
                        checkStyle === 'success' ? 'bg-green-100 text-green-700' : 
                        checkStyle === 'error' ? 'bg-rose-50 text-rose-600' : 'bg-green-50 text-green-700'
                    }`}>
                        {gameFeedback}
                    </div>
                    <div className="mt-3 text-center text-xs text-green-600">
                        💡 拖拽卡片调整顺序，排序正确即掌握还原问题四步法（结果→逆运算→逐步推导→作答）。
                    </div>
                    <div className="mt-3 text-green-700 bg-green-50 p-2 rounded-xl text-sm text-center">
                        🧸 拖拽排序小游戏融合倒推思维：逆运算·逐步还原·逆向推理，在排序中强化逆向逻辑！
                    </div>
                </div>
            );
        };

        // --------------------------------------------------------------
        // 根组件：左右布局
        const MainPage = () => {
            return (
                <div className="flex flex-col lg:flex-row gap-6 w-full">
                    {/* 左侧 还原应用题训练 */}
                    <div className="flex-1">
                        <ReverseApp />
                    </div>
                    {/* 右侧 拖拽步骤排序游戏 */}
                    <div className="flex-1">
                        <StepsSortGame />
                    </div>
                </div>
            );
        };

        // 渲染根组件
        const rootElement = document.getElementById('root');
        const reactRoot = ReactDOM.createRoot(rootElement);
        reactRoot.render(<MainPage />);
    </script>
</body>
</html>
