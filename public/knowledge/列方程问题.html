<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>列方程小高手 | 代数思维·等量关系专项</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM & Babel -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        .dragging-card {
            opacity: 0.6;
            cursor: grabbing;
            transform: scale(0.95);
        }
        .drop-zone-active {
            transition: 0.08s linear;
            box-shadow: 0 0 0 4px #c084fc, 0 0 0 8px rgba(192,132,252,0.3);
            background-color: #f3e8ff !important;
        }
        .win-glow {
            animation: winPulse 0.5s ease-in-out 2;
        }
        @keyframes winPulse {
            0% { box-shadow: 0 0 0 0 #c084fc; background-color: #faf5ff; }
            50% { box-shadow: 0 0 0 12px rgba(192,132,252,0.5); background-color: #fae8ff; }
            100% { box-shadow: 0 0 0 0 #c084fc; background-color: #faf5ff; }
        }
        [draggable="true"] {
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }
        .custom-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #9333ea;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-50 via-fuchsia-50 to-purple-100 min-h-screen p-4 md:p-6 font-sans">

<div id="root"></div>

<script type="text/babel">
    // 列方程问题专项训练 —— 代数思维 · 等量关系 · 拖拽数字答案
    const { useState, useCallback, useEffect, useRef } = React;

    // ---------- 随机题目生成器 (行程、年龄、和倍、鸡兔同笼、几何) 保证整数解，难度适中 ----------
    const generateEquationProblem = () => {
        const type = Math.floor(Math.random() * 5); // 0:行程,1:年龄,2:和倍,3:鸡兔同笼,4:几何
        if (type === 0) {
            // 行程问题：同时出发相向或追及，求速度或时间。 设未知数求速度或时间整数
            const scenario = Math.floor(Math.random() * 2); // 0:相遇,1:追及
            if (scenario === 0) {
                // 相遇问题: 两地距离 s, 甲速a, 乙速b, 相遇时间 t = s/(a+b) , 求其中一个速度
                const s = (Math.floor(Math.random() * 8) + 4) * 10; // 40~120, 10的倍数
                const a = Math.floor(Math.random() * 8) + 4; // 4~12
                const b = Math.floor(Math.random() * 8) + 4;
                const t = s / (a + b);
                if (Number.isInteger(t) && t > 0 ) {
                    const askVari = Math.floor(Math.random() * 2); // 0求甲速,1求乙速
                    const correct = askVari === 0 ? a : b;
                    const other = askVari === 0 ? b : a;
                    const questionText = `🚗 行程问题：甲、乙两地相距 ${s} 千米。客车从甲地开往乙地，货车从乙地开往甲地，同时出发，经过 ${t} 小时相遇。已知客车每小时比货车快 ${Math.abs(a-b)} 千米，求${askVari === 0 ? '客车' : '货车'}的速度是多少千米/时？`;
                    // 注意给出的等量关系: 速度和×时间=距离, 且速度差已知。需要列方程 (v + (v±差)) * t = s
                    // 实际为方便，直接给出正确解a或b
                    return { text: questionText, correctAnswer: correct, hint: "💡 解：设所求速度为 x 千米/时，另一速度为 x ± 差，根据 (x + 另一速度) × 相遇时间 = 总路程，列方程求解。" };
                } else return generateEquationProblem();
            } else {
                // 追及问题: 快车追慢车，速度差×时间=路程差
                const speedDiff = Math.floor(Math.random() * 6) + 3; // 3~8
                const time = Math.floor(Math.random() * 4) + 2; // 2~5
                const distanceGap = speedDiff * time;
                const slowSpeed = Math.floor(Math.random() * 8) + 5; // 5~12
                const fastSpeed = slowSpeed + speedDiff;
                const which = Math.floor(Math.random() * 2);
                const correct = which === 0 ? slowSpeed : fastSpeed;
                const questionText = `🚴 追及问题：一辆慢车速度是 ${slowSpeed} 千米/时，它后面有一辆快车以更快速度追赶，经过 ${time} 小时追上慢车，此时快车比慢车多行驶了 ${distanceGap} 千米。求${which === 0 ? '慢车速度' : '快车速度'}是多少？(提示：速度差×时间=路程差)`;
                return { text: questionText, correctAnswer: correct, hint: "💡 等量关系：快车路程 - 慢车路程 = 路程差，或 (快车速-慢车速)×时间 = 路程差，直接求解。" };
            }
        } 
        else if (type === 1) {
            // 年龄问题：设未知数, 几年后年龄关系
            const ageNow = Math.floor(Math.random() * 20) + 8; // 8~27
            const parentAge = ageNow + Math.floor(Math.random() * 25) + 20; // 相差20~45
            const years = Math.floor(Math.random() * 8) + 2; // 2~9年后
            // 几年后，父亲年龄是儿子年龄的n倍
            let ratio = Math.floor((parentAge + years) / (ageNow + years));
            if (ratio < 2) ratio = 2;
            if (ratio > 5) ratio = 5;
            // 调整保证整数解方便，但直接出题用现成年龄: 设儿子x岁，则父亲(x+ diff)，方程 (x+diff + y) = n*(x+y)
            const diff = parentAge - ageNow;
            // 根据倍数关系反推，为了通用我们直接展示问题: 现在父亲年龄是儿子的倍，求儿子年龄
            const nowRatio = Math.floor(parentAge / ageNow);
            const ask = Math.floor(Math.random() * 2);
            if (ask === 0) {
                const correct = ageNow;
                const questionText = `👨‍👦 年龄问题：爸爸今年 ${parentAge} 岁，儿子今年 ${ageNow} 岁。几年前，爸爸的年龄是儿子的 ${nowRatio+1} 倍？ (提示: 设x年前，列方程)`;
                // 需要解: (parent - x) = (nowRatio+1)*(ageNow - x) => 整数
                // 直接返正确的x值
                let x = 0;
                for (let i=1; i<=ageNow; i++) {
                    if ((parentAge - i) === (nowRatio+1)*(ageNow - i)) { x = i; break; }
                }
                if (x > 0) return { text: questionText, correctAnswer: x, hint: "💡 设 x 年前，根据 (爸爸年龄 - x) = 倍数 × (儿子年龄 - x) 列方程。" };
                else return generateEquationProblem();
            } else {
                const correct = parentAge;
                const questionText = `👨‍👦 年龄问题：儿子今年 ${ageNow} 岁，爸爸比儿子大 ${diff} 岁，当爸爸年龄是儿子年龄的 ${ratio} 倍时，爸爸多少岁？(列方程求解)`;
                // 设当儿子 x 岁，爸爸 x+diff, 则 x+diff = ratio*x -> x = diff/(ratio-1)
                const x = diff / (ratio - 1);
                if (Number.isInteger(x) && x>0) {
                    const fatherAge = x + diff;
                    return { text: questionText, correctAnswer: fatherAge, hint: "💡 设儿子那时x岁，则爸爸x+差，列方程 爸爸 = 倍数 × 儿子 求解。" };
                } else return generateEquationProblem();
            }
        } 
        else if (type === 2) {
            // 和倍问题
            const sum = Math.floor(Math.random() * 50) + 30; // 30~80
            const ratio = Math.floor(Math.random() * 4) + 2; // 2~5倍
            const smaller = sum / (ratio + 1);
            if (Number.isInteger(smaller) && smaller > 0) {
                const larger = sum - smaller;
                const ask = Math.floor(Math.random() * 2);
                const correct = ask === 0 ? smaller : larger;
                const questionText = `📚 和倍问题：甲、乙两数之和是 ${sum}，甲数是乙数的 ${ratio} 倍。求${ask === 0 ? '乙数' : '甲数'}是多少？`;
                return { text: questionText, correctAnswer: correct, hint: "💡 设乙数为 x，则甲数为 " + ratio + "x，根据和列方程 x + " + ratio + "x = " + sum };
            } else return generateEquationProblem();
        } 
        else if (type === 3) {
            // 鸡兔同笼问题（列方程）
            const heads = Math.floor(Math.random() * 15) + 10; // 10~25
            const legs = heads * 2 + Math.floor(Math.random() * heads) * 2; // 保证兔子数量合理
            let rabbit = (legs - 2 * heads) / 2;
            if (rabbit > 0 && rabbit < heads && Number.isInteger(rabbit)) {
                const chicken = heads - rabbit;
                const ask = Math.floor(Math.random() * 2);
                const correct = ask === 0 ? rabbit : chicken;
                const questionText = `🐔🐇 鸡兔同笼：笼中共有 ${heads} 个头，${legs} 条腿。${ask === 0 ? '兔子' : '鸡'}有多少只？(列方程解答)`;
                return { text: questionText, correctAnswer: correct, hint: "💡 设兔子有 x 只，则鸡有 " + heads + " - x 只，根据腿数 4x + 2(" + heads + "-x) = " + legs + " 列方程。" };
            } else return generateEquationProblem();
        } 
        else {
            // 几何问题：长方形周长面积
            const length = Math.floor(Math.random() * 10) + 5; // 5~15
            const width = Math.floor(Math.random() * 8) + 3; // 3~10
            const perimeter = 2 * (length + width);
            const area = length * width;
            const which = Math.floor(Math.random() * 2);
            if (which === 0) {
                // 已知长比宽多几, 周长求长或宽
                const diff = length - width;
                const ask = Math.floor(Math.random() * 2);
                const correct = ask === 0 ? length : width;
                const questionText = `📐 几何问题：一个长方形的周长是 ${perimeter}，长比宽多 ${diff}，求${ask === 0 ? '长' : '宽'}是多少？`;
                return { text: questionText, correctAnswer: correct, hint: "💡 设宽为 x，则长为 x+" + diff + "，根据周长公式 2(x + x+"+diff+") = " + perimeter + " 列方程。" };
            } else {
                const diff = length - width;
                const areaKnown = area;
                const ask = Math.floor(Math.random() * 2);
                const correct = ask === 0 ? length : width;
                const questionText = `📐 几何面积问题：长方形的长比宽多 ${diff}，面积是 ${areaKnown}，求${ask === 0 ? '长' : '宽'}是多少？`;
                return { text: questionText, correctAnswer: correct, hint: "💡 设宽为 x，则长为 x+" + diff + "，根据面积 x(x+"+diff+") = " + areaKnown + " 列方程求解。" };
            }
        }
    };

    // 生成干扰选项 (基于正确答案)
    const generateOptions = (correct) => {
        let opts = new Set();
        opts.add(correct);
        let candidates = [correct+1, correct-1, correct+2, correct-2, correct+3, correct-3, Math.floor(correct*1.2), Math.floor(correct*0.8)];
        candidates = candidates.filter(v => v > 0 && v !== correct);
        for (let c of candidates) {
            if (opts.size < 4) opts.add(c);
            if (opts.size >= 4) break;
        }
        while (opts.size < 4) opts.add(correct + opts.size);
        let arr = Array.from(opts);
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    };

    // 主组件
    const EquationGame = () => {
        const [problem, setProblem] = useState(() => {
            const init = generateEquationProblem();
            return init;
        });
        const [options, setOptions] = useState([]);
        const [correctAnswer, setCorrectAnswer] = useState(0);
        const [isWin, setIsWin] = useState(false);
        const [message, setMessage] = useState("✨ 找出正确的方程解，拖拽数字到答案宝箱 ✨");
        const [winAnim, setWinAnim] = useState(false);
        const dragValueRef = useRef(null);

        const refreshProblem = useCallback(() => {
            const newProb = generateEquationProblem();
            setProblem(newProb);
            setCorrectAnswer(newProb.correctAnswer);
            const newOpts = generateOptions(newProb.correctAnswer);
            setOptions(newOpts);
            setIsWin(false);
            setWinAnim(false);
            setMessage("🔄 新题目！分析等量关系，拖拽正确解到宝箱中。");
        }, []);

        useEffect(() => {
            setCorrectAnswer(problem.correctAnswer);
            setOptions(generateOptions(problem.correctAnswer));
        }, [problem]);

        const onCardDragStart = (e, num) => {
            if (isWin) {
                e.preventDefault();
                setMessage("🏆 已经胜利啦！点击「换一题」继续挑战！");
                return false;
            }
            dragValueRef.current = num;
            e.dataTransfer.setData("text/plain", num);
            e.dataTransfer.effectAllowed = "copy";
            if (e.target.classList) e.target.classList.add("dragging-card");
        };
        const onDragEnd = (e) => {
            if (e.target.classList) e.target.classList.remove("dragging-card");
            const zone = document.getElementById("answerDropZone");
            if (zone) zone.classList.remove("drop-zone-active");
            dragValueRef.current = null;
        };
        const onDragOverTarget = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "copy";
            const zone = document.getElementById("answerDropZone");
            if (zone && !isWin) zone.classList.add("drop-zone-active");
        };
        const onDragLeaveTarget = () => {
            const zone = document.getElementById("answerDropZone");
            if (zone) zone.classList.remove("drop-zone-active");
        };
        const onDropToTarget = (e) => {
            e.preventDefault();
            const zone = document.getElementById("answerDropZone");
            if (zone) zone.classList.remove("drop-zone-active");
            if (isWin) {
                setMessage("你已经获胜，换一题再挑战吧！");
                return;
            }
            const raw = e.dataTransfer.getData("text/plain");
            if (!raw) return;
            const dropped = Number(raw);
            if (isNaN(dropped)) return;
            if (dropped === correctAnswer) {
                setIsWin(true);
                setWinAnim(true);
                setMessage("🎉🎉 完全正确！列方程高手！等量关系找得非常准 🎉🎉");
                setTimeout(() => setWinAnim(false), 600);
            } else {
                setMessage(`❌ ${dropped} 不是正确解。再找等量关系列方程！提示：${problem.hint}`);
                const msgDiv = document.querySelector(".feedback-msg");
                if (msgDiv) msgDiv.classList.add("animate-pulse");
                setTimeout(() => {
                    if (msgDiv) msgDiv.classList.remove("animate-pulse");
                }, 600);
            }
        };

        return (
            <div className="max-w-7xl mx-auto">
                {/* 主标题（大3号字体，相对适中的尺寸，深色） */}
                <div className="text-center mb-6">
                    <h1 className="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-900 to-fuchsia-700 drop-shadow-md">
                        ✏️ 列方程小高手 · 代数思维训练营 ✏️
                    </h1>
                    <p className="text-purple-800 text-lg font-semibold mt-1">设未知数 | 找等量 | 列方程 | 解方程</p>
                </div>
                
                <div className="flex flex-col lg:flex-row gap-7">
                    {/* 左侧知识点区 */}
                    <div className="lg:w-2/5 bg-white/80 backdrop-blur-sm rounded-3xl shadow-xl p-5 border border-purple-200 custom-scroll overflow-y-auto">
                        <div className="flex items-center gap-2 border-b-2 border-purple-400 pb-2 mb-4">
                            <span className="text-3xl">📖</span>
                            <span className="text-3xl font-bold text-purple-900">核心知识点</span>
                        </div>
                        <div className="space-y-5 text-gray-800 text-base md:text-lg">
                            <div className="bg-purple-50 p-4 rounded-xl">
                                <p className="font-extrabold text-purple-800 text-xl">🔑 列方程解应用题 · 四部曲</p>
                                <ol className="list-decimal list-inside space-y-1 mt-1">
                                    <li><strong>设未知数</strong>：通常设所求量为 x , 也可间接设元。</li>
                                    <li><strong>找等量关系</strong>：抓住关键词（是、比、一共、相差、几倍等）。</li>
                                    <li><strong>列方程</strong>：根据等量关系列出代数方程。</li>
                                    <li><strong>解方程+检验</strong>：求出未知数，并检查是否符合实际。</li>
                                </ol>
                            </div>
                            <div className="bg-indigo-50 p-4 rounded-xl">
                                <p className="font-bold text-purple-800">✨ 经典模型 · 等量关系 ✨</p>
                                <ul className="list-disc list-inside space-y-1">
                                    <li><strong>行程问题</strong>：路程 = 速度 × 时间；相遇：速度和×时间=总路程</li>
                                    <li><strong>年龄问题</strong>：年龄差不变；n年后年龄同时增加</li>
                                    <li><strong>和倍/差倍</strong>：和 = 较小量×(倍数+1)；差 = 较少量×(倍数-1)</li>
                                    <li><strong>鸡兔同笼</strong>：头数方程 + 腿数方程</li>
                                    <li><strong>几何图形</strong>：周长、面积公式列方程</li>
                                </ul>
                            </div>
                            <div className="bg-fuchsia-50 p-4 rounded-xl">
                                <p className="font-bold">🧠 进阶技巧 · 间接设元</p>
                                <p>当所求量不易直接表达时，可设中间量（如设速度为x，则另一速度用x表示）。善于利用“相等关系”构建桥梁。</p>
                                <div className="mt-2 text-sm bg-white p-2 rounded-md">例：甲是乙的2倍多3 → 设乙为x，则甲=2x+3</div>
                            </div>
                            <div className="bg-amber-50 p-3 rounded-lg text-sm">
                                💡 右侧游戏：列方程应用题，拖拽正确的<strong>数字解</strong>到答案宝箱。每个题目都要先分析等量关系再选择！
                            </div>
                        </div>
                    </div>
                    
                    {/* 右侧互动游戏区 */}
                    <div className="lg:w-3/5 bg-white/95 rounded-3xl shadow-2xl p-5 border-2 border-purple-300 flex flex-col">
                        {/* 题目卡片 */}
                        <div className="bg-gradient-to-r from-purple-200 via-fuchsia-100 to-purple-200 rounded-2xl p-5 mb-5 shadow-md">
                            <div className="flex flex-wrap justify-between items-start gap-2">
                                <div className="flex-1">
                                    <span className="inline-block bg-purple-700 text-white text-sm px-4 py-1 rounded-full">🧩 列方程挑战</span>
                                    <p className="text-lg md:text-xl font-bold text-purple-900 mt-3 leading-relaxed">
                                        {problem.text}
                                    </p>
                                    <div className="mt-2 text-sm bg-white/60 inline-block px-3 py-1 rounded-full text-purple-700">
                                        {problem.hint}
                                    </div>
                                </div>
                                <button 
                                    onClick={refreshProblem}
                                    className="bg-fuchsia-600 hover:bg-fuchsia-700 text-white font-bold py-2 px-6 rounded-full transition shadow-md flex items-center gap-1 text-base md:text-lg"
                                >
                                    🔄 换一题
                                </button>
                            </div>
                        </div>
                        
                        {/* 中央区域：拖拽选项卡片 + 答案宝箱 */}
                        <div className="flex flex-col md:flex-row gap-6 items-stretch mb-5">
                            {/* 卡片区 */}
                            <div className="flex-1 bg-purple-50/80 rounded-2xl p-4 border border-purple-200">
                                <p className="text-center font-bold text-purple-800 mb-3 text-lg">🎲 可拖拽数字 (正确解在其中)</p>
                                <div className="flex flex-wrap justify-center gap-3">
                                    {options.map((opt, idx) => (
                                        <div
                                            key={idx}
                                            draggable={!isWin}
                                            onDragStart={(e) => onCardDragStart(e, opt)}
                                            onDragEnd={onDragEnd}
                                            className="w-16 h-16 md:w-20 md:h-20 bg-gradient-to-br from-amber-300 to-orange-400 rounded-2xl shadow-lg flex flex-col items-center justify-center cursor-grab active:cursor-grabbing transition hover:scale-105 border-2 border-purple-500"
                                        >
                                            <span className="text-3xl md:text-4xl font-black text-white drop-shadow-md">{opt}</span>
                                            <span className="text-[10px] font-bold text-purple-900">拖拽</span>
                                        </div>
                                    ))}
                                </div>
                                <p className="text-xs text-center text-gray-600 mt-3">👉 把正确的“方程的解”拖到右边宝箱区</p>
                            </div>
                            
                            {/* 答案投放区 */}
                            <div 
                                id="answerDropZone"
                                onDragOver={onDragOverTarget}
                                onDragLeave={onDragLeaveTarget}
                                onDrop={onDropToTarget}
                                className={`flex-1 bg-gradient-to-br from-amber-50 to-yellow-50 rounded-2xl border-4 border-dashed p-5 flex flex-col items-center justify-center transition-all min-h-[200px] ${isWin ? 'border-green-500 bg-green-50' : 'border-purple-400'}`}
                            >
                                {isWin ? (
                                    <div className="text-center">
                                        <div className="text-7xl mb-2">🏆🎉</div>
                                        <p className="text-2xl font-black text-green-700">方程解对了！</p>
                                        <p className="text-purple-700 mt-2">代数思维升级成功</p>
                                    </div>
                                ) : (
                                    <>
                                        <span className="text-5xl mb-2">📦</span>
                                        <span className="text-xl font-bold text-purple-800 text-center">答案宝箱</span>
                                        <p className="text-center text-gray-600 mt-2 text-sm">将正确的“方程解”拖拽至此 → <br/>验证你的代数推理！</p>
                                        <div className="mt-3 w-32 h-16 bg-white rounded-xl flex items-center justify-center shadow-inner border border-purple-300">
                                            <span className="text-2xl font-mono font-bold text-gray-400">???</span>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                        
                        {/* 反馈消息区 */}
                        <div className={`feedback-msg mt-3 text-center py-3 px-4 rounded-full font-medium text-base md:text-lg ${isWin ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-800'} shadow-inner transition`}>
                            {isWin ? "🎉 完美！你掌握了列方程的精髓！点击换一题继续巩固 🎉" : message}
                        </div>
                        
                        {/* 操作辅助 */}
                        <div className="flex justify-center mt-4 gap-4">
                            <button 
                                onClick={() => {
                                    if (!isWin) setMessage(`💡 解题提示：${problem.hint}`);
                                    else setMessage("胜利啦，换题继续挑战更多方程题型吧");
                                }}
                                className="text-purple-600 bg-purple-100 px-3 py-1 rounded-full text-sm"
                            >
                                ✨ 再给个小提示
                            </button>
                            <button 
                                onClick={refreshProblem}
                                className="text-fuchsia-600 bg-fuchsia-100 px-3 py-1 rounded-full text-sm"
                            >
                                🎲 换一题继续训练
                            </button>
                        </div>
                        
                        <div className="text-xs text-purple-500 text-center mt-4 border-t pt-3 border-purple-200">
                            💡 方程思路：先明确未知数，根据“等量关系”布列方程，最后解出答案。熟练后能更快找出正确解！
                        </div>
                    </div>
                </div>
            </div>
        );
    };
    
    ReactDOM.createRoot(document.getElementById("root")).render(<EquationGame />);
</script>
</body>
</html>
