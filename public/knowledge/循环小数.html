<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>🔄 循环小数 · 数学游乐园</title>
  <!-- Tailwind + React CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .option-card {
      transition: all 0.15s ease;
    }
    .option-card:active {
      transform: scale(0.97);
    }
    .cycle-badge {
      font-family: monospace;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#FFF3E0] to-[#FFE7CC] min-h-screen flex items-center justify-center p-4 font-sans">

<div id="root" class="w-full max-w-6xl mx-auto"></div>

<script type="text/babel">
  // ---------- 知识点卡片组件（循环小数）----------
  const KnowledgeCard = () => {
    return (
      <div className="bg-white/85 backdrop-blur-sm rounded-3xl p-5 shadow-xl border border-orange-200/80 h-full">
        <div className="flex items-center gap-2 border-b-2 border-orange-300 pb-3 mb-4">
          <span className="text-3xl">🔄</span>
          <h2 className="text-2xl font-extrabold text-amber-800">循环小数 · 无限规律<br/><span className="text-sm font-normal">小数部分依次不断重复出现的数字</span></h2>
        </div>
        <div className="space-y-4 text-amber-800">
          <div className="bg-orange-50/90 rounded-2xl p-4 border border-orange-200">
            <p className="font-bold text-orange-700 flex items-center gap-2">🔁 什么是循环小数？</p>
            <p className="text-sm mt-1">一个小数，从小数部分的某一位起，一个数字或几个数字依次不断地重复出现，这样的小数叫做<span className="font-bold text-orange-600">循环小数</span>。</p>
            <div className="mt-2 text-xs bg-white/60 p-2 rounded-lg font-mono">例：1÷3 = 0.3333… 写作 0.3(3) 或 0.<span className="border-t-2 border-orange-500">3</span></div>
          </div>
          <div className="bg-orange-50/90 rounded-2xl p-4 border border-orange-200">
            <p className="font-bold text-orange-700">📌 核心概念：</p>
            <ul className="list-disc list-inside space-y-1 mt-1 text-sm">
              <li><span className="font-bold">循环节</span>：循环小数中依次不断重复出现的数字。如 0.3232… 循环节是“32”</li>
              <li><span className="font-bold">记法</span>：只写一个循环节，并在循环节首位和末位数字上点一个点（或括号）。本游戏中用 <span className="bg-orange-100 px-1 rounded">0.3(3)</span> 表示“3循环”</li>
              <li><span className="font-bold">纯循环小数</span>：从小数部分第一位就开始循环，如 0.3(3)</li>
              <li><span className="font-bold">混循环小数</span>：不是第一位开始循环，如 0.1(6) = 0.1666…</li>
            </ul>
          </div>
          <div className="bg-orange-50/90 rounded-2xl p-4 border border-orange-200">
            <p className="font-bold text-orange-700">🧠 怎样判断分数能化成循环小数？</p>
            <p className="text-sm">一个最简分数，如果分母中除了质因数2和5以外，不含有其他质因数，这个分数就能化成有限小数；如果含有2和5以外的质因数，就能化成循环小数。</p>
            <div className="flex flex-wrap gap-2 mt-2 justify-center">
              <span className="bg-orange-200 px-2 py-1 rounded-full text-xs font-mono">1/3 = 0.3(3)</span>
              <span className="bg-orange-200 px-2 py-1 rounded-full text-xs font-mono">5/6 = 0.8(3)</span>
              <span className="bg-orange-200 px-2 py-1 rounded-full text-xs font-mono">1/7 = 0.142857(142857)</span>
            </div>
          </div>
        </div>
        <div className="mt-4 text-sm text-center italic text-amber-700 bg-orange-100/70 p-2 rounded-xl">
          🎯 右侧挑战：根据分数，选出正确的循环小数表示！
        </div>
      </div>
    );
  };

  // ---------- 预定义题库（分数 + 正确的循环小数表示 + 干扰项）----------
  // 干扰项基于正确表示手动构造，确保难度适中且准确
  const QUESTION_BANK = [
    {
      fraction: "1/3",
      correct: "0.3(3)",
      distractors: ["0.33", "0.4", "0.3(33)"]
    },
    {
      fraction: "2/3",
      correct: "0.6(6)",
      distractors: ["0.66", "0.7", "0.6(3)"]
    },
    {
      fraction: "1/6",
      correct: "0.1(6)",
      distractors: ["0.16", "0.166", "0.1(3)"]
    },
    {
      fraction: "5/6",
      correct: "0.8(3)",
      distractors: ["0.83", "0.833", "0.8(6)"]
    },
    {
      fraction: "1/7",
      correct: "0.142857(142857)",
      distractors: ["0.142857", "0.14(2857)", "0.142857(14285714)"]
    },
    {
      fraction: "2/7",
      correct: "0.285714(285714)",
      distractors: ["0.285714", "0.2857(14)", "0.28(5714)"]
    },
    {
      fraction: "1/9",
      correct: "0.1(1)",
      distractors: ["0.11", "0.111", "0.1(2)"]
    },
    {
      fraction: "4/9",
      correct: "0.4(4)",
      distractors: ["0.44", "0.5", "0.4(5)"]
    },
    {
      fraction: "5/11",
      correct: "0.45(45)",
      distractors: ["0.4545", "0.45", "0.4(54)"]
    },
    {
      fraction: "7/12",
      correct: "0.58(3)",
      distractors: ["0.583", "0.58(6)", "0.583(3)"]
    },
    {
      fraction: "2/15",
      correct: "0.1(3)",
      distractors: ["0.13", "0.133", "0.1(6)"]
    },
    {
      fraction: "8/15",
      correct: "0.5(3)",
      distractors: ["0.53", "0.533", "0.5(6)"]
    },
    {
      fraction: "1/12",
      correct: "0.08(3)",
      distractors: ["0.083", "0.08(6)", "0.083(3)"]
    },
    {
      fraction: "5/12",
      correct: "0.41(6)",
      distractors: ["0.416", "0.41(3)", "0.416(6)"]
    },
    {
      fraction: "4/11",
      correct: "0.36(36)",
      distractors: ["0.3636", "0.36", "0.3(63)"]
    }
  ];

  // 随机从题库中选一题（避免与当前相同，简单处理）
  const getRandomQuestion = (excludeId = null) => {
    let available = [...QUESTION_BANK];
    if (excludeId !== null) {
      available = available.filter((_, idx) => idx !== excludeId);
    }
    if (available.length === 0) available = [...QUESTION_BANK];
    const randomIndex = Math.floor(Math.random() * available.length);
    const originalIndex = QUESTION_BANK.findIndex(q => q.fraction === available[randomIndex].fraction);
    return {
      ...available[randomIndex],
      bankIndex: originalIndex
    };
  };

  // 将选项打乱（正确 + 干扰项混合）
  const buildShuffledOptions = (question) => {
    const opts = [question.correct, ...question.distractors.slice(0, 3)];
    for (let i = opts.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [opts[i], opts[j]] = [opts[j], opts[i]];
    }
    return opts;
  };

  // ---------- 循环小数挑战游戏组件 ----------
  const RecurringDecimalGame = ({ resetKey, onNewQuestion }) => {
    const [currentQuestion, setCurrentQuestion] = React.useState(() => {
      const q = getRandomQuestion();
      return {
        ...q,
        options: buildShuffledOptions(q)
      };
    });
    const [selectedOption, setSelectedOption] = React.useState(null);
    const [feedback, setFeedback] = React.useState('');
    const [isLocked, setIsLocked] = React.useState(false);
    const [hasScored, setHasScored] = React.useState(false);
    const [score, setScore] = React.useState(0);
    
    // 刷新题目 (换题时调用，保留总分)
    const refreshQuestion = () => {
      const newQ = getRandomQuestion(currentQuestion?.bankIndex);
      setCurrentQuestion({
        ...newQ,
        options: buildShuffledOptions(newQ)
      });
      setSelectedOption(null);
      setFeedback('');
      setIsLocked(false);
      setHasScored(false);
    };
    
    // 监听外部重置信号（换一题）
    React.useEffect(() => {
      refreshQuestion();
    }, [resetKey]);
    
    // 处理用户选择选项
    const handleSelectOption = (optValue) => {
      if (isLocked) {
        setFeedback('🎯 本题已完成！点击“换一题”继续挑战吧！');
        return;
      }
      setSelectedOption(optValue);
      const isCorrect = (optValue === currentQuestion.correct);
      
      if (isCorrect) {
        if (!hasScored) {
          setScore(prev => prev + 1);
          setHasScored(true);
        }
        setFeedback('🎉✨ 完全正确！循环小数魔法掌握得真棒！ ✨🎉');
        setIsLocked(true);
      } else {
        // 错误提示，显示正确答案
        setFeedback(`❌ 再想想～ 正确答案是 ${currentQuestion.correct}。仔细观察循环节！`);
        // 不锁定，用户可以继续选择正确选项
      }
    };
    
    // 重置本题（清除选择，解锁，但不能再次得分）
    const resetCurrent = () => {
      if (isLocked) {
        setSelectedOption(null);
        setFeedback('');
        setIsLocked(false);
      } else {
        setSelectedOption(null);
        setFeedback('');
      }
    };
    
    // 换新题
    const nextQuestion = () => {
      onNewQuestion(); // 触发父组件resetKey
    };
    
    // 根据选项动态样式
    const getOptionClass = (opt) => {
      let base = "option-card cursor-pointer text-center p-3 rounded-2xl shadow-md transition-all border-2 font-mono font-bold text-base md:text-lg break-words ";
      if (selectedOption === opt) {
        if (opt === currentQuestion.correct && isLocked) {
          return base + "bg-green-400 text-white border-green-600 scale-105 ring-2 ring-green-300";
        }
        return base + "bg-amber-400 text-white border-amber-600";
      }
      if (isLocked && opt === currentQuestion.correct) {
        return base + "bg-green-200 text-green-800 border-green-400 opacity-80";
      }
      return base + "bg-white hover:bg-orange-100 text-amber-800 border-orange-200 hover:border-orange-400";
    };
    
    // 显示分数样式
    const fractionDisplay = currentQuestion.fraction;
    
    return (
      <div className="flex flex-col gap-5">
        {/* 得分区域 */}
        <div className="flex justify-between items-center bg-white/70 rounded-2xl px-5 py-2 shadow-sm border border-orange-200">
          <div className="flex items-center gap-2">
            <span className="text-2xl">🏆</span>
            <span className="font-bold text-amber-800">循环能量</span>
            <span className="text-3xl font-black text-orange-600">{score}</span>
            <span className="text-sm text-amber-600">分</span>
          </div>
          <div className="text-xs bg-orange-200 px-3 py-1 rounded-full text-amber-800 font-medium">
            🔁 答对一题 +1
          </div>
        </div>
        
        {/* 题目魔法区 */}
        <div className="bg-gradient-to-r from-orange-100 to-amber-100 rounded-2xl p-5 shadow-md border border-orange-200">
          <div className="text-center">
            <div className="text-sm font-semibold text-orange-700 bg-white/50 inline-block px-4 py-1 rounded-full mb-3">🧮 分数转小数挑战 🧮</div>
            <div className="text-5xl md:text-6xl font-black font-mono text-amber-800 bg-white/60 py-5 px-4 rounded-2xl inline-block shadow-inner">
              {fractionDisplay}
            </div>
            <div className="mt-3 text-sm text-orange-700 bg-orange-50/80 rounded-full px-3 py-1 inline-flex items-center gap-1">
              <span>🔍 这个分数化成小数是？注意循环节！</span>
            </div>
          </div>
        </div>
        
        {/* 选项区域 - 四个魔法卡片 */}
        <div className="grid grid-cols-2 md:grid-cols-2 gap-3 mt-2">
          {currentQuestion.options.map((opt, idx) => (
            <div
              key={idx}
              className={getOptionClass(opt)}
              onClick={() => handleSelectOption(opt)}
            >
              <div className="text-xl md:text-2xl tracking-wide">{opt}</div>
            </div>
          ))}
        </div>
        
        {/* 反馈信息 */}
        {feedback && (
          <div className={`text-center font-bold p-3 rounded-xl ${
            feedback.includes('正确') ? 'bg-green-200 text-green-800 border-l-8 border-green-500' : 'bg-amber-100 text-amber-700 border-l-8 border-amber-400'
          } shadow-sm`}>
            {feedback}
          </div>
        )}
        
        {/* 操作按钮组 */}
        <div className="flex gap-3 mt-2">
          <button 
            onClick={resetCurrent} 
            className="flex-1 bg-amber-200 hover:bg-amber-300 text-amber-800 font-bold py-2.5 rounded-full transition shadow-sm text-base active:scale-[0.98]"
          >
            🔄 重置本题
          </button>
          <button 
            onClick={nextQuestion} 
            className="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-2.5 rounded-full transition shadow-md text-base active:scale-[0.98]"
          >
            🎲 换一题
          </button>
        </div>
        
        {/* 小贴士：循环节辨识 */}
        <div className="text-xs text-center text-amber-700 bg-orange-50/70 rounded-full py-1.5 px-3">
          💡 小窍门：循环小数的小数部分会“永远重复”一组数字。括号内就是循环节，比如 0.3(3) = 0.3333...
        </div>
      </div>
    );
  };
  
  // ---------- 主应用 App (浅橙主题) ----------
  const App = () => {
    const [gameResetKey, setGameResetKey] = React.useState(0);
    
    const handleNewGame = () => {
      setGameResetKey(prev => prev + 1);
    };
    
    return (
      <div className="flex flex-col lg:flex-row gap-6">
        {/* 左侧知识点卡片 */}
        <div className="lg:w-5/12">
          <KnowledgeCard />
        </div>
        
        {/* 右侧互动游戏区 */}
        <div className="lg:w-7/12 flex flex-col gap-5">
          <div className="bg-white/75 backdrop-blur-sm rounded-3xl p-5 shadow-xl border border-orange-200/70">
            <div className="flex justify-between items-center mb-4 flex-wrap gap-3">
              <h3 className="text-xl font-bold text-amber-800 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
                  <path strokeLinecap="round" strokeLinejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
                循环小数 · 选对表示法
              </h3>
              <span className="text-sm text-amber-600 bg-orange-100 px-3 py-1 rounded-full">✨ 点击正确循环小数 ✨</span>
            </div>
            <RecurringDecimalGame resetKey={gameResetKey} onNewQuestion={handleNewGame} />
          </div>
          <div className="text-xs text-center text-amber-700 bg-white/60 rounded-full py-2 px-3 flex justify-center gap-3 backdrop-blur-sm">
            <span>⚡ 规则：根据左边的分数，从四个选项中选出正确的循环小数表示</span>
            <span>🏅 连续答对，成为循环小数大师！</span>
          </div>
        </div>
      </div>
    );
  };
  
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
