<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>圆的认识 · 车轮设计师 | 数学乐园</title>
  <!-- Tailwind + React CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    /* 全局字体放大6号（2.8rem），淡紫色主题背景 */
    body {
      font-size: 2.8rem;
      background: linear-gradient(135deg, #D9C2E6 0%, #CBAACB 100%);
      font-family: system-ui, 'Segoe UI', 'Comic Neue', 'Quicksand', sans-serif;
    }
    .drag-card {
      cursor: grab;
      transition: all 0.1s ease;
      user-select: none;
    }
    .drag-card:active {
      cursor: grabbing;
    }
    .drop-slot {
      transition: all 0.2s ease;
      border: 2px dashed #6b8c42;
      background-color: #f0f7e6;
    }
    .drag-over {
      background-color: #d9e6c3;
      transform: scale(1.02);
      border: 2px solid #4a6e2c;
    }
    .matched-card {
      opacity: 0.6;
      filter: grayscale(0.2);
      background: #c0d6a8;
      text-decoration: line-through;
      cursor: default;
      pointer-events: none;
    }
    .slot-filled {
      background-color: #c7f0c2;
      border: 2px solid #2e7d32;
    }
    .btn-fun:active {
      transform: scale(0.96);
    }
    @keyframes bounceSoft {
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-5px); }
    }
    .celebration {
      animation: bounceSoft 0.5s ease;
    }
    @media (max-width: 768px) {
      body {
        font-size: 1.8rem;
      }
      .drag-card, .drop-slot {
        font-size: 1.2rem;
      }
    }
    .circle-svg {
      background: white;
      border-radius: 1rem;
      display: inline-block;
      box-shadow: 0 0.2rem 0.6rem rgba(0,0,0,0.1);
    }
  </style>
</head>
<body class="min-h-screen p-4 md:p-6">
<div id="root" class="w-full max-w-7xl mx-auto"></div>

<script type="text/babel">
  // ======================= 小学数学 · 圆的认识 =======================
  // 知识点：圆心（O）、半径（r）、直径（d），半径 = 直径÷2，直径 = 半径×2。
  
  // ---------- 游戏数据：三个配对项（圆心、半径、直径）每个出现两次，共6张卡片 ----------
  const circleParts = [
    { id: 1, name: "圆心", targetKey: "center", label: "圆心 (O)" },
    { id: 2, name: "半径", targetKey: "radius", label: "半径 (r)" },
    { id: 3, name: "直径", targetKey: "diameter", label: "直径 (d)" }
  ];
  
  // 每个部分生成两张卡片（增加游戏趣味），共6张
  const generateCards = () => {
    let cards = [];
    circleParts.forEach(part => {
      for (let i = 0; i < 2; i++) {
        cards.push({
          id: `card-${part.id}-${i}`,
          name: part.name,
          targetKey: part.targetKey,
          matched: false
        });
      }
    });
    // 打乱顺序
    for (let i = cards.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [cards[i], cards[j]] = [cards[j], cards[i]];
    }
    return cards;
  };
  
  // 圆形示意图（带标注点）
  const CircleDiagram = () => {
    return (
      <svg width="200" height="200" viewBox="0 0 200 200" className="circle-svg" style={{ background: 'white' }}>
        <circle cx="100" cy="100" r="80" fill="#c8e6c9" stroke="#2e7d32" strokeWidth="3" />
        {/* 圆心 */}
        <circle cx="100" cy="100" r="4" fill="black" />
        <text x="105" y="95" fontSize="14" fill="black">圆心 O</text>
        {/* 半径：从圆心到圆周 */}
        <line x1="100" y1="100" x2="180" y2="100" stroke="#d97706" strokeWidth="3" strokeDasharray="6,4" />
        <text x="130" y="90" fontSize="14" fill="#d97706">半径 r</text>
        {/* 直径：穿过圆心的弦 */}
        <line x1="20" y1="100" x2="180" y2="100" stroke="#b45309" strokeWidth="3" strokeDasharray="6,4" />
        <text x="50" y="85" fontSize="14" fill="#b45309">直径 d</text>
        {/* 端点标记 */}
        <circle cx="20" cy="100" r="3" fill="#b45309" />
        <circle cx="180" cy="100" r="3" fill="#b45309" />
        <circle cx="100" cy="100" r="3" fill="black" />
      </svg>
    );
  };
  
  // 游戏组件：拖拽配对（将名称卡片拖拽到对应槽位）
  const MatchingGame = () => {
    const [cards, setCards] = React.useState(() => generateCards());
    // 槽位：三个槽位（圆心、半径、直径），每个可容纳2张卡片
    const [slots, setSlots] = React.useState({
      center: { filled: 0, total: 2, correctName: "圆心" },
      radius: { filled: 0, total: 2, correctName: "半径" },
      diameter: { filled: 0, total: 2, correctName: "直径" }
    });
    const [dragOverSlotId, setDragOverSlotId] = React.useState(null);
    const [feedbackMsg, setFeedbackMsg] = React.useState("");
    const [gameWin, setGameWin] = React.useState(false);
    const [score, setScore] = React.useState(0);
    
    const totalCards = cards.length;
    const matchedCount = cards.filter(c => c.matched).length;
    
    const checkVictory = (currentSlots) => {
      const allFilled = Object.values(currentSlots).every(s => s.filled === s.total);
      if (allFilled && !gameWin) {
        setGameWin(true);
        setFeedbackMsg("🎉 完美！所有圆的名称都配对成功！你已是圆的小专家！ 🎉");
      }
    };
    
    // 拖拽卡片
    const onDragStart = (e, cardId, targetKey) => {
      const card = cards.find(c => c.id === cardId);
      if (card?.matched) {
        e.preventDefault();
        return false;
      }
      e.dataTransfer.setData("text/plain", JSON.stringify({ cardId, targetKey }));
      e.dataTransfer.effectAllowed = "copy";
      e.target.style.opacity = "0.6";
    };
    const onDragEnd = (e) => { if(e.target) e.target.style.opacity = ""; };
    
    const onDragOverSlot = (e, slotKey) => {
      e.preventDefault();
      setDragOverSlotId(slotKey);
      e.dataTransfer.dropEffect = "copy";
    };
    const onDragLeaveSlot = () => setDragOverSlotId(null);
    
    const onDropToSlot = (e, slotKey) => {
      e.preventDefault();
      setDragOverSlotId(null);
      const rawData = e.dataTransfer.getData("text/plain");
      if (!rawData) return;
      let dragData;
      try { dragData = JSON.parse(rawData); } catch(err) { return; }
      const { cardId, targetKey } = dragData;
      
      const sourceCard = cards.find(c => c.id === cardId);
      const targetSlot = slots[slotKey];
      if (!sourceCard || !targetSlot) return;
      if (sourceCard.matched) {
        setFeedbackMsg("⏳ 这张卡片已经配对过了！");
        setTimeout(() => setFeedbackMsg(""), 1300);
        return;
      }
      if (targetSlot.filled >= targetSlot.total) {
        setFeedbackMsg(`⚠️ ${targetSlot.correctName} 槽位已经放满了！`);
        setTimeout(() => setFeedbackMsg(""), 1300);
        return;
      }
      
      // 验证匹配：卡片的targetKey是否等于槽位key
      const isMatch = (targetKey === slotKey);
      if (!isMatch) {
        const correctName = targetSlot.correctName;
        setFeedbackMsg(`❌ 配对错误！“${sourceCard.name}” 不能放在 ${correctName} 槽位。再观察一下圆的各部分名称～`);
        setTimeout(() => setFeedbackMsg(""), 1800);
        return;
      }
      
      // 配对成功
      setCards(prev => prev.map(c => c.id === cardId ? { ...c, matched: true } : c));
      setSlots(prev => ({
        ...prev,
        [slotKey]: { ...prev[slotKey], filled: prev[slotKey].filled + 1 }
      }));
      setScore(prev => prev + 1);
      setFeedbackMsg(`✅ 正确！“${sourceCard.name}” 配对成功！`);
      setTimeout(() => setFeedbackMsg(""), 1200);
      
      const newSlots = { ...slots, [slotKey]: { ...slots[slotKey], filled: slots[slotKey].filled + 1 } };
      checkVictory(newSlots);
    };
    
    const resetGame = () => {
      setCards(generateCards());
      setSlots({
        center: { filled: 0, total: 2, correctName: "圆心" },
        radius: { filled: 0, total: 2, correctName: "半径" },
        diameter: { filled: 0, total: 2, correctName: "直径" }
      });
      setGameWin(false);
      setScore(0);
      setFeedbackMsg("✨ 新的一局！把右边的圆形名称卡片拖拽到左边正确的槽位中吧～");
      setTimeout(() => setFeedbackMsg(""), 1500);
    };
    
    return (
      <div className="bg-white/90 backdrop-blur-sm rounded-3xl p-5 shadow-xl border border-[#8bc34a] h-full flex flex-col">
        <div className="flex justify-between items-center flex-wrap gap-2 mb-3">
          <h3 className="text-2xl font-extrabold text-green-800">⚪ 圆的认识 · 拖拽连连看</h3>
          <div className="flex gap-2">
            <span className="bg-emerald-200 px-3 py-1 rounded-full text-base font-bold">🏆 配对 {score}/{totalCards}</span>
            <button onClick={resetGame} className="bg-gradient-to-r from-green-600 to-teal-600 text-white font-bold py-1.5 px-4 rounded-full text-sm shadow btn-fun">🔄 新的一局</button>
          </div>
        </div>
        <p className="text-sm text-green-700 bg-green-50 rounded-xl p-2 mb-3 text-center">
          🧸 玩法：观察圆中各部分的位置，然后将右侧的<strong>圆形名称卡片</strong>拖拽到左侧对应的分类槽位中（每个名称需要配对2次）。全部配对正确即可获胜！
        </p>
        
        <div className="flex flex-col md:flex-row gap-5 flex-1">
          {/* 左侧槽位区（三个槽位，每个包含示意图和放置区） */}
          <div className="flex-1 bg-green-50/60 rounded-2xl p-3">
            <div className="font-bold text-green-800 text-center mb-2">📦 圆的知识工坊</div>
            <div className="space-y-4 max-h-[550px] overflow-y-auto pr-1">
              {/* 圆心槽位 */}
              <div className="bg-white rounded-xl p-3 shadow border border-green-200">
                <div className="font-bold text-green-700 text-center">圆心 (O)</div>
                <div className="flex justify-center my-2">
                  <svg width="80" height="80" viewBox="0 0 80 80">
                    <circle cx="40" cy="40" r="30" fill="#c8e6c9" stroke="#2e7d32" strokeWidth="2" />
                    <circle cx="40" cy="40" r="3" fill="black" />
                  </svg>
                </div>
                <div 
                  onDragOver={(e) => onDragOverSlot(e, "center")}
                  onDragLeave={onDragLeaveSlot}
                  onDrop={(e) => onDropToSlot(e, "center")}
                  className={`drop-slot rounded-xl p-2 text-center transition-all ${dragOverSlotId === "center" ? 'drag-over' : ''} ${slots.center.filled === slots.center.total ? 'slot-filled' : ''}`}
                >
                  <div className="text-xs font-bold text-green-800">📌 圆心槽位</div>
                  <div className="text-[10px] text-gray-500">⬅️ 把“圆心”卡片拖到这里</div>
                </div>
              </div>
              {/* 半径槽位 */}
              <div className="bg-white rounded-xl p-3 shadow border border-green-200">
                <div className="font-bold text-green-700 text-center">半径 (r)</div>
                <div className="flex justify-center my-2">
                  <svg width="80" height="80" viewBox="0 0 80 80">
                    <circle cx="40" cy="40" r="30" fill="#c8e6c9" stroke="#2e7d32" strokeWidth="2" />
                    <line x1="40" y1="40" x2="70" y2="40" stroke="#d97706" strokeWidth="2" strokeDasharray="4,3" />
                  </svg>
                </div>
                <div 
                  onDragOver={(e) => onDragOverSlot(e, "radius")}
                  onDragLeave={onDragLeaveSlot}
                  onDrop={(e) => onDropToSlot(e, "radius")}
                  className={`drop-slot rounded-xl p-2 text-center transition-all ${dragOverSlotId === "radius" ? 'drag-over' : ''} ${slots.radius.filled === slots.radius.total ? 'slot-filled' : ''}`}
                >
                  <div className="text-xs font-bold text-green-800">📌 半径槽位</div>
                  <div className="text-[10px] text-gray-500">⬅️ 把“半径”卡片拖到这里</div>
                </div>
              </div>
              {/* 直径槽位 */}
              <div className="bg-white rounded-xl p-3 shadow border border-green-200">
                <div className="font-bold text-green-700 text-center">直径 (d)</div>
                <div className="flex justify-center my-2">
                  <svg width="80" height="80" viewBox="0 0 80 80">
                    <circle cx="40" cy="40" r="30" fill="#c8e6c9" stroke="#2e7d32" strokeWidth="2" />
                    <line x1="10" y1="40" x2="70" y2="40" stroke="#b45309" strokeWidth="2" strokeDasharray="4,3" />
                  </svg>
                </div>
                <div 
                  onDragOver={(e) => onDragOverSlot(e, "diameter")}
                  onDragLeave={onDragLeaveSlot}
                  onDrop={(e) => onDropToSlot(e, "diameter")}
                  className={`drop-slot rounded-xl p-2 text-center transition-all ${dragOverSlotId === "diameter" ? 'drag-over' : ''} ${slots.diameter.filled === slots.diameter.total ? 'slot-filled' : ''}`}
                >
                  <div className="text-xs font-bold text-green-800">📌 直径槽位</div>
                  <div className="text-[10px] text-gray-500">⬅️ 把“直径”卡片拖到这里</div>
                </div>
              </div>
            </div>
          </div>
          
          {/* 右侧卡片池 */}
          <div className="flex-1 bg-amber-50/60 rounded-2xl p-3">
            <div className="font-bold text-amber-800 text-center mb-2">🎲 圆形名称卡片 (拖拽我)</div>
            <div className="flex flex-wrap justify-center gap-3 max-h-[550px] overflow-y-auto">
              {cards.map(card => (
                <div 
                  key={card.id}
                  draggable={!card.matched}
                  onDragStart={(e) => onDragStart(e, card.id, card.targetKey)}
                  onDragEnd={onDragEnd}
                  className={`drag-card w-36 h-28 rounded-xl shadow-md flex items-center justify-center text-center font-bold transition ${card.matched ? 'bg-gray-400/60 cursor-default text-gray-300' : 'bg-gradient-to-br from-amber-400 to-orange-500 cursor-grab hover:scale-105 text-white'}`}
                >
                  <span className="text-base px-1">{card.matched ? "✓ 已用" : card.name}</span>
                </div>
              ))}
            </div>
            <div className="text-xs text-center text-amber-700 mt-2">💡 每个卡片只能用一次，拖拽到正确分类的槽位。每个名称需要配对2次。</div>
          </div>
        </div>
        
        {feedbackMsg && (
          <div className="mt-3 text-center bg-green-100 p-2 rounded-xl text-green-800 font-medium text-sm">
            {feedbackMsg}
          </div>
        )}
        {gameWin && (
          <div className="mt-3 text-center bg-gradient-to-r from-green-300 to-emerald-400 p-3 rounded-xl text-white font-bold text-lg celebration">
            🎉🎉 车轮设计师！你已完全掌握圆的认识！ 🎉🎉
          </div>
        )}
        <div className="mt-3 text-xs text-center text-green-600 bg-green-50 p-2 rounded-full">
          💡 圆：圆心O决定位置，半径r决定大小，直径d = 2×r，半径 = 直径÷2。
        </div>
      </div>
    );
  };
  
  // ---------- 左侧知识点：圆的认识 ----------
  const KnowledgeCard = () => {
    return (
      <div className="bg-gradient-to-br from-[#e8f5e9] to-[#c8e6c9] rounded-3xl p-5 shadow-xl border border-[#8bc34a]">
        <div className="flex items-center gap-2 mb-3">
          <span className="text-5xl">⚪</span>
          <h2 className="text-3xl font-extrabold text-green-900">圆的认识</h2>
        </div>
        <div className="space-y-4 text-base text-green-900">
          <div className="bg-white/70 rounded-xl p-3">
            <p className="font-bold text-xl">✨ 圆的定义</p>
            <p>圆是由曲线围成的平面图形，<strong>圆心</strong>到圆上任意一点的距离都相等。</p>
          </div>
          <div className="bg-white/70 rounded-xl p-3">
            <p className="font-bold">📐 各部分名称</p>
            <ul className="list-disc pl-5 space-y-2">
              <li><strong className="text-green-700">圆心</strong>：圆的中心点，用字母 O 表示。</li>
              <li><strong className="text-blue-700">半径</strong>：圆心到圆上任意一点的线段，用字母 r 表示。一个圆有无数条半径，都相等。</li>
              <li><strong className="text-purple-700">直径</strong>：通过圆心且两端都在圆上的线段，用字母 d 表示。一个圆有无数条直径，都相等。</li>
            </ul>
          </div>
          <div className="bg-white/70 rounded-xl p-3">
            <p className="font-bold">🔍 半径与直径的关系</p>
            <p>直径 = 半径 × 2，半径 = 直径 ÷ 2。 用字母表示：d = 2r，r = d ÷ 2。</p>
          </div>
          <div className="bg-amber-50 border-l-8 border-amber-400 p-3 rounded-xl">
            <p className="font-bold">🌟 小练习：</p>
            <p>一个圆的半径是4cm，直径是（ ）cm；直径是10dm，半径是（ ）dm。</p>
            <p className="text-sm text-green-700">（答案：8，5）</p>
          </div>
          <div className="bg-green-100 p-3 rounded-xl text-center text-sm">
            💡 小口诀：“圆有圆心和半径，直径半径两倍系；无数半径都相等，直径也等最整齐。”
          </div>
        </div>
      </div>
    );
  };
  
  // ---------- 快速小练习：半径直径换算 ----------
  const QuickQuiz = () => {
    const [question, setQuestion] = React.useState({ type: "r", value: 4, answer: 8, text: "半径 r = 4 cm，直径 d = ? cm" });
    const [userAnswer, setUserAnswer] = React.useState("");
    const [feedback, setFeedback] = React.useState("");
    
    const questionsBank = [
      { type: "r", value: 4, answer: 8, text: "半径 r = 4 cm，直径 d = ? cm" },
      { type: "d", value: 10, answer: 5, text: "直径 d = 10 dm，半径 r = ? dm" },
      { type: "r", value: 6, answer: 12, text: "半径 r = 6 m，直径 d = ? m" },
      { type: "d", value: 16, answer: 8, text: "直径 d = 16 cm，半径 r = ? cm" },
      { type: "r", value: 5, answer: 10, text: "半径 r = 5 mm，直径 d = ? mm" }
    ];
    const [idx, setIdx] = React.useState(0);
    
    const loadQuestion = (index) => {
      setQuestion(questionsBank[index % questionsBank.length]);
      setUserAnswer("");
      setFeedback("");
    };
    
    const nextQuiz = () => {
      const newIdx = idx + 1;
      setIdx(newIdx);
      loadQuestion(newIdx);
    };
    
    const checkAnswer = () => {
      const userVal = parseFloat(userAnswer);
      if (isNaN(userVal)) {
        setFeedback("📛 输入数字答案哟～");
        return;
      }
      if (Math.abs(userVal - question.answer) < 0.01) {
        setFeedback(`✅ 正确！${question.text} 答案是 ${question.answer}。`);
      } else {
        setFeedback(`❌ 不对哦，${question.text} 正确答案是 ${question.answer}。${question.type === "r" ? "d = 2×r" : "r = d÷2"}。`);
      }
    };
    
    React.useEffect(() => {
      loadQuestion(0);
    }, []);
    
    return (
      <div className="bg-white/90 rounded-3xl p-4 shadow-xl border border-[#8bc34a]">
        <div className="flex items-center gap-2 mb-2">
          <span className="text-2xl">🧠</span>
          <h3 className="text-xl font-extrabold text-green-800">快问快答 · 半径直径换算</h3>
        </div>
        <div className="bg-green-50 rounded-xl p-3 text-center">
          <p className="font-bold text-xl">{question.text}</p>
          <div className="flex gap-2 mt-2 justify-center">
            <input 
              type="number" step="any" value={userAnswer}
              onChange={(e) => setUserAnswer(e.target.value)}
              className="border border-green-300 rounded-lg px-3 py-1 w-40 text-center"
              placeholder="输入数字"
            />
            <button onClick={checkAnswer} className="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-sm">检验</button>
            <button onClick={nextQuiz} className="bg-emerald-400 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm">下一题</button>
          </div>
          {feedback && <div className="mt-2 text-sm text-green-800">{feedback}</div>}
        </div>
      </div>
    );
  };
  
  // ---------- 主应用布局 ----------
  const App = () => {
    return (
      <div className="flex flex-col xl:flex-row gap-6">
        {/* 左侧区域：知识点 + 快问快答 */}
        <div className="flex-1 xl:w-3/5 space-y-5">
          <KnowledgeCard />
          <QuickQuiz />
          <div className="bg-white/70 rounded-2xl p-3 text-center text-green-700 text-sm border border-green-200">
            🌈 圆是生活中最常见的图形之一，车轮、硬币、钟表…… 认识圆，探索几何的对称之美！
