<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>认识线段、直线、射线 | 图形魔法师</title>
  <!-- Tailwind + React CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    /* 全局字体放大6号（2.8rem），淡橙色主题背景 */
    body {
      font-size: 2.8rem;
      background: linear-gradient(135deg, #FFE0B5 0%, #FFCC88 100%);
      font-family: system-ui, 'Segoe UI', 'Comic Neue', 'Quicksand', sans-serif;
    }
    .drag-card {
      cursor: grab;
      transition: all 0.1s ease;
      user-select: none;
    }
    .drag-card:active {
      cursor: grabbing;
    }
    .drop-slot {
      transition: all 0.2s ease;
      border: 2px dashed #d49b3a;
      background-color: #fff8ef;
    }
    .drag-over {
      background-color: #ffe0b5;
      transform: scale(1.02);
      border: 2px solid #d49b3a;
    }
    .matched-card {
      opacity: 0.6;
      filter: grayscale(0.2);
      background: #e0c8a0;
      text-decoration: line-through;
      cursor: default;
      pointer-events: none;
    }
    .slot-filled {
      background-color: #c7f0c2;
      border: 2px solid #2e7d32;
    }
    .btn-fun:active {
      transform: scale(0.96);
    }
    @keyframes bounceSoft {
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-5px); }
    }
    .celebration {
      animation: bounceSoft 0.5s ease;
    }
    @media (max-width: 768px) {
      body {
        font-size: 1.8rem;
      }
      .drag-card, .drop-slot {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body class="min-h-screen p-4 md:p-6">
<div id="root" class="w-full max-w-7xl mx-auto"></div>

<script type="text/babel">
  // ======================= 小学数学 · 认识线段、直线、射线 =======================
  // 知识点：线段有两个端点、有限长；直线没有端点、无限长；射线有一个端点、一端无限长。
  
  // ---------- 游戏数据：拖拽配对（名称/特征描述 ↔ 图形名称或特征）----------
  const matchPairs = [
    { id: 1, item: "有两个端点，长度有限", target: "线段", correct: "线段", displayTarget: "线段" },
    { id: 2, item: "没有端点，可以向两端无限延伸", target: "直线", correct: "直线", displayTarget: "直线" },
    { id: 3, item: "有一个端点，可以向一端无限延伸", target: "射线", correct: "射线", displayTarget: "射线" },
    { id: 4, item: "图形：——（两端有端点）", target: "线段", correct: "线段", displayTarget: "线段" },
    { id: 5, item: "图形：←→（两端无端点）", target: "直线", correct: "直线", displayTarget: "直线" },
    { id: 6, item: "图形：●——→", target: "射线", correct: "射线", displayTarget: "射线" }
  ];
  
  // 游戏组件：拖拽配对（将左边特征卡片拖拽到右边正确的图形名称上）
  const MatchingGame = () => {
    // 左侧特征卡片（未配对）
    const [featureCards, setFeatureCards] = React.useState(() => 
      matchPairs.map(pair => ({
        id: pair.id,
        text: pair.item,
        matchTarget: pair.target,
        matched: false
      }))
    );
    
    // 右侧目标槽位（图形名称，打乱顺序）
    const [targetSlots, setTargetSlots] = React.useState(() => {
      let slots = matchPairs.map(pair => ({
        id: `slot-${pair.id}`,
        text: pair.displayTarget,
        matchTarget: pair.target,
        matched: false
      }));
      // 打乱顺序
      for (let i = slots.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [slots[i], slots[j]] = [slots[j], slots[i]];
      }
      return slots;
    });
    
    const [gameWin, setGameWin] = React.useState(false);
    const [dragOverSlotId, setDragOverSlotId] = React.useState(null);
    const [feedbackMsg, setFeedbackMsg] = React.useState("");
    const [score, setScore] = React.useState(0);
    
    const checkVictory = (cards, slots) => {
      const allMatched = cards.every(c => c.matched) && slots.every(s => s.matched);
      if (allMatched && !gameWin) {
        setGameWin(true);
        setFeedbackMsg("🎉 完美！所有特征都找到了正确的图形！你已是图形小专家！ 🎉");
      }
    };
    
    // 拖拽左侧特征卡片
    const onDragStart = (e, cardId, matchTarget) => {
      const card = featureCards.find(c => c.id === cardId);
      if (card?.matched) {
        e.preventDefault();
        return false;
      }
      e.dataTransfer.setData("text/plain", JSON.stringify({ type: "feature", cardId, matchTarget }));
      e.dataTransfer.effectAllowed = "copy";
      e.target.style.opacity = "0.6";
    };
    const onDragEnd = (e) => { if(e.target) e.target.style.opacity = ""; };
    
    const onDragOverSlot = (e, slotId) => {
      e.preventDefault();
      setDragOverSlotId(slotId);
      e.dataTransfer.dropEffect = "copy";
    };
    const onDragLeaveSlot = () => setDragOverSlotId(null);
    
    const onDropToSlot = (e, slotId) => {
      e.preventDefault();
      setDragOverSlotId(null);
      const rawData = e.dataTransfer.getData("text/plain");
      if (!rawData) return;
      let dragData;
      try { dragData = JSON.parse(rawData); } catch(err) { return; }
      if (dragData.type !== "feature") return;
      const { cardId, matchTarget } = dragData;
      
      const targetSlot = targetSlots.find(s => s.id === slotId);
      const sourceCard = featureCards.find(c => c.id === cardId);
      if (!targetSlot || !sourceCard) return;
      if (sourceCard.matched || targetSlot.matched) {
        setFeedbackMsg("⏳ 这个特征或图形槽位已经配对过了！");
        setTimeout(() => setFeedbackMsg(""), 1300);
        return;
      }
      
      // 验证匹配
      if (matchTarget === targetSlot.matchTarget) {
        // 配对成功
        setFeatureCards(prev => prev.map(c => c.id === cardId ? { ...c, matched: true } : c));
        setTargetSlots(prev => prev.map(s => s.id === slotId ? { ...s, matched: true } : s));
        setScore(prev => prev + 1);
        setFeedbackMsg(`✅ 正确！“${sourceCard.text}” 属于 ${targetSlot.text}。`);
        setTimeout(() => setFeedbackMsg(""), 1500);
        const newCards = featureCards.map(c => c.id === cardId ? { ...c, matched: true } : c);
        const newSlots = targetSlots.map(s => s.id === slotId ? { ...s, matched: true } : s);
        checkVictory(newCards, newSlots);
      } else {
        setFeedbackMsg(`❌ 配对错误！“${sourceCard.text}” 不属于 ${targetSlot.text}。再想想线段、直线、射线的特征～`);
        setTimeout(() => setFeedbackMsg(""), 1800);
      }
    };
    
    const resetGame = () => {
      const newFeatures = matchPairs.map(pair => ({
        id: pair.id,
        text: pair.item,
        matchTarget: pair.target,
        matched: false
      }));
      let newSlots = matchPairs.map(pair => ({
        id: `slot-${pair.id}`,
        text: pair.displayTarget,
        matchTarget: pair.target,
        matched: false
      }));
      for (let i = newSlots.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newSlots[i], newSlots[j]] = [newSlots[j], newSlots[i]];
      }
      setFeatureCards(newFeatures);
      setTargetSlots(newSlots);
      setGameWin(false);
      setScore(0);
      setFeedbackMsg("✨ 新的一局！把左边的特征拖拽到右边正确的图形名称上吧～");
      setTimeout(() => setFeedbackMsg(""), 1500);
    };
    
    const allMatched = featureCards.every(c => c.matched) && targetSlots.every(s => s.matched);
    const totalPairs = matchPairs.length;
    
    return (
      <div className="bg-white/90 backdrop-blur-sm rounded-3xl p-5 shadow-xl border border-[#d49b3a] h-full flex flex-col">
        <div className="flex justify-between items-center flex-wrap gap-2 mb-3">
          <h3 className="text-2xl font-extrabold text-amber-800">📐 图形配对 · 拖拽连连看</h3>
          <div className="flex gap-2">
            <span className="bg-emerald-200 px-3 py-1 rounded-full text-base font-bold">🏆 配对 {score}/{totalPairs}</span>
            <button onClick={resetGame} className="bg-gradient-to-r from-amber-500 to-orange-500 text-white font-bold py-1.5 px-4 rounded-full text-sm shadow btn-fun">🔄 新的一局</button>
          </div>
        </div>
        <p className="text-sm text-amber-700 bg-amber-50 rounded-xl p-2 mb-3 text-center">
          🧸 玩法：将左边的<strong>特征描述或图形</strong>拖拽到右边<strong>正确的图形名称</strong>上，配对正确会消除！全部配对成功即可获胜。
        </p>
        
        <div className="flex flex-col md:flex-row gap-5 flex-1">
          {/* 左侧特征卡片区 */}
          <div className="flex-1 bg-amber-50/60 rounded-2xl p-3">
            <div className="font-bold text-amber-800 text-center mb-2">📦 特征卡片 (拖拽我)</div>
            <div className="space-y-3 max-h-[420px] overflow-y-auto pr-1">
              {featureCards.map(card => (
                <div 
                  key={card.id}
                  draggable={!card.matched}
                  onDragStart={(e) => onDragStart(e, card.id, card.matchTarget)}
                  onDragEnd={onDragEnd}
                  className={`drag-card bg-gradient-to-r from-amber-400 to-orange-400 text-white font-bold rounded-xl p-3 text-center shadow-md transition ${card.matched ? 'matched-card' : 'hover:scale-102'}`}
                >
                  <span className="text-xl whitespace-pre-line">{card.text}</span>
                  {!card.matched && <div className="text-xs mt-1">✨ 拖拽到右侧</div>}
                  {card.matched && <div className="text-xs mt-1">✔️ 已配对</div>}
                </div>
              ))}
            </div>
          </div>
          
          {/* 右侧图形名称槽位区 */}
          <div className="flex-1 bg-emerald-50/60 rounded-2xl p-3">
            <div className="font-bold text-emerald-800 text-center mb-2">🎯 图形名称 (放置区)</div>
            <div className="grid grid-cols-1 gap-3 max-h-[420px] overflow-y-auto">
              {targetSlots.map(slot => (
                <div 
                  key={slot.id}
                  onDragOver={(e) => onDragOverSlot(e, slot.id)}
                  onDragLeave={onDragLeaveSlot}
                  onDrop={(e) => onDropToSlot(e, slot.id)}
                  className={`drop-slot rounded-xl p-3 text-center transition-all ${dragOverSlotId === slot.id ? 'drag-over' : ''} ${slot.matched ? 'slot-filled' : ''}`}
                >
                  <div className="text-2xl font-bold text-emerald-700">{slot.text}</div>
                  <div className="text-xs text-gray-500 mt-1">{slot.matched ? '✓ 已配对' : '⬅️ 把特征拖到这里'}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
        
        {feedbackMsg && (
          <div className="mt-3 text-center bg-amber-100 p-2 rounded-xl text-amber-800 font-medium text-sm">
            {feedbackMsg}
          </div>
        )}
        {allMatched && gameWin && (
          <div className="mt-3 text-center bg-gradient-to-r from-green-300 to-emerald-400 p-3 rounded-xl text-white font-bold text-lg celebration">
            🎉🎉 图形魔法师！你已掌握线段、直线、射线的特征！ 🎉🎉
          </div>
        )}
        <div className="mt-3 text-xs text-center text-amber-600 bg-amber-50 p-2 rounded-full">
          💡 线段有两个端点，长度有限；直线没有端点，两端无限延伸；射线有一个端点，一端无限延伸。
        </div>
      </div>
    );
  };
  
  // ---------- 左侧知识点：认识线段、直线、射线 ----------
  const KnowledgeCard = () => {
    return (
      <div className="bg-gradient-to-br from-[#fff4e6] to-[#ffe0b5] rounded-3xl p-5 shadow-xl border border-[#d49b3a]">
        <div className="flex items-center gap-2 mb-3">
          <span className="text-5xl">📏</span>
          <h2 className="text-3xl font-extrabold text-amber-900">认识线段、直线、射线</h2>
        </div>
        <div className="space-y-4 text-base text-amber-900">
          <div className="bg-white/70 rounded-xl p-3">
            <p className="font-bold text-xl">📏 线段</p>
            <p>有两个端点，长度有限，可以测量。例如：直尺的边、书本的边。</p>
            <div className="mt-2 flex justify-center">
              <div className="border-t-4 border-amber-600 w-32 relative">
                <div className="absolute -top-2 -left-1 w-3 h-3 rounded-full bg-amber-700"></div>
                <div className="absolute -top-2 -right-1 w-3 h-3 rounded-full bg-amber-700"></div>
              </div>
            </div>
          </div>
          <div className="bg-white/70 rounded-xl p-3">
            <p className="font-bold text-xl">📈 直线</p>
            <p>没有端点，可以向两端无限延伸，长度无限。例如：笔直的马路（想象无限长）。</p>
            <div className="mt-2 flex justify-center">
              <div className="border-t-4 border-amber-600 w-48"></div>
            </div>
          </div>
          <div className="bg-white/70 rounded-xl p-3">
            <p className="font-bold text-xl">✨ 射线</p>
            <p>有一个端点，可以向一端无限延伸，长度无限。例如：手电筒发出的光。</p>
            <div className="mt-2 flex justify-center">
              <div className="relative">
                <div className="absolute -top-2 left-0 w-3 h-3 rounded-full bg-amber-700"></div>
                <div className="border-t-4 border-amber-600 w-48 ml-4"></div>
              </div>
            </div>
          </div>
          <div className="bg-amber-50 border-l-8 border-amber-400 p-3 rounded-xl">
            <p className="font-bold">🌟 对比总结：</p>
            <ul className="list-disc pl-5 space-y-1 text-sm">
              <li>线段：2个端点，有限长</li>
              <li>直线：0个端点，无限长（两端）</li>
              <li>射线：1个端点，无限长（一端）</li>
            </ul>
          </div>
          <div className="bg-amber-100 p-3 rounded-xl text-center text-sm">
            💡 小口诀：“线段两端点，长度可测量；直线无端点，两端无限长；射线一端点，一端无限长；三种图形要分清，几何世界任徜徉。”
          </div>
        </div>
      </div>
    );
  };
  
  // ---------- 快速小练习：判断图形类型 ----------
  const QuickQuiz = () => {
    const [question, setQuestion] = React.useState({ desc: "有两个端点，长度有限", options: ["线段", "直线", "射线"], correct: "线段" });
    const [userChoice, setUserChoice] = React.useState(null);
    const [feedback, setFeedback] = React.useState("");
    
    const questionsBank = [
      { desc: "有两个端点，长度有限", options: ["线段", "直线", "射线"], correct: "线段" },
      { desc: "没有端点，可以向两端无限延伸", options: ["线段", "直线", "射线"], correct: "直线" },
      { desc: "有一个端点，可以向一端无限延伸", options: ["线段", "直线", "射线"], correct: "射线" },
      { desc: "手电筒发出的光线可以看作", options: ["线段", "直线", "射线"], correct: "射线" },
      { desc: "直尺的边可以看作", options: ["线段", "直线", "射线"], correct: "线段" },
      { desc: "笔直的马路（想象无限长）可以看作", options: ["线段", "直线", "射线"], correct: "直线" }
    ];
    const [idx, setIdx] = React.useState(0);
    
    const loadQuestion = (index) => {
      setQuestion(questionsBank[index % questionsBank.length]);
      setUserChoice(null);
      setFeedback("");
    };
    
    const nextQuiz = () => {
      const newIdx = idx + 1;
      setIdx(newIdx);
      loadQuestion(newIdx);
    };
    
    const checkAnswer = (choice) => {
      setUserChoice(choice);
      const isCorrect = (choice === question.correct);
      if (isCorrect) {
        setFeedback(`✅ 正确！${question.desc} 是 ${question.correct}。`);
      } else {
        setFeedback(`❌ 不对哦，${question.desc} 应该是 ${question.correct}。再想想特征～`);
      }
    };
    
    React.useEffect(() => {
      loadQuestion(0);
    }, []);
    
    return (
      <div className="bg-white/90 rounded-3xl p-4 shadow-xl border border-[#d49b3a]">
        <div className="flex items-center gap-2 mb-2">
          <span className="text-2xl">🧠</span>
          <h3 className="text-xl font-extrabold text-amber-800">快问快答 · 图形判断</h3>
        </div>
        <div className="bg-amber-50 rounded-xl p-3 text-center">
          <p className="font-bold text-xl">{question.desc}</p>
          <div className="flex flex-wrap gap-3 justify-center mt-2">
            {question.options.map(opt => (
              <button 
                key={opt}
                onClick={() => checkAnswer(opt)}
                className={`px-4 py-2 rounded-full font-bold transition ${userChoice === opt ? (opt === question.correct ? 'bg-green-500 text-white' : 'bg-red-400 text-white') : 'bg-gray-200 hover:bg-amber-200'}`}
              >
                {opt}
              </button>
            ))}
            <button onClick={nextQuiz} className="bg-emerald-400 hover:bg-emerald-500 text-white px-4 py-2 rounded-full text-sm">下一题</button>
          </div>
          {feedback && <div className="mt-2 text-sm text-amber-800">{feedback}</div>}
        </div>
      </div>
    );
  };
  
  // ---------- 主应用布局 ----------
  const App = () => {
    return (
      <div className="flex flex-col xl:flex-row gap-6">
        {/* 左侧区域：知识点 + 快问快答 */}
        <div className="flex-1 xl:w-3/5 space-y-5">
          <KnowledgeCard />
          <QuickQuiz />
          <div className="bg-white/70 rounded-2xl p-3 text-center text-amber-700 text-sm border border-amber-200">
            🌈 线段、直线、射线是几何世界的基础图形。记住它们的特征，你就能轻松分辨，为以后学习角、平行线等打好基础！
          </div>
        </div>
        {/* 右侧游戏区 */}
        <div className="flex-1 xl:w-2/5">
          <MatchingGame />
        </div>
      </div>
    );
  };
  
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
