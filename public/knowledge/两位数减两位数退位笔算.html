<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>两位数减两位数退位笔算 | 数学小英雄</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动时选中文本，提升拖拽体验 */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #ffe4ec;  /* 柔粉背景 */
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Poppins', system-ui, -apple-system, 'Nunito', sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 主容器 - 课程卡片式布局 */
        .course-container {
            max-width: 1300px;
            width: 100%;
            background: #fff9fb;
            border-radius: 60px 60px 70px 70px;
            box-shadow: 0 20px 35px rgba(245, 165, 185, 0.25);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* 左右两栏响应式 */
        .split-layout {
            display: flex;
            flex-wrap: wrap;
        }

        /* 左侧知识点区 */
        .knowledge-area {
            flex: 1.2;
            background: #fff5f8;
            padding: 28px 24px;
            border-right: 3px dashed #ffc0d0;
        }

        /* 右侧游戏区 */
        .game-area {
            flex: 1.8;
            background: #fffafc;
            padding: 28px 24px;
        }

        /* 知识点卡片样式 */
        .know-card {
            background: #ffeef4;
            border-radius: 42px;
            padding: 22px 20px;
            box-shadow: 0 8px 18px rgba(255, 170, 200, 0.2);
        }

        .know-title {
            font-size: 1.9rem;
            font-weight: bold;
            color: #c45a7a;
            border-left: 12px solid #ff98b9;
            padding-left: 18px;
            margin-bottom: 20px;
            letter-spacing: -0.3px;
        }

        .rule-box {
            background: white;
            border-radius: 32px;
            padding: 18px 20px;
            margin-bottom: 24px;
            box-shadow: 0 4px 12px #ffdfe8;
        }

        .rule-step {
            display: flex;
            gap: 14px;
            margin-bottom: 18px;
            align-items: flex-start;
        }

        .step-number {
            background: #ffb7ce;
            width: 32px;
            height: 32px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            font-size: 1.2rem;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .step-text {
            font-size: 1rem;
            line-height: 1.45;
            color: #5e3a48;
            font-weight: 500;
        }

        .example-box {
            background: #ffe2ec;
            border-radius: 28px;
            padding: 16px;
            text-align: center;
        }

        .vertical-math {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 12px 24px;
            border-radius: 32px;
            font-family: monospace;
            font-size: 2rem;
            font-weight: bold;
            color: #a54569;
            margin-top: 8px;
        }

        .vertical-math span {
            line-height: 1.3;
        }

        .borrow-note {
            background: #fff0d6;
            border-radius: 20px;
            padding: 10px 12px;
            font-size: 0.9rem;
            margin-top: 15px;
            color: #b45f3b;
        }

        /* 右侧游戏区样式 */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding: 0 6px;
        }

        .score-board {
            background: #ffdfe9;
            border-radius: 60px;
            padding: 8px 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #b34266;
            box-shadow: inset 0 -2px 0 #ffb0c6, 0 4px 8px rgba(0,0,0,0.02);
        }

        .score-board span {
            font-size: 2rem;
            color: #e66a92;
        }

        .refresh-btn {
            background: #ffc0d0;
            border: none;
            font-size: 1rem;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            color: #974c6a;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .refresh-btn:active {
            transform: scale(0.96);
            background: #ffaec2;
        }

        /* 竖式题目卡片 */
        .math-quiz {
            background: #fff0f4;
            border-radius: 48px;
            padding: 20px 12px;
            text-align: center;
            margin: 20px 0 20px;
            box-shadow: 0 10px 15px #ffe0e8;
        }

        .big-equation {
            font-size: 3.2rem;
            font-weight: bold;
            font-family: 'Courier New', 'SF Mono', monospace;
            background: white;
            display: inline-block;
            padding: 12px 35px;
            border-radius: 70px;
            color: #c15478;
            letter-spacing: 6px;
            box-shadow: 0 5px 0 #ffc0d0;
        }

        /* 拖拽放置区（鱼篓 / 答题区） */
        .drop-zone {
            background: #ffecf1;
            border: 4px dashed #ff99bb;
            border-radius: 56px;
            padding: 20px 12px;
            text-align: center;
            margin: 20px 0 28px;
            transition: all 0.2s;
            position: relative;
        }

        .drop-zone.active-drop {
            background: #ffe0ea;
            border-color: #ff6f96;
        }

        .drop-label {
            font-size: 1.2rem;
            font-weight: bold;
            color: #d46b8f;
            background: white;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 60px;
            margin-bottom: 12px;
        }

        .drop-icon {
            font-size: 2rem;
        }

        .answer-pool {
            text-align: center;
            margin-top: 10px;
        }

        .pool-title {
            color: #b45b7a;
            font-weight: bold;
            margin-bottom: 18px;
            font-size: 1.2rem;
        }

        /* 可拖拽卡片列表 */
        .drag-items {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 8px;
        }

        .drag-card {
            background: linear-gradient(145deg, #ffffff, #ffeef4);
            width: 110px;
            padding: 20px 0;
            text-align: center;
            border-radius: 48px;
            font-size: 2.2rem;
            font-weight: bold;
            color: #bc6f8c;
            box-shadow: 0 12px 18px rgba(190, 100, 130, 0.2);
            cursor: grab;
            transition: 0.1s linear;
            border: 2px solid #ffb7ce;
            backdrop-filter: blur(2px);
            touch-action: none;  /* 提升触摸拖动性能 */
        }

        .drag-card:active {
            cursor: grabbing;
        }

        /* 提示消息 */
        .message-area {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            font-size: 1rem;
            padding: 10px;
            border-radius: 50px;
            background: #ffeef2;
            color: #cb6e8e;
        }

        /* 拖拽克隆体样式 */
        .drag-clone {
            position: fixed;
            z-index: 9999;
            filter: drop-shadow(0 8px 20px rgba(0,0,0,0.2));
            opacity: 0.85;
            transform: scale(1.05);
            pointer-events: none;
            width: 110px;
            text-align: center;
            background: #ffeef4;
            border-radius: 48px;
            font-size: 2.2rem;
            font-weight: bold;
            color: #bc6f8c;
            border: 3px solid #ff98b9;
            backdrop-filter: blur(6px);
            box-sizing: content-box;
            padding: 20px 0;
        }

        /* 移动端适配 */
        @media (max-width: 780px) {
            body {
                padding: 12px;
            }
            .split-layout {
                flex-direction: column;
            }
            .knowledge-area {
                border-right: none;
                border-bottom: 3px dashed #ffc0d0;
                padding: 20px;
            }
            .game-area {
                padding: 24px 18px;
            }
            .drag-card {
                width: 85px;
                padding: 15px 0;
                font-size: 1.8rem;
            }
            .big-equation {
                font-size: 2.4rem;
                letter-spacing: 3px;
                padding: 8px 20px;
            }
            .know-title {
                font-size: 1.6rem;
            }
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 12px;
            color: #d49ab4;
            background: #fff2f7;
        }
    </style>
</head>
<body>

<div class="course-container">
    <div class="split-layout">
        <!-- 左侧 知识点 -->
        <div class="knowledge-area">
            <div class="know-card">
                <div class="know-title">📖 退位减法小讲堂</div>
                <div class="rule-box">
                    <div class="rule-step">
                        <div class="step-number">1</div>
                        <div class="step-text">个位看齐：个位减个位，不够减？别着急～</div>
                    </div>
                    <div class="rule-step">
                        <div class="step-number">2</div>
                        <div class="step-text">✨ 向十位“借1”，借来10，个位变成十几。</div>
                    </div>
                    <div class="rule-step">
                        <div class="step-number">3</div>
                        <div class="step-text">十位记得减1，再减去减数的十位。</div>
                    </div>
                    <div class="rule-step">
                        <div class="step-number">4</div>
                        <div class="step-text">合并结果 → 正确得数！</div>
                    </div>
                </div>
                <div class="example-box">
                    🌟 举个栗子 🌟
                    <div class="vertical-math">
                        <span>5 3</span>
                        <span>- 2 7</span>
                        <span>———</span>
                        <span style="color:#e65c8c;">2 6</span>
                    </div>
                    <div class="borrow-note">
                        💡 个位3减7不够，从十位借1 → 13-7=6，十位5变4，4-2=2 → 26
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧 互动游戏区 拖拽匹配玩法 -->
        <div class="game-area">
            <div class="game-header">
                <div class="score-board">🏆 得分 <span id="scoreValue">0</span></div>
                <button class="refresh-btn" id="newQuestionBtn">🎲 换一题</button>
            </div>

            <!-- 当前算式展示 -->
            <div class="math-quiz">
                <div class="big-equation" id="currentEquation">52 - 28</div>
            </div>

            <!-- 拖拽放置区域 (类似鱼篓/魔法盒子) -->
            <div class="drop-zone" id="dropZone">
                <div class="drop-label">🐣 把正确答案拖到这里 🐣</div>
                <div class="drop-icon">⬅️ 拖拽数字卡片到此区域 ➡️</div>
            </div>

            <!-- 可拖拽的答案选项池 -->
            <div class="answer-pool">
                <div class="pool-title">✨ 小英雄，拖拽正确的答案 ✨</div>
                <div class="drag-items" id="dragItemsContainer">
                    <!-- 动态生成可拖拽卡片 -->
                </div>
            </div>
            <div class="message-area" id="gameMessage">
                💪 把答案卡片拖到粉色虚线框里吧！
            </div>
        </div>
    </div>
    <footer>🎈 拖拽数字 → 放到右侧答题区 → 正确加分，自动出下一题！</footer>
</div>

<script>
    // ---------- 游戏全局变量 ----------
    let currentScore = 0;
    let currentQuestion = { minuend: 52, subtrahend: 28, answer: 24 };
    let currentOptions = [];   // 存储三个选项数值
    let activeDrag = false;
    let dragClone = null;
    let dragStartX = 0, dragStartY = 0;
    let currentDragValue = null;     // 当前拖拽卡片的数值
    let dragElementRef = null;       // 源卡片元素
    
    // DOM 元素
    const equationEl = document.getElementById('currentEquation');
    const scoreSpan = document.getElementById('scoreValue');
    const dragContainer = document.getElementById('dragItemsContainer');
    const dropZoneEl = document.getElementById('dropZone');
    const msgBox = document.getElementById('gameMessage');
    const newBtn = document.getElementById('newQuestionBtn');
    
    // 辅助函数 - 显示短暂消息
    let msgTimeout = null;
    function showMessage(text, isError = false) {
        if (msgTimeout) clearTimeout(msgTimeout);
        msgBox.innerHTML = isError ? `❌ ${text}` : `✅ ${text}`;
        msgBox.style.background = isError ? '#ffe0e5' : '#e6f9e6';
        msgBox.style.color = isError ? '#c14b6e' : '#2f7d4f';
        msgTimeout = setTimeout(() => {
            if (msgBox) msgBox.innerHTML = '🐣 把正确的数字卡片拖到粉色框里吧！';
            msgBox.style.background = '#ffeef2';
            msgBox.style.color = '#cb6e8e';
        }, 1800);
    }
    
    // 生成一个两位数减两位数(必须退位) 且结果为正整数
    function generateValidSubtraction() {
        let attempts = 0;
        while (attempts < 30) {
            // 十位: 被减数十位范围 2~9, 减数十位范围1~8, 但保证被减数十位 > 减数十位 (因为退位后十位减1仍需≥减数十位)
            let tensMinuend = Math.floor(Math.random() * 8) + 2; // 2~9
            let tensSubtrahend = Math.floor(Math.random() * (tensMinuend)) + 1; // 1 到 tensMinuend-1，确保十位借位后够减
            
            // 个位必须满足 被减数个位 < 减数个位
            let unitMinuend = Math.floor(Math.random() * 9); // 0~8
            let unitSubtrahend = Math.floor(Math.random() * (9 - unitMinuend)) + (unitMinuend + 1); // 确保大于 unitMinuend, 范围 unitMinuend+1 ~ 9
            if (unitSubtrahend > 9) unitSubtrahend = 9;
            if (unitMinuend >= unitSubtrahend) continue;
            
            const minuend = tensMinuend * 10 + unitMinuend;
            const subtrahend = tensSubtrahend * 10 + unitSubtrahend;
            const answer = minuend - subtrahend;
            if (answer > 0 && answer < 100 && minuend > subtrahend) {
                return { minuend, subtrahend, answer };
            }
        }
        // fallback 安全退位题目
        return { minuend: 63, subtrahend: 28, answer: 35 };
    }
    
    // 根据正确答案生成三个选项（一个正确+两个合理干扰）
    function generateOptions(correctAnswer) {
        let opts = new Set();
        opts.add(correctAnswer);
        // 干扰项: 偏移 -3 ~ +3 避免重复，且保证非负整数且不同
        let candidates = [correctAnswer - 2, correctAnswer - 1, correctAnswer + 1, correctAnswer + 2, correctAnswer + 3, correctAnswer - 3];
        for (let cand of candidates) {
            if (cand >= 0 && cand <= 99 && !opts.has(cand) && cand !== correctAnswer) {
                opts.add(cand);
                if (opts.size === 3) break;
            }
        }
        // 如果还不足三个，补充一些安全差值
        if (opts.size < 3) {
            let fallbacks = [correctAnswer + 5, correctAnswer - 4, correctAnswer + 4];
            for (let fb of fallbacks) {
                if (fb >= 0 && fb <= 99 && !opts.has(fb)) {
                    opts.add(fb);
                    if (opts.size === 3) break;
                }
            }
        }
        // 转换为数组并打乱顺序
        let optsArray = Array.from(opts);
        for (let i = optsArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [optsArray[i], optsArray[j]] = [optsArray[j], optsArray[i]];
        }
        return optsArray;
    }
    
    // 刷新整个题目 (保留积分)
    function refreshQuestion(resetMsg = true) {
        // 生成新的合法退位减法
        const newProb = generateValidSubtraction();
        currentQuestion = newProb;
        currentOptions = generateOptions(currentQuestion.answer);
        // 更新界面算式显示
        equationEl.innerText = `${currentQuestion.minuend} - ${currentQuestion.subtrahend}`;
        // 重新渲染可拖拽卡片
        renderDragCards();
        if (resetMsg) {
            if (msgTimeout) clearTimeout(msgTimeout);
            msgBox.innerHTML = '✨ 新题目来啦！拖拽正确数字到粉色区 ✨';
            msgBox.style.background = '#ffeef2';
            msgBox.style.color = '#cb6e8e';
        }
        // 确保清除任何残留拖拽状态
        endDragCleanup();
    }
    
    // 渲染可拖拽卡片 (绑定全新的拖拽事件)
    function renderDragCards() {
        dragContainer.innerHTML = '';
        for (let opt of currentOptions) {
            const card = document.createElement('div');
            card.className = 'drag-card';
            card.setAttribute('data-value', opt);
            card.innerText = opt;
            // 存储数值属性
            dragContainer.appendChild(card);
        }
        // 为所有卡片绑定拖拽启动事件 (鼠标+触摸)
        attachDragEventsToCards();
    }
    
    // ----- 完全自定义拖拽系统 (移动端+pc) -----
    let globalDragging = false;
    let cloneEl = null;
    let startClientX = 0, startClientY = 0;
    let currentSourceCard = null;
    let dragValue = null;
    
    function onDragStart(e, cardElement, value) {
        if (globalDragging) return;
        e.preventDefault();
        // 记录源卡片
        currentSourceCard = cardElement;
        dragValue = value;
        globalDragging = true;
        
        // 获取点击/触摸坐标
        let clientX, clientY;
        if (e.type === 'mousedown') {
            clientX = e.clientX;
            clientY = e.clientY;
            window.addEventListener('mousemove', onGlobalMove);
            window.addEventListener('mouseup', onGlobalUp);
        } else { // touchstart
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
            window.addEventListener('touchmove', onGlobalMove, { passive: false });
            window.addEventListener('touchend', onGlobalUp);
            window.addEventListener('touchcancel', onGlobalUp);
        }
        
        startClientX = clientX;
        startClientY = clientY;
        
        // 创建克隆体
        const rect = cardElement.getBoundingClientRect();
        cloneEl = document.createElement('div');
        cloneEl.className = 'drag-clone';
        cloneEl.innerText = value;
        cloneEl.style.left = `${rect.left}px`;
        cloneEl.style.top = `${rect.top}px`;
        cloneEl.style.width = `${rect.width}px`;
        cloneEl.style.height = `${rect.height}px`;
        cloneEl.style.lineHeight = `${rect.height}px`;
        cloneEl.style.textAlign = 'center';
        document.body.appendChild(cloneEl);
        
        // 添加视觉高亮放置区
        dropZoneEl.classList.add('active-drop');
    }
    
    function onGlobalMove(e) {
        if (!globalDragging || !cloneEl) return;
        e.preventDefault();
        let clientX, clientY;
        if (e.type === 'mousemove') {
            clientX = e.clientX;
            clientY = e.clientY;
        } else {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        }
        // 移动克隆体
        const offsetX = clientX - startClientX;
        const offsetY = clientY - startClientY;
        const startLeft = parseFloat(cloneEl.style.left);
        const startTop = parseFloat(cloneEl.style.top);
        cloneEl.style.left = `${startLeft + offsetX}px`;
        cloneEl.style.top = `${startTop + offsetY}px`;
        // 更新参考点用于下一帧移动
        startClientX = clientX;
        startClientY = clientY;
    }
    
    function onGlobalUp(e) {
        if (!globalDragging) {
            endDragCleanup();
            return;
        }
        // 获取结束点的坐标
        let endX, endY;
        if (e.type === 'mouseup') {
            endX = e.clientX;
            endY = e.clientY;
        } else if (e.type === 'touchend') {
            // 最后触摸点坐标从 changedTouches 获取
            if (e.changedTouches && e.changedTouches.length > 0) {
                endX = e.changedTouches[0].clientX;
                endY = e.changedTouches[0].clientY;
            } else {
                endDragCleanup();
                return;
            }
        } else {
            endDragCleanup();
            return;
        }
        
        // 检测是否在放置区内
        const dropRect = dropZoneEl.getBoundingClientRect();
        const isInsideDrop = (endX >= dropRect.left && endX <= dropRect.right && endY >= dropRect.top && endY <= dropRect.bottom);
        
        if (isInsideDrop && dragValue !== null) {
            // 验证答案
            const correctAns = currentQuestion.answer;
            if (dragValue === correctAns) {
                // 正确加分，刷新题目
                currentScore += 10;
                scoreSpan.innerText = currentScore;
                showMessage(`🎉 完全正确！ +10分  🎉`, false);
                // 刷新题目 (保留积分)
                refreshQuestion(true);
            } else {
                // 错误答案
                showMessage(`哎呀不对哦， ${dragValue} 不是正确答案，再试试看～`, true);
                // 题目不变，不清除选项，仅提示
            }
        } else {
            // 没拖到放置区
            if (dragValue !== null) {
                showMessage(`💧 要把答案拖到粉色虚线框内哟！再试一次～`, false);
            }
        }
        // 清理拖拽克隆和事件
        endDragCleanup();
    }
    
    function endDragCleanup() {
        if (cloneEl && cloneEl.parentNode) cloneEl.parentNode.removeChild(cloneEl);
        cloneEl = null;
        globalDragging = false;
        currentSourceCard = null;
        dragValue = null;
        dropZoneEl.classList.remove('active-drop');
        // 移除全局事件
        window.removeEventListener('mousemove', onGlobalMove);
        window.removeEventListener('mouseup', onGlobalUp);
        window.removeEventListener('touchmove', onGlobalMove);
        window.removeEventListener('touchend', onGlobalUp);
        window.removeEventListener('touchcancel', onGlobalUp);
    }
    
    // 为所有卡片绑定鼠标/触摸开始
    function attachDragEventsToCards() {
        const cards = document.querySelectorAll('.drag-card');
        cards.forEach(card => {
            // 移除旧监听避免重复（采用新绑定时先解绑）
            card.removeEventListener('mousedown', onCardMouseDown);
            card.removeEventListener('touchstart', onCardTouchStart);
            card.addEventListener('mousedown', onCardMouseDown);
            card.addEventListener('touchstart', onCardTouchStart, { passive: false });
        });
    }
    
    function onCardMouseDown(e) {
        e.preventDefault();
        const card = e.currentTarget;
        const val = parseInt(card.getAttribute('data-value'));
        if (isNaN(val)) return;
        onDragStart(e, card, val);
    }
    
    function onCardTouchStart(e) {
        e.preventDefault();
        const card = e.currentTarget;
        const val = parseInt(card.getAttribute('data-value'));
        if (isNaN(val)) return;
        onDragStart(e, card, val);
    }
    
    // 换一题按钮，不扣分，重置题目
    function manualRefresh() {
        if (globalDragging) endDragCleanup();
        refreshQuestion(true);
        showMessage(`🔄 换了一道新题目，继续挑战吧！`, false);
    }
    
    // 初始化游戏
    function initGame() {
        currentScore = 0;
        scoreSpan.innerText = '0';
        // 生成第一道退位减法题
        const initProb = generateValidSubtraction();
        currentQuestion = initProb;
        currentOptions = generateOptions(currentQuestion.answer);
        equationEl.innerText = `${currentQuestion.minuend} - ${currentQuestion.subtrahend}`;
        renderDragCards();
        // 事件: 新题目按钮
        newBtn.addEventListener('click', () => {
            if (globalDragging) endDragCleanup();
            manualRefresh();
        });
        // 防止页面默认拖拽图片
        window.addEventListener('dragstart', (e) => e.preventDefault());
        // 放置区默认样式不需要额外设置，但防止默认拖拽
        dropZoneEl.addEventListener('dragover', (e) => e.preventDefault());
        dropZoneEl.addEventListener('drop', (e) => e.preventDefault());
        showMessage('🐣 把正确的数字拖进粉色框！加油小英雄~', false);
    }
    
    initGame();
</script>
</body>
</html>
