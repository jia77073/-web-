<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>轴对称图形 · 对称魔法学院</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM & Babel CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        /* 拖拽优化 + 移动端友好 */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        .drag-card {
            transition: all 0.2s ease;
            cursor: grab;
            user-select: none;
            touch-action: manipulation;
        }
        .drag-card:active {
            cursor: grabbing;
            opacity: 0.7;
        }
        .drop-zone {
            transition: all 0.2s ease;
            min-height: 110px;
        }
        .drop-zone.drag-over {
            background-color: #f1e2ff;
            border-color: #9333ea;
            transform: scale(1.01);
            box-shadow: 0 6px 14px rgba(147, 51, 234, 0.25);
        }
        /* 大字体 (6号 ≈ 18px以上) */
        .big-text {
            font-size: 1.25rem;
            line-height: 1.45;
        }
        @media (min-width: 768px) {
            .big-text {
                font-size: 1.5rem;
            }
        }
        .knowledge-text {
            font-size: 1rem;
            line-height: 1.5;
        }
        @media (min-width: 768px) {
            .knowledge-text {
                font-size: 1.2rem;
            }
        }
        [draggable="true"] {
            -webkit-user-drag: element;
        }
        /* 卡片样式 */
        .shape-card {
            background: linear-gradient(145deg, #fff7e0, #ffefc0);
            border-radius: 1.5rem;
            transition: all 0.2s;
        }
        .matched-badge {
            background: #86efac;
            border-radius: 2rem;
            padding: 0.25rem 0.75rem;
            font-size: 0.8rem;
        }
        .axis-icon {
            display: inline-block;
            width: 24px;
            text-align: center;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#CBAACB] to-[#D9C2E6] min-h-screen p-4 md:p-6 font-sans">

<div id="root" class="max-w-7xl mx-auto"></div>

<script type="text/babel">
    // 轴对称图形互动课程（知识点 + 拖拽配对游戏）
    const SymmetryGame = () => {
        // ---------- 知识点内容 (左侧) ----------
        const knowledgePoints = {
            title: "🦋 轴对称图形",
            definition: "如果一个图形沿着一条直线对折，两侧的图形能够完全重合，这个图形就是轴对称图形，这条直线叫做对称轴。",
            features: [
                "🔹 对称轴两边的形状、大小完全相同。",
                "🔹 对应点到对称轴的距离相等。",
                "🔹 可以通过折叠、画图来验证对称性。"
            ],
            commonShapes: [
                { name: "长方形", axes: "2条对称轴 (对边中点连线)" },
                { name: "正方形", axes: "4条对称轴 (对边中点和对角线)" },
                { name: "圆", axes: "无数条对称轴 (直径所在直线)" },
                { name: "等腰三角形", axes: "1条对称轴 (顶点到底边中点)" },
                { name: "平行四边形", axes: "0条 (一般平行四边形不是轴对称)" }
            ],
            lifeExamples: "🍃 蝴蝶、枫叶、窗花、人脸、建筑物…… 对称美无处不在！",
            tip: "💡 小技巧：在方格纸上画轴对称图形的另一半，先找关键点，再数格子，保证到对称轴距离相等。"
        };
        
        // ---------- 游戏数据：图形卡片 + 对应的对称轴类别 ----------
        // 定义图形数据（每个图形有唯一id, 名称, 图标, 对应的正确类别key）
        const shapesData = [
            { id: "rect", name: "长方形", icon: "📏", emoji: "▭", axisCategory: "2条", description: "对边中点连线" },
            { id: "square", name: "正方形", icon: "🧊", emoji: "◻️", axisCategory: "4条", description: "对边中点 + 对角线" },
            { id: "circle", name: "圆", icon: "⚪", emoji: "●", axisCategory: "无数条", description: "任何直径" },
            { id: "isosceles_triangle", name: "等腰三角形", icon: "🔺", emoji: "▲", axisCategory: "1条", description: "顶点到底边中点" },
            { id: "parallelogram", name: "平行四边形", icon: "🔷", emoji: "▱", axisCategory: "0条", description: "一般不是轴对称" }
        ];
        
        // 定义篮子（放置区）类别（对应axisCategory）
        const basketCategories = [
            { id: "cat_1", label: "1条对称轴", categoryKey: "1条", color: "bg-pink-100", icon: "➖" },
            { id: "cat_2", label: "2条对称轴", categoryKey: "2条", color: "bg-sky-100", icon: "✚" },
            { id: "cat_4", label: "4条对称轴", categoryKey: "4条", color: "bg-green-100", icon: "❄️" },
            { id: "cat_inf", label: "无数条对称轴", categoryKey: "无数条", color: "bg-purple-100", icon: "🌀" },
            { id: "cat_0", label: "0条 (不是轴对称)", categoryKey: "0条", color: "bg-gray-100", icon: "❌" }
        ];
        
        // 游戏状态
        const [availableShapes, setAvailableShapes] = React.useState(shapesData);   // 未配对的图形卡片
        const [matchedShapes, setMatchedShapes] = React.useState([]);               // 已配对的图形（记录已放入篮子的卡片对象）
        const [message, setMessage] = React.useState({ text: "🐣 把图形卡片拖拽到正确的对称轴篮筐里吧！长按卡片并拖动～", type: "info" });
        const [gameWin, setGameWin] = React.useState(false);
        
        const draggingShapeRef = React.useRef(null);
        
        // 检查是否全部配对完成
        React.useEffect(() => {
            if (availableShapes.length === 0 && !gameWin) {
                setGameWin(true);
                setMessage({ text: "🎉 太棒啦！你完全掌握了轴对称图形和对称轴数量！成为对称小专家！ 🎉", type: "success" });
            } else if (availableShapes.length > 0 && gameWin) {
                setGameWin(false);
            }
        }, [availableShapes, gameWin]);
        
        // 显示临时消息（自动恢复）
        const showMessage = (msg, msgType = "error", duration = 2000) => {
            setMessage({ text: msg, type: msgType });
            setTimeout(() => {
                setMessage(prev => prev.text === msg ? { text: "✨ 继续拖拽配对，把所有图形送到正确的对称轴篮子里吧！", type: "info" } : prev);
            }, duration);
        };
        
        // 拖拽开始
        const handleDragStart = (e, shape) => {
            // 检查卡片是否还在可用池中（未配对）
            const stillAvailable = availableShapes.some(s => s.id === shape.id);
            if (!stillAvailable) {
                e.preventDefault();
                showMessage("⛔ 这个图形已经配对过了！点击重置可重新挑战", "error");
                return false;
            }
            draggingShapeRef.current = shape;
            e.dataTransfer.setData("text/plain", shape.id);
            e.dataTransfer.effectAllowed = "copy";
            if (e.target) e.target.style.opacity = "0.6";
            return true;
        };
        
        const handleDragEnd = (e) => {
            if (e.target) e.target.style.opacity = "";
            draggingShapeRef.current = null;
        };
        
        const handleDragOver = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "copy";
        };
        
        // 高亮效果
        const handleDragEnter = (e, categoryId) => {
            e.preventDefault();
            const zoneElem = document.getElementById(`dropzone-${categoryId}`);
            if (zoneElem) zoneElem.classList.add("drag-over");
        };
        
        const handleDragLeave = (e, categoryId) => {
            const zoneElem = document.getElementById(`dropzone-${categoryId}`);
            if (zoneElem) zoneElem.classList.remove("drag-over");
        };
        
        // 核心放置逻辑：验证图形是否匹配该篮子的对称轴数量
        const handleDrop = (e, targetBasket) => {
            e.preventDefault();
            const zoneElem = document.getElementById(`dropzone-${targetBasket.id}`);
            if (zoneElem) zoneElem.classList.remove("drag-over");
            
            let draggedShape = draggingShapeRef.current;
            if (!draggedShape) {
                const shapeId = e.dataTransfer.getData("text/plain");
                draggedShape = shapesData.find(s => s.id === shapeId);
            }
            if (!draggedShape) return;
            
            // 再次检查卡片是否还在可用列表中（防止重复配对）
            if (!availableShapes.some(s => s.id === draggedShape.id)) {
                showMessage(`❌ “${draggedShape.name}” 已经配对过了！`, "error");
                return;
            }
            
            // 验证图形对应的对称轴类别是否与篮子类别一致
            const isCorrect = (draggedShape.axisCategory === targetBasket.categoryKey);
            
            if (isCorrect) {
                // 配对正确：从availableShapes中移除，添加到matchedShapes
                setAvailableShapes(prev => prev.filter(shape => shape.id !== draggedShape.id));
                setMatchedShapes(prev => [...prev, draggedShape]);
                showMessage(`✅ 正确！${draggedShape.name} 有 ${draggedShape.axisCategory} 对称轴，配对成功！`, "success", 1600);
            } else {
                // 配对错误：给出正确提示
                showMessage(`❌ 配对错误！${draggedShape.name} 不是 ${targetBasket.label}，再观察一下它的对称轴数量吧～`, "error", 1800);
            }
            draggingShapeRef.current = null;
        };
        
        // 重置游戏
        const resetGame = () => {
            setAvailableShapes(shapesData);
            setMatchedShapes([]);
            setGameWin(false);
            setMessage({ text: "🔄 游戏已重置！所有图形卡片重新出现，再挑战一次吧！", type: "info" });
            draggingShapeRef.current = null;
            // 移除所有高亮
            document.querySelectorAll('.drop-zone').forEach(el => el.classList.remove('drag-over'));
        };
        
        // 计算配对进度
        const matchedCount = matchedShapes.length;
        const totalCount = shapesData.length;
        
        return (
            <div className="w-full">
                <div className="flex flex-col lg:flex-row gap-6 lg:gap-8">
                    {/* ================= 左侧：轴对称知识星球 ================= */}
                    <div className="lg:w-5/12 bg-white/85 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 border border-white/40 transition-all">
                        <div className="flex items-center gap-2 border-b-4 border-purple-300 pb-3 mb-4">
                            <span className="text-4xl">🦋</span>
                            <h2 className="text-3xl md:text-4xl font-extrabold text-purple-800">对称小讲堂</h2>
                            <span className="text-sm bg-purple-200 px-3 py-1 rounded-full ml-2">轴对称</span>
                        </div>
                        <div className="knowledge-text text-gray-800 space-y-4">
                            <p className="text-xl font-bold text-indigo-700">{knowledgePoints.title}</p>
                            <p className="bg-white/60 p-3 rounded-xl">✨ {knowledgePoints.definition}</p>
                            <ul className="list-disc list-inside space-y-1 bg-purple-50 p-3 rounded-xl">
                                {knowledgePoints.features.map((item, idx) => <li key={idx}>{item}</li>)}
                            </ul>
                            <div className="bg-amber-50 p-3 rounded-xl">
                                <p className="font-bold text-amber-700">📐 常见图形对称轴数量：</p>
                                <div className="grid grid-cols-2 gap-2 mt-2 text-sm">
                                    {knowledgePoints.commonShapes.map((shape, idx) => (
                                        <div key={idx} className="bg-white/60 rounded-lg p-1 flex justify-between">
                                            <span>{shape.name}</span>
                                            <span className="font-mono text-indigo-700">{shape.axes}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-green-50 p-2 rounded-lg text-green-700 text-sm">
                                🌸 {knowledgePoints.lifeExamples}
                            </div>
                            <div className="bg-cyan-50 p-2 rounded-lg text-cyan-700 text-sm italic">
                                {knowledgePoints.tip}
                            </div>
                            {/* 补全提示小技巧 */}
                            <div className="bg-purple-100 p-3 rounded-xl text-purple-700 text-sm">
                                ✂️ 补全轴对称图形的方法：找关键点 → 数格子到对称轴 → 在另一侧同样距离画点 → 连接成线。
                            </div>
                        </div>
                        <div className="mt-4 text-center text-purple-600 bg-purple-100/60 rounded-xl p-2 text-sm md:text-base">
                            🌟 玩配对游戏，牢记对称轴数量，成为对称小侦探！
                        </div>
                    </div>
                    
                    {/* ================= 右侧：拖拽配对游戏（图形→对称轴篮子） ================= */}
                    <div className="lg:w-7/12 bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 flex flex-col border border-purple-200">
                        <div className="flex flex-wrap justify-between items-center gap-3 border-b-2 border-purple-300 pb-3 mb-4">
                            <div className="flex items-center gap-2">
                                <span className="text-3xl">🎮</span>
                                <h2 className="text-3xl md:text-4xl font-extrabold text-purple-800">对称轴配对工坊</h2>
                                <span className="text-sm bg-yellow-200 px-2 py-1 rounded-full">拖拽配对</span>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="bg-purple-100 rounded-full px-4 py-1 text-purple-700 font-bold text-lg">
                                    配对进度 {matchedCount}/{totalCount}
                                </div>
                                <button 
                                    onClick={resetGame}
                                    className="bg-amber-400 hover:bg-amber-500 text-amber-900 font-bold py-2 px-4 rounded-full shadow-md transition transform hover:scale-105 text-base md:text-lg flex items-center gap-1"
                                >
                                    🔄 重置游戏
                                </button>
                            </div>
                        </div>
                        
                        {/* 全局消息提示 */}
                        <div className={`mb-4 p-3 rounded-xl text-center font-medium transition-all big-text ${message.type === 'error' ? 'bg-red-100 text-red-700 border border-red-300' : message.type === 'success' ? 'bg-green-100 text-green-700 border border-green-300' : 'bg-indigo-50 text-indigo-600 border border-indigo-200'}`}>
                            {message.text}
                        </div>
                        
                        {/* 五个对称轴篮子区域 */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4 mb-6">
                            {basketCategories.map(basket => {
                                // 找出已经配对到这个篮子的图形（在matchedShapes中筛选axisCategory匹配的）
                                const matchedInThisBasket = matchedShapes.filter(shape => shape.axisCategory === basket.categoryKey);
                                return (
                                    <div 
                                        key={basket.id}
                                        className={`${basket.color} rounded-2xl shadow-md overflow-hidden border-2 border-purple-200 transition-all`}
                                    >
                                        <div className="bg-white/60 p-2 text-center">
                                            <span className="text-2xl mr-1">{basket.icon}</span>
                                            <h3 className="text-lg font-black text-purple-800 inline-block">{basket.label}</h3>
                                        </div>
                                        <div 
                                            id={`dropzone-${basket.id}`}
                                            onDragOver={handleDragOver}
                                            onDragEnter={(e) => handleDragEnter(e, basket.id)}
                                            onDragLeave={(e) => handleDragLeave(e, basket.id)}
                                            onDrop={(e) => handleDrop(e, basket)}
                                            className={`drop-zone m-2 p-2 min-h-[110px] rounded-xl border-2 border-dashed transition-all flex flex-col items-center text-center ${
                                                matchedInThisBasket.length > 0 ? 'bg-green-100 border-green-400' : 'bg-white/70 border-purple-300'
                                            }`}
                                        >
                                            {matchedInThisBasket.length > 0 ? (
                                                <div className="flex flex-col items-center gap-1 w-full">
                                                    <span className="text-2xl">✅</span>
                                                    <p className="font-bold text-green-700 text-sm">已配对图形</p>
                                                    <div className="flex flex-wrap gap-1 justify-center">
                                                        {matchedInThisBasket.map(shape => (
                                                            <div key={shape.id} className="bg-green-200 text-green-800 text-xs rounded-full px-2 py-1 flex items-center gap-1">
                                                                <span>{shape.emoji}</span>
                                                                <span>{shape.name}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            ) : (
                                                <div className="text-center">
                                                    <span className="text-3xl block mb-1">⬇️</span>
                                                    <p className="text-purple-500 font-medium text-sm">拖放图形卡片</p>
                                                    <p className="text-xs text-gray-400 mt-1">匹配对称轴数量</p>
                                                </div>
                                            )}
                                        </div>
                                        <div className="p-1 text-center text-[10px] text-gray-400">
                                            将正确的图形拖至此
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        
                        {/* 可拖拽图形卡片池 */}
                        <div className="mt-2">
                            <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
                                <h3 className="text-2xl font-bold text-purple-700 flex items-center gap-2">
                                    🃏 图形卡片池
                                    <span className="text-sm bg-yellow-200 px-2 py-1 rounded-full">长按/鼠标拖拽</span>
                                </h3>
                                <span className="text-xs md:text-sm text-purple-500">💡 把卡片拖到上方对应的对称轴篮筐里</span>
                            </div>
                            
                            {availableShapes.length === 0 ? (
                                <div className="bg-gradient-to-r from-green-100 to-emerald-100 p-6 rounded-2xl text-center text-green-700 text-xl font-bold">
                                    🎉 完美！所有图形都配对成功！ 你已经是轴对称图形高手啦 🎉
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                                    {availableShapes.map(shape => (
                                        <div
                                            key={shape.id}
                                            draggable={true}
                                            onDragStart={(e) => handleDragStart(e, shape)}
                                            onDragEnd={handleDragEnd}
                                            className="drag-card shape-card p-3 shadow-md flex flex-col items-center cursor-grab active:cursor-grabbing hover:shadow-xl transition-all transform hover:scale-105"
                                        >
                                            <div className="text-5xl">{shape.icon}</div>
                                            <div className="text-3xl font-bold mt-1">{shape.emoji}</div>
                                            <p className="font-bold text-gray-800 text-lg mt-1">{shape.name}</p>
                                            <p className="text-xs text-amber-700 mt-1">🤔 对称轴数量?</p>
                                            <p className="text-[10px] text-purple-600 mt-1">👉 拖拽配对</p>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            {/* 玩法说明 + 补全轴对称图形互动小提示 */}
                            <div className="mt-5 bg-purple-100/70 p-3 rounded-xl text-purple-700 text-sm">
                                <p className="font-bold">📌 拖拉拽玩法：</p>
                                <ul className="list-disc list-inside space-y-1">
                                    <li>① 手指/鼠标长按图形卡片（长方形、正方形等）</li>
                                    <li>② 拖拽到上方对应的对称轴篮筐（1条/2条/4条/无数条/0条）</li>
                                    <li>③ 配对正确会显示在篮筐内，并出现成功提示</li>
                                    <li>④ 全部5个图形配对完成，获得胜利 🏆</li>
                                </ul>
                                <div className="mt-2 bg-white/50 rounded-lg p-2 text-xs">
                                    ✨ <strong>补全轴对称图形挑战</strong>：在方格纸上，如果给你左半边，要补全右边——数格子！例如，一个点到对称轴的距离是3格，那另一边也要距离3格，就能画出完整的轴对称图形啦！
                                </div>
                            </div>
                            
                            {gameWin && (
                                <div className="mt-4 bg-gradient-to-r from-green-200 to-teal-200 text-green-800 p-4 rounded-2xl text-center text-xl font-bold animate-pulse flex items-center justify-center gap-3 shadow-lg">
                                    🏆 恭喜你完成所有配对！🏆 <span className="text-3xl">🎓🦋</span>
                                </div>
                            )}
                        </div>
                        <div className="mt-3 text-center text-xs text-purple-500">
                            💡 移动端小技巧：长按卡片并轻轻拖拽到目标区上方，松手即可。想不起来对称轴数量？可以看看左侧知识点哦！
                        </div>
                    </div>
                </div>
                {/* 底部装饰 */}
                <div className="text-center mt-8 text-purple-800 text-sm bg-white/30 rounded-full py-2 px-4 w-fit mx-auto backdrop-blur-sm">
                    🌈 轴对称图形像照镜子，两边一模一样！拖拽配对，对称轴数量记得牢！ 🌟
                </div>
            </div>
        );
    };
    
    // 渲染到根节点
    ReactDOM.createRoot(document.getElementById("root")).render(
        <React.StrictMode>
            <SymmetryGame />
        </React.StrictMode>
    );
</script>
</body>
</html>
