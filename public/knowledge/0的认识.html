<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>数学小课堂 - 认识数字0 | 拖拽配对游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动时选中文本/图片，提升拖拽体验 */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f7f2e7;
            font-family: 'Comic Neue', 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Segoe UI Emoji', 'Apple SD Gothic Neo', sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 主课程卡片容器 */
        .course-card {
            max-width: 1300px;
            width: 100%;
            background: #fffef9;
            border-radius: 70px 50px 70px 50px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.05), 0 5px 15px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: all 0.2s;
        }

        /* 左右布局响应式 */
        .split-layout {
            display: flex;
            flex-wrap: wrap;
        }

        /* ========= 左侧知识点区 ========= */
        .knowledge-panel {
            flex: 1.2;
            min-width: 250px;
            background: #fffaf0;
            padding: 30px 20px;
            border-right: 3px dashed #ffddb0;
        }

        .knowledge-panel h2 {
            font-size: 2rem;
            color: #e67e22;
            background: #fff1e0;
            display: inline-block;
            padding: 0 20px 0 15px;
            border-radius: 60px;
            margin-bottom: 24px;
            letter-spacing: -1px;
        }

        .zero-big {
            text-align: center;
            margin: 20px 0;
        }

        .zero-big span {
            font-size: 6rem;
            font-weight: bold;
            background: #fde6cf;
            display: inline-block;
            width: 130px;
            height: 130px;
            line-height: 130px;
            border-radius: 50%;
            color: #e67e22;
            box-shadow: 0 12px 18px rgba(0, 0, 0, 0.05);
            margin-bottom: 10px;
        }

        .explain-list {
            background: #fff4e8;
            border-radius: 48px;
            padding: 18px 20px;
            margin-top: 15px;
        }

        .explain-list p {
            font-size: 1.1rem;
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #b45f2b;
        }

        .explain-list .emoji-big {
            font-size: 1.8rem;
        }

        .fact {
            background: #ffe5ce;
            border-radius: 32px;
            padding: 12px;
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            color: #d35400;
        }

        /* ========= 右侧游戏区 ========= */
        .game-panel {
            flex: 2;
            min-width: 300px;
            padding: 24px 22px 32px;
            background: #fffef5;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 15px;
        }

        .game-header h3 {
            font-size: 1.7rem;
            background: #ffefdb;
            padding: 6px 20px;
            border-radius: 40px;
            color: #e67e22;
        }

        .reset-btn {
            background: #ffcf8a;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 24px;
            border-radius: 40px;
            color: #a65311;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 0 5px 0 #b97f3a;
            transition: 0.07s linear;
        }

        .reset-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #b97f3a;
        }

        .message-box {
            background: #fef2e0;
            border-radius: 50px;
            padding: 12px 18px;
            text-align: center;
            font-weight: bold;
            color: #d35400;
            margin: 12px 0 20px;
            font-size: 1.05rem;
        }

        /* 篮子区域 (五个槽位) */
        .baskets-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 30px;
        }

        .basket {
            background: #fef3e4;
            border-radius: 48px;
            width: 150px;
            padding: 16px 8px;
            text-align: center;
            transition: all 0.2s;
            border: 2px solid #ffd8ae;
            box-shadow: 0 8px 14px rgba(0, 0, 0, 0.02);
            position: relative;
        }

        .basket .quantity-icons {
            background: #ffe1bd;
            border-radius: 60px;
            padding: 12px 6px;
            margin-bottom: 12px;
            min-height: 85px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .basket .item-emoji {
            font-size: 28px;
        }

        .basket .zero-label {
            font-size: 24px;
            color: #c5823a;
            font-weight: bold;
        }

        .drop-zone {
            background: #ffefdd;
            border-radius: 40px;
            padding: 10px 6px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #b8662c;
            border: 2px dashed #f7bc6e;
            transition: 0.1s;
            margin-top: 8px;
        }

        .drop-zone.paired {
            background: #cbe6c9;
            border: 2px solid #5fa04f;
            color: #2c6e2c;
        }

        .paired-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* 可拖拽数字卡片区 */
        .drag-cards-area {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 15px;
            padding: 12px 0;
        }

        .drag-number {
            width: 85px;
            height: 95px;
            background: linear-gradient(145deg, #ffe2be, #ffcf97);
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: bold;
            color: #c2410c;
            box-shadow: 0 12px 0 #b45a2b;
            cursor: grab;
            transition: 0.05s linear;
            touch-action: none;
            will-change: transform;
        }

        .drag-number:active {
            cursor: grabbing;
        }

        /* 拖拽克隆样式 */
        .drag-clone {
            position: fixed;
            z-index: 9999;
            width: 85px;
            height: 95px;
            background: linear-gradient(145deg, #ffe2be, #ffcf97);
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            font-weight: bold;
            color: #c2410c;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            opacity: 0.85;
            transform: rotate(4deg);
        }

        .toast-message {
            position: fixed;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            background: #3a2a1f;
            color: #ffefcf;
            padding: 12px 26px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 10000;
            font-size: 1.1rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
            pointer-events: none;
        }

        @keyframes bounceWin {
            0% { transform: scale(1); }
            80% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .game-won {
            animation: bounceWin 0.4s ease;
        }

        /* 响应式 */
        @media (max-width: 780px) {
            .split-layout {
                flex-direction: column;
            }
            .knowledge-panel {
                border-right: none;
                border-bottom: 3px dashed #ffddb0;
            }
            .basket {
                width: 130px;
            }
            .drag-number {
                width: 70px;
                height: 80px;
                font-size: 2.8rem;
            }
            .zero-big span {
                width: 100px;
                height: 100px;
                line-height: 100px;
                font-size: 4.5rem;
            }
        }

        footer {
            text-align: center;
            padding: 14px;
            font-size: 0.8rem;
            color: #d99e4c;
            background: #fff8ed;
            border-top: 1px solid #ffe2c1;
        }
    </style>
</head>
<body>

<div class="course-card">
    <div class="split-layout">
        <!-- 左侧知识点：0的认识 -->
        <div class="knowledge-panel">
            <h2>🐣 认识数字 “0”</h2>
            <div class="zero-big">
                <span>0</span>
            </div>
            <div class="explain-list">
                <p><span class="emoji-big">🥚</span> 0 像鸡蛋，圆圆的！</p>
                <p><span class="emoji-big">🍬</span> “0” 表示 “没有” → 0个糖果，就是空空的。</p>
                <p><span class="emoji-big">🏁</span> 0 也是起点，尺子上的开始！</p>
                <p><span class="emoji-big">🤲</span> 伸出手：一个都没有，就是0。</p>
            </div>
            <div class="fact">
                💡 小魔法：任何数加上0还是自己，减去0也是自己～
            </div>
        </div>

        <!-- 右侧互动游戏区 -->
        <div class="game-panel" id="gamePanel">
            <div class="game-header">
                <h3>🎈 拖拽配对大作战</h3>
                <button class="reset-btn" id="resetGameBtn">🔄 重新挑战</button>
            </div>
            <div class="message-box" id="gameMessage">
                🌟 把数字卡片拖到对应糖果数量的篮子里！0号篮子空空的～
            </div>
            <!-- 五个篮子: 数量 0,1,2,3,4 -->
            <div id="basketsContainer" class="baskets-grid"></div>
            <!-- 可拖拽数字卡片区域 -->
            <div id="dragNumbersContainer" class="drag-cards-area"></div>
            <div style="font-size: 0.85rem; text-align: center; margin-top: 20px; color: #c27e3a; background:#fef0e2; padding:8px; border-radius:50px;">
                ✨ 按住数字卡片，拖到正确的篮子上方再松开手指/鼠标 ✨
            </div>
        </div>
    </div>
    <footer>🧸 数学小冒险 | 0 代表“一个都没有”，你能把所有数字都送回家吗？</footer>
</div>

<script>
    // ----- 游戏配置 -----
    // 篮子数据: 数量值, 显示图标(数量为0用特殊文字)
    const BASKET_DATA = [
        { quantity: 0, label: "0个糖果", icon: "🍬", emptyMode: true },
        { quantity: 1, label: "1个糖果", icon: "🍬", emptyMode: false },
        { quantity: 2, label: "2个糖果", icon: "🍬", emptyMode: false },
        { quantity: 3, label: "3个糖果", icon: "🍬", emptyMode: false },
        { quantity: 4, label: "4个糖果", icon: "🍬", emptyMode: false }
    ];

    // 全局游戏状态
    let gameState = {
        basketsPaired: [false, false, false, false, false], // 每个篮子是否已配对
        remainingNumbers: [0, 1, 2, 3, 4],                 // 还未配对的数字值
        totalPairs: 5,
        pairedCount: 0
    };

    // 拖拽相关全局变量
    let dragActive = false;
    let dragSourceCard = null;       // 原始卡片DOM
    let dragNumberValue = null;      // 拖拽的数字值
    let cloneElement = null;          // 跟随克隆
    let startPointerX = 0, startPointerY = 0;
    let onPointerMoveHandler = null;
    let onPointerUpHandler = null;

    // DOM 元素
    const basketsContainer = document.getElementById('basketsContainer');
    const dragNumbersContainer = document.getElementById('dragNumbersContainer');
    const gameMessageDiv = document.getElementById('gameMessage');
    const resetBtn = document.getElementById('resetGameBtn');

    // 辅助显示短暂浮层消息 (错误或正确)
    let toastTimer = null;
    function showFloatyMessage(text, isError = false) {
        if (toastTimer) clearTimeout(toastTimer);
        const toast = document.createElement('div');
        toast.className = 'toast-message';
        toast.innerText = text;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.remove();
        }, 1000);
    }

    // 更新顶部提示框消息(非浮动)
    function setMessage(msg, isError = false) {
        gameMessageDiv.innerHTML = isError ? `⚠️ ${msg}` : `🎈 ${msg}`;
        gameMessageDiv.style.background = isError ? "#ffe0db" : "#fef2e0";
        setTimeout(() => {
            if (gameState.pairedCount === gameState.totalPairs) {
                gameMessageDiv.innerHTML = "🏆 完美！所有数字都配对成功啦！ 🏆";
                gameMessageDiv.style.background = "#d9f0cf";
            } else if (!isError) {
                gameMessageDiv.innerHTML = "✨ 继续拖拽数字卡片到正确的篮子吧 ✨";
                gameMessageDiv.style.background = "#fef2e0";
            }
        }, 1300);
    }

    // 检查是否胜利
    function checkVictory() {
        if (gameState.pairedCount === gameState.totalPairs) {
            gameMessageDiv.innerHTML = "🏆 哇！全部配对正确！数字0也找到家啦！ 🏆";
            gameMessageDiv.style.background = "#d4edc9";
            const panel = document.querySelector('.game-panel');
            panel.classList.add('game-won');
            setTimeout(() => panel.classList.remove('game-won'), 500);
        } else {
            // 未胜利时普通状态
        }
    }

    // 配对成功核心逻辑: 篮子索引, 数字值, 原始卡片DOM
    function pairSuccess(slotIndex, numberValue, cardElement) {
        // 边界判断: 篮子是否已被配对 / 数字是否还在剩余列表中
        if (gameState.basketsPaired[slotIndex]) return false;
        if (!gameState.remainingNumbers.includes(numberValue)) return false;

        // 配对正确性额外校验: 篮子期望数量
        const expectedQuantity = BASKET_DATA[slotIndex].quantity;
        if (numberValue !== expectedQuantity) return false;

        // 更新状态
        gameState.basketsPaired[slotIndex] = true;
        // 从剩余数组中移除该数字
        const idxInRemaining = gameState.remainingNumbers.indexOf(numberValue);
        if (idxInRemaining !== -1) gameState.remainingNumbers.splice(idxInRemaining, 1);
        gameState.pairedCount++;

        // 1. 更新篮子UI样式
        const basketDiv = document.querySelector(`.basket[data-slot-idx='${slotIndex}']`);
        if (basketDiv) {
            const dropZone = basketDiv.querySelector('.drop-zone');
            dropZone.classList.add('paired');
            // 显示配对成功标志 + 数字
            dropZone.innerHTML = `<div class="paired-badge">✅ 配对成功！ 数字 ${numberValue}</div>`;
        }

        // 2. 移除被拖拽的卡片 (从DOM删除)
        if (cardElement && cardElement.parentNode) {
            cardElement.remove();
        }

        // 3. 显示正确消息
        if (numberValue === 0) {
            setMessage(`太棒啦！数字 0 配对给“0个糖果”的篮子，代表什么都没有！`, false);
            showFloatyMessage("✨ 0找到了空篮子！✨");
        } else {
            setMessage(`正确！数字 ${numberValue} 配对 ${BASKET_DATA[slotIndex].label} 成功！`, false);
            showFloatyMessage(`🎉 +1 配对成功！`);
        }

        // 4. 胜利判定
        checkVictory();
        return true;
    }

    // 渲染整个游戏区域 (根据当前gameState重建界面)
    function renderGame() {
        // 渲染篮子
        basketsContainer.innerHTML = '';
        for (let i = 0; i < BASKET_DATA.length; i++) {
            const data = BASKET_DATA[i];
            const isPaired = gameState.basketsPaired[i];
            const basketDiv = document.createElement('div');
            basketDiv.className = 'basket';
            basketDiv.setAttribute('data-slot-idx', i);
            basketDiv.setAttribute('data-quantity', data.quantity);

            // 数量图标区域
            const iconsDiv = document.createElement('div');
            iconsDiv.className = 'quantity-icons';
            if (data.quantity === 0) {
                // 0 的特殊显示：空盒子图案
                iconsDiv.innerHTML = `<div class="zero-label">🍬 空空如也 🍬<br> ⚪ 0 个糖果</div>`;
            } else {
                let iconsHtml = '';
                for (let j = 0; j < data.quantity; j++) {
                    iconsHtml += `<span class="item-emoji">${data.icon}</span>`;
                }
                iconsHtml += `<div style="font-size:12px; margin-top:6px;">${data.label}</div>`;
                iconsDiv.innerHTML = iconsHtml;
            }

            // 放置区域
            const dropZone = document.createElement('div');
            dropZone.className = 'drop-zone';
            if (isPaired) {
                dropZone.classList.add('paired');
                // 已经配对过的显示配对的数字
                const matchedNumber = data.quantity;
                dropZone.innerHTML = `<div class="paired-badge">✅ 配对成功！ 数字 ${matchedNumber}</div>`;
            } else {
                dropZone.innerHTML = `📥 拖拽数字到这里`;
            }
            basketDiv.appendChild(iconsDiv);
            basketDiv.appendChild(dropZone);
            basketsContainer.appendChild(basketDiv);
        }

        // 渲染可拖拽数字卡片（基于剩余的剩余数字）
        dragNumbersContainer.innerHTML = '';
        const sortedRemaining = [...gameState.remainingNumbers].sort((a,b)=>a-b);
        for (let val of sortedRemaining) {
            const card = document.createElement('div');
            card.className = 'drag-number';
            card.setAttribute('data-number', val);
            card.innerText = val;
            dragNumbersContainer.appendChild(card);
        }

        // 重新绑定拖拽事件
        bindDragEvents();
    }

    // 绑定所有拖拽卡片的鼠标/触摸事件
    function bindDragEvents() {
        const cards = document.querySelectorAll('.drag-number');
        cards.forEach(card => {
            card.removeEventListener('mousedown', onDragStart);
            card.removeEventListener('touchstart', onDragStart);
            card.addEventListener('mousedown', onDragStart);
            card.addEventListener('touchstart', onDragStart, { passive: false });
        });
    }

    // 拖拽开始
    function onDragStart(e) {
        e.preventDefault();
        if (dragActive) return;
        const targetCard = e.target.closest('.drag-number');
        if (!targetCard) return;

        const numberVal = parseInt(targetCard.getAttribute('data-number'));
        if (isNaN(numberVal)) return;

        dragActive = true;
        dragSourceCard = targetCard;
        dragNumberValue = numberVal;

        let clientX, clientY;
        if (e.type === 'mousedown') {
            clientX = e.clientX;
            clientY = e.clientY;
        } else {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        }
        startPointerX = clientX;
        startPointerY = clientY;

        // 创建克隆体
        cloneElement = document.createElement('div');
        cloneElement.className = 'drag-clone';
        cloneElement.innerText = dragNumberValue;
        cloneElement.style.left = `${clientX - 42}px`;
        cloneElement.style.top = `${clientY - 48}px`;
        document.body.appendChild(cloneElement);

        // 原始卡片半透明效果
        dragSourceCard.style.opacity = '0.4';

        // 绑定全局移动和释放
        onPointerMoveHandler = onGlobalMove;
        onPointerUpHandler = onGlobalUp;
        window.addEventListener('mousemove', onPointerMoveHandler);
        window.addEventListener('mouseup', onPointerUpHandler);
        window.addEventListener('touchmove', onPointerMoveHandler, { passive: false });
        window.addEventListener('touchend', onPointerUpHandler);
        window.addEventListener('touchcancel', onPointerUpHandler);
    }

    function onGlobalMove(e) {
        if (!dragActive || !cloneElement) return;
        e.preventDefault();
        let clientX, clientY;
        if (e.type === 'mousemove') {
            clientX = e.clientX;
            clientY = e.clientY;
        } else {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        }
        cloneElement.style.left = `${clientX - 42}px`;
        cloneElement.style.top = `${clientY - 48}px`;
    }

    function onGlobalUp(e) {
        if (!dragActive) return;
        e.preventDefault();

        let endX, endY;
        if (e.type === 'mouseup') {
            endX = e.clientX;
            endY = e.clientY;
        } else {
            if (e.changedTouches && e.changedTouches.length > 0) {
                endX = e.changedTouches[0].clientX;
                endY = e.changedTouches[0].clientY;
            } else {
                endX = startPointerX;
                endY = startPointerY;
            }
        }

        // 查找释放点下方的篮子元素
        const elementsAtCursor = document.elementsFromPoint(endX, endY);
        let targetBasket = null;
        let targetSlotIndex = null;
        for (let el of elementsAtCursor) {
            const basket = el.closest('.basket');
            if (basket) {
                targetBasket = basket;
                targetSlotIndex = parseInt(basket.getAttribute('data-slot-idx'));
                break;
            }
        }

        let pairResult = false;
        if (targetBasket && targetSlotIndex !== null && !gameState.basketsPaired[targetSlotIndex]) {
            const expectedQty = BASKET_DATA[targetSlotIndex].quantity;
            if (dragNumberValue === expectedQty) {
                // 配对成功！
                // 重要：调用配对函数并传入原始卡片（dragSourceCard）
                if (dragSourceCard && dragSourceCard.parentNode && gameState.remainingNumbers.includes(dragNumberValue)) {
                    pairResult = pairSuccess(targetSlotIndex, dragNumberValue, dragSourceCard);
                    if (!pairResult) {
                        showFloatyMessage("哎呀，配对失败，再试试看～", true);
                    }
                } else {
                    showFloatyMessage("这个数字已经配对过啦！", true);
                    pairResult = false;
                }
            } else {
                // 数量不匹配
                showFloatyMessage(`不对哟！这个篮子有 ${expectedQty} 个糖果，需要数字 ${expectedQty}～`, true);
                pairResult = false;
            }
        } else if (targetBasket && targetSlotIndex !== null && gameState.basketsPaired[targetSlotIndex]) {
            showFloatyMessage("这个篮子已经有数字卡片啦！不能再放咯", true);
        } else {
            showFloatyMessage("要把数字拖到正确的篮子上方哟！", true);
        }

        // 如果配对失败，恢复原卡片透明度
        if (!pairResult && dragSourceCard) {
            dragSourceCard.style.opacity = '1';
        } else if (pairResult) {
            // 配对成功时卡片已被删除，无需额外处理
        }

        // 清理拖拽克隆和事件
        if (cloneElement) cloneElement.remove();
        cloneElement = null;
        if (dragSourceCard && !pairResult) {
            dragSourceCard.style.opacity = '1';
        }
        dragActive = false;
        dragSourceCard = null;
        dragNumberValue = null;

        // 移除全局事件
        window.removeEventListener('mousemove', onPointerMoveHandler);
        window.removeEventListener('mouseup', onPointerUpHandler);
        window.removeEventListener('touchmove', onPointerMoveHandler);
        window.removeEventListener('touchend', onPointerUpHandler);
        window.removeEventListener('touchcancel', onPointerUpHandler);

        // 如果配对成功，我们已经在pairSuccess中修改了状态并移除了卡片，但为了UI完全同步且避免任何不一致，
        // 重新调用一次渲染（保留当前gameState），但注意配对成功后删除卡片会导致拖拽容器变化，再次渲染不会丢失状态
        // 但为了避免重复绑定以及卡片闪烁，我们可以重新渲染一下确保所有UI与state完全匹配。
        // 注意：pairSuccess中已经直接修改了篮子的样式和移除了卡片，但如果有需要，重新渲染会使界面更稳固。
        // 重新渲染会导致已移除卡片区域重新生成（依据remainingNumbers），不会有副作用且维持配对状态。
        // 并且可以避免某些边缘情况。
        refreshGameUI();
        if (gameState.pairedCount === gameState.totalPairs) {
            gameMessageDiv.innerHTML = "🏆 太厉害了！全部配对正确！ 🏆";
            gameMessageDiv.style.background = "#d4edc9";
        }
    }

    // 刷新UI（基于当前gameState重新渲染）
    function refreshGameUI() {
        // 保存当前配对状态重新构建整个右侧区域
        renderGame();
    }

    // 重置游戏全部状态
    function resetGame() {
        // 如果拖拽未结束，强制清理
        if (dragActive) {
            if (cloneElement) cloneElement.remove();
            cloneElement = null;
            dragActive = false;
            if (dragSourceCard) dragSourceCard.style.opacity = '1';
            window.removeEventListener('mousemove', onPointerMoveHandler);
            window.removeEventListener('mouseup', onPointerUpHandler);
            window.removeEventListener('touchmove', onPointerMoveHandler);
            window.removeEventListener('touchend', onPointerUpHandler);
        }

        // 重置状态
        gameState = {
            basketsPaired: [false, false, false, false, false],
            remainingNumbers: [0, 1, 2, 3, 4],
            totalPairs: 5,
            pairedCount: 0
        };
        // 重新渲染界面
        renderGame();
        setMessage("游戏已重置！把每个数字拖到对应糖果数量的篮子里，注意0号篮子空空如也～", false);
        setTimeout(() => {
            if (gameState.pairedCount !== gameState.totalPairs) {
                gameMessageDiv.innerHTML = "✨ 拖拽数字卡片到正确的篮子，0要送给空篮子哦 ✨";
            }
        }, 1800);
    }

    // 初始化整个游戏
    function init() {
        renderGame();
        resetBtn.addEventListener('click', () => resetGame());
    }

    init();
</script>
</body>
</html>
