<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>数学小智囊：植树问题 | 拖拖乐间隔大师</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 配置主题：淡紫色 + 标题3号 + 内容5号(较大) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontSize: {
                        '5xl': '3rem',
                        '3xl': '1.875rem',
                    },
                    colors: {
                        'lavender-primary': '#CBAACB',
                        'lavender-light': '#D9C2E6',
                    }
                }
            }
        }
    </script>
    <style>
        [draggable="true"] {
            cursor: grab;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        [draggable="true"]:active {
            cursor: grabbing;
        }
        .drop-zone-active {
            background-color: #fef9c3 !important;
            border-color: #eab308 !important;
            transform: scale(1.02);
            transition: all 0.2s ease;
        }
        @keyframes matchSuccess {
            0% { transform: scale(1); background-color: #dcfce7; }
            80% { transform: scale(1.05); background-color: #bbf7d0; }
            100% { transform: scale(1); background-color: #f0fdf4; }
        }
        .match-animation {
            animation: matchSuccess 0.4s ease-out;
        }
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #CBAACB;
            border-radius: 10px;
        }
        .no-tap-highlight {
            -webkit-touch-callout: none;
        }
    </style>
    <!-- React & ReactDOM & Babel -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gradient-to-br from-lavender-primary to-lavender-light min-h-screen p-4 md:p-5 font-sans no-tap-highlight">
    <div id="root" class="max-w-7xl mx-auto"></div>

    <script type="text/babel">
        // React 主逻辑: 植树问题 —— 拖拽数字配对游戏（三种模型）
        const { useState, useEffect, useCallback, useRef } = React;

        // ---------- 随机生成植树问题 ----------
        // 模型类型: 'both' 两端都栽, 'one' 一端栽一端不栽, 'none' 两端都不栽
        const generateQuestion = () => {
            const models = ['both', 'one', 'none'];
            const model = models[Math.floor(Math.random() * 3)];
            // 总长范围: 20~100米，确保整数间隔
            let totalLength = 0;
            let spacing = 0;
            let trees = 0;
            let intervals = 0;
            
            if (model === 'both') {
                // 两端都栽: 棵数 = 间隔数 + 1
                intervals = Math.floor(Math.random() * 8) + 3; // 3~10个间隔
                spacing = Math.floor(Math.random() * 8) + 2;   // 2~9米
                totalLength = intervals * spacing;
                trees = intervals + 1;
            } else if (model === 'one') {
                // 一端栽一端不栽: 棵数 = 间隔数
                intervals = Math.floor(Math.random() * 8) + 3;
                spacing = Math.floor(Math.random() * 8) + 2;
                totalLength = intervals * spacing;
                trees = intervals;
            } else {
                // 两端都不栽: 棵数 = 间隔数 - 1
                intervals = Math.floor(Math.random() * 8) + 4; // 至少4个间隔保证棵数>=2
                spacing = Math.floor(Math.random() * 8) + 2;
                totalLength = intervals * spacing;
                trees = intervals - 1;
            }
            
            // 生成描述文本
            let description = "";
            if (model === 'both') {
                description = `在一条 ${totalLength} 米长的小路一边植树，每隔 ${spacing} 米栽一棵（两端都栽），需要多少棵树？`;
            } else if (model === 'one') {
                description = `在一条 ${totalLength} 米长的小路一边植树，每隔 ${spacing} 米栽一棵（一端栽一端不栽），需要多少棵树？`;
            } else {
                description = `在一条 ${totalLength} 米长的小路一边植树，每隔 ${spacing} 米栽一棵（两端都不栽），需要多少棵树？`;
            }
            
            // 生成干扰项 (正确值附近的数字)
            let distractors = new Set();
            distractors.add(trees);
            while(distractors.size < 4) {
                let offset = Math.floor(Math.random() * 7) - 3; // -3..3
                let candidate = trees + offset;
                if (candidate <= 0) candidate = trees + 1;
                if (candidate === trees) continue;
                distractors.add(candidate);
            }
            let options = Array.from(distractors);
            // 打乱顺序
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }
            
            return {
                id: Date.now() + Math.random(),
                model: model,
                totalLength: totalLength,
                spacing: spacing,
                correctTrees: trees,
                intervals: intervals,
                description: description,
                options: options,   // 包含正确数字的选项数组
            };
        };
        
        // ---------- 主游戏组件: 拖拽数字配对植树问题答案 ----------
        const TreePlantingGame = () => {
            const [currentQuestion, setCurrentQuestion] = useState(null);
            const [score, setScore] = useState(0);
            const [answered, setAnswered] = useState(false);
            const [message, setMessage] = useState("🌳 拖拽正确的数字卡片到答案区，解决植树问题！");
            const [highlightDrop, setHighlightDrop] = useState(false);
            const [effectTrigger, setEffectTrigger] = useState(0);
            const [options, setOptions] = useState([]);   // 可拖拽的答案卡片（数字）
            
            // 加载新题目
            const loadNewQuestion = () => {
                const newQ = generateQuestion();
                setCurrentQuestion(newQ);
                setAnswered(false);
                // 设置选项卡片（打乱顺序）
                setOptions([...newQ.options]);
                setMessage(`🌲 新题目：${newQ.description} 拖拽正确数字到下方区域。`);
                setHighlightDrop(false);
                setEffectTrigger(prev => prev+1);
            };
            
            // 换一题
            const handleChangeQuestion = () => {
                loadNewQuestion();
            };
            
            // 初始化
            useEffect(() => {
                loadNewQuestion();
            }, []);
            
            // 处理拖拽放置到答案区
            const handleDropOnZone = (e) => {
                e.preventDefault();
                setHighlightDrop(false);
                if (answered) {
                    setMessage("本题已经答对了！点击「换一题」继续挑战吧～");
                    return;
                }
                if (!currentQuestion) return;
                
                let dragData;
                try {
                    const rawData = e.dataTransfer.getData("text/plain");
                    if (!rawData) return;
                    dragData = JSON.parse(rawData);
                } catch(err) {
                    setMessage("请从右侧数字卡片上拖拽～");
                    return;
                }
                const { numberValue } = dragData;
                if (numberValue === undefined) return;
                
                if (numberValue === currentQuestion.correctTrees) {
                    setAnswered(true);
                    setScore(prev => prev + 1);
                    let modelExplain = "";
                    if (currentQuestion.model === 'both') modelExplain = "两端都栽：棵数 = 间隔数 + 1";
                    else if (currentQuestion.model === 'one') modelExplain = "一端栽一端不栽：棵数 = 间隔数";
                    else modelExplain = "两端都不栽：棵数 = 间隔数 - 1";
                    setMessage(`🎉 完全正确！ ${currentQuestion.description} 答案是 ${currentQuestion.correctTrees} 棵。${modelExplain}。 +1分 🎉`);
                    const zoneElem = document.getElementById('answer-dropzone');
                    if (zoneElem) {
                        zoneElem.classList.add('match-animation');
                        setTimeout(() => zoneElem.classList.remove('match-animation'), 500);
                    }
                    // 2秒后自动换题
                    setTimeout(() => {
                        loadNewQuestion();
                    }, 2000);
                } else {
                    setMessage(`❌ 不对哦！ ${numberValue} 不是正确答案。再想想间隔数与棵数的关系～ 提示：间隔数 = 总长 ÷ 间距，再根据模型确定棵数。`);
                    const zoneElem = document.getElementById('answer-dropzone');
                    if (zoneElem) {
                        zoneElem.style.backgroundColor = "#fee2e2";
                        setTimeout(() => zoneElem.style.backgroundColor = "", 400);
                    }
                }
            };
            
            const onDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = "copy";
            };
            const onDragEnterZone = () => setHighlightDrop(true);
            const onDragLeaveZone = () => setHighlightDrop(false);
            
            // 数字卡片拖拽开始
            const onNumberDragStart = (e, num) => {
                if (answered) {
                    e.preventDefault();
                    setMessage("本题已完成，请换题后再拖拽。");
                    return false;
                }
                e.dataTransfer.setData("text/plain", JSON.stringify({ numberValue: num }));
                e.dataTransfer.effectAllowed = "copy";
                if (e.target) e.target.style.opacity = "0.6";
            };
            const onNumberDragEnd = (e) => {
                if (e.target) e.target.style.opacity = "";
            };
            
            if (!currentQuestion) return <div className="text-white text-2xl">加载题目中...</div>;
            
            // 计算间隔数和公式提示
            const intervals = currentQuestion.totalLength / currentQuestion.spacing;
            const formulaHint = () => {
                if (currentQuestion.model === 'both') {
                    return `间隔数 = ${currentQuestion.totalLength} ÷ ${currentQuestion.spacing} = ${intervals}，两端都栽：棵数 = 间隔数 + 1 = ${intervals + 1}`;
                } else if (currentQuestion.model === 'one') {
                    return `间隔数 = ${currentQuestion.totalLength} ÷ ${currentQuestion.spacing} = ${intervals}，一端栽：棵数 = 间隔数 = ${intervals}`;
                } else {
                    return `间隔数 = ${currentQuestion.totalLength} ÷ ${currentQuestion.spacing} = ${intervals}，两端都不栽：棵数 = 间隔数 - 1 = ${intervals - 1}`;
                }
            };
            
            return (
                <div className="flex flex-col lg:flex-row gap-6 lg:gap-8">
                    {/* 左侧知识点区 */}
                    <div className="lg:w-2/5 bg-white/80 backdrop-blur-sm rounded-3xl shadow-xl p-5 md:p-6 border border-white/50">
                        <div className="border-b-4 border-lavender-primary pb-2 mb-4">
                            <h2 className="text-3xl md:text-4xl font-extrabold text-purple-800 flex items-center gap-2">
                                🌳 植树问题小课堂
                                <span className="text-lg bg-amber-200 px-3 py-0.5 rounded-full">数学广角</span>
                            </h2>
                        </div>
                        <div className="space-y-5 text-base md:text-lg text-gray-800 leading-relaxed">
                            <p className="flex gap-2">
                                <span className="text-3xl">🌲</span>
                                <span><strong className="text-purple-700">植树问题</strong> 研究间隔数与棵数的关系，解决生活中的间隔问题。</span>
                            </p>
                            <div className="bg-gradient-to-r from-indigo-50 to-pink-50 p-4 rounded-2xl shadow-inner space-y-3">
                                <p className="font-bold text-2xl text-center text-purple-800">📖 三大模型公式</p>
                                <ul className="list-disc list-inside text-base space-y-1">
                                    <li>✨ <strong>两端都栽</strong>：棵数 = 间隔数 + 1</li>
                                    <li>✨ <strong>一端栽一端不栽</strong>：棵数 = 间隔数</li>
                                    <li>✨ <strong>两端都不栽</strong>：棵数 = 间隔数 - 1</li>
                                </ul>
                                <div className="bg-amber-50 rounded-xl p-2 text-center">
                                    <p>💡 关键公式：<br/>
                                    间隔数 = 总长 ÷ 间距<br/>
                                    棵数 = 间隔数 ± 调整值</p>
                                </div>
                            </div>
                            <div className="bg-purple-50 p-3 rounded-xl">
                                <p className="font-semibold">🧸 生活变式：</p>
                                <p>🔹 路灯问题（两端都栽）<br/>🔹 锯木头（两端都不栽）<br/>🔹 爬楼梯（一端栽一端不栽）<br/>🔹 敲钟（间隔问题）</p>
                            </div>
                            <div className="mt-2 text-sm text-center text-purple-600 bg-white/60 rounded-xl p-2">
                                💡 <span className="font-medium">游戏玩法：</span> 根据题目描述，计算正确的棵数，把数字卡片拖拽到下方的“答案放置区”。答对得分并自动换题！
                            </div>
                        </div>
                    </div>
                    
                    {/* 右侧游戏互动区 */}
                    <div className="lg:w-3/5 bg-white/80 backdrop-blur-md rounded-3xl shadow-xl p-5 md:p-6 flex flex-col gap-5" id="game-area">
                        <div className="flex justify-between items-center flex-wrap gap-3">
                            <h3 className="text-2xl md:text-3xl font-bold text-purple-800 flex items-center gap-2">
                                🧩 植树挑战 · 拖拖乐
                                <span className="text-sm bg-yellow-200 px-2 py-0.5 rounded-full">拖拽数字</span>
                            </h3>
                            <div className="flex items-center gap-3">
                                <div className="bg-amber-100 rounded-full px-4 py-1 text-xl font-bold text-amber-800">
                                    🏆 得分: {score}
                                </div>
                                <button 
                                    onClick={handleChangeQuestion}
                                    className="bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white font-bold py-2 px-5 rounded-full shadow-lg transition transform hover:scale-105 text-base"
                                >
                                    🔄 换一题
                                </button>
                            </div>
                        </div>
                        
                        {/* 题目卡片 */}
                        <div className="bg-purple-100/90 rounded-2xl p-4 shadow-md">
                            <div className="flex items-center gap-2 mb-2">
                                <span className="text-3xl">🌳</span>
                                <h4 className="text-2xl font-bold text-purple-800">植树问题</h4>
                            </div>
                            <p className="text-xl md:text-2xl font-medium text-gray-800 leading-relaxed">
                                {currentQuestion.description}
                            </p>
                            <div className="mt-3 bg-white/60 rounded-xl p-2 text-sm text-purple-700">
                                💡 解题思路：{formulaHint()}
                            </div>
                        </div>
                        
                        {/* 动态消息区域 */}
                        <div className="bg-amber-50 rounded-xl p-2 text-center text-amber-800 font-medium text-base shadow-sm">
                            💬 {message}
                        </div>
                        
                        {/* 答案放置区（拖拽目标） */}
                        <div>
                            <h4 className="font-bold text-2xl text-purple-700 mb-2">📦 答案放置区（拖拽正确数字到这里）</h4>
                            <div 
                                id="answer-dropzone"
                                onDragOver={onDragOver}
                                onDrop={handleDropOnZone}
                                onDragEnter={onDragEnterZone}
                                onDragLeave={onDragLeaveZone}
                                className={`border-4 border-dashed rounded-2xl p-6 transition-all duration-200 flex flex-col items-center justify-center min-h-[100px] ${
                                    highlightDrop ? 'drop-zone-active bg-yellow-50' : 'border-purple-300 bg-white/50'
                                } ${answered ? 'bg-green-100 border-green-400' : ''}`}
                            >
                                {answered ? (
                                    <div className="text-center">
                                        <span className="text-3xl">✅ 已答对！</span>
                                        <p className="text-xl text-green-700 mt-1">正确答案：{currentQuestion.correctTrees} 棵</p>
                                        <p className="text-sm text-gray-600">即将进入下一题...</p>
                                    </div>
                                ) : (
                                    <div className="text-center">
                                        <span className="text-2xl font-semibold text-purple-600">⬅️ 拖拽数字答案到这里</span>
                                        <p className="text-md text-gray-500 mt-2">把正确的棵数数字卡片拖到此区域</p>
                                        <div className="mt-2 text-sm bg-purple-50 inline-block px-3 py-1 rounded-full">✨ 拖拽卡片松手即可 ✨</div>
                                    </div>
                                )}
                            </div>
                        </div>
                        
                        {/* 可拖拽数字卡片区 */}
                        <div>
                            <h4 className="font-bold text-2xl text-purple-700 mb-2 flex items-center gap-2">🔢 数字卡片（拖拽到上方放置区）</h4>
                            <div className="flex flex-wrap gap-3 justify-center items-center min-h-[100px] bg-white/40 rounded-2xl p-4 custom-scroll">
                                {options.map((num, idx) => (
                                    <div
                                        key={`opt_${currentQuestion.id}_${idx}`}
                                        draggable="true"
                                        onDragStart={(e) => onNumberDragStart(e, num)}
                                        onDragEnd={onNumberDragEnd}
                                        className="bg-gradient-to-br from-cyan-200 to-blue-200 w-20 h-20 rounded-xl flex items-center justify-center shadow-md cursor-grab active:cursor-grabbing transition hover:scale-110 text-3xl font-bold text-blue-800"
                                    >
                                        {num}
                                    </div>
                                ))}
                            </div>
                            <p className="text-xs text-center text-purple-600 mt-2">👉 拖拽数字卡片到上方「答案放置区」松手，系统会自动判断对错！</p>
                        </div>
                        
                        {/* 操作小贴士 */}
                        <div className="flex flex-wrap justify-between items-center text-xs text-purple-600 bg-white/50 rounded-xl p-2 mt-1">
                            <span>✋ 拖拽技巧：先算间隔数（总长÷间距），再根据模型确定棵数。</span>
                            <button onClick={() => setMessage("💡 提示：两端都栽+1，一端栽不变，两端都不栽-1。")} className="underline text-purple-700">❓ 再试一次提示</button>
                        </div>
                        
                        {/* 得分与鼓励 */}
                        <div className="flex justify-center gap-4 text-sm font-medium text-purple-800">
                            <div className="bg-white/50 rounded-full px-3 py-1">✅ 已解出 {score} 道题</div>
                            <div className="bg-white/50 rounded-full px-3 py-1">🎯 继续挑战，成为间隔大师！</div>
                        </div>
                    </div>
                </div>
            );
        };
        
        // 根组件
        const App = () => {
            return (
                <div className="min-h-screen py-2">
                    <div className="text-center mb-5 mt-1">
                        <h1 className="text-3xl md:text-4xl font-black text-white drop-shadow-xl tracking-wider" style={{textShadow: "3px 3px 0 #7e22ce"}}>
                            🌳 植树问题大挑战 · 间隔大师 🧸
                        </h1>
                        <p className="text-white/90 text-lg md:text-xl mt-2 font-medium">拖拽数字卡片，解决植树、路灯、锯木头等间隔问题！</p>
                    </div>
                    <TreePlantingGame />
                    <footer className="text-center text-white/80 text-sm mt-8 pb-3">
                        🌟 根据题目算出正确棵数，拖拽数字到答案区。答对得分自动换题～ 点击【换一题】手动挑战新问题 🌟
                    </footer>
                </div>
            );
        };
        
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
