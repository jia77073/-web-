<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>方阵指挥官 | 数学思维训练：实心与空心方阵</title>
    <!-- Tailwind CSS CDN + 基础样式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM & Babel -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        /* 自定义拖拽反馈和滚动条 */
        .dragging-number {
            opacity: 0.6;
            cursor: grabbing;
        }
        .drop-zone-highlight {
            background: #e9d5ff !important;
            border: 3px solid #a855f7 !important;
            transition: all 0.1s ease;
            transform: scale(1.01);
        }
        .custom-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f3e8ff;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #9333ea;
            border-radius: 10px;
        }
        /* 让拖拽元素在移动端有更好的点按效果 */
        [draggable="true"] {
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }
        /* 胜利闪烁 */
        @keyframes bounceWin {
            0%,100%{ transform: scale(1); }
            50%{ transform: scale(1.05); background: #c084fc; }
        }
        .win-glow {
            animation: bounceWin 0.4s ease-in-out 2;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-50 to-purple-200 min-h-screen p-4 md:p-6 font-sans">

<div id="root"></div>

<script type="text/babel">
    // 方阵专项训练主组件 —— 左知识点 + 右侧拖拽互动游戏（结合实心/空心方阵）
    const { useState, useCallback, useRef, useEffect } = React;

    // ---------- 方阵问题生成器 ----------
    // 问题类型 (0: 实心方阵 - 已知最外层人数求总人数; 1: 实心方阵 - 已知总人数求最外层人数; 
    // 2: 空心方阵 - 已知最外层每边人数和层数求总人数; 3: 空心方阵 - 已知最外层人数与层数求总人数)
    // 保证难度适合小学高段，数字美观
    const generateRandomProblem = () => {
        const type = Math.floor(Math.random() * 4); // 0,1,2,3
        if (type === 0) {
            // 实心方阵: 最外层人数 -> 求总人数
            // 最外层人数公式: 4×边长 - 4 => 边长 = (最外层人数 + 4)/4 必须整数
            let side; // 边长 4~12
            side = Math.floor(Math.random() * 9) + 4; // 4~12
            const outerTotal = 4 * side - 4; // 最外层人数
            const total = side * side;
            const questionText = `🎖️ 实心方阵问题：一个实心方阵，最外层一共有 ${outerTotal} 人，这个方阵的总人数是多少？`;
            const answer = total;
            return { questionText, answer, typeInfo: "实心方阵 · 总人数 = 边长²" };
        } 
        else if (type === 1) {
            // 实心方阵: 已知总人数 -> 求最外层人数
            let side = Math.floor(Math.random() * 9) + 4; // 4~12
            const total = side * side;
            const outerTotal = 4 * side - 4;
            const questionText = `🎨 实心方阵问题：一个实心方阵共有 ${total} 人，那么最外层每边有多少人？（注意问的是最外层一圈的人数）`;
            // 但这里最外层一圈的人数 = 4×边长-4，问题可以是求最外层人数（更直接）
            // 优化为求最外层一圈的总人数，因为更常用
            const questionText2 = `🏵️ 实心方阵问题：一个实心方阵共有 ${total} 人，这个方阵最外层一圈一共有多少人？`;
            const answer = outerTotal;
            return { questionText: questionText2, answer, typeInfo: "实心方阵 · 总人数→边长→最外层人数" };
        }
        else if (type === 2) {
            // 空心方阵: 已知最外层每边人数 和 层数，求总人数
            let outerSide = Math.floor(Math.random() * 7) + 6; // 最外层边长 6~12
            let layers = Math.floor(Math.random() * 3) + 2; // 层数 2~4
            // 内层边长 = outerSide - 2*(layers-1)
            let innerSide = outerSide - 2 * (layers - 1);
            if (innerSide < 2) { // 避免内层边长<=0, 调整
                innerSide = 2;
                outerSide = innerSide + 2 * (layers - 1);
            }
            const totalHollow = outerSide * outerSide - innerSide * innerSide;
            const questionText = `🏰 空心方阵问题：一个 ${layers} 层空心方阵，最外层每边有 ${outerSide} 人，这个方阵一共有多少人？`;
            const answer = totalHollow;
            return { questionText, answer, typeInfo: "空心方阵 · 总人数 = 外² - 内²" };
        } 
        else {
            // 类型3: 空心方阵已知最外层一圈人数 和 层数，求总人数
            let layers = Math.floor(Math.random() * 3) + 2; // 2~4层
            // 最外层每边人数范围6~12
            let outerSide = Math.floor(Math.random() * 7) + 6;
            let innerSide = outerSide - 2 * (layers - 1);
            if (innerSide < 2) { innerSide = 2; outerSide = innerSide + 2*(layers-1); }
            const outerTotalPersons = 4 * outerSide - 4; // 最外层一圈人数
            const totalHollow = outerSide * outerSide - innerSide * innerSide;
            const questionText = `🎯 空心方阵问题：一个 ${layers} 层空心方阵，最外层一圈共有 ${outerTotalPersons} 人，这个方阵一共有多少人？`;
            return { questionText, answer: totalHollow, typeInfo: "空心方阵 · 先求边长，再求总人数" };
        }
    };

    // 根据正确答案生成干扰项 (3个干扰 或 4个选项, 总选项含正确)
    const generateOptions = (correctAnswer) => {
        let optionsSet = new Set();
        optionsSet.add(correctAnswer);
        // 动态生成干扰值：±偏移量 以及相邻值
        let base = correctAnswer;
        let candidates = [
            base + 8, base - 8, base + 16, base - 16, 
            base + 4, base - 4, base + 12, base - 12,
            base + 24, base - 24, Math.floor(base * 1.2), Math.floor(base * 0.8)
        ];
        for (let cand of candidates) {
            if (cand > 0 && cand !== correctAnswer && cand < 300 && optionsSet.size < 4) {
                optionsSet.add(cand);
            }
            if (optionsSet.size >= 4) break;
        }
        // 保证最终有4个选项, 不够补一些简单差值
        while (optionsSet.size < 4) {
            let extra = correctAnswer + (optionsSet.size * 7 + 3);
            if (extra > 0 && extra !== correctAnswer) optionsSet.add(extra);
        }
        let options = Array.from(optionsSet);
        // 随机打乱顺序
        for (let i = options.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [options[i], options[j]] = [options[j], options[i]];
        }
        return options;
    };

    // 主组件
    const MatrixGame = () => {
        // 题目相关状态
        const [problem, setProblem] = useState(() => {
            const init = generateRandomProblem();
            return init;
        });
        const [options, setOptions] = useState(() => generateOptions(18)); // 临时
        const [correctAnswer, setCorrectAnswer] = useState(0);
        const [hasWin, setHasWin] = useState(false);
        const [feedback, setFeedback] = useState("✨ 把正确答案拖拽到星星✨区域吧！");
        const [dragValue, setDragValue] = useState(null);
        
        // 初始化/刷新题目
        const refreshProblem = useCallback(() => {
            const newProb = generateRandomProblem();
            setProblem(newProb);
            const newAns = newProb.answer;
            setCorrectAnswer(newAns);
            const newOpts = generateOptions(newAns);
            setOptions(newOpts);
            setHasWin(false);
            setFeedback("🎲 新方阵挑战！拖拽正确数字到答题宝箱～");
        }, []);
        
        // 首次加载同步正确选项
        useEffect(() => {
            setCorrectAnswer(problem.answer);
            setOptions(generateOptions(problem.answer));
        }, []);
        
        // 换一题逻辑
        const handleNextQuestion = () => {
            refreshProblem();
        };
        
        // 拖拽开始：记录拖拽的数字值
        const onDragStart = (e, numValue) => {
            if (hasWin) {
                e.preventDefault();
                setFeedback("🏆 已经答对啦！点击『换一题』继续挑战吧！");
                return false;
            }
            e.dataTransfer.setData("text/plain", numValue);
            e.dataTransfer.effectAllowed = "copy";
            setDragValue(numValue);
            if (e.target.classList) e.target.classList.add("dragging-number");
        };
        
        const onDragEnd = (e) => {
            if (e.target.classList) e.target.classList.remove("dragging-number");
            setDragValue(null);
            // 移除放置区高亮
            const dropZone = document.getElementById("answerDropZone");
            if (dropZone) dropZone.classList.remove("drop-zone-highlight");
        };
        
        // 拖拽经过放置区域
        const onDragOverTarget = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "copy";
            const zone = document.getElementById("answerDropZone");
            if (zone && !hasWin) zone.classList.add("drop-zone-highlight");
        };
        const onDragLeaveTarget = () => {
            const zone = document.getElementById("answerDropZone");
            if (zone) zone.classList.remove("drop-zone-highlight");
        };
        
        // 放置处理: 验证答案
        const onDropToZone = (e) => {
            e.preventDefault();
            const zone = document.getElementById("answerDropZone");
            if (zone) zone.classList.remove("drop-zone-highlight");
            if (hasWin) {
                setFeedback("🎉 已经胜利了！试试『换一题』继续闯关吧！");
                return;
            }
            const droppedVal = e.dataTransfer.getData("text/plain");
            if (!droppedVal) return;
            const numVal = Number(droppedVal);
            if (numVal === correctAnswer) {
                setHasWin(true);
                setFeedback("🎉🎉 完全正确！ 你真是一位方阵指挥官！太厉害了！ 🎉🎉");
                // 胜利动画
                const zoneDiv = document.getElementById("answerDropZone");
                if (zoneDiv) zoneDiv.classList.add("win-glow");
                setTimeout(() => {
                    if (zoneDiv) zoneDiv.classList.remove("win-glow");
                }, 600);
            } else {
                setFeedback(`❌ 不对哦，${numVal} 不是正确答案。 再根据左侧公式仔细算一算吧！ 加油～`);
                // 闪烁错误提示
                const msgDiv = document.querySelector(".feedback-msg");
                if (msgDiv) {
                    msgDiv.classList.add("animate-pulse");
                    setTimeout(() => msgDiv.classList.remove("animate-pulse"), 500);
                }
            }
        };
        
        // 为了拖拽选项时渲染可拖拽卡片
        const DraggableOption = ({ value }) => {
            return (
                <div
                    draggable={!hasWin}
                    onDragStart={(e) => onDragStart(e, value)}
                    onDragEnd={onDragEnd}
                    className={`bg-gradient-to-br from-amber-300 to-orange-400 w-20 h-20 md:w-24 md:h-24 rounded-2xl shadow-lg flex flex-col items-center justify-center cursor-grab active:cursor-grabbing transition duration-150 hover:scale-105 hover:shadow-xl border-2 border-purple-500 ${hasWin ? 'opacity-60 cursor-default' : ''}`}
                >
                    <span className="text-3xl font-black text-white drop-shadow-md">{value}</span>
                    <span className="text-[11px] font-bold text-purple-900">拖拽我</span>
                </div>
            );
        };
        
        // 知识点区域 + 右侧游戏区域
        return (
            <div className="max-w-7xl mx-auto">
                {/* 大标题 */}
                <div className="text-center mb-6">
                    <h1 className="text-5xl md:text-6xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-900 to-fuchsia-800 drop-shadow-lg">
                        🪖 方阵指挥官 · 实心&空心特训 🧩
                    </h1>
                    <p className="text-purple-800 text-lg font-semibold mt-1">几何数列思维 · 相邻层差8  · 巧算方阵人数</p>
                </div>
                
                {/* 左右布局 知识点+游戏区 */}
                <div className="flex flex-col lg:flex-row gap-7">
                    {/* 左侧知识点区域 (包含所有公式+核心概念) */}
                    <div className="lg:w-2/5 bg-white/80 backdrop-blur-sm rounded-3xl shadow-2xl p-6 border border-purple-200 custom-scroll overflow-y-auto">
                        <div className="flex items-center gap-2 border-b-2 border-purple-400 pb-2 mb-4">
                            <span className="text-3xl">📚</span>
                            <span className="text-3xl font-bold text-purple-900">核心知识点</span>
                        </div>
                        <div className="space-y-5 text-gray-800 text-base md:text-lg"> {/* 5号字相当于16px */}
                            <div className="bg-purple-50 p-4 rounded-xl shadow-inner">
                                <p className="font-extrabold text-purple-800 text-xl">🎯 实心方阵</p>
                                <p>• 总人数 = 边长 × 边长</p>
                                <p>• 最外层人数 = 边长 × 4 - 4 = (边长-1) × 4</p>
                                <p>• 相邻两层，外层比内层多 <strong className="text-fuchsia-700">8人</strong> (每边多2人，四边多8人)</p>
                            </div>
                            <div className="bg-indigo-50 p-4 rounded-xl shadow-inner">
                                <p className="font-extrabold text-purple-800 text-xl">🏰 空心方阵</p>
                                <p>• 总人数 = 最外层实心人数 - 最内层内部空心部分人数</p>
                                <p>• 公式：总人数 = 外边长² - 内边长²  (内边长 = 外边长 - 2×层数)</p>
                                <p>• 每向里一层，每边人数少2，一层总人数少8</p>
                                <p>• 最外层人数 = 4×外边 - 4；若层数为n，最内层边长 = 外边 - 2×(n-1)</p>
                            </div>
                            <div className="bg-fuchsia-50 p-4 rounded-xl shadow-inner">
                                <p className="font-extrabold">✨ 巧记秘诀 ✨</p>
                                <ul className="list-disc list-inside space-y-1 mt-1">
                                    <li>🔹 相邻层 <strong>相差8个人</strong> —— 等差数列思想</li>
                                    <li>🔹 已知最外层人数 ➔ 求边长：(人数+4)÷4 = 每边人数</li>
                                    <li>🔹 空心方阵的“层”就像洋葱，一层层剥开</li>
                                </ul>
                            </div>
                            <div className="bg-amber-50 p-3 rounded-lg text-center text-sm">
                                💡 小试牛刀：三层空心方阵，最外层每边10人，内层每边6人，总人数 = 10² - 4² = 84人！
                            </div>
                        </div>
                        <div className="mt-5 text-xs text-center text-purple-600 italic">
                            ⭐ 右侧游戏：把正确的数字答案拖拽到“答案宝箱”，考验理解力~
                        </div>
                    </div>
                    
                    {/* 右侧游戏区：拖拽匹配方阵答案 */}
                    <div className="lg:w-3/5 bg-white/90 rounded-3xl shadow-2xl p-5 border-2 border-purple-300 flex flex-col">
                        {/* 题目卡片展示 */}
                        <div className="bg-gradient-to-r from-purple-200 via-fuchsia-100 to-purple-200 rounded-2xl p-5 mb-5 shadow-md">
                            <div className="flex flex-wrap justify-between items-start gap-2">
                                <div className="flex-1">
                                    <span className="inline-block bg-purple-700 text-white text-sm px-4 py-1 rounded-full">📌 方阵挑战</span>
                                    <p className="text-xl md:text-2xl font-bold text-purple-900 mt-3 leading-tight">
                                        {problem.questionText}
                                    </p>
                                    <div className="mt-2 text-sm bg-white/60 inline-block px-3 py-1 rounded-full text-purple-700">
                                        {problem.typeInfo}
                                    </div>
                                </div>
                                <button 
                                    onClick={handleNextQuestion}
                                    className="bg-fuchsia-600 hover:bg-fuchsia-700 text-white font-bold py-2 px-6 rounded-full transition shadow-md flex items-center gap-1 text-base md:text-lg"
                                >
                                    🔄 换一题
                                </button>
                            </div>
                        </div>
                        
                        {/* 拖拽游戏主要部分：可拖拽选项 + 答案放置区 */}
                        <div className="flex flex-col md:flex-row gap-6 items-stretch">
                            {/* 左侧选项区（拖拽数字卡片） */}
                            <div className="flex-1 bg-purple-50/80 rounded-2xl p-4 border border-purple-200">
                                <p className="text-center font-bold text-purple-800 mb-3 text-lg">🎲 可拖拽数字选项</p>
                                <div className="flex flex-wrap justify-center gap-4">
                                    {options.map((opt, idx) => (
                                        <DraggableOption key={idx} value={opt} />
                                    ))}
                                </div>
                                <p className="text-sm text-center text-gray-500 mt-4">✨ 把正确数字卡片拖拽到右边⚡宝箱区 ✨</p>
                            </div>
                            
                            {/* 右侧答案放置区 drop target */}
                            <div 
                                id="answerDropZone"
                                onDragOver={onDragOverTarget}
                                onDragLeave={onDragLeaveTarget}
                                onDrop={onDropToZone}
                                className={`flex-1 bg-gradient-to-br from-amber-50 to-yellow-50 rounded-2xl border-4 border-dashed p-5 flex flex-col items-center justify-center transition-all min-h-[240px] ${hasWin ? 'border-green-500 bg-green-50' : 'border-purple-400'}`}
                            >
                                {hasWin ? (
                                    <div className="text-center">
                                        <div className="text-7xl mb-2">🏆🎉</div>
                                        <p className="text-2xl font-black text-green-700">答对啦！完美！</p>
                                        <p className="text-purple-700 mt-2">你是方阵解题英雄！</p>
                                    </div>
                                ) : (
                                    <>
                                        <span className="text-5xl mb-2">⭐</span>
                                        <span className="text-xl font-bold text-purple-800 text-center">答案宝箱</span>
                                        <p className="text-center text-gray-600 mt-2 text-sm">将正确的数字拖拽至此处 →<br/>验证你的答案！</p>
                                        <div className="mt-3 w-32 h-16 bg-white rounded-xl flex items-center justify-center shadow-inner border border-purple-300">
                                            <span className="text-2xl font-mono font-bold text-gray-400">??</span>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                        
                        {/* 反馈消息区 + 操作提示 */}
                        <div className="mt-6 flex flex-col items-center gap-2">
                            <div className={`feedback-msg text-center text-lg font-medium py-3 px-5 rounded-full ${hasWin ? 'bg-green-100 text-green-800' : 'bg-amber-100 text-amber-800'} w-full shadow-inner`}>
                                {feedback}
                            </div>
                            <div className="text-sm text-gray-500 flex gap-3 mt-1">
                                <span>💡 拖拽数字卡片到右边💎宝箱区</span>
                                <span>📐 活用相邻层差8规律 或 边长公式</span>
                            </div>
                            {!hasWin && (
                                <button 
                                    onClick={() => {
                                        setFeedback("💪 加油！根据左侧公式认真计算，再拖拽答案！");
                                    }}
                                    className="text-purple-500 underline text-sm mt-1"
                                >
                                    小提示：可以重新计算再看左侧知识点
                                </button>
                            )}
                        </div>
                        
                        {/* 额外趣味解答区 / 帮助 */}
                        <div className="mt-5 text-xs text-center text-purple-500 border-t pt-3 border-purple-100">
                            🧸 小游戏说明：用“拖拽”将数字块扔进宝箱, 游戏自动判断是否正确。每个方阵题目对应唯一答案，挑战成功即可换题。巩固“包含与排除”的同理思想——方阵层数不要重复算哦。
                        </div>
                    </div>
                </div>
            </div>
        );
    };
    
    // 渲染至root
    ReactDOM.createRoot(document.getElementById("root")).render(<MatrixGame />);
</script>
</body>
</html>
