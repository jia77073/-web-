<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>数学小达人：认识人民币 | 超市购物拖拖乐</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 配置主题：淡紫色 + 大5号字体 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontSize: {
                        '5xl': '3rem',
                        '6xl': '3.75rem',
                    },
                    colors: {
                        'lavender-primary': '#CBAACB',
                        'lavender-light': '#D9C2E6',
                    }
                }
            }
        }
    </script>
    <style>
        /* 拖拽优化 & 移动端适配 */
        [draggable="true"] {
            cursor: grab;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        [draggable="true"]:active {
            cursor: grabbing;
        }
        .drop-zone-active {
            background-color: #fef9c3 !important;
            border-color: #eab308 !important;
            transform: scale(1.02);
            transition: all 0.2s ease;
        }
        /* 配对成功动画 */
        @keyframes matchSuccess {
            0% { transform: scale(1); background-color: #dcfce7; }
            80% { transform: scale(1.05); background-color: #bbf7d0; }
            100% { transform: scale(1); background-color: #f0fdf4; }
        }
        .match-animation {
            animation: matchSuccess 0.4s ease-out;
        }
        .card-removed {
            transition: all 0.2s;
            opacity: 0;
            transform: scale(0.8);
        }
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #CBAACB;
            border-radius: 10px;
        }
        /* 禁止移动端长按菜单 */
        .no-tap-highlight {
            -webkit-touch-callout: none;
        }
    </style>
    <!-- React & ReactDOM & Babel -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gradient-to-br from-lavender-primary to-lavender-light min-h-screen p-4 md:p-5 font-sans no-tap-highlight">
    <div id="root" class="max-w-7xl mx-auto"></div>

    <script type="text/babel">
        // React 主逻辑: 认识人民币 —— 拖拽购物配对游戏
        const { useState, useEffect, useCallback, useRef } = React;

        // ----- 商品池 (名称、图标、价格，价格限定在常见纸币面额: 1,5,10,20) -----
        const PRODUCTS_BY_PRICE = {
            1: [
                { id: "candy", name: "🍭 棒棒糖", price: 1, icon: "🍭" },
                { id: "pencil", name: "✏️ 铅笔", price: 1, icon: "✏️" },
                { id: "eraser", name: "🧽 橡皮擦", price: 1, icon: "🧽" }
            ],
            5: [
                { id: "milk", name: "🥛 牛奶", price: 5, icon: "🥛" },
                { id: "notebook", name: "📓 笔记本", price: 5, icon: "📓" },
                { id: "juice", name: "🧃 果汁", price: 5, icon: "🧃" }
            ],
            10: [
                { id: "book", name: "📚 故事书", price: 10, icon: "📚" },
                { id: "toycar", name: "🚗 玩具车", price: 10, icon: "🚗" },
                { id: "lamp", name: "💡 小夜灯", price: 10, icon: "💡" }
            ],
            20: [
                { id: "backpack", name: "🎒 小书包", price: 20, icon: "🎒" },
                { id: "paint", name: "🎨 水彩笔", price: 20, icon: "🎨" },
                { id: "puzzle", name: "🧩 益智拼图", price: 20, icon: "🧩" }
            ]
        };
        
        // 可用的价格列表 (用于随机选择不重复价格)
        const PRICE_LIST = [1, 5, 10, 20];
        
        // 预定义人民币卡片 (面额及显示样式)
        const CARD_DENOMINATIONS = [
            { value: 1, label: "1元", icon: "💰", color: "bg-green-100", border: "border-green-300" },
            { value: 5, label: "5元", icon: "💰", color: "bg-blue-100", border: "border-blue-300" },
            { value: 10, label: "10元", icon: "💵", color: "bg-cyan-100", border: "border-cyan-300" },
            { value: 20, label: "20元", icon: "💵", color: "bg-purple-100", border: "border-purple-300" },
            { value: 50, label: "50元", icon: "💴", color: "bg-yellow-100", border: "border-yellow-400" },
            { value: 100, label: "100元", icon: "💶", color: "bg-red-100", border: "border-red-300" }
        ];
        
        // 随机选择3个不同价格的商品 (每个价格随机选一个商品)
        const getRandomProducts = () => {
            // 打乱价格列表取前3个不同价格
            const shuffledPrices = [...PRICE_LIST];
            for (let i = shuffledPrices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffledPrices[i], shuffledPrices[j]] = [shuffledPrices[j], shuffledPrices[i]];
            }
            const selectedPrices = shuffledPrices.slice(0, 3);
            const products = [];
            for (let price of selectedPrices) {
                const options = PRODUCTS_BY_PRICE[price];
                const randomIndex = Math.floor(Math.random() * options.length);
                const selected = { ...options[randomIndex] };
                // 添加唯一ID
                selected.uniqueId = `${selected.id}_${Date.now()}_${Math.random()}`;
                selected.matched = false;
                products.push(selected);
            }
            return products;
        };
        
        // 初始化卡片列表 (全部可用)
        const getInitialCards = () => {
            return CARD_DENOMINATIONS.map((card, idx) => ({
                id: `card_${card.value}_${idx}`,
                value: card.value,
                label: card.label,
                icon: card.icon,
                color: card.color,
                border: card.border,
                available: true,   // 是否还未被使用
            }));
        };
        
        // ---------- 主游戏组件: 拖拽人民币购物 ----------
        const ShoppingGame = () => {
            const [products, setProducts] = useState([]);      // 商品列表，每个含 matched
            const [cards, setCards] = useState([]);            // 人民币卡片列表
            const [message, setMessage] = useState("🛒 欢迎光临！把人民币卡片拖拽到对应价格的商品上，付款成功即可购买！");
            const [effectTrigger, setEffectTrigger] = useState(0);
            const [highlightProductId, setHighlightProductId] = useState(null);
            
            const totalProducts = products.length;
            const matchedCount = products.filter(p => p.matched).length;
            const allMatched = totalProducts > 0 && matchedCount === totalProducts;
            
            // 重置/换一题
            const resetGame = () => {
                const newProducts = getRandomProducts();
                const newCards = getInitialCards();
                setProducts(newProducts);
                setCards(newCards);
                setMessage("🔄 新的一轮购物！拖拽人民币卡片，买到心仪的商品吧～");
                setEffectTrigger(prev => prev+1);
                setHighlightProductId(null);
            };
            
            // 初始化
            useEffect(() => {
                resetGame();
            }, []);
            
            // 处理配对: 卡片拖拽到商品
            const handleDropOnProduct = (e, targetProduct) => {
                e.preventDefault();
                setHighlightProductId(null);
                let dragData;
                try {
                    const raw = e.dataTransfer.getData("text/plain");
                    if (!raw) return;
                    dragData = JSON.parse(raw);
                } catch(err) {
                    setMessage("请从下方人民币卡片拖拽哦～");
                    return;
                }
                const { cardId, cardValue } = dragData;
                if (!cardId) return;
                
                // 查找卡片是否还存在且可用
                const targetCard = cards.find(c => c.id === cardId && c.available === true);
                if (!targetCard) {
                    setMessage("💸 这张人民币已经用过了！每张钱只能付一次款哟～");
                    return;
                }
                // 检查商品是否已配对
                if (targetProduct.matched) {
                    setMessage(`🍬 ${targetProduct.name} 已经买过了！不能重复付款，试试其他商品吧。`);
                    return;
                }
                // 验证金额是否匹配
                if (targetCard.value === targetProduct.price) {
                    // 配对成功
                    // 更新商品为已配对
                    setProducts(prevProducts =>
                        prevProducts.map(p =>
                            p.uniqueId === targetProduct.uniqueId ? { ...p, matched: true } : p
                        )
                    );
                    // 将卡片标记为不可用 (移除或设置为available false)
                    setCards(prevCards =>
                        prevCards.map(c =>
                            c.id === cardId ? { ...c, available: false } : c
                        )
                    );
                    setMessage(`🎉 付款成功！你用 ${targetCard.label} 买到了 ${targetProduct.name} 🎉`);
                    setEffectTrigger(prev => prev+1);
                    // 播放动画
                    const productElem = document.getElementById(`product-${targetProduct.uniqueId}`);
                    if (productElem) {
                        productElem.classList.add('match-animation');
                        setTimeout(() => productElem.classList.remove('match-animation'), 400);
                    }
                } else {
                    // 金额错误
                    setMessage(`❌ 付款失败！${targetProduct.name} 价格是 ${targetProduct.price} 元，你付了 ${targetCard.value} 元，再试试正确的卡片吧～`);
                }
            };
            
            // 卡片拖拽开始
            const onCardDragStart = (e, card) => {
                if (!card.available) {
                    e.preventDefault();
                    setMessage("这张人民币已经花掉了，不能重复使用～");
                    return false;
                }
                e.dataTransfer.setData("text/plain", JSON.stringify({ cardId: card.id, cardValue: card.value }));
                e.dataTransfer.effectAllowed = "copy";
                if (e.target) e.target.style.opacity = "0.5";
            };
            const onCardDragEnd = (e) => {
                if (e.target) e.target.style.opacity = "";
            };
            
            // 商品放置区事件
            const onDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = "copy";
            };
            const onDragEnterProduct = (productId) => setHighlightProductId(productId);
            const onDragLeaveProduct = () => setHighlightProductId(null);
            
            // 换一题按钮
            const handleChangeQuestion = () => {
                resetGame();
            };
            
            // 可用卡片列表 (未使用的)
            const availableCards = cards.filter(c => c.available);
            
            return (
                <div className="flex flex-col lg:flex-row gap-6 lg:gap-8">
                    {/* ========= 左侧知识点区 ========= */}
                    <div className="lg:w-2/5 bg-white/80 backdrop-blur-sm rounded-3xl shadow-xl p-5 md:p-6 border border-white/50">
                        <div className="border-b-4 border-lavender-primary pb-2 mb-4">
                            <h2 className="text-4xl md:text-5xl font-extrabold text-purple-800 flex items-center gap-2">
                                💰 人民币小课堂
                                <span className="text-xl bg-amber-200 px-3 py-1 rounded-full">元角分</span>
                            </h2>
                        </div>
                        <div className="space-y-4 text-lg md:text-xl text-gray-800 leading-relaxed">
                            <p className="flex gap-2">
                                <span className="text-3xl">💴</span>
                                <span><strong className="text-purple-700">人民币</strong> 是中国的法定货币，单位有<strong className="bg-pink-100 px-1">元、角、分</strong>。</span>
                            </p>
                            <div className="bg-gradient-to-r from-indigo-50 to-pink-50 p-4 rounded-2xl shadow-inner space-y-2">
                                <p className="font-bold text-2xl text-center text-purple-800">📖 常见纸币面额</p>
                                <div className="flex flex-wrap justify-center gap-2 text-xl">
                                    <span className="bg-white px-2 py-1 rounded-full shadow">1元</span>
                                    <span className="bg-white px-2 py-1 rounded-full shadow">5元</span>
                                    <span className="bg-white px-2 py-1 rounded-full shadow">10元</span>
                                    <span className="bg-white px-2 py-1 rounded-full shadow">20元</span>
                                    <span className="bg-white px-2 py-1 rounded-full shadow">50元</span>
                                    <span className="bg-white px-2 py-1 rounded-full shadow">100元</span>
                                </div>
                                <p className="text-sm text-center mt-2">还有1角、5角硬币等</p>
                                <div className="bg-amber-50 rounded-xl p-2 text-center">
                                    <p>✨ 换算公式：<strong>1元 = 10角</strong> &nbsp;|&nbsp; <strong>1角 = 10分</strong></p>
                                </div>
                            </div>
                            <div className="bg-purple-50 p-3 rounded-xl">
                                <p className="font-semibold">🧠 购物小技巧：</p>
                                <p>看价格标签，选择对应面额的人民币付款。如果价格需要组合，可以多用几张人民币。今天我们先练习用<strong>一张钱</strong>正好付清商品价格！</p>
                            </div>
                            <div className="mt-2 text-sm text-center text-purple-600 bg-white/60 rounded-xl p-2">
                                💡 <span className="font-medium">游戏玩法：</span> 下方有各种人民币卡片，把它们<strong>拖拽</strong>到右边商品上，金额正确就能成功购买！每个商品只需付一次款，每张钱只能用一次。
                            </div>
                        </div>
                    </div>
                    
                    {/* ========= 右侧游戏互动区 (拖拽购物) ========= */}
                    <div className="lg:w-3/5 bg-white/80 backdrop-blur-md rounded-3xl shadow-xl p-5 md:p-6 flex flex-col gap-5">
                        <div className="flex justify-between items-center flex-wrap gap-3">
                            <h3 className="text-3xl md:text-4xl font-bold text-purple-800 flex items-center gap-2">
                                🛒 小小超市 · 拖拖乐
                                <span className="text-sm bg-yellow-200 px-2 py-0.5 rounded-full">拖拽付款</span>
                            </h3>
                            <button 
                                onClick={handleChangeQuestion}
                                className="bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white font-bold py-2 px-6 rounded-full shadow-lg transition transform hover:scale-105 text-xl"
                            >
                                🔄 换一题
                            </button>
                        </div>
                        
                        {/* 进度条和计数 */}
                        <div className="space-y-1">
                            <div className="flex justify-between text-sm md:text-base font-semibold text-purple-800">
                                <span>🛍️ 已购买: {matchedCount} / {totalProducts}</span>
                                <span>🎯 目标: 买完所有商品</span>
                            </div>
                            <div className="bg-gray-200 rounded-full h-5 overflow-hidden">
                                <div className="bg-gradient-to-r from-green-400 to-emerald-500 h-full rounded-full transition-all duration-500" style={{width: `${totalProducts ? (matchedCount/totalProducts)*100 : 0}%`}}></div>
                            </div>
                        </div>
                        
                        {/* 动态消息区域 */}
                        <div className="bg-purple-100/80 rounded-xl p-3 text-center text-purple-800 font-medium text-base shadow-sm">
                            💬 {message}
                        </div>
                        
                        {/* 商品展示区 (可放置区域) */}
                        <div>
                            <h4 className="font-bold text-2xl text-purple-700 mb-3 flex items-center gap-2">🏪 今日商品 (拖拽人民币到这里付款)</h4>
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                                {products.map(product => (
                                    <div
                                        key={product.uniqueId}
                                        id={`product-${product.uniqueId}`}
                                        onDragOver={onDragOver}
                                        onDrop={(e) => handleDropOnProduct(e, product)}
                                        onDragEnter={() => onDragEnterProduct(product.uniqueId)}
                                        onDragLeave={onDragLeaveProduct}
                                        className={`relative p-4 rounded-2xl border-3 border-dashed transition-all duration-200 ${
                                            highlightProductId === product.uniqueId ? 'drop-zone-active bg-yellow-50' : 'bg-white/60 border-purple-300'
                                        } ${product.matched ? 'bg-green-100/80 border-green-400' : 'hover:shadow-md'}`}
                                    >
                                        <div className="flex flex-col items-center text-center">
                                            <span className="text-6xl">{product.icon}</span>
                                            <h3 className="text-xl font-bold text-purple-800 mt-2">{product.name}</h3>
                                            <div className="mt-2 bg-amber-200 rounded-full px-3 py-1 text-lg font-black text-amber-800">
                                                ¥{product.price} 元
                                            </div>
                                            {product.matched && (
                                                <div className="absolute top-2 right-2 bg-green-500 text-white rounded-full p-1 shadow-md">
                                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                                        <path fillRule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clipRule="evenodd" />
                                                    </svg>
                                                </div>
                                            )}
                                        </div>
                                        {!product.matched && (
                                            <div className="mt-2 text-xs text-center text-purple-500">⬅️ 拖拽人民币到这里</div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                        {/* 人民币卡片区域 (可拖拽) */}
                        <div>
                            <h4 className="font-bold text-2xl text-purple-700 mb-2 flex items-center gap-2">💵 钱包里的钱 (拖拽付款)</h4>
                            <div className="flex flex-wrap gap-3 justify-start items-center min-h-[120px] bg-white/40 rounded-2xl p-3 custom-scroll overflow-x-auto">
                                {availableCards.length === 0 ? (
                                    <div className="w-full text-center py-5 text-amber-600 font-bold text-xl">🏧 钱都用完啦！点击「换一题」继续购物吧～</div>
                                ) : (
                                    availableCards.map(card => (
                                        <div 
                                            key={card.id}
                                            draggable="true"
                                            onDragStart={(e) => onCardDragStart(e, card)}
                                            onDragEnd={onCardDragEnd}
                                            className={`${card.color} border-2 ${card.border} w-28 h-28 rounded-2xl flex flex-col items-center justify-center shadow-lg cursor-grab active:cursor-grabbing transition hover:scale-105 select-none`}
                                        >
                                            <span className="text-4xl">{card.icon}</span>
                                            <span className="text-2xl font-black text-gray-800">{card.label}</span>
                                            <span className="text-[10px] text-gray-600 mt-1">拖拽支付</span>
                                        </div>
                                    ))
                                )}
                            </div>
                            <p className="text-xs text-center text-purple-600 mt-2">👉 按住或长按钱币卡片，拖到对应的商品上，金额正确就能买下它！</p>
                        </div>
                        
                        {/* 操作小贴士和额外帮助 */}
                        <div className="flex flex-wrap justify-between items-center text-xs text-purple-600 bg-white/50 rounded-xl p-2 mt-1">
                            <span>✋ 拖拽技巧：从钱币拖到商品区，只有面额匹配才能付款成功。</span>
                            <button onClick={() => setMessage("💡 提示：商品价格在黄色标签上，找到对应金额的纸币拖过去就好！每张纸币只能用一次。")} className="underline text-purple-700">❓ 再试一次提示</button>
                        </div>
                        
                        {allMatched && (
                            <div className="mt-2 text-center text-2xl font-bold text-green-700 bg-green-100 rounded-2xl p-3 animate-bounce">
                                🎉 购物成功！ 你已经成为人民币小专家啦！ 🎉
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        
        // ---------- 根组件 ----------
        const App = () => {
            return (
                <div className="min-h-screen py-2">
                    <div className="text-center mb-5 mt-1">
                        <h1 className="text-5xl md:text-7xl font-black text-white drop-shadow-xl tracking-wider" style={{textShadow: "3px 3px 0 #7e22ce"}}>
                            🛍️ 人民币大冒险 · 快乐购物节 🧸
                        </h1>
                        <p className="text-white/90 text-xl md:text-2xl mt-2 font-medium">拖拽钱币，付对金额，轻松学会用人民币！</p>
                    </div>
                    <ShoppingGame />
                    <footer className="text-center text-white/80 text-sm mt-8 pb-3">
                        🌟 把人民币卡片拖到对应价格的商品上，成功购买商品！点击【换一题】继续挑战新商品 🌟
                    </footer>
                </div>
            );
        };
        
        // 渲染
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
