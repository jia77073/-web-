<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>位置与方向 · 上下前后大冒险</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM & Babel CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        /* 拖拽优化 + 移动端友好 */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        .drag-card {
            transition: all 0.2s ease;
            cursor: grab;
            user-select: none;
            touch-action: manipulation;
        }
        .drag-card:active {
            cursor: grabbing;
            opacity: 0.7;
        }
        .drop-zone {
            transition: all 0.2s ease;
        }
        .drop-zone.drag-over {
            background-color: #f1e2ff;
            border-color: #9333ea;
            transform: scale(1.02);
            box-shadow: 0 6px 14px rgba(147, 51, 234, 0.25);
        }
        /* 大字体 (6号 ≈ 18px以上) */
        .big-text {
            font-size: 1.25rem;
            line-height: 1.45;
        }
        @media (min-width: 768px) {
            .big-text {
                font-size: 1.5rem;
            }
        }
        .knowledge-text {
            font-size: 1rem;
            line-height: 1.5;
        }
        @media (min-width: 768px) {
            .knowledge-text {
                font-size: 1.2rem;
            }
        }
        [draggable="true"] {
            -webkit-user-drag: element;
        }
        /* 场景卡片 */
        .scene-card {
            background: #fef9e3;
            border-radius: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .tree-symbol {
            font-size: 4rem;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2));
        }
        .object-icon {
            font-size: 2.5rem;
            background: white;
            border-radius: 50%;
            padding: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 64px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media (max-width: 640px) {
            .object-icon { width: 52px; height: 52px; font-size: 2rem; }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#CBAACB] to-[#D9C2E6] min-h-screen p-4 md:p-6 font-sans">

<div id="root" class="max-w-7xl mx-auto"></div>

<script type="text/babel">
    // 认识上下前后 互动课程 (知识点 + 拖拽配对游戏)
    const PositionGame = () => {
        // ---------- 知识点内容 (左侧) ----------
        const knowledgePoints = {
            title: "📍 位置与方向 · 上下前后",
            intro: "用‘上、下、前、后’可以清楚地描述物体的位置。",
            definitions: [
                { word: "上面", desc: "一个物体在另一个物体的高处，比如：小鸟在树枝的上面。" },
                { word: "下面", desc: "一个物体在另一个物体的低处，比如：小草在大树的下面。" },
                { word: "前面", desc: "物体面对的方向，比如：蝴蝶在花朵的前面。" },
                { word: "后面", desc: "物体背对的方向，比如：蜗牛在石头的后面。" }
            ],
            reference: "✨ 参照物很重要！说‘上面’时，要明确以什么为参照，比如‘铅笔在书本的上面’。",
            tip: "💡 小技巧：把自己想象成参照物，或者用手指一指方向，就能轻松判断上下前后。"
        };
        
        // ---------- 游戏数据 ----------
        // 以“大树”为参照物，场景中的四个物体及其正确方位描述
        const sceneObjects = [
            { id: "bird", name: "小鸟", icon: "🐦", position: "上面", description: "小鸟在树的上面", correctSentenceId: "sentence_above" },
            { id: "flower", name: "小花", icon: "🌸", position: "下面", description: "小花在树的下面", correctSentenceId: "sentence_below" },
            { id: "butterfly", name: "蝴蝶", icon: "🦋", position: "前面", description: "蝴蝶在树的前面", correctSentenceId: "sentence_front" },
            { id: "snail", name: "蜗牛", icon: "🐌", position: "后面", description: "蜗牛在树的后面", correctSentenceId: "sentence_back" }
        ];
        
        // 方位句子卡片（可拖拽）
        const sentenceCards = [
            { id: "sentence_above", text: "🐦 小鸟在树的上面", emoji: "⬆️", correctFor: "bird" },
            { id: "sentence_below", text: "🌸 小花在树的下面", emoji: "⬇️", correctFor: "flower" },
            { id: "sentence_front", text: "🦋 蝴蝶在树的前面", emoji: "➡️", correctFor: "butterfly" },
            { id: "sentence_back", text: "🐌 蜗牛在树的后面", emoji: "🔙", correctFor: "snail" }
        ];
        
        // 游戏状态
        const [availableCards, setAvailableCards] = React.useState(sentenceCards);
        const [matchedPairs, setMatchedPairs] = React.useState({}); // key: objectId, value: sentenceId
        const [message, setMessage] = React.useState({ text: "🐣 把方位句子卡片拖拽到正确的物体下方！长按卡片并拖动～", type: "info" });
        const [gameWin, setGameWin] = React.useState(false);
        
        const draggingCardRef = React.useRef(null);
        
        // 检查胜利
        React.useEffect(() => {
            const allMatched = sceneObjects.every(obj => matchedPairs[obj.id] !== undefined);
            if (allMatched && !gameWin) {
                setGameWin(true);
                setMessage({ text: "🎉 太棒了！你完全掌握了上下前后！现在可以准确描述物体的位置啦！ 🎉", type: "success" });
            } else if (!allMatched && gameWin) {
                setGameWin(false);
            }
        }, [matchedPairs, gameWin]);
        
        const showMessage = (msg, msgType = "error", duration = 2000) => {
            setMessage({ text: msg, type: msgType });
            setTimeout(() => {
                setMessage(prev => prev.text === msg ? { text: "✨ 继续拖拽配对，把句子送到正确的小动物旁边吧！", type: "info" } : prev);
            }, duration);
        };
        
        // 拖拽开始
        const handleDragStart = (e, card) => {
            if (!availableCards.some(c => c.id === card.id)) {
                e.preventDefault();
                showMessage("⛔ 这张句子卡片已经配对过了！点击「重置游戏」可以重新挑战", "error");
                return false;
            }
            draggingCardRef.current = card;
            e.dataTransfer.setData("text/plain", card.id);
            e.dataTransfer.effectAllowed = "copy";
            if (e.target) e.target.style.opacity = "0.6";
            return true;
        };
        
        const handleDragEnd = (e) => {
            if (e.target) e.target.style.opacity = "";
            draggingCardRef.current = null;
        };
        
        const handleDragOver = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "copy";
        };
        
        // 高亮效果
        const handleDragEnter = (e, objectId) => {
            e.preventDefault();
            const zoneElem = document.getElementById(`dropzone-${objectId}`);
            if (zoneElem) zoneElem.classList.add("drag-over");
        };
        
        const handleDragLeave = (e, objectId) => {
            const zoneElem = document.getElementById(`dropzone-${objectId}`);
            if (zoneElem) zoneElem.classList.remove("drag-over");
        };
        
        // 放置逻辑：将句子卡片配对到对应的物体
        const handleDrop = (e, targetObject) => {
            e.preventDefault();
            const zoneElem = document.getElementById(`dropzone-${targetObject.id}`);
            if (zoneElem) zoneElem.classList.remove("drag-over");
            
            let draggedCard = draggingCardRef.current;
            if (!draggedCard) {
                const cardId = e.dataTransfer.getData("text/plain");
                draggedCard = sentenceCards.find(c => c.id === cardId);
            }
            if (!draggedCard) return;
            
            // 检查卡片是否还在可用列表中
            if (!availableCards.some(c => c.id === draggedCard.id)) {
                showMessage(`❌ “${draggedCard.text}” 已经配对过了！`, "error");
                return;
            }
            
            // 检查这个物体是否已经配对
            if (matchedPairs[targetObject.id] !== undefined) {
                showMessage(`❌ ${targetObject.name} 的位置已经配对过了！不能重复放置。`, "error");
                return;
            }
            
            // 验证配对：卡片的 correctFor 是否等于 targetObject.id
            const isCorrect = (draggedCard.correctFor === targetObject.id);
            if (isCorrect) {
                // 配对正确
                setAvailableCards(prev => prev.filter(card => card.id !== draggedCard.id));
                setMatchedPairs(prev => ({
                    ...prev,
                    [targetObject.id]: draggedCard.id
                }));
                showMessage(`✅ 正确！${draggedCard.text}  → 配对成功！`, "success", 1500);
            } else {
                // 配对错误
                showMessage(`❌ 配对错误！“${draggedCard.text}” 不是 ${targetObject.name} 的正确方位。再试试看～`, "error", 1800);
            }
            draggingCardRef.current = null;
        };
        
        // 重置游戏
        const resetGame = () => {
            setAvailableCards(sentenceCards);
            setMatchedPairs({});
            setGameWin(false);
            setMessage({ text: "🔄 游戏已重置！所有句子卡片重新出现，再挑战一次吧！", type: "info" });
            draggingCardRef.current = null;
            document.querySelectorAll('.drop-zone').forEach(el => el.classList.remove('drag-over'));
        };
        
        const matchedCount = Object.keys(matchedPairs).length;
        const totalObjects = sceneObjects.length;
        
        return (
            <div className="w-full">
                <div className="flex flex-col lg:flex-row gap-6 lg:gap-8">
                    {/* ================= 左侧：知识点区域 ================= */}
                    <div className="lg:w-5/12 bg-white/85 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 border border-white/40 transition-all">
                        <div className="flex items-center gap-2 border-b-4 border-purple-300 pb-3 mb-4">
                            <span className="text-4xl">🗺️</span>
                            <h2 className="text-3xl md:text-4xl font-extrabold text-purple-800">方位小讲堂</h2>
                            <span className="text-sm bg-purple-200 px-3 py-1 rounded-full ml-2">上下前后</span>
                        </div>
                        <div className="knowledge-text text-gray-800 space-y-4">
                            <p className="text-xl font-bold text-indigo-700">{knowledgePoints.title}</p>
                            <p className="bg-white/60 p-3 rounded-xl">✨ {knowledgePoints.intro}</p>
                            <div className="grid grid-cols-2 gap-2">
                                {knowledgePoints.definitions.map((def, idx) => (
                                    <div key={idx} className="bg-purple-50 p-2 rounded-lg text-center">
                                        <span className="font-bold text-purple-700">{def.word}</span>
                                        <p className="text-xs mt-1">{def.desc}</p>
                                    </div>
                                ))}
                            </div>
                            <div className="bg-amber-50 p-3 rounded-xl text-amber-800 text-sm">
                                {knowledgePoints.reference}
                            </div>
                            <div className="bg-cyan-50 p-2 rounded-lg text-cyan-700 text-sm italic">
                                {knowledgePoints.tip}
                            </div>
                            {/* 参照物示范图 */}
                            <div className="bg-green-50 p-3 rounded-xl flex flex-col items-center">
                                <p className="font-bold text-green-700">🌳 参照物：大树</p>
                                <div className="flex justify-center gap-4 mt-2 flex-wrap">
                                    <div className="text-center">
                                        <div className="text-4xl">🐦</div>
                                        <p className="text-xs">上面</p>
                                    </div>
                                    <div className="text-center">
                                        <div className="text-4xl">🦋</div>
                                        <p className="text-xs">前面</p>
                                    </div>
                                    <div className="text-center">
                                        <div className="text-4xl">🐌</div>
                                        <p className="text-xs">后面</p>
                                    </div>
                                    <div className="text-center">
                                        <div className="text-4xl">🌸</div>
                                        <p className="text-xs">下面</p>
                                    </div>
                                </div>
                                <p className="text-xs text-gray-500 mt-2">以大树为中心，分辨上下前后</p>
                            </div>
                        </div>
                        <div className="mt-4 text-center text-purple-600 bg-purple-100/60 rounded-xl p-2 text-sm md:text-base">
                            🌟 记住参照物，分清上下前后，拖拽配对记得牢！
                        </div>
                    </div>
                    
                    {/* ================= 右侧：互动游戏区 ================= */}
                    <div className="lg:w-7/12 bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 flex flex-col border border-purple-200">
                        <div className="flex flex-wrap justify-between items-center gap-3 border-b-2 border-purple-300 pb-3 mb-4">
                            <div className="flex items-center gap-2">
                                <span className="text-3xl">🎮</span>
                                <h2 className="text-3xl md:text-4xl font-extrabold text-purple-800">方位配对工坊</h2>
                                <span className="text-sm bg-yellow-200 px-2 py-1 rounded-full">拖拽配对</span>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="bg-purple-100 rounded-full px-4 py-1 text-purple-700 font-bold text-lg">
                                    配对进度 {matchedCount}/{totalObjects}
                                </div>
                                <button 
                                    onClick={resetGame}
                                    className="bg-amber-400 hover:bg-amber-500 text-amber-900 font-bold py-2 px-4 rounded-full shadow-md transition transform hover:scale-105 text-base md:text-lg flex items-center gap-1"
                                >
                                    🔄 重置游戏
                                </button>
                            </div>
                        </div>
                        
                        {/* 消息提示 */}
                        <div className={`mb-4 p-3 rounded-xl text-center font-medium transition-all big-text ${message.type === 'error' ? 'bg-red-100 text-red-700 border border-red-300' : message.type === 'success' ? 'bg-green-100 text-green-700 border border-green-300' : 'bg-indigo-50 text-indigo-600 border border-indigo-200'}`}>
                            {message.text}
                        </div>
                        
                        {/* 场景展示：大树 + 四个物体（带放置区） */}
                        <div className="scene-card p-4 mb-6">
                            <div className="text-center">
                                <div className="tree-symbol">🌳</div>
                                <p className="font-bold text-green-700 text-lg mb-2">参照物：大树</p>
                            </div>
                            <div className="grid grid-cols-2 gap-4 mt-2">
                                {sceneObjects.map(obj => {
                                    const isMatched = matchedPairs[obj.id] !== undefined;
                                    return (
                                        <div key={obj.id} className="flex flex-col items-center bg-white/60 rounded-2xl p-2 shadow-sm">
                                            <div className="object-icon">
                                                <span>{obj.icon}</span>
                                            </div>
                                            <p className="font-semibold text-gray-700 mt-1">{obj.name}</p>
                                            <div 
                                                id={`dropzone-${obj.id}`}
                                                onDragOver={handleDragOver}
                                                onDragEnter={(e) => handleDragEnter(e, obj.id)}
                                                onDragLeave={(e) => handleDragLeave(e, obj.id)}
                                                onDrop={(e) => handleDrop(e, obj)}
                                                className={`drop-zone w-full mt-2 p-2 min-h-[70px] rounded-xl border-2 border-dashed transition-all flex flex-col items-center justify-center text-center ${
                                                    isMatched ? 'bg-green-100 border-green-400' : 'bg-white/70 border-purple-300'
                                                }`}
                                            >
                                                {isMatched ? (
                                                    <div className="flex flex-col items-center gap-1">
                                                        <span className="text-xl">✅</span>
                                                        <p className="font-bold text-green-700 text-sm">已配对</p>
                                                        <p className="text-xs text-green-600">方位句子已匹配</p>
                                                    </div>
                                                ) : (
                                                    <div className="text-center">
                                                        <span className="text-xl block mb-1">⬇️</span>
                                                        <p className="text-purple-500 font-medium text-xs">拖放句子卡片到这里</p>
                                                        <p className="text-[10px] text-gray-400">匹配{obj.name}的方位</p>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                            <p className="text-center text-xs text-gray-500 mt-3">💡 提示：小鸟在树的上面，小花在树的下面，蝴蝶在树的前面，蜗牛在树的后面。</p>
                        </div>
                        
                        {/* 可拖拽卡片池（方位句子） */}
                        <div className="mt-2">
                            <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
                                <h3 className="text-2xl font-bold text-purple-700 flex items-center gap-2">
                                    🃏 方位句子卡片池
                                    <span className="text-sm bg-yellow-200 px-2 py-1 rounded-full">长按/鼠标拖拽</span>
                                </h3>
                                <span className="text-xs md:text-sm text-purple-500">💡 把卡片拖到上方对应物体的放置区</span>
                            </div>
                            
                            {availableCards.length === 0 ? (
                                <div className="bg-gradient-to-r from-green-100 to-emerald-100 p-6 rounded-2xl text-center text-green-700 text-xl font-bold">
                                    🎉 完美！所有方位句子都配对成功！ 你已经是方位小专家啦 🎉
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                    {availableCards.map(card => (
                                        <div
                                            key={card.id}
                                            draggable={true}
                                            onDragStart={(e) => handleDragStart(e, card)}
                                            onDragEnd={handleDragEnd}
                                            className="drag-card bg-gradient-to-br from-amber-200 to-yellow-300 rounded-2xl p-3 shadow-md flex items-center gap-3 cursor-grab active:cursor-grabbing hover:shadow-xl transition-all transform hover:scale-[1.02]"
                                        >
                                            <div className="text-3xl">{card.emoji}</div>
                                            <div className="flex-1">
                                                <p className="font-bold text-gray-800 text-base md:text-lg">{card.text}</p>
                                                <p className="text-xs text-amber-800 mt-0.5">描述了一个物体的位置</p>
                                                <p className="text-[10px] text-purple-600 mt-1">👉 拖拽配对</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            {/* 玩法说明 */}
                            <div className="mt-5 bg-purple-100/70 p-3 rounded-xl text-purple-700 text-sm">
                                <p className="font-bold">📌 拖拉拽玩法：</p>
                                <ul className="list-disc list-inside space-y-1">
                                    <li>① 手指/鼠标长按方位句子卡片（例如“小鸟在树的上面”）</li>
                                    <li>② 拖拽到上方对应物体的放置区（小鸟、小花、蝴蝶或蜗牛）</li>
                                    <li>③ 配对正确，卡片会消失，放置区显示“已配对”</li>
                                    <li>④ 全部4个物体配对成功，获得胜利 🏆</li>
                                </ul>
                                <div className="mt-2 bg-white/60 rounded-lg p-2 text-xs">
                                    💡 <strong>方位口诀</strong>：以大树为参照，小鸟在上面，小花在下面，蝴蝶在前面，蜗牛在后面。记住参照物，方位不会乱！
                                </div>
                            </div>
                            
                            {gameWin && (
                                <div className="mt-4 bg-gradient-to-r from-green-200 to-teal-200 text-green-800 p-4 rounded-2xl text-center text-xl font-bold animate-pulse flex items-center justify-center gap-3 shadow-lg">
                                    🏆 恭喜你完成所有配对！🏆 <span className="text-3xl">🎓🗺️</span>
                                </div>
                            )}
                        </div>
                        <div className="mt-3 text-center text-xs text-purple-500">
                            💡 移动端小技巧：长按卡片并轻轻拖拽到目标区上方，松手即可。多练习，分清上下前后！
                        </div>
                    </div>
                </div>
                {/* 底部装饰 */}
                <div className="text-center mt-8 text-purple-800 text-sm bg-white/30 rounded-full py-2 px-4 w-fit mx-auto backdrop-blur-sm">
                    🌈 上下前后分得清，位置描述我能行！拖拽配对，成为方位小侦探！ 🌟
                </div>
            </div>
        );
    };
    
    // 渲染到根节点
    ReactDOM.createRoot(document.getElementById("root")).render(
        <React.StrictMode>
            <PositionGame />
        </React.StrictMode>
    );
</script>
</body>
</html>
