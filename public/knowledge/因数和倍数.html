<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>🌊 因数和倍数 · 数学游乐园</title>
  <!-- Tailwind + React CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .drag-card {
      transition: all 0.1s ease;
    }
    .drag-card:active {
      opacity: 0.6;
      cursor: grabbing;
    }
    .drop-zone {
      transition: all 0.2s ease;
    }
    .drop-zone.drag-over {
      background-color: #b8e1ff;
      border-color: #0284c7;
      transform: scale(1.02);
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .celebration {
      animation: bounce 0.5s ease-in-out;
    }
    .wave-bg {
      background: linear-gradient(145deg, #e0f7fa 0%, #b3e5fc 100%);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#E6F7FF] to-[#B8E1FF] min-h-screen flex items-center justify-center p-4 font-sans">

<div id="root" class="w-full max-w-6xl mx-auto"></div>

<script type="text/babel">
  // ---------- 知识点卡片组件（因数和倍数）----------
  const KnowledgeCard = () => {
    return (
      <div className="bg-white/80 backdrop-blur-sm rounded-3xl p-5 shadow-xl border border-cyan-200/80 h-full">
        <div className="flex items-center gap-2 border-b-2 border-cyan-300 pb-3 mb-4">
          <span className="text-3xl">🌊</span>
          <h2 className="text-2xl font-extrabold text-cyan-800">因数和倍数<br/><span className="text-sm font-normal">整数世界里的一对好朋友</span></h2>
        </div>
        <div className="space-y-4 text-cyan-800">
          <div className="bg-cyan-50/90 rounded-2xl p-4 border border-cyan-200">
            <p className="font-bold text-cyan-700 flex items-center gap-2">📖 什么是因数？</p>
            <p className="text-sm mt-1">如果 <span className="font-bold">a × b = c</span> (a、b、c都是非零自然数)，那么a和b就是c的<span className="font-bold text-cyan-700">因数</span>，c是a和b的<span className="font-bold text-cyan-700">倍数</span>。<br/>
            例如：3 × 4 = 12 → 3和4是12的因数；12是3和4的倍数。</p>
            <div className="mt-2 text-xs bg-white/60 p-2 rounded-lg text-center">
              <span className="font-mono">12 的因数有：1, 2, 3, 4, 6, 12</span>
            </div>
          </div>
          <div className="bg-cyan-50/90 rounded-2xl p-4 border border-cyan-200">
            <p className="font-bold text-cyan-700">🧩 倍数小知识：</p>
            <ul className="list-disc list-inside space-y-1 mt-1 text-sm">
              <li>一个数的倍数有<span className="font-bold">无限个</span>，最小的倍数是它本身。</li>
              <li>一个数的因数个数是<span className="font-bold">有限</span>的，最小的因数是1，最大的因数是它本身。</li>
              <li>因数和倍数必须成对出现，不能单独说谁是因数/倍数。</li>
            </ul>
          </div>
          <div className="bg-cyan-50/90 rounded-2xl p-4 border border-cyan-200">
            <p className="font-bold text-cyan-700">🎯 趣味口诀：</p>
            <p className="text-sm italic text-center">乘法算式找朋友，积是倍数乘数因；<br/>因数有限倍无穷，成对出现记心中。</p>
            <div className="flex flex-wrap gap-2 mt-2 justify-center">
              <span className="bg-cyan-200 px-2 py-1 rounded-full text-xs">18的因数：1,2,3,6,9,18</span>
              <span className="bg-cyan-200 px-2 py-1 rounded-full text-xs">8的倍数：8,16,24,...</span>
            </div>
          </div>
        </div>
        <div className="mt-4 text-sm text-center italic text-cyan-700 bg-cyan-100/70 p-2 rounded-xl">
          🎮 右边游戏：把数字小鱼拖拽到对应的“因数渔网”里！
        </div>
      </div>
    );
  };

  // ---------- 工具函数：获取一个数的所有因数（从小到大）----------
  const getFactors = (num) => {
    let factors = [];
    for (let i = 1; i <= num; i++) {
      if (num % i === 0) factors.push(i);
    }
    return factors;
  };

  // 生成随机目标数（12~60，因数个数在3~6之间比较适合游戏）
  const generateTargetNumber = () => {
    let candidates = [];
    for (let n = 12; n <= 60; n++) {
      const factors = getFactors(n);
      if (factors.length >= 3 && factors.length <= 7) {
        candidates.push(n);
      }
    }
    if (candidates.length === 0) return 24; // fallback
    const randomIndex = Math.floor(Math.random() * candidates.length);
    return candidates[randomIndex];
  };

  // 生成干扰项（非因数的数字，且范围2~60，不与因数重复，且不是目标数的因数）
  const generateDistractors = (target, existingFactors, count = 3) => {
    let distractors = [];
    let maxAttempts = 50;
    while (distractors.length < count && maxAttempts-- > 0) {
      let candidate = Math.floor(Math.random() * 45) + 2; // 2~46
      if (candidate === target) continue;
      if (!existingFactors.includes(candidate) && !distractors.includes(candidate) && candidate !== 1) {
        distractors.push(candidate);
      }
    }
    // 如果还不够，补充一些固定数字
    const fallbacks = [10, 14, 22, 26, 34, 38];
    for (let fb of fallbacks) {
      if (distractors.length < count && !existingFactors.includes(fb) && !distractors.includes(fb) && fb !== target) {
        distractors.push(fb);
      }
    }
    return distractors.slice(0, count);
  };

  // 打乱数组
  const shuffleArray = (arr) => {
    const newArr = [...arr];
    for (let i = newArr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
    }
    return newArr;
  };

  // ---------- 因数捕捞游戏组件 (拖拽配对) ----------
  const FactorsFishingGame = ({ resetKey, onNewGame }) => {
    const [targetNumber, setTargetNumber] = React.useState(24);
    const [correctFactors, setCorrectFactors] = React.useState([]);      // 正确因数列表
    const [fishCards, setFishCards] = React.useState([]);                // { value, isFactor, id }
    const [collectedFactors, setCollectedFactors] = React.useState(new Set()); // 已收集的因数
    const [errorMsg, setErrorMsg] = React.useState('');
    const [isVictory, setIsVictory] = React.useState(false);
    const [score, setScore] = React.useState(0);  // 配对成功计数
    
    // 初始化/刷新题目
    const initGame = (newTarget = null) => {
      const target = newTarget !== undefined ? newTarget : generateTargetNumber();
      const factors = getFactors(target);
      setTargetNumber(target);
      setCorrectFactors(factors);
      
      // 生成干扰项（3~4个）
      const distractors = generateDistractors(target, factors, 4);
      // 构建卡片数据：因数和干扰项混合，并打乱
      let cards = [];
      factors.forEach((fact, idx) => {
        cards.push({ value: fact, isFactor: true, id: `fact-${target}-${fact}-${idx}` });
      });
      distractors.forEach((dist, idx) => {
        cards.push({ value: dist, isFactor: false, id: `dist-${target}-${dist}-${idx}` });
      });
      cards = shuffleArray(cards);
      setFishCards(cards);
      setCollectedFactors(new Set());
      setIsVictory(false);
      setErrorMsg('');
      setScore(0);
    };
    
    React.useEffect(() => {
      initGame();
    }, [resetKey]);
    
    // 检查胜利 (当收集的因数数量等于正确因数个数)
    React.useEffect(() => {
      if (correctFactors.length > 0 && collectedFactors.size === correctFactors.length && !isVictory) {
        setIsVictory(true);
      }
    }, [collectedFactors, correctFactors, isVictory]);
    
    // 处理拖拽开始
    const onDragStart = (e, card) => {
      // 如果卡片已经被收集（不在fishCards里），不应该拖拽，但实际上被收集的卡片会从列表中移除，所以不需要额外判断
      if (collectedFactors.has(card.value) && card.isFactor) {
        e.preventDefault();
        return false;
      }
      e.dataTransfer.setData('text/plain', JSON.stringify({ value: card.value, isFactor: card.isFactor, id: card.id }));
      e.dataTransfer.effectAllowed = 'copy';
      e.target.style.opacity = '0.6';
    };
    
    const onDragEnd = (e) => {
      e.target.style.opacity = '';
    };
    
    const onDragOver = (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
      e.currentTarget.classList.add('drag-over');
    };
    
    const onDragLeave = (e) => {
      e.currentTarget.classList.remove('drag-over');
    };
    
    // 放置区域处理 (渔网)
    const onDrop = (e) => {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const rawData = e.dataTransfer.getData('text/plain');
      if (!rawData) return;
      const cardData = JSON.parse(rawData);
      const { value, isFactor, id } = cardData;
      
      // 如果已经胜利，禁止拖拽
      if (isVictory) {
        setErrorMsg('🎉 已经完成啦！点击“新数字”继续挑战吧！');
        setTimeout(() => setErrorMsg(''), 1500);
        return;
      }
      
      // 检查这个卡片是否还在当前的fishCards中（防止重复拖拽同一个已收集的卡片）
      const stillExists = fishCards.some(card => card.id === id);
      if (!stillExists) {
        setErrorMsg('🐟 这条小鱼已经被捞走啦！');
        setTimeout(() => setErrorMsg(''), 1200);
        return;
      }
      
      // 判断是否是因数
      if (isFactor) {
        // 正确因数：检查是否已经收集过
        if (collectedFactors.has(value)) {
          setErrorMsg('⏳ 这个因数你已经捕捞过了！再试试别的～');
          setTimeout(() => setErrorMsg(''), 1200);
          return;
        }
        // 配对成功
        setCollectedFactors(prev => {
          const newSet = new Set(prev);
          newSet.add(value);
          return newSet;
        });
        setScore(prev => prev + 1);
        // 从卡片列表中移除这张卡片
        setFishCards(prevCards => prevCards.filter(card => card.id !== id));
        setErrorMsg('');
      } else {
        // 错误干扰项
        setErrorMsg(`❌ 哎呀！ ${value} 不是 ${targetNumber} 的因数哟！因数要能整除目标数。再试试看～`);
        setTimeout(() => setErrorMsg(''), 1600);
      }
    };
    
    // 重置当前题目（同数字洗牌）
    const resetCurrent = () => {
      // 重新洗牌（保留目标数字不变，重置收集状态）
      const factors = correctFactors;
      const distractors = generateDistractors(targetNumber, factors, 4);
      let cards = [];
      factors.forEach((fact, idx) => {
        cards.push({ value: fact, isFactor: true, id: `fact-${targetNumber}-${fact}-${Date.now()}-${idx}` });
      });
      distractors.forEach((dist, idx) => {
        cards.push({ value: dist, isFactor: false, id: `dist-${targetNumber}-${dist}-${Date.now()}-${idx}` });
      });
      cards = shuffleArray(cards);
      setFishCards(cards);
      setCollectedFactors(new Set());
      setIsVictory(false);
      setErrorMsg('');
      setScore(0);
    };
    
    // 换新数字
    const nextNumber = () => {
      const newTarget = generateTargetNumber();
      const factors = getFactors(newTarget);
      const distractors = generateDistractors(newTarget, factors, 4);
      let cards = [];
      factors.forEach((fact, idx) => {
        cards.push({ value: fact, isFactor: true, id: `fact-${newTarget}-${fact}-${Date.now()}-${idx}` });
      });
      distractors.forEach((dist, idx) => {
        cards.push({ value: dist, isFactor: false, id: `dist-${newTarget}-${dist}-${Date.now()}-${idx}` });
      });
      cards = shuffleArray(cards);
      setTargetNumber(newTarget);
      setCorrectFactors(factors);
      setFishCards(cards);
      setCollectedFactors(new Set());
      setIsVictory(false);
      setErrorMsg('');
      setScore(0);
      if (onNewGame) onNewGame();
    };
    
    // 胜利弹窗
    const VictoryMessage = () => (
      <div className="text-center bg-gradient-to-r from-cyan-400 to-blue-500 rounded-2xl p-3 mt-2 animate-bounce shadow-lg">
        <div className="text-2xl font-bold text-white">🏆 渔获满仓！ 🏆</div>
        <div className="text-sm text-white font-semibold">太厉害了！你成功找到了 {targetNumber} 的所有因数！点击“新数字”继续探险～</div>
      </div>
    );
    
    // 进度条
    const progressPercent = correctFactors.length > 0 ? (collectedFactors.size / correctFactors.length) * 100 : 0;
    
    return (
      <div className="flex flex-col gap-5">
        {/* 得分与进度区域 */}
        <div className="flex justify-between items-center bg-white/70 rounded-2xl px-5 py-2 shadow-sm border border-cyan-200">
          <div className="flex items-center gap-2">
            <span className="text-2xl">🐟</span>
            <span className="font-bold text-cyan-800">因数捕捞</span>
            <span className="text-lg font-black text-cyan-700">{collectedFactors.size} / {correctFactors.length}</span>
          </div>
          <div className="w-32 bg-gray-200 rounded-full h-2.5">
            <div className="bg-cyan-600 h-2.5 rounded-full transition-all duration-300" style={{ width: `${progressPercent}%` }}></div>
          </div>
          <div className="text-xs bg-cyan-200 px-2 py-1 rounded-full text-cyan-800">🎣 拖拽小鱼到渔网</div>
        </div>
        
        {/* 目标数字展示区 */}
        <div className="wave-bg rounded-2xl p-4 text-center shadow-md border border-cyan-300">
          <div className="text-sm font-semibold text-cyan-700">🎯 今天的幸运数字</div>
          <div className="text-7xl font-black text-cyan-900 my-2">{targetNumber}</div>
          <div className="text-xs text-cyan-700 bg-white/50 inline-block px-3 py-1 rounded-full">
            它的因数有 {correctFactors.join('、')} (共{correctFactors.length}个)
          </div>
        </div>
        
        {/* 渔网放置区 (拖拽目标) */}
        <div
          className="drop-zone bg-gradient-to-br from-sky-100 to-cyan-100 rounded-2xl p-4 text-center border-4 border-dashed border-cyan-400 transition-all min-h-[130px]"
          onDragOver={onDragOver}
          onDragLeave={onDragLeave}
          onDrop={onDrop}
        >
          <div className="flex justify-center items-center gap-2 mb-2">
            <span className="text-2xl">🕸️</span>
            <span className="font-bold text-cyan-800">因数渔网</span>
            <span className="text-2xl">🕸️</span>
          </div>
          <div className="text-sm text-cyan-700">把属于 {targetNumber} 的因数小鱼拖拽到这里！</div>
          {collectedFactors.size > 0 && (
            <div className="mt-2 flex flex-wrap justify-center gap-2">
              {Array.from(collectedFactors).sort((a,b)=>a-b).map(f => (
                <span key={f} className="bg-green-300 text-green-900 px-2 py-1 rounded-full text-sm font-mono">✓ {f}</span>
              ))}
            </div>
          )}
        </div>
        
        {/* 小鱼卡片区域（可拖拽） */}
        <div>
          <div className="text-center text-sm font-semibold text-cyan-700 bg-white/50 rounded-full py-1 mb-3">
            🐠 下面这些小鱼，把“因数小鱼”拖拽到渔网里！
          </div>
          <div className="flex flex-wrap justify-center gap-3">
            {fishCards.map(card => {
              const isCollected = collectedFactors.has(card.value) && card.isFactor;
              if (isCollected) return null; // 已收集的不显示
              return (
                <div
                  key={card.id}
                  draggable={!isVictory}
                  onDragStart={(e) => onDragStart(e, card)}
                  onDragEnd={onDragEnd}
                  className={`drag-card w-20 h-20 rounded-full shadow-lg flex flex-col items-center justify-center cursor-grab active:cursor-grabbing transition-all bg-gradient-to-br from-cyan-200 to-blue-200 border-2 border-cyan-400 hover:scale-105 ${
                    isVictory ? 'opacity-50' : ''
                  }`}
                >
                  <span className="text-3xl font-black text-cyan-900">{card.value}</span>
                  <span className="text-[10px] text-cyan-700">🐟</span>
                </div>
              );
            })}
          </div>
          {fishCards.length === 0 && !isVictory && (
            <div className="text-center text-cyan-700 mt-4">✨ 所有因数都捞完了！点击下方按钮挑战新数字 ✨</div>
          )}
        </div>
        
        {/* 错误提示 */}
        {errorMsg && (
          <div className="text-center bg-amber-100 text-amber-800 font-bold p-2 rounded-xl border-l-4 border-amber-500 animate-pulse">
            {errorMsg}
          </div>
        )}
        
        {/* 胜利信息 */}
        {isVictory && <VictoryMessage />}
        
        {/* 操作按钮组 */}
        <div className="flex gap-3 mt-2">
          <button 
            onClick={resetCurrent}
            className="flex-1 bg-amber-400 hover:bg-amber-500 text-white font-bold py-2.5 rounded-full transition shadow-md text-base active:scale-[0.98]"
          >
            🔄 重置（洗牌）
          </button>
          <button 
            onClick={nextNumber}
            className="flex-1 bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-2.5 rounded-full transition shadow-md text-base active:scale-[0.98]"
          >
            🎲 新数字挑战
          </button>
        </div>
        
        <div className="text-xs text-center text-cyan-800 bg-white/60 rounded-full py-1.5 px-3">
          💡 小贴士：因数就是能整除目标数的数。拖拽正确的小鱼到渔网，全部捞起来就胜利啦！
        </div>
      </div>
    );
  };
  
  // ---------- 主应用 App (海水蓝主题) ----------
  const App = () => {
    const [gameResetKey, setGameResetKey] = React.useState(0);
    
    const handleNewGame = () => {
      setGameResetKey(prev => prev + 1);
    };
    
    return (
      <div className="flex flex-col lg:flex-row gap-6">
        {/* 左侧知识点卡片 */}
        <div className="lg:w-5/12">
          <KnowledgeCard />
        </div>
        
        {/* 右侧互动游戏区 */}
        <div className="lg:w-7/12 flex flex-col gap-5">
          <div className="bg-white/80 backdrop-blur-sm rounded-3xl p-5 shadow-xl border border-cyan-200/80">
            <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
              <h3 className="text-xl font-bold text-cyan-800 flex items-center gap-2">
                <span className="text-2xl">🎣</span>
                因数捕捞船 · 拖拽配对小游戏
              </h3>
              <span className="text-sm bg-cyan-100 px-3 py-1 rounded-full text-cyan-700">✨ 拖拽小鱼到渔网 ✨</span>
            </div>
            <FactorsFishingGame resetKey={gameResetKey} onNewGame={handleNewGame} />
          </div>
          <div className="text-xs text-center text-cyan-800 bg-white/60 rounded-full py-2 px-3 flex justify-center gap-3 backdrop-blur-sm">
            <span>🐟 玩法：把右边的数字小鱼拖拽到“因数渔网”中，只有目标数的因数才能被成功捕捞！</span>
            <span>🏆 集齐所有因数，获得小小数学家勋章！</span>
          </div>
        </div>
      </div>
    );
  };
  
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
