<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>➗ 一个数除以分数 · 淡蓝教室</title>
  <!-- Tailwind + React CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .drag-card {
      transition: all 0.1s ease;
      cursor: grab;
    }
    .drag-card:active {
      cursor: grabbing;
    }
    .drag-card.disabled-card {
      cursor: default;
      opacity: 0.6;
      filter: grayscale(0.1);
    }
    .drop-slot {
      transition: all 0.2s ease;
      background-color: rgba(135, 206, 235, 0.2);
      border: 2px dashed #5aa9dd;
    }
    .drop-slot.drag-over {
      background-color: #7fb4d0;
      border-color: #c2e0ff;
      transform: scale(1.02);
    }
    .drop-slot.filled-slot {
      background-color: #6ba5c9;
      border: 2px solid #b9e2ff;
      cursor: default;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .celebration {
      animation: bounce 0.5s ease-in-out;
    }
    .soft-blue-bg {
      background-image: radial-gradient(circle at 20% 40%, rgba(100, 180, 230, 0.12) 2.2%, transparent 2.5%);
      background-size: 48px 48px;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#C7E9FB] to-[#A8D0E6] min-h-screen flex items-center justify-center p-4 font-sans soft-blue-bg">

<div id="root" class="w-full max-w-6xl mx-auto"></div>

<script type="text/babel">
  // ---------- 数学辅助函数：最大公约数 & 约分 ----------
  const computeGCD = (a, b) => {
    a = Math.abs(a);
    b = Math.abs(b);
    while (b !== 0) {
      let temp = b;
      b = a % b;
      a = temp;
    }
    return a;
  };

  const reduceFraction = (numerator, denominator) => {
    if (denominator === 0) return "0";
    if (numerator === 0) return "0";
    const gcd = computeGCD(numerator, denominator);
    const num = numerator / gcd;
    const den = denominator / gcd;
    if (den === 1) return `${num}`;
    return `${num}/${den}`;
  };

  // 解析分数或整数字符串为 { numerator, denominator }
  const parseToFraction = (valueStr) => {
    if (valueStr.includes('/')) {
      const [n, d] = valueStr.split('/').map(Number);
      return { numerator: n, denominator: d };
    } else {
      const intVal = parseInt(valueStr, 10);
      return { numerator: intVal, denominator: 1 };
    }
  };

  // 核心计算: 一个数 ÷ 分数 = 被除数 × 分数的倒数
  // dividendStr: 整数 或 "a/b" , divisorStr: 必须是 "c/d" (分数)
  const divideNumberByFraction = (dividendStr, divisorStr) => {
    const dividend = parseToFraction(dividendStr);
    const divisor = parseToFraction(divisorStr);
    if (divisor.numerator === 0) return null; // 除数不能为0
    
    // 被除数 × (分母/分子)
    const newNumerator = dividend.numerator * divisor.denominator;
    const newDenominator = dividend.denominator * divisor.numerator;
    if (newDenominator === 0) return null;
    return reduceFraction(newNumerator, newDenominator);
  };

  // 生成随机整数 (min, max 包含)
  const randomInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;
  
  // 生成随机分数 (分子分母范围可控，适合被除数或除数)
  const generateRandomFraction = (maxNum = 8, maxDen = 8, minNum = 1, minDen = 2) => {
    let numerator = randomInt(minNum, maxNum);
    let denominator = randomInt(minDen, maxDen);
    // 避免过于简单 1/1 之类的假分数？保留多样性，但确保不是0分母
    if (denominator === 0) denominator = 2;
    // 偶尔生成假分数但分子不太夸张
    if (Math.random() > 0.7 && numerator < denominator) {
      numerator = denominator + randomInt(1, 3);
    }
    return `${numerator}/${denominator}`;
  };

  // 生成随机除数 (一定是分数，分母2~6，分子1~5，且不能为0)
  const generateRandomDivisor = () => {
    const numerator = randomInt(1, 5);
    let denominator = randomInt(2, 7);
    if (denominator === 0) denominator = 2;
    return `${numerator}/${denominator}`;
  };

  // 生成随机被除数 (整数或分数, 整数1~12，分数范围适中)
  const generateRandomDividend = () => {
    const type = Math.random() > 0.5 ? 'integer' : 'fraction';
    if (type === 'integer') {
      return `${randomInt(2, 12)}`;   // 整数 2~12
    } else {
      // 分数被除数: 分子2~9，分母2~8，可带假分数
      return generateRandomFraction(9, 8, 1, 2);
    }
  };

  // 生成挑战集 (4个 一个数 ÷ 分数)
  const generateChallengeSet = (count = 4) => {
    let challenges = [];
    let usedPairs = new Set();
    for (let i = 0; i < count; i++) {
      let maxAttempts = 35;
      let dividend, divisor, result;
      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        dividend = generateRandomDividend();
        divisor = generateRandomDivisor();
        result = divideNumberByFraction(dividend, divisor);
        if (result === null) continue;
        // 约束结果简洁：整数部分不能过大，分数分子分母不超过45
        if (result.includes('/')) {
          const [rNum, rDen] = result.split('/').map(Number);
          if (rDen > 45 || rNum > 50) continue;
          if (rNum > 50) continue;
        } else {
          const intRes = parseInt(result, 10);
          if (intRes > 25) continue;
        }
        const pairKey = `${dividend}_÷_${divisor}`;
        if (!usedPairs.has(pairKey)) {
          usedPairs.add(pairKey);
          break;
        }
      }
      if (!result) {
        // 保底经典题目: 4 ÷ 2/3 = 6
        dividend = "4";
        divisor = "2/3";
        result = "6";
      }
      challenges.push({
        id: `ch-${Date.now()}-${i}-${Math.random()}`,
        dividend: dividend,
        divisor: divisor,
        result: result,
        matched: false,
        matchedValue: null
      });
    }
    return challenges;
  };

  // 比较两个最简分数/整数是否相等
  const areEqual = (val1, val2) => {
    if (val1 === val2) return true;
    const toFraction = (v) => {
      if (v.includes('/')) {
        const [n, d] = v.split('/').map(Number);
        return { n, d };
      } else {
        const num = parseInt(v, 10);
        return { n: num, d: 1 };
      }
    };
    const f1 = toFraction(val1);
    const f2 = toFraction(val2);
    return f1.n * f2.d === f2.n * f1.d;
  };

  // 生成答案卡片池 (正确结果 + 智能干扰项)
  const generateAnswerCards = (challenges) => {
    let correctSet = new Set();
    challenges.forEach(ch => {
      correctSet.add(ch.result);
    });
    let correctArray = Array.from(correctSet);
    
    // 干扰池构建：结合常见分数干扰 + 基于正确结果的变形
    let distractorPool = [];
    let usedDistractors = new Set();
    
    // 基础常见干扰（最简分数和整数）
    const commonDistractors = [
      "1/2", "1/3", "2/3", "3/4", "1/4", "1", "2", "3", "4", "5",
      "3/2", "4/3", "5/2", "5/3", "7/4", "5/6", "7/6", "8/3", "9/4", "2/5", "3/5"
    ];
    
    // 针对每个正确结果添加一些变异干扰 (加减合理偏移)
    correctArray.forEach(correct => {
      const frac = parseToFraction(correct);
      // 偏移产生近似干扰
      let variants = [];
      // 加/减 1/3 , 1/2 , 整数偏移1
      if (frac.denominator !== 0) {
        const numVal = frac.numerator / frac.denominator;
        const offsets = [0.3, 0.5, 0.75, 1, 1.25, -0.25, -0.5, -0.75];
        for (let off of offsets) {
          let newVal = numVal + off;
          if (newVal > 0.1 && newVal < 15) {
            // 转换为分数约简
            let candidateNum = Math.round(newVal * 8);
            let candidateDen = 8;
            let simplified = reduceFraction(candidateNum, candidateDen);
            if (!correctSet.has(simplified) && simplified !== correct && !variants.includes(simplified) && !simplified.includes('NaN')) {
              variants.push(simplified);
            }
          }
        }
      }
      distractorPool.push(...variants.slice(0, 2));
    });
    
    // 添加常见干扰，去重
    for (let ex of commonDistractors) {
      if (!correctSet.has(ex) && !usedDistractors.has(ex) && distractorPool.length < correctArray.length + 3) {
        distractorPool.push(ex);
        usedDistractors.add(ex);
      }
    }
    
    // 额外随机生成一些分数干扰
    while (distractorPool.length < correctArray.length + 2) {
      const fakeFrac = generateRandomFraction(9, 7, 1, 2);
      let candidate = reduceFraction(parseToFraction(fakeFrac).numerator, parseToFraction(fakeFrac).denominator);
      if (!correctSet.has(candidate) && !usedDistractors.has(candidate) && !distractorPool.includes(candidate)) {
        distractorPool.push(candidate);
        usedDistractors.add(candidate);
      }
      if (distractorPool.length > correctArray.length + 4) break;
    }
    
    let allCardValues = [...correctArray, ...distractorPool];
    // 彻底去重
    allCardValues = [...new Set(allCardValues)];
    // 洗牌
    for (let i = allCardValues.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [allCardValues[i], allCardValues[j]] = [allCardValues[j], allCardValues[i]];
    }
    return allCardValues.map((val, idx) => ({
      id: `card-${Date.now()}-${idx}-${Math.random()}`,
      value: val,
      used: false
    }));
  };

  // ---------- 左侧知识点卡片 (一个数除以分数) ----------
  const KnowledgeCard = () => {
    return (
      <div className="bg-[#E3F2FD]/90 backdrop-blur-sm rounded-3xl p-5 shadow-xl border border-[#7CB9E8] h-full text-[#1E3A5F]">
        <div className="flex items-center gap-2 border-b-2 border-[#5BA0D9] pb-3 mb-4">
          <span className="text-4xl">➗</span>
          <h2 className="text-2xl font-extrabold tracking-wide">一个数除以分数<br/><span className="text-sm font-normal text-[#2E6A9E]">淡蓝法则 · 乘以它的倒数</span></h2>
        </div>
        <div className="space-y-4">
          <div className="bg-[#D9EAFB]/90 rounded-2xl p-4 border border-[#7CB9E8]">
            <p className="font-bold text-[#1A4972] flex items-center gap-2">✨ 核心法则</p>
            <p className="text-sm mt-1">一个数除以分数，等于这个数乘分数的倒数。<br/>整数或分数都适用！</p>
            <div className="mt-2 text-xs bg-[#F0F7FF] p-2 rounded-lg shadow-sm">📖 例：3 ÷ 1/2 = 3 × 2 = 6  →  2/3 ÷ 3/4 = 2/3 × 4/3 = 8/9</div>
          </div>
          <div className="bg-[#D9EAFB]/90 rounded-2xl p-4 border border-[#7CB9E8]">
            <p className="font-bold text-[#1A4972]">⚡ 通用步骤</p>
            <p className="text-sm mt-1">1️⃣ 找出除数(分数)的倒数，换成乘法。<br/>2️⃣ 分子乘分子，分母乘分母，最后约成最简分数。</p>
            <div className="mt-2 text-xs bg-[#F0F7FF] p-2 rounded-lg">💡 巧记：除以一个分数，变成乘它的倒数，再约分。</div>
          </div>
          <div className="bg-[#CBE4FE]/80 rounded-2xl p-3 text-center text-sm border border-[#96C8F0]">
            🎯 挑战规则：计算每个算式的结果（最简分数/整数），将右侧结果卡片拖拽到对应的蓝色槽位中。
          </div>
        </div>
      </div>
    );
  };

  // ---------- 主游戏组件：一个数除以分数 ----------
  const DivisionGame = ({ resetKey, onNewGame }) => {
    const [challenges, setChallenges] = React.useState(() => generateChallengeSet(4));
    const [answerCards, setAnswerCards] = React.useState(() => []);
    const [errorMsg, setErrorMsg] = React.useState('');
    const [isVictory, setIsVictory] = React.useState(false);
    
    const initCards = (currentChallenges) => generateAnswerCards(currentChallenges);
    
    React.useEffect(() => {
      setAnswerCards(initCards(challenges));
    }, [challenges]);
    
    const checkVictory = (currentChallenges) => {
      const allFilled = currentChallenges.every(ch => ch.matched === true);
      if (allFilled && !isVictory) setIsVictory(true);
      else if (!allFilled && isVictory) setIsVictory(false);
    };
    
    const updateChallengesAndCheck = (newChallenges) => {
      setChallenges(newChallenges);
      checkVictory(newChallenges);
    };
    
    const resetGame = () => {
      const newChallenges = generateChallengeSet(4);
      setChallenges(newChallenges);
      setAnswerCards(initCards(newChallenges));
      setIsVictory(false);
      setErrorMsg('');
    };
    
    React.useEffect(() => {
      resetGame();
    }, [resetKey]);
    
    // 拖拽卡片
    const onDragStart = (e, card) => {
      if (card.used) {
        e.preventDefault();
        return false;
      }
      e.dataTransfer.setData('text/plain', JSON.stringify({ cardId: card.id, cardValue: card.value }));
      e.dataTransfer.effectAllowed = 'copy';
      if (e.target) e.target.style.opacity = '0.6';
    };
    const onDragEnd = (e) => {
      if (e.target) e.target.style.opacity = '';
    };
    
    const onDragOverSlot = (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
      e.currentTarget.classList.add('drag-over');
    };
    const onDragLeaveSlot = (e) => {
      e.currentTarget.classList.remove('drag-over');
    };
    
    // 放置到算式槽位
    const onDropToSlot = (e, challengeId) => {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const rawData = e.dataTransfer.getData('text/plain');
      if (!rawData) return;
      let draggedCardId, draggedValue;
      try {
        const parsed = JSON.parse(rawData);
        draggedCardId = parsed.cardId;
        draggedValue = parsed.cardValue;
      } catch (err) {
        return;
      }
      
      const targetCard = answerCards.find(c => c.id === draggedCardId);
      if (!targetCard || targetCard.used) {
        setErrorMsg('📘 这张卡片已经用过了！不能重复投放。');
        setTimeout(() => setErrorMsg(''), 1300);
        return;
      }
      
      const challengeIndex = challenges.findIndex(ch => ch.id === challengeId);
      if (challengeIndex === -1) return;
      const targetChallenge = challenges[challengeIndex];
      if (targetChallenge.matched) {
        setErrorMsg('💧 这个算式槽位已经匹配完成了！');
        setTimeout(() => setErrorMsg(''), 1300);
        return;
      }
      
      const isMatch = areEqual(draggedValue, targetChallenge.result);
      if (!isMatch) {
        const expected = targetChallenge.result;
        setErrorMsg(`❌ 结果不正确！ ${formatExpression(targetChallenge.dividend, targetChallenge.divisor)} 的结果应该是 ${expected}，而不是 ${draggedValue}。再试试倒数法则～`);
        setTimeout(() => setErrorMsg(''), 2000);
        return;
      }
      
      // 匹配正确
      setAnswerCards(prevCards =>
        prevCards.map(card =>
          card.id === draggedCardId ? { ...card, used: true } : card
        )
      );
      const newChallenges = [...challenges];
      newChallenges[challengeIndex].matched = true;
      newChallenges[challengeIndex].matchedValue = draggedValue;
      updateChallengesAndCheck(newChallenges);
      setErrorMsg('');
    };
    
    // 辅助显示算式格式
    const formatExpression = (dividend, divisor) => {
      const formatNum = (val) => {
        if (val.includes('/')) return `(${val})`;
        return val;
      };
      return `${formatNum(dividend)} ÷ ${divisor}`;
    };
    
    // 重置当前进度（清空匹配，卡片复位并洗牌）
    const resetProgress = () => {
      const resetChallenges = challenges.map(ch => ({
        ...ch,
        matched: false,
        matchedValue: null
      }));
      let resetCards = answerCards.map(card => ({ ...card, used: false }));
      // 洗牌，让卡片重新随机排序
      for (let i = resetCards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [resetCards[i], resetCards[j]] = [resetCards[j], resetCards[i]];
      }
      setChallenges(resetChallenges);
      setAnswerCards(resetCards);
      setIsVictory(false);
      setErrorMsg('');
    };
    
    const newGameFull = () => {
      resetGame();
      if (onNewGame) onNewGame();
    };
    
    const totalCount = challenges.length;
    const filledCount = challenges.filter(ch => ch.matched).length;
    const progressPercent = totalCount === 0 ? 0 : (filledCount / totalCount) * 100;
    
    const VictoryMessage = () => (
      <div className="text-center bg-gradient-to-r from-[#6DB3E0] to-[#5094C0] rounded-2xl p-3 mt-2 animate-bounce shadow-xl border border-[#C2E4FF]">
        <div className="text-2xl font-bold text-white">🎉 除法大师！全对 🎉</div>
        <div className="text-sm text-[#E6F7FF] font-semibold">所有“一个数÷分数”算式都已正确匹配！点击全新挑战继续进阶～</div>
      </div>
    );
    
    return (
      <div className="flex flex-col gap-5">
        {/* 进度条 */}
        <div className="flex justify-between items-center bg-[#D9ECFA]/80 backdrop-blur-sm rounded-2xl px-5 py-2 shadow-md border border-[#7CB9E8]">
          <div className="flex items-center gap-2">
            <span className="text-2xl">📐</span>
            <span className="font-bold text-[#1E4A76]">挑战进度</span>
            <span className="text-lg font-black text-[#2273B0]">{filledCount} / {totalCount}</span>
          </div>
          <div className="w-36 bg-[#B3D4F0] rounded-full h-2.5">
            <div className="bg-[#3C8FCB] h-2.5 rounded-full transition-all duration-300" style={{ width: `${progressPercent}%` }}></div>
          </div>
          <div className="text-xs bg-[#B8D9F5] px-2 py-1 rounded-full text-[#1A4D74] border border-[#7CB9E8]">🌊 拖拽卡片 放入槽位</div>
        </div>
        
        {/* 算式区域 */}
        <div className="bg-[#EAF5FF]/80 rounded-2xl p-4 backdrop-blur-sm border border-[#7CB9E8]">
          <div className="text-center text-sm font-semibold text-[#205F8E] mb-3">🧮 计算每个算式的结果，将右侧答案卡片拖拽到对应蓝色槽位</div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
            {challenges.map((challenge) => (
              <div key={challenge.id} className="bg-[#F3FAFF] rounded-xl p-4 border border-[#9CC9F0] shadow-sm hover:shadow-md transition">
                <div className="text-center mb-3">
                  <div className="text-xl font-black text-[#1D5781] bg-[#E3F2FD] inline-block px-4 py-1.5 rounded-full shadow-sm">
                    {challenge.dividend.includes('/') ? `(${challenge.dividend})` : challenge.dividend} ÷ {challenge.divisor}
                  </div>
                  <div className="text-xs text-[#3C86B0] mt-1">=  ?</div>
                </div>
                <div className="mt-2">
                  <div
                    className={`drop-slot rounded-xl p-3 text-center transition-all ${challenge.matched ? 'filled-slot' : ''}`}
                    onDragOver={onDragOverSlot}
                    onDragLeave={onDragLeaveSlot}
                    onDrop={(e) => onDropToSlot(e, challenge.id)}
                  >
                    <div className="text-xs font-semibold text-[#1F5782]">✨ 结果槽位 ✨</div>
                    {challenge.matched ? (
                      <div className="text-xl font-bold text-white mt-1">{challenge.matchedValue}</div>
                    ) : (
                      <div className="text-sm text-[#488DC2] mt-1 border-t border-dashed border-[#7CB9E8] pt-1">⬅️ 拖拽结果卡片至此</div>
                    )}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
        
        {/* 卡片池区域 */}
        <div className="bg-[#EAF5FF]/80 rounded-2xl p-4 border border-[#7CB9E8]">
          <div className="text-center text-sm font-semibold text-[#205F8E] mb-2">🎴 结果卡片库 (拖拽到上方算式槽位)</div>
          <div className="flex flex-wrap justify-center gap-3">
            {answerCards.map(card => (
              <div
                key={card.id}
                draggable={!card.used}
                onDragStart={(e) => onDragStart(e, card)}
                onDragEnd={onDragEnd}
                className={`drag-card w-24 h-24 rounded-xl shadow-md flex items-center justify-center text-lg font-bold transition-all ${
                  card.used 
                    ? 'bg-gray-400/60 cursor-default border-2 border-gray-300 text-gray-200' 
                    : 'bg-gradient-to-br from-[#8DC9F0] to-[#5DA9D9] cursor-grab active:cursor-grabbing hover:scale-105 border-2 border-[#C2E4FF] text-white'
                }`}
              >
                {card.used ? '✓ 已用' : card.value}
              </div>
            ))}
            {answerCards.length === 0 && <div className="text-[#2273B0]">加载卡片中...</div>}
          </div>
          <div className="text-[11px] text-center text-[#3E7EA6] mt-2">💡 每个卡片只能用一次，正确匹配每个算式的结果（结果已化为最简形式）</div>
        </div>
        
        {/* 错误提示 */}
        {errorMsg && (
          <div className="text-center bg-[#FEEBC8]/90 text-[#A45A1A] font-bold p-2.5 rounded-xl border-l-8 border-[#F6AD55] backdrop-blur-sm animate-pulse shadow">
            {errorMsg}
          </div>
        )}
        
        {/* 胜利凯旋 */}
        {isVictory && <VictoryMessage />}
        
        {/* 操作按钮组 */}
        <div className="flex gap-3 mt-1">
          <button 
            onClick={resetProgress}
            className="flex-1 bg-[#6DB3E0] hover:bg-[#559FCF] text-white font-bold py-2.5 rounded-full transition shadow-md text-base active:scale-[0.98]"
          >
            🔄 重置当前进度（清空槽位）
          </button>
          <button 
            onClick={newGameFull}
            className="flex-1 bg-[#4285B4] hover:bg-[#316A93] text-white font-bold py-2.5 rounded-full transition shadow-md text-base active:scale-[0.98]"
          >
            🧺 全新挑战（换一批算式）
          </button>
        </div>
        <div className="text-xs text-center text-[#26648B] bg-[#D9ECFA]/70 rounded-full py-1.5 px-3 backdrop-blur-sm">
          💡 计算技巧：一个数除以分数，等于这个数乘以分数的倒数。结果请化为最简分数或整数。
        </div>
      </div>
    );
  };
  
  // ---------- 主应用入口 ----------
  const App = () => {
    const [gameResetKey, setGameResetKey] = React.useState(0);
    const handleNewGame = () => {
      setGameResetKey(prev => prev + 1);
    };
    return (
      <div className="flex flex-col lg:flex-row gap-6">
        <div className="lg:w-5/12">
          <KnowledgeCard />
        </div>
        <div className="lg:w-7/12 flex flex-col gap-5">
          <div className="bg-[#F0F9FF]/80 backdrop-blur-md rounded-3xl p-5 shadow-2xl border border-[#7CB9E8]">
            <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
              <h3 className="text-xl font-bold text-[#1E4A76] flex items-center gap-2">
                <span className="text-3xl">➗</span>
                一个数除以分数 · 淡蓝工坊
              </h3>
              <span className="text-sm bg-[#B8D9F5] px-3 py-1 rounded-full text-[#1D5781] border border-[#7CB9E8]">🎯 拖拽计算结果</span>
            </div>
            <DivisionGame resetKey={gameResetKey} onNewGame={handleNewGame} />
          </div>
        </div>
      </div>
    );
  };
  
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
