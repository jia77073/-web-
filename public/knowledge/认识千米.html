<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>认识千米 · 远足小英雄 | 数学乐园</title>
  <!-- Tailwind + React CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    /* 全局字体放大6号（2.8rem），淡紫色主题背景 */
    body {
      font-size: 2.8rem;
      background: linear-gradient(135deg, #D9C2E6 0%, #CBAACB 100%);
      font-family: system-ui, 'Segoe UI', 'Comic Neue', 'Quicksand', sans-serif;
    }
    .drag-card {
      cursor: grab;
      transition: all 0.1s ease;
      user-select: none;
    }
    .drag-card:active {
      cursor: grabbing;
    }
    .drop-slot {
      transition: all 0.2s ease;
      border: 2px dashed #b87cd6;
      background-color: #faf5ff;
    }
    .drag-over {
      background-color: #f3e0ff;
      transform: scale(1.02);
      border: 2px solid #9b6bc0;
    }
    .matched-card {
      opacity: 0.6;
      filter: grayscale(0.2);
      background: #d4badc;
      text-decoration: line-through;
      cursor: default;
      pointer-events: none;
    }
    .slot-filled {
      background-color: #c7f0c2;
      border: 2px solid #2e7d32;
    }
    .btn-fun:active {
      transform: scale(0.96);
    }
    @keyframes bounceSoft {
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-5px); }
    }
    .celebration {
      animation: bounceSoft 0.5s ease;
    }
    @media (max-width: 768px) {
      body {
        font-size: 1.8rem;
      }
      .drag-card, .drop-slot {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body class="min-h-screen p-4 md:p-6">
<div id="root" class="w-full max-w-7xl mx-auto"></div>

<script type="text/babel">
  // ======================= 小学数学 · 认识千米 =======================
  // 知识点：千米（km）是比米更大的长度单位，1千米=1000米，常用于测量较长的路程。
  
  // ---------- 游戏数据：拖拽配对（路程描述 ↔ 千米数）----------
  const matchPairs = [
    { id: 1, description: "学校到公园的距离", length: "3千米", correctKm: 3 },
    { id: 2, description: "马拉松比赛全程", length: "42千米", correctKm: 42 },
    { id: 3, description: "飞机飞行高度", length: "10千米", correctKm: 10 },
    { id: 4, description: "高速公路限速（每小时）", length: "120千米", correctKm: 120 },
    { id: 5, description: "地铁两站之间的距离", length: "2千米", correctKm: 2 },
    { id: 6, description: "小明家到学校的距离", length: "1千米", correctKm: 1 }
  ];
  
  // 游戏组件：拖拽配对（将左边描述拖拽到右边正确的千米长度上）
  const MatchingGame = () => {
    // 左侧描述卡片（未配对）
    const [descCards, setDescCards] = React.useState(() => 
      matchPairs.map(pair => ({
        id: pair.id,
        text: pair.description,
        matchLength: pair.length,
        matched: false
      }))
    );
    
    // 右侧长度槽位（打乱顺序）
    const [lengthSlots, setLengthSlots] = React.useState(() => {
      let slots = matchPairs.map(pair => ({
        id: `slot-${pair.id}`,
        text: pair.length,
        matchLength: pair.length,
        matched: false
      }));
      // 打乱顺序
      for (let i = slots.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [slots[i], slots[j]] = [slots[j], slots[i]];
      }
      return slots;
    });
    
    const [gameWin, setGameWin] = React.useState(false);
    const [dragOverSlotId, setDragOverSlotId] = React.useState(null);
    const [feedbackMsg, setFeedbackMsg] = React.useState("");
    const [score, setScore] = React.useState(0);
    
    const checkVictory = (cards, slots) => {
      const allMatched = cards.every(c => c.matched) && slots.every(s => s.matched);
      if (allMatched && !gameWin) {
        setGameWin(true);
        setFeedbackMsg("🎉 完美！所有路程都找到了自己的千米长度！你已是千米小专家！ 🎉");
      }
    };
    
    // 拖拽左侧描述卡片
    const onDragStart = (e, cardId, matchLength) => {
      const card = descCards.find(c => c.id === cardId);
      if (card?.matched) {
        e.preventDefault();
        return false;
      }
      e.dataTransfer.setData("text/plain", JSON.stringify({ type: "desc", cardId, matchLength }));
      e.dataTransfer.effectAllowed = "copy";
      e.target.style.opacity = "0.6";
    };
    const onDragEnd = (e) => { if(e.target) e.target.style.opacity = ""; };
    
    const onDragOverSlot = (e, slotId) => {
      e.preventDefault();
      setDragOverSlotId(slotId);
      e.dataTransfer.dropEffect = "copy";
    };
    const onDragLeaveSlot = () => setDragOverSlotId(null);
    
    const onDropToSlot = (e, slotId) => {
      e.preventDefault();
      setDragOverSlotId(null);
      const rawData = e.dataTransfer.getData("text/plain");
      if (!rawData) return;
      let dragData;
      try { dragData = JSON.parse(rawData); } catch(err) { return; }
      if (dragData.type !== "desc") return;
      const { cardId, matchLength } = dragData;
      
      const targetSlot = lengthSlots.find(s => s.id === slotId);
      const sourceCard = descCards.find(c => c.id === cardId);
      if (!targetSlot || !sourceCard) return;
      if (sourceCard.matched || targetSlot.matched) {
        setFeedbackMsg("⏳ 这个路程或长度槽位已经配对过了！");
        setTimeout(() => setFeedbackMsg(""), 1300);
        return;
      }
      
      // 验证匹配
      if (matchLength === targetSlot.matchLength) {
        // 配对成功
        setDescCards(prev => prev.map(c => c.id === cardId ? { ...c, matched: true } : c));
        setLengthSlots(prev => prev.map(s => s.id === slotId ? { ...s, matched: true } : s));
        setScore(prev => prev + 1);
        setFeedbackMsg(`✅ 正确！${sourceCard.text} 大约是 ${targetSlot.text}，1千米=1000米。`);
        setTimeout(() => setFeedbackMsg(""), 1500);
        const newCards = descCards.map(c => c.id === cardId ? { ...c, matched: true } : c);
        const newSlots = lengthSlots.map(s => s.id === slotId ? { ...s, matched: true } : s);
        checkVictory(newCards, newSlots);
      } else {
        setFeedbackMsg(`❌ 配对错误！${sourceCard.text} 的长度应该是 ${matchLength}，而不是 ${targetSlot.text}。再想想千米和米的关系吧～`);
        setTimeout(() => setFeedbackMsg(""), 1800);
      }
    };
    
    const resetGame = () => {
      const newDesc = matchPairs.map(pair => ({
        id: pair.id,
        text: pair.description,
        matchLength: pair.length,
        matched: false
      }));
      let newSlots = matchPairs.map(pair => ({
        id: `slot-${pair.id}`,
        text: pair.length,
        matchLength: pair.length,
        matched: false
      }));
      for (let i = newSlots.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newSlots[i], newSlots[j]] = [newSlots[j], newSlots[i]];
      }
      setDescCards(newDesc);
      setLengthSlots(newSlots);
      setGameWin(false);
      setScore(0);
      setFeedbackMsg("✨ 新的一局！把左边的路程描述拖拽到右边正确的千米长度上吧～");
      setTimeout(() => setFeedbackMsg(""), 1500);
    };
    
    const allMatched = descCards.every(c => c.matched) && lengthSlots.every(s => s.matched);
    const totalPairs = matchPairs.length;
    
    return (
      <div className="bg-white/90 backdrop-blur-sm rounded-3xl p-5 shadow-xl border border-[#cbaacb] h-full flex flex-col">
        <div className="flex justify-between items-center flex-wrap gap-2 mb-3">
          <h3 className="text-2xl font-extrabold text-purple-800">🏃 千米配对 · 拖拽连连看</h3>
          <div className="flex gap-2">
            <span className="bg-emerald-200 px-3 py-1 rounded-full text-base font-bold">🏆 配对 {score}/{totalPairs}</span>
            <button onClick={resetGame} className="bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold py-1.5 px-4 rounded-full text-sm shadow btn-fun">🔄 新的一局</button>
          </div>
        </div>
        <p className="text-sm text-purple-700 bg-purple-50 rounded-xl p-2 mb-3 text-center">
          🧸 玩法：将左边的<strong>路程描述</strong>拖拽到右边<strong>正确的千米长度</strong>上，配对正确会消除！全部配对成功即可获胜。
        </p>
        
        <div className="flex flex-col md:flex-row gap-5 flex-1">
          {/* 左侧描述卡片区 */}
          <div className="flex-1 bg-purple-50/60 rounded-2xl p-3">
            <div className="font-bold text-purple-800 text-center mb-2">📦 路程卡片 (拖拽我)</div>
            <div className="space-y-3 max-h-[420px] overflow-y-auto pr-1">
              {descCards.map(card => (
                <div 
                  key={card.id}
                  draggable={!card.matched}
                  onDragStart={(e) => onDragStart(e, card.id, card.matchLength)}
                  onDragEnd={onDragEnd}
                  className={`drag-card bg-gradient-to-r from-amber-400 to-orange-400 text-white font-bold rounded-xl p-3 text-center shadow-md transition ${card.matched ? 'matched-card' : 'hover:scale-102'}`}
                >
                  <span className="text-xl">{card.text}</span>
                  {!card.matched && <div className="text-xs mt-1">✨ 拖拽到右侧</div>}
                  {card.matched && <div className="text-xs mt-1">✔️ 已配对</div>}
                </div>
              ))}
            </div>
          </div>
          
          {/* 右侧千米长度槽位区 */}
          <div className="flex-1 bg-emerald-50/60 rounded-2xl p-3">
            <div className="font-bold text-emerald-800 text-center mb-2">🎯 千米长度 (放置区)</div>
            <div className="grid grid-cols-1 gap-3 max-h-[420px] overflow-y-auto">
              {lengthSlots.map(slot => (
                <div 
                  key={slot.id}
                  onDragOver={(e) => onDragOverSlot(e, slot.id)}
                  onDragLeave={onDragLeaveSlot}
                  onDrop={(e) => onDropToSlot(e, slot.id)}
                  className={`drop-slot rounded-xl p-3 text-center transition-all ${dragOverSlotId === slot.id ? 'drag-over' : ''} ${slot.matched ? 'slot-filled' : ''}`}
                >
                  <div className="text-2xl font-bold text-emerald-700">{slot.text}</div>
                  <div className="text-xs text-gray-500 mt-1">{slot.matched ? '✓ 已配对' : '⬅️ 把路程拖到这里'}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
        
        {feedbackMsg && (
          <div className="mt-3 text-center bg-purple-100 p-2 rounded-xl text-purple-800 font-medium text-sm">
            {feedbackMsg}
          </div>
        )}
        {allMatched && gameWin && (
          <div className="mt-3 text-center bg-gradient-to-r from-green-300 to-emerald-400 p-3 rounded-xl text-white font-bold text-lg celebration">
            🎉🎉 远足小英雄！你已掌握千米单位，能测量遥远的路程啦！ 🎉🎉
          </div>
        )}
        <div className="mt-3 text-xs text-center text-purple-600 bg-purple-50 p-2 rounded-full">
          💡 千米小知识：1千米 = 1000米，测量较远距离时用千米作单位，比如马拉松42千米，飞机高度10千米。
        </div>
      </div>
    );
  };
  
  // ---------- 左侧知识点：认识千米 ----------
  const KnowledgeCard = () => {
    return (
      <div className="bg-gradient-to-br from-[#f3e5ff] to-[#e9d4f5] rounded-3xl p-5 shadow-xl border border-[#c28fcb]">
        <div className="flex items-center gap-2 mb-3">
          <span className="text-5xl">🏞️</span>
          <h2 className="text-3xl font-extrabold text-purple-900">认识千米</h2>
        </div>
        <div className="space-y-4 text-base text-purple-900">
          <div className="bg-white/70 rounded-xl p-3">
            <p className="font-bold text-xl">✨ 什么是千米？</p>
            <p>千米是一个<strong>较大的长度单位</strong>，可以用“km”表示。1千米 = 1000米。测量较远的路程时常用千米作单位。</p>
            <div className="mt-2 bg-purple-100 p-2 rounded-lg text-center font-mono">
              1千米 = 1000米
            </div>
          </div>
          <div className="bg-white/70 rounded-xl p-3">
            <p className="font-bold">🏃 感受1千米</p>
            <p>绕标准操场跑2圈半大约就是1千米。步行约需15分钟。你家到学校的距离可能就有1千米。</p>
            <div className="mt-2 bg-amber-50 p-2 rounded-lg text-center text-sm">
              🌰 常见千米数：马拉松42千米，飞机飞行高度10千米，高速公路限速120千米/时。
            </div>
          </div>
          <div className="bg-white/70 rounded-xl p-3">
            <p className="font-bold">🔍 千米与米的换算</p>
            <p>3千米 = 3000米，5000米 = 5千米。</p>
            <p className="text-sm mt-1">🌰 学校到公园3千米 = 3000米，跑5千米 = 5000米。</p>
          </div>
          <div className="bg-amber-50 border-l-8 border-amber-400 p-3 rounded-xl">
            <p className="font-bold">🌟 小练习：</p>
            <p>2千米 = ( ) 米 &nbsp;&nbsp; 6000米 = ( ) 千米 &nbsp;&nbsp; 马拉松42千米 = ( ) 米</p>
            <p className="text-sm text-purple-700">（答案：2000，6，42000）</p>
          </div>
          <div className="bg-purple-100 p-3 rounded-xl text-center text-sm">
            💡 小口诀：“千米单位真是大，测量远路全靠它；1千米=1000米，换算乘除记住啦。”
          </div>
        </div>
      </div>
    );
  };
  
  // ---------- 快速小练习：千米与米换算 ----------
  const QuickQuiz = () => {
    const [question, setQuestion] = React.useState({ text: "3千米 = ? 米", answer: "3000" });
    const [userAnswer, setUserAnswer] = React.useState("");
    const [feedback, setFeedback] = React.useState("");
    
    const questionsBank = [
      { text: "3千米 = ? 米", answer: "3000" },
      { text: "5000米 = ? 千米", answer: "5" },
      { text: "2千米 = ? 米", answer: "2000" },
      { text: "8000米 = ? 千米", answer: "8" },
      { text: "10千米 = ? 米", answer: "10000" },
      { text: "15000米 = ? 千米", answer: "15" }
    ];
    const [idx, setIdx] = React.useState(0);
    
    const loadQuestion = (index) => {
      setQuestion(questionsBank[index % questionsBank.length]);
      setUserAnswer("");
      setFeedback("");
    };
    
    const nextQuiz = () => {
      const newIdx = idx + 1;
      setIdx(newIdx);
      loadQuestion(newIdx);
    };
    
    const checkAnswer = () => {
      const normalized = userAnswer.trim();
      const isCorrect = (normalized === question.answer);
      if (isCorrect) {
        setFeedback(`✅ 正确！${question.text} 答案是 ${question.answer}。`);
      } else {
        setFeedback(`❌ 不对哦，${question.text} 正确答案是 ${question.answer}。记住1千米=1000米。`);
      }
    };
    
    React.useEffect(() => {
      loadQuestion(0);
    }, []);
    
    return (
      <div className="bg-white/90 rounded-3xl p-4 shadow-xl border border-[#cbaacb]">
        <div className="flex items-center gap-2 mb-2">
          <span className="text-2xl">🧠</span>
          <h3 className="text-xl font-extrabold text-purple-800">快问快答 · 千米换算</h3>
        </div>
        <div className="bg-purple-50 rounded-xl p-3 text-center">
          <p className="font-bold text-xl">{question.text}</p>
          <div className="flex gap-2 mt-2 justify-center">
            <input 
              type="text" value={userAnswer}
              onChange={(e) => setUserAnswer(e.target.value)}
              className="border border-purple-300 rounded-lg px-3 py-1 w-32 text-center"
              placeholder="输入数字"
            />
            <button onClick={checkAnswer} className="bg-purple-400 hover:bg-purple-500 text-white px-4 py-2 rounded-lg text-sm">检验</button>
            <button onClick={nextQuiz} className="bg-emerald-400 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm">下一题</button>
          </div>
          {feedback && <div className="mt-2 text-sm text-purple-800">{feedback}</div>}
        </div>
      </div>
    );
  };
  
  // ---------- 主应用布局 ----------
  const App = () => {
    return (
      <div className="flex flex-col xl:flex-row gap-6">
        {/* 左侧区域：知识点 + 快问快答 */}
        <div className="flex-1 xl:w-3/5 space-y-5">
          <KnowledgeCard />
          <QuickQuiz />
          <div className="bg-white/70 rounded-2xl p-3 text-center text-purple-700 text-sm border border-purple-200">
            🌈 千米是丈量大地的尺子！从家到学校、从城市到城市，都用千米来量。记住1千米=1000米，你就能成为远足小英雄！
          </div>
        </div>
        {/* 右侧游戏区 */}
        <div className="flex-1 xl:w-2/5">
          <MatchingGame />
        </div>
      </div>
    );
  };
  
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
