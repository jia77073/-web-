<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>年龄问题·思维拓展 | 年龄差不变 | 拖拽排序 + 应用题闯关</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM & Babel CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <!-- SortableJS 拖拽排序库 (移动端完美支持) -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #CBAACB 0%, #D9C2E6 100%);
            font-family: 'Segoe UI', 'Comic Neue', 'Poppins', system-ui, -apple-system, '圆体', '微软雅黑', sans-serif;
        }
        .step-card {
            background: #FFF7E8;
            border-radius: 1.5rem;
            box-shadow: 0 6px 0 #3b82f6;
            transition: 0.1s linear;
            cursor: grab;
            user-select: none;
        }
        .step-card:active {
            cursor: grabbing;
        }
        .sortable-drag {
            opacity: 0.4;
            background: #bfdbfe;
            box-shadow: 0 0 10px rgba(59,130,246,0.3);
        }
        .answer-input:focus {
            transform: scale(1.02);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.4);
        }
        button:active {
            transform: scale(0.96);
        }
        @media (max-width: 768px) {
            .title-main {
                font-size: 1.8rem !important;
            }
            .step-card {
                padding: 0.7rem 1rem;
                font-size: 0.85rem;
            }
        }
        .sortable-steps {
            list-style: none;
            padding: 0;
            margin: 0;
        }
    </style>
</head>
<body class="p-4 md:p-6 min-h-screen flex items-center justify-center">
    <div id="root" class="w-full max-w-6xl mx-auto"></div>

    <script type="text/babel">
        // --------------------------------------------------------------
        // 左侧题库: 年龄问题 (年龄差不变、和倍、差倍、几年前几年后)
        const ageQuestions = [
            {
                text: "👨‍👦 爸爸今年36岁，儿子今年8岁，几年后爸爸的年龄是儿子的3倍？",
                answer: 6,
                solution: "🎯 年龄差不变：36-8=28岁。几年后儿子年龄=28÷(3-1)=14岁，14-8=6年。"
            },
            {
                text: "👩‍👧 妈妈和女儿的年龄和是48岁，妈妈的年龄是女儿的3倍，女儿今年多少岁？",
                answer: 12,
                solution: "🎯 和倍问题：女儿1倍，妈妈3倍，总份数4份。女儿=48÷4=12岁。"
            },
            {
                text: "🧑‍🤝‍🧑 哥哥比弟弟大5岁，今年两人年龄和是25岁，哥哥今年多少岁？",
                answer: 15,
                solution: "🎯 和差问题：哥哥=(25+5)÷2=15岁，弟弟=(25-5)÷2=10岁。"
            },
            {
                text: "👵 奶奶今年70岁，孙女今年10岁，几年前奶奶的年龄是孙女的7倍？",
                answer: 0,
                solution: "🎯 年龄差60岁不变。几年前孙女年龄=60÷(7-1)=10岁，此时孙女正好10岁，所以是0年前(今年)。"
            },
            {
                text: "👨‍👧‍👦 父亲和儿子的年龄差是24岁，4年后父亲的年龄是儿子的3倍，父亲今年多少岁？",
                answer: 32,
                solution: "🎯 年龄差不变，4年后儿子=24÷(3-1)=12岁，父亲=12×3=36岁，今年父亲=36-4=32岁。"
            },
            {
                text: "👩‍👧 妈妈今年34岁，女儿今年6岁，再过几年妈妈的年龄是女儿的3倍？",
                answer: 8,
                solution: "🎯 年龄差28岁不变。当妈妈是女儿3倍时，女儿=28÷(3-1)=14岁，14-6=8年。"
            },
            {
                text: "👨‍👦 5年前，爸爸的年龄是儿子的4倍，爸爸今年35岁，儿子今年多少岁？",
                answer: 12.5,
                answerExact: 12.5,
                solution: "🎯 5年前爸爸30岁，是儿子的4倍，儿子5年前=30÷4=7.5岁，今年=7.5+5=12.5岁。"
            },
            {
                text: "👨‍👧‍👦 爷爷和孙子的年龄和是78岁，爷爷的年龄是孙子的5倍，孙子今年多少岁？",
                answer: 13,
                solution: "🎯 和倍问题：孙子1倍，爷爷5倍，总份数6份，孙子=78÷6=13岁。"
            }
        ];

        // 左侧年龄问题应用题组件
        const AgeApp = () => {
            const [currentQ, setCurrentQ] = React.useState(null);
            const [userAnswer, setUserAnswer] = React.useState('');
            const [feedback, setFeedback] = React.useState('');
            const [showSolution, setShowSolution] = React.useState('');
            const [isCorrect, setIsCorrect] = React.useState(false);

            const loadRandomQuestion = React.useCallback(() => {
                const randomIndex = Math.floor(Math.random() * ageQuestions.length);
                const newQ = { ...ageQuestions[randomIndex] };
                setCurrentQ(newQ);
                setUserAnswer('');
                setFeedback('');
                setShowSolution('');
                setIsCorrect(false);
            }, []);

            React.useEffect(() => {
                if (ageQuestions.length) loadRandomQuestion();
            }, [loadRandomQuestion]);

            const handleSubmit = () => {
                if (!currentQ) return;
                const answerNum = parseFloat(userAnswer.trim());
                if (isNaN(answerNum)) {
                    setFeedback("❓ 请输入数字答案哟～");
                    setShowSolution('');
                    setIsCorrect(false);
                    return;
                }
                let targetAnswer = currentQ.answer;
                if (currentQ.answerExact !== undefined) targetAnswer = currentQ.answerExact;
                const isAnsCorrect = Math.abs(answerNum - targetAnswer) < 0.01;
                if (isAnsCorrect) {
                    setFeedback("🎉 完全正确！年龄问题掌握得非常棒！ 🧮 逻辑小天才！");
                    setIsCorrect(true);
                    setShowSolution(currentQ.solution);
                } else {
                    setFeedback(`😲 答案不对哦！正确答案是 ${targetAnswer}。看看年龄差不变原理吧～`);
                    setIsCorrect(false);
                    setShowSolution(currentQ.solution);
                }
            };

            const handleNext = () => loadRandomQuestion();

            if (!currentQ) return <div className="text-center text-white text-2xl p-10">✨ 加载年龄题库中...</div>;

            return (
                <div className="bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 border border-blue-200 h-full flex flex-col">
                    <div className="border-b-4 border-blue-300 pb-3 mb-4 flex items-center gap-2">
                        <span className="text-4xl">👨‍👦</span>
                        <h1 className="text-3xl md:text-4xl font-extrabold text-gray-800 title-main tracking-tight">年龄问题·逻辑思维营</h1>
                    </div>
                    {/* 知识点卡片 */}
                    <div className="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-2xl p-4 mb-5 shadow-inner border border-blue-100">
                        <h2 className="text-xl font-bold text-blue-800 flex items-center gap-2">📖 核心秘籍 <span className="text-sm bg-blue-200 px-2 py-0.5 rounded-full">年龄差不变·和倍差倍</span></h2>
                        <ul className="mt-2 space-y-1 text-gray-700 text-base md:text-lg list-disc pl-5">
                            <li>📐 <span className="font-semibold">核心规律</span>：年龄差永远不变（无论几年前、几年后）。</li>
                            <li>🧠 <span className="font-semibold">和倍年龄</span>：年龄和 ÷ (倍数+1) = 较小年龄。</li>
                            <li>🎯 <span className="font-semibold">差倍年龄</span>：年龄差 ÷ (倍数-1) = 较小年龄（当年）。</li>
                            <li>⏰ <span className="font-semibold">几年前/后</span>：先求目标年龄，再与现在比较。</li>
                            <li>✏️ <span className="font-semibold">解题步骤</span>：① 找年龄差；② 根据倍数关系求当时年龄；③ 推算年份。</li>
                        </ul>
                    </div>

                    {/* 题目卡片 */}
                    <div className="bg-amber-50 rounded-2xl p-5 border-l-[12px] border-l-blue-500 shadow-md mb-5">
                        <div className="flex justify-between items-start flex-wrap gap-2">
                            <span className="bg-blue-200 text-blue-800 px-3 py-1 rounded-full text-sm font-bold">🔥 年龄挑战</span>
                            <button onClick={handleNext} className="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-1.5 px-5 rounded-full shadow-md transition flex items-center gap-1 text-sm md:text-base">
                                🔄 换一题
                            </button>
                        </div>
                        <div className="mt-4 text-gray-800 text-xl md:text-2xl font-medium leading-relaxed">
                            {currentQ.text}
                        </div>
                        <div className="mt-5 flex flex-col sm:flex-row gap-3 items-center">
                            <input 
                                type="number" 
                                step="any"
                                value={userAnswer}
                                onChange={(e) => setUserAnswer(e.target.value)}
                                placeholder="输入答案 (数字)"
                                className="answer-input w-full sm:w-48 px-5 py-3 border-2 border-blue-300 rounded-2xl text-center text-lg bg-white focus:outline-none focus:border-blue-500"
                            />
                            <button onClick={handleSubmit} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-2xl shadow-md transition text-lg w-full sm:w-auto">
                                ✅ 提交闯关
                            </button>
                        </div>
                    </div>

                    {/* 反馈区 */}
                    {feedback && (
                        <div className={`rounded-2xl p-4 mb-4 ${isCorrect ? 'bg-green-100 border-l-8 border-green-500' : 'bg-rose-50 border-l-8 border-rose-400'}`}>
                            <p className="text-lg font-semibold flex items-center gap-2">{isCorrect ? '🏆 反馈' : '📚 学习提示'}</p>
                            <p className="text-gray-800 text-base md:text-lg mt-1">{feedback}</p>
                        </div>
                    )}
                    {showSolution && (
                        <div className="bg-sky-50 rounded-2xl p-4 border border-sky-200">
                            <p className="font-bold text-sky-800 text-lg flex items-center gap-2">✍️ 年龄解法（差不变）</p>
                            <p className="text-gray-700 mt-1 text-base md:text-lg leading-relaxed whitespace-pre-line">{showSolution}</p>
                            <div className="mt-2 text-blue-600 text-sm italic">💡 提示：抓住年龄差不变，用差倍或和倍公式。</div>
                        </div>
                    )}
                    <div className="mt-3 text-center text-gray-500 text-sm">
                        👨‍👦 年龄差不变 | 几年前/后年龄 = 差 ÷ (倍数-1) | 和倍年龄 = 和 ÷ (倍数+1)
                    </div>
                </div>
            );
        };

        // --------------------------------------------------------------
        // 右侧小游戏：年龄问题解题步骤拖拽排序 (年龄差不变典型)
        const stepsChallenges = [
            {
                title: "👨‍👦 挑战1：几年后年龄",
                description: "爸爸今年36岁，儿子今年8岁，几年后爸爸年龄是儿子的3倍？",
                correctSteps: [
                    "① 年龄差不变：36 - 8 = 28 (岁)。",
                    "② 几年后儿子年龄 = 年龄差 ÷ (倍数-1) = 28 ÷ (3-1) = 14 (岁)。",
                    "③ 经过年数 = 14 - 8 = 6 (年)。",
                    "④ 答：6年后爸爸年龄是儿子的3倍。"
                ]
            },
            {
                title: "👩‍👧 挑战2：和倍年龄",
                description: "妈妈和女儿年龄和是48岁，妈妈年龄是女儿的3倍，女儿几岁？",
                correctSteps: [
                    "① 女儿为1倍，妈妈为3倍，总份数 = 1+3 = 4。",
                    "② 女儿年龄 = 年龄和 ÷ 总份数 = 48 ÷ 4 = 12 (岁)。",
                    "③ 答：女儿12岁。"
                ]
            },
            {
                title: "🧑‍🤝‍🧑 挑战3：几年前年龄",
                description: "爷爷70岁，孙子10岁，几年前爷爷年龄是孙子的7倍？",
                correctSteps: [
                    "① 年龄差不变：70 - 10 = 60 (岁)。",
                    "② 几年前孙子年龄 = 60 ÷ (7-1) = 10 (岁)。",
                    "③ 此时孙子正好10岁，所以是0年前（今年）。",
                    "④ 答：今年就是7倍，0年前。"
                ]
            },
            {
                title: "👨‍👧‍👦 挑战4：差倍求现在",
                description: "父亲比儿子大24岁，4年后父亲年龄是儿子的3倍，父亲今年几岁？",
                correctSteps: [
                    "① 年龄差不变，4年后儿子 = 24 ÷ (3-1) = 12 (岁)。",
                    "② 4年后父亲 = 12 × 3 = 36 (岁)。",
                    "③ 今年父亲 = 36 - 4 = 32 (岁)。",
                    "④ 答：父亲今年32岁。"
                ]
            }
        ];

        // 右侧拖拽排序组件
        const StepsSortGame = () => {
            const [challenge, setChallenge] = React.useState(null);
            const [shuffledSteps, setShuffledSteps] = React.useState([]);
            const [gameFeedback, setGameFeedback] = React.useState('');
            const [checkStyle, setCheckStyle] = React.useState('info');
            const containerRef = React.useRef(null);
            const sortableRef = React.useRef(null);

            const loadRandomChallenge = React.useCallback(() => {
                const randomIndex = Math.floor(Math.random() * stepsChallenges.length);
                const newChallenge = { ...stepsChallenges[randomIndex] };
                const stepsCopy = [...newChallenge.correctSteps];
                // Fisher-Yates 打乱顺序
                for (let i = stepsCopy.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [stepsCopy[i], stepsCopy[j]] = [stepsCopy[j], stepsCopy[i]];
                }
                setChallenge(newChallenge);
                setShuffledSteps(stepsCopy);
                setGameFeedback('✨ 拖拽卡片，按正确的年龄问题解题步骤顺序排列！(从上到下)');
                setCheckStyle('info');
            }, []);

            React.useEffect(() => {
                loadRandomChallenge();
            }, [loadRandomChallenge]);

            // 每当 shuffledSteps 变化，重新初始化 Sortable 实例
            React.useEffect(() => {
                if (!containerRef.current || !challenge) return;
                const listContainer = containerRef.current.querySelector('#sortable-steps-list');
                if (!listContainer) return;
                if (sortableRef.current) sortableRef.current.destroy();
                sortableRef.current = new Sortable(listContainer, {
                    animation: 250,
                    ghostClass: 'sortable-drag',
                    handle: '.step-card',
                    touchStartThreshold: 2,
                    onEnd: () => { /* 无额外动作 */ }
                });
                return () => {
                    if (sortableRef.current) {
                        sortableRef.current.destroy();
                        sortableRef.current = null;
                    }
                };
            }, [shuffledSteps, challenge]);

            const handleCheckOrder = () => {
                if (!challenge) return;
                const listItems = containerRef.current?.querySelectorAll('#sortable-steps-list li');
                if (!listItems || listItems.length === 0) return;
                const currentOrder = Array.from(listItems).map(li => li.innerText.trim());
                const isMatch = currentOrder.length === challenge.correctSteps.length &&
                    currentOrder.every((step, idx) => step === challenge.correctSteps[idx]);
                if (isMatch) {
                    setGameFeedback('🎉 完美排序！年龄问题解题逻辑完全正确！成为年龄推理大师！🏅');
                    setCheckStyle('success');
                    if (containerRef.current) {
                        containerRef.current.style.transform = 'scale(1.01)';
                        setTimeout(() => { if(containerRef.current) containerRef.current.style.transform = ''; }, 200);
                    }
                } else {
                    setGameFeedback('🤔 顺序不对哦！再想想年龄问题解题流程：抓年龄差→求当时年龄→推算年份→作答。重新拖拽排序吧！💪');
                    setCheckStyle('error');
                }
            };

            const handleRefreshGame = () => {
                loadRandomChallenge();
            };

            if (!challenge) return <div className="bg-white/90 rounded-3xl p-5 text-center">加载趣味排序游戏...</div>;

            return (
                <div className="bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 border border-blue-200 h-full flex flex-col">
                    <div className="border-b-2 border-dashed border-blue-300 pb-2 mb-3 flex items-center gap-2">
                        <span className="text-3xl">🎮</span>
                        <h2 className="text-2xl md:text-3xl font-bold text-blue-800">拖拽排序·年龄特工队</h2>
                    </div>
                    <div className="bg-blue-50 rounded-xl p-3 mb-4">
                        <p className="font-bold text-indigo-800 text-lg">📌 当前排序挑战</p>
                        <p className="text-gray-800 text-base md:text-lg mt-1">{challenge.description}</p>
                    </div>
                    <div className="text-sm text-gray-600 mb-2 flex items-center gap-1">👇 <strong>拖拽下方卡片</strong>，按正确的解题步骤顺序排列（从上到下逻辑递进）</div>
                    <div ref={containerRef} className="bg-[#FFF4E6] rounded-2xl p-4 min-h-[320px] shadow-inner">
                        <ul id="sortable-steps-list" className="sortable-steps space-y-3">
                            {shuffledSteps.map((step, idx) => (
                                <li key={idx} className="step-card p-4 text-gray-800 text-base md:text-lg font-medium shadow-md rounded-xl border-l-8 border-blue-400 bg-white cursor-grab transition-all hover:shadow-lg">
                                    {step}
                                </li>
                            ))}
                        </ul>
                    </div>
                    <div className="flex flex-wrap justify-center gap-4 mt-6">
                        <button onClick={handleCheckOrder} className="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-full shadow transition text-base md:text-lg">
                            ✅ 检查排序
                        </button>
                        <button onClick={handleRefreshGame} className="bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-2 px-6 rounded-full shadow transition text-base md:text-lg">
                            🔄 新步骤挑战
                        </button>
                    </div>
                    <div className={`mt-4 text-center text-base font-medium rounded-xl p-2 transition-all ${
                        checkStyle === 'success' ? 'bg-green-100 text-green-700' : 
                        checkStyle === 'error' ? 'bg-rose-50 text-rose-600' : 'bg-blue-50 text-blue-700'
                    }`}>
                        {gameFeedback}
                    </div>
                    <div className="mt-3 text-center text-xs text-blue-500">
                        💡 拖拽卡片调整顺序，排序正确即掌握年龄问题解题四步骤（差不变→求当时→推年份→作答）。
                    </div>
                    <div className="mt-3 text-green-700 bg-green-50 p-2 rounded-xl text-sm text-center">
                        🧸 拖拽排序小游戏融合年龄逻辑：年龄差不变·和倍差倍·年份推算，在排序中强化长期变化分析力！
                    </div>
                </div>
            );
        };

        // --------------------------------------------------------------
        // 根组件：左右布局
        const MainPage = () => {
            return (
                <div className="flex flex-col lg:flex-row gap-6 w-full">
                    {/* 左侧 年龄应用题训练 */}
                    <div className="flex-1">
                        <AgeApp />
                    </div>
                    {/* 右侧 拖拽步骤排序游戏 */}
                    <div className="flex-1">
                        <StepsSortGame />
                    </div>
                </div>
            );
        };

        // 渲染根组件
        const rootElement = document.getElementById('root');
        const reactRoot = ReactDOM.createRoot(rootElement);
        reactRoot.render(<MainPage />);
    </script>
</body>
</html>
