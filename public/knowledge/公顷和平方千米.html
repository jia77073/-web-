<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>公顷和平方千米 · 土地测量师 | 数学乐园</title>
  <!-- Tailwind + React CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    /* 全局字体放大6号（2.8rem），淡紫色主题背景，内容区淡绿色卡片 */
    body {
      font-size: 2.8rem;
      background: linear-gradient(135deg, #D9C2E6 0%, #CBAACB 100%);
      font-family: system-ui, 'Segoe UI', 'Comic Neue', 'Quicksand', sans-serif;
    }
    .drag-card {
      cursor: grab;
      transition: all 0.1s ease;
      user-select: none;
    }
    .drag-card:active {
      cursor: grabbing;
    }
    .drop-slot {
      transition: all 0.2s ease;
      border: 2px dashed #b87cd6;
      background-color: #faf5ff;
    }
    .drag-over {
      background-color: #f3e0ff;
      transform: scale(1.02);
      border: 2px solid #9b6bc0;
    }
    .matched-card {
      opacity: 0.6;
      filter: grayscale(0.2);
      background: #d4badc;
      text-decoration: line-through;
      cursor: default;
      pointer-events: none;
    }
    .slot-filled {
      background-color: #c7f0c2;
      border: 2px solid #2e7d32;
    }
    .btn-fun:active {
      transform: scale(0.96);
    }
    @keyframes bounceSoft {
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-5px); }
    }
    .celebration {
      animation: bounceSoft 0.5s ease;
    }
    @media (max-width: 768px) {
      body {
        font-size: 1.8rem;
      }
      .drag-card, .drop-slot {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body class="min-h-screen p-4 md:p-6">
<div id="root" class="w-full max-w-7xl mx-auto"></div>

<script type="text/babel">
  // ======================= 小学数学 · 公顷和平方千米 =======================
  // 知识点：公顷(hm²)和平方千米(km²)是测量较大土地面积的单位。
  // 1公顷 = 10000平方米，1平方千米 = 100公顷 = 1000000平方米。
  
  // ---------- 游戏数据：拖拽配对（土地/区域 → 合适的面积单位：公顷或平方千米）----------
  const matchPairs = [
    { id: 1, area: "一个标准的足球场", unit: "公顷", correctUnit: "公顷", display: "公顷 (hm²)" },
    { id: 2, area: "一座城市的面积", unit: "平方千米", correctUnit: "平方千米", display: "平方千米 (km²)" },
    { id: 3, area: "北京故宫的占地面积", unit: "公顷", correctUnit: "公顷", display: "公顷 (hm²)" },
    { id: 4, area: "一个省的陆地面积", unit: "平方千米", correctUnit: "平方千米", display: "平方千米 (km²)" },
    { id: 5, area: "天安门广场的面积", unit: "公顷", correctUnit: "公顷", display: "公顷 (hm²)" },
    { id: 6, area: "国家体育场（鸟巢）", unit: "公顷", correctUnit: "公顷", display: "公顷 (hm²)" },
    { id: 7, area: "一个大型森林公园", unit: "平方千米", correctUnit: "平方千米", display: "平方千米 (km²)" }
  ];
  
  // 游戏组件：拖拽配对（将左边区域拖拽到右边正确的面积单位上）
  const MatchingGame = () => {
    // 左侧区域卡片（未配对）
    const [areaCards, setAreaCards] = React.useState(() => 
      matchPairs.map(pair => ({
        id: pair.id,
        text: pair.area,
        matchUnit: pair.unit,
        matched: false
      }))
    );
    
    // 右侧单位槽位（打乱顺序）
    const [unitSlots, setUnitSlots] = React.useState(() => {
      let slots = matchPairs.map(pair => ({
        id: `slot-${pair.id}`,
        text: pair.display,
        matchUnit: pair.unit,
        matched: false
      }));
      // 打乱顺序
      for (let i = slots.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [slots[i], slots[j]] = [slots[j], slots[i]];
      }
      return slots;
    });
    
    const [gameWin, setGameWin] = React.useState(false);
    const [dragOverSlotId, setDragOverSlotId] = React.useState(null);
    const [feedbackMsg, setFeedbackMsg] = React.useState("");
    const [score, setScore] = React.useState(0);
    
    const checkVictory = (cards, slots) => {
      const allMatched = cards.every(c => c.matched) && slots.every(s => s.matched);
      if (allMatched && !gameWin) {
        setGameWin(true);
        setFeedbackMsg("🎉 完美！所有土地都找到了正确的面积单位！你已是土地测量师！ 🎉");
      }
    };
    
    // 拖拽左侧区域卡片
    const onDragStart = (e, cardId, matchUnit) => {
      const card = areaCards.find(c => c.id === cardId);
      if (card?.matched) {
        e.preventDefault();
        return false;
      }
      e.dataTransfer.setData("text/plain", JSON.stringify({ type: "area", cardId, matchUnit }));
      e.dataTransfer.effectAllowed = "copy";
      e.target.style.opacity = "0.6";
    };
    const onDragEnd = (e) => { if(e.target) e.target.style.opacity = ""; };
    
    const onDragOverSlot = (e, slotId) => {
      e.preventDefault();
      setDragOverSlotId(slotId);
      e.dataTransfer.dropEffect = "copy";
    };
    const onDragLeaveSlot = () => setDragOverSlotId(null);
    
    const onDropToSlot = (e, slotId) => {
      e.preventDefault();
      setDragOverSlotId(null);
      const rawData = e.dataTransfer.getData("text/plain");
      if (!rawData) return;
      let dragData;
      try { dragData = JSON.parse(rawData); } catch(err) { return; }
      if (dragData.type !== "area") return;
      const { cardId, matchUnit } = dragData;
      
      const targetSlot = unitSlots.find(s => s.id === slotId);
      const sourceCard = areaCards.find(c => c.id === cardId);
      if (!targetSlot || !sourceCard) return;
      if (sourceCard.matched || targetSlot.matched) {
        setFeedbackMsg("⏳ 这个土地或单位槽位已经配对过了！");
        setTimeout(() => setFeedbackMsg(""), 1300);
        return;
      }
      
      // 验证匹配
      if (matchUnit === targetSlot.matchUnit) {
        // 配对成功
        setAreaCards(prev => prev.map(c => c.id === cardId ? { ...c, matched: true } : c));
        setUnitSlots(prev => prev.map(s => s.id === slotId ? { ...s, matched: true } : s));
        setScore(prev => prev + 1);
        setFeedbackMsg(`✅ 正确！${sourceCard.text} 的面积应该用 ${targetSlot.text} 作单位。`);
        setTimeout(() => setFeedbackMsg(""), 1500);
        const newCards = areaCards.map(c => c.id === cardId ? { ...c, matched: true } : c);
        const newSlots = unitSlots.map(s => s.id === slotId ? { ...s, matched: true } : s);
        checkVictory(newCards, newSlots);
      } else {
        setFeedbackMsg(`❌ 配对错误！${sourceCard.text} 应该用 ${matchUnit === "公顷" ? "公顷 (hm²)" : "平方千米 (km²)"} 作单位，而不是 ${targetSlot.text}。想一想土地的大小～`);
        setTimeout(() => setFeedbackMsg(""), 1800);
      }
    };
    
    const resetGame = () => {
      const newAreas = matchPairs.map(pair => ({
        id: pair.id,
        text: pair.area,
        matchUnit: pair.unit,
        matched: false
      }));
      let newSlots = matchPairs.map(pair => ({
        id: `slot-${pair.id}`,
        text: pair.display,
        matchUnit: pair.unit,
        matched: false
      }));
      for (let i = newSlots.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newSlots[i], newSlots[j]] = [newSlots[j], newSlots[i]];
      }
      setAreaCards(newAreas);
      setUnitSlots(newSlots);
      setGameWin(false);
      setScore(0);
      setFeedbackMsg("✨ 新的一局！把左边的土地拖拽到右边正确的面积单位上吧～");
      setTimeout(() => setFeedbackMsg(""), 1500);
    };
    
    const allMatched = areaCards.every(c => c.matched) && unitSlots.every(s => s.matched);
    const totalPairs = matchPairs.length;
    
    return (
      <div className="bg-white/90 backdrop-blur-sm rounded-3xl p-5 shadow-xl border border-[#cbaacb] h-full flex flex-col">
        <div className="flex justify-between items-center flex-wrap gap-2 mb-3">
          <h3 className="text-2xl font-extrabold text-purple-800">🗺️ 土地配对 · 拖拽连连看</h3>
          <div className="flex gap-2">
            <span className="bg-emerald-200 px-3 py-1 rounded-full text-base font-bold">🏆 配对 {score}/{totalPairs}</span>
            <button onClick={resetGame} className="bg-gradient-to-r from-purple-500 to-pink-500 text-white font-bold py-1.5 px-4 rounded-full text-sm shadow btn-fun">🔄 新的一局</button>
          </div>
        </div>
        <p className="text-sm text-purple-700 bg-purple-50 rounded-xl p-2 mb-3 text-center">
          🧸 玩法：将左边的<strong>土地/区域</strong>拖拽到右边<strong>合适的面积单位</strong>上（公顷或平方千米），配对正确会消除！全部配对成功即可获胜。
        </p>
        
        <div className="flex flex-col md:flex-row gap-5 flex-1">
          {/* 左侧区域卡片区 */}
          <div className="flex-1 bg-purple-50/60 rounded-2xl p-3">
            <div className="font-bold text-purple-800 text-center mb-2">📦 土地卡片 (拖拽我)</div>
            <div className="space-y-3 max-h-[420px] overflow-y-auto pr-1">
              {areaCards.map(card => (
                <div 
                  key={card.id}
                  draggable={!card.matched}
                  onDragStart={(e) => onDragStart(e, card.id, card.matchUnit)}
                  onDragEnd={onDragEnd}
                  className={`drag-card bg-gradient-to-r from-amber-400 to-orange-400 text-white font-bold rounded-xl p-3 text-center shadow-md transition ${card.matched ? 'matched-card' : 'hover:scale-102'}`}
                >
                  <span className="text-xl">{card.text}</span>
                  {!card.matched && <div className="text-xs mt-1">✨ 拖拽到右侧</div>}
                  {card.matched && <div className="text-xs mt-1">✔️ 已配对</div>}
                </div>
              ))}
            </div>
          </div>
          
          {/* 右侧单位槽位区 */}
          <div className="flex-1 bg-emerald-50/60 rounded-2xl p-3">
            <div className="font-bold text-emerald-800 text-center mb-2">🎯 土地面积单位 (放置区)</div>
            <div className="grid grid-cols-1 gap-3 max-h-[420px] overflow-y-auto">
              {unitSlots.map(slot => (
                <div 
                  key={slot.id}
                  onDragOver={(e) => onDragOverSlot(e, slot.id)}
                  onDragLeave={onDragLeaveSlot}
                  onDrop={(e) => onDropToSlot(e, slot.id)}
                  className={`drop-slot rounded-xl p-3 text-center transition-all ${dragOverSlotId === slot.id ? 'drag-over' : ''} ${slot.matched ? 'slot-filled' : ''}`}
                >
                  <div className="text-2xl font-bold text-emerald-700">{slot.text}</div>
                  <div className="text-xs text-gray-500 mt-1">{slot.matched ? '✓ 已配对' : '⬅️ 把土地拖到这里'}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
        
        {feedbackMsg && (
          <div className="mt-3 text-center bg-purple-100 p-2 rounded-xl text-purple-800 font-medium text-sm">
            {feedbackMsg}
          </div>
        )}
        {allMatched && gameWin && (
          <div className="mt-3 text-center bg-gradient-to-r from-green-300 to-emerald-400 p-3 rounded-xl text-white font-bold text-lg celebration">
            🎉🎉 土地测量大师！你已掌握公顷和平方千米，能丈量祖国的大好河山！ 🎉🎉
          </div>
        )}
        <div className="mt-3 text-xs text-center text-purple-600 bg-purple-50 p-2 rounded-full">
          💡 公顷和平方千米：1公顷 = 10000平方米（约一个足球场），1平方千米 = 100公顷（约一个城市的区）。测量较大土地面积时使用。
        </div>
      </div>
    );
  };
  
  // ---------- 左侧知识点：公顷和平方千米 ----------
  const KnowledgeCard = () => {
    return (
      <div className="bg-gradient-to-br from-[#f3e5ff] to-[#e9d4f5] rounded-3xl p-5 shadow-xl border border-[#c28fcb]">
        <div className="flex items-center gap-2 mb-3">
          <span className="text-5xl">🌾</span>
          <h2 className="text-3xl font-extrabold text-purple-900">公顷和平方千米</h2>
        </div>
        <div className="space-y-4 text-base text-purple-900">
          <div className="bg-white/70 rounded-xl p-3">
            <p className="font-bold text-xl">✨ 什么是公顷？</p>
            <p>公顷是测量<strong>较大土地面积</strong>的单位，用“hm²”表示。1公顷 = 10000平方米。一个标准足球场的面积大约就是1公顷。</p>
            <div className="mt-2 bg-purple-100 p-2 rounded-lg text-center font-mono">
              1公顷 = 10000平方米
            </div>
          </div>
          <div className="bg-white/70 rounded-xl p-3">
            <p className="font-bold">✨ 什么是平方千米？</p>
            <p>平方千米是测量<strong>很大土地面积</strong>的单位，用“km²”表示。1平方千米 = 100公顷 = 1000000平方米。一座城市的面积常用平方千米。</p>
            <div className="mt-2 bg-purple-100 p-2 rounded-lg text-center font-mono">
              1平方千米 = 100公顷 = 1000000平方米
            </div>
          </div>
          <div className="bg-white/70 rounded-xl p-3">
            <p className="font-bold">🔍 换算关系</p>
            <ul className="list-disc pl-5 space-y-2">
              <li>公顷 → 平方米：×10000</li>
              <li>平方千米 → 公顷：×100</li>
              <li>平方千米 → 平方米：×1000000</li>
            </ul>
            <p className="text-sm mt-1">🌰 5公顷 = 50000平方米； 3平方千米 = 300公顷 = 3000000平方米。</p>
          </div>
          <div className="bg-amber-50 border-l-8 border-amber-400 p-3 rounded-xl">
            <p className="font-bold">🌟 小练习：</p>
            <p>2公顷 = ( ) 平方米 &nbsp;&nbsp; 4平方千米 = ( ) 公顷 &nbsp;&nbsp; 1平方千米 = ( ) 平方米</p>
            <p className="text-sm text-purple-700">（答案：20000，400，1000000）</p>
          </div>
          <div className="bg-purple-100 p-3 rounded-xl text-center text-sm">
            💡 小口诀：“公顷平方千米，测量大地要用它；1公顷一万平，1平方千米百公顷；单位换算要仔细，乘除进率别忘记。”
          </div>
        </div>
      </div>
    );
  };
  
  // ---------- 快速小练习：公顷和平方千米换算 ----------
  const QuickQuiz = () => {
    const [question, setQuestion] = React.useState({ text: "3公顷 = ? 平方米", answer: "30000" });
    const [userAnswer, setUserAnswer] = React.useState("");
    const [feedback, setFeedback] = React.useState("");
    
    const questionsBank = [
      { text: "3公顷 = ? 平方米", answer: "30000" },
      { text: "5平方千米 = ? 公顷", answer: "500" },
      { text: "2平方千米 = ? 平方米", answer: "2000000" },
      { text: "80000平方米 = ? 公顷", answer: "8" },
      { text: "7公顷 = ? 平方米", answer: "70000" },
      { text: "10平方千米 = ? 公顷", answer: "1000" }
    ];
    const [idx, setIdx] = React.useState(0);
    
    const loadQuestion = (index) => {
      setQuestion(questionsBank[index % questionsBank.length]);
      setUserAnswer("");
      setFeedback("");
    };
    
    const nextQuiz = () => {
      const newIdx = idx + 1;
      setIdx(newIdx);
      loadQuestion(newIdx);
    };
    
    const checkAnswer = () => {
      const normalized = userAnswer.trim();
      const isCorrect = (normalized === question.answer);
      if (isCorrect) {
        setFeedback(`✅ 正确！${question.text} 答案是 ${question.answer}。`);
      } else {
        setFeedback(`❌ 不对哦，${question.text} 正确答案是 ${question.answer}。记住1公顷=10000平方米，1平方千米=100公顷。`);
      }
    };
    
    React.useEffect(() => {
      loadQuestion(0);
    }, []);
    
    return (
      <div className="bg-white/90 rounded-3xl p-4 shadow-xl border border-[#cbaacb]">
        <div className="flex items-center gap-2 mb-2">
          <span className="text-2xl">🧠</span>
          <h3 className="text-xl font-extrabold text-purple-800">快问快答 · 土地换算</h3>
        </div>
        <div className="bg-purple-50 rounded-xl p-3 text-center">
          <p className="font-bold text-xl">{question.text}</p>
          <div className="flex gap-2 mt-2 justify-center">
            <input 
              type="text" value={userAnswer}
              onChange={(e) => setUserAnswer(e.target.value)}
              className="border border-purple-300 rounded-lg px-3 py-1 w-40 text-center"
              placeholder="输入数字"
            />
            <button onClick={checkAnswer} className="bg-purple-400 hover:bg-purple-500 text-white px-4 py-2 rounded-lg text-sm">检验</button>
            <button onClick={nextQuiz} className="bg-emerald-400 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm">下一题</button>
          </div>
          {feedback && <div className="mt-2 text-sm text-purple-800">{feedback}</div>}
        </div>
      </div>
    );
  };
  
  // ---------- 主应用布局 ----------
  const App = () => {
    return (
      <div className="flex flex-col xl:flex-row gap-6">
        {/* 左侧区域：知识点 + 快问快答 */}
        <div className="flex-1 xl:w-3/5 space-y-5">
          <KnowledgeCard />
          <QuickQuiz />
          <div className="bg-white/70 rounded-2xl p-3 text-center text-purple-700 text-sm border border-purple-200">
            🌈 公顷和平方千米是丈量祖国大地的尺子！从足球场到城市，从森林到海洋，用它们描述广阔的世界！
          </div>
        </div>
        {/* 右侧游戏区 */}
        <div className="flex-1 xl:w-2/5">
          <MatchingGame />
        </div>
      </div>
    );
  };
  
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
