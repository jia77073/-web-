<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>数学小达人：认识几时几分 | 拖拖乐时间配对</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 配置主题：淡紫色 + 超大字体 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontSize: {
                        '5xl': '3rem',     // 大5号字体
                        '6xl': '3.75rem',
                    },
                    colors: {
                        'lavender-primary': '#CBAACB',
                        'lavender-light': '#D9C2E6',
                    }
                }
            }
        }
    </script>
    <style>
        /* 拖拽优化 & 移动端适配 */
        [draggable="true"] {
            cursor: grab;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        [draggable="true"]:active {
            cursor: grabbing;
        }
        .drop-zone-active {
            background-color: #fef9c3 !important;
            border-color: #eab308 !important;
            transform: scale(1.02);
            transition: all 0.2s ease;
        }
        /* 时钟卡片动画 */
        @keyframes matchFlash {
            0% { transform: scale(1); background-color: #dcfce7; }
            80% { transform: scale(1.05); background-color: #bbf7d0; }
            100% { transform: scale(1); background-color: #f0fdf4; }
        }
        .match-animation {
            animation: matchFlash 0.4s ease-out;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: white;
            border-radius: 999px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
        /* 自定义滚动条 */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #CBAACB;
            border-radius: 10px;
        }
    </style>
    <!-- React & ReactDOM & Babel -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gradient-to-br from-lavender-primary to-lavender-light min-h-screen p-4 md:p-5 font-sans">
    <div id="root" class="max-w-7xl mx-auto"></div>

    <script type="text/babel">
        // React 主逻辑: 认识几时几分 —— 拖拽配对游戏
        const { useState, useEffect, useCallback, useRef } = React;

        // ---------- 绘制时钟 Canvas 组件 (几时几分) ----------
        const AnalogClock = ({ hour, minute, isMatched }) => {
            const canvasRef = useRef(null);
            
            const drawClock = useCallback(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const size = 120; // 固定120px
                canvas.width = size;
                canvas.height = size;
                const centerX = size/2, centerY = size/2;
                const radius = size * 0.42;
                
                ctx.clearRect(0, 0, size, size);
                // 表盘背景
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius + 4, 0, 2 * Math.PI);
                ctx.fillStyle = '#FFFDF5';
                ctx.fill();
                ctx.strokeStyle = '#9b6b9e';
                ctx.lineWidth = 1.8;
                ctx.stroke();
                // 刻度 + 数字简化 (只画12个主刻度)
                for (let i = 1; i <= 12; i++) {
                    let angle = i * Math.PI * 2 / 12 - Math.PI/2;
                    let x1 = centerX + (radius - 10) * Math.cos(angle);
                    let y1 = centerY + (radius - 10) * Math.sin(angle);
                    let x2 = centerX + (radius - 2) * Math.cos(angle);
                    let y2 = centerY + (radius - 2) * Math.sin(angle);
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#6b21a5';
                    ctx.stroke();
                    // 数字
                    ctx.font = `bold ${radius * 0.18}px "Comic Neue", sans-serif`;
                    ctx.fillStyle = '#4c1d95';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    let numX = centerX + (radius - 18) * Math.cos(angle);
                    let numY = centerY + (radius - 18) * Math.sin(angle);
                    ctx.fillText(i.toString(), numX, numY);
                }
                // 时针: 每小时30度 + 分钟偏移 (0.5°/min)
                let hourAngle = ((hour % 12) * 30 + minute * 0.5) * Math.PI / 180 - Math.PI/2;
                let hourLen = radius * 0.5;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX + hourLen * Math.cos(hourAngle), centerY + hourLen * Math.sin(hourAngle));
                ctx.lineWidth = 5;
                ctx.strokeStyle = '#2d1b4e';
                ctx.stroke();
                // 分针: 每分钟6度
                let minuteAngle = (minute * 6) * Math.PI / 180 - Math.PI/2;
                let minuteLen = radius * 0.7;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX + minuteLen * Math.cos(minuteAngle), centerY + minuteLen * Math.sin(minuteAngle));
                ctx.lineWidth = 3;
                ctx.strokeStyle = '#a855f7';
                ctx.stroke();
                // 中心圆点
                ctx.beginPath();
                ctx.arc(centerX, centerY, 4, 0, 2*Math.PI);
                ctx.fillStyle = '#fbbf24';
                ctx.fill();
                ctx.fillStyle = '#3b0764';
                ctx.arc(centerX, centerY, 2, 0, 2*Math.PI);
                ctx.fill();
            }, [hour, minute]);
            
            useEffect(() => {
                drawClock();
            }, [drawClock, hour, minute]);
            
            return (
                <div className="flex flex-col items-center">
                    <canvas ref={canvasRef} width="120" height="120" className="rounded-full shadow-md"></canvas>
                    {isMatched && (
                        <div className="mt-1 bg-green-500 text-white text-xs rounded-full px-2 py-0.5 flex items-center gap-1">
                            ✅ 已配对
                        </div>
                    )}
                </div>
            );
        };
        
        // ---------- 辅助函数: 生成随机时间 (hh:mm, 分钟为5的倍数, 避免重复) ----------
        const generateRandomTimes = (count = 4) => {
            const timesSet = new Set();
            const minutesOptions = [0, 5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55];
            while(timesSet.size < count) {
                const hour = Math.floor(Math.random() * 12) + 1; // 1-12
                const minute = minutesOptions[Math.floor(Math.random() * minutesOptions.length)];
                const key = `${hour}:${minute.toString().padStart(2,'0')}`;
                if (!timesSet.has(key)) {
                    timesSet.add(key);
                }
            }
            // 转换为对象数组 { hour, minute, display }
            return Array.from(timesSet).map(timeStr => {
                const [h, m] = timeStr.split(':');
                return {
                    hour: parseInt(h, 10),
                    minute: parseInt(m, 10),
                    display: `${parseInt(h,10)}:${m.padStart(2,'0')}`
                };
            });
        };
        
        // ---------- 主游戏组件: 拖拽配对 (几时几分) ----------
        const TimeMatchingGame = () => {
            // 时钟数据: 每个时钟包含id, hour, minute, display, matched(是否已配对)
            const [clocks, setClocks] = useState([]);
            // 未配对的卡片列表 (每个卡片包含 display, hour, minute, id)
            const [cards, setCards] = useState([]);
            // 全局提示消息
            const [message, setMessage] = useState("🐣 把右侧的时间卡片拖拽到左边的时钟上，配对正确就能学到几时几分！");
            // 特效标志
            const [effectTrigger, setEffectTrigger] = useState(0);
            // 配对成功数量
            const matchedCount = clocks.filter(c => c.matched).length;
            const totalClocks = clocks.length;
            const allMatched = totalClocks > 0 && matchedCount === totalClocks;
            
            // 高亮放置区
            const [highlightClockId, setHighlightClockId] = useState(null);
            
            // 重置 / 换一题: 重新生成时钟和卡片
            const resetGame = () => {
                const newTimes = generateRandomTimes(4);  // 4个不同时间
                const newClocks = newTimes.map((t, idx) => ({
                    id: `clock_${idx}_${Date.now()}_${Math.random()}`,
                    hour: t.hour,
                    minute: t.minute,
                    display: t.display,
                    matched: false,
                }));
                // 未配对的卡片: 基于相同时间集，打乱顺序
                let cardItems = newTimes.map((t, idx) => ({
                    id: `card_${idx}_${Date.now()}_${Math.random()}`,
                    hour: t.hour,
                    minute: t.minute,
                    display: t.display,
                }));
                // 打乱卡片顺序
                for (let i = cardItems.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [cardItems[i], cardItems[j]] = [cardItems[j], cardItems[i]];
                }
                setClocks(newClocks);
                setCards(cardItems);
                setMessage("🎲 新题目来啦！把卡片拖到对应时钟上，练习几时几分吧～");
                setEffectTrigger(prev => prev+1);
                setHighlightClockId(null);
            };
            
            // 初始化
            useEffect(() => {
                resetGame();
            }, []);
            
            // 处理配对逻辑
            const handleMatch = (clockId, draggedDisplay) => {
                // 找到目标时钟
                const targetClock = clocks.find(c => c.id === clockId);
                if (!targetClock) return false;
                if (targetClock.matched) {
                    setMessage(`⏰ 这个时钟已经配对过了！不能再配对了，试试别的时钟吧。`);
                    return false;
                }
                // 检查被拖拽的卡片是否还在未配对卡片列表中
                const cardExists = cards.some(card => card.display === draggedDisplay);
                if (!cardExists) {
                    setMessage(`🔁 这张时间卡片已经配对过了！不能重复使用，请拖拽其他卡片。`);
                    return false;
                }
                // 判断是否匹配 (比较显示字符串)
                if (targetClock.display === draggedDisplay) {
                    // 配对成功
                    // 更新时钟matched为true
                    setClocks(prevClocks => 
                        prevClocks.map(clock => 
                            clock.id === clockId ? { ...clock, matched: true } : clock
                        )
                    );
                    // 从卡片列表中移除该卡片
                    setCards(prevCards => prevCards.filter(card => card.display !== draggedDisplay));
                    setMessage(`🎉 配对成功！ ${draggedDisplay} 正确！ 分针指向${targetClock.minute}分，时针走过${targetClock.hour}时 🎉`);
                    setEffectTrigger(prev => prev+1);
                    // 播放动画
                    const clockElem = document.getElementById(`clock-${clockId}`);
                    if (clockElem) {
                        clockElem.classList.add('match-animation');
                        setTimeout(() => clockElem.classList.remove('match-animation'), 400);
                    }
                    return true;
                } else {
                    // 错误配对
                    setMessage(`❌ 配对错误！ ${draggedDisplay} 和这个时钟时间不一样，再仔细观察时针和分针的位置吧～`);
                    return false;
                }
            };
            
            // ----- 拖拽事件: 卡片 draggable -----
            const onCardDragStart = (e, card) => {
                // 检查卡片是否还存在未配对列表中
                if (!cards.some(c => c.id === card.id)) {
                    e.preventDefault();
                    setMessage("这张卡片已经配对成功了，不能拖拽啦！");
                    return false;
                }
                e.dataTransfer.setData("text/plain", JSON.stringify({ display: card.display, id: card.id }));
                e.dataTransfer.effectAllowed = "copy";
                if (e.target) e.target.style.opacity = "0.5";
            };
            const onCardDragEnd = (e) => {
                if (e.target) e.target.style.opacity = "";
            };
            
            // 时钟区域放置
            const onDropOnClock = (e, clock) => {
                e.preventDefault();
                setHighlightClockId(null);
                let dragData;
                try {
                    const raw = e.dataTransfer.getData("text/plain");
                    if (!raw) return;
                    dragData = JSON.parse(raw);
                } catch(err) {
                    setMessage("请从右侧卡片区域拖拽哦～");
                    return;
                }
                if (dragData && dragData.display) {
                    handleMatch(clock.id, dragData.display);
                } else {
                    setMessage("拖拽无效，请使用右侧的时间卡片～");
                }
            };
            
            const onDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = "copy";
            };
            
            const onDragEnterClock = (clockId) => setHighlightClockId(clockId);
            const onDragLeaveClock = () => setHighlightClockId(null);
            
            // 换一题按钮
            const handleChangeQuestion = () => {
                resetGame();
            };
            
            // 进度百分比
            const progressPercent = totalClocks > 0 ? (matchedCount / totalClocks) * 100 : 0;
            
            return (
                <div className="flex flex-col lg:flex-row gap-6 lg:gap-8">
                    {/* ========= 左侧知识点区 ========= */}
                    <div className="lg:w-2/5 bg-white/80 backdrop-blur-sm rounded-3xl shadow-xl p-5 md:p-6 border border-white/50">
                        <div className="border-b-4 border-lavender-primary pb-2 mb-4">
                            <h2 className="text-4xl md:text-5xl font-extrabold text-purple-800 flex items-center gap-2">
                                🕒 时间小课堂
                                <span className="text-xl bg-amber-200 px-3 py-1 rounded-full">几时几分</span>
                            </h2>
                        </div>
                        <div className="space-y-4 text-lg md:text-xl text-gray-800 leading-relaxed">
                            <p className="flex gap-2">
                                <span className="text-3xl">⏰</span>
                                <span><strong className="text-purple-700">认识几时几分：</strong> 先看时针（短针）走过数字几，就是几时；再看分针（长针）指着多少小格，每小格1分钟，也可以用5的乘法。</span>
                            </p>
                            <div className="bg-gradient-to-r from-indigo-50 to-pink-50 p-4 rounded-2xl shadow-inner">
                                <p className="font-bold text-purple-800 text-xl">📖 小口诀：</p>
                                <p>时针走过数字几，就是几时不会差；</p>
                                <p>分针指着刻度几，一大格5分记牢它。</p>
                                <p className="mt-2 text-sm bg-white/60 rounded-lg p-2">例：时针过3，分针指向6 → 3时30分 (3:30)</p>
                                <p className="text-sm mt-1">时针在两个数字之间，取较小的数字；分针每大格5分钟，小格1分钟。</p>
                            </div>
                            <div className="bg-purple-50 p-3 rounded-xl">
                                <p className="font-semibold">🧠 解决问题小技巧：</p>
                                <p>• 分针走1圈=60分钟=1小时<br/>• 30分钟=半小时，15分钟=一刻钟<br/>• 用乘法: 分针指向数字几，乘以5就是分钟数。</p>
                            </div>
                            <div className="mt-2 text-sm text-center text-purple-600 bg-white/60 rounded-xl p-2">
                                💡 <span className="font-medium">游戏玩法：</span> 右侧每个“时间卡片”可以拖拽，把它放到左边正确的时钟上，配对成功卡片就会消失！集齐所有时钟就通关啦～
                            </div>
                        </div>
                    </div>
                    
                    {/* ========= 右侧游戏互动区 (拖拽配对) ========= */}
                    <div className="lg:w-3/5 bg-white/80 backdrop-blur-md rounded-3xl shadow-xl p-5 md:p-6 flex flex-col gap-5">
                        <div className="flex justify-between items-center flex-wrap gap-3">
                            <h3 className="text-3xl md:text-4xl font-bold text-purple-800 flex items-center gap-2">
                                🧩 拖拖乐·时间配对
                                <span className="text-sm bg-yellow-200 px-2 py-0.5 rounded-full">拖拽挑战</span>
                            </h3>
                            <button 
                                onClick={handleChangeQuestion}
                                className="bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white font-bold py-2 px-6 rounded-full shadow-lg transition transform hover:scale-105 text-xl"
                            >
                                🔄 换一题
                            </button>
                        </div>
                        
                        {/* 进度条和计数 */}
                        <div className="space-y-1">
                            <div className="flex justify-between text-sm md:text-base font-semibold text-purple-800">
                                <span>⭐ 配对进度: {matchedCount} / {totalClocks}</span>
                                <span>🎯 学习目标: 认识几时几分</span>
                            </div>
                            <div className="bg-gray-200 rounded-full h-5 overflow-hidden">
                                <div className="bg-gradient-to-r from-green-400 to-emerald-500 h-full rounded-full transition-all duration-500" style={{width: `${progressPercent}%`}}></div>
                            </div>
                        </div>
                        
                        {/* 动态消息区域 */}
                        <div className="bg-purple-100/80 rounded-xl p-3 text-center text-purple-800 font-medium text-base shadow-sm">
                            💬 {message}
                        </div>
                        
                        {/* 时钟展示区域 (可放置区) */}
                        <div>
                            <h4 className="font-bold text-2xl text-purple-700 mb-3 flex items-center gap-2">⏲️ 时钟农场 (把卡片拖到这里)</h4>
                            <div className="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-4 justify-items-center">
                                {clocks.map(clock => (
                                    <div 
                                        key={clock.id}
                                        id={`clock-${clock.id}`}
                                        onDragOver={onDragOver}
                                        onDrop={(e) => onDropOnClock(e, clock)}
                                        onDragEnter={() => onDragEnterClock(clock.id)}
                                        onDragLeave={onDragLeaveClock}
                                        className={`relative w-36 p-3 rounded-2xl transition-all duration-200 flex flex-col items-center ${
                                            highlightClockId === clock.id ? 'drop-zone-active bg-yellow-50' : 'bg-white/40'
                                        } ${clock.matched ? 'bg-green-50/60 ring-2 ring-green-300' : 'hover:shadow-md'}`}
                                    >
                                        <AnalogClock hour={clock.hour} minute={clock.minute} isMatched={clock.matched} />
                                        <div className="mt-2 text-center">
                                            {!clock.matched ? (
                                                <span className="text-xs font-semibold text-purple-600 bg-purple-100 px-2 py-0.5 rounded-full">等待配对</span>
                                            ) : (
                                                <span className="text-xs font-bold text-green-700 bg-green-100 px-2 py-0.5 rounded-full flex items-center gap-1">
                                                    ✅ {clock.display}
                                                </span>
                                            )}
                                        </div>
                                        <div className="text-[11px] text-gray-500 mt-1">目标时间</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                        {/* 可拖拽卡片区 */}
                        <div>
                            <h4 className="font-bold text-2xl text-purple-700 mb-2 flex items-center gap-2">🎴 时间卡片 (拖拽到左边时钟)</h4>
                            <div className="flex flex-wrap gap-3 justify-start items-center min-h-[130px] bg-white/40 rounded-2xl p-3 custom-scroll overflow-x-auto">
                                {cards.length === 0 ? (
                                    <div className="w-full text-center py-6 text-green-700 font-bold text-2xl">🎉 太棒了！所有时间都配对成功！ 🎉</div>
                                ) : (
                                    cards.map(card => (
                                        <div 
                                            key={card.id}
                                            draggable="true"
                                            onDragStart={(e) => onCardDragStart(e, card)}
                                            onDragEnd={onCardDragEnd}
                                            className="bg-gradient-to-br from-amber-200 to-orange-200 w-28 h-28 rounded-2xl flex flex-col items-center justify-center shadow-lg cursor-grab active:cursor-grabbing transition hover:scale-105 select-none"
                                        >
                                            <span className="text-4xl">🃏</span>
                                            <span className="text-3xl font-black text-purple-900">{card.display}</span>
                                            <span className="text-[10px] text-gray-700 mt-1">拖拽我配对</span>
                                        </div>
                                    ))
                                )}
                            </div>
                            <p className="text-xs text-center text-purple-600 mt-2">👉 长按或按住卡片，拖到对应的时钟上松手，就能配对啦！</p>
                        </div>
                        
                        {/* 操作小贴士和重置辅助 */}
                        <div className="flex flex-wrap justify-between items-center text-xs text-purple-600 bg-white/50 rounded-xl p-2 mt-1">
                            <span>✋ 拖拽技巧：从卡片拖到时钟区域，配对正确会有动画提示。</span>
                            <button onClick={() => setMessage("⏰ 拖拽右边卡片到左边对应的时钟，看时针和分针的位置匹配时间数字！")} className="underline text-purple-700">❓ 再试一次提示</button>
                        </div>
                        
                        {allMatched && totalClocks > 0 && (
                            <div className="mt-2 text-center text-2xl font-bold text-green-700 bg-green-100 rounded-2xl p-3 animate-bounce">
                                🏆 完美通关！ 你已经是认识几时几分的小专家啦 🏆
                            </div>
                        )}
                    </div>
                </div>
            );
        };
        
        // ---------- 根组件 ----------
        const App = () => {
            return (
                <div className="min-h-screen py-2">
                    <div className="text-center mb-5 mt-1">
                        <h1 className="text-5xl md:text-7xl font-black text-white drop-shadow-xl tracking-wider" style={{textShadow: "3px 3px 0 #7e22ce"}}>
                            🕰️ 时间探险家 · 几时几分 🧸
                        </h1>
                        <p className="text-white/90 text-xl md:text-2xl mt-2 font-medium">拖一拖，配配对，轻松学会认时间！</p>
                    </div>
                    <TimeMatchingGame />
                    <footer className="text-center text-white/80 text-sm mt-8 pb-3">
                        🌟 把时间卡片拽到正确的时钟上，配对成功就能获得知识勋章～ 点击【换一题】继续挑战新时间 🌟
                    </footer>
                </div>
            );
        };
        
        // 渲染
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
