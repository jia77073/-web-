<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>🔢 最大公因数 & 最小公倍数 · 战术工坊</title>
  <!-- Tailwind + React CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .drag-card {
      transition: all 0.1s ease;
      cursor: grab;
    }
    .drag-card:active {
      cursor: grabbing;
    }
    .drag-card.disabled-card {
      cursor: default;
      opacity: 0.6;
      filter: grayscale(0.1);
    }
    .drop-slot {
      transition: all 0.2s ease;
      background-color: rgba(245, 245, 220, 0.5);
      border: 2px dashed #8b9a6e;
    }
    .drop-slot.drag-over {
      background-color: #e9f5d9;
      border-color: #3b5e2b;
      transform: scale(1.02);
    }
    .drop-slot.filled-slot {
      background-color: #d4e2c3;
      border: 2px solid #5b8c3e;
      cursor: default;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .celebration {
      animation: bounce 0.5s ease-in-out;
    }
    .military-bg {
      background-image: radial-gradient(circle at 15% 30%, rgba(75, 85, 40, 0.08) 2.5%, transparent 2.8%);
      background-size: 32px 32px;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#3F5130] to-[#2A3A1C] min-h-screen flex items-center justify-center p-4 font-sans military-bg">

<div id="root" class="w-full max-w-7xl mx-auto"></div>

<script type="text/babel">
  // ---------- 工具函数：最大公因数（欧几里得）& 最小公倍数 ----------
  const computeGCD = (a, b) => {
    a = Math.abs(a);
    b = Math.abs(b);
    while (b !== 0) {
      let temp = b;
      b = a % b;
      a = temp;
    }
    return a;
  };
  const computeLCM = (a, b) => {
    if (a === 0 || b === 0) return 0;
    return Math.abs(a * b) / computeGCD(a, b);
  };

  // ---------- 生成有趣的数对（范围 6~50，确保不是互质数，gcd>=2，便于练习）----------
  const generateRandomPair = (existingPairsSet) => {
    let maxAttempts = 35;
    for (let attempt = 0; attempt < maxAttempts; attempt++) {
      let a = Math.floor(Math.random() * 40) + 8;  // 8~47
      let b = Math.floor(Math.random() * 40) + 8;
      if (a === b) b = b + (Math.random() > 0.5 ? 3 : -3);
      if (b < 6) b = a + 2;
      let gcd = computeGCD(a, b);
      if (gcd >= 2 && gcd <= 15 && a !== b && a <= 55 && b <= 55) {
        let lcm = computeLCM(a, b);
        // 避免过大lcm > 300 不太利于基础练习
        if (lcm <= 280 && !existingPairsSet.has(`${a},${b}`) && !existingPairsSet.has(`${b},${a}`)) {
          existingPairsSet.add(`${a},${b}`);
          return { a, b, gcd, lcm };
        }
      }
    }
    // 保底优质数对
    return { a: 12, b: 18, gcd: 6, lcm: 36 };
  };

  // 生成一组数对 (4~5组)
  const generatePairSet = (count = 4) => {
    let pairs = [];
    let usedSet = new Set();
    for (let i = 0; i < count; i++) {
      let pair = generateRandomPair(usedSet);
      pairs.push({
        id: `pair-${Date.now()}-${i}-${Math.random()}`,
        a: pair.a,
        b: pair.b,
        gcd: pair.gcd,
        lcm: pair.lcm,
        gcdMatched: false,
        lcmMatched: false,
        gcdValue: null,
        lcmValue: null
      });
    }
    return pairs;
  };

  // 生成答案卡片池：包含所有正确结果 + 若干干扰项（不重复且不与正确值冲突）
  const generateAnswerCards = (pairs) => {
    let correctValues = new Set();
    pairs.forEach(p => {
      correctValues.add(p.gcd);
      correctValues.add(p.lcm);
    });
    let correctArray = Array.from(correctValues);
    // 干扰池（常见的公因数公倍数附近的数字）
    let distractorsPool = [2, 3, 4, 5, 8, 9, 10, 12, 14, 15, 16, 18, 20, 21, 24, 27, 28, 30, 32, 35, 36, 40, 42, 45, 48, 50, 54, 56, 60, 63, 70, 72];
    let usedDistractors = new Set();
    let finalDistractors = [];
    // 需要添加干扰项数量 = 正确值数量（保证游戏丰富度）
    let neededDistractors = Math.min(correctArray.length, 4);
    for (let d of distractorsPool) {
      if (!correctValues.has(d) && !usedDistractors.has(d) && finalDistractors.length < neededDistractors) {
        finalDistractors.push(d);
        usedDistractors.add(d);
      }
      if (finalDistractors.length >= neededDistractors) break;
    }
    // 如果干扰不够，再加几个常见数
    let extra = [7, 25, 32];
    for (let e of extra) {
      if (!correctValues.has(e) && !usedDistractors.has(e) && finalDistractors.length < neededDistractors + 1) {
        finalDistractors.push(e);
      }
    }
    let allCardValues = [...correctArray, ...finalDistractors];
    // 打乱顺序
    for (let i = allCardValues.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [allCardValues[i], allCardValues[j]] = [allCardValues[j], allCardValues[i]];
    }
    // 生成卡片对象
    return allCardValues.map((val, idx) => ({
      id: `card-${Date.now()}-${idx}-${Math.random()}`,
      value: val,
      used: false     // 是否已经被正确匹配
    }));
  };

  // ---------- 左侧知识点卡片：最大公因数 & 最小公倍数 ----------
  const KnowledgeCard = () => {
    return (
      <div className="bg-[#2C3823]/90 backdrop-blur-sm rounded-3xl p-5 shadow-2xl border border-[#9AAE5C] text-[#F7F5D0] h-full">
        <div className="flex items-center gap-2 border-b-2 border-[#B4C77A] pb-3 mb-4">
          <span className="text-4xl">📐</span>
          <h2 className="text-2xl font-extrabold tracking-wide">最大公因数 & 最小公倍数<br/><span className="text-sm font-normal text-[#E3E2B3]">战术解析 · 精准打击</span></h2>
        </div>
        <div className="space-y-4">
          <div className="bg-[#3F5230]/90 rounded-2xl p-4 border border-[#A9B86B]">
            <p className="font-bold text-[#F9EF9E] flex items-center gap-2">⚙️ 最大公因数（GCD）</p>
            <p className="text-sm mt-1">几个数公有的因数中最大的一个。也叫最大公约数。</p>
            <div className="mt-2 text-xs bg-[#2A351E]/70 p-2 rounded-lg">📌 例：12和18的公因数有1,2,3,6 → GCD = 6</div>
            <div className="mt-1 text-xs italic">👉 短除法 / 欧几里得算法快速求。</div>
          </div>
          <div className="bg-[#3F5230]/90 rounded-2xl p-4 border border-[#A9B86B]">
            <p className="font-bold text-[#F9EF9E]">📐 最小公倍数（LCM）</p>
            <p className="text-sm mt-1">几个数公有的倍数中最小的一个。</p>
            <div className="mt-2 text-xs bg-[#2A351E]/70 p-2 rounded-lg">📌 例：4和6的公倍数有12,24… → LCM = 12</div>
            <div className="mt-1 text-xs">公式：LCM(a,b) = a×b ÷ GCD(a,b)</div>
          </div>
          <div className="bg-[#4F6138]/80 rounded-2xl p-3 text-center text-sm border border-[#C3D67C]">
            🎯 训练法则：将右侧「数字弹药卡」拖拽到对应的「GCD槽位」或「LCM槽位」。全部填满即完成特训！
          </div>
        </div>
      </div>
    );
  };

  // ---------- 主游戏组件: 公因数公倍数 配对挑战 ----------
  const GCDLCMGame = ({ resetKey, onNewGame }) => {
    const [pairs, setPairs] = React.useState(() => generatePairSet(4));
    const [answerCards, setAnswerCards] = React.useState(() => []);
    const [errorMsg, setErrorMsg] = React.useState('');
    const [isVictory, setIsVictory] = React.useState(false);

    // 初始化卡片池（依赖pairs）
    const initCards = (currentPairs) => {
      return generateAnswerCards(currentPairs);
    };

    // 当pairs变化时重置卡片
    React.useEffect(() => {
      setAnswerCards(initCards(pairs));
    }, [pairs]);

    // 检查胜利：所有数对的gcd槽和lcm槽都被填满
    const checkVictory = (currentPairs) => {
      if (currentPairs.length === 0) return false;
      const allFilled = currentPairs.every(p => p.gcdMatched === true && p.lcmMatched === true);
      if (allFilled && !isVictory) {
        setIsVictory(true);
      } else if (!allFilled && isVictory) {
        setIsVictory(false);
      }
    };

    // 更新配对状态后检查胜利
    const updateAndCheckVictory = (newPairs) => {
      setPairs(newPairs);
      checkVictory(newPairs);
    };

    // 重置整个游戏（生成全新数对 & 新卡片）
    const resetGame = () => {
      const newPairs = generatePairSet(4);
      setPairs(newPairs);
      setAnswerCards(initCards(newPairs));
      setIsVictory(false);
      setErrorMsg('');
    };

    React.useEffect(() => {
      resetGame();
    }, [resetKey]);

    // 拖拽卡片数据准备
    const onDragStart = (e, card) => {
      if (card.used) {
        e.preventDefault();
        return false;
      }
      e.dataTransfer.setData('text/plain', JSON.stringify({ cardId: card.id, cardValue: card.value }));
      e.dataTransfer.effectAllowed = 'copy';
      e.target.style.opacity = '0.6';
    };
    const onDragEnd = (e) => {
      if (e.target) e.target.style.opacity = '';
    };

    // 槽位拖拽悬停
    const onDragOverSlot = (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
      e.currentTarget.classList.add('drag-over');
    };
    const onDragLeaveSlot = (e) => {
      e.currentTarget.classList.remove('drag-over');
    };

    // 处理放置到具体槽位 (pairId, slotType: 'gcd' 或 'lcm')
    const onDropToSlot = (e, pairId, slotType) => {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const rawData = e.dataTransfer.getData('text/plain');
      if (!rawData) return;
      let draggedCardId, draggedValue;
      try {
        const parsed = JSON.parse(rawData);
        draggedCardId = parsed.cardId;
        draggedValue = parsed.cardValue;
      } catch (err) {
        return;
      }

      // 查找卡片
      const targetCard = answerCards.find(c => c.id === draggedCardId);
      if (!targetCard || targetCard.used) {
        setErrorMsg('⚠️ 这个数字卡已经使用过了！不能重复投放。');
        setTimeout(() => setErrorMsg(''), 1400);
        return;
      }

      // 查找对应的数对
      const targetPairIndex = pairs.findIndex(p => p.id === pairId);
      if (targetPairIndex === -1) return;
      const targetPair = pairs[targetPairIndex];

      // 检查槽位是否已经被填充
      if ((slotType === 'gcd' && targetPair.gcdMatched) || (slotType === 'lcm' && targetPair.lcmMatched)) {
        setErrorMsg(`🚫 这个${slotType === 'gcd' ? '最大公因数' : '最小公倍数'}槽位已有答案，不能重复放置！`);
        setTimeout(() => setErrorMsg(''), 1300);
        return;
      }

      // 验证数值是否正确
      const expectedValue = slotType === 'gcd' ? targetPair.gcd : targetPair.lcm;
      if (draggedValue !== expectedValue) {
        let correctHint = `正确${slotType === 'gcd' ? 'GCD' : 'LCM'}是 ${expectedValue}。`;
        setErrorMsg(`❌ 匹配错误！ ${draggedValue} 不是 ${targetPair.a} 和 ${targetPair.b} 的${slotType === 'gcd' ? '最大公因数' : '最小公倍数'}。${correctHint} 再试试看～`);
        setTimeout(() => setErrorMsg(''), 1800);
        return;
      }

      // 正确匹配：更新卡片状态（设为已使用） + 更新数对槽位
      // 更新卡片池
      setAnswerCards(prevCards =>
        prevCards.map(card =>
          card.id === draggedCardId ? { ...card, used: true } : card
        )
      );
      // 更新数对
      const newPairs = [...pairs];
      if (slotType === 'gcd') {
        newPairs[targetPairIndex].gcdMatched = true;
        newPairs[targetPairIndex].gcdValue = draggedValue;
      } else {
        newPairs[targetPairIndex].lcmMatched = true;
        newPairs[targetPairIndex].lcmValue = draggedValue;
      }
      updateAndCheckVictory(newPairs);
      setErrorMsg('');
    };

    // 重置当前进度（不清除数对，只重置匹配状态和卡片池使用状态）
    const resetProgress = () => {
      // 重置所有数对的匹配状态
      const resetPairs = pairs.map(p => ({
        ...p,
        gcdMatched: false,
        lcmMatched: false,
        gcdValue: null,
        lcmValue: null
      }));
      // 重置所有卡片的 used 状态（保留原卡片数值，重新洗牌？但重置后让所有卡片重新可用，不改变卡片集合，但是需要保持初始未使用）
      const resetCards = answerCards.map(card => ({
        ...card,
        used: false
      }));
      // 可选洗牌顺序：打乱卡片让体验更好
      const shuffledCards = [...resetCards];
      for (let i = shuffledCards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledCards[i], shuffledCards[j]] = [shuffledCards[j], shuffledCards[i]];
      }
      setPairs(resetPairs);
      setAnswerCards(shuffledCards);
      setIsVictory(false);
      setErrorMsg('');
    };

    // 全新游戏（重新生成数对和卡片池）
    const newGameFull = () => {
      resetGame();
      if (onNewGame) onNewGame();
    };

    // 统计已匹配槽位数
    const totalSlots = pairs.length * 2;
    const filledSlots = pairs.reduce((acc, p) => acc + (p.gcdMatched ? 1 : 0) + (p.lcmMatched ? 1 : 0), 0);
    const progressPercent = totalSlots === 0 ? 0 : (filledSlots / totalSlots) * 100;

    // 胜利组件
    const VictoryMessage = () => (
      <div className="text-center bg-gradient-to-r from-[#6E8644] to-[#4B6234] rounded-2xl p-3 mt-2 animate-bounce shadow-xl border border-[#F6EAA2]">
        <div className="text-2xl font-bold text-[#FFF7CF]">🏅 战术大师！全数对攻克 🏅</div>
        <div className="text-sm text-[#FEF9CF] font-semibold">所有公因数/公倍数匹配完成！点击「全新特训」继续挑战～</div>
      </div>
    );

    return (
      <div className="flex flex-col gap-5">
        {/* 进度士气条 */}
        <div className="flex justify-between items-center bg-[#2F3A25]/80 backdrop-blur-sm rounded-2xl px-5 py-2 shadow-md border border-[#859B54]">
          <div className="flex items-center gap-2">
            <span className="text-2xl">🎯</span>
            <span className="font-bold text-[#F0EFC5]">攻克进度</span>
            <span className="text-lg font-black text-[#FFEFA4]">{filledSlots} / {totalSlots}</span>
          </div>
          <div className="w-36 bg-[#4F5D38] rounded-full h-2.5">
            <div className="bg-[#EBBF2E] h-2.5 rounded-full transition-all duration-300" style={{ width: `${progressPercent}%` }}></div>
          </div>
          <div className="text-xs bg-[#556B2F] px-2 py-1 rounded-full text-[#F6F2C8] border border-[#B1C27A]">🧩 拖拽数字弹药 精准入槽</div>
        </div>

        {/* 数对区域：展示每个数对 + 两个槽位 */}
        <div className="bg-[#3E4F2C]/70 rounded-2xl p-4 backdrop-blur-sm border border-[#9FB062]">
          <div className="text-center text-sm font-semibold text-[#F5F3C4] mb-3">📌 战术数对 | 将正确数字拖拽到对应槽位</div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
            {pairs.map((pair) => (
              <div key={pair.id} className="bg-[#2B3720]/80 rounded-xl p-3 border border-[#B5CA74] shadow-md">
                <div className="flex justify-center items-center gap-3 text-2xl font-bold text-[#FFFAD0]">
                  <span className="bg-[#495F30] px-4 py-1 rounded-full text-lg">{pair.a}</span>
                  <span className="text-[#DEE89C] text-xl">🔗</span>
                  <span className="bg-[#495F30] px-4 py-1 rounded-full text-lg">{pair.b}</span>
                </div>
                <div className="grid grid-cols-2 gap-3 mt-4">
                  {/* GCD 槽位 */}
                  <div
                    className={`drop-slot rounded-xl p-2 text-center transition-all ${pair.gcdMatched ? 'filled-slot bg-[#B9D18B]' : ''}`}
                    onDragOver={onDragOverSlot}
                    onDragLeave={onDragLeaveSlot}
                    onDrop={(e) => onDropToSlot(e, pair.id, 'gcd')}
                  >
                    <div className="text-xs font-bold text-[#DEE6B0] uppercase tracking-wide">📐 最大公因数</div>
                    {pair.gcdMatched ? (
                      <div className="text-2xl font-black text-[#2C3E1F] mt-1">{pair.gcdValue}</div>
                    ) : (
                      <div className="text-sm text-[#F5F2C2] mt-1 border-t border-dashed border-[#AAB96E] pt-1">⬅️ 拖拽数字至此</div>
                    )}
                  </div>
                  {/* LCM 槽位 */}
                  <div
                    className={`drop-slot rounded-xl p-2 text-center transition-all ${pair.lcmMatched ? 'filled-slot bg-[#B9D18B]' : ''}`}
                    onDragOver={onDragOverSlot}
                    onDragLeave={onDragLeaveSlot}
                    onDrop={(e) => onDropToSlot(e, pair.id, 'lcm')}
                  >
                    <div className="text-xs font-bold text-[#DEE6B0] uppercase tracking-wide">📐 最小公倍数</div>
                    {pair.lcmMatched ? (
                      <div className="text-2xl font-black text-[#2C3E1F] mt-1">{pair.lcmValue}</div>
                    ) : (
                      <div className="text-sm text-[#F5F2C2] mt-1 border-t border-dashed border-[#AAB96E] pt-1">⬅️ 拖拽数字至此</div>
                    )}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* 答案卡片池（数字弹药） */}
        <div className="bg-[#2B3920]/80 rounded-2xl p-4 border border-[#95A858]">
          <div className="text-center text-sm font-semibold text-[#F5F2BF] mb-2">🎲 数字弹药库（拖拽到对应槽位）</div>
          <div className="flex flex-wrap justify-center gap-3">
            {answerCards.map(card => (
              <div
                key={card.id}
                draggable={!card.used}
                onDragStart={(e) => onDragStart(e, card)}
                onDragEnd={onDragEnd}
                className={`drag-card w-20 h-20 rounded-xl shadow-lg flex items-center justify-center text-2xl font-black transition-all ${
                  card.used 
                    ? 'bg-gray-500/60 cursor-default border-2 border-gray-400 text-gray-300' 
                    : 'bg-gradient-to-br from-[#7C954A] to-[#556B2F] cursor-grab active:cursor-grabbing hover:scale-105 border-2 border-[#F6EBA6] text-[#FFFCD1]'
                }`}
              >
                {card.used ? '✅' : card.value}
              </div>
            ))}
            {answerCards.length === 0 && <div className="text-[#CFDF97] p-2">加载中...</div>}
          </div>
          <div className="text-[11px] text-center text-[#DDE6AE] mt-2">💡 每个数字卡只能用一次，全部正确填入槽位即可凯旋</div>
        </div>

        {/* 错误提示 */}
        {errorMsg && (
          <div className="text-center bg-[#2E2A1C]/90 text-[#FFE1A0] font-bold p-2.5 rounded-xl border-l-8 border-[#FFAD49] backdrop-blur-sm animate-pulse shadow">
            {errorMsg}
          </div>
        )}

        {/* 胜利消息 */}
        {isVictory && <VictoryMessage />}

        {/* 操作按钮组 */}
        <div className="flex gap-3 mt-1">
          <button 
            onClick={resetProgress}
            className="flex-1 bg-[#836E3D] hover:bg-[#6C562F] text-[#FFF6D3] font-bold py-2.5 rounded-full transition shadow-md text-base active:scale-[0.98] border border-[#CDB37A]"
          >
            🔄 重置本关进度（清空槽位）
          </button>
          <button 
            onClick={newGameFull}
            className="flex-1 bg-[#506C33] hover:bg-[#3D5424] text-[#FFFAD6] font-bold py-2.5 rounded-full transition shadow-md text-base active:scale-[0.98] border border-[#A8C26A]"
          >
            🧺 全新特训（换一批数对）
          </button>
        </div>
        <div className="text-xs text-center text-[#E2EBB0] bg-[#28361C]/80 rounded-full py-1.5 px-3 backdrop-blur-sm">
          💡 战术指南：先分别计算每个数对的GCD和LCM，再将正确的数字弹药拖拽到对应槽位。全部填满即获胜！
        </div>
      </div>
    );
  };

  // ---------- 主应用 ----------
  const App = () => {
    const [gameResetKey, setGameResetKey] = React.useState(0);
    const handleNewGame = () => {
      setGameResetKey(prev => prev + 1);
    };
    return (
      <div className="flex flex-col lg:flex-row gap-6">
