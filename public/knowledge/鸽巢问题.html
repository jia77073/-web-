<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>数学小侦探：鸽巢原理 | 抽屉拖拖乐</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 配置主题：淡紫色 + 标题3号 + 内容5号 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontSize: {
                        '5xl': '3rem',
                        '3xl': '1.875rem',
                    },
                    colors: {
                        'lavender-primary': '#CBAACB',
                        'lavender-light': '#D9C2E6',
                    }
                }
            }
        }
    </script>
    <style>
        [draggable="true"] {
            cursor: grab;
            touch-action: manipulation;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        [draggable="true"]:active {
            cursor: grabbing;
        }
        .drop-zone-active {
            background-color: #fef9c3 !important;
            border-color: #eab308 !important;
            transform: scale(1.02);
            transition: all 0.2s ease;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; background-color: #f0fdf4; }
            50% { opacity: 0.8; background-color: #bbf7d0; }
        }
        .animate-correct {
            animation: pulse 0.5s ease-in-out;
        }
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #CBAACB;
            border-radius: 10px;
        }
        .no-tap-highlight {
            -webkit-touch-callout: none;
        }
        .drawer-item {
            transition: all 0.1s;
        }
    </style>
    <!-- React & ReactDOM & Babel -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gradient-to-br from-lavender-primary to-lavender-light min-h-screen p-4 md:p-5 font-sans no-tap-highlight">
    <div id="root" class="max-w-7xl mx-auto"></div>

    <script type="text/babel">
        // React 主逻辑: 鸽巢原理（抽屉原理）—— 拖拽物品分配游戏
        const { useState, useEffect, useCallback, useRef } = React;

        // ---------- 辅助函数：随机生成题目 ----------
        // 生成物品数量 (5~15) 和抽屉数量 (2~5)，确保物品数 > 抽屉数
        const generateProblem = () => {
            let drawers = Math.floor(Math.random() * 4) + 2; // 2~5
            let items = Math.floor(Math.random() * 12) + 6; // 6~17
            if (items <= drawers) items = drawers + Math.floor(Math.random() * 5) + 2;
            // 计算鸽巢原理结果: 至少有一个抽屉至少有 ceil(items / drawers) 个物品
            const atLeast = Math.ceil(items / drawers);
            return {
                id: Date.now() + Math.random(),
                drawersCount: drawers,
                itemsCount: items,
                atLeast: atLeast,
                description: `有 ${items} 个物品（🍎 苹果）放进 ${drawers} 个抽屉中。`
            };
        };
        
        // ---------- 主游戏组件: 拖拽分配物品到抽屉 ----------
        const PigeonholeGame = () => {
            const [currentProblem, setCurrentProblem] = useState(null);
            // 每个抽屉中的物品列表（存储物品的唯一id）
            const [drawers, setDrawers] = useState([]); // 每个元素是一个数组，存放物品id
            // 未分配的物品列表
            const [unassignedItems, setUnassignedItems] = useState([]);
            // 消息与得分
            const [message, setMessage] = useState("🐣 把苹果拖拽到抽屉里，亲自验证鸽巢原理！");
            const [score, setScore] = useState(0);
            const [highlightDrawerIdx, setHighlightDrawerIdx] = useState(null);
            const [effectTrigger, setEffectTrigger] = useState(0);
            const [showPrinciple, setShowPrinciple] = useState(false);
            
            // 加载新题目
            const loadNewProblem = () => {
                const problem = generateProblem();
                setCurrentProblem(problem);
                // 初始化抽屉：每个抽屉为空数组
                const initialDrawers = Array(problem.drawersCount).fill().map(() => []);
                setDrawers(initialDrawers);
                // 生成未分配物品：每个物品有唯一id
                const items = [];
                for (let i = 1; i <= problem.itemsCount; i++) {
                    items.push({ id: `item_${problem.id}_${i}`, label: `🍎 ${i}` });
                }
                setUnassignedItems(items);
                setMessage(`✨ 新题目：${problem.description} 至少有一个抽屉会有多少个苹果？拖拽苹果到抽屉里验证！ ✨`);
                setHighlightDrawerIdx(null);
                setShowPrinciple(false);
                setEffectTrigger(prev => prev+1);
            };
            
            // 换一题
            const handleChangeQuestion = () => {
                loadNewProblem();
            };
            
            // 初始化
            useEffect(() => {
                loadNewProblem();
            }, []);
            
            // 拖拽物品到抽屉
            const onItemDragStart = (e, item) => {
                e.dataTransfer.setData("text/plain", JSON.stringify({ type: 'item', itemId: item.id }));
                e.dataTransfer.effectAllowed = "copy";
                if (e.target) e.target.style.opacity = "0.6";
            };
            const onItemDragEnd = (e) => {
                if (e.target) e.target.style.opacity = "";
            };
            
            const handleDropOnDrawer = (e, drawerIdx) => {
                e.preventDefault();
                setHighlightDrawerIdx(null);
                let dragData;
                try {
                    const raw = e.dataTransfer.getData("text/plain");
                    if (!raw) return;
                    dragData = JSON.parse(raw);
                } catch(err) {
                    return;
                }
                if (dragData.type === 'item') {
                    const itemId = dragData.itemId;
                    // 在未分配物品中找到该物品
                    const itemIndex = unassignedItems.findIndex(item => item.id === itemId);
                    if (itemIndex === -1) {
                        setMessage("这个物品已经在抽屉里了！不能重复拖拽。");
                        return;
                    }
                    const item = unassignedItems[itemIndex];
                    // 移动物品到抽屉
                    setDrawers(prev => {
                        const newDrawers = [...prev];
                        newDrawers[drawerIdx] = [...newDrawers[drawerIdx], item];
                        return newDrawers;
                    });
                    setUnassignedItems(prev => prev.filter((_, idx) => idx !== itemIndex));
                    setMessage(`将 ${item.label} 放入了抽屉 ${drawerIdx + 1}`);
                    setEffectTrigger(prev => prev+1);
                }
            };
            
            const onDragOver = (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = "copy";
            };
            const onDragEnterDrawer = (idx) => setHighlightDrawerIdx(idx);
            const onDragLeaveDrawer = () => setHighlightDrawerIdx(null);
            
            // 从抽屉中移回物品
            const removeFromDrawer = (drawerIdx, itemIdx) => {
                const item = drawers[drawerIdx][itemIdx];
                setDrawers(prev => {
                    const newDrawers = [...prev];
                    newDrawers[drawerIdx] = newDrawers[drawerIdx].filter((_, idx) => idx !== itemIdx);
                    return newDrawers;
                });
                setUnassignedItems(prev => [...prev, item]);
                setMessage(`将 ${item.label} 移回待分配区`);
            };
            
            // 重置所有分配
            const resetAllocation = () => {
                if (!currentProblem) return;
                // 收集所有抽屉中的物品
                const allItems = drawers.flat();
                setUnassignedItems(allItems);
                setDrawers(Array(currentProblem.drawersCount).fill().map(() => []));
                setMessage("已清空所有抽屉，重新拖拽分配吧！");
                setShowPrinciple(false);
            };
            
            // 实时计算每个抽屉的数量和最大值
            const drawerCounts = drawers.map(d => d.length);
            const maxCount = drawerCounts.length > 0 ? Math.max(...drawerCounts) : 0;
            const totalAssigned = drawerCounts.reduce((a,b) => a+b, 0);
            const remaining = currentProblem ? currentProblem.itemsCount - totalAssigned : 0;
            const isFullAssigned = totalAssigned === currentProblem?.itemsCount;
            
            // 鸽巢原理理论值
            const theoreticalAtLeast = currentProblem ? currentProblem.atLeast : 0;
            const isPrincipleSatisfied = maxCount >= theoreticalAtLeast;
            
            // 如果全部放完，显示结论并加分（仅一次）
            useEffect(() => {
                if (isFullAssigned && currentProblem && !showPrinciple) {
                    setShowPrinciple(true);
                    if (isPrincipleSatisfied) {
                        setMessage(`🎉 分配完成！抽屉中最多有 ${maxCount} 个苹果。根据鸽巢原理，至少有一个抽屉有 ${theoreticalAtLeast} 个苹果，你的分配验证了这个结论！ +1分 🎉`);
                        setScore(prev => prev + 1);
                        const area = document.getElementById('game-area');
                        if (area) area.classList.add('animate-correct');
                        setTimeout(() => area?.classList.remove('animate-correct'), 500);
                    } else {
                        // 理论上不会发生，因为 maxCount 必然 >= theoreticalAtLeast，但以防万一
                        setMessage(`⚠️ 分配完成，但当前最大数量 ${maxCount} 小于理论值 ${theoreticalAtLeast}，这不可能！请检查分配逻辑。`);
                    }
                }
            }, [isFullAssigned, currentProblem, maxCount, theoreticalAtLeast, isPrincipleSatisfied, showPrinciple]);
            
            if (!currentProblem) return <div className="text-white text-2xl">加载题目中...</div>;
            
            // 鸽巢原理解释
            const principleExplanation = `根据抽屉原理，将 ${currentProblem.itemsCount} 个苹果放入 ${currentProblem.drawersCount} 个抽屉，至少有一个抽屉有 ${theoreticalAtLeast} 个苹果。因为 ${currentProblem.itemsCount} ÷ ${currentProblem.drawersCount} = ${(currentProblem.itemsCount / currentProblem.drawersCount).toFixed(2)}，向上取整得 ${theoreticalAtLeast}。`;
            
            return (
                <div className="flex flex-col lg:flex-row gap-6 lg:gap-8">
                    {/* 左侧知识点区 */}
                    <div className="lg:w-2/5 bg-white/80 backdrop-blur-sm rounded-3xl shadow-xl p-5 md:p-6 border border-white/50">
                        <div className="border-b-4 border-lavender-primary pb-2 mb-4">
                            <h2 className="text-3xl md:text-4xl font-extrabold text-purple-800 flex items-center gap-2">
                                🕊️ 鸽巢原理小课堂
                                <span className="text-lg bg-amber-200 px-3 py-0.5 rounded-full">抽屉原理</span>
                            </h2>
                        </div>
                        <div className="space-y-5 text-base md:text-lg text-gray-800 leading-relaxed">
                            <p className="flex gap-2">
                                <span className="text-3xl">📦</span>
                                <span><strong className="text-purple-700">鸽巢原理</strong>：如果把 n+1 个物体放进 n 个抽屉，至少有一个抽屉有 2 个物体。推广：把 m 个物体放进 n 个抽屉，至少有一个抽屉有 ⌈m/n⌉ 个物体。</span>
                            </p>
                            <div className="bg-gradient-to-r from-indigo-50 to-pink-50 p-4 rounded-2xl shadow-inner space-y-3">
                                <p className="font-bold text-2xl text-center text-purple-800">📖 核心公式</p>
                                <ul className="list-disc list-inside text-base space-y-1">
                                    <li>✨ <strong>至少数</strong> = ⌈物体总数 ÷ 抽屉数⌉</li>
                                    <li>✨ “总有” 表示无论怎么放都存在，“至少” 表示最少数量。</li>
                                </ul>
                                <div className="bg-amber-50 rounded-xl p-2 text-center">
                                    <p>💡 生活例子：<br/>13 个小朋友中至少有 2 人在同一个月出生。</p>
                                </div>
                            </div>
                            <div className="bg-purple-50 p-3 rounded-xl">
                                <p className="font-semibold">🧸 解题步骤：</p>
                                <p>1️⃣ 确定“抽屉”数和“物体”数。<br/>2️⃣ 用物体数 ÷ 抽屉数，有余数则加 1。<br/>3️⃣ 回答“至少有一个抽屉有 X 个物体”。</p>
                            </div>
                            <div className="mt-2 text-sm text-center text-purple-600 bg-white/60 rounded-xl p-2">
                                💡 <span className="font-medium">游戏玩法：</span> 把右边的苹果拖拽到下方抽屉里，分配所有苹果后系统会自动验证鸽巢原理！你可以尝试不同放法，观察“至少有一个抽屉”的数量是否总满足理论值。
                            </div>
                        </div>
                    </div>
                    
                    {/* 右侧游戏互动区 */}
                    <div className="lg:w-3/5 bg-white/80 backdrop-blur-md rounded-3xl shadow-xl p-5 md:p-6 flex flex-col gap-5" id="game-area">
                        <div className="flex justify-between items-center flex-wrap gap-3">
                            <h3 className="text-2xl md:text-3xl font-bold text-purple-800 flex items-center gap-2">
                                🧩 抽屉实验 · 拖拖乐
                                <span className="text-sm bg-yellow-200 px-2 py-0.5 rounded-full">拖拽分配</span>
                            </h3>
                            <div className="flex items-center gap-3">
                                <div className="bg-amber-100 rounded-full px-4 py-1 text-xl font-bold text-amber-800">
                                    🏆 得分: {score}
                                </div>
                                <button 
                                    onClick={handleChangeQuestion}
                                    className="bg-gradient-to-r from-indigo-500 to-purple-500 hover:from-indigo-600 hover:to-purple-600 text-white font-bold py-2 px-5 rounded-full shadow-lg transition transform hover:scale-105 text-base"
                                >
                                    🔄 换一题
                                </button>
                            </div>
                        </div>
                        
                        {/* 题目展示 */}
                        <div className="bg-purple-100/80 rounded-xl p-3 text-center">
                            <p className="text-xl font-bold text-purple-800">{currentProblem.description}</p>
                            <p className="text-base text-purple-700">🐣 鸽巢原理说：至少有一个抽屉会有 <span className="font-black text-red-600">{theoreticalAtLeast}</span> 个苹果。</p>
                        </div>
                        
                        {/* 动态消息区域 */}
                        <div className="bg-amber-50 rounded-xl p-2 text-center text-amber-800 font-medium text-sm shadow-sm">
                            💬 {message}
                        </div>
                        
                        {/* 抽屉区域（可拖拽放置） */}
                        <div>
                            <h4 className="font-bold text-2xl text-purple-700 mb-2">📦 抽屉区域（拖拽苹果到这里）</h4>
                            <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                                {drawers.map((drawer, idx) => (
                                    <div
                                        key={idx}
                                        onDragOver={onDragOver}
                                        onDrop={(e) => handleDropOnDrawer(e, idx)}
                                        onDragEnter={() => onDragEnterDrawer(idx)}
                                        onDragLeave={onDragLeaveDrawer}
                                        className={`border-4 border-dashed rounded-2xl p-3 transition-all min-h-[160px] bg-white/50 flex flex-col ${
                                            highlightDrawerIdx === idx ? 'drop-zone-active' : 'border-purple-300'
                                        }`}
                                    >
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="text-lg font-bold text-purple-700">抽屉 {idx + 1}</span>
                                            <span className="text-sm bg-purple-200 rounded-full px-2">🍎 {drawer.length}个</span>
                                        </div>
                                        <div className="flex flex-wrap gap-1 flex-1 content-start">
                                            {drawer.map((item, itemIdx) => (
                                                <div
                                                    key={item.id}
                                                    className="drawer-item bg-green-200 rounded-full px-2 py-1 text-sm flex items-center gap-1 shadow"
                                                >
                                                    <span>{item.label}</span>
                                                    <button
                                                        onClick={() => removeFromDrawer(idx, itemIdx)}
                                                        className="text-red-500 font-bold text-xs ml-1 hover:bg-red-100 rounded-full w-5 h-5 flex items-center justify-center"
                                                    >✖</button>
                                                </div>
                                            ))}
                                            {drawer.length === 0 && <div className="text-gray-400 text-sm">拖拽苹果到这里</div>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="flex justify-center gap-3 mt-3">
                                <button onClick={resetAllocation} className="bg-gray-400 hover:bg-gray-500 text-white px-4 py-2 rounded-full text-sm">🗑️ 清空所有抽屉</button>
                            </div>
                        </div>
                        
                        {/* 待分配苹果卡片区 */}
                        <div>
                            <h4 className="font-bold text-2xl text-purple-700 mb-2 flex items-center gap-2">🍎 待分配苹果（拖拽到抽屉）</h4>
                            <div className="flex flex-wrap gap-3 justify-start items-center min-h-[100px] bg-white/40 rounded-2xl p-4 custom-scroll">
                                {unassignedItems.map(item => (
                                    <div
                                        key={item.id}
                                        draggable="true"
                                        onDragStart={(e) => onItemDragStart(e, item)}
                                        onDragEnd={onItemDragEnd}
                                        className="bg-gradient-to-br from-amber-200 to-orange-300 w-20 h-20 rounded-xl flex flex-col items-center justify-center shadow-md cursor-grab active:cursor-grabbing transition hover:scale-105"
                                    >
                                        <span className="text-3xl">🍎</span>
                                        <span className="text-xs font-bold">{item.label}</span>
                                        <span className="text-[10px]">拖拽</span>
                                    </div>
                                ))}
                                {unassignedItems.length === 0 && <div className="w-full text-center text-green-700 font-bold">🎉 所有苹果都已放入抽屉！🎉</div>}
                            </div>
                            <p className="text-xs text-center text-purple-600 mt-2">👉 拖拽苹果卡片到上方抽屉中，放完所有苹果后系统自动验证鸽巢原理！</p>
                        </div>
                        
                        {/* 原理验证与统计 */}
                        {isFullAssigned && (
                            <div className="bg-green-50 rounded-xl p-3 border border-green-300">
                                <div className="flex justify-between items-center">
                                    <span className="font-bold text-green-800">📊 分配统计</span>
                                    <span className="text-sm">最大抽屉数量: <strong className="text-red-600">{maxCount}</strong></span>
                                </div>
                                <p className="text-sm text-gray-700 mt-1">{principleExplanation}</p>
                                {isPrincipleSatisfied && <p className="text-green-700 font-semibold mt-1">✅ 你的分配验证了原理：至少有一个抽屉有 {theoreticalAtLeast} 个苹果！</p>}
                            </div>
                        )}
                        
                        {/* 操作小贴士 */}
                        <div className="flex flex-wrap justify-between items-center text-xs text-purple-600 bg-white/50 rounded-xl p-2 mt-1">
                            <span>✋ 拖拽技巧：把苹果拖到抽屉里，放完所有苹果后系统会自动总结。</span>
                            <button onClick={() => setMessage("💡 提示：无论你怎么分配，总有某个抽屉的苹果数不少于理论值。试试看！")} className="underline text-purple-700">❓ 再试一次提示</button>
                        </div>
                        
                        <div className="text-center text-sm text-purple-800">
                            💡 已分配 {totalAssigned} / {currentProblem.itemsCount} 个苹果
                        </div>
                    </div>
                </div>
            );
        };
        
        // 根组件
        const App = () => {
            return (
                <div className="min-h-screen py-2">
                    <div className="text-center mb-5 mt-1">
                        <h1 className="text-3xl md:text-4xl font-black text-white drop-shadow-xl tracking-wider" style={{textShadow: "3px 3px 0 #7e22ce"}}>
                            🕊️ 鸽巢原理大挑战 · 抽屉实验室 🧸
                        </h1>
                        <p className="text-white/90 text-lg md:text-xl mt-2 font-medium">拖拽苹果到抽屉里，亲自验证“总有、至少”的数学魔法！</p>
                    </div>
                    <PigeonholeGame />
                    <footer className="text-center text-white/80 text-sm mt-8 pb-3">
                        🌟 拖拽苹果到抽屉，分配完所有苹果后，系统会验证鸽巢原理。点击【换一题】挑战新的物品和抽屉数量 🌟
                    </footer>
                </div>
            );
        };
        
        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
