<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>认识三角形 · 形状探险家 | 数学乐园</title>
  <!-- Tailwind + React CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    /* 全局字体放大6号（2.8rem），淡紫色主题背景 */
    body {
      font-size: 2.8rem;
      background: linear-gradient(135deg, #D9C2E6 0%, #CBAACB 100%);
      font-family: system-ui, 'Segoe UI', 'Comic Neue', 'Quicksand', sans-serif;
    }
    .drag-card {
      cursor: grab;
      transition: all 0.1s ease;
      user-select: none;
    }
    .drag-card:active {
      cursor: grabbing;
    }
    .drop-slot {
      transition: all 0.2s ease;
      border: 2px dashed #6b8c42;
      background-color: #f0f7e6;
    }
    .drag-over {
      background-color: #d9e6c3;
      transform: scale(1.02);
      border: 2px solid #4a6e2c;
    }
    .matched-card {
      opacity: 0.6;
      filter: grayscale(0.2);
      background: #c0d6a8;
      text-decoration: line-through;
      cursor: default;
      pointer-events: none;
    }
    .slot-filled {
      background-color: #c7f0c2;
      border: 2px solid #2e7d32;
    }
    .btn-fun:active {
      transform: scale(0.96);
    }
    @keyframes bounceSoft {
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-5px); }
    }
    .celebration {
      animation: bounceSoft 0.5s ease;
    }
    @media (max-width: 768px) {
      body {
        font-size: 1.8rem;
      }
      .drag-card, .drop-slot {
        font-size: 1.2rem;
      }
    }
    .triangle-svg {
      background: #ffffffdd;
      border-radius: 1rem;
      display: inline-block;
      box-shadow: 0 0.2rem 0.6rem rgba(0,0,0,0.1);
    }
  </style>
</head>
<body class="min-h-screen p-4 md:p-6">
<div id="root" class="w-full max-w-7xl mx-auto"></div>

<script type="text/babel">
  // ======================= 小学数学 · 认识三角形 =======================
  // 知识点：三角形由三条线段围成，有3个顶点、3条边、3个角。按角分类：锐角三角形、直角三角形、钝角三角形。
  
  // ---------- 游戏数据：配对项目（6个：顶点、边、角、锐角三角形、直角三角形、钝角三角形）----------
  const gameItems = [
    { id: 1, name: "顶点", targetKey: "vertex", correctMatch: "顶点", description: "三角形有3个顶点" },
    { id: 2, name: "边", targetKey: "side", correctMatch: "边", description: "三角形有3条边" },
    { id: 3, name: "角", targetKey: "angle", correctMatch: "角", description: "三角形有3个角" },
    { id: 4, name: "锐角三角形", targetKey: "acute", correctMatch: "锐角三角形", description: "三个角都是锐角" },
    { id: 5, name: "直角三角形", targetKey: "right", correctMatch: "直角三角形", description: "有一个角是直角" },
    { id: 6, name: "钝角三角形", targetKey: "obtuse", correctMatch: "钝角三角形", description: "有一个角是钝角" }
  ];
  
  // 生成右侧可拖拽卡片（打乱顺序）
  const generateCards = () => {
    let cards = gameItems.map(item => ({
      id: `card-${item.id}`,
      text: item.name,
      targetKey: item.targetKey,
      matched: false
    }));
    // 打乱顺序
    for (let i = cards.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [cards[i], cards[j]] = [cards[j], cards[i]];
    }
    return cards;
  };
  
  // 绘制三角形示意图（标注顶点、边、角的位置）
  const TriangleDiagram = () => {
    return (
      <svg width="180" height="160" viewBox="0 0 200 180" className="triangle-svg" style={{ background: 'white' }}>
        <polygon points="100,20 20,150 180,150" fill="#c8e6c9" stroke="#2e7d32" strokeWidth="3" />
        {/* 顶点标记 */}
        <circle cx="100" cy="20" r="4" fill="black" />
        <text x="100" y="12" fontSize="12" fill="black" textAnchor="middle">顶点</text>
        <circle cx="20" cy="150" r="4" fill="black" />
        <circle cx="180" cy="150" r="4" fill="black" />
        {/* 边标注 */}
        <text x="60" y="90" fontSize="12" fill="#b45309" transform="rotate(-30,60,90)">边</text>
        <text x="140" y="90" fontSize="12" fill="#b45309" transform="rotate(30,140,90)">边</text>
        <text x="100" y="165" fontSize="12" fill="#b45309">边</text>
        {/* 角标注 */}
        <path d="M 95 30 A 12 12 0 0 1 85 38" fill="none" stroke="#d97706" strokeWidth="2" />
        <text x="78" y="38" fontSize="11" fill="#d97706">角</text>
        <path d="M 30 145 A 12 12 0 0 1 40 155" fill="none" stroke="#d97706" strokeWidth="2" />
        <path d="M 170 145 A 12 12 0 0 0 160 155" fill="none" stroke="#d97706" strokeWidth="2" />
      </svg>
    );
  };
  
  // 绘制三种三角形的示意图
  const TriangleTypeSvg = ({ type }) => {
    if (type === "acute") {
      return (
        <svg width="80" height="70" viewBox="0 0 100 80">
          <polygon points="50,15 15,70 85,70" fill="#c8e6c9" stroke="#2e7d32" strokeWidth="2" />
          <text x="50" y="45" fontSize="10" fill="#b45309" textAnchor="middle">锐角</text>
        </svg>
      );
    } else if (type === "right") {
      return (
        <svg width="80" height="70" viewBox="0 0 100 80">
          <polygon points="15,70 85,70 15,15" fill="#c8e6c9" stroke="#2e7d32" strokeWidth="2" />
          <rect x="15" y="55" width="15" height="15" fill="none" stroke="#d97706" strokeWidth="1.5" />
          <text x="45" y="50" fontSize="10" fill="#b45309" textAnchor="middle">直角</text>
        </svg>
      );
    } else {
      return (
        <svg width="80" height="70" viewBox="0 0 100 80">
          <polygon points="50,15 15,70 85,70" fill="#c8e6c9" stroke="#2e7d32" strokeWidth="2" />
          <path d="M 48 25 A 15 15 0 0 1 35 45" fill="none" stroke="#d97706" strokeWidth="1.5" />
          <text x="35" y="50" fontSize="10" fill="#b45309">钝角</text>
        </svg>
      );
    }
  };
  
  // 游戏组件：拖拽配对（将名称卡片拖拽到对应的槽位）
  const MatchingGame = () => {
    const [cards, setCards] = React.useState(() => generateCards());
    // 槽位状态：6个槽位，分别对应 vertex, side, angle, acute, right, obtuse
    const [slots, setSlots] = React.useState(() => ({
      vertex: { filled: false, value: null, correctLabel: "顶点" },
      side: { filled: false, value: null, correctLabel: "边" },
      angle: { filled: false, value: null, correctLabel: "角" },
      acute: { filled: false, value: null, correctLabel: "锐角三角形" },
      right: { filled: false, value: null, correctLabel: "直角三角形" },
      obtuse: { filled: false, value: null, correctLabel: "钝角三角形" }
    }));
    const [dragOverSlotId, setDragOverSlotId] = React.useState(null);
    const [feedbackMsg, setFeedbackMsg] = React.useState("");
    const [gameWin, setGameWin] = React.useState(false);
    const [score, setScore] = React.useState(0);
    
    const totalSlots = Object.keys(slots).length;
    const filledCount = Object.values(slots).filter(s => s.filled).length;
    
    const checkVictory = (currentSlots) => {
      const allFilled = Object.values(currentSlots).every(s => s.filled);
      if (allFilled && !gameWin) {
        setGameWin(true);
        setFeedbackMsg("🎉 完美！所有三角形知识都配对成功！你已是三角形小专家！ 🎉");
      }
    };
    
    // 拖拽卡片
    const onDragStart = (e, cardId, cardText, targetKey) => {
      const card = cards.find(c => c.id === cardId);
      if (card?.matched) {
        e.preventDefault();
        return false;
      }
      e.dataTransfer.setData("text/plain", JSON.stringify({ cardId, cardText, targetKey }));
      e.dataTransfer.effectAllowed = "copy";
      e.target.style.opacity = "0.6";
    };
    const onDragEnd = (e) => { if(e.target) e.target.style.opacity = ""; };
    
    const onDragOverSlot = (e, slotKey) => {
      e.preventDefault();
      setDragOverSlotId(slotKey);
      e.dataTransfer.dropEffect = "copy";
    };
    const onDragLeaveSlot = () => setDragOverSlotId(null);
    
    const onDropToSlot = (e, slotKey) => {
      e.preventDefault();
      setDragOverSlotId(null);
      const rawData = e.dataTransfer.getData("text/plain");
      if (!rawData) return;
      let dragData;
      try { dragData = JSON.parse(rawData); } catch(err) { return; }
      const { cardId, cardText, targetKey } = dragData;
      
      const sourceCard = cards.find(c => c.id === cardId);
      const targetSlot = slots[slotKey];
      if (!sourceCard || !targetSlot) return;
      if (sourceCard.matched || targetSlot.filled) {
        setFeedbackMsg("⏳ 这张卡片或这个槽位已经配对过了！");
        setTimeout(() => setFeedbackMsg(""), 1300);
        return;
      }
      
      // 验证匹配：卡片的targetKey是否等于槽位的key
      const isMatch = (targetKey === slotKey);
      if (!isMatch) {
        setFeedbackMsg(`❌ 配对错误！“${cardText}” 不能放在这里。正确的配对位置是 ${targetSlot.correctLabel} 对应的槽位。`);
        setTimeout(() => setFeedbackMsg(""), 1800);
        return;
      }
      
      // 配对成功
      setCards(prev => prev.map(c => c.id === cardId ? { ...c, matched: true } : c));
      setSlots(prev => ({
        ...prev,
        [slotKey]: { ...prev[slotKey], filled: true, value: cardText }
      }));
      setScore(prev => prev + 1);
      setFeedbackMsg(`✅ 正确！“${cardText}” 配对成功！`);
      setTimeout(() => setFeedbackMsg(""), 1200);
      
      const newSlots = { ...slots, [slotKey]: { ...slots[slotKey], filled: true, value: cardText } };
      checkVictory(newSlots);
    };
    
    const resetGame = () => {
      setCards(generateCards());
      setSlots({
        vertex: { filled: false, value: null, correctLabel: "顶点" },
        side: { filled: false, value: null, correctLabel: "边" },
        angle: { filled: false, value: null, correctLabel: "角" },
        acute: { filled: false, value: null, correctLabel: "锐角三角形" },
        right: { filled: false, value: null, correctLabel: "直角三角形" },
        obtuse: { filled: false, value: null, correctLabel: "钝角三角形" }
      });
      setGameWin(false);
      setScore(0);
      setFeedbackMsg("✨ 新的一局！把右边的三角形知识卡片拖拽到左边正确的槽位中吧～");
      setTimeout(() => setFeedbackMsg(""), 1500);
    };
    
    return (
      <div className="bg-white/90 backdrop-blur-sm rounded-3xl p-5 shadow-xl border border-[#8bc34a] h-full flex flex-col">
        <div className="flex justify-between items-center flex-wrap gap-2 mb-3">
          <h3 className="text-2xl font-extrabold text-green-800">🔺 三角形配对 · 拖拽连连看</h3>
          <div className="flex gap-2">
            <span className="bg-emerald-200 px-3 py-1 rounded-full text-base font-bold">🏆 配对 {score}/{totalSlots}</span>
            <button onClick={resetGame} className="bg-gradient-to-r from-green-600 to-teal-600 text-white font-bold py-1.5 px-4 rounded-full text-sm shadow btn-fun">🔄 新的一局</button>
          </div>
        </div>
        <p className="text-sm text-green-700 bg-green-50 rounded-xl p-2 mb-3 text-center">
          🧸 玩法：将右侧的<strong>知识卡片</strong>拖拽到左侧对应的槽位中（顶点、边、角或三角形类型）。全部配对正确即可获胜！
        </p>
        
        <div className="flex flex-col md:flex-row gap-5 flex-1">
          {/* 左侧槽位区（包含图形和分类槽位） */}
          <div className="flex-1 bg-green-50/60 rounded-2xl p-3">
            <div className="font-bold text-green-800 text-center mb-2">📦 三角形知识库</div>
            <div className="space-y-4 max-h-[550px] overflow-y-auto pr-1">
              {/* 三角形示意图区 */}
              <div className="bg-white rounded-xl p-3 shadow border border-green-200">
                <div className="text-center font-bold text-green-700">三角形各部分名称</div>
                <div className="flex justify-center my-2">
                  <TriangleDiagram />
                </div>
                <div className="grid grid-cols-3 gap-2 mt-2">
                  {["vertex", "side", "angle"].map(slotKey => (
                    <div 
                      key={slotKey}
                      onDragOver={(e) => onDragOverSlot(e, slotKey)}
                      onDragLeave={onDragLeaveSlot}
                      onDrop={(e) => onDropToSlot(e, slotKey)}
                      className={`drop-slot rounded-xl p-2 text-center transition-all ${dragOverSlotId === slotKey ? 'drag-over' : ''} ${slots[slotKey].filled ? 'slot-filled' : ''}`}
                    >
                      <div className="text-xs font-bold text-green-800">{slotKey === "vertex" ? "顶点" : slotKey === "side" ? "边" : "角"} 槽位</div>
                      {slots[slotKey].filled ? (
                        <div className="text-sm font-mono text-green-700">{slots[slotKey].value}</div>
                      ) : (
                        <div className="text-[10px] text-gray-500">⬅️ 拖拽至此</div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
              
              {/* 三角形按角分类区 */}
              <div className="bg-white rounded-xl p-3 shadow border border-green-200">
                <div className="text-center font-bold text-green-700">三角形的分类（按角）</div>
                <div className="grid grid-cols-3 gap-2 mt-2">
                  {[
                    { key: "acute", label: "锐角三角形", svg: "acute" },
                    { key: "right", label: "直角三角形", svg: "right" },
                    { key: "obtuse", label: "钝角三角形", svg: "obtuse" }
                  ].map(type => (
                    <div key={type.key} className="text-center">
                      <div className="flex justify-center">
                        <TriangleTypeSvg type={type.svg} />
                      </div>
                      <div 
                        onDragOver={(e) => onDragOverSlot(e, type.key)}
                        onDragLeave={onDragLeaveSlot}
                        onDrop={(e) => onDropToSlot(e, type.key)}
                        className={`drop-slot rounded-xl p-2 text-center transition-all mt-1 ${dragOverSlotId === type.key ? 'drag-over' : ''} ${slots[type.key].filled ? 'slot-filled' : ''}`}
                      >
                        <div className="text-xs font-bold text-green-800">{type.label} 槽位</div>
                        {slots[type.key].filled ? (
                          <div className="text-sm font-mono text-green-700">{slots[type.key].value}</div>
                        ) : (
                          <div className="text-[10px] text-gray-500">⬅️ 拖拽至此</div>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
          
          {/* 右侧卡片池 */}
          <div className="flex-1 bg-amber-50/60 rounded-2xl p-3">
            <div className="font-bold text-amber-800 text-center mb-2">🎲 知识卡片 (拖拽我)</div>
            <div className="flex flex-wrap justify-center gap-3 max-h-[550px] overflow-y-auto">
              {cards.map(card => (
                <div 
                  key={card.id}
                  draggable={!card.matched}
                  onDragStart={(e) => onDragStart(e, card.id, card.text, card.targetKey)}
                  onDragEnd={onDragEnd}
                  className={`drag-card w-36 h-24 rounded-xl shadow-md flex items-center justify-center text-center font-bold transition ${card.matched ? 'bg-gray-400/60 cursor-default text-gray-300' : 'bg-gradient-to-br from-amber-400 to-orange-500 cursor-grab hover:scale-105 text-white'}`}
                >
                  <span className="text-base px-1">{card.matched ? "✓ 已用" : card.text}</span>
                </div>
              ))}
            </div>
            <div className="text-xs text-center text-amber-700 mt-2">💡 每个卡片只能用一次，拖拽到对应知识点的槽位。</div>
          </div>
        </div>
        
        {feedbackMsg && (
          <div className="mt-3 text-center bg-green-100 p-2 rounded-xl text-green-800 font-medium text-sm">
            {feedbackMsg}
          </div>
        )}
        {gameWin && (
          <div className="mt-3 text-center bg-gradient-to-r from-green-300 to-emerald-400 p-3 rounded-xl text-white font-bold text-lg celebration">
            🎉🎉 三角形探险家！你已完全认识三角形！ 🎉🎉
          </div>
        )}
        <div className="mt-3 text-xs text-center text-green-600 bg-green-50 p-2 rounded-full">
          💡 三角形：由3条线段围成的图形，有3个顶点、3条边、3个角。按角分类：锐角三角形（三个锐角）、直角三角形（一个直角）、钝角三角形（一个钝角）。
        </div>
      </div>
    );
  };
  
  // ---------- 左侧知识点：认识三角形 ----------
  const KnowledgeCard = () => {
    return (
      <div className="bg-gradient-to-br from-[#e8f5e9] to-[#c8e6c9] rounded-3xl p-5 shadow-xl border border-[#8bc34a]">
        <div className="flex items-center gap-2 mb-3">
          <span className="text-5xl">🔺</span>
          <h2 className="text-3xl font-extrabold text-green-900">认识三角形</h2>
        </div>
        <div className="space-y-4 text-base text-green-900">
          <div className="bg-white/70 rounded-xl p-3">
            <p className="font-bold text-xl">✨ 三角形的定义</p>
            <p>由<strong>三条线段</strong>围成的图形（每相邻两条线段的端点相连）叫做三角形。三角形有<strong>3条边、3个角、3个顶点</strong>。</p>
            <div className="mt-2 flex justify-center">
              <svg width="120" height="100" viewBox="0 0 120 100">
                <polygon points="60,20 20,85 100,85" fill="#c8e6c9" stroke="#2e7d32" strokeWidth="2" />
                <circle cx="60" cy="20" r="3" fill="black" />
                <circle cx="20" cy="85" r="3" fill="black" />
                <circle cx="100" cy="85" r="3" fill="black" />
              </svg>
            </div>
          </div>
          <div className="bg-white/70 rounded-xl p-3">
            <p className="font-bold">📐 三角形的各部分名称</p>
            <p>三角形的<strong>顶点</strong>：三条线段两两相交的点。<br />
            <strong>边</strong>：围成三角形的线段。<br />
            <strong>角</strong>：相邻两边组成的角。</p>
          </div>
          <div className="bg-white/70 rounded-xl p-3">
            <p className="font-bold">🔍 三角形的分类（按角）</p>
            <ul className="list-disc pl-5 space-y-1">
              <li><strong>锐角三角形</strong>：三个角都是锐角。</li>
              <li><strong>直角三角形</strong>：有一个角是直角。</li>
              <li><strong>钝角三角形</strong>：有一个角是钝角。</li>
            </ul>
          </div>
          <div className="bg-amber-50 border-l-8 border-amber-400 p-3 rounded-xl">
            <p className="font-bold">🌟 小练习：</p>
            <p>三角形有（ ）个顶点，（ ）条边，（ ）个角；一个三角形中最多有（ ）个直角。</p>
            <p className="text-sm text-green-700">（答案：3，3，3，1）</p>
          </div>
          <div className="bg-green-100 p-3 rounded-xl text-center text-sm">
            💡 小口诀：“三角形三条边，三个顶点三个角；锐角直角和钝角，按角分类记得牢。”
          </div>
        </div>
      </div>
    );
  };
  
  // ---------- 快速小练习：三角形知识问答 ----------
  const QuickQuiz = () => {
    const [question, setQuestion] = React.useState({ text: "三角形有几个顶点？", options: ["2个", "3个", "4个"], correct: "3个" });
    const [userChoice, setUserChoice] = React.useState(null);
    const [feedback, setFeedback] = React.useState("");
    
    const questionsBank = [
      { text: "三角形有几个顶点？", options: ["2个", "3个", "4个"], correct: "3个" },
      { text: "三角形有几个角？", options: ["2个", "3个", "4个"], correct: "3个" },
      { text: "有一个角是直角的三角形叫做？", options: ["锐角三角形", "直角三角形", "钝角三角形"], correct: "直角三角形" },
      { text: "三个角都是锐角的三角形叫做？", options: ["锐角三角形", "直角三角形", "钝角三角形"], correct: "锐角三角形" },
      { text: "三角形最多有几个直角？", options: ["1个", "2个", "3个"], correct: "1个" }
    ];
    const [idx, setIdx] = React.useState(0);
    
    const loadQuestion = (index) => {
      setQuestion(questionsBank[index % questionsBank.length]);
      setUserChoice(null);
      setFeedback("");
    };
    
    const nextQuiz = () => {
      const newIdx = idx + 1;
      setIdx(newIdx);
      loadQuestion(newIdx);
    };
    
    const checkAnswer = (choice) => {
      setUserChoice(choice);
      const isCorrect = (choice === question.correct);
      if (isCorrect) {
        setFeedback(`✅ 正确！${question.text} 答案是 ${question.correct}。`);
      } else {
        setFeedback(`❌ 不对哦，${question.text} 正确答案是 ${question.correct}。`);
      }
    };
    
    React.useEffect(() => {
      loadQuestion(0);
    }, []);
    
    return (
      <div className="bg-white/90 rounded-3xl p-4 shadow-xl border border-[#8bc34a]">
        <div className="flex items-center gap-2 mb-2">
          <span className="text-2xl">🧠</span>
          <h3 className="text-xl font-extrabold text-green-800">快问快答 · 三角形挑战</h3>
        </div>
        <div className="bg-green-50 rounded-xl p-3 text-center">
          <p className="font-bold text-xl">{question.text}</p>
          <div className="flex flex-wrap gap-3 justify-center mt-2">
            {question.options.map(opt => (
              <button 
                key={opt}
                onClick={() => checkAnswer(opt)}
                className={`px-4 py-2 rounded-full font-bold transition ${userChoice === opt ? (opt === question.correct ? 'bg-green-500 text-white' : 'bg-red-400 text-white') : 'bg-gray-200 hover:bg-green-200'}`}
              >
                {opt}
              </button>
            ))}
            <button onClick={nextQuiz} className="bg-emerald-400 hover:bg-emerald-500 text-white px-4 py-2 rounded-full text-sm">下一题</button>
          </div>
          {feedback && <div className="mt-2 text-sm text-green-800">{feedback}</div>}
        </div>
      </div>
    );
  };
  
  // ---------- 主应用布局 ----------
  const App = () => {
    return (
      <div className="flex flex-col xl:flex-row gap-6">
        {/* 左侧区域：知识点 + 快问快答 */}
        <div className="flex-1 xl:w-3/5 space-y-5">
          <KnowledgeCard />
          <QuickQuiz />
          <div className="bg-white/70 rounded-2xl p-3 text-center text-green-700 text-sm border border-green-200">
            🌈 三角形是几何图形中最基础也最重要的形状之一。从金字塔到屋顶，三角形无处不在！掌握三角形知识，探索更多几何奥秘。
          </div>
        </div>
        {/* 右侧游戏区 */}
        <div className="flex-1 xl:w-2/5">
          <MatchingGame />
        </div>
      </div>
    );
  };
  
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
