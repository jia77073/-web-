<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>认识图形(一)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; color: #333; }
        h1 { color: #2196f3; }
        .shape-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 20px; }
        .shape { border: 2px solid #eee; border-radius: 15px; padding: 15px; text-align: center; }
    </style>
</head>
<body>
    <h1>认识图形(一)</h1>
    <p>在我们的生活中，到处都可以看到各种各样的形状。让我们一起来认识它们吧！</p>
    <div class="shape-grid">
        <div class="shape">
            <h3>长方体</h3>
            <p>像火柴盒、砖头那样的形状。</p>
        </div>
        <div class="shape">
            <h3>正方体</h3>
            <p>像魔方、骰子那样的形状。</p>
        </div>
        <div class="shape">
            <h3>圆柱</h3>
            <p>像易拉罐、铅笔那样的形状。</p>
        </div>
        <div class="shape">
            <h3>球</h3>
            <p>像足球、篮球那样的形状。</p>
        </div>
    </div>
</body>
</html>
