<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>公因数公倍数·数论思维营 | 拖拽配对 + 应用题闯关</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM & Babel CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #CBAACB 0%, #D9C2E6 100%);
            font-family: 'Segoe UI', 'Comic Neue', 'Poppins', system-ui, sans-serif;
        }
        /* 自定义拖拽时的半透明效果 */
        .dragging-card {
            opacity: 0.4 !important;
            cursor: grabbing !important;
        }
        .drop-zone-active {
            background-color: #e9d5ff !important;
            border: 2px dashed #8b5cf6 !important;
            transition: all 0.1s ease;
        }
        .paired-card {
            background-color: #bbf7d0 !important;
            border-left: 6px solid #22c55e !important;
            text-decoration: line-through;
            opacity: 0.8;
        }
        .paired-card span:first-child {
            text-decoration: line-through;
        }
        .answer-card {
            transition: transform 0.15s, box-shadow 0.15s;
            user-select: none;
        }
        .answer-card:active {
            cursor: grabbing;
        }
        button:active {
            transform: scale(0.96);
        }
        @media (max-width: 768px) {
            .title-main {
                font-size: 1.8rem !important;
            }
            .question-card, .answer-card {
                font-size: 0.85rem;
            }
            .answer-card {
                width: 4rem;
                height: 4rem;
                font-size: 1.5rem;
            }
        }
        /* 防止拖拽时选中其他文本 */
        .no-select {
            user-select: none;
        }
    </style>
</head>
<body class="p-4 md:p-6 min-h-screen flex items-center justify-center no-select">
    <div id="root" class="w-full max-w-6xl mx-auto"></div>

    <script type="text/babel">
        // ======================= 左侧题库：公因数公倍数应用题 =======================
        const gcdLcmQuestions = [
            { text: "📏 有两根铁丝，一根长24米，另一根长36米。要把它们截成同样长的小段，不许有剩余，每段最长是多少米？", answer: 12, solution: "🎯 最大公因数 (24,36)=12米。每段最长12米。" },
            { text: "⏰ 甲路公交车每6分钟发一班，乙路公交车每8分钟发一班。上午8:00同时发车，下一次同时发车是几分钟后？", answer: 24, solution: "🎯 最小公倍数 [6,8]=24分钟。" },
            { text: "🍬 一袋糖果，平均分给6个或8个小朋友都正好分完，这袋糖果至少有多少颗？", answer: 24, solution: "🎯 6和8的最小公倍数是24颗。" },
            { text: "🏠 用长24厘米、宽18厘米的长方形砖铺成正方形地面，至少需要多少块砖？", answer: 12, solution: "🎯 正方形边长是 [24,18]=72cm，每行3块，每列4块，共12块。" },
            { text: "🧩 一个数除以5余3，除以7余3，这个数最小是多少？", answer: 38, solution: "🎯 减去3后是5和7的公倍数，最小公倍数35，加3得38。" },
            { text: "🚴 小明每3天去一次图书馆，小华每4天去一次。某月1日同去，下一次同去相隔多少天？", answer: 12, solution: "🎯 [3,4]=12天。" },
            { text: "📦 一堆苹果，每3个一盘多1个，每5个一盘也多1个，苹果至少有多少个？", answer: 16, solution: "🎯 3和5的最小公倍数15，加1得16个。" },
            { text: "🎨 一张长方形纸长48cm、宽36cm，剪成同样大小正方形无剩余，边长最大是多少厘米？", answer: 12, solution: "🎯 (48,36)=12cm。" },
            { text: "🏃 操场上有学生排队，每4人一排多2人，每6人一排也正好多2人，至少有多少人？", answer: 14, solution: "🎯 [4,6]=12，12+2=14人。" }
        ];

        // 左侧应用题组件 (完美保留)
        const GcdLcmApp = () => {
            const [currentQ, setCurrentQ] = React.useState(null);
            const [userAnswer, setUserAnswer] = React.useState('');
            const [feedback, setFeedback] = React.useState('');
            const [showSolution, setShowSolution] = React.useState('');
            const [isCorrect, setIsCorrect] = React.useState(false);

            const loadRandom = React.useCallback(() => {
                const idx = Math.floor(Math.random() * gcdLcmQuestions.length);
                setCurrentQ({ ...gcdLcmQuestions[idx] });
                setUserAnswer('');
                setFeedback('');
                setShowSolution('');
                setIsCorrect(false);
            }, []);

            React.useEffect(() => { loadRandom(); }, [loadRandom]);

            const handleSubmit = () => {
                if (!currentQ) return;
                const num = parseFloat(userAnswer.trim());
                if (isNaN(num)) {
                    setFeedback("❓ 请输入数字答案～");
                    setShowSolution('');
                    setIsCorrect(false);
                    return;
                }
                if (Math.abs(num - currentQ.answer) < 0.01) {
                    setFeedback("🎉 完全正确！公因数公倍数应用棒极了！");
                    setIsCorrect(true);
                    setShowSolution(currentQ.solution);
                } else {
                    setFeedback(`😲 正确答案是 ${currentQ.answer}，看看解析吧～`);
                    setIsCorrect(false);
                    setShowSolution(currentQ.solution);
                }
            };

            if (!currentQ) return <div className="text-center text-white text-2xl p-10">加载中...</div>;

            return (
                <div className="bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 border border-purple-300 h-full flex flex-col">
                    <div className="border-b-4 border-purple-400 pb-3 mb-4 flex items-center gap-2">
                        <span className="text-4xl">🔢</span>
                        <h1 className="text-3xl md:text-4xl font-extrabold text-gray-800 title-main">公因数公倍数·数论思维营</h1>
                    </div>
                    <div className="bg-gradient-to-r from-purple-50 to-pink-50 rounded-2xl p-4 mb-5 shadow-inner border border-purple-200">
                        <h2 className="text-xl font-bold text-purple-800 flex items-center gap-2">📖 核心秘籍</h2>
                        <ul className="mt-2 space-y-1 text-gray-700 text-base md:text-lg list-disc pl-5">
                            <li>🔍 <strong>最大公因数(GCD)</strong>：裁剪、分段、分组最大尺寸 → 短除法</li>
                            <li>⏰ <strong>最小公倍数(LCM)</strong>：周期相遇、拼正方形、同时完成 → 短除法</li>
                            <li>🧩 <strong>同余问题</strong>：N ≡ a (mod m) 且 N ≡ a (mod n) → N = [m,n]×k + a</li>
                            <li>⚙️ <strong>短除法技巧</strong>：同除质因数，半圈积即GCD，一圈积即LCM</li>
                        </ul>
                    </div>
                    <div className="bg-amber-50 rounded-2xl p-5 border-l-[12px] border-l-purple-500 shadow-md mb-5">
                        <div className="flex justify-between items-center flex-wrap gap-2">
                            <span className="bg-purple-200 text-purple-800 px-3 py-1 rounded-full text-sm font-bold">🔥 挑战</span>
                            <button onClick={loadRandom} className="bg-purple-600 hover:bg-purple-700 text-white font-bold py-1.5 px-5 rounded-full shadow transition text-sm">🔄 换一题</button>
                        </div>
                        <div className="mt-4 text-gray-800 text-xl md:text-2xl font-medium">{currentQ.text}</div>
                        <div className="mt-5 flex flex-col sm:flex-row gap-3 items-center">
                            <input type="number" step="any" value={userAnswer} onChange={e => setUserAnswer(e.target.value)} placeholder="输入答案" className="answer-input w-full sm:w-48 px-5 py-3 border-2 border-purple-300 rounded-2xl text-center text-lg bg-white focus:outline-none focus:border-purple-500"/>
                            <button onClick={handleSubmit} className="bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-8 rounded-2xl shadow-md transition text-lg">✅ 提交</button>
                        </div>
                    </div>
                    {feedback && (
                        <div className={`rounded-2xl p-4 mb-4 ${isCorrect ? 'bg-green-100 border-l-8 border-green-500' : 'bg-rose-50 border-l-8 border-rose-400'}`}>
                            <p className="text-lg font-semibold">{isCorrect ? '🏆 反馈' : '📚 提示'}</p>
                            <p className="text-gray-800 text-base mt-1">{feedback}</p>
                        </div>
                    )}
                    {showSolution && (
                        <div className="bg-sky-50 rounded-2xl p-4 border border-sky-200">
                            <p className="font-bold text-sky-800 text-lg">✍️ 解题思路</p>
                            <p className="text-gray-700 mt-1 text-base leading-relaxed">{showSolution}</p>
                        </div>
                    )}
                    <div className="mt-3 text-center text-gray-500 text-sm">📐 GCD：因数最大公享 | LCM：倍数最小共约</div>
                </div>
            );
        };

        // ======================= 右侧：基于原生 Drag & Drop 的精准配对游戏 (完美支持拖拽配对) =======================
        // 题目数据 (id, 问题文本, 正确答案)
        const pairData = [
            { id: 1, question: "12 和 18 的最大公因数", correct: 6 },
            { id: 2, question: "12 和 18 的最小公倍数", correct: 36 },
            { id: 3, question: "8 和 12 的最大公因数", correct: 4 },
            { id: 4, question: "8 和 12 的最小公倍数", correct: 24 },
            { id: 5, question: "15 和 25 的最大公因数", correct: 5 },
            { id: 6, question: "15 和 25 的最小公倍数", correct: 75 }
        ];
        // 所有可能的答案值 (用于生成答案卡片)
        const allAnswerValues = [6, 36, 4, 24, 5, 75];

        const MatchGame = () => {
            // 问题列表 (保存状态，初始随机打乱)
            const [questions, setQuestions] = React.useState([]);
            // 答案列表 (未配对的，初始随机打乱)
            const [answers, setAnswers] = React.useState([]);
            // 记录已配对的问题id -> { matched: true, answerValue: number }
            const [matchedMap, setMatchedMap] = React.useState({});
            // 全局反馈消息
            const [feedbackMsg, setFeedbackMsg] = React.useState('');
            // 全部完成标志
            const [allCompleted, setAllCompleted] = React.useState(false);
            
            // 用于拖拽样式: 当前拖拽的答案值
            const [draggedAnswer, setDraggedAnswer] = React.useState(null);
            // 高亮放置区的问题id
            const [highlightDropId, setHighlightDropId] = React.useState(null);

            // 初始化/重置游戏: 随机打乱各列表
            const initGame = () => {
                // 随机打乱问题
                const shuffledQ = [...pairData];
                for (let i = shuffledQ.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledQ[i], shuffledQ[j]] = [shuffledQ[j], shuffledQ[i]];
                }
                // 随机打乱答案卡片
                const shuffledA = [...allAnswerValues];
                for (let i = shuffledA.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledA[i], shuffledA[j]] = [shuffledA[j], shuffledA[i]];
                }
                setQuestions(shuffledQ);
                setAnswers(shuffledA);
                setMatchedMap({});
                setFeedbackMsg('');
                setAllCompleted(false);
                setDraggedAnswer(null);
                setHighlightDropId(null);
            };

            React.useEffect(() => {
                initGame();
            }, []);

            // 监听是否全部配对完成
            React.useEffect(() => {
                const total = questions.length;
                const matchedCount = Object.keys(matchedMap).length;
                if (total > 0 && matchedCount === total) {
                    setAllCompleted(true);
                    setFeedbackMsg('🎉 完美！所有配对完成！公因数公倍数大师就是你！🏆');
                } else if (total > 0 && matchedCount !== total) {
                    setAllCompleted(false);
                }
            }, [matchedMap, questions]);

            // ---- 拖拽事件：答案卡片 ----
            const handleDragStart = (e, answerVal) => {
                if (allCompleted) {
                    e.preventDefault();
                    return false;
                }
                // 存储被拖拽的答案值
                e.dataTransfer.setData("text/plain", answerVal);
                e.dataTransfer.effectAllowed = "copy";
                setDraggedAnswer(answerVal);
                // 设置拖拽图标 (可选)
                if (e.target) {
                    e.target.style.opacity = '0.5';
                }
            };
            
            const handleDragEnd = (e) => {
                if (e.target) e.target.style.opacity = '';
                setDraggedAnswer(null);
                setHighlightDropId(null);
            };

            // ---- 拖拽目标：问题卡片 的 dragOver / dragLeave / drop ----
            const handleDragOver = (e, questionId) => {
                e.preventDefault();  // 必须，允许放置
                e.dataTransfer.dropEffect = "copy";
                // 高亮当前可放置区域 (仅当未配对)
                if (!matchedMap[questionId] && !allCompleted) {
                    setHighlightDropId(questionId);
                }
            };
            
            const handleDragLeave = (e) => {
                setHighlightDropId(null);
            };
            
            const handleDrop = (e, questionItem) => {
                e.preventDefault();
                setHighlightDropId(null);
                if (allCompleted) {
                    setFeedbackMsg("🎯 游戏已完成！点击「重置游戏」继续挑战吧");
                    return;
                }
                // 检查该问题是否已经配对成功
                if (matchedMap[questionItem.id]) {
                    setFeedbackMsg(`⚠️ 题目“${questionItem.question}”已经配对过了！不能重复配对。`);
                    return;
                }
                
                // 获取拖拽的答案值
                let draggedVal = e.dataTransfer.getData("text/plain");
                if (!draggedVal) {
                    // 兼容某些情况
                    if (draggedAnswer !== null) draggedVal = draggedAnswer;
                    else return;
                }
                const answerNum = parseInt(draggedVal, 10);
                if (isNaN(answerNum)) return;
                
                // 关键配对逻辑：检查答案是否匹配当前问题的正确答案
                if (answerNum === questionItem.correct) {
                    // 配对成功：更新matchedMap，并且从answers数组中移除该答案卡片
                    // 避免同一个答案被重复使用（检查答案是否还在answers里）
                    if (!answers.includes(answerNum)) {
                        setFeedbackMsg(`⚠️ 答案 ${answerNum} 已经被使用过了！不能重复配对。`);
                        setDraggedAnswer(null);
                        return;
                    }
                    // 更新配对映射
                    setMatchedMap(prev => ({ ...prev, [questionItem.id]: { matched: true, answer: answerNum } }));
                    // 从答案列表删除这个数字（只删除第一个匹配项，保证唯一性）
                    const newAnswers = [...answers];
                    const idx = newAnswers.indexOf(answerNum);
                    if (idx !== -1) newAnswers.splice(idx, 1);
                    setAnswers(newAnswers);
                    setFeedbackMsg(`✅ 正确！${questionItem.question} = ${answerNum}，配对成功！`);
                } else {
                    // 配对失败
                    setFeedbackMsg(`❌ 配对错误！${questionItem.question} 的正确答案是 ${questionItem.correct}，你拖拽了 ${answerNum}。再试试看～`);
                }
                setDraggedAnswer(null);
            };
            
            // 重置游戏
            const resetGame = () => {
                initGame();
            };

            // 渲染问题卡片 (每个卡片都是可放置区域)
            const renderQuestionCards = () => {
                return questions.map(q => {
                    const isPaired = !!matchedMap[q.id];
                    const isHighlight = highlightDropId === q.id && !isPaired && !allCompleted;
                    return (
                        <div 
                            key={q.id}
                            className={`question-card p-4 mb-3 rounded-xl border-2 transition-all cursor-pointer ${isPaired ? 'paired-card bg-green-100 border-green-400' : 'bg-white border-purple-200'} ${isHighlight ? 'drop-zone-active bg-purple-100' : ''}`}
                            onDragOver={(e) => handleDragOver(e, q.id)}
                            onDragLeave={handleDragLeave}
                            onDrop={(e) => handleDrop(e, q)}
                        >
                            <div className="flex justify-between items-center flex-wrap gap-2">
                                <span className="font-medium text-gray-800 text-base md:text-lg">{q.question}</span>
                                {isPaired && (
                                    <span className="text-green-600 text-sm font-bold bg-green-100 px-2 py-1 rounded-full">✓ 已配对 {matchedMap[q.id]?.answer}</span>
                                )}
                                {!isPaired && !allCompleted && (
                                    <span className="text-purple-500 text-xs bg-purple-50 px-2 py-1 rounded-full">📌 拖拽数字至此</span>
                                )}
                                {!isPaired && allCompleted && (
                                    <span className="text-gray-400 text-xs">🎉 全场最佳</span>
                                )}
                            </div>
                        </div>
                    );
                });
            };
            
            // 渲染答案卡片 (draggable)
            const renderAnswerCards = () => {
                if (answers.length === 0 && !allCompleted) {
                    return <div className="text-center text-purple-600 col-span-full py-8">✨ 太棒了！所有卡片都配对成功，点击重置继续挑战 ✨</div>;
                }
                return answers.map((ans, idx) => (
                    <div 
                        key={`ans-${ans}-${idx}`}
                        className="answer-card w-24 h-20 md:w-28 md:h-24 flex items-center justify-center text-3xl md:text-4xl font-extrabold text-purple-800 bg-amber-100 rounded-2xl shadow-md cursor-grab hover:shadow-xl transition-all hover:scale-105 active:cursor-grabbing"
                        draggable={!allCompleted}
                        onDragStart={(e) => handleDragStart(e, ans)}
                        onDragEnd={handleDragEnd}
                        data-answer={ans}
                    >
                        {ans}
                    </div>
                ));
            };
            
            return (
                <div className="bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 border border-purple-300 h-full flex flex-col">
                    <div className="border-b-2 border-dashed border-purple-400 pb-2 mb-3 flex items-center gap-2">
                        <span className="text-3xl">🎮</span>
                        <h2 className="text-2xl md:text-3xl font-bold text-purple-800">拖拽配对·公因数公倍数</h2>
                    </div>
                    <p className="text-gray-700 text-sm mb-3 bg-purple-50 p-2 rounded-xl">
                        ✨ <strong>玩法</strong>：将右侧的<span className="font-bold text-purple-700">数字卡片</span>拖拽到左侧<span className="font-bold text-purple-700">对应题目</span>上松开 → 配对正确自动消除，配对错误有提示！全部配对成功获胜！<br/>
                        💡 支持鼠标/触摸拖拽 (部分移动端长按卡片即可拖拽)
                    </p>
                    <div className="flex flex-col lg:flex-row gap-5 flex-1">
                        {/* 左侧题目区 */}
                        <div className="flex-1 bg-purple-50 rounded-2xl p-3 min-h-[380px] transition-all">
                            <h3 className="font-bold text-purple-700 text-center mb-2 text-lg">📌 题目区（将数字拖拽至此）</h3>
                            <div className="space-y-2 overflow-y-auto max-h-[450px] pr-1">
                                {renderQuestionCards()}
                            </div>
                        </div>
                        
                        {/* 右侧答案卡片区 */}
                        <div className="flex-1 bg-amber-50 rounded-2xl p-3">
                            <h3 className="font-bold text-purple-700 text-center mb-2 text-lg">🎯 数字卡片（可拖拽）</h3>
                            <div className="flex flex-wrap gap-3 justify-center items-start min-h-[200px]">
                                {renderAnswerCards()}
                            </div>
                        </div>
                    </div>
                    
                    <div className="flex justify-center gap-4 mt-6">
                        <button onClick={resetGame} className="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-8 rounded-full shadow transition transform hover:scale-105">🔄 重置游戏</button>
                    </div>
                    
                    {feedbackMsg && (
                        <div className={`mt-4 text-center text-base font-medium rounded-xl p-3 transition-all ${allCompleted ? 'bg-green-100 text-green-700 border border-green-300' : 'bg-purple-100 text-purple-700 border border-purple-200'}`}>
                            {feedbackMsg}
                        </div>
                    )}
                    
                    {/* 配对进度条 */}
                    <div className="mt-3 w-full bg-purple-200 rounded-full h-2.5 overflow-hidden">
                        <div 
                            className="bg-purple-600 h-2.5 rounded-full transition-all duration-300" 
                            style={{ width: `${(Object.keys(matchedMap).length / questions.length) * 100}%` }}
                        ></div>
                    </div>
                    <div className="flex justify-between text-xs text-purple-600 mt-1">
                        <span>配对进度</span>
                        <span>{Object.keys(matchedMap).length} / {questions.length}</span>
                    </div>
                    
                    <div className="mt-3 text-center text-xs text-purple-500">💡 提示：最大公因数(GCD)是都能整除的最大数；最小公倍数(LCM)是都能整除的最小数。短除法快速求解！</div>
                    <div className="mt-2 text-center text-green-700 bg-green-50 p-2 rounded-xl text-sm">🧸 拖拽配对结合数论，在互动中掌握短除法与公因数公倍数的精妙应用！</div>
                </div>
            );
        };
        
        // ======================= 主组件 =======================
        const MainPage = () => {
            return (
                <div className="flex flex-col lg:flex-row gap-6 w-full">
                    <div className="flex-1"><GcdLcmApp /></div>
                    <div className="flex-1"><MatchGame /></div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MainPage />);
    </script>
</body>
</html>
