<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>位置与方向 · 精准定位大师</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM & Babel CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        /* 拖拽优化 + 移动端友好 */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        .drag-card {
            transition: all 0.2s ease;
            cursor: grab;
            user-select: none;
            touch-action: manipulation;
        }
        .drag-card:active {
            cursor: grabbing;
            opacity: 0.7;
        }
        .drop-zone {
            transition: all 0.2s ease;
        }
        .drop-zone.drag-over {
            background-color: #f1e2ff;
            border-color: #9333ea;
            transform: scale(1.02);
            box-shadow: 0 6px 14px rgba(147, 51, 234, 0.25);
        }
        /* 大字体 (6号 ≈ 18px以上) */
        .big-text {
            font-size: 1.25rem;
            line-height: 1.45;
        }
        @media (min-width: 768px) {
            .big-text {
                font-size: 1.5rem;
            }
        }
        .knowledge-text {
            font-size: 1rem;
            line-height: 1.5;
        }
        @media (min-width: 768px) {
            .knowledge-text {
                font-size: 1.2rem;
            }
        }
        [draggable="true"] {
            -webkit-user-drag: element;
        }
        .compass-bg {
            background: radial-gradient(circle at 30% 30%, rgba(255,245,200,0.4), rgba(255,225,150,0.2));
        }
    </style>
</head>
<body class="bg-gradient-to-br from-[#CBAACB] to-[#D9C2E6] min-h-screen p-4 md:p-6 font-sans">

<div id="root" class="max-w-7xl mx-auto"></div>

<script type="text/babel">
    // 描述某个点的位置 互动课程 (知识点 + 拖拽配对游戏)
    const PrecisePositionGame = () => {
        // ---------- 知识点内容 (左侧) ----------
        const knowledgePoints = {
            title: "🎯 精确描述位置",
            intro: "要精确描述一个点的位置，需要三个要素：观测点、方向（偏角）、距离。",
            steps: [
                "🔹 1. 确定观测点（中心点）。",
                "🔹 2. 测量方向：通常以正北或正南为基准，说“北偏东30°”或“东偏北30°”。",
                "🔹 3. 测量距离：根据比例尺或实际长度确定。",
                "🔹 4. 完整描述：例如“灯塔在雷达站的北偏东40°方向，距离200米”。"
            ],
            angleRule: "📐 角度表示法：北偏东30° 表示从正北向东偏转30°；东偏北30° 表示从正东向北偏转30°。",
            mapTip: "🗺️ 在平面图上，通常上北下南，左西右东，用量角器可以量出偏转角度。",
            example: "🎯 实战：以学校为观测点，图书馆在学校北偏西30°方向，距离400米。"
        };
        
        // ---------- 游戏配置：雷达站观测四个目标，每个目标有唯一的方向+角度+距离 ----------
        const targets = [
            { id: "ship", name: "货船", icon: "🚢", direction: "北偏东", angle: 30, distance: "200 m", fullDesc: "北偏东30° 距离200m" },
            { id: "lighthouse", name: "灯塔", icon: "🗼", direction: "东偏北", angle: 45, distance: "150 m", fullDesc: "东偏北45° 距离150m" },
            { id: "island", name: "小岛", icon: "🏝️", direction: "南偏西", angle: 60, distance: "250 m", fullDesc: "南偏西60° 距离250m" },
            { id: "buoy", name: "浮标", icon: "🪝", direction: "北偏西", angle: 20, distance: "180 m", fullDesc: "北偏西20° 距离180m" }
        ];
        
        // 可拖拽的描述卡片（与目标一一对应）
        const descriptionCards = [
            { id: "card_ship", text: "北偏东30° 距离200m", emoji: "🧭", correctFor: "ship", fullDesc: "货船在雷达站的北偏东30°，200米处" },
            { id: "card_lighthouse", text: "东偏北45° 距离150m", emoji: "⚓", correctFor: "lighthouse", fullDesc: "灯塔在雷达站的东偏北45°，150米处" },
            { id: "card_island", text: "南偏西60° 距离250m", emoji: "🌊", correctFor: "island", fullDesc: "小岛在雷达站的南偏西60°，250米处" },
            { id: "card_buoy", text: "北偏西20° 距离180m", emoji: "🧿", correctFor: "buoy", fullDesc: "浮标在雷达站的北偏西20°，180米处" }
        ];
        
        // 游戏状态
        const [availableCards, setAvailableCards] = React.useState(descriptionCards);
        const [matchedTargets, setMatchedTargets] = React.useState({}); // key: targetId, value: cardId
        const [message, setMessage] = React.useState({ text: "🐣 把正确的定位卡片拖拽到对应的目标物体上！长按卡片并拖动～", type: "info" });
        const [gameWin, setGameWin] = React.useState(false);
        
        const draggingCardRef = React.useRef(null);
        
        // 检查胜利
        React.useEffect(() => {
            const allMatched = targets.every(target => matchedTargets[target.id] !== undefined);
            if (allMatched && !gameWin) {
                setGameWin(true);
                setMessage({ text: "🎉 太棒啦！你完全掌握了用方向、角度、距离精确定位！成为定位小专家！ 🎉", type: "success" });
            } else if (!allMatched && gameWin) {
                setGameWin(false);
            }
        }, [matchedTargets, gameWin]);
        
        const showMessage = (msg, msgType = "error", duration = 2200) => {
            setMessage({ text: msg, type: msgType });
            setTimeout(() => {
                setMessage(prev => prev.text === msg ? { text: "✨ 继续拖拽配对，把定位卡片放到正确的目标上！", type: "info" } : prev);
            }, duration);
        };
        
        // 拖拽开始
        const handleDragStart = (e, card) => {
            if (!availableCards.some(c => c.id === card.id)) {
                e.preventDefault();
                showMessage("⛔ 这张定位卡片已经配对过了！点击「重置游戏」可以重新挑战", "error");
                return false;
            }
            draggingCardRef.current = card;
            e.dataTransfer.setData("text/plain", card.id);
            e.dataTransfer.effectAllowed = "copy";
            if (e.target) e.target.style.opacity = "0.6";
            return true;
        };
        
        const handleDragEnd = (e) => {
            if (e.target) e.target.style.opacity = "";
            draggingCardRef.current = null;
        };
        
        const handleDragOver = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "copy";
        };
        
        // 高亮效果
        const handleDragEnter = (e, targetId) => {
            e.preventDefault();
            const zoneElem = document.getElementById(`dropzone-${targetId}`);
            if (zoneElem) zoneElem.classList.add("drag-over");
        };
        
        const handleDragLeave = (e, targetId) => {
            const zoneElem = document.getElementById(`dropzone-${targetId}`);
            if (zoneElem) zoneElem.classList.remove("drag-over");
        };
        
        // 放置逻辑：将卡片配对到目标
        const handleDrop = (e, target) => {
            e.preventDefault();
            const zoneElem = document.getElementById(`dropzone-${target.id}`);
            if (zoneElem) zoneElem.classList.remove("drag-over");
            
            let draggedCard = draggingCardRef.current;
            if (!draggedCard) {
                const cardId = e.dataTransfer.getData("text/plain");
                draggedCard = descriptionCards.find(c => c.id === cardId);
            }
            if (!draggedCard) return;
            
            if (!availableCards.some(c => c.id === draggedCard.id)) {
                showMessage(`❌ 定位卡片“${draggedCard.text}”已经配对过了！`, "error");
                return;
            }
            
            if (matchedTargets[target.id] !== undefined) {
                showMessage(`❌ ${target.name} 已经配对过了！不能重复放置。`, "error");
                return;
            }
            
            const isCorrect = (draggedCard.correctFor === target.id);
            if (isCorrect) {
                setAvailableCards(prev => prev.filter(card => card.id !== draggedCard.id));
                setMatchedTargets(prev => ({
                    ...prev,
                    [target.id]: draggedCard.id
                }));
                showMessage(`✅ 正确！${target.name} 的位置是 ${target.fullDesc}，配对成功！`, "success", 1600);
            } else {
                // 找出正确描述
                const correctTarget = targets.find(t => t.id === draggedCard.correctFor);
                showMessage(`❌ 配对错误！${draggedCard.text} 是 ${correctTarget?.name || '其他物体'} 的描述，不是 ${target.name} 的。再试试看～`, "error", 2000);
            }
            draggingCardRef.current = null;
        };
        
        // 重置游戏
        const resetGame = () => {
            setAvailableCards(descriptionCards);
            setMatchedTargets({});
            setGameWin(false);
            setMessage({ text: "🔄 游戏已重置！所有定位卡片重新出现，再挑战一次吧！", type: "info" });
            draggingCardRef.current = null;
            document.querySelectorAll('.drop-zone').forEach(el => el.classList.remove('drag-over'));
        };
        
        const matchedCount = Object.keys(matchedTargets).length;
        const totalTargets = targets.length;
        
        // 辅助渲染方向指示小罗盘
        const DirectionHelper = () => (
            <div className="bg-white/60 rounded-xl p-2 text-center mt-2">
                <div className="grid grid-cols-3 gap-1 max-w-[200px] mx-auto text-xs">
                    <div>西北</div><div>北⬆️</div><div>东北</div>
                    <div>西⬅️</div><div>🧭</div><div>东➡️</div>
                    <div>西南</div><div>南⬇️</div><div>东南</div>
                </div>
                <p className="text-[10px] text-gray-600">角度：北偏东30° 即从北向东转30°</p>
            </div>
        );
        
        return (
            <div className="w-full">
                <div className="flex flex-col lg:flex-row gap-6 lg:gap-8">
                    {/* ================= 左侧：知识点区域 ================= */}
                    <div className="lg:w-5/12 bg-white/85 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 border border-white/40 transition-all">
                        <div className="flex items-center gap-2 border-b-4 border-purple-300 pb-3 mb-4">
                            <span className="text-4xl">🎯</span>
                            <h2 className="text-3xl md:text-4xl font-extrabold text-purple-800">定位讲堂</h2>
                            <span className="text-sm bg-purple-200 px-3 py-1 rounded-full ml-2">方向·角度·距离</span>
                        </div>
                        <div className="knowledge-text text-gray-800 space-y-4">
                            <p className="text-xl font-bold text-indigo-700">{knowledgePoints.title}</p>
                            <p className="bg-white/60 p-3 rounded-xl">✨ {knowledgePoints.intro}</p>
                            <ul className="list-disc list-inside space-y-1 bg-purple-50 p-3 rounded-xl">
                                {knowledgePoints.steps.map((item, idx) => <li key={idx}>{item}</li>)}
                            </ul>
                            <div className="bg-amber-50 p-3 rounded-xl text-amber-800 text-sm">
                                {knowledgePoints.angleRule}
                            </div>
                            <div className="bg-cyan-50 p-2 rounded-lg text-cyan-700 text-sm italic">
                                {knowledgePoints.mapTip}
                            </div>
                            <div className="bg-green-50 p-2 rounded-lg text-green-700 text-sm">
                                {knowledgePoints.example}
                            </div>
                            {DirectionHelper()}
                            <div className="bg-purple-100 p-3 rounded-xl text-purple-700 text-xs">
                                💡 小技巧：量角器0刻度线对准正北或正南，测量偏转角度。先确定基准方向，再看偏向哪一侧。
                            </div>
                        </div>
                        <div className="mt-4 text-center text-purple-600 bg-purple-100/60 rounded-xl p-2 text-sm md:text-base">
                            🌟 方向+角度+距离 = 精准定位！拖拽配对，成为导航高手！
                        </div>
                    </div>
                    
                    {/* ================= 右侧：互动游戏区 ================= */}
                    <div className="lg:w-7/12 bg-white/90 backdrop-blur-sm rounded-3xl shadow-2xl p-5 md:p-6 flex flex-col border border-purple-200">
                        <div className="flex flex-wrap justify-between items-center gap-3 border-b-2 border-purple-300 pb-3 mb-4">
                            <div className="flex items-center gap-2">
                                <span className="text-3xl">🎮</span>
                                <h2 className="text-3xl md:text-4xl font-extrabold text-purple-800">定位配对工坊</h2>
                                <span className="text-sm bg-yellow-200 px-2 py-1 rounded-full">拖拽配对</span>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="bg-purple-100 rounded-full px-4 py-1 text-purple-700 font-bold text-lg">
                                    配对进度 {matchedCount}/{totalTargets}
                                </div>
                                <button 
                                    onClick={resetGame}
                                    className="bg-amber-400 hover:bg-amber-500 text-amber-900 font-bold py-2 px-4 rounded-full shadow-md transition transform hover:scale-105 text-base md:text-lg flex items-center gap-1"
                                >
                                    🔄 重置游戏
                                </button>
                            </div>
                        </div>
                        
                        {/* 消息提示 */}
                        <div className={`mb-4 p-3 rounded-xl text-center font-medium transition-all big-text ${message.type === 'error' ? 'bg-red-100 text-red-700 border border-red-300' : message.type === 'success' ? 'bg-green-100 text-green-700 border border-green-300' : 'bg-indigo-50 text-indigo-600 border border-indigo-200'}`}>
                            {message.text}
                        </div>
                        
                        {/* 观测场景：雷达站 + 四个目标（按方位摆放示意） */}
                        <div className="compass-bg rounded-3xl p-4 mb-6 shadow-inner relative">
                            <p className="text-center font-bold text-purple-800 mb-3">🛰️ 雷达站观测点（中心）</p>
                            <div className="grid grid-cols-2 gap-4 md:grid-cols-2">
                                {targets.map(target => {
                                    const isMatched = matchedTargets[target.id] !== undefined;
                                    return (
                                        <div key={target.id} className="bg-white/70 rounded-2xl p-3 flex flex-col items-center shadow-md">
                                            <span className="text-5xl">{target.icon}</span>
                                            <p className="font-bold text-gray-800 mt-1">{target.name}</p>
                                            <div 
                                                id={`dropzone-${target.id}`}
                                                onDragOver={handleDragOver}
                                                onDragEnter={(e) => handleDragEnter(e, target.id)}
                                                onDragLeave={(e) => handleDragLeave(e, target.id)}
                                                onDrop={(e) => handleDrop(e, target)}
                                                className={`drop-zone w-full mt-2 p-2 rounded-xl border-2 border-dashed transition-all text-center ${
                                                    isMatched ? 'bg-green-100 border-green-400' : 'bg-white/80 border-purple-300'
                                                }`}
                                            >
                                                {isMatched ? (
                                                    <div>
                                                        <span className="text-green-700 text-sm font-bold">✅ 已定位</span>
                                                        <p className="text-xs text-green-600">{target.fullDesc}</p>
                                                    </div>
                                                ) : (
                                                    <div>
                                                        <span className="text-purple-500 text-xs">⬇️ 拖拽定位卡片到这里</span>
                                                        <p className="text-[10px] text-gray-400">匹配正确的方向+角度+距离</p>
                                                    </div>
                                                )}
                                            </div>
                                            {/* 显示正确位置的小提示（未配对时帮助学习） */}
                                            {!isMatched && (
                                                <p className="text-[10px] text-gray-400 mt-1">❓ 位置: ?</p>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                            <div className="mt-3 text-center text-xs text-gray-500">
                                💡 提示：以雷达站为中心，每个目标都有唯一的方向、角度和距离
                            </div>
                        </div>
                        
                        {/* 可拖拽卡片池（定位描述卡片） */}
                        <div className="mt-2">
                            <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
                                <h3 className="text-2xl font-bold text-purple-700 flex items-center gap-2">
                                    🃏 定位卡片池
                                    <span className="text-sm bg-yellow-200 px-2 py-1 rounded-full">长按/鼠标拖拽</span>
                                </h3>
                                <span className="text-xs md:text-sm text-purple-500">💡 把卡片拖到上方对应的物体上</span>
                            </div>
                            
                            {availableCards.length === 0 ? (
                                <div className="bg-gradient-to-r from-green-100 to-emerald-100 p-6 rounded-2xl text-center text-green-700 text-xl font-bold">
                                    🎉 完美！所有目标都精确定位成功！ 你已经是定位大师啦 🎉
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                                    {availableCards.map(card => (
                                        <div
                                            key={card.id}
                                            draggable={true}
                                            onDragStart={(e) => handleDragStart(e, card)}
                                            onDragEnd={handleDragEnd}
                                            className="drag-card bg-gradient-to-br from-amber-200 to-orange-300 rounded-2xl p-3 shadow-md flex items-center gap-3 cursor-grab active:cursor-grabbing hover:shadow-xl transition-all transform hover:scale-[1.02]"
                                        >
                                            <div className="text-3xl">{card.emoji}</div>
                                            <div className="flex-1">
                                                <p className="font-bold text-gray-800 text-base md:text-lg">{card.text}</p>
                                                <p className="text-xs text-amber-800 mt-0.5">{card.fullDesc}</p>
                                                <p className="text-[10px] text-purple-600 mt-1">👉 拖拽配对</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            {/* 玩法说明 + 量角器小技巧 */}
                            <div className="mt-5 bg-purple-100/70 p-3 rounded-xl text-purple-700 text-sm">
                                <p className="font-bold">📌 拖拉拽玩法：</p>
                                <ul className="list-disc list-inside space-y-1">
                                    <li>① 手指/鼠标长按定位卡片（包含方向、角度、距离）</li>
                                    <li>② 拖拽到上方对应物体的放置区（货船、灯塔、小岛、浮标）</li>
                                    <li>③ 配对正确，卡片消失，放置区显示“✅ 已定位”及完整描述</li>
                                    <li>④ 全部4个目标配对成功，获得胜利 🏆</li>
                                </ul>
                                <div className="mt-2 bg-white/60 rounded-lg p-2 text-xs">
                                    💡 <strong>量角器用法</strong>：将量角器的中心对准观测点，0°刻度线对准正北（或正南），读出物体方向线与基准线的夹角。例如“北偏东30°”即从正北向东旋转30°。
                                </div>
                                <div className="mt-2 text-xs text-gray-600">
                                    📐 <strong>描述规范</strong>：通常先说“北偏东”或“南偏西”等，再讲角度，最后说距离。如“灯塔在雷达站的东偏北45°，距离150米”。
                                </div>
                            </div>
                            
                            {gameWin && (
                                <div className="mt-4 bg-gradient-to-r from-green-200 to-teal-200 text-green-800 p-4 rounded-2xl text-center text-xl font-bold animate-pulse flex items-center justify-center gap-3 shadow-lg">
                                    🏆 恭喜你完成所有定位！🏆 <span className="text-3xl">🎓🗺️</span>
                                </div>
                            )}
                        </div>
                        <div className="mt-3 text-center text-xs text-purple-500">
                            💡 移动端小技巧：长按卡片并轻轻拖拽到目标区上方，松手即可。方向+角度+距离，定位超精准！
                        </div>
                    </div>
                </div>
                {/* 底部装饰 */}
                <div className="text-center mt-8 text-purple-800 text-sm bg-white/30 rounded-full py-2 px-4 w-fit mx-auto backdrop-blur-sm">
                    🌈 北偏东30°、东偏北45°…… 方向+角度+距离，精确定位我能行！拖拽配对，成为导航大师！ 🌟
                </div>
            </div>
        );
    };
    
    // 渲染到根节点
    ReactDOM.createRoot(document.getElementById("root")).render(
        <React.StrictMode>
            <PrecisePositionGame />
        </React.StrictMode>
    );
</script>
</body>
</html>
