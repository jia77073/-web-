<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>假设法小能手 | 鸡兔同笼·差值修正·假设推理</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM & Babel -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <style>
        .dragging-card {
            opacity: 0.6;
            cursor: grabbing;
            transform: scale(0.95);
        }
        .drop-zone-active {
            transition: 0.08s linear;
            box-shadow: 0 0 0 4px #c084fc, 0 0 0 8px rgba(192,132,252,0.3);
            background-color: #f3e8ff !important;
        }
        .win-glow {
            animation: winPulse 0.5s ease-in-out 2;
        }
        @keyframes winPulse {
            0% { box-shadow: 0 0 0 0 #c084fc; background-color: #faf5ff; }
            50% { box-shadow: 0 0 0 12px rgba(192,132,252,0.5); background-color: #fae8ff; }
            100% { box-shadow: 0 0 0 0 #c084fc; background-color: #faf5ff; }
        }
        [draggable="true"] {
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }
        .custom-scroll::-webkit-scrollbar {
            width: 5px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #9333ea;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-50 via-fuchsia-50 to-purple-100 min-h-screen p-4 md:p-6 font-sans">

<div id="root"></div>

<script type="text/babel">
    // 假设法专项训练 —— 鸡兔同笼通用解法 · 假设推理 · 差值修正
    const { useState, useCallback, useEffect, useRef } = React;

    // ---------- 随机题目生成器 (经典假设法：鸡兔同笼、得失分、混合问题) ----------
    const generateAssumeProblem = () => {
        const type = Math.floor(Math.random() * 3); // 0:鸡兔同笼, 1:得分/答题问题, 2:购物/混合问题
        if (type === 0) {
            // 鸡兔同笼：头数，腿数，求鸡或兔的只数
            const heads = Math.floor(Math.random() * 25) + 10; // 10~35
            // 确保兔子数合理 (1~heads-1)
            const rabbits = Math.floor(Math.random() * (heads - 1)) + 1;
            const chickens = heads - rabbits;
            const legs = rabbits * 4 + chickens * 2;
            const ask = Math.floor(Math.random() * 2); // 0:求鸡, 1:求兔
            const correct = ask === 0 ? chickens : rabbits;
            const targetName = ask === 0 ? "鸡" : "兔";
            const questionText = `🐔🐇 鸡兔同笼：笼子里共有 ${heads} 个头，${legs} 条腿。请问 ${targetName} 有多少只？（用假设法解答）`;
            return { text: questionText, correctAnswer: correct, hint: `💡 假设全是兔，则应有 ${heads*4} 条腿，比实际多 ${heads*4 - legs} 条腿，每换一只鸡减少2条腿，所以鸡有 ${(heads*4 - legs)/2} 只。` };
        } 
        else if (type === 1) {
            // 得分问题：每做对一题得a分，做错一题扣b分（或不扣分但扣分），共做n题，得m分，求对题数
            const totalQs = Math.floor(Math.random() * 10) + 10; // 10~20
            const correctPoints = 5;
            const wrongPoints = -2; // 扣2分
            const correctCount = Math.floor(Math.random() * (totalQs - 2)) + 2; // 至少对2题
            const wrongCount = totalQs - correctCount;
            const totalScore = correctCount * correctPoints + wrongCount * wrongPoints;
            const ask = 0; // 求做对几题
            const correct = correctCount;
            const questionText = `📝 答题竞赛：一次数学竞赛共 ${totalQs} 道题，做对一题得 ${correctPoints} 分，做错一题扣 ${-wrongPoints} 分（即倒扣2分）。小明得了 ${totalScore} 分，请问他做对了多少道题？（用假设法）`;
            return { text: questionText, correctAnswer: correct, hint: `💡 假设全做对，应得 ${totalQs*correctPoints} 分，比实际多 ${totalQs*correctPoints - totalScore} 分，每把一道对题换成错题减少 ${correctPoints - wrongPoints} 分，所以错题数 = 差值 ÷ ${correctPoints - wrongPoints}。` };
        } 
        else {
            // 两类混合问题：例如买铅笔和圆珠笔总数量共用去一定钱数，求其中一种的数量
            const totalItems = Math.floor(Math.random() * 15) + 8; // 8~22
            const priceA = 2;
            const priceB = 5;
            const countA = Math.floor(Math.random() * (totalItems - 1)) + 1;
            const countB = totalItems - countA;
            const totalCost = countA * priceA + countB * priceB;
            const ask = Math.floor(Math.random() * 2); // 0求铅笔(便宜)数，1求圆珠笔(贵)数
            const correct = ask === 0 ? countA : countB;
            const nameA = "铅笔", nameB = "圆珠笔";
            const questionText = `✏️ 购物问题：小明买了 ${totalItems} 支笔，其中铅笔每支 ${priceA} 元，圆珠笔每支 ${priceB} 元，一共花了 ${totalCost} 元。请问他买了 ${ask === 0 ? nameA : nameB} 多少支？（用假设法）`;
            return { text: questionText, correctAnswer: correct, hint: `💡 假设全是 ${nameB}，则总价应为 ${totalItems*priceB} 元，比实际多 ${totalItems*priceB - totalCost} 元，每换一支${nameA}可减少 ${priceB - priceA} 元，所以${nameA}数量 = 差价 ÷ ${priceB - priceA}。` };
        }
    };

    // 生成干扰选项 (基于正确答案)
    const generateOptions = (correct) => {
        let opts = new Set();
        opts.add(correct);
        let candidates = [correct+1, correct-1, correct+2, correct-2, correct+3, correct-3, Math.floor(correct*1.2), Math.floor(correct*0.8)];
        candidates = candidates.filter(v => v > 0 && v !== correct);
        for (let c of candidates) {
            if (opts.size < 4) opts.add(c);
            if (opts.size >= 4) break;
        }
        while (opts.size < 4) opts.add(correct + opts.size);
        let arr = Array.from(opts);
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    };

    // 主组件
    const AssumeGame = () => {
        const [problem, setProblem] = useState(() => {
            const init = generateAssumeProblem();
            return init;
        });
        const [options, setOptions] = useState([]);
        const [correctAnswer, setCorrectAnswer] = useState(0);
        const [isWin, setIsWin] = useState(false);
        const [message, setMessage] = useState("✨ 假设全是某一种，再通过差值调整，拖拽正确答案到宝箱 ✨");
        const [winAnim, setWinAnim] = useState(false);
        const dragValueRef = useRef(null);

        const refreshProblem = useCallback(() => {
            const newProb = generateAssumeProblem();
            setProblem(newProb);
            setCorrectAnswer(newProb.correctAnswer);
            const newOpts = generateOptions(newProb.correctAnswer);
            setOptions(newOpts);
            setIsWin(false);
            setWinAnim(false);
            setMessage("🔁 新题目！用假设法先假设再修正，拖拽正确结果到宝箱！");
        }, []);

        useEffect(() => {
            setCorrectAnswer(problem.correctAnswer);
            setOptions(generateOptions(problem.correctAnswer));
        }, [problem]);

        const onCardDragStart = (e, num) => {
            if (isWin) {
                e.preventDefault();
                setMessage("🏆 已经胜利啦！点击「换一题」继续挑战！");
                return false;
            }
            dragValueRef.current = num;
            e.dataTransfer.setData("text/plain", num);
            e.dataTransfer.effectAllowed = "copy";
            if (e.target.classList) e.target.classList.add("dragging-card");
        };
        const onDragEnd = (e) => {
            if (e.target.classList) e.target.classList.remove("dragging-card");
            const zone = document.getElementById("answerDropZone");
            if (zone) zone.classList.remove("drop-zone-active");
            dragValueRef.current = null;
        };
        const onDragOverTarget = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "copy";
            const zone = document.getElementById("answerDropZone");
            if (zone && !isWin) zone.classList.add("drop-zone-active");
        };
        const onDragLeaveTarget = () => {
            const zone = document.getElementById("answerDropZone");
            if (zone) zone.classList.remove("drop-zone-active");
        };
        const onDropToTarget = (e) => {
            e.preventDefault();
            const zone = document.getElementById("answerDropZone");
            if (zone) zone.classList.remove("drop-zone-active");
            if (isWin) {
                setMessage("你已经获胜，换一题再挑战吧！");
                return;
            }
            const raw = e.dataTransfer.getData("text/plain");
            if (!raw) return;
            const dropped = Number(raw);
            if (isNaN(dropped)) return;
            if (dropped === correctAnswer) {
                setIsWin(true);
                setWinAnim(true);
                setMessage("🎉🎉 完全正确！假设法掌握得真棒！差值修正一步到位 🎉🎉");
                setTimeout(() => setWinAnim(false), 600);
            } else {
                setMessage(`❌ ${dropped} 不是正确答案。再试试假设法步骤：先假设全是某类，算出差值，再除以每换一个的差值。提示：${problem.hint}`);
                const msgDiv = document.querySelector(".feedback-msg");
                if (msgDiv) msgDiv.classList.add("animate-pulse");
                setTimeout(() => {
                    if (msgDiv) msgDiv.classList.remove("animate-pulse");
                }, 600);
            }
        };

        return (
            <div className="max-w-7xl mx-auto">
                {/* 主标题 */}
                <div className="text-center mb-6">
                    <h1 className="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-900 to-fuchsia-700 drop-shadow-md">
                        🧠 假设法小能手 · 差值修正思维 🧠
                    </h1>
                    <p className="text-purple-800 text-lg font-semibold mt-1">先假设 | 找差距 | 再调整 | 求答案</p>
                </div>
                
                <div className="flex flex-col lg:flex-row gap-7">
                    {/* 左侧知识点区 */}
                    <div className="lg:w-2/5 bg-white/80 backdrop-blur-sm rounded-3xl shadow-xl p-5 border border-purple-200 custom-scroll overflow-y-auto">
                        <div className="flex items-center gap-2 border-b-2 border-purple-400 pb-2 mb-4">
                            <span className="text-3xl">📖</span>
                            <span className="text-3xl font-bold text-purple-900">核心知识点</span>
                        </div>
                        <div className="space-y-5 text-gray-800 text-base md:text-lg">
                            <div className="bg-purple-50 p-4 rounded-xl">
                                <p className="font-extrabold text-purple-800 text-xl">🔮 假设法 · 三步走</p>
                                <ol className="list-decimal list-inside space-y-1 mt-1">
                                    <li><strong>假设</strong>：先假设全部为同一种量（如全是鸡或全是兔）。</li>
                                    <li><strong>对比</strong>：计算假设情况下的总量，与实际总量对比，得到<span className="text-fuchsia-700">总差值</span>。</li>
                                    <li><strong>调整</strong>：每次将一个“假设量”换成另一种，会引起固定的<span className="text-fuchsia-700">单位差值</span>，用总差值 ÷ 单位差值 = 需要换的次数，就得到另一种量的数量。</li>
                                </ol>
                            </div>
                            <div className="bg-indigo-50 p-4 rounded-xl">
                                <p className="font-bold text-purple-800">✨ 经典模型代表 ✨</p>
                                <ul className="list-disc list-inside space-y-2 mt-1">
                                    <li><strong>🐔🐇 鸡兔同笼</strong>：假设全是鸡，腿数少算，每换一只兔子多2条腿 → 兔子数 = (实际腿数 - 鸡腿假设) ÷ 2</li>
                                    <li><strong>📝 得分问题</strong>：假设全对，得分高，每错一题扣（得分+扣分） → 错题数 = (全对总分 - 实际分) ÷ (对题得分+错题扣分)</li>
                                    <li><strong>💰 混合购物</strong>：假设全买贵的，总价高，每换一件便宜的减少差价 → 便宜数量 = (贵价总价 - 实际总价) ÷ 单价差</li>
                                </ul>
                            </div>
                            <div className="bg-fuchsia-50 p-4 rounded-xl">
                                <p className="font-bold">🧠 假设法核心优势</p>
                                <p>将复杂的两类量问题转化为简单的<span className="font-bold">“总差 ÷ 单位差”</span>，避开方程，培养整体思维和差值分析能力。</p>
                            </div>
                            <div className="bg-amber-50 p-3 rounded-lg text-sm">
                                💡 右侧游戏：拖拽正确的答案数字到宝箱！每道题都可用假设法快速求解。先自己思考再验证～
                            </div>
                        </div>
                    </div>
                    
                    {/* 右侧互动游戏区 */}
                    <div className="lg:w-3/5 bg-white/95 rounded-3xl shadow-2xl p-5 border-2 border-purple-300 flex flex-col">
                        {/* 题目卡片 */}
                        <div className="bg-gradient-to-r from-purple-200 via-fuchsia-100 to-purple-200 rounded-2xl p-5 mb-5 shadow-md">
                            <div className="flex flex-wrap justify-between items-start gap-2">
                                <div className="flex-1">
                                    <span className="inline-block bg-purple-700 text-white text-sm px-4 py-1 rounded-full">🎯 假设法挑战</span>
                                    <p className="text-lg md:text-xl font-bold text-purple-900 mt-3 leading-relaxed">
                                        {problem.text}
                                    </p>
                                    <div className="mt-2 text-sm bg-white/60 inline-block px-3 py-1 rounded-full text-purple-700">
                                        📌 提示：{problem.hint}
                                    </div>
                                </div>
                                <button 
                                    onClick={refreshProblem}
                                    className="bg-fuchsia-600 hover:bg-fuchsia-700 text-white font-bold py-2 px-6 rounded-full transition shadow-md flex items-center gap-1 text-base md:text-lg"
                                >
                                    🔄 换一题
                                </button>
                            </div>
                        </div>
                        
                        {/* 拖拽卡片 + 答案宝箱 */}
                        <div className="flex flex-col md:flex-row gap-6 items-stretch mb-5">
                            <div className="flex-1 bg-purple-50/80 rounded-2xl p-4 border border-purple-200">
                                <p className="text-center font-bold text-purple-800 mb-3 text-lg">🎲 可拖拽数字 (正确答案)</p>
                                <div className="flex flex-wrap justify-center gap-3">
                                    {options.map((opt, idx) => (
                                        <div
                                            key={idx}
                                            draggable={!isWin}
                                            onDragStart={(e) => onCardDragStart(e, opt)}
                                            onDragEnd={onDragEnd}
                                            className="w-16 h-16 md:w-20 md:h-20 bg-gradient-to-br from-amber-300 to-orange-400 rounded-2xl shadow-lg flex flex-col items-center justify-center cursor-grab active:cursor-grabbing transition hover:scale-105 border-2 border-purple-500"
                                        >
                                            <span className="text-3xl md:text-4xl font-black text-white drop-shadow-md">{opt}</span>
                                            <span className="text-[10px] font-bold text-purple-900">拖拽</span>
                                        </div>
                                    ))}
                                </div>
                                <p className="text-xs text-center text-gray-600 mt-3">👉 把假设法算出的正确数字拖到右边宝箱区</p>
                            </div>
                            
                            <div 
                                id="answerDropZone"
                                onDragOver={onDragOverTarget}
                                onDragLeave={onDragLeaveTarget}
                                onDrop={onDropToTarget}
                                className={`flex-1 bg-gradient-to-br from-amber-50 to-yellow-50 rounded-2xl border-4 border-dashed p-5 flex flex-col items-center justify-center transition-all min-h-[200px] ${isWin ? 'border-green-500 bg-green-50' : 'border-purple-400'}`}
                            >
                                {isWin ? (
                                    <div className="text-center">
                                        <div className="text-7xl mb-2">🏆🎉</div>
                                        <p className="text-2xl font-black text-green-700">假设成功！</p>
                                        <p className="text-purple-700 mt-2">差值修正小英雄</p>
                                    </div>
                                ) : (
                                    <>
                                        <span className="text-5xl mb-2">📦</span>
                                        <span className="text-xl font-bold text-purple-800 text-center">答案宝箱</span>
                                        <p className="text-center text-gray-600 mt-2 text-sm">将正确答案拖拽至此 → <br/>验证假设法推理！</p>
                                        <div className="mt-3 w-32 h-16 bg-white rounded-xl flex items-center justify-center shadow-inner border border-purple-300">
                                            <span className="text-2xl font-mono font-bold text-gray-400">???</span>
                                        </div>
                                    </>
                                )}
                            </div>
                        </div>
                        
                        {/* 反馈消息区 */}
                        <div className={`feedback-msg mt-3 text-center py-3 px-4 rounded-full font-medium text-base md:text-lg ${isWin ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-800'} shadow-inner transition`}>
                            {isWin ? "🎉 完美！假设法运用自如！点击换一题继续进阶 🎉" : message}
                        </div>
                        
                        {/* 辅助按钮 */}
                        <div className="flex justify-center mt-4 gap-4">
                            <button 
                                onClick={() => {
                                    if (!isWin) setMessage(`💡 假设法步骤：1. 假设全为一种；2. 求假设总量与实际总量的差值；3. 找出“换一个”引起的差；4. 用总差÷单位差求出另一种数量。 ${problem.hint}`);
                                    else setMessage("胜利啦！继续用假设法挑战新题吧！");
                                }}
                                className="text-purple-600 bg-purple-100 px-3 py-1 rounded-full text-sm"
                            >
                                ✨ 假设法步骤
                            </button>
                            <button 
                                onClick={refreshProblem}
                                className="text-fuchsia-600 bg-fuchsia-100 px-3 py-1 rounded-full text-sm"
                            >
                                🎲 换一题新挑战
                            </button>
                        </div>
                        
                        <div className="text-xs text-purple-500 text-center mt-4 border-t pt-3 border-purple-200">
                            💡 假设法秘诀：先假设全部是A，算出总量差，再除以每个A换成B的差值，就得到B的数量。多练习就能秒解鸡兔同笼类问题！
                        </div>
                    </div>
                </div>
            </div>
        );
    };
    
    ReactDOM.createRoot(document.getElementById("root")).render(<AssumeGame />);
</script>
</body>
</html>
