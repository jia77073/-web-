<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>🧸 小数的初步认识 · 数学游乐园</title>
  <!-- Tailwind + React CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .drag-card:active {
      opacity: 0.6;
      cursor: grabbing;
    }
    .drop-zone {
      transition: all 0.1s ease;
    }
    .drop-zone.drag-over {
      background-color: #e9d4ff;
      border-color: #a855f7;
      transform: scale(1.02);
    }
    /* 简单圆形阴影表示十分之几 */
    .fraction-circle {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #fde68a;
      position: relative;
      overflow: hidden;
    }
    .fraction-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #f59e0b;
      transition: height 0.2s;
    }
    @media (max-width: 640px) {
      .fraction-circle { width: 48px; height: 48px; }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#D9C2E6] to-[#CBAACB] min-h-screen flex items-center justify-center p-4 font-sans">

<div id="root" class="w-full max-w-6xl mx-auto"></div>

<script type="text/babel">
  // ---------- 示例展示组件（分数转小数）----------
  const FractionToDecimalDemo = ({ fraction }) => {
    const [numerator, denominator] = fraction.split('/').map(Number);
    const decimal = (numerator / denominator).toFixed(1);
    // 绘制十分之几的圆形图（只用于十分之几，简单示意）
    const percent = (numerator / denominator) * 100;
    return (
      <div className="flex flex-col items-center gap-2 bg-white/80 p-3 rounded-xl">
        <div className="fraction-circle">
          <div className="fraction-fill" style={{ height: `${percent}%` }}></div>
        </div>
        <div className="text-lg font-bold text-purple-800">{fraction}</div>
        <div className="text-2xl font-mono text-amber-700">= {decimal}</div>
      </div>
    );
  };

  // ---------- 生成随机题目集（分数和小数配对）----------
  // 分母为10的真分数：1/10, 2/10, ..., 9/10
  const ALL_FRACTIONS = [
    { fraction: "1/10", decimal: "0.1", displayDec: "0.1" },
    { fraction: "2/10", decimal: "0.2", displayDec: "0.2" },
    { fraction: "3/10", decimal: "0.3", displayDec: "0.3" },
    { fraction: "4/10", decimal: "0.4", displayDec: "0.4" },
    { fraction: "5/10", decimal: "0.5", displayDec: "0.5" },
    { fraction: "6/10", decimal: "0.6", displayDec: "0.6" },
    { fraction: "7/10", decimal: "0.7", displayDec: "0.7" },
    { fraction: "8/10", decimal: "0.8", displayDec: "0.8" },
    { fraction: "9/10", decimal: "0.9", displayDec: "0.9" }
  ];

  // 随机选取4个不同的分数作为一组题目
  const generateQuestionSet = () => {
    const shuffled = [...ALL_FRACTIONS];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled.slice(0, 4);
  };

  // ---------- 拖拽配对游戏组件 ----------
  const DragMatchGame = ({ resetKey, onNewGame }) => {
    const [questions, setQuestions] = React.useState(() => generateQuestionSet());
    const [matchedStatus, setMatchedStatus] = React.useState({}); // key: 分数字符串, value: 是否已配对
    const [dragFeedback, setDragFeedback] = React.useState("");
    const [isCompleted, setIsCompleted] = React.useState(false);
    
    // 重置/换题时重新生成
    React.useEffect(() => {
      const newSet = generateQuestionSet();
      setQuestions(newSet);
      setMatchedStatus({});
      setDragFeedback("");
      setIsCompleted(false);
    }, [resetKey]);
    
    const successCount = Object.values(matchedStatus).filter(v => v === true).length;
    const allMatched = successCount === questions.length;
    
    // 当全部配对时自动显示完成消息
    React.useEffect(() => {
      if (successCount === questions.length && questions.length > 0) {
        setIsCompleted(true);
        setDragFeedback("🎉 太棒啦！所有小数都配对正确！ 🎉");
      }
    }, [successCount, questions]);
    
    const onDragStart = (e, fractionStr) => {
      if (matchedStatus[fractionStr]) {
        e.preventDefault();
        setDragFeedback("🎁 这个分数已经配对成功啦！不能重复拖拽～");
        return false;
      }
      e.dataTransfer.setData("text/plain", fractionStr);
      e.dataTransfer.effectAllowed = "copy";
      setDragFeedback(`✨ 拖动分数 ${fractionStr} ，放到正确的小数盒子里吧！`);
    };
    
    const onDragEnd = () => {
      setTimeout(() => setDragFeedback(""), 800);
    };
    
    const onDragOver = (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "copy";
    };
    
    const onDrop = (e, targetDecimal) => {
      e.preventDefault();
      const draggedFraction = e.dataTransfer.getData("text/plain");
      if (!draggedFraction) return;
      const question = questions.find(q => q.fraction === draggedFraction);
      if (!question) return;
      if (matchedStatus[draggedFraction]) {
        setDragFeedback("🧸 这个分数已经配对过了，不能重复配对哦～");
        return;
      }
      if (question.decimal === targetDecimal) {
        setMatchedStatus(prev => ({ ...prev, [draggedFraction]: true }));
        setDragFeedback(`🎉 正确！ ${draggedFraction} = ${targetDecimal} 配对成功！ 🎉`);
      } else {
        setDragFeedback(`❌ 噢不！ ${draggedFraction} 不等于 ${targetDecimal}，再试试看！ 💪`);
      }
    };
    
    const resetGame = () => {
      setMatchedStatus({});
      setDragFeedback("✨ 游戏已重置，快重新拖拽配对叭！");
      setIsCompleted(false);
    };
    
    const newGame = () => {
      onNewGame();
    };
    
    // 打乱小数顺序用于右侧显示
    const shuffledDecimals = React.useMemo(() => {
      const decimals = questions.map(q => q.displayDec);
      for (let i = decimals.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [decimals[i], decimals[j]] = [decimals[j], decimals[i]];
      }
      return decimals;
    }, [questions]);
    
    return (
      <div className="flex flex-col gap-4">
        <div className="bg-[#F7EDE1] rounded-2xl p-3 shadow-md border border-[#ddb594]">
          <div className="text-center text-sm text-stone-600 mb-2">
            🧸 把左边的分数拖拽到右边正确的小数盒子里
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            {/* 左侧：分数卡片（可拖拽） */}
            <div className="bg-white/60 rounded-xl p-3">
              <h4 className="font-bold text-[#936e4b] text-center mb-2">📖 分数（十分之几）</h4>
              <div className="flex flex-col gap-2">
                {questions.map(q => {
                  const isMatched = matchedStatus[q.fraction];
                  return (
                    <div
                      key={q.fraction}
                      draggable={!isMatched}
                      onDragStart={(e) => onDragStart(e, q.fraction)}
                      onDragEnd={onDragEnd}
                      className={`flex items-center justify-between p-2 rounded-xl border-2 transition-all ${isMatched ? 'bg-green-100 border-green-400 opacity-70 cursor-default' : 'bg-[#FFF7EF] border-[#ddb594] cursor-grab hover:shadow-md'}`}
                    >
                      <div className="flex items-center gap-3">
                        <span className="text-2xl">{isMatched ? '✓✓' : '🍕'}</span>
                        <span className="font-mono font-bold text-xl text-[#3f2e1f]">{q.fraction}</span>
                      </div>
                      {isMatched && <span className="bg-green-200 text-green-800 px-2 py-0.5 rounded-full text-xs">已配对</span>}
                      {!isMatched && <span className="text-sm text-[#bc6c25] animate-pulse">✨ 拖拽我</span>}
                    </div>
                  );
                })}
              </div>
            </div>
            
            {/* 右侧：小数盒子（放置区） */}
            <div className="bg-white/60 rounded-xl p-3">
              <h4 className="font-bold text-[#936e4b] text-center mb-2">🎯 小数盒子（拖放到这里）</h4>
              <div className="grid grid-cols-2 gap-3">
                {shuffledDecimals.map(decimal => {
                  // 找到这个小数对应的分数（用于判断是否已配对）
                  const relatedFraction = questions.find(q => q.displayDec === decimal)?.fraction;
                  const isMatchedTarget = relatedFraction ? matchedStatus[relatedFraction] : false;
                  return (
                    <div
                      key={decimal}
                      onDragOver={onDragOver}
                      onDrop={(e) => onDrop(e, decimal)}
                      className={`drop-zone rounded-xl p-3 text-center transition-all border-2 ${isMatchedTarget ? 'bg-emerald-100 border-emerald-400' : 'bg-[#F1E5D8] border-dashed border-[#C8AA8A] hover:bg-[#EADBCB]'}`}
                    >
                      <div className="text-3xl mb-1">{isMatchedTarget ? '🏆' : '📦'}</div>
                      <div className="font-mono text-2xl font-extrabold text-[#7B4B2A]">{decimal}</div>
                      <div className="text-xs text-[#AD8B73] mt-1">零点几</div>
                      {isMatchedTarget && <div className="text-green-700 text-xs mt-1">✅ 已配对</div>}
                      {!isMatchedTarget && <div className="text-[#b87c4a] text-[10px] mt-1">⬅️ 拖拽分数到这里</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
        
        <div className="flex gap-3 justify-center">
          <button onClick={resetGame} className="bg-amber-200 hover:bg-amber-300 text-amber-800 font-bold py-2 px-4 rounded-full transition shadow-sm text-sm">🔄 重置配对</button>
          <button onClick={newGame} className="bg-purple-200 hover:bg-purple-300 text-purple-800 font-bold py-2 px-4 rounded-full transition shadow-sm text-sm">🎲 换一组题目</button>
        </div>
        
        {dragFeedback && (
          <div className={`text-center font-bold p-2 rounded-full ${dragFeedback.includes('正确') ? 'bg-green-200 text-green-800' : 'bg-amber-100 text-amber-700'}`}>
            {dragFeedback}
          </div>
        )}
        {isCompleted && (
          <div className="text-center text-emerald-700 bg-emerald-100 p-2 rounded-full text-sm font-bold">
            🌟 完美！你已经掌握分数和小数的关系啦！ 🌟
          </div>
        )}
        <div className="text-xs text-center text-stone-500 bg-white/50 rounded-full py-1 px-2">
          💡 小提示：十分之几就是零点几，例如 3/10 = 0.3
        </div>
      </div>
    );
  };
  
  // ---------- 主应用 ----------
  const App = () => {
    const [displayMode, setDisplayMode] = React.useState('fraction'); // 'fraction' 或 'decimal'
    const [gameResetKey, setGameResetKey] = React.useState(0);
    const [exampleFraction, setExampleFraction] = React.useState("3/10");
    
    const toggleDisplay = () => {
      setDisplayMode(prev => prev === 'fraction' ? 'decimal' : 'fraction');
    };
    
    const handleNewGame = () => {
      setGameResetKey(prev => prev + 1);
    };
    
    const cycleExample = () => {
      const fractions = ["1/10", "2/10", "3/10", "4/10", "5/10", "6/10", "7/10", "8/10", "9/10"];
      const currentIndex = fractions.indexOf(exampleFraction);
      const nextIndex = (currentIndex + 1) % fractions.length;
      setExampleFraction(fractions[nextIndex]);
    };
    
    // 示例展示内容
    const ExampleDisplay = () => {
      const decimal = (eval(exampleFraction)).toFixed(1);
      const percent = (parseInt(exampleFraction) / 10) * 100;
      if (displayMode === 'fraction') {
        return (
          <div className="flex flex-col items-center gap-2">
            <div className="fraction-circle">
              <div className="fraction-fill" style={{ height: `${percent}%` }}></div>
            </div>
            <div className="text-2xl font-mono font-bold text-purple-800">{exampleFraction}</div>
            <div className="text-sm text-stone-500">= 十分之几</div>
          </div>
        );
      } else {
        return (
          <div className="flex flex-col items-center gap-2">
            <div className="text-5xl font-mono font-bold text-amber-700">{decimal}</div>
            <div className="text-sm text-stone-500">读作：零点{decimal.split('.')[1]}</div>
          </div>
        );
      }
    };
    
    return (
      <div className="flex flex-col lg:flex-row gap-6">
        {/* 左侧知识点卡片 */}
        <div className="lg:w-5/12 bg-white/80 backdrop-blur-sm rounded-3xl p-5 shadow-xl border border-white/40">
          <div className="flex items-center gap-2 border-b-2 border-[#CBAACB] pb-3 mb-4">
            <span className="text-3xl">📘</span>
            <h2 className="text-2xl font-extrabold text-[#6B4C3B]">小数的初步认识<br/><span className="text-sm font-normal">分数 ↔ 小数</span></h2>
          </div>
          <div className="space-y-4 text-[#3f2e1f]">
            <div className="bg-[#FDF5EA] rounded-2xl p-4">
              <p className="font-bold text-[#B5672E] flex items-center gap-2">🌟 什么是小数？</p>
              <p className="text-sm">像0.1、0.5、0.9这样中间有一个小圆点的数叫做小数。小数可以用来表示十分之几、百分之几……</p>
            </div>
            <div className="bg-[#FDF5EA] rounded-2xl p-4">
              <p className="font-bold text-[#B5672E]">📌 十分之几 → 零点几</p>
              <ul className="list-disc list-inside space-y-1 mt-1 text-sm">
                <li>1/10 读作：十分之一，写作小数：<span className="font-mono font-bold">0.1</span></li>
                <li>3/10 读作：十分之三，写作小数：<span className="font-mono font-bold">0.3</span></li>
                <li>7/10 读作：十分之七，写作小数：<span className="font-mono font-bold">0.7</span></li>
              </ul>
            </div>
            <div className="bg-[#FDF5EA] rounded-2xl p-4">
              <div className="flex justify-between items-center mb-2">
                <p className="font-bold text-[#B5672E]">🎨 示例展示</p>
                <button onClick={cycleExample} className="text-xs bg-[#D9C2E6] px-2 py-1 rounded-full">🔄 换一个</button>
              </div>
              <div className="flex justify-center">
                <ExampleDisplay />
              </div>
              <div className="flex justify-center mt-2">
                <button onClick={toggleDisplay} className="text-xs bg-[#CBAACB] px-3 py-1 rounded-full text-white font-semibold">
                  {displayMode === 'fraction' ? '📐 切换到小数' : '✖️ 切换到分数'}
                </button>
              </div>
            </div>
            <div className="bg-[#FDF5EA] rounded-2xl p-4">
              <p className="font-bold text-[#B5672E]">🎯 小技巧：</p>
              <p className="text-sm">分母是10的分数，可以直接写成一位小数。分子是几，小数部分就是几。</p>
              <div className="flex flex-wrap gap-2 mt-2 justify-center">
                <span className="bg-[#D9C2E6] px-2 py-1 rounded-full text-xs">2/10 = 0.2</span>
                <span className="bg-[#D9C2E6] px-2 py-1 rounded-full text-xs">5/10 = 0.5</span>
                <span className="bg-[#D9C2E6] px-2 py-1 rounded-full text-xs">9/10 = 0.9</span>
              </div>
            </div>
          </div>
          <div className="mt-4 text-sm text-center italic text-[#8F6A4C] bg-[#F7EDE1] p-2 rounded-xl">
            🌈 右侧游戏：拖拽分数到对应的小数盒子，巩固分数与小数的关系！
          </div>
        </div>
        
        {/* 右侧互动游戏区 */}
        <div className="lg:w-7/12 flex flex-col gap-5">
          <div className="bg-white/80 backdrop-blur-sm rounded-3xl p-5 shadow-xl border border-white/40">
            <div className="flex justify-between items-center mb-4 flex-wrap gap-3">
              <h3 className="text-xl font-bold text-purple-800 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M11 19H6a2 2 0 01-2-2V7a2 2 0 012-2h3m7 4v6m-3-3h6" /></svg>
                拖拖乐 · 分数配小数
              </h3>
              <span className="text-sm text-stone-600 bg-white/60 px-3 py-1 rounded-full">✨ 把分数拖到正确的小数上 ✨</span>
            </div>
            <DragMatchGame resetKey={gameResetKey} onNewGame={handleNewGame} />
          </div>
          <div className="text-xs text-center text-stone-600 bg-white/50 rounded-full py-2 px-3 flex justify-center gap-3 backdrop-blur-sm">
            <span>🐣 玩法：左边分数卡片 → 拖拽到右边对应的小数盒子里</span>
            <span>🏆 全部配对成功就能获得星星奖励！</span>
          </div>
        </div>
      </div>
    );
  };
  
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
