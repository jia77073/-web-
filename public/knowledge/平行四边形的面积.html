<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>平行四边形的面积 · 割补魔法师 | 数学乐园</title>
  <!-- Tailwind + React CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    /* 全局字体放大6号（2.8rem），淡紫色主题背景 */
    body {
      font-size: 2.8rem;
      background: linear-gradient(135deg, #D9C2E6 0%, #CBAACB 100%);
      font-family: system-ui, 'Segoe UI', 'Comic Neue', 'Quicksand', sans-serif;
    }
    .drag-card {
      cursor: grab;
      transition: all 0.1s ease;
      user-select: none;
    }
    .drag-card:active {
      cursor: grabbing;
    }
    .drop-slot {
      transition: all 0.2s ease;
      border: 2px dashed #6b8c42;
      background-color: #f0f7e6;
    }
    .drag-over {
      background-color: #d9e6c3;
      transform: scale(1.02);
      border: 2px solid #4a6e2c;
    }
    .matched-card {
      opacity: 0.6;
      filter: grayscale(0.2);
      background: #c0d6a8;
      text-decoration: line-through;
      cursor: default;
      pointer-events: none;
    }
    .slot-filled {
      background-color: #c7f0c2;
      border: 2px solid #2e7d32;
    }
    .btn-fun:active {
      transform: scale(0.96);
    }
    @keyframes bounceSoft {
      0%,100%{ transform: translateY(0); }
      50%{ transform: translateY(-5px); }
    }
    .celebration {
      animation: bounceSoft 0.5s ease;
    }
    @media (max-width: 768px) {
      body {
        font-size: 1.8rem;
      }
      .drag-card, .drop-slot {
        font-size: 1.2rem;
      }
    }
    .para-svg {
      background: #ffffffdd;
      border-radius: 1rem;
      display: inline-block;
      box-shadow: 0 0.2rem 0.6rem rgba(0,0,0,0.1);
    }
  </style>
</head>
<body class="min-h-screen p-4 md:p-6">
<div id="root" class="w-full max-w-7xl mx-auto"></div>

<script type="text/babel">
  // ======================= 小学数学 · 平行四边形的面积 =======================
  // 知识点：平行四边形面积 = 底 × 高（S = a × h），通过割补法转化为长方形推导。
  
  // ---------- 游戏数据：三个平行四边形，每个需要配对正确的面积值 ----------
  const parallelogramData = [
    { id: 1, base: 5, height: 4, area: 20, unit: "cm²", label: "底5cm 高4cm", areaText: "20 cm²" },
    { id: 2, base: 6, height: 3, area: 18, unit: "cm²", label: "底6cm 高3cm", areaText: "18 cm²" },
    { id: 3, base: 8, height: 2.5, area: 20, unit: "cm²", label: "底8cm 高2.5cm", areaText: "20 cm²" }  // 面积20，与第一个相同但图形不同
  ];
  
  // 生成右侧可拖拽卡片：包含正确面积和干扰项
  const generateAreaCards = () => {
    const correctAreas = parallelogramData.map(p => p.areaText);
    // 干扰项
    const distractors = ["15 cm²", "25 cm²", "30 cm²", "12 cm²", "24 cm²"];
    let allCards = [...correctAreas];
    for (let d of distractors) {
      if (!allCards.includes(d)) allCards.push(d);
      if (allCards.length >= 7) break;
    }
    // 打乱顺序
    for (let i = allCards.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [allCards[i], allCards[j]] = [allCards[j], allCards[i]];
    }
    return allCards.map((text, idx) => ({
      id: `card-${idx}`,
      text: text,
      matched: false,
      areaValue: parseFloat(text.split(' ')[0]) // 数值用于匹配
    }));
  };
  
  // 绘制平行四边形（带底和高标注）
  const ParallelogramSVG = ({ base = 100, height = 60, offsetX = 25, baseLabel = "底", heightLabel = "高" }) => {
    const width = 140;
    const svgHeight = 100;
    const baseY = 70;
    const topY = baseY - height;
    const leftX = 20;
    const rightX = leftX + base;
    const topLeftX = leftX + offsetX;
    const topRightX = rightX + offsetX;
    return (
      <svg width={width+40} height={svgHeight+20} viewBox={`0 0 ${width+40} ${svgHeight+20}`} className="para-svg" style={{ background: '#fef9e6' }}>
        <polygon points={`${leftX},${baseY} ${rightX},${baseY} ${topRightX},${topY} ${topLeftX},${topY}`} fill="#c8e6c9" stroke="#2e7d32" strokeWidth="2.5" />
        {/* 底边标注 */}
        <line x1={leftX} y1={baseY+5} x2={rightX} y2={baseY+5} stroke="#b45309" strokeWidth="2" strokeDasharray="4,3" />
        <text x={(leftX+rightX)/2} y={baseY+18} fontSize="12" fill="#b45309" textAnchor="middle">{baseLabel}</text>
        {/* 高线 */}
        <line x1={leftX+offsetX} y1={topY} x2={leftX+offsetX} y2={baseY} stroke="#d97706" strokeWidth="2" strokeDasharray="4,3" />
        <text x={leftX+offsetX-12} y={(topY+baseY)/2} fontSize="12" fill="#d97706" textAnchor="end">{heightLabel}</text>
        <polyline points={`${leftX+offsetX-5},${baseY} ${leftX+offsetX},${baseY} ${leftX+offsetX},${baseY-5}`} fill="none" stroke="#d97706" strokeWidth="1.5" />
      </svg>
    );
  };
  
  // 游戏组件：拖拽配对（将面积卡片拖拽到对应图形的槽位）
  const MatchingGame = () => {
    const [areaCards, setAreaCards] = React.useState(() => generateAreaCards());
    // 槽位状态：每个图形一个槽位，记录是否已填及填的面积文本
    const [slots, setSlots] = React.useState(() => {
      const init = {};
      parallelogramData.forEach(p => {
        init[p.id] = { filled: false, value: null, correctArea: p.areaText };
      });
      return init;
    });
    const [dragOverSlotId, setDragOverSlotId] = React.useState(null);
    const [feedbackMsg, setFeedbackMsg] = React.useState("");
    const [gameWin, setGameWin] = React.useState(false);
    const [score, setScore] = React.useState(0);
    
    const totalSlots = parallelogramData.length;
    const filledCount = Object.values(slots).filter(s => s.filled).length;
    
    const checkVictory = (currentSlots) => {
      const allFilled = Object.values(currentSlots).every(s => s.filled);
      if (allFilled && !gameWin) {
        setGameWin(true);
        setFeedbackMsg("🎉 完美！所有平行四边形的面积都配对成功！你已是面积计算小高手！ 🎉");
      }
    };
    
    // 拖拽卡片
    const onDragStart = (e, cardId, cardText, areaValue) => {
      const card = areaCards.find(c => c.id === cardId);
      if (card?.matched) {
        e.preventDefault();
        return false;
      }
      e.dataTransfer.setData("text/plain", JSON.stringify({ cardId, cardText, areaValue }));
      e.dataTransfer.effectAllowed = "copy";
      e.target.style.opacity = "0.6";
    };
    const onDragEnd = (e) => { if(e.target) e.target.style.opacity = ""; };
    
    const onDragOverSlot = (e, paraId) => {
      e.preventDefault();
      setDragOverSlotId(paraId);
      e.dataTransfer.dropEffect = "copy";
    };
    const onDragLeaveSlot = () => setDragOverSlotId(null);
    
    const onDropToSlot = (e, paraId) => {
      e.preventDefault();
      setDragOverSlotId(null);
      const rawData = e.dataTransfer.getData("text/plain");
      if (!rawData) return;
      let dragData;
      try { dragData = JSON.parse(rawData); } catch(err) { return; }
      const { cardId, cardText, areaValue } = dragData;
      
      const sourceCard = areaCards.find(c => c.id === cardId);
      const targetSlot = slots[paraId];
      if (!sourceCard || !targetSlot) return;
      if (sourceCard.matched || targetSlot.filled) {
        setFeedbackMsg("⏳ 这张面积卡片或这个槽位已经配对过了！");
        setTimeout(() => setFeedbackMsg(""), 1300);
        return;
      }
      
      // 验证该面积是否等于此平行四边形的正确面积
      const targetPara = parallelogramData.find(p => p.id === paraId);
      const isMatch = (cardText === targetPara.areaText);
      if (!isMatch) {
        setFeedbackMsg(`❌ 配对错误！“${cardText}” 不是图形 ${targetPara.label} 的面积。正确面积是 ${targetPara.areaText}。再算一遍吧～`);
        setTimeout(() => setFeedbackMsg(""), 1800);
        return;
      }
      
      // 配对成功
      setAreaCards(prev => prev.map(c => c.id === cardId ? { ...c, matched: true } : c));
      setSlots(prev => ({
        ...prev,
        [paraId]: { ...prev[paraId], filled: true, value: cardText }
      }));
      setScore(prev => prev + 1);
      setFeedbackMsg(`✅ 正确！${targetPara.label} 的面积是 ${cardText}，底×高=面积。`);
      setTimeout(() => setFeedbackMsg(""), 1500);
      
      const newSlots = { ...slots, [paraId]: { ...slots[paraId], filled: true, value: cardText } };
      checkVictory(newSlots);
    };
    
    const resetGame = () => {
      setAreaCards(generateAreaCards());
      const initSlots = {};
      parallelogramData.forEach(p => {
        initSlots[p.id] = { filled: false, value: null, correctArea: p.areaText };
      });
      setSlots(initSlots);
      setGameWin(false);
      setScore(0);
      setFeedbackMsg("✨ 新的一局！把右边的面积卡片拖拽到左边正确的平行四边形槽位下吧～");
      setTimeout(() => setFeedbackMsg(""), 1500);
    };
    
    return (
      <div className="bg-white/90 backdrop-blur-sm rounded-3xl p-5 shadow-xl border border-[#8bc34a] h-full flex flex-col">
        <div className="flex justify-between items-center flex-wrap gap-2 mb-3">
          <h3 className="text-2xl font-extrabold text-green-800">📐 面积配对 · 拖拽连连看</h3>
          <div className="flex gap-2">
            <span className="bg-emerald-200 px-3 py-1 rounded-full text-base font-bold">🏆 配对 {score}/{totalSlots}</span>
            <button onClick={resetGame} className="bg-gradient-to-r from-green-600 to-teal-600 text-white font-bold py-1.5 px-4 rounded-full text-sm shadow btn-fun">🔄 新的一局</button>
          </div>
        </div>
        <p className="text-sm text-green-700 bg-green-50 rounded-xl p-2 mb-3 text-center">
          🧸 玩法：计算每个平行四边形的面积，然后将右侧<strong>面积卡片</strong>拖拽到对应图形下方的槽位中。全部配对正确即可获胜！
        </p>
        
        <div className="flex flex-col md:flex-row gap-5 flex-1">
          {/* 左侧图形区 */}
          <div className="flex-1 bg-green-50/60 rounded-2xl p-3">
            <div className="font-bold text-green-800 text-center mb-2">📦 平行四边形工坊</div>
            <div className="space-y-5 max-h-[550px] overflow-y-auto pr-1">
              {parallelogramData.map(para => (
                <div key={para.id} className="bg-white rounded-xl p-3 shadow border border-green-200">
                  <div className="text-center font-bold text-green-700">底 {para.base}cm，高 {para.height}cm</div>
                  <div className="flex justify-center my-2">
                    <ParallelogramSVG base={80} height={para.height * 10} offsetX={20} baseLabel={`${para.base}cm`} heightLabel={`${para.height}cm`} />
                  </div>
                  <div 
                    onDragOver={(e) => onDragOverSlot(e, para.id)}
                    onDragLeave={onDragLeaveSlot}
                    onDrop={(e) => onDropToSlot(e, para.id)}
                    className={`drop-slot rounded-xl p-3 text-center transition-all mt-2 ${dragOverSlotId === para.id ? 'drag-over' : ''} ${slots[para.id].filled ? 'slot-filled' : ''}`}
                  >
                    <div className="text-sm font-bold text-green-800">📌 面积槽位</div>
                    {slots[para.id].filled ? (
                      <div className="text-xl font-mono text-green-700">{slots[para.id].value}</div>
                    ) : (
                      <div className="text-xs text-gray-500">⬅️ 拖拽面积卡片至此</div>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>
          
          {/* 右侧卡片池 */}
          <div className="flex-1 bg-amber-50/60 rounded-2xl p-3">
            <div className="font-bold text-amber-800 text-center mb-2">🎲 面积卡片 (拖拽我)</div>
            <div className="flex flex-wrap justify-center gap-3 max-h-[550px] overflow-y-auto">
              {areaCards.map(card => (
                <div 
                  key={card.id}
                  draggable={!card.matched}
                  onDragStart={(e) => onDragStart(e, card.id, card.text, card.areaValue)}
                  onDragEnd={onDragEnd}
                  className={`drag-card w-36 h-28 rounded-xl shadow-md flex items-center justify-center text-center font-bold transition ${card.matched ? 'bg-gray-400/60 cursor-default text-gray-300' : 'bg-gradient-to-br from-amber-400 to-orange-500 cursor-grab hover:scale-105 text-white'}`}
                >
                  <span className="text-base px-1">{card.matched ? "✓ 已用" : card.text}</span>
                </div>
              ))}
            </div>
            <div className="text-xs text-center text-amber-700 mt-2">💡 每个面积卡片只能用一次，拖拽到对应平行四边形的面积槽位。</div>
          </div>
        </div>
        
        {feedbackMsg && (
          <div className="mt-3 text-center bg-green-100 p-2 rounded-xl text-green-800 font-medium text-sm">
            {feedbackMsg}
          </div>
        )}
        {gameWin && (
          <div className="mt-3 text-center bg-gradient-to-r from-green-300 to-emerald-400 p-3 rounded-xl text-white font-bold text-lg celebration">
            🎉🎉 割补魔法师！你已完全掌握平行四边形的面积计算！ 🎉🎉
          </div>
        )}
        <div className="mt-3 text-xs text-center text-green-600 bg-green-50 p-2 rounded-full">
          💡 平行四边形面积 = 底 × 高。通过割补法可以转化成长方形，所以公式就是长×宽（底×高）。
        </div>
      </div>
    );
  };
  
  // ---------- 左侧知识点：平行四边形的面积 ----------
  const KnowledgeCard = () => {
    return (
      <div className="bg-gradient-to-br from-[#e8f5e9] to-[#c8e6c9] rounded-3xl p-5 shadow-xl border border-[#8bc34a]">
        <div className="flex items-center gap-2 mb-3">
          <span className="text-5xl">📐</span>
          <h2 className="text-3xl font-extrabold text-green-900">平行四边形的面积</h2>
        </div>
        <div className="space-y-4 text-base text-green-900">
          <div className="bg-white/70 rounded-xl p-3">
            <p className="font-bold text-xl">✨ 面积公式</p>
            <p><strong>平行四边形面积 = 底 × 高</strong>，用字母表示：<strong>S = a × h</strong>。</p>
            <div className="mt-2 flex justify-center">
              <div className="bg-green-100 p-2 rounded-lg font-mono">S = a × h</div>
            </div>
          </div>
          <div className="bg-white/70 rounded-xl p-3">
            <p className="font-bold">🔍 公式推导（割补法）</p>
            <p>沿着平行四边形的一条高剪开，平移后可以拼成一个长方形。长方形的长等于平行四边形的底，宽等于平行四边形的高，所以面积 = 底 × 高。</p>
            <div className="mt-2 flex justify-center gap-2">
              <svg width="80" height="60" viewBox="0 0 80 60">
                <polygon points="10,50 60,50 70,10 20,10" fill="#c8e6c9" stroke="#2e7d32" strokeWidth="1.5" />
              </svg>
              <span className="text-2xl">→</span>
              <svg width="80" height="60" viewBox="0 0 80 60">
                <rect x="10" y="10" width="60" height="40" fill="#c8e6c9" stroke="#2e7d32" strokeWidth="1.5" />
              </svg>
            </div>
          </div>
          <div className="bg-white/70 rounded-xl p-3">
            <p className="font-bold">📐 示例</p>
            <p>底=6cm，高=4cm，面积 = 6×4 = 24 cm²。</p>
            <p className="text-sm mt-1">🌰 注意：底和高必须对应，即高是底边上的高。</p>
          </div>
          <div className="bg-amber-50 border-l-8 border-amber-400 p-3 rounded-xl">
            <p className="font-bold">🌟 小练习：</p>
            <p>平行四边形底8dm，高5dm，面积（ ）dm²；底12m，高6m，面积（ ）m²。</p>
            <p className="text-sm text-green-700">（答案：40，72）</p>
          </div>
          <div className="bg-green-100 p-3 rounded-xl text-center text-sm">
            💡 小口诀：“平行四边形求面积，底乘高来记心里；割补成长方形，面积不变很容易。”
          </div>
        </div>
      </div>
    );
  };
  
  // ---------- 快速小练习：计算面积（心算挑战）----------
  const QuickQuiz = () => {
    const [question, setQuestion] = React.useState({ base: 5, height: 4, answer: 20 });
    const [userAnswer, setUserAnswer] = React.useState("");
    const [feedback, setFeedback] = React.useState("");
    
    const questionsBank = [
      { base: 5, height: 4, answer: 20, text: "底5cm，高4cm，面积是多少平方厘米？" },
      { base: 8, height: 3, answer: 24, text: "底8dm，高3dm，面积是多少平方分米？" },
      { base: 12, height: 6, answer: 72, text: "底12m，高6m，面积是多少平方米？" },
      { base: 7, height: 2.5, answer: 17.5, text: "底7cm，高2.5cm，面积是多少平方厘米？" },
      { base: 10, height: 10, answer: 100, text: "底10dm，高10dm，面积是多少平方分米？" }
    ];
    const [idx, setIdx] = React.useState(0);
    
    const loadQuestion = (index) => {
      setQuestion(questionsBank[index % questionsBank.length]);
      setUserAnswer("");
      setFeedback("");
    };
    
    const nextQuiz = () => {
      const newIdx = idx + 1;
      setIdx(newIdx);
      loadQuestion(newIdx);
    };
    
    const checkAnswer = () => {
      const userVal = parseFloat(userAnswer);
      if (isNaN(userVal)) {
        setFeedback("📛 输入数字答案哟～");
        return;
      }
      if (Math.abs(userVal - question.answer) < 0.01) {
        setFeedback(`✅ 正确！${question.text} 答案是 ${question.answer}。`);
      } else {
        setFeedback(`❌ 不对哦，${question.text} 正确答案是 ${question.answer}。再算一次吧～`);
      }
    };
    
    React.useEffect(() => {
      loadQuestion(0);
    }, []);
    
    return (
      <div className="bg-white/90 rounded-3xl p-4 shadow-xl border border-[#8bc34a]">
        <div className="flex items-center gap-2 mb-2">
          <span className="text-2xl">🧠</span>
          <h3 className="text-xl font-extrabold text-green-800">快问快答 · 面积计算</h3>
        </div>
        <div className="bg-green-50 rounded-xl p-3 text-center">
          <p className="font-bold text-xl">{question.text}</p>
          <div className="flex gap-2 mt-2 justify-center">
            <input 
              type="number" step="any" value={userAnswer}
              onChange={(e) => setUserAnswer(e.target.value)}
              className="border border-green-300 rounded-lg px-3 py-1 w-40 text-center"
              placeholder="输入数字"
            />
            <button onClick={checkAnswer} className="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg text-sm">检验</button>
            <button onClick={nextQuiz} className="bg-emerald-400 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-sm">下一题</button>
          </div>
          {feedback && <div className="mt-2 text-sm text-green-800">{feedback}</div>}
        </div>
      </div>
    );
  };
  
  // ---------- 主应用布局 ----------
  const App = () => {
    return (
      <div className="flex flex-col xl:flex-row gap-6">
        {/* 左侧区域：知识点 + 快问快答 */}
        <div className="flex-1 xl:w-3/5 space-y-5">
          <KnowledgeCard />
          <QuickQuiz />
          <div className="bg-white/70 rounded-2xl p-3 text-center text-green-700 text-sm border border-green-200">
            🌈 平行四边形的面积在生活中有很多应用：花坛、停车位、布料裁剪…… 掌握公式，你就能轻松计算这些图形的面积！
          </div>
        </div>
        {/* 右侧游戏区 */}
        <div className="flex-1 xl:w-2/5">
          <MatchingGame />
        </div>
      </div>
    );
  };
  
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
