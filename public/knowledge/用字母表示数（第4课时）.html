<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>用字母表示数·第4课时 | 合并同类项·化简大师</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 自定义样式：淡紫色主题 + 大字体 + 拖拽优化 -->
    <style>
        /* 主题色淡紫渐变 */
        body {
            background: linear-gradient(145deg, #CBAACB 0%, #D9C2E6 100%);
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Poppins', system-ui, sans-serif;
        }
        /* 滚动条可爱风格 */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #f0e2f7;
            border-radius: 20px;
        }
        ::-webkit-scrollbar-thumb {
            background: #a67cac;
            border-radius: 20px;
        }
        /* 拖拽卡片时的半透明效果 */
        .drag-card-active {
            opacity: 0.5;
            cursor: grabbing !important;
        }
        /* 放置区高亮 */
        .drop-highlight {
            background-color: #f9ebff !important;
            transform: scale(1.01);
            box-shadow: 0 0 0 3px #b38fcc;
            transition: all 0.1s ease;
        }
        /* 配对成功动画 */
        .matched-pulse {
            animation: matchGlow 0.4s ease;
        }
        @keyframes matchGlow {
            0% { background-color: #c8e6c9; border-color: #81c784; }
            100% { background-color: #e8f5e9; border-color: #a5d6a7; }
        }
        /* 胜利彩蛋跳动 */
        @keyframes bounceWin {
            0%,100%{ transform: translateY(0); }
            50%{ transform: translateY(-6px); }
        }
        .win-bounce {
            animation: bounceWin 0.5s ease;
        }
        /* 全局字体加大（6号效果） */
        body {
            font-size: 1.2rem;
        }
        .text-xl-custom {
            font-size: 1.5rem;
            line-height: 2rem;
        }
        @media (min-width: 768px) {
            body {
                font-size: 1.25rem;
            }
            .text-xl-custom {
                font-size: 1.75rem;
                line-height: 2.2rem;
            }
        }
        /* 移动端拖拽优化 */
        .drag-card, .drop-zone {
            touch-action: manipulation;
            -webkit-touch-callout: none;
            user-select: none;
        }
    </style>
    <!-- React & ReactDOM & Babel -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
</head>
<body class="p-3 md:p-6 min-h-screen flex items-center justify-center">

<div id="root" class="w-full max-w-6xl mx-auto"></div>

<script type="text/babel">
    // 第4课时：合并同类项、化简式子、综合运用，衔接解方程
    const { useState, useEffect, useCallback } = React;

    // ---------- 游戏数据：化简挑战（合并同类项） ----------
    const questionsData = [
        { 
            id: 0, 
            expression: "3x + 5x - 2x", 
            simplified: "6x", 
            hint: "系数：3+5-2=6，字母x不变",
            emoji: "🔢"
        },
        { 
            id: 1, 
            expression: "4y + 3y - 2y + 7", 
            simplified: "5y + 7", 
            hint: "合并y的项：4+3-2=5，常数7单独",
            emoji: "📦"
        },
        { 
            id: 2, 
            expression: "2a + 3b - a + 2b", 
            simplified: "a + 5b", 
            hint: "合并a: 2-1=1a；合并b: 3+2=5b",
            emoji: "🍎"
        },
        { 
            id: 3, 
            expression: "8m - 3m + 4 - 2", 
            simplified: "5m + 2", 
            hint: "合并m: 8-3=5m；常数: 4-2=2",
            emoji: "📏"
        },
        { 
            id: 4, 
            expression: "6n + 2n - n + 3n", 
            simplified: "10n", 
            hint: "系数: 6+2-1+3=10",
            emoji: "🧸"
        }
    ];

    // 答案卡片数据 (化简结果)
    const cardsDataRaw = questionsData.map(q => ({
        id: q.id,
        label: q.simplified,
        matchId: q.id,
        emoji: q.emoji
    }));

    // 主组件
    const SimplifyGame = () => {
        // 每个问题是否已配对
        const [matchedQuestions, setMatchedQuestions] = useState({});
        // 剩余可拖拽卡片列表 (打乱顺序)
        const [remainingCards, setRemainingCards] = useState([]);
        // 游戏胜利标志
        const [gameWin, setGameWin] = useState(false);
        // 反馈消息
        const [feedbackMsg, setFeedbackMsg] = useState("🐣 将右边化简结果卡片拖到左边对应的表达式区域！练习合并同类项～");
        // 高亮放置区id
        const [highlightZoneId, setHighlightZoneId] = useState(null);
        
        // 初始化 / 重置游戏
        const initGame = useCallback(() => {
            const initialMatched = {};
            questionsData.forEach(q => { initialMatched[q.id] = false; });
            setMatchedQuestions(initialMatched);
            // 打乱卡片顺序（扭蛋风格）
            const shuffled = [...cardsDataRaw];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            setRemainingCards(shuffled);
            setGameWin(false);
            setFeedbackMsg("✨ 新的一局！把化简结果拖拽到对应的表达式框，巩固合并同类项 ✨");
            setHighlightZoneId(null);
        }, []);
        
        // 检查是否全部配对成功
        useEffect(() => {
            const allMatched = Object.values(matchedQuestions).every(v => v === true);
            if (allMatched && remainingCards.length === 0 && !gameWin) {
                setGameWin(true);
                setFeedbackMsg("🎉 太厉害了！全部化简正确！你已经掌握合并同类项，可以轻松解方程了！🎉");
            }
        }, [matchedQuestions, remainingCards, gameWin]);
        
        // ----- 拖拽事件处理 -----
        const handleDragStart = (e, card) => {
            // 检查卡片是否还在剩余卡片中 (未被配对)
            if (!remainingCards.some(c => c.id === card.id)) {
                e.preventDefault();
                e.dataTransfer.effectAllowed = "none";
                setFeedbackMsg("⛔ 这张卡片已经配对过了！不能重复拖拽 ⛔");
                return false;
            }
            e.dataTransfer.setData("text/plain", JSON.stringify({ cardId: card.id, matchId: card.matchId, label: card.label }));
            e.dataTransfer.effectAllowed = "copy";
            // 自定义拖拽图像
            const dragIcon = document.createElement('div');
            dragIcon.textContent = `${card.emoji} ${card.label}`;
            dragIcon.style.position = "absolute";
            dragIcon.style.top = "-1000px";
            dragIcon.style.background = "#a17bb5";
            dragIcon.style.padding = "8px 16px";
            dragIcon.style.borderRadius = "30px";
            dragIcon.style.color = "white";
            dragIcon.style.fontWeight = "bold";
            dragIcon.style.fontSize = "1.2rem";
            document.body.appendChild(dragIcon);
            e.dataTransfer.setDragImage(dragIcon, 0, 0);
            setTimeout(() => document.body.removeChild(dragIcon), 0);
            if (e.target && e.target.classList) {
                e.target.classList.add('drag-card-active');
            }
        };
        
        const handleDragEnd = (e) => {
            if (e.target && e.target.classList) {
                e.target.classList.remove('drag-card-active');
            }
            setHighlightZoneId(null);
        };
        
        // 放置区高亮
        const handleDragOver = (e, zoneId) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "copy";
            if (highlightZoneId !== zoneId) {
                setHighlightZoneId(zoneId);
            }
        };
        
        const handleDragLeave = () => {
            setHighlightZoneId(null);
        };
        
        // 放置配对逻辑
        const handleDrop = (e, targetQuestion) => {
            e.preventDefault();
            setHighlightZoneId(null);
            // 如果该问题已经配对，不能再放
            if (matchedQuestions[targetQuestion.id]) {
                setFeedbackMsg(`🔁 挑战“${targetQuestion.expression}”已经配对成功！不要重复哦 🔁`);
                return;
            }
            
            let dragData;
            try {
                const raw = e.dataTransfer.getData("text/plain");
                dragData = JSON.parse(raw);
            } catch(err) {
                setFeedbackMsg("拖拽出了一点小问题，再试一次~");
                return;
            }
            if (!dragData) return;
            
            const { cardId, matchId, label } = dragData;
            // 验证卡片是否还在剩余中
            const cardExists = remainingCards.some(c => c.id === cardId);
            if (!cardExists) {
                setFeedbackMsg("这张卡片已经被配对过了！请使用其他卡片。");
                return;
            }
            
            // 判断配对是否正确 (卡片匹配id 等于 问题id)
            const isCorrect = (matchId === targetQuestion.id);
            if (isCorrect) {
                // 配对成功！
                setMatchedQuestions(prev => ({ ...prev, [targetQuestion.id]: true }));
                // 从剩余卡片中移除该卡片
                const newRemaining = remainingCards.filter(c => c.id !== cardId);
                setRemainingCards(newRemaining);
                setFeedbackMsg(`🎈 完全正确！ ${targetQuestion.expression} 化简后 = ${label} ，合并同类项很熟练！ 🎈`);
                // 动画效果
                const zoneEl = document.getElementById(`qzone-${targetQuestion.id}`);
                if (zoneEl) {
                    zoneEl.classList.add('matched-pulse');
                    setTimeout(() => zoneEl.classList.remove('matched-pulse'), 400);
                }
            } else {
                // 配对错误：给出正确答案提示
                const correctAns = questionsData.find(q => q.id === targetQuestion.id)?.simplified || "???";
                setFeedbackMsg(`❌ 配对错误！ “${targetQuestion.expression}” 化简结果应该是 ${correctAns} ，再合并一次同类项吧！❌`);
            }
        };
        
        // 重置游戏
        const resetGame = () => {
            initGame();
        };
        
        // 初始化
        useEffect(() => {
            initGame();
        }, [initGame]);
        
        const totalQuestions = questionsData.length;
        const matchedCount = Object.values(matchedQuestions).filter(v => v === true).length;
        
        return (
            <div className="w-full rounded-3xl shadow-2xl p-4 md:p-5 bg-white/30 backdrop-blur-sm border border-white/40">
                <div className="flex flex-col lg:flex-row gap-6 lg:gap-8">
                    {/* ========= 左侧知识点区域：合并同类项 & 化简 & 衔接解方程 ========= */}
                    <div className="lg:w-2/5 bg-white/85 rounded-2xl p-5 md:p-6 shadow-xl backdrop-blur-sm border border-purple-100 overflow-y-auto max-h-[85vh] lg:max-h-none">
                        <div className="border-l-8 border-[#a67cac] pl-4 mb-4">
                            <h1 className="text-3xl md:text-4xl font-extrabold text-[#5e3a63]">📐 用字母表示数</h1>
                            <p className="text-xl text-gray-700 mt-1 font-semibold">第4课时 · 合并同类项 & 化简大师</p>
                        </div>
                        
                        {/* 1. 什么是合并同类项 */}
                        <div className="bg-gradient-to-r from-[#f7effb] to-white p-4 rounded-xl mb-5 shadow-sm">
                            <h2 className="text-2xl font-black text-purple-800 flex items-center gap-2">🧩 合并同类项 · 化简式子</h2>
                            <p className="text-lg mt-2 leading-relaxed"><strong>同类项</strong>：字母相同，并且相同字母的指数也相同的项。合并时<strong>系数相加减，字母和指数不变</strong>。</p>
                            <div className="mt-3 bg-amber-50 p-3 rounded-xl text-center">
                                <p className="font-mono text-xl">3x + 5x = (3+5)x = 8x</p>
                                <p className="font-mono text-xl">4y - 2y + 3y = (4-2+3)y = 5y</p>
                                <p className="font-mono text-xl">2a + 3b - a + 2b = (2a-a)+(3b+2b)= a+5b</p>
                            </div>
                        </div>
                        
                        {/* 2. 化简步骤与综合运用 */}
                        <div className="bg-white/80 p-4 rounded-xl mb-5 shadow-sm">
                            <h2 className="text-2xl font-black text-purple-800">📝 化简三步法</h2>
                            <ol className="list-decimal list-inside text-lg space-y-2 mt-2">
                                <li><strong>找</strong>：找出式子中的同类项（字母相同）</li>
                                <li><strong>移</strong>：通过交换律移动位置，将同类项放在一起</li>
                                <li><strong>合并</strong>：系数相加减，字母部分照抄</li>
                            </ol>
                            <div className="mt-3 bg-purple-50 p-3 rounded-xl">
                                <p className="font-bold text-purple-800">✨ 综合例题 ✨</p>
                                <p>化简：7m + 3n - 2m + 5n - 4</p>
                                <p className="mt-1">→ (7m-2m) + (3n+5n) -4 = <strong className="text-purple-700">5m + 8n - 4</strong></p>
                                <p className="text-sm mt-1">💡 常数项(-4)单独保留，不能与字母项合并。</p>
                            </div>
                        </div>
                        
                        {/* 3. 新增化简技巧 & 衔接解方程 */}
                        <div className="bg-[#faf0ff] p-4 rounded-xl mb-5 shadow-sm">
                            <h2 className="text-2xl font-black text-purple-800">⚡ 化简 → 解方程 桥接</h2>
                            <p className="text-lg">解方程时，常常需要先<strong className="text-purple-700">合并同类项</strong>，把方程化简为 <strong className="font-mono">ax = b</strong> 的形式，再求解。</p>
                            <div className="mt-2 bg-white p-2 rounded-lg">
                                <p className="font-bold">🌰 举例：</p>
                                <p>解方程：3x + 5x - 2x = 24</p>
                                <p>第一步：左边合并同类项 → (3+5-2)x = 6x</p>
                                <p>第二步：得到 6x = 24 → x = 4</p>
                            </div>
                            <div className="mt-3 text-center text-green-700 bg-green-50 rounded-full py-2">
                                🚀 合并同类项是解方程的关键第一步！熟能生巧 🚀
                            </div>
                        </div>
                        
                        {/* 4. 小试牛刀 / 游戏引导 */}
                        <div className="bg-white p-4 rounded-xl shadow-sm">
                            <h2 className="text-2xl font-black text-purple-800">🎮 右边游戏 · 拖拽化简</h2>
                            <p className="text-lg">把<strong className="text-purple-700">右侧的化简结果卡片</strong>拖到左边对应的表达式框里，配对正确即可得分！全部配对成功，你就是化简王者！</p>
                            <div className="mt-3 flex items-center justify-around text-center text-sm text-purple-600">
                                <span>🐣 拖拽配对</span>
                                <span>✨ 合并同类项</span>
                                <span>🏆 挑战全对</span>
                            </div>
                        </div>
                        <div className="mt-4 text-sm text-center text-purple-600 bg-white/60 rounded-full py-2">✨ 化简式子，合并同类项，为解方程打下坚实基础 ✨</div>
                    </div>
                    
                    {/* ========= 右侧互动游戏区域：拖拽配对（抓娃娃机风格） ========= */}
                    <div className="lg:w-3/5 bg-[#faf3ff]/95 rounded-2xl p-5 md:p-6 shadow-lg border-2 border-[#CBAACB] flex flex-col">
                        <div className="flex justify-between items-center flex-wrap gap-2 mb-3">
                            <h2 className="text-2xl md:text-3xl font-black text-[#6b3f74] flex items-center gap-2">
                                🎮 化简抓抓乐·拖拽配对 <span className="text-lg bg-white/70 px-3 py-1 rounded-full">合并同类项</span>
                            </h2>
                            <button 
                                onClick={resetGame}
                                className="bg-gradient-to-r from-[#a17bb5] to-[#cba3db] hover:from-[#8f68a3] hover:to-[#b887cf] text-white font-bold py-2 px-5 rounded-full shadow-md transition transform active:scale-95 text-lg"
                            >
                                🔄 新的一局
                            </button>
                        </div>
                        
                        {/* 反馈消息条 */}
                        <div className={`mb-4 p-3 rounded-xl text-center font-bold text-lg transition-all ${feedbackMsg.includes('正确') || feedbackMsg.includes('🎈') ? 'bg-green-100 text-green-800 border border-green-300' : (feedbackMsg.includes('错误') || feedbackMsg.includes('⛔') ? 'bg-rose-100 text-rose-700 border border-rose-300' : 'bg-indigo-50 text-indigo-700 border border-indigo-200')}`}>
                            {feedbackMsg}
                        </div>
                        
                        {/* 进度条 & 分数 */}
                        <div className="w-full bg-purple-200 rounded-full h-3 mb-3">
                            <div className="bg-purple-600 h-3 rounded-full transition-all duration-300" style={{ width: `${(matchedCount / totalQuestions) * 100}%` }}></div>
                        </div>
                        <p className="text-right text-purple-700 text-sm font-medium">配对进度: {matchedCount}/{totalQuestions}</p>
                        
                        {/* 挑战问题区域 (放置区) - 每个显示一个未化简表达式 */}
                        <div className="space-y-4 mb-6 mt-2 max-h-[460px] overflow-y-auto pr-1">
                            {questionsData.map(q => {
                                const isMatched = matchedQuestions[q.id];
                                const isHighlight = highlightZoneId === q.id;
                                return (
                                    <div
                                        key={q.id}
                                        id={`qzone-${q.id}`}
                                        className={`drop-zone relative bg-white rounded-2xl p-4 border-2 transition-all ${isMatched ? 'border-green-400 bg-green-50/90' : (isHighlight ? 'border-purple-500 bg-purple-50 drop-highlight' : 'border-purple-200')}`}
                                        onDragOver={(e) => handleDragOver(e, q.id)}
                                        onDragLeave={handleDragLeave}
                                        onDrop={(e) => handleDrop(e, q)}
                                    >
                                        <div className="flex justify-between items-start">
                                            <div className="flex-1">
                                                <div className="text-xl font-black text-purple-800 flex items-center gap-2 flex-wrap">
                                                    <span className="text-2xl">{q.emoji}</span>
                                                    <span>化简：{q.expression}</span>
                                                    {!isMatched && <span className="text-sm bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full">待配对</span>}
                                                    {isMatched && <span className="text-sm bg-green-200 text-green-800 px-2 py-0.5 rounded-full">✓ 已化简</span>}
                                                </div>
                                                <div className="mt-2 text-sm text-purple-600 bg-purple-50 inline-block px-2 py-1 rounded-full">
                                                    💡 提示：{q.hint}
                                                </div>
                                                {isMatched && (
                                                    <div className="mt-2 inline-flex items-center gap-1 bg-green-100 text-green-800 px-3 py-1 rounded-full text-sm font-bold">
                                                        ✅ 化简结果：{q.simplified}
                                                    </div>
                                                )}
                                                {!isMatched && (
                                                    <div className="mt-2 text-xs text-purple-400">
                                                        👆 将正确的化简结果卡片拖拽至此
                                                    </div>
                                                )}
                                            </div>
                                            <div className="text-3xl ml-2">🎯</div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        
                        {/* 可拖拽卡片区（化简结果扭蛋） */}
                        <div>
                            <div className="flex justify-between items-center mb-3">
                                <p className="text-xl font-bold text-purple-800 flex items-center gap-2">🎴 化简结果扭蛋 (拖拽配对)</p>
                                <span className="bg-purple-200 rounded-full px-3 py-1 text-sm font-bold">剩余: {remainingCards.length}</span>
                            </div>
                            
                            {remainingCards.length === 0 && !gameWin && (
                                <div className="text-center py-6 bg-yellow-50 rounded-2xl border border-yellow-300 text-yellow-700 font-bold text-xl">
                                    ✨ 完美！所有表达式都正确化简了！点击[新的一局]继续挑战 ✨
                                </div>
                            )}
                            
                            {remainingCards.length > 0 && (
                                <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                                    {remainingCards.map(card => (
                                        <div
                                            key={card.id}
                                            draggable="true"
                                            onDragStart={(e) => handleDragStart(e, card)}
                                            onDragEnd={handleDragEnd}
                                            className="drag-card bg-gradient-to-br from-[#e8d3fc] to-white rounded-2xl p-3 text-center shadow-md cursor-grab active:cursor-grabbing border-2 border-purple-300 hover:shadow-xl transform transition hover:-translate-y-1"
                                        >
                                            <div className="text-3xl mb-1">{card.emoji}</div>
                                            <div className="font-black text-xl md:text-2xl text-purple-800">{card.label}</div>
                                            <div className="text-xs text-purple-500 mt-1">✨ 拖拽配对 ✨</div>
                                        </div>
                                    ))}
                                </div>
                            )}
                            
                            {/* 拖拽玩法详细说明 */}
                            <div className="mt-5 bg-[#e9d4f0] rounded-xl p-3 text-center text-purple-800 text-base flex flex-wrap justify-center gap-2 items-center">
                                <span className="font-bold">🐣 如何拖拉拽互动：</span>
                                <span>👉 手指长按右边紫色卡片 → 拖到左边对应的表达式区域 → 松开配对！</span>
                                <span className="text-sm bg-white rounded-full px-2 py-0.5">合并同类项，化简练习</span>
                            </div>
                        </div>
                        
                        {/* 胜利彩蛋 */}
                        {gameWin && (
                            <div className="mt-5 p-4 bg-gradient-to-r from-green-200 to-emerald-200 rounded-2xl text-center win-bounce">
                                <div className="text-5xl mb-2">🏆✨📐🧩</div>
                                <p className="font-extrabold text-2xl text-emerald-800">化简大师诞生！合并同类项通关，解方程不在话下！</p>
                                <button onClick={resetGame} className="mt-3 bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-2 rounded-full font-bold text-lg shadow">🏅 再玩一局 🏅</button>
                            </div>
                        )}
                        
                        {/* 底部知识关联 */}
                        <div className="mt-3 text-right text-sm text-purple-600 flex justify-end items-center gap-1">
                            <span>📌 合并同类项：系数相加减，字母不变 &nbsp;|&nbsp; 化简是解方程的第一步</span>
                        </div>
                    </div>
                </div>
                <div className="text-center mt-5 text-sm text-purple-900/80 bg-white/30 rounded-full py-2 px-4 mx-auto w-fit">
                    🌟 用字母表示数，合并化简，轻松衔接解方程！ 拖拽配对，巩固提升 🌟
                </div>
            </div>
        );
    };
    
    // 渲染根组件
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<SimplifyGame />);
</script>
</body>
</html>
