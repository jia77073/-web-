<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>🧊 小数的计数单位 · 数学游乐园</title>
  <!-- Tailwind + React CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .drag-card:active {
      opacity: 0.6;
      cursor: grabbing;
    }
    .drop-zone {
      transition: all 0.1s ease;
    }
    .drop-zone.drag-over {
      background-color: #b8d9ff;
      border-color: #3b82f6;
      transform: scale(1.02);
    }
    /* 简洁动画 */
    .fade-enter {
      opacity: 0;
    }
    .fade-enter-active {
      opacity: 1;
      transition: opacity 200ms;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#d9eaff] to-[#b8d9ff] min-h-screen flex items-center justify-center p-4 font-sans">

<div id="root" class="w-full max-w-6xl mx-auto"></div>

<script type="text/babel">
  // ---------- 知识点卡片组件 ----------
  const KnowledgeCard = () => {
    return (
      <div className="bg-white/80 backdrop-blur-sm rounded-3xl p-5 shadow-xl border border-white/40 h-full">
        <div className="flex items-center gap-2 border-b-2 border-[#7ab3c8] pb-3 mb-4">
          <span className="text-3xl">🧊</span>
          <h2 className="text-2xl font-extrabold text-[#2c5f6e]">小数的计数单位<br/><span className="text-sm font-normal">认识十分之一、百分之一……</span></h2>
        </div>
        <div className="space-y-4 text-[#2c5f6e]">
          <div className="bg-[#e6f4fa] rounded-2xl p-4">
            <p className="font-bold text-[#1e7a8c] flex items-center gap-2">🔢 什么是小数的计数单位？</p>
            <p className="text-sm mt-1">小数的计数单位是：<span className="font-bold">0.1、0.01、0.001……</span><br/>
            分别表示十分之一、百分之一、千分之一。相邻两个计数单位之间的进率是10。</p>
          </div>
          <div className="bg-[#e6f4fa] rounded-2xl p-4">
            <p className="font-bold text-[#1e7a8c]">📌 举例说明：</p>
            <ul className="list-disc list-inside space-y-1 mt-1 text-sm">
              <li>0.3 里面有 <span className="font-bold text-blue-700">3个0.1</span>（3个十分之一）</li>
              <li>0.25 里面有 <span className="font-bold text-blue-700">25个0.01</span>（25个百分之一）</li>
              <li>1.6 里面有 <span className="font-bold text-blue-700">16个0.1</span>（16个十分之一）</li>
              <li>0.07 里面有 <span className="font-bold text-blue-700">7个0.01</span>（7个百分之一）</li>
            </ul>
          </div>
          <div className="bg-[#e6f4fa] rounded-2xl p-4">
            <p className="font-bold text-[#1e7a8c]">🎯 应用技巧：</p>
            <p className="text-sm">看小数部分最后一位，确定计数单位。例如0.35的最后一位是百分位，计数单位是0.01，所以有35个0.01。</p>
            <div className="flex flex-wrap gap-2 mt-2 justify-center">
              <span className="bg-[#c2e0f0] px-2 py-1 rounded-full text-xs">0.8 → 8个0.1</span>
              <span className="bg-[#c2e0f0] px-2 py-1 rounded-full text-xs">0.42 → 42个0.01</span>
              <span className="bg-[#c2e0f0] px-2 py-1 rounded-full text-xs">0.105 → 105个0.001</span>
            </div>
          </div>
        </div>
        <div className="mt-4 text-sm text-center italic text-[#4a7c8c] bg-[#d9eef7] p-2 rounded-xl">
          🌊 右边游戏：拖拽数字卡片，匹配正确的小数计数单位数量！
        </div>
      </div>
    );
  };

  // ---------- 生成随机题目（小数和它包含的计数单位个数）----------
  // 题目类型：给出一个小数，问它包含多少个某计数单位
  // 例如：0.3 → 3个0.1；0.25 → 25个0.01；1.6 → 16个0.1；0.07 → 7个0.01
  // 我们随机生成一位小数、两位小数、三位小数（简单范围）
  const generateQuestion = () => {
    // 随机选择精度：1-一位小数，2-两位小数，3-三位小数
    const precision = Math.floor(Math.random() * 3) + 1; // 1,2,3
    let decimal, unit, expectedCount;
    if (precision === 1) {
      // 一位小数：0.1 ~ 9.9，整数部分0~9，小数部分1~9
      const intPart = Math.floor(Math.random() * 10);
      const decPart = Math.floor(Math.random() * 9) + 1; // 1-9
      decimal = intPart + decPart / 10;
      unit = 0.1;
      expectedCount = intPart * 10 + decPart;
    } else if (precision === 2) {
      // 两位小数：整数部分0~9，小数部分01~99，不能为整十（避免末尾0），但允许
      const intPart = Math.floor(Math.random() * 10);
      const decPart = Math.floor(Math.random() * 100); // 0-99
      if (decPart === 0) {
        // 如果小数部分为0，重新生成一位小数情况
        return generateQuestion();
      }
      decimal = intPart + decPart / 100;
      unit = 0.01;
      expectedCount = intPart * 100 + decPart;
    } else {
      // 三位小数：整数部分0~9，小数部分001~999
      const intPart = Math.floor(Math.random() * 10);
      const decPart = Math.floor(Math.random() * 1000); // 0-999
      if (decPart === 0) {
        return generateQuestion();
      }
      decimal = intPart + decPart / 1000;
      unit = 0.001;
      expectedCount = intPart * 1000 + decPart;
    }
    // 保留合适的小数位数显示
    const decimalStr = decimal.toFixed(precision);
    const unitStr = unit.toString();
    // 构建问题描述
    const questionText = `${decimalStr} 里面有多少个 ${unitStr} ？`;
    // 生成选项（正确选项和干扰项，干扰项在 expectedCount ±1~3，且为正数）
    let optionsSet = new Set();
    optionsSet.add(expectedCount);
    while(optionsSet.size < 4) {
      let offset = Math.floor(Math.random() * 5) + 1;
      let cand = expectedCount + (Math.random() > 0.5 ? offset : -offset);
      if (cand > 0 && cand < expectedCount * 2 + 10) optionsSet.add(cand);
      else optionsSet.add(expectedCount + 1);
    }
    let options = Array.from(optionsSet);
    for (let i = options.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [options[i], options[j]] = [options[j], options[i]];
    }
    return {
      decimal: decimalStr,
      unit: unitStr,
      expectedCount,
      options,
      questionText
    };
  };

  // ---------- 拖拽配对游戏组件 ----------
  const DragGame = ({ resetKey, onNewQuestion }) => {
    const [question, setQuestion] = React.useState(() => generateQuestion());
    const [selectedValue, setSelectedValue] = React.useState(null);
    const [feedback, setFeedback] = React.useState('');
    const [isCompleted, setIsCompleted] = React.useState(false);
    
    React.useEffect(() => {
      setQuestion(generateQuestion());
      setSelectedValue(null);
      setFeedback('');
      setIsCompleted(false);
    }, [resetKey]);
    
    const handleDrop = (value) => {
      if (isCompleted) return;
      setSelectedValue(value);
      if (value === question.expectedCount) {
        setFeedback('🎉 完全正确！计数单位掌握得真棒！ 🎉');
        setIsCompleted(true);
      } else {
        setFeedback('❌ 再试试看！想一想，这个小数有多少个这样的计数单位？');
        setIsCompleted(false);
      }
    };
    
    const onDragStart = (e, val) => {
      if (isCompleted) { e.preventDefault(); return false; }
      e.dataTransfer.setData('text/plain', val);
      e.dataTransfer.effectAllowed = 'copy';
    };
    const onDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; };
    const onDropZone = (e) => {
      e.preventDefault();
      if (isCompleted) return;
      const val = parseInt(e.dataTransfer.getData('text/plain'), 10);
      if (!isNaN(val)) handleDrop(val);
    };
    
    const resetGame = () => {
      if (isCompleted) return;
      setSelectedValue(null);
      setFeedback('');
      setIsCompleted(false);
    };
    
    const newGame = () => {
      onNewQuestion();
    };
    
    return (
      <div className="flex flex-col gap-4">
        {/* 题目展示区 */}
        <div className="bg-[#e6f4fa] rounded-2xl p-4 shadow-md border border-[#b0d4e8]">
          <div className="text-center mb-2">
            <span className="bg-[#7ab3c8] px-3 py-1 rounded-full text-sm font-bold text-white">📐 计数单位挑战</span>
          </div>
          <div className="text-center">
            <div className="text-2xl font-mono font-bold text-[#1e7a8c] my-3">{question.questionText}</div>
            <div className="mt-2 text-sm text-stone-500">💡 提示：看小数最后一位确定计数单位，再数一数总共有多少个。</div>
          </div>
        </div>
        
        {/* 拖拽放置区 */}
        <div className="bg-[#c2e0f0]/80 rounded-xl p-4 text-center">
          <div className="text-sm font-bold text-[#1e7a8c] mb-1">✨ 答案盒子 ✨</div>
          <div 
            className={`drop-zone w-32 h-24 mx-auto bg-white rounded-2xl border-4 border-dashed flex items-center justify-center text-5xl font-black transition-all ${selectedValue !== null ? 'border-emerald-500 bg-emerald-50' : 'border-[#7ab3c8] bg-blue-50'}`}
            onDragOver={onDragOver}
            onDrop={onDropZone}
          >
            {selectedValue !== null ? selectedValue : '?'}
          </div>
          <p className="text-xs text-stone-500 mt-1">把正确的数字拖拽到这里</p>
        </div>
        
        {/* 可拖拽数字卡片 */}
        <div className="bg-[#e6f4fa] p-3 rounded-2xl">
          <div className="text-center text-sm font-medium text-[#1e7a8c] mb-2">🐣 拖拽下面正确的数字 🐣</div>
          <div className="flex flex-wrap justify-center gap-3">
            {question.options.map(num => (
              <div
                key={num}
                draggable={!isCompleted}
                onDragStart={(e) => onDragStart(e, num)}
                className={`drag-card w-16 h-16 bg-white rounded-2xl shadow-md flex items-center justify-center text-2xl font-bold text-[#2c5f6e] cursor-grab active:cursor-grabbing hover:scale-105 transition-transform border border-[#b0d4e8] ${isCompleted ? 'opacity-50' : ''}`}
              >
                {num}
              </div>
            ))}
          </div>
        </div>
        
        <div className="flex gap-3">
          <button onClick={resetGame} className="flex-1 bg-amber-200 hover:bg-amber-300 text-amber-800 font-bold py-2 rounded-full transition shadow-sm text-sm" disabled={isCompleted}>🔄 重置</button>
          <button onClick={newGame} className="flex-1 bg-[#7ab3c8] hover:bg-[#5a93a8] text-white font-bold py-2 rounded-full transition shadow-sm text-sm">🎲 换一题</button>
        </div>
        
        {feedback && (
          <div className={`text-center font-bold p-3 rounded-full ${feedback.includes('正确') ? 'bg-green-200 text-green-800' : 'bg-amber-100 text-amber-700'}`}>
            {feedback}
          </div>
        )}
        {isCompleted && (
          <div className="text-center text-emerald-700 bg-emerald-100 p-2 rounded-full text-sm font-bold">
            🌟 太厉害了！点击“换一题”继续挑战 🌟
          </div>
        )}
      </div>
    );
  };
  
  // ---------- 主应用 ----------
  const App = () => {
    const [gameResetKey, setGameResetKey] = React.useState(0);
    
    const handleNewGame = () => {
      setGameResetKey(prev => prev + 1);
    };
    
    return (
      <div className="flex flex-col lg:flex-row gap-6">
        {/* 左侧知识点卡片 */}
        <div className="lg:w-5/12">
          <KnowledgeCard />
        </div>
        
        {/* 右侧互动游戏区 */}
        <div className="lg:w-7/12 flex flex-col gap-5">
          <div className="bg-white/80 backdrop-blur-sm rounded-3xl p-5 shadow-xl border border-white/40">
            <div className="flex justify-between items-center mb-4 flex-wrap gap-3">
              <h3 className="text-xl font-bold text-[#2c5f6e] flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}><path strokeLinecap="round" strokeLinejoin="round" d="M11 19H6a2 2 0 01-2-2V7a2 2 0 012-2h3m7 4v6m-3-3h6" /></svg>
                拖拖乐 · 计数单位配对
              </h3>
              <span className="text-sm text-stone-600 bg-white/60 px-3 py-1 rounded-full">✨ 拖拽数字到答案盒子 ✨</span>
            </div>
            <DragGame resetKey={gameResetKey} onNewQuestion={handleNewGame} />
          </div>
          <div className="text-xs text-center text-stone-600 bg-white/50 rounded-full py-2 px-3 flex justify-center gap-3 backdrop-blur-sm">
            <span>🐣 玩法：根据小数和计数单位，计算个数 → 拖拽正确数字到答案盒</span>
            <span>🏆 全部正确就能获得星星奖励！</span>
          </div>
        </div>
      </div>
    );
  };
  
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
