<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>加法认知小课堂 | 数学启蒙游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免拖动时选中文字，提升拖拽体验 */
        }

        body {
            background: linear-gradient(145deg, #d4eaff 0%, #c2e0f5 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', 'Comic Neue', 'Comic Neue', 'Comic Sans MS', 'Chalkboard SE', 'Poppins', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 主卡片容器 */
        .course-container {
            max-width: 1300px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.85);
            border-radius: 56px;
            box-shadow: 0 20px 35px rgba(0, 30, 50, 0.1);
            backdrop-filter: blur(1px);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* 左右布局响应式 */
        .split-layout {
            display: flex;
            flex-wrap: wrap;
        }

        /* 左边知识点区域 */
        .knowledge-area {
            flex: 1.2;
            min-width: 240px;
            background: #fefdf7;
            padding: 28px 24px;
            border-radius: 48px;
            margin: 20px 0 20px 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.03);
            border: 2px solid rgba(175, 215, 245, 0.6);
        }

        /* 右边游戏区域 */
        .game-area {
            flex: 2;
            min-width: 300px;
            background: #ffffffec;
            border-radius: 48px;
            margin: 20px;
            padding: 24px 20px 28px 20px;
            box-shadow: 0 12px 28px rgba(90, 150, 180, 0.15);
            border: 2px solid #cae3f0;
        }

        /* ========= 知识点样式 ========= */
        .title-icon {
            font-size: 2.2rem;
            display: inline-block;
            background: #b3defa;
            padding: 8px 16px;
            border-radius: 50px;
            margin-bottom: 20px;
        }

        .knowledge-area h2 {
            font-size: 1.9rem;
            color: #2c6e9e;
            margin-bottom: 16px;
            border-left: 8px solid #5faee3;
            padding-left: 18px;
        }

        .concept-box {
            background: #eef6fc;
            border-radius: 32px;
            padding: 20px;
            margin: 20px 0;
        }

        .big-add {
            font-size: 2.6rem;
            font-weight: bold;
            text-align: center;
            background: white;
            border-radius: 60px;
            padding: 15px 0;
            margin: 15px 0;
            color: #2c7cb6;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        .example-list {
            font-size: 1.3rem;
            line-height: 2;
            color: #1f5780;
            background: #ffffffba;
            border-radius: 28px;
            padding: 12px 20px;
        }

        .example-list span {
            font-weight: bold;
            background: #ffefc0;
            display: inline-block;
            padding: 0 10px;
            border-radius: 40px;
        }

        .friendly-tip {
            background: #ffe9c7;
            border-radius: 30px;
            padding: 12px;
            text-align: center;
            margin-top: 20px;
            font-size: 1rem;
            color: #a16200;
        }

        /* ========= 游戏区域样式 ========= */
        .game-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .game-header h3 {
            font-size: 1.8rem;
            color: #3580b0;
            background: #e2f0ff;
            display: inline-block;
            padding: 6px 22px;
            border-radius: 50px;
        }
        .drag-instruction {
            background: #d9efff;
            border-radius: 28px;
            padding: 8px 15px;
            font-size: 0.9rem;
            display: inline-block;
            margin-top: 8px;
            color: #2a6b97;
        }

        /* 算式卡片网格 */
        .equations-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 35px;
        }

        .equation-card {
            background: #fafcff;
            border-radius: 44px;
            padding: 18px 12px 12px;
            width: 160px;
            text-align: center;
            box-shadow: 0 12px 18px rgba(78, 128, 158, 0.12);
            transition: transform 0.2s;
            border: 2px solid #cbe5fe;
        }

        .equation-text {
            font-size: 2rem;
            font-weight: bold;
            background: #eef2ff;
            border-radius: 50px;
            padding: 12px 5px;
            margin-bottom: 16px;
            color: #286d9e;
            letter-spacing: 4px;
        }

        .drop-zone {
            background: #f1f9ff;
            border: 3px dashed #7fb7d9;
            border-radius: 32px;
            min-height: 68px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #2b7aa2;
            transition: all 0.1s ease;
            margin-top: 8px;
            padding: 10px 0;
        }

        .drop-zone.filled {
            background: #cbe5fe;
            border: 3px solid #4f9fd6;
            color: #1d5a7c;
            box-shadow: inset 0 0 0 2px white;
        }

        /* 可拖拽数字块区域 */
        .drag-numbers-area {
            background: #e3f0f9;
            border-radius: 58px;
            padding: 20px 16px;
            margin-top: 10px;
            text-align: center;
        }

        .drag-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #3e7fa5;
            margin-bottom: 18px;
        }

        .drag-items-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
            align-items: center;
        }

        .drag-number {
            width: 85px;
            height: 85px;
            background: #ffe0a3;
            background: radial-gradient(circle at 30% 25%, #fff3cf, #ffda88);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            color: #ca6f2e;
            box-shadow: 0 10px 0 #b47c44;
            cursor: grab;
            transition: 0.05s linear;
            touch-action: none;  /* 提升触摸拖拽性能 */
            user-select: none;
            border: 2px solid #ffc576;
        }

        .drag-number:active {
            cursor: grabbing;
        }

        /* 拖拽克隆体样式 */
        .dragging-clone {
            position: fixed;
            z-index: 9999;
            filter: drop-shadow(0 12px 20px rgba(0,0,0,0.3));
            opacity: 0.85;
            transform: scale(1.05);
            pointer-events: none;
            transition: none;
            width: 85px;
            height: 85px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 25%, #fff3cf, #ffda88);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            color: #ca6f2e;
            border: 2px solid #ffb347;
        }

        /* 重置按钮 */
        .reset-btn {
            background: #ffcd94;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 40px;
            margin-top: 20px;
            color: #5e3a1f;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .reset-btn:active {
            transform: scale(0.96);
            background: #ffbc6e;
        }

        .message-area {
            text-align: center;
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c7fb8;
            min-height: 60px;
        }

        .feedback-error {
            color: #e06040;
            background: #ffe6e0;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            animation: fadeOut 1.2s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0);}
            70% { opacity: 1;}
            100% { opacity: 0; display: none;}
        }

        /* 移动端适配 */
        @media (max-width: 780px) {
            body {
                padding: 12px;
            }
            .knowledge-area {
                margin: 12px 12px 0 12px;
                padding: 20px;
            }
            .game-area {
                margin: 12px;
                padding: 18px;
            }
            .equation-card {
                width: 140px;
            }
            .equation-text {
                font-size: 1.6rem;
            }
            .drag-number {
                width: 70px;
                height: 70px;
                font-size: 2.4rem;
            }
            .dragging-clone {
                width: 70px;
                height: 70px;
                font-size: 2.4rem;
            }
            .big-add {
                font-size: 2rem;
            }
        }

        @media (max-width: 580px) {
            .equations-grid {
                gap: 12px;
            }
            .equation-card {
                width: 125px;
            }
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 10px;
            color: #7f9eb5;
        }
    </style>
</head>
<body>

<div class="course-container">
    <div class="split-layout">
        <!-- 左侧知识点 -->
        <div class="knowledge-area">
            <div class="title-icon">🧸 数学小讲堂</div>
            <h2>✨ 加法的认识 ✨</h2>
            <div class="concept-box">
                <div class="big-add">
                    3 + 2 = 5
                </div>
                <p style="font-size:1.2rem; margin-bottom: 8px;">➕ “加” 就是合在一起，变多啦！</p>
                <div class="example-list">
                    🌟 加法算式：<span> 1 + 1 = 2</span><br>
                    🍎 苹果有 2 个，又拿来 1 个 → <span> 2 + 1 = 3</span><br>
                    🧸 左手3块积木，右手1块 → 一共 <span> 3 + 1 = 4</span>
                </div>
            </div>
            <div class="friendly-tip">
                💡 小诀窍：数一数，总共多少个？<br>
                “+” 像小十字架，把两边数字“加”起来！
            </div>
        </div>

        <!-- 右侧游戏区：拖拽数字配对 -->
        <div class="game-area">
            <div class="game-header">
                <h3>🐟 拖拽数字小挑战 🧩</h3>
                <div class="drag-instruction">
                    👆 按住数字球 → 拖到算式下面的空白区 → 放对就成功！
                </div>
            </div>

            <!-- 动态游戏内容会由js生成 -->
            <div id="gamePlayZone">
                <!-- 算式卡片 + 拖拽数字块动态渲染 -->
            </div>
            <div style="text-align: center;">
                <button class="reset-btn" id="resetGameBtn">🔄 再来一次 / 新一局</button>
            </div>
            <div id="gameMessage" class="message-area"></div>
            <footer>⭐ 把正确的答案拖到对应算式下，全部配对成功就胜利啦！</footer>
        </div>
    </div>
</div>

<script>
    // ----- 课程数据（题目与答案）-----
    const questions = [
        { text: "1 + 2 = ?", expected: 3 },
        { text: "2 + 1 = ?", expected: 3 },
        { text: "1 + 1 = ?", expected: 2 }
    ];
    // 可拖拽数字池 (根据题目结果提供三个数字球，两个3一个2)
    // 初始数字值数组
    let initialNumbers = [3, 3, 2];
    
    // 全局游戏状态
    let currentNumbers = [];      // 存储当前剩余可拖拽数字的值（用于重建）
    let filledStatus = [];        // 每个算式放置区是否已经配对
    let matchedValues = [];       // 每个放置区已配对的数字值（用于显示）
    
    // 拖拽相关全局变量
    let dragActive = false;
    let dragElement = null;        // 原始被拖拽的dom
    let cloneElement = null;
    let startX = 0, startY = 0;
    let currentDragValue = null;
    let dragItemRect = null;
    let offsetX = 0, offsetY = 0;
    let dragContainer = null;
    
    // 获取容器
    const gameZone = document.getElementById("gamePlayZone");
    const messageDiv = document.getElementById("gameMessage");
    
    // 显示短暂错误提示
    let errorTimeout = null;
    function showMessage(msg, isError = true) {
        if (errorTimeout) clearTimeout(errorTimeout);
        messageDiv.innerHTML = `<span class="${isError ? 'feedback-error' : 'success-msg'}" style="background:#d9f0e1; padding:6px 18px; border-radius:40px; color:#2d7a4b;">${msg}</span>`;
        if (isError) {
            errorTimeout = setTimeout(() => {
                if (messageDiv.innerHTML.includes(msg)) messageDiv.innerHTML = "";
            }, 1200);
        } else {
            setTimeout(() => {
                if (messageDiv.innerHTML.includes(msg)) messageDiv.innerHTML = "";
            }, 1800);
        }
    }
    
    function showSuccessMessage(msg) {
        showMessage(msg, false);
    }
    
    // 检查是否胜利
    function checkVictory() {
        const allFilled = filledStatus.every(status => status === true);
        if (allFilled) {
            showSuccessMessage("🎉 太棒啦！全部加法配对正确！ 你已经是加法小英雄！ 🎉");
            // 可以额外禁用拖拽剩余? 但胜利时没有剩余数字了 因为配对正确后数字会移除, 如果有残留但已经全部filled, 安全
        }
    }
    
    // 重置游戏界面 (完全重建)
    function resetGame() {
        // 停止任何活跃拖拽
        if (dragActive) {
            endDragCleanup();
        }
        // 重置状态数组
        filledStatus = new Array(questions.length).fill(false);
        matchedValues = new Array(questions.length).fill(null);
        currentNumbers = [...initialNumbers];   // 重新拷贝数字池
        
        // 重新渲染游戏区
        renderGame();
    }
    
    // 渲染整个游戏板块 (算式卡片 + 可拖拽数字)
    function renderGame() {
        if (!gameZone) return;
        // 构建html
        let html = `<div class="equations-grid" id="equationsGrid">`;
        questions.forEach((q, idx) => {
            const isFilled = filledStatus[idx];
            const matchedNum = matchedValues[idx];
            const displayValue = isFilled ? matchedNum : "?";
            html += `
                <div class="equation-card" data-qidx="${idx}">
                    <div class="equation-text">${q.text}</div>
                    <div class="drop-zone ${isFilled ? 'filled' : ''}" data-dropzone-idx="${idx}" data-expected="${q.expected}">
                        ${isFilled ? `<span style="font-size:2rem;">${displayValue}</span>` : "⬅️ 拖到这里"}
                    </div>
                </div>
            `;
        });
        html += `</div><div class="drag-numbers-area"><div class="drag-title">🎈 可拖拽的数字球 (按住拖动) 🎈</div><div class="drag-items-container" id="dragItemsContainer">`;
        // 生成剩余数字球
        currentNumbers.forEach((num, i) => {
            html += `<div class="drag-number" data-drag-value="${num}" data-drag-idx="${i}">${num}</div>`;
        });
        html += `</div></div>`;
        gameZone.innerHTML = html;
        
        // 绑定拖拽事件 (动态生成的 .drag-number)
        attachDragEvents();
        
        // 胜利时如果已经没有剩余数字并且全部filled 再检查一次(重置后状态正常)
        checkVictory();
    }
    
    // 配对成功逻辑 (拖拽结束调用)
    function matchSuccess(dropZoneElement, dragNumValue, dragDomElement) {
        // 获取放置区对应的算式索引
        const dropZoneParent = dropZoneElement.closest('.equation-card');
        if (!dropZoneParent) return false;
        const qIdx = parseInt(dropZoneParent.dataset.qidx);
        if (isNaN(qIdx)) return false;
        // 检查该放置区是否已经填充
        if (filledStatus[qIdx]) {
            showMessage("这个算式已经有答案啦！不能重复放哟~", true);
            return false;
        }
        // 验证数字是否正确
        const expected = questions[qIdx].expected;
        if (dragNumValue !== expected) {
            showMessage(`不对哦，${questions[qIdx].text} 的结果应该是 ${expected}，再试试看！`, true);
            return false;
        }
        
        // 配对成功！
        // 1. 更新状态
        filledStatus[qIdx] = true;
        matchedValues[qIdx] = dragNumValue;
        // 2. 从 currentNumbers 中移除这个拖拽的数字 (根据dom在currentNumbers中删除对应的值)
        // 找到该dragDomElement在列表中的实际值索引（因为可能有重复值，我们用元素里data-drag-idx自定义索引，更稳健）
        let dragItemIdx = -1;
        if (dragDomElement && dragDomElement.dataset && dragDomElement.dataset.dragIdx !== undefined) {
            dragItemIdx = parseInt(dragDomElement.dataset.dragIdx);
        } else {
            // 备用: 通过值查找第一个匹配项（谨慎）
            dragItemIdx = currentNumbers.findIndex((val, idx) => val === dragNumValue && document.querySelector(`.drag-number[data-drag-idx='${idx}']`) === dragDomElement);
            if (dragItemIdx === -1) dragItemIdx = currentNumbers.indexOf(dragNumValue);
        }
        if (dragItemIdx !== -1) {
            currentNumbers.splice(dragItemIdx, 1);
        } else {
            // 万一找不到就按值删除一个
            const firstIdx = currentNumbers.indexOf(dragNumValue);
            if(firstIdx !== -1) currentNumbers.splice(firstIdx,1);
        }
        
        // 3. 刷新界面 (重新渲染)
        renderGame();
        showSuccessMessage(`✔️ 正确！ ${questions[qIdx].text} = ${dragNumValue}，好厉害！`);
        // 胜利检查在renderGame 里触发 checkVictory
        return true;
    }
    
    // ----- 拖拽核心 (支持触摸 & 鼠标) -----
    let activeDragItem = null;
    let dragStartBound = false;
    
    function onPointerDown(e) {
        const target = e.target.closest('.drag-number');
        if (!target) return;
        // 阻止默认避免拖动时选中/滚动冲突
        e.preventDefault();
        if (dragActive) return;
        
        activeDragItem = target;
        dragActive = true;
        
        // 获取拖拽元素的值
        currentDragValue = parseInt(activeDragItem.getAttribute('data-drag-value'));
        
        // 创建克隆体
        const rect = activeDragItem.getBoundingClientRect();
        const computedStyle = window.getComputedStyle(activeDragItem);
        cloneElement = activeDragItem.cloneNode(true);
        cloneElement.classList.add('dragging-clone');
        cloneElement.style.position = 'fixed';
        cloneElement.style.left = rect.left + 'px';
        cloneElement.style.top = rect.top + 'px';
        cloneElement.style.width = rect.width + 'px';
        cloneElement.style.height = rect.height + 'px';
        cloneElement.style.margin = '0';
        cloneElement.style.zIndex = '9999';
        document.body.appendChild(cloneElement);
        
        // 记录按下的偏移 (相对鼠标/触摸点 与元素左上角偏移)
        let clientX, clientY;
        if (e.type === 'mousedown') {
            clientX = e.clientX;
            clientY = e.clientY;
            window.addEventListener('mousemove', onPointerMove);
            window.addEventListener('mouseup', onPointerUp);
        } else {
            const touch = e.touches[0];
            clientX = touch.clientX;
            clientY = touch.clientY;
            window.addEventListener('touchmove', onPointerMove, { passive: false });
            window.addEventListener('touchend', onPointerUp);
            window.addEventListener('touchcancel', onPointerCancel);
        }
        
        offsetX = clientX - rect.left;
        offsetY = clientY - rect.top;
        
        // 让原始元素半透明 (视觉反馈)
        activeDragItem.style.opacity = '0.4';
        
        // 阻止后续事件冒泡
        e.stopPropagation();
    }
    
    function onPointerMove(e) {
        if (!dragActive || !cloneElement) return;
        e.preventDefault();
        let clientX, clientY;
        if (e.type === 'mousemove') {
            clientX = e.clientX;
            clientY = e.clientY;
        } else {
            const touch = e.touches[0];
            if (!touch) return;
            clientX = touch.clientX;
            clientY = touch.clientY;
        }
        // 移动克隆体
        cloneElement.style.left = (clientX - offsetX) + 'px';
        cloneElement.style.top = (clientY - offsetY) + 'px';
    }
    
    function onPointerUp(e) {
        if (!dragActive || !cloneElement) {
            endDragCleanup();
            return;
        }
        e.preventDefault();
        
        // 获取当前释放点坐标
        let endX, endY;
        if (e.type === 'mouseup') {
            endX = e.clientX;
            endY = e.clientY;
        } else {
            if (e.changedTouches && e.changedTouches.length > 0) {
                endX = e.changedTouches[0].clientX;
                endY = e.changedTouches[0].clientY;
            } else {
                endDragCleanup();
                return;
            }
        }
        
        // 根据坐标获取下面的元素 (判断dropZone)
        const elemUnderPointer = document.elementsFromPoint(endX, endY);
        let dropZone = null;
        for (let elem of elemUnderPointer) {
            if (elem.classList && elem.classList.contains('drop-zone')) {
                dropZone = elem;
                break;
            }
        }
        
        let success = false;
        if (dropZone && activeDragItem && currentDragValue !== undefined) {
            // 额外检查dropzone是否已经被填充 (内部匹配函数会再检测)
            success = matchSuccess(dropZone, currentDragValue, activeDragItem);
        } else {
            if (dropZone === null && activeDragItem) {
                showMessage("要把数字拖到算式下方的空白区哦～", true);
            }
        }
        
        // 清理拖拽效果
        endDragCleanup();
        
        // 如果配对失败并且没有配对成功，恢复原始元素透明度并显示未成功
        if (!success && activeDragItem) {
            activeDragItem.style.opacity = '1';
            // 如果配对失败但是没有匹配任何区域，保留数字
            // 额外增加一个抖动反馈？不加复杂了
        } else if (success && activeDragItem) {
            // 配对成功后已经重新渲染，不再需要操作
            // activeDragItem 在重新渲染后被删除，无需重置透明度
        }
        // 重置dragActive
        dragActive = false;
        activeDragItem = null;
        currentDragValue = null;
    }
    
    function onPointerCancel(e) {
        endDragCleanup();
    }
    
    function endDragCleanup() {
        if (cloneElement && cloneElement.parentNode) {
            cloneElement.parentNode.removeChild(cloneElement);
        }
        if (activeDragItem) {
            activeDragItem.style.opacity = '';
        }
        // 移除全局事件
        window.removeEventListener('mousemove', onPointerMove);
        window.removeEventListener('mouseup', onPointerUp);
        window.removeEventListener('touchmove', onPointerMove);
        window.removeEventListener('touchend', onPointerUp);
        window.removeEventListener('touchcancel', onPointerCancel);
        cloneElement = null;
        dragActive = false;
    }
    
    // 动态绑定拖拽事件 (因为重置会重新生成DOM)
    function attachDragEvents() {
        const dragItems = document.querySelectorAll('.drag-number');
        dragItems.forEach(item => {
            // 移除已有监听避免重复 (先移除再添加)
            item.removeEventListener('mousedown', onPointerDown);
            item.removeEventListener('touchstart', onPointerDown);
            item.addEventListener('mousedown', onPointerDown);
            item.addEventListener('touchstart', onPointerDown, { passive: false });
            // 确保触摸时不会页面滚动
            item.style.touchAction = 'none';
        });
    }
    
    // 重置按钮事件
    function initReset() {
        const resetBtn = document.getElementById('resetGameBtn');
        if (resetBtn) {
            resetBtn.addEventListener('click', () => {
                if (dragActive) endDragCleanup();
                resetGame();
            });
        }
    }
    
    // 初始化游戏
    function initGame() {
        resetGame();    // 第一次渲染
        initReset();
    }
    
    // 启动
    initGame();
</script>
</body>
</html>
