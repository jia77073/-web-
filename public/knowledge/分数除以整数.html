<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>☁️ 分数除以整数 · 天空蓝工坊</title>
  <!-- Tailwind + React CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .drag-card {
      transition: all 0.1s ease;
      cursor: grab;
    }
    .drag-card:active {
      cursor: grabbing;
    }
    .drag-card.disabled-card {
      cursor: default;
      opacity: 0.6;
      filter: grayscale(0.1);
    }
    .drop-slot {
      transition: all 0.2s ease;
      background-color: rgba(210, 230, 255, 0.6);
      border: 2px dashed #7aa2f7;
    }
    .drop-slot.drag-over {
      background-color: #d9eaff;
      border-color: #3b82f6;
      transform: scale(1.02);
    }
    .drop-slot.filled-slot {
      background-color: #c5e0ff;
      border: 2px solid #2563eb;
      cursor: default;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    .celebration {
      animation: bounce 0.5s ease-in-out;
    }
    .sky-bg {
      background-image: radial-gradient(circle at 20% 40%, rgba(59, 130, 246, 0.1) 2.5%, transparent 2.8%);
      background-size: 42px 42px;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-[#B3E0FF] to-[#6BB5E8] min-h-screen flex items-center justify-center p-4 font-sans sky-bg">

<div id="root" class="w-full max-w-6xl mx-auto"></div>

<script type="text/babel">
  // ---------- 辅助函数：最大公因数 & 约分 ----------
  const computeGCD = (a, b) => {
    a = Math.abs(a);
    b = Math.abs(b);
    while (b !== 0) {
      let temp = b;
      b = a % b;
      a = temp;
    }
    return a;
  };

  const reduceFraction = (numerator, denominator) => {
    if (denominator === 0) return "0/1";
    if (numerator === 0) return "0";
    const gcd = computeGCD(numerator, denominator);
    const num = numerator / gcd;
    const den = denominator / gcd;
    if (den === 1) return `${num}`;
    return `${num}/${den}`;
  };

  // 分数除以整数: (a/b) ÷ c = a/(b×c)
  const divideFractionByInteger = (fraction, integer) => {
    const [num, den] = fraction.split('/').map(Number);
    if (isNaN(num) || isNaN(den) || den === 0) return null;
    const newNum = num;
    const newDen = den * integer;
    return reduceFraction(newNum, newDen);
  };

  // 生成随机分数 (分母2~12，分子1~15，避免结果过于复杂)
  const generateRandomFraction = () => {
    const denominator = Math.floor(Math.random() * 11) + 2; // 2~12
    let numerator = Math.floor(Math.random() * 12) + 1;    // 1~12
    // 偶尔出现假分数，但分母乘以整数后不至于太大
    if (Math.random() > 0.7) numerator = denominator + Math.floor(Math.random() * 4);
    return `${numerator}/${denominator}`;
  };

  // 生成随机整数 (2~8，太大容易使分母过大)
  const generateRandomInteger = () => Math.floor(Math.random() * 7) + 2;

  // 生成挑战集 (count个分数÷整数)
  const generateChallengeSet = (count = 4) => {
    let challenges = [];
    let usedPairs = new Set();
    for (let i = 0; i < count; i++) {
      let maxAttempts = 30;
      let fraction, integer, result;
      for (let attempt = 0; attempt < maxAttempts; attempt++) {
        fraction = generateRandomFraction();
        integer = generateRandomInteger();
        result = divideFractionByInteger(fraction, integer);
        if (result === null) continue;
        // 结果限制：分子分母不超过40
        if (result.includes('/')) {
          const [rNum, rDen] = result.split('/').map(Number);
          if (rDen > 40 || rNum > 40) continue;
        } else if (parseInt(result) > 20) continue;
        const pairKey = `${fraction}_÷_${integer}`;
        if (!usedPairs.has(pairKey)) {
          usedPairs.add(pairKey);
          break;
        }
      }
      if (!result) {
        // 保底题目
        fraction = "2/3";
        integer = 2;
        result = "1/3";
      }
      challenges.push({
        id: `ch-${Date.now()}-${i}-${Math.random()}`,
        fraction: fraction,
        integer: integer,
        result: result,
        matched: false,
        matchedValue: null
      });
    }
    return challenges;
  };

  // 生成卡片池：正确结果 + 干扰项
  const generateAnswerCards = (challenges) => {
    let correctSet = new Set();
    challenges.forEach(ch => {
      correctSet.add(ch.result);
    });
    let correctArray = Array.from(correctSet);
    
    // 干扰池：随机生成一些分数（可能来自其他除法或随机分数）
    let distractorPool = [];
    let usedDistractors = new Set();
    for (let i = 0; i < correctArray.length + 2; i++) {
      let candidate;
      let attempts = 0;
      do {
        // 生成随机分数或整数作为干扰
        if (Math.random() > 0.5) {
          const fakeFrac = generateRandomFraction();
          const [n, d] = fakeFrac.split('/').map(Number);
          candidate = reduceFraction(n, d);
        } else {
          const fakeInt = generateRandomInteger();
          candidate = fakeInt.toString();
        }
        attempts++;
        if (attempts > 25) break;
      } while (correctSet.has(candidate) || usedDistractors.has(candidate));
      if (!correctSet.has(candidate) && !usedDistractors.has(candidate)) {
        usedDistractors.add(candidate);
        distractorPool.push(candidate);
      }
      if (distractorPool.length >= correctArray.length + 1) break;
    }
    // 额外干扰
    const extra = ["1/2", "1/3", "2/3", "1/4", "3/4", "1", "1/6", "5/6", "2/5", "3/5", "1/8", "3/8"];
    for (let ex of extra) {
      if (!correctSet.has(ex) && !usedDistractors.has(ex) && distractorPool.length < correctArray.length + 2) {
        distractorPool.push(ex);
        usedDistractors.add(ex);
      }
    }
    
    let allCardValues = [...correctArray, ...distractorPool];
    // 洗牌
    for (let i = allCardValues.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [allCardValues[i], allCardValues[j]] = [allCardValues[j], allCardValues[i]];
    }
    return allCardValues.map((val, idx) => ({
      id: `card-${Date.now()}-${idx}-${Math.random()}`,
      value: val,
      used: false
    }));
  };

  // 比较两个分数是否相等
  const areEqual = (val1, val2) => {
    if (val1 === val2) return true;
    const toFraction = (v) => {
      if (v.includes('/')) {
        const [n, d] = v.split('/').map(Number);
        return { n, d };
      } else {
        const num = parseInt(v);
        return { n: num, d: 1 };
      }
    };
    const f1 = toFraction(val1);
    const f2 = toFraction(val2);
    return f1.n * f2.d === f2.n * f1.d;
  };

  // ---------- 左侧知识点卡片：分数除以整数（天空蓝主题）----------
  const KnowledgeCard = () => {
    return (
      <div className="bg-[#F0F9FF]/90 backdrop-blur-sm rounded-3xl p-5 shadow-xl border border-[#AAD4FF] h-full text-[#0B5E8A]">
        <div className="flex items-center gap-2 border-b-2 border-[#7FBCE5] pb-3 mb-4">
          <span className="text-4xl">☁️</span>
          <h2 className="text-2xl font-extrabold tracking-wide">分数除以整数<br/><span className="text-sm font-normal text-[#2C7CB0]">天空蓝课堂 · 除以一个数等于乘它的倒数</span></h2>
        </div>
        <div className="space-y-4">
          <div className="bg-[#E6F4FF] rounded-2xl p-4 border border-[#B8D9F5]">
            <p className="font-bold text-[#0A6A9E] flex items-center gap-2">✨ 分数除以整数法则</p>
            <p className="text-sm mt-1">分数除以整数（0除外），等于分数乘这个整数的倒数。</p>
            <div className="mt-2 text-xs bg-white/70 p-2 rounded-lg inline-block shadow-sm">📖 例：4/5 ÷ 2 = 4/5 × 1/2 = 4/10 = 2/5</div>
          </div>
          <div className="bg-[#E6F4FF] rounded-2xl p-4 border border-[#B8D9F5]">
            <p className="font-bold text-[#0A6A9E]">⚡ 简化步骤</p>
            <p className="text-sm mt-1">也可以直接用分子除以整数（如果能整除），分母不变；或者分母乘整数，分子不变。</p>
            <div className="mt-2 text-xs bg-white/70 p-2 rounded-lg">💡 例：6/7 ÷ 3 = 2/7（分子6÷3）</div>
          </div>
          <div className="bg-[#D4EAFF] rounded-2xl p-3 text-center text-sm border border-[#8BC1EC]">
            🎯 挑战规则：计算每个算式的结果（最简分数），将右侧结果卡片拖拽到对应的槽位中。
          </div>
        </div>
      </div>
    );
  };

  // ---------- 主游戏组件：分数除以整数匹配（天空蓝主题）----------
  const DivisionGame = ({ resetKey, onNewGame }) => {
    const [challenges, setChallenges] = React.useState(() => generateChallengeSet(4));
    const [answerCards, setAnswerCards] = React.useState(() => []);
    const [errorMsg, setErrorMsg] = React.useState('');
    const [isVictory, setIsVictory] = React.useState(false);
    
    const initCards = (currentChallenges) => generateAnswerCards(currentChallenges);
    
    React.useEffect(() => {
      setAnswerCards(initCards(challenges));
    }, [challenges]);
    
    const checkVictory = (currentChallenges) => {
      const allFilled = currentChallenges.every(ch => ch.matched === true);
      if (allFilled && !isVictory) setIsVictory(true);
      else if (!allFilled && isVictory) setIsVictory(false);
    };
    
    const updateChallengesAndCheck = (newChallenges) => {
      setChallenges(newChallenges);
      checkVictory(newChallenges);
    };
    
    const resetGame = () => {
      const newChallenges = generateChallengeSet(4);
      setChallenges(newChallenges);
      setAnswerCards(initCards(newChallenges));
      setIsVictory(false);
      setErrorMsg('');
    };
    
    React.useEffect(() => {
      resetGame();
    }, [resetKey]);
    
    // 拖拽卡片
    const onDragStart = (e, card) => {
      if (card.used) {
        e.preventDefault();
        return false;
      }
      e.dataTransfer.setData('text/plain', JSON.stringify({ cardId: card.id, cardValue: card.value }));
      e.dataTransfer.effectAllowed = 'copy';
      e.target.style.opacity = '0.6';
    };
    const onDragEnd = (e) => {
      if (e.target) e.target.style.opacity = '';
    };
    
    const onDragOverSlot = (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
      e.currentTarget.classList.add('drag-over');
    };
    const onDragLeaveSlot = (e) => {
      e.currentTarget.classList.remove('drag-over');
    };
    
    // 放置到算式槽位
    const onDropToSlot = (e, challengeId) => {
      e.preventDefault();
      e.currentTarget.classList.remove('drag-over');
      const rawData = e.dataTransfer.getData('text/plain');
      if (!rawData) return;
      let draggedCardId, draggedValue;
      try {
        const parsed = JSON.parse(rawData);
        draggedCardId = parsed.cardId;
        draggedValue = parsed.cardValue;
      } catch (err) {
        return;
      }
      
      const targetCard = answerCards.find(c => c.id === draggedCardId);
      if (!targetCard || targetCard.used) {
        setErrorMsg('☁️ 这张卡片已经使用过了！不能重复投放。');
        setTimeout(() => setErrorMsg(''), 1300);
        return;
      }
      
      const challengeIndex = challenges.findIndex(ch => ch.id === challengeId);
      if (challengeIndex === -1) return;
      const targetChallenge = challenges[challengeIndex];
      if (targetChallenge.matched) {
        setErrorMsg('💧 这个算式槽位已经匹配完成啦！');
        setTimeout(() => setErrorMsg(''), 1300);
        return;
      }
      
      const isMatch = areEqual(draggedValue, targetChallenge.result);
      if (!isMatch) {
        const expected = targetChallenge.result;
        setErrorMsg(`❌ 计算结果不正确！ ${targetChallenge.fraction} ÷ ${targetChallenge.integer} 的结果应该是 ${expected}，而不是 ${draggedValue}。再试试看～`);
        setTimeout(() => setErrorMsg(''), 1900);
        return;
      }
      
      // 正确匹配
      setAnswerCards(prevCards =>
        prevCards.map(card =>
          card.id === draggedCardId ? { ...card, used: true } : card
        )
      );
      const newChallenges = [...challenges];
      newChallenges[challengeIndex].matched = true;
      newChallenges[challengeIndex].matchedValue = draggedValue;
      updateChallengesAndCheck(newChallenges);
      setErrorMsg('');
    };
    
    // 重置当前进度
    const resetProgress = () => {
      const resetChallenges = challenges.map(ch => ({
        ...ch,
        matched: false,
        matchedValue: null
      }));
      const resetCards = answerCards.map(card => ({ ...card, used: false }));
      // 洗牌
      for (let i = resetCards.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [resetCards[i], resetCards[j]] = [resetCards[j], resetCards[i]];
      }
      setChallenges(resetChallenges);
      setAnswerCards(resetCards);
      setIsVictory(false);
      setErrorMsg('');
    };
    
    const newGameFull = () => {
      resetGame();
      if (onNewGame) onNewGame();
    };
    
    const totalCount = challenges.length;
    const filledCount = challenges.filter(ch => ch.matched).length;
    const progressPercent = totalCount === 0 ? 0 : (filledCount / totalCount) * 100;
    
    const VictoryMessage = () => (
      <div className="text-center bg-gradient-to-r from-[#7FBCE5] to-[#3B82F6] rounded-2xl p-3 mt-2 animate-bounce shadow-xl border border-[#D9E8FF]">
        <div className="text-2xl font-bold text-white">🎉 运算精英！全部正确 🎉</div>
        <div className="text-sm text-[#E6F4FF] font-semibold">所有分数除以整数都已正确匹配！点击「全新挑战」继续练习～</div>
      </div>
    );
    
    return (
      <div className="flex flex-col gap-5">
        {/* 进度条 */}
        <div className="flex justify-between items-center bg-[#E6F4FF]/80 backdrop-blur-sm rounded-2xl px-5 py-2 shadow-md border border-[#B8D9F5]">
          <div className="flex items-center gap-2">
            <span className="text-2xl">☁️</span>
            <span className="font-bold text-[#0B5E8A]">计算进度</span>
            <span className="text-lg font-black text-[#1E6EA5]">{filledCount} / {totalCount}</span>
          </div>
          <div className="w-36 bg-[#C5E0FF] rounded-full h-2.5">
            <div className="bg-[#3B82F6] h-2.5 rounded-full transition-all duration-300" style={{ width: `${progressPercent}%` }}></div>
          </div>
          <div className="text-xs bg-[#D4EAFF] px-2 py-1 rounded-full text-[#0B5E8A] border border-[#7FBCE5]">🌤️ 拖拽结果 放入槽位</div>
        </div>
        
        {/* 挑战区域：每个算式 + 结果槽位 */}
        <div className="bg-[#F0F9FF]/70 rounded-2xl p-4 backdrop-blur-sm border border-[#B8D9F5]">
          <div className="text-center text-sm font-semibold text-[#0B5E8A] mb-3">📌 计算每个算式的结果，将右侧结果卡片拖拽到对应槽位</div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
            {challenges.map((challenge) => (
              <div key={challenge.id} className="bg-[#E6F4FF] rounded-xl p-4 border border-[#B8D9F5] shadow-sm">
                <div className="text-center mb-3">
                  <div className="text-2xl font-black text-[#0B5E8A] bg-white/60 inline-block px-4 py-1 rounded-full shadow-sm">
                    {challenge.fraction} ÷ {challenge.integer}
                  </div>
                  <div className="text-xs text-[#2C7CB0] mt-1">= ?</div>
                </div>
                <div className="mt-2">
                  <div
                    className={`drop-slot rounded-xl p-3 text-center transition-all ${challenge.matched ? 'filled-slot' : ''}`}
                    onDragOver={onDragOverSlot}
                    onDragLeave={onDragLeaveSlot}
                    onDrop={(e) => onDropToSlot(e, challenge.id)}
                  >
                    <div className="text-xs font-semibold text-[#0B5E8A]">✨ 计算结果槽 ✨</div>
                    {challenge.matched ? (
                      <div className="text-xl font-bold text-[#0B5E8A] mt-1">{challenge.matchedValue}</div>
                    ) : (
                      <div className="text-sm text-[#2C7CB0] mt-1 border-t border-dashed border-[#7FBCE5] pt-1">⬅️ 拖拽结果卡片至此</div>
                    )}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
        
        {/* 卡片池区域 */}
        <div className="bg-[#F0F9FF]/70 rounded-2xl p-4 border border-[#B8D9F5]">
          <div className="text-center text-sm font-semibold text-[#0B5E8A] mb-2">🎴 结果卡片库（拖拽到上方算式槽位）</div>
          <div className="flex flex-wrap justify-center gap-3">
            {answerCards.map(card => (
              <div
                key={card.id}
                draggable={!card.used}
                onDragStart={(e) => onDragStart(e, card)}
                onDragEnd={onDragEnd}
                className={`drag-card w-24 h-24 rounded-xl shadow-md flex items-center justify-center text-lg font-bold transition-all ${
                  card.used 
                    ? 'bg-gray-300/60 cursor-default border-2 border-gray-400 text-gray-500' 
                    : 'bg-gradient-to-br from-[#B8D9F5] to-[#8FC5F0] cursor-grab active:cursor-grabbing hover:scale-105 border-2 border-[#3B82F6] text-[#0B5E8A]'
                }`}
              >
                {card.used ? '✓ 已用' : card.value}
              </div>
            ))}
            {answerCards.length === 0 && <div className="text-[#2C7CB0]">加载卡片中...</div>}
          </div>
          <div className="text-[11px] text-center text-[#0B5E8A] mt-2">💡 每个卡片只能用一次，正确计算并拖拽匹配每个算式的结果（结果已约成最简分数）</div>
        </div>
        
        {/* 错误提示 */}
        {errorMsg && (
          <div className="text-center bg-[#FDE68A]/90 text-[#5C3D00] font-bold p-2.5 rounded-xl border-l-8 border-[#F59E0B] backdrop-blur-sm animate-pulse shadow">
            {errorMsg}
          </div>
        )}
        
        {/* 胜利凯旋 */}
        {isVictory && <VictoryMessage />}
        
        {/* 操作按钮 */}
        <div className="flex gap-3 mt-1">
          <button 
            onClick={resetProgress}
            className="flex-1 bg-[#7FBCE5] hover:bg-[#5FA3D3] text-[#0B5E8A] font-bold py-2.5 rounded-full transition shadow-md text-base active:scale-[0.98]"
          >
            🔄 重置当前进度（清空槽位）
          </button>
          <button 
            onClick={newGameFull}
            className="flex-1 bg-[#3B82F6] hover:bg-[#2563EB] text-white font-bold py-2.5 rounded-full transition shadow-md text-base active:scale-[0.98]"
          >
            🧺 全新挑战（换一批算式）
          </button>
        </div>
        <div className="text-xs text-center text-[#0B5E8A] bg-[#E6F4FF]/80 rounded-full py-1.5 px-3 backdrop-blur-sm">
          💡 计算技巧：分数除以整数，等于分数乘这个整数的倒数。结果记得约成最简分数。整数不能为0。
        </div>
      </div>
    );
  };
  
  // ---------- 主应用 ----------
  const App = () => {
    const [gameResetKey, setGameResetKey] = React.useState(0);
    const handleNewGame = () => {
      setGameResetKey(prev => prev + 1);
    };
    return (
      <div className="flex flex-col lg:flex-row gap-6">
        <div className="lg:w-5/12">
          <KnowledgeCard />
        </div>
        <div className="lg:w-7/12 flex flex-col gap-5">
          <div className="bg-[#F0F9FF]/70 backdrop-blur-md rounded-3xl p-5 shadow-2xl border border-[#B8D9F5]">
            <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
              <h3 className="text-xl font-bold text-[#0B5E8A] flex items-center gap-2">
                <span className="text-3xl">☁️</span>
                分数除以整数 · 天空蓝工坊
              </h3>
              <span className="text-sm bg-[#D4EAFF] px-3 py-1 rounded-full text-[#0B5E8A] border border-[#7FBCE5]">🎯 拖拽计算结果</span>
            </div>
            <DivisionGame resetKey={gameResetKey} onNewGame={handleNewGame} />
          </div>
        </div>
      </div>
    );
  };
  
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
